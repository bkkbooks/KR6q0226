body:
  text: 古歙門人成時編輯書一寄母甲子正月三日方外男智旭敬然臂香刺舌血白母親大人膝下男幼蒙庭訓少長便道學自任寧不知父宜葬母宜養但生死一事人人有之靜夜深思真可怖畏如大母舅宦正濃而忽殞虞表姪年未壯而早亡身命無常如朝露大限至老少莫逃苦海茫茫誰能免者念及自身已覺酸鼻更念亡父老母倍覺傷神親身既然衆生寧異儻不早圖出世正恐追悔無及男憶二十一至星家問母壽言六十二三必有節限遂於佛前立深誓唯願減我算薄我功名必冀母臻上壽今既切思離俗儻萌一待心豈是求益母壽之念男又安能保無中夭邪生育一事世閒苦本況與功名皆有定數且青雲得志難敵生死大母舅即是殷鑒何如地藏大士目連尊者纍劫親恩皆蒙度脫之為孝也男少年詬大士賴母痛下鉗錘今得改過從善志在出世恐母愛情難割不得不硬卻心腸潛行方便又恐母日夜懸念故於三寶前然香刺血寄書遠達伏祈勿事勞心惟努力念佛求出輪回親屬可化者皆以此意示之寄剃度雪嶺師別忽三載反躬無似莫報師恩方今像季有三可痛哭三可哀愍毗尼法三學初基出世根本僧寶所由得名正法賴以住世而罕有師承多諸訛謬遂令正法墜地僧倫斷絶一可痛也三藏教修行之徑出苦之要而依文解義罔知觀心廢先哲舊章塗一時口耳遂令禪門訶為葛藤糟粕二痛也宗門一著本為上上根點鐵成金今但作門庭施設道理商量不墮狂罔無知便墮雜毒知見更有去施設掃道理者多落暗證窠臼盲修瞎鍊實是險塗無上妙法流弊至此三痛也第一可哀愍者借佛法圖名利無實為人之心二者但知己長不知人長但見人短不見己短株守一得向無佛處稱尊不能放下面皮打破局量從千萬人腳跟下穿過三者但為大以欺佛不思三界無安言淨土不必生彌陀不必念中郎判為唯心墮圓實墮確論也時丁末運非具大忍力大願大智大巧便力歡虞小補何當至治博山老師雖見處未徹源底實有苦功操履不肖與互感得益然不服其藥大忍願智便俟當請益也上闍梨古德師五夏以前專精戒律專精者豈徒著衣持鉢而已律中第一要務在常一其心念無錯亂謂依四念處行道也四念處慧佛法總關無念處慧著袈裟如木頭幡禮拜如碓上下六度萬行皆同外道苦行無與真修若依念處行道則持戒功德現能獲四沙門果乃至圓十地剋獲無難第二要務在洞明二百五十戒開遮持犯之致否則二六時既掛比丘名當結無量罪言之駭聞思之喪膽此二不明與邪戒何異末世流弊非有力大人不能挽回吾師德盛名顯僧俗同欽吾知諸佛所付託矣答茂林律主經論二藏說通五人戒經如來自說等覺猶非所堪譬禮樂征伐自天子出迦葉白椎云是佛所制者不應卻非佛所制者不應制千古不易之典也承問逐人受戒大難方許三人過四便不得戒不惟僧祇根本四分等皆有文且得戒不得戒關係非小敢憚繁邪三衣止長三肘闊五肘過是步步結等流罪若與佛衣等量便結第三篇罪今豎三橫六致左臂疊作三重又與迦絺那衣自不相干功德衣五條十隔受捨各有定時豈可但持此衣永當三衣非時食戒本無開聽今稱七不過午全無出處律中八種十種開聽謂展轉食別衆食及不作餘食法而食皆上午豈非時也時懷非想猶結吉羅服吐下藥止許煮麥不令頭破漉汁飲之不聞權開也又離衣宿結罪有文不持鉢結罪五部不載又皮革氈毳他經充類至盡之言非為破戒可不稱為大端而過午之中受食咽咽結第三篇未便稱為小節渡海浮囊芥子不捨況第三篇喻如手掌可以為小邪又五百問一書與五百餘卷律藏全反用五百問必廢五百卷遵五百卷五百問不得不闕若謂佛說無容致議則受生血盆高王等不亦稱佛說邪律學之訛已非一日宣公亞聖為懷素所嫌義淨大賢受翻譯名義彈駁故知如來以降等覺猶未稱一切智也俗不合聞比丘軌式一出根本薩婆多部一出戒因緣經序根本部因緣乃迦葉佛時外道子欲破法假就比丘學比丘告以俗得聞經論毗奈邪教俗不合聞外子權出家學習然後破之若俗不合聞謂半月誦戒則三藏具在自可展閲何待出家而學之若謂出薩婆多不出僧祇則五百問又豈出僧祇部也答志隆不諱疾忌醫誠末法優曇既自知病又知流俗之病惟勇於自療而即以療人便是真實修行否則知病不療病源正在此耳人必有超群拔俗手段方有出離生死機括人世愛見稍或未忘無上白法如何希冀紫柏大師云情之所有者理必無理之所有者情必無古人云識得一尺不如行得一寸夫閉戶看尊宿語以自警難敵現境熟識儻安守故轍可坐進此道豈五十三參之計拙而三登九上亦唐勞邪答博山無異師伯梵網戒本是界外別圓二教獨菩薩法其界內藏通二教出家菩薩無別戒法同秉比丘律儀但發心自度即名二乘發心度人斯名菩薩耳然界內之機不得捨本位而空希界外界外大士必須秉權法而遊於界中故菩薩比丘迥與菩薩士女不同近世咸謂小乘所制大乘悉開比丘所執菩薩悉融皆屬流言並非實義答水林二書既值事緣又生厭苦不免添一重公案不涉本頭加以幽憤又是第三重公案欲捨此刻念彌陀四重公案既云直往無算又欲拂散疑雲五重公案公案愈多相去益遠矣識論云一切唯有識有種種相轉彼依識所變若識所變不應自識逼苦自識經云阿彌陀佛是法界身則事緣非彌陀身中事邪即此彌陀即此念彌陀胡彌陀身中抱一捨一捨決不可捨抱決不可抱向不可捨抱處會取則皎日當空疑霧消散矣其一全身放下蕩蕩空空似則固似是則未是離生喜樂初禪之全身放下也定生喜樂二禪之全身放下也捨念清淨四禪之全身放下也不恆行心心所滅無想外道之全身放下也恆行心心所滅滅盡定聖人之全身放下也視那伽大定尚不啻螢火日光足下希心當在何境儻亦幸而妄想亂思遮障使不墮坑落塹如果驀直去恐諸佛亦救不得矣此事非一言可盡能虛心意不妨有相商分寄了因年未壯世態惡不可輕為去就往往好心行腳高者退道心卑與俗俱化非大智慧大力量罕能出類拔萃也圓覺經云一切衆生身心皆是無明欲求智慧須親善友然求善友於末世亦甚難言有少多行門者智眼昏昧有少多學識者行業荒蕪於中棄短取長須自眼正否則無不憒憒耳與曹源三書所謂直下承當者須置身千古聖賢之列不屑為隨波逐浪之人言行相顧心跡相符方終始不二幽明無閒憨翁云學道第一要骨氣剛次識量大次生死心切夫剛則不為情欲所靡大則不被目前所轉切則不順習氣所趨即靈源禪師易世俗所難而緩時流之急此第一良藥幸時服之勿懼苦口使積劫沉痾終不療也新師識論獨有苦心幸潛玩領其長處能劖妄習便是深妙儻決定收功心未若農夫望秋雖析義如繭絲牛毛秖粗淺耳人不解此意多墮數寶之誚惟自勖其一不虞之譽君子不喜求全之毀達人不辭自反有愧無怨於他人自反無愆更何嫌衆口以此持心不論時古時今也其二人不難有志難有忍事不難有察難有容故曰有容德乃大有忍乃有濟答曹源二書懺悔殷勤感佛光現雖僅二寸亦得戒前茅也嗣嬰貴恙是夙習交加及向來口腹犯戒所致然法華一部悲懺二時尚終不替猛丈夫矣其一圓教從名字初心便用佛知佛見修行豪傑丈夫具一切無明煩惱偏向冰凌劍鋒上行非冰凌劍鋒不能鑄無明煩惱成菩提般若故也天降大任必先苦勞拂亂令動心忍性頑鐵不鍊不成鋼美玉不治不精瑩松柏不歷歲寒不挺秀孤臣孽子不厲熏不達豈有粥飯習氣暖軟形態可坐進此道者夫小小境緣便成事障因平日無分毫契心恰意處耳果達妙理則現前極惡逆事第一玄妙為第一明師良友若捨此等境界何法可修可悟可頓邪兄平日學問大率向語言文字上著眼不向義理上體會躬行處較勘轉得此關捩子方是大乘淨土因也寄壁如兄知參究無緣便向有緣處入歸元無二方便多門入手不同到家則一均佛祖法門有何進退勝負可愛憎取捨必區區搏一丈夫名邪兄雲棲法系曾事幽溪雲棲教律兼修幽溪教觀並舉斯並津梁寧非直指特人心不了願不大耳生西方者貴大菩提心寶心寶若在帶惑亦可往生心寶若迷參禪早已兩橛若翻轉此關捩真實不欺正好真實參悟若翻不轉為舊習所汩必須就教律大開慧眼鍊就鋼骨方始相應請急著眼又末世禪人病膽大老兄病膽小膽大肆無忌憚直向泥犁膽小顧後瞻前不得自在善惡雖殊不能打徹一也欲徹體清涼將定散淨穢情見全體放下始得寄歸一兄鳥必學飛也而後毛羽成舟必學操也而後江河濟松柏必歷歲寒也而後貞幹堅行人必以佛祖自期也而後成佛祖若以狐疑鼠竄之因希獅行象顧之果恐不可得發大菩提心使悲智調停可也與瑩然豪傑立身決以破我法二執為準的我執不破定不能作千古至人法執不破定不能弘如來正法才魄橫一世者須開千古眼界成千古學識方不負己靈否則僅同春草之榮終非松柏之幹寄不忘學人第一要務在克除習氣誠以圓頓法淨治夙習猛風吹沙實無艱險儻習染不除則談玄說妙有名無義天台荊溪之道恐不如斯苦口良藥同病皆堪服之勿使如來慧命夭喪也與攝三每見多人於勝事種種障難俗纍病苦親長眷屬無量纏繞阻斷良緣空具信慕莫遂雅懷而得無障難者反信慕浮淺衣衫不整觸手捉經如措大對舉業相似又復惟記名言專喜貼句依文解義甘為三世佛冤釣利沽名永背一乘出要不惟寶山空回正恐袈裟難復好因緣是惡因緣此之謂也如來說教諸祖弘經並開衆生眼目作劫濁津梁不向此中著眼便是盲修瞎煉今欲不犯末世惡習不負往因現緣一要信諸佛境界吾人各具本無差別不生退怯二要仰企諸佛慚愧己靈句句會歸自己不可說食數寶三要虛心樂善稍有長者皆師友之四要悲愍一切凡堪以此意相警者不惜苦口五要恕人厚己凡不如法生哀愍心勿見其過近時學者見他放逸不與隨流則生憍慢皆增長生死可懼也與如是兄兄斷欲去愛固有辣手調身護物尚乏方便望內則放開懷抱以養神外則體察世情而惜福此一病未必非二利之緣也寄陳旻昭二書八月惺谷師西歸九月壁如師辭世一月奪二碩交皆法門梁棟也痛哉每思大事因緣非定慧莊嚴悲智雙運誠難一生了當惺師慧力有餘定力不足壁師定慧調適悲願未深俱未免遺下公案目下同袍鮮有生死心者況菩提心天人減少三惡充滿將何底極邪大廈將傾一木難支惟人定可勝天誓當易世俗所難緩時流之急棄名利絶囂喧持以深心要以弘願操以恆久不變之力庶無忝於嬰杵願居士斷泛涉之心省不急之務篤志近思深造自得以圖共報佛恩無以寶劍切泥隋珠彈雀是鄙衷所惓惓耳其一一芥翳天一塵覆地字經三寫烏焉成馬佛法之蝕由來漸矣非外道天魔能破壞周室者齊桓晉文也治世嚴王霸之辨操心分義利之關視聽言動之復禮不真克伐怨欲之不行何得隱居求志人定勝天此實字字血淚與韓蓮洲韋提以逆子起淨業正因慶喜以染緣為楞嚴弄引惡因緣是好因緣轉禍為福在人著眼儻隨遍計分別雪上加霜冤結有何了期若達曠劫因果則現在冤親總非天降地出以慈忍心調停解釋以夢幻觀消遣情懷未必非煉磨心性透露真常之一助也語云跌法從他得燈不剔不明鐘不擊不鳴他山之石可以攻玉汙泥生蓮華神奇出臭腐夫吾人本地風光埋藏蘊宅潛伏根門無時不煞煞欲現稍藉外緣一擊便當迸裂騰輝儻不肯向此際薦取佛界便為魔界如霜雪寒冰松柏增妍凡卉失色咎在己不在境也又仁者雖捨比丘沙彌律儀而大士木叉自宜固守仗此菩提戒光方可禦侮消難其說似迂其事實邇幸精思力行之寄修雅法主雲棲大師云古人著述多在晚年良以道曠無涯逢人不盡上代疏論家殫一生精神博綜內外學問得一二帙垂世尚不免後賢彈駁況一時口耳草料欲流布人閒邪須見到養到從居安資深流出則輝天燭地照古騰今非分外耳毗尼尤不容片言隻字有作譬禮樂征伐自天子出稍或僭竊厥罪不小傳佛心印記注附呈清覽此翁學識俱富解行兩優堪為近日作家虛心玩味知未易及耳答程季清法門不衰於無外護衰於無內守主持法門先盤星立正然後隨時隨力興隆幻事皆屬普賢行門稍涉世閒名利心佛法止成世法深可悲也復圓閒如來最後以扶律談常為宗苟廢事談理理成烏有智者荊溪諸老無不戒行冰霜方堪垂範千古豈可以毒器令貯醍醐不肖始雖染指宗門亦既遊心教苑今不得不以持戒為第一急務又見律學之訛較禪教更多爰為集要以便訓蒙捨舉世共趨之轍遵時豪恥問之塗知我苦心者惟如來耳仁者乘戒並急當是如來所使法運可回喜不寐也寄萬韞玉貴地久乏聞熏囿聞見儻宋儒陳腐見識一毫未淨未可深談佛法況坐陳腐障中欲商真正宗教誠難誠難寧以百千刃刀刺其耳根終不忍聞佛是方便說誑語人寧百千刃刀斷其舌終不肯言佛肯方便說誑語法寧百千刃刀割裂心胸終不可作佛經同寓言解此言儻一字不從真心中出不但死墮拔舌現世舌當爛壞當知宣尼大聖若比於佛的如小星比滿月爝火比燎原川瀆比大海中尊比朝廷若不能信此語是謗佛人不可謂信佛也寄王簡在古之君子為立六合內事尚一家非之不顧乃至天下非之不顧況圖出世大法塵劫遠猷可近囿一時耳口曲徇流俗人情邪居士非無志願直缺識力欲開千古識力決須視歸戒如泰山視世故如鴻毛庶作中流砥柱不然未可稱豪傑也寄潘戒如財色瞋慢清濁稍殊同為十習因同感六交報若別配因果慢屬修羅瞋屬地獄尤可畏躬自厚而薄責於人有諸己而後求諸人無諸己而後非諸人雪浪大師云不可以聖賢律人不可以率性自任此皆居士對症良藥幸時時服之作蓮邦左券與胡遠志為禪林求主人者弘護之願為一身商出處者自知之明竊以鮑老當場不若舉賢相副有季賢老師雲棲嫡子年德俱隆慈願並廣以禮敦迎或當俞允貧納與歸師拈鬮洞庭既許安居律不容改又己躬下事靜動無妨著書立言必須靜境納長於著述短於應酬儻從捨失措則長短互乖況律學之訛已將千載革非矯弊與俗相違僅可僻處深山鳩真同志作傳火計即欲行之天下以觸時諱禍且不測夫大乘弘誓以寬成大住持僧寶以局表尊既痛有名無實之弊必守貴精不貴多之針設居勝剎求戒必多嚴擇則招怨之端濫許則壞法之始進退維谷其何以堪嗚呼今天下稱圓稱頓稱大乘者遍滿域中獨聲聞一脈不惟置諸高閣亦且藐若草芥抑思世尊拈花時破顏微笑者果誰人邪靈源清禪師云易世俗所難緩時流之急納銘心此語久矣愁人莫向愁人說說與愁人愁殺人居士具金剛眼探法海源當亦為斯言肯首也寄金臺師咒壇火浴緇素之口其致非一蓋清淨咒壇不容女人得履亦不宜緇素輒入入者齊戒沐浴方得合制又咒心之說起於長水然疏中亦不敢確然自是既經文無據必宜繞壇行一百八遍為長夫無上壇場震旦僅有其二天龍共持諸佛共念再造之後幸録此言與戒明汝今六時精進欣慰須知此世閒第一福第一受用天魔鬼神所忌刻也必折意降情帶三分不如意境以自煉方為法器方可挽回定業勉之復靈隱兄生則隱居求志死則下下品生是弟之定局兄道眼明白志力勇鋭此生必辦但粥飯習氣軟暖粗浮戲論習氣思前算後習氣一一直下斬截方可立造聖賢閫域此尤不肖惓惓於知我者渠師萬望於淨土一門硬作主宰如韓信背水陳相似勿生一念恐不能生之心至囑至囑復錢元沖均一法門內外護其用各異內護持邪正之辨不得不嚴外護膺金湯之任不得不寬一如良工之分玉石一如投鼠之須忌器總以弘護正法為懷易地皆然耳業障一事不出因果因果之理統於十界楞嚴以不生不滅為本修因然後圓成果地修證法華以一乘因果為宗觀經明深信因果不謗大乘即上品中生乃教家浪以因果資談柄禪門謬謂因果非向上事理俱迷長夜莫曉不惟昧佛旨亦背儒宗易稱積善餘慶書稱作善百祥豈皆為愚人說法哉正誼不謀利明道不計功之仁人恰是修身俟命實學斷不可謂立巖牆為知命也今以勇猛善心回往昔決定業障如離弦之箭通臂猿能接之菩薩智猿亦復如是以方便臂接定業箭令不墮地亦不著身此即真實懺悔不但世法中所求如願且增長正信開發菩提因病得仙方非但卻疾兼可飛升矣囑徹因比丘吾望公甚高勿自卑甚遠勿自近甚廣勿自狹甚大勿自小甚尊勿自褻甚重勿自輕甚穩勿自浮甚密勿自疏甚微勿自陋甚妙勿自粗聖賢自期謂之高無數塵劫謂之遠遍周剎海謂之廣超權越小謂之大不染名利謂之尊不輕去就謂之重始終一致謂之穩精察力行謂之密窮理盡性謂之微開佛知見謂之妙嗚呼律門衰敗大法並危不具前之十德鮮克砥其頽波勉之哉第一須依念處行道隨文入觀觸事會心心觀為主看教為助第二須專求己過勿責人非第三須作出生死學問莫作趨時學問第四須和光同塵幸勿矜異欲看教典且完玄籤次十不二門詳解次律藏五百卷并大乘律五十卷次止觀輔行次阿含經等諸小乘經然後及餘經論或急於修證唯律藏不可不閲餘皆隨意萬勿妄想出頭惟真操實履了當生死不得為人改法名剃度師與受戒教授傳法師皆有父子之誼改法名是蔑剃度師也傷理背情無道之甚古來知識不聞有法派之說奈何末世以此為親吾聞先受戒者在前坐後受戒者在後坐不聞先取名者為師兄後取名者為師弟既以法派為重必以戒法為輕叔伯弟姪儼然與俗無異可羞可恥所宜痛戒不得曲媚權貴須如達大師家風若不能寧死不出頭不得多收徒衆多畜沙彌多受依止教訓不周必有壞法之咎切忌餽送白衣等事切忌無恥喪心到人家念經拜懺漸成應赴即檀越到山門作福須示以佛法尊重莫如近時叢林套子亡比丘物依律分與現前僧切不可學估唱陋習其餘諸事不能枚舉總以律為指歸則無過矣不聽吾言非吾弟也復胡善住自利利他須知彼知己知時知勢納每自反世謂我持律第一實增慚懼無論三聚十支八萬微細即二百五十未行萬一又無論遮罪除飲酒過午二條餘皆未淨即性罪七支能免故殺不能防誤能不錯因果不敢三寶物私取而不能磚錢不買瓦如古人執身不犯不能夢寐清淨不妄語兩舌不能無惡口綺語良由多劫乘急戒緩習以性成恥躬不逮退居沙彌更無弘戒之理也宗乘中事未出家已留心苦參十載頗辨真僞不敢以教律為夾雜教觀一塗叨仗夙因頗窺堂奧不敢以真實而自疑畏然此二者皆背時宜惟有山中苦行代一切衆生求消夙業去障而已非敢固也路資本不宜領寒威將逼贖典冬衣亦見因果不甚分明戒律疏緩之一端矣復卓左車入山非石隱計痛念大法傾頽綿力難救姑俟人定勝天耳承謬舉於葉宗伯謂宗說俱通解行雙到實增慚愧以今時俱通雙到見稱固未免𧠤然儻擬古之俱通雙到能勿蹴然哉數年被道友所牽虛名盛而實行微多方作入山計今始半遂正欲深之又深能為居士頓改節邪葉公處以原柬繳復陳旻昭二書大廈非一木所支年來惟道友為命而衆生習氣各有偏重不能如水乳合興言及此血淚橫流而已居常謂壞法門者皆撐法門人齊桓晉文尊周適所以壞周方痛懲不暇奚忍蹈其覆轍嗟乎出家初志急剋聖果十五六年竟成虛度慚天愧地夫復何言即此十五六年行腳打破面皮放捨身命僅於佛菩提了知歸家道路而形枯氣索前進為難欲傳得一人勿令最後佛種從我而斷亦竟未遇其人嗚呼痛心夢寐永泣而已公所處頗艱道念益固深以為慰每觀種種邪外其智短其說陋猶簧鼓天下後世有述者大底別有一段徹底精神持之耳況將此持正法乎但自反自勵不必他求也船子身葬水中夾山大弘其道荊溪以居士身參學多載後方出家一世不登法座書傳萬世不可磨滅宣聖木鐸孟軻好辨皆此類也此意願與居士共之未獲一第奚足憂當勤心道業誓續佛祖慧命為急務耳其一大法垂秋亂臣賊子遍天下邇雖稍衰而正法受其剝蝕元氣殊覺難復未可欲速也納以孤孽之身獨抱嬰杵之任雖感傷切髓不得不附虞仲夷逸之科遣茲餘喘居士竭力弘護即大學問大精進貴自著眼而已聖力智巧雖筈筈相拄非巧力所及終亦不離巧力何如楖梅吳公不敢浪通名字復智龍逃名萬死之後已悔其遲傳法一隙之天倍見其拙然生平受用惟多虛不如少實一語庶不致身謗三寶耳退戒一事亦以為今比丘則有餘為古沙彌則不足寧捨有餘企不足也寄徐雨海居士生長富貴不知世閒些小苦事況此大苦然雄才大略膽識高曠之人負蓋世資具千古學懷聰明慢眼空天下世出世法粗心浮氣未入甚微細智法門非此惡辣鉗錘何由入聖賢閫域佛祖堂奧天降大任必行拂亂動心忍性四字不妨十思百思乃圜中第一法藥也乾之上九亢龍有悔而不食之碩果轉為不遠之復復之象辭曰至日閉關商旅不行后不省方即潛龍勿用之意盈虛消息通於至道於通起塞即塞成通台觀所以貴善識也日為居士持大悲咒七遍脫難為期萬自愛勉寄靈隱兄兄眼目志識俱足千古而不能千古者缺剛骨也挺出剛骨以俯就幻緣方可了辦大事蒙許華嚴大鈔意欲細閲一遍求與台宗真出入處悠悠門外之談未足據也聞於台宗教觀已有信入尤願潛心討徹源底流光如駛衰老日侵自反痛心乃敢饒舌復項淨性和偈落在口頭三昧大似初生牛犢不畏虎居士本正信篤實亦弄此虛頭邪古人錯下一語墮五百世野狐身奈何妄談般若作拔舌犁耕種子萬祈戒之勿視作等閒夫詩偈可作也儱侗套語不可襲也帝鄉可遊也歸戒之心不可忘也紅塵堆裏學山居風塵何能染人人染風塵耳寄徐雨海到泉州一軒即索居士歷年手札觀之知苦緣中進益如此貧納向歎台宗居士未深入今果然否柬中為如是師語字字金錍恰與納為渠所發之願同但不知為居士所發願有當尊意否夫知人者明自知者強自知者明自勝者強居士能知人矣真自知乎設自知能自勝乎台宗玄妙無暇論大學修身正心中庸居易俟命請三思之五欲八風三教聖人同訶一塵之糞徹體是穢一毫砒霜徹體是毒勿以小善而不為勿以小惡而不去方不負再三稟受菩薩大戒也台宗云以前四戒為所觀境後六觀之事理相即世人蔑事而欲尚深理者驗知此觀孤虛無本既虧事境觀亦何從此荊溪尊者語幸加詳焉寄徹因大德真實比丘寥寥無幾不知何日五比丘如法同住一展吾外護初心興言至此肝腸寸裂所有不絶如線一脈僅寄足下萬萬珍重愛護養德充學以克荷之勿為最後斷佛種人使我抱憾千秋至囑至囑遠隔三千里未審作何用心苟不能念念與妙觀相應則失聞熏琢磨之益多矣寄恆如語有之胡越人之相仇也當同舟共濟風水險厄其相救也如左右手每念分段生死不啻惡風巨浪而出家諸人所以互相忌刻智不如胡越同舟者無他不曾痛念生死故耳今既知痛念生死豈復以世閒名相為活計哉與非幻此事日親日近日遠日疏若無良友明師夾持恐漸退其初心今世如此來世可知靜言思之能無懼乎佛頂文句須潛心玩閲看不透也須苦看老鼠咬棺材定有穿日即此是話頭是參禪工夫是摩訶止觀須信得及守得定方有真實受用勉之復淨禪淨土法門本該一切宗教普收一切群機故從上佛祖聖賢著述亦最富博欲摘其精要利益群品須備採衆長證以心悟方可流傳若此門未遵堂奧宜事力修無急急以著述為事也度人要務以智慧方便為本有智慧則能究權實理稱理而說義無不周有方便則能莊嚴文章文如於義觀者咸悅今周集理致僅七八分文章僅五六分似宜邃養更加錘鍊為妙意周所熟玩者但彌陀疏鈔龍舒淨土等文恐妙宗鈔一書尚未窮研乞勸細細尋繹參以十疑或問淨土指歸寶王三昧西方合論等書畢竟更有大豁眼處然後以慈悲心觀此方此時機宜採集一言半句以利益之功德更殊勝矣寄王東里此事雖直捷亦甚委曲雖簡夷亦甚精細吳公於簡夷直捷已信得及矣委曲精細處須竿頭進步此必居士陶鑄之力方可升堂入室也寄雪航法主調護他人正調護自己處調伏得自己一分習氣方調伏得他人一分習氣視人猶己捨己從人血脈誠在此朕躬有罪無以萬方萬方有罪罪在朕躬愛人不親反其仁治人不治反其智禮人不答反其敬三歲兒童讀得八十老翁行不得無怪乎受菩薩戒者多行菩薩道者鮮也復鄧靖起參禪念佛善用無非是藥不善用無不添病又或執藥是病或借病為藥事非一概未可片言盡也生死事大佛道玄妙縱一知半見小小工夫尚不濟事況一味死在句下者乎禪本無參佛本無念二語亦是醍醐亦是毒藥今之呼蒼天呵佛祖者正墮無參無念坑中若真參真念決不作此狂態矣寄程用九日為居士持大悲七遍五六年未嘗一日缺也命持準提當助百萬但願篤信咒力不可思議杜絶夤緣妄想設一念妄想未盡是信咒不及雖大悲準提二大菩薩亦末如之何矣不肖十二三便知有聖賢道脈今知與佛法到家雖別入門實同若世法稍違聖賢軌轍則出世決不成真實佛祖方今賄賂公行丈夫寧終身寥落誓勿蹈其鄙跡庶砥狂瀾於萬一若未免逐流以圖一得枉尋直尺之誚其誰與歸大非所望於高明也夢天神授籤乃大梵天王非韋馱也現有神策九十九首在大灌頂神咒經中南北藏皆恭字函急取流通勿以易林苟且塞責與行恕憶自十二三時以千古道脈為任便囂囂自得天子不得臣諸侯不得友況今廁僧寶豈世閒宰官書帖可招致哉何病深山已無人世閒想即今幻緣所牽流浪漳泉並不曾謁一宰官居士若苕中不必用此世套可容方外散人專用佛法教化群品則遣一確人持足下一柬來即相赴若不可為毋強與緒竺三頌附覽語言文字標月之指神而明之存乎其人際明生平傀儡全露筆端斷不在筆端上安身立命看得仙人手中扇鷂子過新羅久矣復王思鼓老子為學日益為道日損易傳云損德之修益德之裕居士精力雖減而信心慚愧有加即苦海津梁不求進而無所退豈在學問修持閒邪凡夫無不好勝好進不知以退為進也迦葉願居人後不為物先乃成千古鼻祖病是吾輩良藥消盡塵寰妄想覷破此身虛幻深明苦空無常無我觀門皆賴有病境耳願寬心耐意安忍無厭作隨緣消舊業想轉重令輕受想代衆生受苦想正不以不如人為愧也與永覺禪師法運日訛老成凋謝獸蹄鳥跡交於中國乳臭小兒競稱宗主拈花微旨掃地至此不惟可悲亦可恥矣惟老師耆年碩德堅握壽昌不肯二字心印不必頻呻哮吼狐犴已為喪氣茲者泉南隙地羶風雖已時來毒氣幸未深入老師正應久住此方防護外邪養育善種但令二三志士得接老師法脈將來魔黨敗後泉南佛國一燈可遍布天下也不肖幻緣所牽未能執巾瓶猶冀法駕蚤臨庶獲一晤慈顏兼欲委陳生平苦心故敢冒昧輒助勸請與周洗心不可說破恐塞悟門是參究一塗別方便耳宗門亦有不妨直直說破者況教觀況淨土邪淨土的旨全在妙宗一書縱持名不修觀可不達四土橫豎之致乎西方合論亦淨土有功之書不肖圓通文句一則收盡念佛三昧綱宗但言簡義富乃提綱挈領之學非遍探一代時教不足盡數千言中所包攝也儻專辦己事未暇利人只晝夜彌陀十萬且求往生一切宗教眼目不必作意求通但得見彌陀何愁不開悟自是一論若大悲為人思垂言句必令十分精瑩庶可普利三根不然一法才立一弊旋生況末世禪教淨土種種語録充楹積棟安事更以雜而未純之作與流俗鬥富哉法號漫作一文其中理路頗為入道之要當依義不依文可也
