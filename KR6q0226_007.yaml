body:
  text: 法語二示靖玄自他不二之體名玄自利利他之行名靖能悟玄體性本自靖能為靖功玄體可會此性修不二之真旨也見思靖方知真諦本玄塵沙靖方知俗諦本玄無明靖方知中諦本玄三玄既會方知衆生三惑亦本靖也佛頂云狂心頓歇歇即菩提一人發真歸元十方虛空悉皆消殞法華云如來如實知見三界之相無有生死若退若出等噫可悟性修交成矣示玄暗二則古云明時無暗暗時無明此相傾奪義也又當明中有暗當暗中有明此性無傾奪義也佛頂云明能破暗此以真融妄全妄成真無破無不破而論破也須知無傾奪性全體在傾奪相中而傾奪妄相全體不離無傾奪性知性相二而不二不二而二者則知非破非不破而論破矣非破非不破性也破者全性所起之妙修也破即無所破者全修在性也故明生時暗無所去暗無去則明無所來無去無來則不生不滅如禪人未聽經時心性無減而妙義茫然已聽經後慧解頓開而心性無增知無增減則知六而常即知茫然與漸開不同漸開與圓悟圓證定不同則知即而常六請以此為造修方便其一小水常流則能穿石吳江一行人學法華半日不能一句晝夜不捨六年而全部成誦法友熏習已多所以未淪浹者不切心故耳誠切心則法味津津現前既得法味欲罷不能患不時習不患不悅也有忘食之憤後有忘憂之樂幸將所聽之法溫習勿忘日久功深豁然開悟既得法喜之樂便是超脫之緣矣其二示惟淡世法惟恐不濃出世法惟恐不淡人惟淡故其交恆道惟淡故久而不厭時習之悅朋來之樂不知之不慍皆淡中滋味也欲界情淡得離生喜樂初禪情淡得定生喜樂二禪情淡得離喜妙樂三禪情淡得捨念清淨三界情淡得寂滅涅槃似道法愛淡證中道常寂滅性是故三世如來究竟此淡者也十方菩薩分證此淡者也聲聞緣覺得淡之一隅者也老子莊子竊淡之影響者也欲深入淡字法門須將無始虛妄濃厚習氣盡情放下放至無可放處淡性自得現前淡性既現三界津津有味境界如嚼蠟矣僧夢虎驚寤喜曰匪夢幾被虎食既悔曰知是夢何不做一人情噫可醒三界之戀幻質不知淡性者矣示惟默孔子曰豫欲無言佛云吾四十九年不曾說一字然六經四書三藏十二部果何物哉如以杜口為默凡瘖啞者皆聖與佛矣詎知諸法無性言語本空終日言未嘗有言終日不言未嘗無言故又曰天何言哉四時行焉百物生焉天何言哉尊者無說我乃無聽無說無聽是真般若推此致也塵說剎說熾然說三世無閒斷說亦若是已矣苟未達說默之源說是覺觀生相默是覺觀滅相既墮生滅情見則說默俱非若妙契寰中說能開悟默能密喻是說默無非善說也說無說相默無默相是說默無非善默也善說者謂惟說可善默者謂惟默可皆法界故法界不二說默不二不相借不相成不相破亦不相亡不相礙亦不相融當體清淨絶待離微夫諸佛解脫即於凡夫心行中求觀心無心說默何有說默無性說默俱妙是頓悟緣起無生超彼三乘歷劫修證者也示晦涵莎伽陀不能誦一偈而調息豁然阿那律多失雙目乃修三昧觀大千界如掌果人正不以多知多見為貴法友既於了義未深解但篤信企慕禮拜持誦使淪骨浹髓功深力到忽發旋陀羅尼一品親見靈山勝會便與智者把手共行矣示未一聖學究竟處決無滿足下手處決不委靡孔子十五志學此即不可奪之志也志立然後以無厭足心期盡性命之源蓋自期遠大簡點必嚴簡點嚴則惟日不足不肯半塗自安堯舜猶病禹拜善言湯有慚德望道未見寡過未能聖仁豈敢皆深知性命源底非大覺不能究竟也一究竟一切究竟子臣弟友丘未能一愈不能愈無息肩地不然夜郎自封區區自得如貧獲一金志驕意滿何以階大道哉示泛如孟子曰人能充無受爾汝之實無所往而不為義也此與無我人衆生壽者相修一切法之旨略同夫爾汝之名亦何足恥爾汝之實真不宜受見思斷則不受生死之爾汝塵沙斷則不受枯寂之爾汝無明斷則不受變易之爾汝誠能充無受爾汝之實則盡大地是箇自己盡大地是箇自己則將修一切善法以利益大地衆生豈復以爾汝之名與世諍哉示庸菴教觀譬膏火終始相需故離教觀心者暗迷心逐教者浮浮則茫無歸著暗則愈趨愈訛此末世禪教所以名盛而實衰也須知一切了義大乘諸祖公案皆我現前一念注腳說來說去總不離我一心我今此心全真成妄全妄即真若不能當下反觀則靈知靈覺之性恆被一切法所區局縱慧成四辨定入四空依舊迷己為物認物為己若能直觀現前一念的確不在內外中閒諸處無體無相無影無蹤但有一法當情皆心所現終非能現此能現者雖云量同虛空亦無虛空形相可得若有虛空情量又是惟心所現之相分矣一切時放教歷歷明明空空蕩蕩亦不認歷歷明明空空蕩蕩者為心以心體離過絶非不可思議故了知一切惟心心非一切忽然契入本體一切語言公案無不同條共貫矣示密詣爾祖誦帚公之與余交也尋余疊冰積雪中不恤三千里之勞故余亦攜病來趨不肯食一言之諾逮示疾一提其西方本願遂能萬緣放下怡然坐逝豈非生平視師友如饑渴故得享其報於臨行邪爾祖既寂至今思其冰霜凜烈之苦操樂受鉗錘之虛志猶足令人痛心酸鼻繼志述事責在爾躬念之哉世事虛幻人命無常當擴其眼界徑其神慮苦其身毋墮宴安鴆毒坑策其志毋循將就苟且塗轍汰奢窒欲積行存誠惜福延壽以期於大成爾誠靜坐默思只此現前一念見聞之性本非內外方隅亦非有無情量云何被此虛妄形質所局虛妄形質生必有滅千般保愛不能令其不朽而所作幻業如影隨形從劫至劫不肯相離豪傑之士先須覷空身形非我不過假借四大所成心亦無相不過因於情塵妄見生滅便頓捨情塵專心辦道兼律兼教助顯心源但得悟心萬法何有萬法俱息萬法俱備矣示元印立身行己之道志欲剛氣欲柔志不剛不足成千古品格氣不柔不足陶多生習氣夫衆生所以淪苦海者無他任情適意好順惡逆不深求出要故也書云言逆汝必求諸道言遜汝必求諸非道為君尚然況出世丈夫者乎出世丈夫以佛祖自期以四弘為券以六度萬行為家常茶飯以自利利他為的發一言不足自利利他勿言也舉一步作一念不足自利利他勿舉也勿念也事苟益身心裨法化必黽勉為之雖劬勞困苦勿恤也否雖有浮名幻利弗屑也凝神定志拓度虛懷人皆可以為堯舜滿街都是聖人謂我不能成佛是自棄也知可成佛而不肯力行佛行是自暴也不自棄則志剛不自暴則氣柔志剛則本立道生氣柔則深造自得志剛可上求佛道氣柔可下化衆生志剛可荷負衆生氣柔可承事諸佛易曰天行健君子以自強不息用九見群龍無首吉剛而柔也地勢坤君子以厚德載物用六利永貞柔而剛也剛柔合德定慧力莊嚴此世出世法之正印也示念日顯密圓通皆以解行雙進為要解者達我現前一念心性全體三德祕藏與諸佛所證衆生所具毫無差別十方三世顯密契經惟為發明此一念心性達此一念心性即顯密二詮之體從此起於顯密二行顯行依經修觀廣如二十五圓通法門略則惟心識觀真如實觀二種收盡二十五境各具二觀且約耳根言之先從徵心處破妄惟心識觀也圓解既開即於聞中入圓通常流真如實觀也密行亦具二觀達字字句句無非法界者真如實觀也心無異緣專持此咒悟知音聲如響能持之心如幻者惟心識觀也由惟心識進真如實密行成顯行亦圓滿矣示非幻人能痛念生死事大覷破一切世情若順若逆總虛妄不實過眼便是空花獨一念持戒禮懺篤信三寶之心生與同生死與同死而又專求己過不責人非步趨先聖先賢不隨時流上下庶幾信心日固智慧日開而生死可永脫耳示本光顯密二詮理體無殊功用亦等須信五會真言一字一句無非全體三德祕藏現前能持之心介爾介爾無非橫遍豎窮之性乃至楮墨筆腕一一無非法界法界性不可改即大定體法界理不可昧即不動智光若念念與此定慧相應便可謂常持如是咒百千萬億遍若念念讀誦書寫此咒便與性定本智相應所以天龍矢護菩薩常隨今禪人發至誠心刺血書咒緣因誠非淺淺緣因之體即是正因達正因者即名了因三因不一不異不縱不橫大佛頂性徹底現前大涅槃果元吾家故物矣示淨禪聽法須觀心書寫須解義然解義正不必強加穿鑿亦不徒循章摘句但至誠讀誦展卷如對活佛收卷如在目前千遍萬遍淪骨浹髓寤寐不忘緣因既深一十二千七百無不一串穿卻也得此消息便知吾言不誣示漢目大佛頂首示真心隨勸修直心直心有事有理理則正念真如事則四威儀一切行中毫無虛假是也末世禪和不為生死大事裝模做樣詐現威儀不真實學禪教律徒記兩則公案辨幾句名相受三衣一鉢以為佛法盡此矣嗚呼此何心哉今止觀此一念假借佛法之心出得生死否成得佛祖否又觀此念為在內外中閒諸處否為從自生從他生為自他共生為無因生若一念虛假之心既無生無體無方隅處所則妄想顛倒寂滅而常住真心宛然呈露矣是謂由事直心以合於理直心也其深思力研之示育悟世人談及生死鮮不悚慮往往不能真為生死者眼前活計放不下耳然所以放不下者秖不曾徹見生死之苦以從來為俗為僧皆向順境中捱過故畏三界心自然發得不真切儻以遠大慧眼曠觀無始輪回痛念此生果從何來死後當至何趣前際茫茫後際墨墨饒鐵石心腸必為驚怖然後依正教開圓解起圓行敢保十人有五雙到家最懼因地不真道眼昏暗或為世味所牽或為邪師僞法所誤袈裟下失卻人身此豫所以俯仰時流而寤寐永歎也示解天具參方志尤須具參方眼具參方眼還須不忘參方志參方志者不為虛名圖體面博一知半見發無上大菩提心遍學一切法門無厭無足參方眼者末世師匠邪正難分今自卓立不論宗教但與出生死相應名利不相應大菩提相應眼前活計不相應者則為正反此則為邪正則依邪則捨具眼不忘參方志者本求無上菩提雖邪正分明不妄生憎愛善吾師不善吾資但隨緣觸境增長道心智眼而已此本分中最要緊事其餘叢林粥飯習氣萬萬不宜沾染亦不必厭惡也示元賡愚魯恐不精明伶俐恐不篤摰道雖從智慧領悟尤從澄定體合必向身心切近日用動靜閒沈細思察方有真實開豁當下受用若於一切行門不能作助修想必捨煩取靜方理經典又於一切經典不能隨文入觀必掩卷趺坐方理身心一件事分作三項不可語至道明矣從緣薦得相應疾就體消停得力遲大乘法門貴行住坐臥語言施為時薦取見色聞聲嗅香嘗味覺觸知法處理會薦取者薦其本自天成之性真理會者會其出障圓明之妙體而已性真妙體不即一切法不離一切法試看只今語言動靜者讀經看教打坐思惟妄想昏沈惺惺寂寂者畢竟是箇甚麼咄切勿認賊為子切勿撥波求水切勿作水中鹽味色裡膠青會直恁麼薦取理會去示緒竺三界惟心萬法惟識二語人能言之觸境逢緣仍被境緣所轉若實達惟心惟識豈有心識外之境緣哉且縱不達惟心惟識境緣決定不離心識如夢中妄計夢境為實起欣起怖而離夢心決定別無夢境學人先須了達三界萬法種種境緣實無心識外之別物次推究此心此識畢竟有何體性相狀若現前心識實無體性相狀者惟心所現三界萬法又豈有少許體性相狀可得也心識不可得名心寂三昧心寂則色自寂境緣不可得名色寂三昧色寂則心亦寂心色俱寂則無煩惱亦無菩提無生死亦無涅槃無凡無聖一味平等是謂心佛衆生三無差別然後全性成修企自心本具之佛道度自心本具之衆生如知水性冰性同一溼性已不於水外有冰不於冰外覓水而方便融冰成水則念念常觀即心即佛而不起上慢時時上求下化不倦而總名無作妙德無功用行矣若捨此別商方便求工夫乃至覓玄妙是演若怖頭醉兒索食也或初心散亂多者用數息法如童蒙止觀所明須了知息出息入來無所從去無所至此息當體全空舉體即假仍非二邊即是中道所謂圓人用偏法偏法亦成圓又昏蓋重者不宜貪坐須方便調停減雜事減飲食令神清氣定則觀慧漸漸增明昏散漸漸退舍又學道如調琴相似大緩則無聲大急則弦絶生死之心常切求效之心莫生先難而後獲庶幾近之若欲體達現前心識無體性相狀者不出四性四運二種推法四性推者謂現前一念設自生不應藉緣生既藉緣心無生力心既無生緣亦無力心緣各無合云何有合尚叵得離云何生故知心識實無生也四運推者觀此一念未生時潛在何處欲生時何緣得生正生時作何體相為在內外中閒邪為方圓長短青黃赤白邪生已無閒必滅滅又歸於何處三際覓心皆不可得奈何於本空寂妄計內心外境起惑造業枉受輪回邪然畢竟覓一能起惑造業受報者元不可得如醉見屋轉屋元不轉但吐卻一向妄計無明之酒惑業苦三當下永息設口談空無明不吐如醉見屋轉硬言不轉併此不轉亦醉語耳且道無明酒作麼生吐咄要知端的意北斗面南看珍重示映竺超生脫死法門不可以聰明湊泊不可以意氣承當不可以情見夾雜不可以粗疏領會先須專求己過無責人非見賢思齊見惡內省法法消歸自心時時警策自心將定盤星認得清楚明白然後看經可坐禪可營福可如眼目未明存心未篤則看經必墮口耳活計坐禪必墮暗證深坑營福必成魔家伴侶縱福慧雙修教觀並進而我心未忘能所日熾其為修羅眷屬無疑所宜慎思而密察也示鏡衷履三寶地具出世儀皆多劫善種況聞正法乎寧國一老者種福五十餘年求來世作燒火僧不可得而聽經白鴿轉身為戒環禪師聞法功德超勝如此人生幾何少壯忽老老忽烏有且盛年夭橫者無數一息才斷孤魂無侶生平惡業無不隨身何不趁早放下幻夢塵勞勤修戒定智慧息心達本源乃號為沙門不然堂堂僧相多劫勤修而得之一旦藐視而失之能無憬哉示遙集不能頓盡者塵緣之纍不可暫忘者出世之心待無纍而修行何如藉修行而脫纍且塵勞逼迫正可警悟苦空磨礱情性每見人冗中偷閒吟詩習字作種種清課豈不能偷閒玩大乘息心學定慧邪彼於詩字得少幻味未嘗於大乘定慧得真法味也然縱不得味亦為無上菩提而作種子且幼時詩字亦向不得味中來安知佛法漸熏習不於現身得受用邪嗟嗟人之精神用之詩字吾見右軍李杜不出生死用之佛法吾見散亂豔喜愚癡特迦大事已辦示沐苑發心應學二事一智慧二慈悲方便欲學智慧莫若讀誦大乘方等經典深解義趣隨文入觀不墮嚼木之譏不招數寶之誚又數近明師良友討究決擇不可師心自是欲學慈悲方便須深信一切衆生皆有佛性定當作佛見僧俗造惡者勿生輕慢須憐憫愛念種種善巧而回護接引之儻恃己修見不修行便生忽慢自持戒慢破戒者自讀誦大乘慢無聞者自解義慢愚魯者自觀心慢口說者人我山高勝負情重畢生勤苦止成修羅法界去菩薩道遠矣示郭太爵位別業殊有不別不殊者在君子素其位而行以富貴貧賤夷狄患難皆唯心所現全攬法界為體全體即是法界法界橫遍豎窮無少事少理趨過所以無入而不自得也佛頂二十五門無一門非圓通華嚴入法界品無一法非解脫各可就路還家不勞取一捨一故曰素其位而行不願乎其外一塵法界即無邊法界法界本來無外故也雲搏之法界不大蜩鳩之法界不小以此解易舉凡十界十如權實之要五時八教施設之方總入一卦一爻卦爻之法界不少界如權實之法界不多故孔子曰假我數年五十以學易可以無大過矣孔子傳千古聖賢心學全以內自寡過者為趨吉避凶之門所謂無入而不自得也箋釋者固不必盡殉舊說亦不必盡廢舊說但虛其心體其言外之旨疏其文字之脈始信宋儒之循行數墨公輩之索隱立異皆非孔之所謂學也晦菴早富著述晚乃悔欲追泯之不可得居士當讀韋編至於三絶必大有進者更作一番筆削不閲而知其可行遠也如切如磋如琢如磨請三復斯語示靖開三界之中無非牢獄暫時快樂終歸無常衆生燕雀處堂罕思出離惟逆境當前庶幾生遠離之心故佛稱八苦為八師非虛語也公冶長在縲絏而非其罪聖賢不以為恥世出世求無忝己躬而已素患難行乎患難婆藪仙人在地獄化無量獄衆發菩提心遍融達觀憨山三大師坐刑部牢時勸牢中無量人歸敬三寶持齊念佛或藉現生脫苦或藉永出輪回惡因緣是好因緣莫謂囹圄非自利利他地也歸依三寶奉持五戒自念佛勸他念佛自斷十惡勸人莫行十惡自修十善勸人同修十善此十善法雖下品為神因中品人因上品天因而上上品則為羅漢支佛菩薩如來之因黽勉修持久而不替不惟現災可脫而無始三界牢獄亦將從此永離矣示靖聞香山參鳥窠直告曰諸惡莫作衆善奉行三歲兒說得八十翁行不得從上諸祖指點出生死法最簡易明白正不必金剛圈栗棘蓬為玄妙也後世學人偷心益多祖庭方便益變方便既變而偷心又與之俱變佛亦未如何已馬祖初年但云即心即佛果知即心即佛自然諸惡莫作衆善奉行果能諸惡莫作衆善奉行便知即心即佛故知欲悟即心即佛須是持戒念佛戒持得淨佛念得切塵垢自除光明自露偈曰持戒便是平心念佛便是直行參得箇點玄關不向鉢盂討柄若更者也之乎失卻佛祖性命示郭善友佛法大海信為能入智為能度若信心而乏智慧未有不泣岐兩端者佛言末世鬥諍堅固億億人學道罕有一人證果惟依念佛求生淨土可以橫超苦輪昔有祖師初但至誠禮法華經拜至糞字遂悟法華三昧有誦法華人來壽昌禪師處請益叱云邪見衆生不識好惡法華便是禪那別有禪可參其人服膺而去竟以持法華悟道若深信念佛禮拜是佛祖真因確乎不被時流所轉便是大智慧光明超登淨土永無泣岐之患矣
