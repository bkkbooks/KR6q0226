body:
  text: 法語五示王夢回名淨醒心性意知夢具也天地萬物夢境也古今治亂夢所幻現也惟能做夢者終日在夢終日不壞夫做夢者不惟不可喚作古今治亂天地萬物且不可喚作心性意知通此者通乎晝夜之道而知矣示范得先惟得天下之最後者能得天下之最先惟知天下之最先者能得天下之最後故曰乾知大始坤作成物豈自強載物有二體哉顏子沒聖學亡知行分張朱陸競異參以功利之心雜以人我之見飾以掠虛捕影之禪而天下無真儒矣顏氏有不善未嘗不知可謂知其最先知之未嘗復行可謂得其最後然孔子極力發明惟不遷怒不二過六字而已無怒無過心之體有怒有過意之動知怒知過是良知不遷不二是格物向此薦得真得先矣示葉天紀有心而後有天地萬物聖賢傳授不過以心印心故曰人心惟危道心惟微惟精惟一允執厥中心豈有二哉迷其本一故人心惟危如水成冰也悟其無二故道心惟微如冰還成水也返迷歸悟故名惟精如湯消冰也迷悟性空故名惟一如冰水同一溼性也熾然迷悟體元不屬迷悟兩端故名厥中即惟一之體也從迷得悟一悟永不復迷故名允執即惟精之功也堯以此心學立其極了知心外別無天地萬物所以天與之人歸之草木瑞應之梧桐紀閏蓂莢紀月豈離心性外別有感應乎哉唐虞三代雖往而吾人心性元未嘗往春秋之時有孔顏六朝之末有王通宋有陸象山明有王文成後之學者苟契於心性之源謂堯舜孔顏至今未亡可也然堯舜孔顏不過達心外無法故物格而良知自致知至而意誠心正修齊治平不勞功力何嘗以八條目三綱領亂此一以貫之之傳也周濂溪發悟於東林總欲剃落總公囑以扶植儒學遂為宋儒鼻祖吾於天紀有厚望焉示巨方天台接龍樹聞知之傳闡鷲峰開顯之妙權實同彰教觀並舉如三代禮樂超卓萬古非漢唐雜霸雜夷之治能倣佛萬一也後世逐流忘源漸成繁蕪而矯枉過正者又復束置高閣適令諸侯之惡其害己者益無忌憚公然以疏抗經祖抗佛噫可悲甚矣妙峰老人出月亭之門而力弘台旨紹覺老人私讀大覺遺籍而遍演三宗紹師雜無的傳妙師專傳無盡師於是世間復知有台宗名字逮今日又未免名盛實衰矣豫本宗門種草因感法道陵夷鑒近時禪病思所以救療之者請決於佛拈得依台宗注梵網鬮始肯究心三大五小愧無實德不克以身弘道然於古之妙今之弊頗辨端的蓋台宗發源法華法華開權顯實則無所不簡無所不收今之弘台宗者既不能遍收禪律法相又何以成絶待之妙既獨負一台宗為勝又豈不成對待之粗是故台既拒禪宗法相於山外禪亦拒台於單傳直指之外矣夫拒台者固不止於不知台者也拒禪與法相者又豈止於不知禪與法相而已哉寧學聖人未至不願以一善成名噫果不以一善成名聖人亦無不可學至之理矣示蒼雲學道別無實法變化氣質剋除習氣而已氣質變品格不期超而自超習氣除佛法不求透而自透金以鍊而精鏡以磨而淨也今之學者吾惑焉任鹵莽之質而不知革益騖外之習而不知返投鉛鐵於真金求斤兩之多不知其雜偽不堪也用白墠塗鏡欲光明潔白不知其埋沒愈甚也真有志聖賢佛祖之學必先易衆人所難緩時流所急師於古不師於今考於人不信於意説我過者如良醫譽我善者如鳩酒千古道脈期我者為明師良友眼前活計誘我者為惡友魔黨看一經思與身心當下相應睹一事思與本分有何損益見賢思齊見不賢而內自省是賢與不賢皆能益我矣儻見善不能隨喜修學見惡輕慢毀侮是善惡皆能損我矣嗟嗟善取益者無往非益甘自損者無往非損故曰智人治心不治境愚人治境不治心奈何不深思哉豫生過失最多未能寡過安能策人然法友果能自策豫之過即法友藥也豫惟實無片長故無可自炫今法友縱有長處亦當學豫之不炫豫自省真不如一切人故斷不敢輕一切人今法友縱勝一切人亦斷不可輕一切人豫惟無所不師故無偏師今法友縱偏師豫亦宜學豫無所不師至若專研教觀事懺摩送想安養不求名聞不志利養皆本分當然無一可表異者儻一念表異只此一念便與教觀不相應亦與懺摩不相應安養不相應亦是名根亦是利藪此豫所以念念自訟的知寡過之難未審法友果能自訟能寡過否也嗚呼世衰道微師資誼喪相縻以名相羈以勢誰復知有出生死成菩提事口云為生死培生死者有之口云求菩提背菩提者有之總由不破我法二執故也然此二執潛伏藏識遊戲諸根日夜流注曾無間斷捨此不究而別究教觀捨此不懺而別修懺摩捨此不淨而別求淨土豈自覺覺他之道哉示朱震暘金剛般若不出應住降心二問而非兩事也能降伏則能如所教住住六塵則為不降伏心是故西土菩薩以四心釋降伏義無不盡一廣大心謂所緣境遍不隔三界四生降伏無始區局六塵之心二第一心謂所發誓深令得無餘涅槃降伏無始於下劣六塵喜足之心三常心謂衆生即自心心外實無衆生得滅度者降伏無始於六塵隔越妄計彼我之心四不顛倒心謂達無我人衆生壽者四相降伏無始於虛妄六塵計我我所之心當知念念與四心相應即為如所教住儻一念住六塵即為非住以色聲香味觸法區局不廣大下劣非第一遷變非真常顛倒非正智故不住六塵亦不住於不住故云應無所住而生其心蓋住六塵固名凡夫外道住於不住秖名聲聞緣覺仍住出世微細法塵不名真正無住故亦為區局下劣遷變顛倒而非廣大第一真常正智惟發阿耨多羅三藐三菩提心之大菩薩了知現前一念心本自廣大第一真常本無顛倒是以住於廣大第一真常正智而修六度萬行不同凡夫之住有二乘之住空也吾人見此便可直下修行儻起一念若區局心若下劣若隔別若顛倒心即以廣大心第一常正智心而降伏之亦復不取廣大乃至正智之相以四心本非色聲香味觸法境故如此功夫甚痛快甚直捷盡未來際如此應住如此降伏可謂以不生不滅為本修因然後圓成果地修證者矣示西池經云得遇道興信心難既信心發菩提心難既發心無修無證難嗟乎此至言也然不達無修無證之體不名真菩提心不發真菩提心亦不名真信信豈易言哉馬鳴立論直名起信三祖作銘直名信心不似後世妄以信解修證強分淺深次第也西池賢者同子妾女俱出家昔龐居士夫婦同居男不婚女不嫁且云但願空諸所有切勿實諸所無其契無修無證之旨不甚明白邪今近住戒正無修無證妙法儻不向此著眼擬於何處覓玄且如不殺殺業空不偷盜業空不淫相生業空不妄語相惱業空不飲酒癡暗業空然不殺不取長壽報不盜不取富饒報不淫不取梵世報不妄不取信重報不飲不取聰利報豈非但空所有不實所無之妙行乎以此清淨三業普與衆生同歸寂光真性豈非無修無證大菩提心乎若不能於戒中徹見性修不二宗旨何名真信故三祖曰信心不二不二信心言語道斷非去來今馬鳴曰自心起信還信自心也示何德坤善學佛法者不難通文難達義不難達義難入理又不難入理難忘情夫情苟未忘所入理決不瑩徹理不瑩徹所達義決不無礙義未無礙所通文決非總持是以性相分河宗教別戶末法之蔽非情為之纍乎然情非僅色聲香味觸法牽動六根已也非僅富貴功名道德羈繫生平已也縱全體放下渾身拶入而學天台者有天台當情學賢首慈恩者有賢首慈恩當情參曹洞者有曹洞當情參臨濟者有臨濟當情一法當情便成理障理障則義局義局則文脈死矣文脈死尚不可為文宣子孫況迦文真胤乎故吾每謂真不負己靈者須盡翻近時宗教窠臼方可遍入古來宗教堂奧夫堂奧豈有他哉不過發明吾人本有心性而已心性無法不具無法不造而所具所造一切諸法皆悉無性明此無性之法一一皆非實我實法者謂之慈恩宗明此諸法無性一一皆能遍具遍造者謂之法性宗直指現前妄法妄心悉皆無性令見性成佛者謂之禪宗是故臨濟痛快直捷未嘗不精微曹洞精細嚴密未嘗不簡切唯識存依圓未嘗不破遍計般若破情執未嘗不立諦理護法明真如不受熏未嘗謂與諸法定異馬鳴明真如無明互熏未嘗謂其定一乃至教乘雖借語言未嘗不契實相之體禪宗雖掃文字未嘗或墮暗證之愆良由古人真能忘情所以入理今人多分泥理所以添情也示念佛社吾人從無始來直至盡未來際決無不起念時縱心慮灰凝入無想定仍墮八萬四千枯稿亂想但念地獄則地獄界人念餓鬼則餓鬼界人乃至念佛則為佛界人耳此理至明故宗鏡云一念相應一念佛念念相應念念佛也若更問念佛是誰頭上安頭騎驢覓驢明眼為之噴飯而近代無知狂悖之徒反以話頭為奇特名號為尋常棄如意珠王競取瓦礫可哀矣晟溪諸善友獨能結社念佛盡一日中出聲一炷香默持一炷香循環無間必以一心不亂為期此簡巧之行須深信勿疑久久勿替自當圓超五濁圓淨四土更莫向含元殿裏問長安也示閔周埏信願如目衆行如足信願如牛衆行如車信願如棋之有眼衆行如棋之有子故信願行三雖缺一不可而尤以信願為主為導也蓋信願既專凡種種諸善皆淨土資糧縱萬不幸誤作諸惡誠心懺悔斷相續心亦足為往生妙行苟無信願則戒感人天定感色無色界慧剋二乘權果而已示閔六飛二則佛法貴精不貴多精貫多多不能專精故提綱挈領之道不可不急講也綱領者現前一念心性而已心性不在內外中間不屬過現未來不可以色聲香味觸法求不可以有無雙亦雙非取心性既爾一切法性亦如是故曰因緣所生法即空即假即中中者性體空者性量假者性具也迷此性量名見思惑迷此性具名塵沙惑迷此性體名無明惑三惑皆迷中翳妄非有實體故三觀起三惑隨消由吾人迷有厚薄致如來教有頓漸是知頓漸諸教皆為了悟心性而設若了心性教綱在我不在佛矣然須先破我法二執是故唯識初二卷言之獨詳學者果能隨文會理將無始名言戲論我法習氣當下鏟除則真空理顯此之空理不當有無有無自爾無者無彼遍計有者有彼依圓圓成實者唯識實性名中道第一義諦依他起者唯識假相名為俗諦此二皆非實我實法但衆生遍計執情名為我法我法本空名為真諦三諦不一異不縱橫真中為理如水俗諦為事如波藏通二教僅詮真理以六凡為俗別圓二教正詮中理以十界為俗先於現前一念心性達三諦已則知一代教法或頓詮此心性或漸詮此心性或詮心性少分或詮心性全體不啻持一鑰開衆鎖也豈於千經萬論興望洋之歎哉其一般若非他現前一念心性而已心性本自豎窮橫遍故廣大妄認四大為自身相六塵緣影為自心相則狹小矣本自微妙寂絶故第一妄貪三界有漏因果二乘偏真因果則下劣矣本自生佛體同故常亦名愛攝妄計內外彼此不同則厭怠矣本離我法二執故不顛倒亦名正智妄計我人衆生壽者諸相則顛倒矣然雖迷此心性為狹小下劣厭怠顛倒如水成冰實廣大第一愛攝正智之體依然如故毫無缺減如冰之溼性仍即水之溼性苟遇暖緣未有不應念成水者也故善學般若菩薩莫貴觀察現前一念心之實性此心體本離過絶非不墮諸數至尊至貴名實相般若譬如金剛為無價寶此心覓之了不可得靈明洞徹泛應曲當名觀照般若譬如金剛堅利不壞此心炳現根身器界百界千如森羅昭布名文字般若譬如金剛普雨衆寶秖此一心即三般若三世諸佛不能增一絲毫蜎飛蠕動不能減一絲毫但迷之舉體為惑業苦三障悟之舉體為般若解脫法身三德三德如水外無冰故云三千果成咸稱常樂三障如冰外無水故云三千在理同名無明如此達得則但有泮冰法別無覓水法有去翳法無與明法但願空諸所有切勿實諸所無所以熾然諸惡莫作衆善奉行乃至布施持戒忍辱精進修行五悔習學諸禪廣學多聞研究法義皆泮冰去翳空諸所有至冰執盡消幻翳盡去所有盡空適復本有一念心性之全體大用而別無心外一法可得故曰入於如來妙莊嚴海圓滿菩提歸無所得又曰以無我人衆生壽者修一切善法即得阿耨多羅三藐三菩提又曰法法皆通法法皆備而無一法可得名最上乘此即金剛正印佛祖傳心要訣也三藏十二部千七百公案乃至天台三大五小皆發明此理而已此理不明徒學佛法徒參公案竟有何益此理既明一切宗教皆吾心注腳豈異説所能簧鼓以此圓解淨除無始妄惑種子若觀行淨則同居土淨相似淨方便土淨分證淨實報土淨究竟淨寂光土淨故曰隨其心淨則佛土淨當知華藏莊嚴無邊剎海皆我淨心所感依報皆第八識所現相分豈別有心外之土又豈別有土外之心也示戒心欲使悲智恆得相應必須諦觀現前一念此一念心不在內外中間不在去來現在非青黃赤白非長短方圓欲言其有毫無朕迹欲言其無不可斷滅三世諸佛所證證此也一切衆生所迷迷此也證時不增迷時不減故曰心佛衆生三無差別然證雖不增恆受法性真常之樂為求此樂故名為智迷雖不減枉受顛倒輪回之苦為拔此苦故名為悲非大智不運大悲非大悲不圓大智一念觀心即一念返迷歸悟念念觀心即念念返迷歸悟返迷是即智之悲歸悟是即悲之智即智之悲所以遊行四方即悲之智所以承事諸佛佛及衆生總不出我現前一念心性持戒者瑩治此也作福者莊嚴此也忍辱者體達此也精進者顯發此也坐禪者映徹此也看經者照了此也見佛菩薩善知識者印契此也立大願行盡未來際度脫有情者完滿此也觀一念心中十界假名而興與拔為平等生緣慈悲觀一念心中十界五陰而興與拔為平等法緣慈悲觀一念心中十界體性而興與拔為平等無緣慈悲一切時中觀心為主讀誦了義大乘而助顯之勤修種種福德而資發之勿令此心墮在無記不善境界勿貪世間文字詩詞而礙正法勿逐慳貪嫉妒我慢鄙覆習氣而自毀傷日新其德以詣於成一生如此則生生亦復如是得生淨土永無退轉百劫千生大事因緣只在現前一念此念若正無不是正此念若邪無不是邪也示吳景文無法不從心造無法不即心具識取自心佛祖道盡矣心造者即理恆事也心具者即事恆理也即理而事謂之百法即事而理謂之大乘百法是理家之事全事即理故云一切法無我無我即二空真如欲不謂之大乘不可得也大乘是事家之理全理成事故以止觀所依等五番建立攝盡三千性相百界千如欲不謂之百法不可得也故欲透唯識玄關須善台衡宗旨欲得台衡心髓須從唯識入門未有日用尋常分劑頭數尚未了了分明而漫擬玄妙者法華諸法如是相如是性乃至如是本末究竟等相最在初以其攬而可別故也設現前心起之相尚不知是王是所是善不善有覆無覆於三量中為是何量於三境中為緣何境彼若性若體乃至果報何由洞然明白設於事造一界十如尚未能了又何由即事造而達理具之百界千如又何由即事造之理具遂洞照了達即理具之事造百界千如嗚呼台衡心法不明久矣彼蓋不知智者淨名疏純引天親釋義故也疏流高麗莫釋世疑而南嶽大乘止觀亦約八識辨修證門正謂捨現前王所別無所觀之境所觀既無能觀安寄辨境方可修行止觀是台衡真正血脈不同他宗泛論玄微法爾之法道不可離彼拒法相於山外不知會百川歸大海者誤也示如母道不在文字亦不在離文字執文字為道講師所以有説食數寶之譏也執離文字為道禪士所以有暗證生盲之禍也達磨大師以心傳心必藉楞伽為印誠恐離經一字即同魔説智者大師九旬談妙隨處結歸止觀誠恐依文解義反成佛冤少室天台本無兩致後世禪既謗教教亦謗禪良可悲矣豫二十三歲即苦志參禪今輒自稱私淑天台者深痛我禪門之病非台宗不能救耳奈何台家子孫猶固拒我禪宗豈智者大師本意哉憾豫為虛名所纍力用未充不能徹救兩家之失但所得名字位中圓融佛眼的可考古佛不謬俟百世不惑願如母但學豫解勿學豫之早為人師庶法門有賴乎示用晦二則弟之從豫遊啓之者松蘿令師成之者如母乃兄也令師謂弟堪作法廈一椽蓋謙詞也亦實語也然材之大小何可定雖有大木匠人斫而小之則不勝其任矣拱把之桐梓能善養之則漸成合抱矣今天下之匠未有不以名利斫人者也汝固能不受其斫所以善自養者不可不急講也曾子曰士不可以不弘毅任重而道遠夫法界含生為己任任乃重矣盡未來際無已時時乃遠矣任雖重不可他諉也時雖遠不可中止也知不可諉不期弘而自弘知不可止不期毅而自毅以此自養雖天魔外道不能斫令小也陰涼大樹深為弟望之其一法身之性本無差別佛異衆生修德有功而已修德亦皆性具衆生日用不知者癡愛異見為之障也欲彰修德莫先除障修德有二一般若二解脫欲證般若須勤聞思修三慧欲證解脫須勤施戒心三福施除貧乏得大助道戒除垢染成就法器心除散亂能引實慧所以福慧二輪不可暫廢廢則法身流轉五道名曰衆生矣嗚呼末世求真修福慧者厥唯艱哉或師心任意或縱恣宿習或精勤不得其門唐捐苦行或知路不肯舉足坐待日暮或甫欲入路外魔內障順逆境緣紛紛競作有志不展可痛哭流涕者不止一二事也彼發心不真正志願不遠大誓力不勇猛者俱不足論且如朽人二十四歲出家父未葬母乏養毅然剃髮染衣作務雲棲坐禪雙徑住靜天台心真正志遠大誓勇猛將出家先發三願一未證無生法忍不收徒衆二不登高座三寧凍餓死不誦經禮懺及化緣以資身口又發三拌拌得餓死拌得凍死拌與人欺死終不出一言理是非競得失何況有報怨復仇之事故數年行腳不敢亂走一步輕發一言動大衆念頭特因少年稍通文墨未幾為道友所逼輒為商究佛法遂致虛名日彰於三願中違卻不高座願又因初出家時急要工夫成片不曾依剃度師作務三年之訓始意工夫成片仍可作務豈料虛名所誤竟無處可討務單一蹉百蹉福輪欠缺三十年來自利既不究竟利他又無所成雖種種著述僅與天下後世結般若緣而重興正法之志付諸無可奈何矣豈不大可慟哉汝志兼修福甚慊豫願但汝資雖穎質雖誠志雖正而稟氣柔弱短於人情世故既柔弱短智莫若一筆句倒作一癡呆漢好若不能涉入又不能句倒反多一種不覺福慧俱受傷矣孔子謂邦家必達者貴質直好義察言觀色此雙修二輪之祕訣也夫質直者正念真如也好義者樂集功德也二者皆以察言觀色為進修方便蓋修此二輪必須親近知識儒所謂親仁也必須隨順衆生儒所謂泛愛衆也夫親愛之道非察言觀色則我法熾然我法熾然不唯不能升堂入室竭力盡誠恐不至深獲戾於仁衆不止良由智光未露則福德全傷福德全傷則智種滅沒是修惑業非修福慧也汝欲修此觀察妙法請從一筆句倒始內不見有我則我無能外不見有人則人無過一味癡呆深自慚愧劣智慢心痛自改革逮積福多善根淳厚只此癡呆漢子卻能如水之隨處流行泛應曲當若坐立去來悉不逆前人意如須菩提是相似癡呆亦相似察言觀色若觀十法界衆生稱汝名者之音令彼前人悉得解脫如觀世音是分真癡呆亦分真察言觀色若外道婆羅門懷善惡心而來莫不悅可其意乃至隨緣赴感靡不周如釋迦牟尼則究竟癡呆亦究竟察言觀色身證二嚴號稱兩足邦家必達義極於此嗚呼鴛鴦繡出從君看不把金針度與人梓匠輪輿能與人規矩不能使人巧一箇荔枝殼剝了核去了放在你口裏只代咽不得用晦其深思之示明記佛法衰由出家人見地不明見不明又由因地不真使發心真為生死大事定知三界生死無不是苦既知三界總是苦諦決不起三界內心是謂斷集知苦斷集之智便是道諦更無二道修道永斷苦集便是滅諦更無他滅自苦如此他苦亦然故發誓云衆生無邊誓願度自集應斷他亦然故發誓云煩惱無盡誓願斷自須修道他亦然故發誓云法門無量誓願學自期證滅他亦然故發誓云佛道無上誓願成此之謂因地真見地自明白也今人不然才説為生死便置法門於度外惟思獨善才説為法門便置生死於度外惟競世情夫思獨善者不失為人天二乘種子競世情者鮮不墮修羅魔外窠臼撑法門者益多而正法益壞可勝悼哉豫別無長處但深知菩提大心決與為生死心不二今特為汝徹底道破能信此語則念念與四諦四弘相應矣示馬太昭豫向拈周易禪解信無十一疑逾十九嗟嗟我誠過矣然察疑者之情謂儒自儒佛自佛欲明佛理佛經可解何亂我儒宗易果有禪乎四大聖人豈無知者易果無禪乎爾何人斯敢肆異説噫豫是以笑而不答也昔陸象山始疑天地何所窮際逮豁悟後不過曰東海有聖人出焉此心同也此理同也南西北海有聖人出焉此心此理亦莫不然更不復談及天地豈非以無窮無盡之天地總不出此心此理故不復生有邊無邊諸戲論哉易曰範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體夫易既範圍曲成矣何無體既無體矣以何物範圍天地曲成萬物噫試深思之可謂易無禪邪可謂聖人不知禪邪且聖人明言陰陽不測之謂神又言神無方矣後儒必以乾陽配天配君坤陰配地配臣則廣八卦所云乾為寒為冰為瘠馬等坤為吝嗇為文為黑等果何謂邪聖人明言易無體矣後儒必以易定是易尚不可推諸詩書禮樂況可推三寶四諦十二因緣六度萬行是四聖之心邪非四聖之心邪至動莫若乾晝反奇恐動或非動也至靜莫若坤晝反偶恐靜或非靜也艮山兌澤皆不動之物也何得稱咸也巽風震雷皆不停之象也何反稱恆也坎中男也何水至冷也離中女也何火至熱也水降滅火也火然竭水也何以稱既濟也水潤得所也火炎上而順性也何以稱未濟也故曰不可為典要惟變所適胡後儒之執為典要不知變通也馬太昭自幼留心易學獨不以先入之言為主客冬聞台宗一切皆權一切皆實一切皆亦權亦實一切皆非權非實之語方知周易亦權亦實亦兼權實亦非權實又聞現前一念心性不變隨緣隨緣不變之妙方知不易之為變易變易之終不易夫所謂不易者惟無方無體故耳使有方有體則是器非道何名神何名易哉又不達無方無體不惟陰陽是器太極亦器也苟達無方無體不惟太極非器陰陽乃至萬物亦非器也周子曰太極本無極也亦可曰陽本無陽也陰本無陰也八卦本無卦也六爻本無爻也故曰陰陽不測之謂神也陰陽設有方體安得名不測也論云諸法無自性無他性無共性無無因性無性亦無性無性之性乃名諸法實性噫此易邪禪邪亦易亦禪邪非易非禪邪居士必能默識之矣示六正戒者佛身律者佛行禪者佛心教者佛語有身行無心語木偶傀儡而已有心無身語無主孤魂而已有語無身心風鳴谷響而已又有身心無語嬰孩孺子而已有身語無心鸚鵡百舌而已有心語無身行癩人賣藥而已由是觀之三宗果可分乎然自行斷不可分化他又不必合迦葉未嘗不持戒精嚴博通佛法也以禪名阿難未嘗不深證六通嚴持妙戒也以教名優波離未嘗不廣解佛法深入禪思也以律名又此土律師如曇無讖等何嘗不備禪教法師如智者荊溪清涼等何嘗不備禪律禪師如六祖南嶽百丈溈山等何嘗不備教律末世不求其實求其名識短智暗志小慮近既乏大菩提種又無真實為生死心一味隨波逐浪爭趨百年活計做成一律師法師宗師哄愚夫愚婦禮拜供養苟且混過此生豈復思有塵劫大事其根稍利者欲遍襲禪教律皮膚糟粕妄謂能集大成殊不知為三教帽子反不如專一法者尚有小受用也嗚呼欲速則不達見小利則大事不成人之患在好為人師眼前名聞利養不啻白駒過隙乃不能全體放下深求出要欺人只成自欺吾所以目不忍見耳不忍聞惟畢命深山早生淨土耳六正數千里來求示三學不一不異之旨必已知生死大事的確可痛律師法師禪師虛名的確不出生死反增長生死從此便應埋頭苦志力學三法一一徹其源底勿更覆時轍哉示清源乙酉紫竹林顓愚大師遣七人來學清源容闍梨而為上首丙戌顓師逝庚寅紫竹林萬白公去世命延清源繼主戒場僧使捧緇素簡至靈峰跪懇豫亦勸駕清源痛哭辭欲作他方萍梗豫及僧使並鑒其誠不敢強嗚呼近世輕薄少年毫無實德好為人師稱律主法主宗主者遍域中誑彼生盲以耳為目如清源識法者懼豈初生牛犢所能企哉清源充此不敢謬為人師一念養至極純粹俾三學圓明萬行具足發菩提心者以未來際為一剎那豈似短見人惟圖眼前活計將來三塗劇苦一總不顧不亦大可哀哉成佛作祖墮坑落塹所爭只一念間故儒云人心惟危道心惟微惟聖罔念作狂惟狂克念作聖欲知舜與跖之分無他利與善之間也所以一般受戒學律聽教看經參宗坐禪但夾帶利名心便是三塗種子但執著取相便是人天魔外種子但一味出離生死便是二乘種子但具真實自覺覺他心便是菩薩種子但從自覺聖趣光明發輝徹其源底共回向淨土普與衆生同登極樂便是無上菩提種子故曰一切法正一切法邪清源信此但向現前一念討取禪教律源頭不墮今時禪教律流弊亦不因咽廢飯妄掃禪教律法門則不負顓師命汝從豫遊之盛心矣示九牧法主台宗云研真斷惑名之為學真窮惑盡名為無學儒者云學問之道無他求其放心而已心者覓之了不可得而非無豎窮橫遍而非有本離四句如何可放本無可放如何可求以不達離過絶非之體妄認緣影或肉團為心如認一浮漚棄百千大海名之為放若能四性四運推簡此心觀其無生無住名之為求是故無生無住之體究竟現前乃名真窮肉團緣影之執究竟蕩盡乃名惑盡未登佛地皆名學人學不求心徒增虛妄千經萬論少室天台真實指歸唯此一事而已觀此者名觀不思議境發此者名發真菩提心安此者名安圓頓止觀但向此中破一切惑即塞成通自然道品調適事理悉備不被名利所牽得少為足自當心心流入薩婆若海也示吳允平佛祖心印超情離見不落窠臼謂之向上一著可心思擬議道理湊泊是向下非向上矣般若如大火聚四邊皆不可觸觸則被燒分明不離教乘教乘決收不得故名教外別傳夫如來聖教尚收不得世間典籍可比況邪堪嗟末季正見衰微每有竊據祖位妄稱知識者敢於訶詆佛言偏欲牽合儒典其詆佛言是諸侯惡王制害已而去其籍也其牽儒典是儀衍投時君之好而以順為正也不思達磨以楞伽印心五祖以金剛印心安公讀楞嚴悟道普菴閲華嚴合論悟道則佛言豈可詆乎無心猶隔一重關儒乃妄認六塵緣影為心謂有存有亡有在不在何啻迷頭認影則世典可牽合乎欲了當大事須真參實悟徹底打破情識意見道理窠臼如大死再蘇相似又將了義大乘一一印過始不墮邪曲蹊徑也示吳劬菴五戒即五常不殺即仁不盜即義不邪淫即禮不妄言即信不飲酒即智所以在天為五星在地為五嶽在時為五行在人為五臟天有五星地有五嶽時有五行方生育萬物人有五臟方成立色體然五常秪能為世間聖賢維世正法而五戒則超生脫死乃至成就無上菩提以儒門但總明戒相未的確全示戒體故也何名戒體謂吾人現前一念良知之心覺了不迷為佛寶佛者覺也儒亦云明明德而未知明德即現前一念本覺之體明明德即現前一念始覺之智依於本覺而有始覺以此始覺契乎本覺始本不二名究竟覺故此心性即佛也吾人現前一念所知之境為法寶儒亦云範圍天地曲成萬物而未顯言內而根身種子外而山河國土天地虛空乃至百界千如種種差別皆是現前一念所現故此心相盡名法也如此心外無境境外無心於其中間無是非是心境和合從來不二名和合僧也儒亦云萬物皆備於我而未了物我同源故此三義皆未的確況圓顯無剩哉十方三世一切常住諸佛無不徹證我一心三寶而成正覺所説一切常住法藏無不詮顯我一心三寶而成真軌所化一切常住聖賢無不觀察我一心三寶而成二利一心是理常住是事一心是性常住是修性修不二理事不二三寶圓顯的示知歸一心既彰五戒斯具所謂現前一念能緣一切正報而悲愍仁慈即是佛所緣之正報即是法心境不二即僧故不殺方為歸依三寶也現前一念能緣一切依正而奉公守義即佛所緣之依正即法心境不二即僧故不盜方為歸依三寶也現前一念能緣一切正報而清心寡欲即佛所緣即法不二即僧故不邪淫方為歸依三寶也現前一念能緣一切正報而誠實無妄即佛所緣即法不二即僧故不妄語方為歸依三寶也現前一念能緣一切旨酒深恐昏迷即佛所緣酒即法不二即僧故不飲酒方為歸依三寶也若以歸望戒三歸為能持五戒為所持若以戒望歸三寶為所歸五戒為能歸念念之間圓顯法身向上如如不動則端拱太平若動著則禍生不測矣蕅益道人已為劬菴徹底拈示了也還信否信則穩步歸舍疑則一任別參
