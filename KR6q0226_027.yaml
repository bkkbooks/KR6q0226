body:
  text: 疏二募造敬字菴疏娑婆世界以音聲語言為教體故一一文字皆佛祖慧命聖學源流所關也敬字即敬文宣至聖與迦文世尊其開昏憒而培智種者豈淺鮮哉溫陵為文獻之邦素稱佛國今者有敬字菴之設此洙泗道源所濬亦西竺心光所映也人皆可以為堯舜凡有心者皆得作佛請從事於斯語則凡點畫紙墨之委棄者皆可見堯於牆見佛於瓦礫矣抑更有告焉一切字紙斷斷可與六經三藏同觀而六經三藏斷斷不可與一切字紙同視菴成請勒斯語淨然沙彌化念佛疏經云一稱南無佛皆已成佛道此言正因佛性人人本具故稱性所起緣了二因必與正因同得究竟也是以念佛三昧名為三昧中王普攝一切三昧修此三昧凡有三種一者惟念他佛二者惟念自佛三者自他俱念修雖有三成功則一一念他佛者托阿彌陀佛果德莊嚴為我所念之境專心注意而憶念之或憶名號或想相好或緣四十八願往昔洪因或思力無畏等現在勝德或觀正報或觀依報總名為念他佛貴在歷歷分明一心不亂則三昧功成徑登淨域如東林諸上善人即其證也二念自佛者觀此現前一念介爾之心無體無性橫遍豎窮離過絕非不可思議具足百界千如種種性相與三世佛平等無二如此觀察功深力到圓伏五住淨於六根豁破無明頓入祕藏如西天四七東土六祖及南嶽大師天台智者即其證也三自他俱念者了知心佛眾生三無差別眾生是諸佛心內眾生諸佛是眾生心內諸佛托彼果上依正顯我自心理智如觀經云是心作佛是心是佛由我心性本具功德不可思議諸佛果中威力不可思議故感應道交自他不隔極果圓因稱理映發如永明壽楚石琦所修法門即其證也方便多門歸元無二隨行一轍俱得到家切勿疑慮自隔要津今淨然沙彌棲心淨土兼以此法廣化有緣當知只此一念便可作大勢至法王子眷屬慎無自輕自屈更願見者聞者深心隨喜共登蓮籍亦慎無自藐藐他庶幾同圓種智而五濁可空也勉之哉忍草沙彌化念佛疏彌陀如來以四十八願攝化十方勢至大士以念佛三昧遊此世界當知末世眾生捨淨土一門而求脫生死不可得矣佛法無多子久常難得人一時勇猛不若終身無倦所以慈雲大師示晨朝十念法門飛錫尊者闡一念得生妙旨今忍草沙彌發心普勸緇素修此念佛三昧每日從十萬起以至一百或惟十聲下至日念一聲不拘數之多寡但以終身不閒斷為則將此饑餐渴飲工夫用作寶地珍池左券儻能一念中頓破無明便超寂光淨土頓斷塵沙便超實報淨土頓斷見思便超方便淨土縱未斷惑五濁漸澄佛光漸露登同居淨土永脫輪迴固無惑矣普願見者聞者於此便作東林勝會想於一切登名蓮簿者便作十八高賢想則一心普念三世佛而念佛三昧了了現前矣建盂蘭盆會疏予觀世出世至德要道皆無有勝於孝慈者也世閒非孝慈無以成聖賢出世非孝慈無以作佛祖顧孝慈之名一耳實則有四焉養父母育子孫令皆得歡喜者世界悉檀也前可繼後可傳令皆得生善者為人悉檀也順幾諫嚴庭訓令皆得滅惡者對治悉檀也底豫允若佑啟咸正令皆得入理者第一義悉檀也又一世之父母固然矣推而極之不有無始以來歷劫生身之重恩乎一家之子孫固然矣擴而充之不曰法界含靈皆猶吾赤子乎是以儒者且盡其道於目前佛氏并充其致於累劫儒者且舉其端於宇內佛氏并窮其量於剎海儒非故為拘虛而佛非故為荒誕也儒者引而不發以示厥始佛氏充無不盡以究其終不啻如金聲玉振焉所以自大法東漸千有餘載達人高士罔不會心至若昌黎晦菴輩雖極力詆之於前不免傾心味之於後良以孝慈宗旨終無閒然故也今七月十五日為大目犍連度母設供之辰夫目連果證應真六通第一而欲報慈恩尚須三寶眾僧之力況吾輩乎吾輩生匪空桑心非頑石念罔極之深恩懷終天之永慼自非托事盂蘭曷以略伸積悃所言盂蘭盆者此翻解倒懸器蓋冥塗之苦不啻倒懸今以淨器備陳佳供能令劇苦永脫故也凡厥孝子慈孫慎勿徒為大言以自飾曰吾父吾祖靈應在天何當久滯三塗咦難言之矣既未聞出世四諦法門又未必遵行三歸五戒十善輪迴之苦誰能免者儻於此日懸懸致望子若孫之福濟而竟置之漠然於心安乎且經又言之矣若父母現在者福樂百年若七世父母自在化生入天華光此則功德利益又不止於僅解倒懸而已仁人君子宜何如努力以共成斯會也詩曰孝子不匱永錫爾類吾甚為儒之希聖賢釋之希佛祖者望之敷先開士守龕助緣疏有世閒孝道有出世孝道世閒之孝就養無方立身行道是已出世之孝精修道業廣度累劫是已至世出世孝兩擅其美如黃梅睦州者殆不多得今於敷先開士見之開士青山名族世習東魯禮樂方壯之年發心學佛遍遊真寂博山之門以法力願力勸其乃尊長齋修道躬奉甘旨二寒暑又勸以圓現僧相幾一載而西逝蓋年已八十六矣仍停龕虎丘麓日夕梵唄將以愧天下之為人子而不孝者并一洗佛門無父之冤噫惟學佛然後知儒亦惟真儒乃能學佛不肖出家父未葬母未養本圖大事既明然後作織屨計而夙障深重致令慈母捨我西馳終天之憾寤寐永歎開士獨能生盡其養死盡其誠旭也真愧死無地矣方外雲蹤不能稍助薪水聊贅空言遍為仁人孝子宣此至情其有喜心樂助俾開士完此一段最後孝思亦錫類弘慈也善生開士飯僧功德疏買死馬頭則千里之馬至飯尋常僧則三乘聖僧格此必然之理無足怪者世人妄生分別競欲捨凡取聖而郭永定居士知凡聖一體自發心飯萬僧復化人飯萬僧非自行檀施不足轉化他人非廣化結緣不足滿自願力可以勸矣重修觀音菴疏普門示現無剎不是全身何成何壞須知示壞示成皆與吾人作增上緣耳苟向大士施一文一粒譬如投滴水於大海頓同海體盡未來時決不消竭茲者躬逢大慈悲父借大板巷傾頹之古觀音菴為說法處借恆元開士為說法人恆元深達此妙借法門又借予代為普門說法予謂恆元曰有助此嘉猷者弗問多少汝悉與授阿耨多羅三藐三菩提記可矣大悲圓行疏觀音大士與娑婆最有因緣而大悲陀羅尼尤為密傳心印祕要法門蓋以不思議心持不思議語則不思議熏不思議變真如螟蛉咒子不覺其肖之速也顧此咒自四明尊者設立行法後從元至明未嘗絕倡一傳於天台再傳入武林壇儀供具於斯為盛而法式理觀不免有字經三寫烏焉成馬之虞余向遊吳越每欲稍正其訛乃久誦水潦鶴者競嫌昏耄付諸永歎而已祖堂湛持開士思如法搆壇嚴像余喜此方緇素未染訛習猶可與正其始也爰贅片言使壇儀供具如法先成庶法式理觀次第畢舉如是則若顯若密若禪若教皆一以貫之矣結社修淨業兼閱華嚴大鈔助緣疏阿彌陀佛以法界藏身示成道於極樂則有四十八願廣攝群機毘盧遮那佛亦以法界藏身示成道於娑婆則有普賢十大願王導歸安養是故欲求生淨土須究華嚴宗欲識華嚴宗須求生淨土或笑曰華嚴事事無礙法界當處即常寂光何為捨此求彼邪應之曰既事事無礙即於此求彼又何礙也既當處即常寂光即西方亦常寂光也常寂光固無可捨無可求亦何礙捨何礙求如是捨寂光穢求寂光淨生則決定生去則實不去生則實不生去則決定去何礙之有其人罔措余曰汝若不會請問之毘盧遮那汝若不能見毘盧遮那請問之普賢願王汝若不能見普賢願王請向十字街頭合掌語諸人曰乞施我一文錢當必有告汝者矣募刻憨山大師全集疏此方之機以文字為教體故儒號文宣佛號迦文由性天垂文章文章可聞即性天可聞也由文章達性天性天不可聞即文章亦豈可聞哉佛法入支那漸事義解達磨初來直指人心見性成佛一洗文字習氣可謂灸病得穴然仍以楞伽印心文章性天未始判然為二明矣數傳後楞伽一經又復流為名相於是諸大宗匠競出手眼拯濟挽回之要皆超情離見解粘去縛破盡凡夫心識令與修多羅合而已未有敢違背佛語自張見幟者也流至今日五宗公案不幾又成名字學問乎惟吾憨翁大師乘夙願力本從西方再來始出長干發足行腳便有香象截流氣概後五臺雪裏絕後再甦沛若江湖落筆無滯憫末世無聞暗證既昧佛語亦失佛心故多有著述而法語詩文等四十二卷皆老人隨自意語尤多醒發人處法眷虛中繕寫成帙呈諸牧齋錢太史一無賴沙門冒從太史公處詒稿而去今高足某繼乃師志乞余一言轉白檀信余感師翁夢中接引深恩愧無以報爰涕泣書此廬山五乳峰法雲寺重造大殿疏華嚴經云若人欲了知三世一切佛應觀法界性一切惟心造蓋自無始以來直至盡未來際惟此一心無有一時一刻不造種種五陰造種種世閒造種種國土者也造而成也無所從來造而壞也無所至去可不謂惟心乎故世有達惟心者始可與商所造亦惟有善所造者始可與悟惟心耳今人局視此心曾不能知心外無法又復卑視事造曾不能知事外無理故語以莊嚴佛剎輒云不必著相嗟嗟相固不必著矣非相又安可著邪若達惟心則相即非相是心造殿是心是殿何著之有設不以其心造殿又將以其心造種種敝惡依正安得頃刻有不造時而造殿為佛界妙緣緣因若熟了因必發了因若發正因必彰方知造即非造回視枉此心力造餘雜業駕言無造終不免輪迴者豈可同年語哉匡廬五乳峰法雲寺日遂頹圮其徒某不離吾人心內創此良緣而吾為緇素之願造佛界不願造九界者告如此念荳兒佛疏雪山有藥名毘伽摩眼若見之眼得清淨鼻若嗅之鼻得清淨身若觸之身得安隱若以塗鼓軍中擊之所有毒箭應身拔出嗟嗟一莖草耳何以厥功若此愚者未免疑之阿彌陀佛萬德尊主因積僧祇果圓十劫願王無盡福慧無窮散心一稱其名亦滅八十億劫生死重罪彼疑一莖草者又安能深信無惑哉有念佛者不紀以珠紀以荳又將荳供海眾使其淪肌膚浹骨髓乃至遍身毛孔咸放佛光八萬四千戶蟲咸得度脫此之功德難議難思念荳施荳功德平等荳為法界十方諸佛三世導師皆在一粒荳上轉大法輪現寶王剎此荳邪非荳邪非荳非非荳邪能信此一粒荳者可以無疑於一莖草矣重說偈曰此荳泥丸突出難分剖非荳咽下分明無處躲非荳非非荳大家傾出摩竭斗金陵三教祠重勸施棺疏三教深淺未暇辯也而仁民愛物之心則同夫仁愛非外鑠也行於荒原曠澤見骸體縱橫枯骨狼藉未有不怵惕惻隱者充惻隱之心仁不可勝用儒以之保民道以之不疵癘於物釋以之度盡眾生如不龜手藥所用有大小耳故吾謂求道者求之三教不若求於自心自心者三教之源三教皆從此心施設苟無自心三教俱無苟昧自心三教俱昧苟知此心而擴充之何患三教不總歸陶鑄也哉心足以陶鑄三教乃名能盡其性亦能盡人物之性盡人物之性乃知民不止吾胞物不止吾與是故一民饑我之饑也一民寒我之寒也一枯骨未葬我未葬也合天下之苦以為己苦合天下之善以為己善故莫大乎與人為善俾一滴善同歸至善海中無分劑無窮盡斯可與言盡性之道也已金陵三教祠自癸亥倡施棺主其事者為了玄大德二十年施三萬餘具了玄去世兼值變更事遂寢今流離煢獨倍於昔時狐狸蠅蚋遍於野壑仁人君子急議續行亦此心萬不容己者而吾因得引其說而申之昔孟子謂孝子掩親誠是然仁人過之雖非親友顙亦必泚視亦必睨當知一切有情本來同體是名一本然則視父母同路人者惡之至也薄之極也視路人同父母者善之大也慈之厚也一人善致天下祥一念慈回宇宙泰況合眾善為善普眾慈為慈功德可思議哉昔天帝與阿修羅戰乍勝乍退者再由世有一人欲作善事輒欲止者再故也或問予曰匹夫一念進退何遂關天帝勝負予曰如天平兩處各二十兩儻以一分益彼一處彼則偏重矣故曰天下者天下之天下又曰以身觀身以天下觀天下今各捐分文銖兩俾澤及枯骨觀身觀天下胥在此已水陸大齋疏佛祖統紀云梁武帝夢神僧告曰六道四生受苦無量何不作水陸大齋拔濟之帝問沙門無知者唯誌公勸廣尋經論必有因緣帝即遣迎大藏積日披覽創立儀文三年而成乃建道場於夜分親捧儀文悉停燈燭而白佛言若理協聖凡願拜起燈燭自明或體式未詳燈暗如故言訖一禮燈燭皆明再禮宮殿震三禮天雨華天監四年二月十五日就金山寺修設帝臨地席詔祐律師宣文當時靈響不能備錄周隋之際此儀不行至唐咸亨中西京法海寺英禪師夢泰山府君請往說法獨坐方丈見異人前告曰向於泰山府君處竊睹尊容世有水陸大齋可益幽品文是梁武所集今大覺寺吳僧義濟得之願師往求如法修設師尋詣大覺果得其文遂於月望修齋齋畢向之異人與徒屬十數來謝曰弟子秦莊襄王也又指其徒曰此范睢穰侯白起王翦張儀陳軫皆秦臣也咸坐本罪囚幽陰府昔梁武金山設會前代紂王之臣皆得脫免弟子是時亦暫息苦以獄情未決未獲脫今弟子與此輩并列國君臣皆承法力得生人閒言訖而隱自是英公常設此齋流行天下至有宋咸淳年閒有謂金山越王疏旨專為平昔仕宦報效君親未見平等修供之意力挽志磐法師續成新儀六卷繪像二十六軸自宋至明又歷五百餘歲雲棲大師依此儀稍事改削行之古杭智旭曾於雲棲躬逢盛舉見其壇法精嚴事理備明羅十法界於一堂運三觀心於剎海真不思議功德也丙戌遊金山索彼儀文觀之汗漫糢糊不可尋究蓋由磐公較定後行於四明世稱南水陸而金山舊儀被宋元以來世諦住持附會添雜但事熱鬧用供流俗士女耳目世稱為北水陸也雲棲大師具擇法眼故不從北從南每設供結界密護除主壇一人表白二人齋主一人香燈五人外餘人例於幙外瞻禮不得入內壇壇內人出入必皆易衣澡浴所以得名如法供養不似諸方濫張聖像任男女雜沓遊觀致使飲酒食肉吞煙噉蒜之人皆得熏薉尊儀也新都鄭千里長公完德三藏殿主人七淨新都楊長公江寧陳旻昭欈李譚埽菴欲令此法重得流通津度靡極顧此法源流惟旭頗能考知其詳敢僭述緣起為賢達告
