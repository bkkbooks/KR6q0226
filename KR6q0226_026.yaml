body:
  text: 疏一化持滅定業真言一世界數莊嚴地藏聖像疏釋迦佛謂定業不可救所以寒造罪之心地藏菩薩說滅定業真言所以慰窮途之客旭少習東魯每謗西乾承觀音大士感觸攝受後聞地藏本願尊經始發大心誓空九界今得與僧倫染神乘戒皆慈願冥加不可誣也爰念娑婆斃惡惑業苦三如惡叉聚無上醍醐悉成毒藥持律者唯事衣鉢作犯止持茫無所曉習教者唯事口耳禪那理觀瞀無所得參宗者流入機境播弄精魂心佛真源毫無親證淨土一門稍切時機亦苦多成退托未合不思議大乘良由業重障深濁智流轉雖有聖者末如何也唯地藏慈尊悲深願重專愍剛強尚能轉我當年殷厚邪心使得正信出家豈難轉大地衆生無知過犯使歸真際乎故於三寶前發心欲造萬佛銅殿中供大士永鎮九華爰受一食法結百日壇持滅定業真言五百萬又化大心緇素或持十萬或百千萬共成十萬萬表三千大千世界數以其總數供大士像中作盡未來廣化十方左券云造毗盧佛像疏世人侈談無相理不達實相印謬以豁達空為清淨法身誰知微妙淨法身具相三十二托事表法華藏玄門此所以末法時以造佛形像為第一功德也莊嚴土木即莊嚴法身十身相海全在一微塵裏是故一塵之施可以入如來無盡相好光明而一瞻一禮可以證如來無邊功德海藏某開士既欲塑毗盧像但作如是觀不患助緣無人諸上善設欲悟如是理但種此緣因不患正因不顯此緣若就此觀若成方信毗盧遮那佛願力周沙界熾然說法無有閒歇也寫書本大藏疏爰自法流東土綿延千五百餘年三藏所攝幾七千軸巍巍乎雪山王衆藥皆備浩浩乎大海水衆寶悉充健步者不能躋其巔善遊者不能測其量又奚怪仰視而足心酸澀望洋而驚怖無極者哉然普賢行願品云書寫經卷積如須彌夫過量事唯過量人能辦耳說者曰佛法無多子何用此一落索為咄無離文字說解脫也果薦無多子佛法一大藏亦豈屬多否即令不識一丁正自落索不少當知多少有無俱是虛妄分別嘗慨習教者置向上於罔聞坐禪者撥佛法為外物何異療饑畫餅之楚北轅邪龍居月心開士於此事已信得及自謂根性駑劣機緣未偶乃以持戒為要行淨土為指歸并欲悉書一大藏教為助緣此真今時不思議事也學禪不毀戒是今第一不思議又不非淨土是今第二不思議又不掃教是今第三不思議又大藏閲者罕竟何況能書是尤古今大不思議也如是發心已入過量人數當見一錙一銖莊嚴法海即檀度而為般若是名不思議檀一點一畫悟入真源即書寫而為修證是名不思議書如是若檀若書本因果報同入不思議解脫境界而余以數量人言此過量事亦復不可思議也刺血書華嚴經疏豫讀華嚴至善財見普賢一毛孔中悉有微塵數佛剎海會圍繞遊歷經微塵劫終無有盡抑何身相之不思議也及普賢自述願王則云剝皮為紙刺血為墨以髓為水析骨為筆書寫經卷積如須彌故知非殊勝大行無以嚴毗盧法界非一乘妙法無以圓廣大願王苟於一乘妙法深心信解依解起行當知華藏莊嚴豈唯在普賢一毛孔中明見亦即於吾人介爾心內薦取此月心開士所以矢志刺血書寫也八十一卷可八月奏成於中若紙筆若香若莊嚴成就若飲食供饌須十三金表此世界適當第十三重也每金作十緣表十界也每緣作十分表十願也一一願咸攝十界一一界總周剎海俾施者受者互融於帝網光明而若法若財交映於雜華瓔珞永慶寺平治道塗疏持地菩薩平地待佛佛摩頂謂之曰善男子當平心地則世界自平此為事度人示唯心法門令因事入理也唯茲事理二塗混不類分不開以平地之法平心一切唯心以平心之法平地一切唯地唯心雖妙猶待於粗唯地之妙始稱絶待且如永慶山前一條大路本來坦坦何須更平然高下之見未忘斯平治之功可效功雖有作行實無為行積於無量劫波心開於一言摩頂因該果徹唯是一乘儻離地談心心復烏有畫空作繪非圓頓乘是役也一磚一礫同證究竟寂光一兩一銖悉入首楞三昧靈巖寺請藏經疏一切如來從無言說道方便說法一切菩薩從語言三昧悟入無言言說性空是真解脫若離文求理即暗證癡禪非正法眼藏也豫本棄儒學佛亦妄謂單傳之道實出教外一味作蒲團活計一切經論置諸高閣後見真寂博山等耆宿反照古今得失方知末世禪病正坐無知無解非關多學多聞與唐宋學人厥證相反依文解義三世佛冤離經一字即同魔說善知識語誠不我欺學而不思則罔思而不學則殆儒宗實語亦於此益信乃發心遍閲大藏備採衆藥自療療他適欲先注梵網提律學綱宗以鬮問佛定安居處乃九鬮中獨得靈峰山靈巖寺之百福院擬於此一年注經仍向他方完閲藏初心有六具周沙彌捐資若干倡請大藏留豫久住雪航法主為集衆緣令此無佛法地忽作六種震動冤與魔而並遣罔與殆而雙袪佛印儒宗交蘆倚樹信心緇素誰不為之助喜也化念阿彌陀佛同生淨土疏自唯心本性之理不明學道者率尚玄理而薄事相甚至認斷空為寂光疑西方為非實相與判作權乘視同烏有於是不可思議功德終成難信之法長溺迷津可勝痛哉不知事理一致生佛同源八萬四千相好光明顯然在十萬億方即灼然居一真心內心既豎窮橫遍土亦豎窮橫遍佛亦豎窮橫遍既不信佛土之實又寧知心性非虛若真悟心性本源則了達十界染淨咸由一心心染故六趣升沈娑婆之惡境宛然心淨故一道清寧極樂之莊嚴法爾奈何於娑婆則見其有於極樂則惑其無又高稱圓頓哆談無礙以欣厭是迂塗取捨為兩橛然果悟圓宗欣厭何嘗不圓果證無礙取捨亦豈有礙必欲離淨土而談唯心捨彌陀而言本性橫隔自他割裂事理如實料簡僅成惡取空見豈若熾然存念決定求生了則念即無念生即無生不了亦無念之念無生之生以諸佛心內衆生念衆生心內諸佛不問智愚咸歸覺海一念相應一念佛念念相應念念佛佛是本覺念是始覺始本相合當下究竟能所歷然能所性絶至圓至頓真實無礙超越一切法門名為三昧中王此六方調御所以極力稱揚歷代祖師所以盡心修勸也勝超大德矢修淨業欲使大千衆生各各承當此事爰立大冊廣勸緇素或自念或轉請或以口讚或別冊襄自念則念念吻合佛性化人則人人頓會菩提用心善且廣矣特序之為同有佛性者告象巖禪人化齊十萬八千僧疏人但知佛法重不知僧之重也但知僧以佛法重不知佛法以僧重也無僧則法輪息法輪息斯佛慧命絶矣故較福田於末世無尚供僧也僧固不同有真實僧有清淨僧有啞羊僧有無慚僧夫真實名勝義清淨名世俗非勝義則世俗不尊非世俗則勝義無寄故應真大士地上菩薩每現身世俗中不但同修清淨亦且混跡無慚所以警肉眼凡夫令知僧相不可忽也是故為僧者應善自料簡誡無慚啞羊之行由清淨而進真修供僧者應一切恭承視啞羊無慚之儔如真實之偕淨侶然後觸目所遇罔非勝田職此之由感賢格聖儻心生分別雖供五百羅漢不如值一凡夫僧矣象巖開士欲置僧田百畝歷三祀未成因詢余所以難成之故豫為屈一指曰僧田置必代得善繼否非廢則私又為屈第二指曰一畝半畝人畏不前又為屈第三指曰菴田不遍十方狹且陋開士憬然曰然則當如何余曰莫若放開懷抱直下消豁普化若腴若瘠之人等供在彼在此之衆一文一粒總投勝田杜未來愚人私廢造業之愆開現在是人多寡隨心之善馴致之數奚止十萬八千地奚局江左浙右時奚限三載告完念念中普與法界含識供養法界僧寶盡未來際無有疲厭一一檀那一文一粒悉能遍供一切僧伽一一僧伽一齒一頰悉能遍受一切供養論施福洪纖無礙論受用凡聖交參只此現前日用的是普賢所行境界其諦信力行之募刻校正梵本諸大乘經疏竊觀初祖傳道楞伽印心五葉流芳金剛證悟蓋真能解脫文字者方為寂滅言辭也西來大意不明東土群兒失眼以魔說而擬解佛冤以不通而妄稱不立自他俱誤宗說兩傷嗟乎昔日欲豁醒沈酣秖貴點開生面今日欲力振時弊必須率由舊章譬如為聖為賢舍六經四書無準的成佛作祖唯大乘經典為司南顧法道陵夷淆訛匪一不但不能如教起修抑且不能善解義趣不但不能善解義趣抑且不能校正文言如梵網戒經僧徒傳誦而錯謬尤多金剛般若舉世受持而增損愈甚法門衰替有自來矣嗚呼末世行人根日鈍障日深空腹高心盲修瞎鍊既同夜郎之誚且落無聞之殃非具總持者校其差遲正其文義何以開發妙解策進真修也哉蓮洲居士覓此諸經校正善本手書重梓用廣流通誠希有良緣最勝法喜也大心緇素感深今昔者其蚤暮速成之化鐵地藏疏洪鐘具無邊音性一擊而頓徹鐵圍地藏圓同體大悲瞻禮而頓蒙與拔幽冥之覺悟可期現在之障緣宜轉靈峰心懷禮公既已鑄鐘打鐘復思是像作像雖丹青刻畫咸皆性同虛空而鍊就純鋼可表堅固不壞四德非塵藉一塵而圓顯三身無像即影像以妙彰寄語高賢共行檀施助鐵者如正因心發法身妙果可登助炭者如了因心發般若光明可悟助食用者如緣因心發解脫神通可基從大士而發其心正是全性起修由衆信而成此像正是全修在性如是事如是理如是因如是果真語實語諦思諦行五蘊禪人掩關化供給疏從古學人未有不撥草瞻風廣參博訪者未聞枯守一室能坐進此道也然具眼乃可參方力學方能具眼顧力學之法或決擇於師友或藉境以鍊心至若咿唔一室又力學之變局也五蘊禪人擬閉關習教律從關轉關在禪人決當由世界而忽悟對治之益因事成事在善信正可借外護而密操教授之權直待翻轉關捩子時方信自他功德皆不誣矣涵白關主禮懺持咒募長生供米疏迷真起妄誰不造業業有輕重果報隨之於中轉重令輕轉輕令盡獨賴有懺悔一門耳重業而能深悔業遂冰消輕罪而不革心終成定業故經歎二種健兒一不作罪二作已能悔不作罪固是穩當作而能悔悔力若深彌稱勇健三世諸佛始從名字初心極至等覺後際罔不以五悔為進修方便當知作法懺能滅業障取相懺能滅報障無生懺能滅煩惱障三障圓滅三德圓成三身圓顯直捷痛快所謂屠刀放下便成佛也涵白開士痛念前非善思補過擬掩關普為法界衆生改往修來當知甫發此心定業已轉豫為授大悲心咒行法并授地藏菩薩滅定業真言總為淨除根塵習氣種子之良藥勤行之六時不缺一心不亂則自度度他法皆具足勿憂助道乏緣也人誰不有無量業誰不欲與真實行人同入懺摩清淨海中隨喜一法無俟他人勸也玄素開士結茅修止觀助緣疏教觀之道不明天下無真釋如學思之致不講天下無真儒也儒之道在盡心知性故篤行一事必在學問思辨之終大易略思辨益以寬居寬居即思辨異名也以其心領神會故曰寬以居之以其善巧決擇故曰慎思明辨聖學淵源必須向此關透去方無鹵莽滅裂之虞佛道以見性明心為指歸以信行法行為方便信行秉教豈廢觀心法行觀心豈容離教是以西天諸祖無不貫通三藏深入諸禪南嶽天台弘通般若法華亦未嘗不以觀心為要目足並運入清涼池否則鑽他故紙終招說食數寶之譏冷坐蒲團未免暗證無聞之禍學不思則罔思不學則殆也法流東土門庭漸岐立法者本屬一時救病權宜展轉相傳遂成水火宗教相非性相相角台賢相排原其故則各是執其辭則並非而又教下之人罔思修證宗乘之士多落險塗致令行果無成教道幾熄惟台嶺一宗始從智者章安中歷荊溪四明諸老近復得妙峰幽溪諸大師相繼而興教觀雙舉信法兩被故能超賢首慈恩諸教之觀道寥寥亦勝曹洞臨濟等宗之教法貿貿東南一絲信可繫佛法九鼎於不墜末世津梁捨此安從邪玄素開士儒林雋雅忽悟無常頓從剃落依棲台嶺足不出幽溪之戶者數年抱病參求晨昏不廢學問思辨之功可稱弗得弗措者矣篤行一事今正是時擬遵如來顧命以頭陀行住阿蘭若但欲正修先須方便五緣之內四事為先是在有志為真儒者助成此真釋事業余每謂非真釋不足以治世是以一切三寶常能擁護世閒而真儒亦足以出世是以一切有道國王大臣長者居士常能憶持佛囑具正眼者必能深達此意知世閒福田有在矣刻占察行法助緣疏易曰積善之家必有餘慶積不善之家必有餘殃書曰惠迪吉從逆凶惟影響作善降之百祥作惡降之百殃因果報應之說未嘗不彰明較著於世閒也但儒就現世論未足盡愚者之疑情自釋典入支那備明三世果報益覺南宮所悟及孔子尚德之稱事理不誣然三藏權詮祇明因緣生法未直明因緣無性故云佛能轉一切業不能轉定業逮大乘會中始廣明格外深慈建勝異方便依萬法唯心緣生無性之理設取相無生二懺以通作法之窮然後罪無大小障無淺深依教行持悉堪消滅如赫日當空霜露頓收也昧者謂重罪許懺開造罪門蓋不惟罔識佛菩薩之弘慈亦豈知儒者之了義孔子曰過而不改是謂過矣憂悔吝者存乎介震無咎者存乎悔蓋明示人以自新之端矣夫罪有重輕事非一概世法不能治佛法治之作法不能治取相治之取相不能治無生治之則究竟離苦解脫之法不得不歸功佛門又不得不歸功觀音地藏諸大士也觀音應十方世界尤於五濁有緣地藏遊五濁娑婆尤於三塗悲重如父母等愛諸子而於幼者及無能者尤所鍾情此占察善惡業報經誠末世多障者之第一津梁也堅淨信菩薩殷勤致請釋迦牟尼佛珍重付囑三根普利四悉咸周無障不除無疑不破三種輪相全依理以成事故可即事達理二種觀道全即事而入理未嘗執理廢事又復詳陳懺法即取相即無生初無岐指開示稱名觀法身觀己身頓同一致乃至善安慰說種種巧便不違實理此二卷經已收括一代時教之大綱提挈性相禪宗之要領曲盡佛祖為人之婆心矣豫依經立懺程用九居士捐資并募善信助成之此正欲立立人欲達達人之極致也誰謂學佛非儒者分內事哉萬鉢緣疏一滴水耳龍得之為雲為霧普洽寰區其功果在水邪在龍邪抑非水與龍之功邪謂功在水則均此一滴胡遇曝炙而遂乾渴人飲之不潤其舌謂功在龍則置諸高原尚不免熱砂之痛宛轉之苦謂功不在龍與水胡二物相遇遂得相成龍既不可思議水亦不可思議噫此可悟法界妙理矣而更可喻修證要門蓋水猶福也龍猶慧也水龍之性即真如法性也儻水性非真如性本不能周遍法界者縱遇真龍豈能令其騰波湧浪儻龍性非真如性本不能神明出沒者縱遇真水豈能令其變化飛騰惟以稱性之龍御稱性之水龍靈而水亦靈以稱性之水得稱性之龍水妙而龍更妙福慧二塗亦復如是修福不修慧福則有漏有為有分劑有窮盡修慧不修福慧則無光無焰無力用無莊嚴惟以稱性之福資稱性之慧如得水之龍雖小亦不可欺稱性之慧作稱性之福如遇龍之水雖少亦不可盡而福慧二輪又以同一法性故皆不可思議儻一塵福聚不等法界胡能使二錢微供頓超匿王四十里燈儻一念真明不徹全體胡能使一放屠刀便預賢劫千佛大數是以修慧必須真莫類蛇虺之不能騰駕修福不須擇莫如海鱉之但誇水多然慧門嚴真僞之辨取捨貴精福門融大小之岐隨緣愈妙所以出家三學討究歸於師友日用四事供膳托於檀那師友必擇而後精檀那必等而後普欲行等慈誠莫若萬鉢緣之設矣人輸一鉢為力甚易集衆成萬為福甚多如一室中具足萬燈一一燈明各遍室內當知施一鉢者即已圓具萬鉢功德又況燈燈相續焰焰轉明熟食除暝功遍一切寧止萬鉢功德而已多亦法界少亦法界少法界故一鉢不必愧其薄多法界故無數鉢不宜見其奢古人云善人行善惟日不足華嚴云十大願王無厭無足請於此法性海中興大法雲注大法雨滴滴總歸大海莫問斯水何來亦莫問斯水何去矣蘊空精舍募建華嚴閣疏法流震旦經帙琳琅最富莫若華嚴最簡莫若心經究其指趣廣略互收如心經照見五蘊皆空一語人皆知之未審以何為照也若照以邪慧謂死後無相為空照以聲聞般若則六分推析覓我了不可得為空照以緣起般若則體虛無性如幻如夢為空照以不共般若則二邊叵得離過絶非為空惟照以甚深般若則色等諸法全即法界體絶纖塵量窮橫豎遍具遍含無障無礙為空依此修觀則法法隨心名觀自在塵塵圓具亦名普賢妙智融徹亦名文殊大慈普覆亦名彌勒法身真常亦名毗盧上中下三部華嚴一語可蔽巍巍寶閣煥乎在心目閒何俟謀諸土水邪然華嚴六相明宗不有壞之孰成之不有別孰彰其總不有異孰顯其同則土木一案正十玄門所謂托事表法生解也惺凡請以此自惺惺他海燈油疏劫初人有身光不假日月身光漸減日月出生而日月有時不照則繼以膏火此膏火功德不惟等於日月而已日月屬悲田燈火供養悲敬雙具又況地藏大士以無緣慈力同體悲心示居九子峰頭遍救塵沙含識肉身靈塔四海歸依由是有海燈之供當知一莖光照全彰自性妙明緣善既孚正了同顯儻謂是事相是塵緣無關修證者則離事談理離境覓心理若龜毛心同兔角誰與萬善莊嚴成兩足果哉昔有盜寺物剔佛燈者尚感多劫身光之報況以好心施供藉大士慈悲俾焰焰普燭幽塗方將續如來慧燈耀法界寶炬若自若他同開長夜幽關又豈止生死中樂報已邪請速發心毋貽後悔九華芙蓉閣建華嚴期疏豫每謂地藏本願一經當與八十一卷華嚴並參華嚴明佛境界稱性不可思議本願明地獄境界亦稱性不可思議一則順性而修享不思議法性之樂一則逆性而修受不思議法性之苦順逆雖殊全性起修全修在性一也一念迷佛界不思議性則常寂光土應念化成刀山劍樹爐炭鑊湯一念悟地獄不思議性則泥犁苦具應念化成普光明殿寂滅道場迷悟雖殊性德無增無減又一也然性德雖無增減非逆順不屬迷悟而迷之為九界逆修遂感分段變易二死苦報悟之為佛界順修遂成菩提涅槃二種轉依迷為三惑悟為三智逆修為十惡五逆順修為六度萬行生死為三界四相轉依為三身四德苦即法身惑即般若業即解脫諺謂推人扶人只是一手讚人毀人只是一口大佛頂謂如水成冰冰還成水詎不信然然則芙蓉九朵信可與華嚴九會同其表法豈謂地藏本願經僅談地獄因果事相而已況華藏世界安住大蓮華中如來成道亦坐寶蓮華而優鉢羅波頭摩等地獄亦復名青蓮華赤蓮華可見一名一喻一事一法皆悉具足十界在當人迷悟順逆何如耳不思議法性體非群相不礙諸相發揮又奚閒於地獄及寂光哉願諸開士率諸檀越即以此為順修因緣開發正悟則鐵圍兩山即是金剛菩提道場無令火焰幻作金蓮斯大妙矣九華山營建衆僧塔疏福田有二曰敬曰悲敬田以田勝悲田以心勝供舍利而福等虛空敬田也澤及枯骨萬世稱為仁主悲田也一田功德已不思議況悲敬具足者乎夫羅漢四果證入無生永離我執既入涅槃不愛枯骨凡夫比丘未斷思惑儻尸骸暴露則神識不安神識不安可悲也堂堂僧寶可敬也矧凡聖莫測神聖淵府龍蛇混居安知肉眼所謂凡僧非即大士曲示乎是故隨供一骨罔不具悲敬二田九華為天下第一名山乃荒原暴骼悚目傷心豫初到山首以此事經懷適有衆耆快為鼓舞不揣陋拙倡作先聲其有見聞隨喜無論若緇素若少若多既投最勝之因必克無上之果敬則成佛道而有餘悲則度衆生而無量係以偈曰僧相堂堂福德之海縱令朽骨福性奚改起塔供養應至梵天況復丈許詎云不然大士示形遍在生死青淤朽骨黃金鎖子彈指合掌的的真因誰為證佐妙法華經
