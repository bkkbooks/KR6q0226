body:
  text: 答問二答張叔韓問作善作惡固皆生死根本不作善惡者獨非生死根本乎天堂地獄於我何有獨不曰作善作惡於我何有乎鳥窠諸惡莫作衆善奉行與吹布毛之旨何別若不以斷惡修善為門但願無善無惡無生無死此善星所以毫釐有差天地懸隔也答敷先問法華三昧圓該始終貫徹凡聖動靜云為全在此三昧中無奈情生智隔日用不知縱令不知理性何減欲知理性秖諦觀現前一念心性為在內外中閒諸處邪為屬過未現在邪為有青黃長短等方隅色像可蹤跡邪為竟空無斷滅不可道邪若心性離四句絶百非如此從心所現諸法安得不離句絶非也又諸法各有名貌各可指陳心何名貌如何指陳由此言之法外無心明矣然設無心誰知諸法法現心中如影現鏡中雲現空中既不可分別是心是法又不可分別非心非法謂非實相實性可乎佛界實相乃至獄界亦實相也佛界實相無相無不相具足百界千如乃至獄界實相亦無相無不相具足百界千如也十界正報是實相十界假名國土亦實相也既無一法非實相則無一法非法華三昧不於實相法界妄起凡夫二乘見解縱偶起之隨了此見亦是實相亦是法界如此了達勿忘勿助久久打成一片自然與法華三昧相應切莫捨此別圖圓頓亦莫畏此別圖捷徑此最圓頓最捷徑法也若事行助成理觀有智者三昧懺儀在勤而行之果證可剋若不誦一經不入壇行道則如常不輕觀一切衆生決定作佛觸境逢緣恆作佛法界觀由眼所見無非佛色耳所聞無非佛聲鼻所嗅無非佛香舌所宣無非佛號身所觸無非佛境意所緣無非佛法故得六根清淨三障圓轉此所謂能轉法華不墮說食數寶之譏亦不招暗證無聞之禍矣答庸菴二問善惡無性先須論心心若迷善功微而惡罪大心若悟善功大而惡力微以善惡雖皆性具一順一逆故也招報隨其念之強弱亦無一定學人失念秖貴覺照果能覺照煩惱雖熾必漸減矣覺於臨境貴猛覺於平日貴密又貴事理並運顯密互資危微精一之功在己不在人也法執根本無明我執枝末無明論生起先法後我論斷除先我後法然圓人直觀心性我法本自虛融何有先後或開圓解我執習強者不妨先作人空觀也答湛持公三問原問附問知之一字妙禍之門二門同是一知工夫如何下手又此知若有所知對待成妄若無所知何所表而云知也又用知知於知邪不起知知於知也答知見立知禍門也知見無見妙門也若不達能所性空妄計心外有法此知即名不覺若達心外無法能所不二此知即名始覺亦名妙觀察智亦名無塵智此智從本體起還照本體雖復自照實無能照所照以達無二體故名字位中直用此智念念體達心外無法法法唯心不論時劫不論功用至金剛後心永斷生相無明始覺合本稱究竟覺今下手工夫正要起知知於知體之外更無餘法永嘉所謂但知而已若不起知知於但知未有不隨妄能妄所者大乘止觀三明以何依止中言之頗詳進問若起知知於但知恐但知而成所知起知之知不無能所恐用心時更落妄想窠臼如何善用心者起知知於但知仍不墮妄能妄所邪答非除他物但取於知也以知外無法名但知也達得但知則知之一字亦是強名原無一物豈成所知若有所知又成一物非但知矣下手方便強觀諸法無實唯是一心隨觀心無心相覓不可得然後悟入但知法門前二方便皆唯心識觀初除分別性次除依他性悟入但知是真如實觀證圓成實性也問摩訶止觀初以識陰為所觀境然能觀亦用意識能所有何辨邪答前念為能觀後念為所觀由能觀全用一心三觀便知所起後念全是一境三諦既一境三諦則起即無起亦不妨無起而起起無起名為諦無起起名為觀是謂諦觀名別體復同是故能所二非二也壇中十問十答有引病臥深山力疾商梵網佛頂乘戒源頭性修旨趣圓通本根常住妙理和盤托出矣然根節所聚窾會所關無有發一言啓豫者豈未知所以問邪論畢豫結壇課咒同志亦仍于此結後安居每布薩輒一晤言因設問端十條同志各答長短俱露大約平日依文解義處多入理觀心處少故不能遊刃於節閒也于是更作十答嗟乎語言即道道非語言此之問答大似嚼飯喂嬰他年好惡知端的時當發嘔耳然臭腐神奇善用茹退者不又為新穀作增上緣乎問戒乘緩急四句料揀本出經論畢竟以何為戒以何為乘如大論十戒則戒即乘梵網暫離菩提心犯輕垢則乘即戒又四教各有戒有乘須一一知其歸著然後商其緩急何如答乘戒同依一性元非異體故緣了二修亦常相即如梵網大論所明是也但衆生積迷既久事理二障各有輕重致令修時亦分緩急此則性遮諸業為戒念處觀慧為乘而藏通二教戒指七衆律儀乘指生滅無生二種念觀別圓二教戒指梵網重輕并七衆律儀乘指無量無作二種念觀各就當教自有事障重理障輕者堪修觀慧易犯性遮名乘急戒緩自有理障重事障輕者堪能護戒不達理觀名戒急乘緩若二障俱輕則戒乘俱急二障並重必戒乘俱緩此歸著大略也今既聞皆有佛性又知戒即全性所起緣因乘即全性所起了因仍復全修在性則急戒即急乘急乘即急戒豈肯再歷三塗方得悟道又豈肯久滯人天不歸真際哉問梵網明不受佛戒為畜生木石又犯戒人畜木無異夫不受戒虛生浪死故名畜生覺悟無期故如木石也受戒即入佛位而犯者仍與畜生木頭無異則受戒之益毫無邪答永居門外永棄佛海厥苦是均然不受戒未必盡墮地獄破戒決墮地獄一則常處暗暝固為可憫一則捨明入暗尤為可悲但不受戒無成佛期破戒墮落猶為成佛緣種此受戒之勝益也至於未受而發心秉受誤犯而殷重悔除木石皆非木石矣問人謂不受戒雖失大益而無破戒罪然則地獄中更無不受戒人邪又謂受而不學則不知不坐罪戒壇挂名便可看教參禪且如暗中踏茄誤謂蝦蟆命終墮獄若據律誤踏蝦蟆尚不結罪況復踏茄則學律者坐罪乎不學者坐罪乎若謂彼惟妄計破戒故墮若無疑畏便不墮則寶蓮香尼善星比丘皆無疑畏何以均墮邪若謂性罪不可作遮罪不學無妨何以醫羅龍王損樹葉招劇苦難提比丘破根本獲果證邪答不受戒者設造重惡亦墮三塗毀淨戒者雖具性遮二罪設勤懺悔罪亦可滅是故必須受戒也學律者洞明開遮持犯未犯知護已犯能除不學者既不知避罪又不知出罪過必日積是故受已必須學也夫菩薩於小罪中恆生大畏惟不造三惡因故無惡道怖耳若硬作主宰大膽欺心妄言無罪寶蓮醫羅真殷鑒矣問儒云君子尊德性而道問學致廣大而盡精微極高明而道中庸溫故而知新敦厚以崇禮與佛法同邪別邪亦同亦別邪非同非別邪象山重尊德性紫陽重道問學互相矛盾致成大諍為一是一非邪俱是俱非邪且如何超出是非究竟無斃邪答儒佛有名同義異者如德性廣大精微等一世閒道理一出世道理也有名義俱同而歸宗異者如問學致盡等下手無別到家實分世出世也然為實施權儒亦五乘中之人乘開權顯實則世閒道理亦順實相故同別四句執之皆謗善用之即四悉檀象山雖重尊德性非棄問學紫陽雖重道問學非遺德性得其旨似頓悟漸修兩門失其意則為狂罔愚劣二病可謂是則俱是非則俱非然廣大精微等皆德性本具之義致盡等皆道問學以尊之之事原非兩法相濟孰能偏重偏輕此則超出是非兩關永無流斃者也問佛頂明歇即菩提何藉修證為盡漏紆疑悔者言也又明非歷劫辛勤不能免難為開悟未除漏者言也一所知障重一煩惱障重故如來因病發藥如此我輩二障俱重又未開悟又未除漏為先除漏邪先開悟邪為二功並進邪漏云何除悟云何開並進云何下手答二障雖重非有實體只徹究圓宗即以圓解淨除業習下手之方不出十乘觀法上根惟一中二之七下具用十精勤修之何障不破問耳門最勝根勝邪性勝邪若根勝則兼耳與勞同是菩提瞪發勞相豈可依此生滅為本修因若性勝則耳之性應非即是餘五根性云何說性中相知及六解一亡答耳門易顯性故勝非性有優劣亦非竟用耳根但借耳境以觀真性性即不生不滅亦復非一非六故得一返六皆脫六解一亦亡也問耳門具三真實義為根是圓通常邪性是圓通常邪若根是不應云黏湛發聽聽精映聲卷聲成根又不應云離動離靜元無聽質若性是則耳之性為即五根之性為非五根之性若非還如前難若即則既觀其性應兼得其相若不兼則性外有相若果兼則應於耳中見色聞香嘗味覺觸若不能見色等不名圓通之性若云能者畢竟如何以耳見聞嘗覺邪若謂六根互用須待證入則因果仍不相應若謂雖未有用其理確然如何指點知其不謬答元以一精明分作六和合則六和合之本性皆圓通常亦非有二性也特就迷情揀取此方耳門易顯真實名利餘門難顯名鈍非竟以耳根為圓通常也初下手時正欲棄生滅而守真常所謂入流亡所尚不許用此耳根外循動靜二相奈何責以見色聞香等事如清水未現便責以一切變現設能變現增其渾濁矣若不能見色聞香便疑因果不相應如濁水未有變現遂謂中無清水可乎至於現前指點則耳自聽法口問身承即性中相知義不能以耳見色等正用中相背義將此相知相背二種迷情妄見一總放下方許入耳門三昧問天台言善惡皆性具此義不然謂性非善惡不礙善惡可耳若性實具善便不容惡性實具惡便不容善如佛頂經滿慈以水火不相陵滅為難如來亦但釋云虛空體非群相不拒諸相發揮妙覺明心先非水火何不相容細玩體非群相先非水火二語性非善惡明矣夫七大一往皆無記法尚須棄相方得會性況善惡有記之法可云同具邪答若謂性非善惡不礙善惡則善惡從何處來混擾於性既顯性後善惡復歸何處且正現善惡時非善惡之性避至何處為復斷滅善惡去時非善惡之性又從何來為復更生邪若謂善惡無性隨妄緣有既無其性誰隨緣者既隨緣必有能隨所隨所隨即迷悟染淨能隨豈非性善性惡又即彼所隨迷悟染淨之緣為在性外在性內若在性外性不遍常若不離性那云非具詎知無性之性正善惡實性設性中不具善惡縱遇迷悟染淨等緣決不能現修中善惡如沙無油性縱遇壓緣終不出油請即就喻以申明之使空非即群相相豈從空外來空現時相豈出空外去且正現相時空避至何方為復斷滅相去後空又從何來為復更生邪當知虛空無去無來無滅無生則知群相之中空性不動可例知現善現惡之時藏性不變既知正隨緣而即不變又可例知正不變而即隨緣矣故達不變隨緣之義則未起修善修惡時非無善惡之性如水火諸相未現非無水火之性以性空真水性空真火故達隨緣不變之義則熾然造善惡時亦無善惡實法如水火正現非異虛空之性以性水真空性火真空故迷於相全性即相妄見傾奪故云觀相元妄謂但觀性家之相相妄性亦妄也悟其性全相即性隨拈一相皆俱即俱非離即離非是即非即故云觀性元真謂能觀相家之性性真相亦真也然則虛空非群相群相亦非群相矣空不礙諸相發揮群相亦不礙諸相發揮矣所以得有俱現之義又心先非水火水火亦先非水火矣先非先後之先只是元本之義故不惟未現水火時水性即火性火性即水性決定不相陵滅雖正現水火時水元非水火元非火亦決不相陵滅所以有入水不濡入火不焚身上出水身下出火入地如空處空如地等事也彼妄見生剋傾奪但隨心應量循業發現而已故知相外無性棄相即棄性性外無相會性則會相若棄相方得會性此大不然夫棄色相是空相棄空相是色相棄有情心相是無情色空相棄無情相是有情相棄無分別之根塵相是有分別識相棄分別相是無分別相棄根塵識妄相是覺明真相棄真相是妄相畢竟何相可棄何性可會邪經云棄生滅守真常者直棄其於真常中妄見生滅之情守其即生滅處了悟真常之智耳試玩七大文中先以空融地水火風次以覺融空等五大次以精融根塵六大次以知融識等七大則色空不二依正不二見相自證不二真妄不二明矣是以不變之性正由全具善惡故能舉體隨緣而善惡二修正由全攬真性故復舉體不變不變舉體隨緣故稱理具三千隨緣舉體不變故稱事造三千又理具只是具於事造事造只是造於理具故雖稱兩重亦非六千雖云兩重即重重無盡也問涅槃明常住佛性說乳酪子樹二喻使乳本有酪性乃至熟酥本有醍醐性者何藉善巧鑽搖等緣尼拘陀樹子本有五丈性者何藉水土等緣藉緣之法即是無常安得名常又謂乳有酪性故鑽乳不鑽水子有樹性故種子不種沙此是當有非現有亦不名常又今見酪中雜水則不出酥樹子經火則不生芽適為三無二有家作證彼謂所知障重者不能克證大菩提故答常非死定之常性乃不改為義涅槃既明常住佛性恐迷者執性廢修即成天然外道故明須藉緣了二因以緣了二因雖屬於修在因之時同名性德正因理發雖全是性在果之時同名修德然則無性之性即是實性緣生之法當體無生二鳥雙遊喻常無常厥義若此若當有不名常必執凝然不變死定為常何異常見外道又乳酪樹子水火能障佛性不爾闡提斷善終必復生二乘證空亦終回大故復有佛性雄猛不可沮壞猶如金剛之喻而三無二有終為不了義說豈可執片喻難全法哉問天台明理具事造兩重三千同於介爾心中具足此亦不然夫理具渾然頓足猶之可也事造則一念起時必落一界既落一界餘九皆伏縱一界還具十界亦只一界之十界非十界之十界也幽溪云一界現時九界冥伏既云冥伏則事造三千不居一念明矣今梵網玄義云一界既現九界齊彰試觀調達地獄相現則佛界滅下品金蓮相現則獄界滅何得齊彰邪答心無形質無分劑不可割裂落一界之一念即全體之心非心少分既舉心之全體成此一念亦必舉心之全用歸此一念亦必即此一念頓具心之全體大用如孔子為乘田即以聖人之全體而牧牛羊亦即舉出將入相之全用而歸諸牧牛羊人亦即於牧牛羊時問以文事武備無不能知安得牧時非孔子全體無將相全能邪冥伏或是隨具之義儻以現對冥以起對伏則事造信非一念頓具那成圓理今既知一界還具十界則界界互具無盡重重鏡光珠影更何分劑謂之三千性相亦略舉耳即觀調達墮獄正在佛前又舉身下陷合掌南無成無根信便得授記而下品往生者即地獄火化為清風華佛可見獄界佛界舉體相即互遍互融不可思議此天台性具之旨觀心之要所以真能傳佛心印遠勝他宗也續一問答問世之講者謂初心仰信中道不能頓觀先用空假為方便者性中雖具三因而不相即修中雖用三觀而不同時故名性橫修縱又在因次第開發在果一時同具故名因縱果橫惟圓教行人初心便解三德祕藏直以一心三觀進破無明初信任運斷見惑見真諦七信任運斷思八九十信任運斷內外塵沙見俗諦初住分破一品無明見中諦破惑全用三觀故非縱惑斷不次而次故非橫今設一難既全用三觀次第見於三諦仍是智橫斷縱亦為修橫證縱因橫果縱設令極利根人不住十信竟超初住乃至妙覺亦只智斷俱橫何得非縱橫並別邪答別教諦觀名縱橫並別者以不達三觀只是一心三諦只是一境一心法爾三觀一境宛具三諦如君與將相只是一國雖只一國宛具三人而一君二臣君臣之義不明並別之局必立並則成橫別則成縱致使性修隔別因果不齊圓人了一心之體即不思議中此心能破凡聖情解即名為空此心能立聖凡道理即名為假了一境之體即第一義諦此境本非遍計所執即名為真此境本是依他所現即名為俗初心解此三德祕藏直以一心三觀圓破三惑而初心斷見惑時就破惑處名為空觀見真諦處即名妙假然未破時全以真諦為見惑既破後全以見惑為真諦如水成冰冰還成水冰之與水同一溼性見惑真諦亦復如是體即法界無可破立是名中觀故知非破非立而論破立說名空假正破正立元無破立說名為中如邊方擾亂猛將出征兆庶歸投賢相撫慰究而論之只是王土王民耳所用只一觀而三觀那得云橫所見即一諦而三諦乃即俗即中之真永異偏真那得云縱十信見俗初住見中亦復如是能破雖全用三觀而仍以一觀為主故非並非橫所見雖任運次第而一一諦無非三諦故非別非縱以例性中雖具三因然緣了無功同名正因故非縱橫並別如家國無事非無將相然將相不顯其能但聞國主之名也修因之中全賴緣了然緣了威權正因所賜故亦非縱橫並別如命將命相皆由聖主然聖主不居其功咸稱將相之力至果位中雖三德同時圓顯然仍以法身為主亦非縱橫並別以般若解脫元法身之所本有非新得故如三人同享太平然將相元是舊臣仍奉舊主無伐無施也又將專武君相非無武備故三觀皆破一切法相專文君將非無文略故三觀皆立一切法主專統御將相非無君德故三觀皆統一切法儻三人各止一德雖互相統順仍為縱為別儻三人不相統順雖各具全德仍為橫為並皆不可喻於圓觀儻唯一人獨具三德而無將相雖總無縱橫並別不成國法尤不可喻於圓觀儻三人各具德又相統順而非其境界妄欲破立撫御亦不可喻於圓觀今所破所立所統皆自心現量境界故思之思之又此亦片喻非全喻也以堯舜治局九州中諦統一切法豎窮橫遍無少許性相能出中諦外故又堯舜令民安於至治不能使人人盡為堯舜中觀證一切法無一微塵一剎那不全攬中道全體不全具中道大用各各豎窮橫遍難思議也儒云聖人不知不能堯舜猶病意顯此道唯佛能盡又云道不遠人下學上達意顯標心不離此宗是謂入門同而到家別教道別而教意同吾言益不誣矣性學開蒙答問即壇中第四問廣答儒釋同異之致性學重輕之關憒憒久矣欲釋此疑須先就儒典消文釋義以超是非兩關次就二公決擇是非以示平心公論後對佛教細辨同異以彰權實本跡初就儒典消釋者朱注以尊德性為存心道問學為致知以致廣大極高明溫故敦厚屬存心以盡精微道中庸知新崇禮屬致知如兩物相需未是一貫宗旨所以偏重偏輕致成大諍今謂首倡大道既包下兩節則洋洋優優同是道故同稱大不可謂洋洋但大不入無閒優優但小不極無外尤不可謂洋洋但是德性不由問學優優但是問學不關德性也然此大道全率於性全凝於德故名德性猶釋稱如來藏性以藏性雖十界所同惟如來能合之故以如來藏稱不稱地獄藏性人天藏性等也然則德性二字已含性修因果旨趣而廣大精微等皆德性所具之義趣致之盡之乃至崇之皆道問學者之妙修耳尊此德性方道其問學道此問學方尊其德性否則性近習遠淪於汙下猶所謂法身流轉五道為衆生矣然德性廣大謂其洋洋發育也精微謂其優優百千也高明謂其位天育物也中庸謂其不離子臣弟友之閒也故謂其稟自初生也新謂其經綸參贊也厚謂父子君臣等皆天性所定也禮謂仰事俯育等皆人事應爾也世有廣大而不精微者如海魚身長若干由旬蕩而失水螻蟻得意有即廣大而精微者如阿修羅王變身與須彌齊復能幻入蕅絲孔德性亦爾雖洋洋峻極而復舉體攝入一威儀隨舉一小威儀全具德性非德性少分也世有精微而不廣大者如玩器等微妙精巧不堪致用有即精微而廣大者如摩尼珠圓明清淨不過分寸置之高幢四洲雨寶德性亦爾雖百千經曲而隨拈其一皆全具位育功能非少分功能也世有高明而不中庸者如夏日赫盛不可目視有即高明而中庸者如諸佛光明勝百千日而觸者清涼德性亦爾上達即在下學位天育物之極致不離庸言庸行之家風世有中庸而不高明者如鄉黨善人可狎可欺有即中庸而高明者如時中之聖溫而厲德性亦爾下學全體上達灑掃應對之節即具旋乾轉坤之用世有故而不新者如衣敝不堪復御有故而常新者如上古瑤琴一番摩撫一番音德性亦爾出生一切道德文章經綸事業不可窮盡世有新而不故者如美食不可再列有新而嘗故者如春至花開樹未嘗改德性亦爾雖出一切經綸事業道德文章而體嘗如故世有厚而非禮者如牛犢相隨殷然天愛而罔知儀節有厚而即禮者如孝子事親冬溫夏凊昏定晨省出於至性匪由勉強德性亦爾雖率其天真自有禮節世有禮而非厚者如六國事秦勢不得已有禮而即厚者如孔子拜下盡禮非諂德性亦爾雖百千經曲絶非強設又致廣大而不盡精微者亦自有博學多聞與則半是奪則全非以既不精微即於廣大不能致故盡精微而不致廣大者亦自謂一門深入與亦半是奪亦全非以既不廣大則於精微不能盡故極高明而不道中庸者亦自謂豁達大度然離中庸而別擬高明便不名極道中庸而不極高明者亦自謂言行相顧然捨高明而安於卑陋非君子之道溫故而不知新者亦自謂守其德性而德性豈如此之癡頑知新而不溫故者亦自謂日有增長然如溝澮可立待其涸敦厚而不崇禮者亦自謂率其本真未免同人道於牛馬崇禮而不敦厚者亦自謂舉止有式反為忠信之薄而亂之首故必了知廣大精微等無非德性皆須道問學以尊之則全修在性全性起修既非二致那偏重輕斯為超出是非兩關全收二公之長永杜二公流斃者也次就二公決擇者象山意謂不尊德性則問學與不問學皆無用但能尊其德性即真問學猶吾佛所謂勝淨明心不從人得何藉劬勞肯綮修證亦猶六祖本來無物又即孔子吾道一以貫之也是將尊德性攝問學非恃德性而廢問學故得為名賢也紫陽意謂若不道問學雖高談德性如所謂理佛非關修證必道問學以成至德方可凝其率性之道猶吾佛所謂菩提涅槃尚在遙遠要須歷劫辛勤修證亦猶神秀時時拂拭又即孔子庸德之行庸言之謹下學而上達也是將問學尊德性非徒問學而置德性亦得為名賢也然則悟象山之所謂德性問學已道悟紫陽之所謂問學德性自尊可謂是則俱是而象山似頓悟較紫陽之漸修當勝一籌然執象山之言而失旨則思而不學與今世狂禪同陷險坑孔子謂之曰殆執紫陽之言而失旨則學而不思與今世教律同無實證孔子謂之曰罔可謂非則俱非而無實證者尚通六趣陷險坑者必墮三塗象山之流斃亦較紫陽倍甚若就二公之學以救二公之徒亦有兩番一逆救以象山之藥治紫陽之病以紫陽之藥救象山之病二順救執象山之言者為申象山真旨執紫陽之言者為申紫陽真旨終不若向初義打透則二病不生二藥無用矣後對佛教細辨者先須知此五句有名同義異者有名義俱同而歸宗異者又須知對待絶待二種妙義然後約跡約權以揀收之約實約本以融會之庶得戲論永滅諍論亦消也言名同義異者德性二字及德性中所具廣大精微等八義同則同名德性及廣大等異則儒以天命為性修之上合於天者為德老以自然而然強名曰道者為性復歸無名無物者為德一往判之是天乘亦未盡天中差別恐不過四王忉利法門遠自人閒視之稱為自然及無名無物耳推而上之夜摩等空居四天亦以自然為性以欲界未到諸定及上品十善為德魔天以命根互通為性廣化七珍多增寶媛為德初禪天以出欲為性離生喜樂為德二禪天以超出覺觀為性定生喜樂為德三禪天以永無喜水為性離喜妙樂為德四禪天以不動為性捨念清淨為德無想天以一念不生為性滅心心所為德四空天以超出色籠為性微細定心為德我佛法中藏教以真諦為性擇滅無為為德通教以諸法無生為性體空智果為德別教以離過絶非中道為性所證法身般若解脫為德圓教以不生不滅常住真心不縱不橫三德祕藏為性一心三智妙合如來藏理為德既德性一名厥義各別故所具八義隨此皆異儒但以洋洋發育為廣大乃至仰事俯育為禮如前說耳老則以生天生地為廣大杳冥昏默為精微神鬼神帝為高明專氣致柔為中庸長於萬古為故生一生二生三生萬為新還淳返朴為厚守雌守黑為禮夜摩等天各以境界倍增者為廣大受用倍妙者為精微不假日月為高明十善攝散為中庸劫初先成為故果報變化為新隨順善性為厚具善三業為禮魔天則以統攝欲界為廣大超化無化為精微威力自在居欲界頂為高明不離塵勞為中庸悟本命元為故自在化現為新愛網所攝為厚眷屬莊嚴為禮四禪各以捨下苦粗障為廣大得上淨妙離為精微安住勝處為高明十禪支行為中庸超歷大小諸劫為故喜樂捨受相應為新同一定體為厚王臣民等差別為禮無想天則以無諸想礙為廣大體同木石為精微居四禪上為高明滅心心所為中庸初半劫滅為故後半劫生為新順無動性為厚次第令其心慮灰凝為禮四空天則以體同太虛為廣大微細心心所法為精微遍超色縛為高明不離心想為中庸報境無有成住壞空為故受用禪味為新順無色性為厚次第證入為禮藏通二教各有三乘雖體析巧拙不同同以無為涅槃離我我所曠若虛空為廣大超諸斷常有無戲論妄想為精微遠離三界成一切智為高明依戒而住依念處行道為中庸因緣法性無有作者為故觀諦觀緣出生三乘道果為新二乘別以警悟無常速求出離為厚攝身口意解脫業繫為禮大士別以自愍愍他願皆濟度為厚三聚淨戒上求下化為禮別教則以無量四諦十界因果為廣大中道佛性緣了修證為精微迥超九界佛眼種智為高明從因緣境歷修三觀為中庸本覺無始為故功德智慧二種莊嚴為新次第三慈為厚歷侍諸佛遍度九界種種儀軌為禮圓教則以介爾有心三千具足豎窮橫遍無缺無餘為廣大三千性相互具互遍一色一香無非中道為精微一心三智照窮法界為高明無作四念一心三觀為中庸即隨緣而不變為故所以一切諸法無非性具即不變而隨緣為新所以權實因果施設無方心佛衆生三無差別為厚所以上合無緣慈力下合同體悲仰而熾然常行與拔上侍諸佛下應群機為禮所以性遮諸業一切皆成無盡戒體皆名無上道戒是謂名同而義異也言名義俱同而歸宗異者不論儒老色無色定乃至藏通別圓欲以至德凝道必道問學以尊之欲真實學問必尊德性以道之欲證德性之廣大必盡精微以致之欲證德性之精微必致廣大以盡之欲證德性之高明必道中庸以極之欲證德性之中庸必極高明以道之欲證德性之故必知新以溫之欲證德性之新必溫故以知之欲證德性之厚必崇禮以敦之欲證德性之禮必敦厚以崇之是名義俱同然如此問學各尊其所謂德性故儒成人閒之聖與天地參老成天道之聖為萬化母乃至藏通成三乘之聖永超生死別教成圓滿報身之聖永超方便圓教成清淨法身之聖方為真能盡性是歸宗永異言對絶二妙者若以人望天以欲界望色界展轉乃至以別望圓則彼廣大之外更廣大精微之內更精微高明之上更高明中庸之中更中庸故之前更故新之後更新厚亦彌厚禮亦彌周若以圓視別以別視通乃至以天視人則彼廣大精微等皆悉有名無義故以下望上傳傳皆妙以上視下法法皆粗此對待明妙也絶待明妙者為實施權開權顯實若別若通若藏若天若人究竟同歸一乘圓人受法無法不圓則法法皆妙既知此理方許論揀論收能融能會耳後約跡約權揀收等者揀之則全非儒是世法佛出世故又此云天命為性易云太極生兩儀並屬非因計因不知正因緣法見論所攝夫婦父子等恩愛牽連愛論所攝老子天法道道法自然是無因論不知正因緣法亦見論攝收之則儒於五乘法門屬人乘攝所明五常合於五戒其餘諸法半合十善尚未全同金輪王法也老屬天乘未盡天中之致已如前說究而言之總不及藏教之出生死況通別圓邪然此直約跡約權耳若約實約本融會者此方聖人是菩薩化現如來所使大灌頂經云佛先遣三聖往化支那所立葬法南洲中最三聖法化若在如來正教亦賴以行而列子具明孔子讚佛之語老子騎牛出關欲訪大覺既聞示寂歎息而返經史所載彰明若此後人不達紛紛起諍豈理也哉然三聖不略說出世教法蓋機緣未至不得不然且如五天機熟佛乃示生而初倡華嚴在會聾啞不惟須說阿含以為漸始兼立人天戒善以作先容況此地機緣遠在千年之後縱說出世法誰能信之故權智垂跡不得不示同凡外然即此儒典亦未嘗不泄妙機後儒自莫能察及門亦所未窺故孔子再歎顏回好學今也則亡深顯曾子以下皆知跡而不知本知權而不知實者也何謂所泄妙機如易經繫辭傳云易有太極是生兩儀兩儀生四象四象生八卦此語最可參詳夫既云易有太極則太極乃易之所有畢竟易是何物有此太極儻以畫辭為易應云太極生天地天地生萬物然後伏羲因之畫卦文周因之繫辭何反云易有太極易有太極易理固在太極之先矣設非吾人本源佛性更是何物既本源佛性尚在太極先豈得漫云天之所賦然不明言即心自性但言易者以凡夫久執四大為自身相六塵緣影為自心相斷斷不能理會此事故悉檀善巧聊寄微辭當知易即真如之性具有隨緣不變不變隨緣之義密說為易而此真如但有性德未有修德故不守自性不覺念起而有無明此無始住地無明正是二種生死根本密說之為太極因明立所晦昧為空相待成搖之風輪即所謂動而生陽堅明立礙之金輪即所謂靜而生陰風金相摩火光出現寶明生潤水輪下含即所謂兩儀生四象也火騰水降交發立堅為海為洲為山為木即所謂四象生八卦乃至生萬物也名相稍異大體宛同順之則生死始逆之則輪回息故又云易逆數也亦既微示人以出世要旨矣老子道生天地意亦相同但亦不明言即心自性皆機緣未熟耳且易傳寂然不動感而遂通一語即寂照無二之體而乾坤其易之門一語即流轉還滅逆順二修之關以性覺妙明本覺明妙非干修證不屬迷悟而迷則照體成散寂體成昏逆涅槃城順生死路全由此動靜兩門是名逆修亦名修惡悟則借動以覺其昏名之為觀借靜以攝其散名之為止逆生死流順涅槃海亦由此動靜兩門是名順修亦名修善然修分順逆性無增減又雖善惡皆本於性而道必升沈如斯祕旨豈異圓宗菩薩現身信非虛倡習而不察過在後儒又既知宣聖祕密微談兼秉法華開顯妙旨即此中庸便可作圓頓佛法解釋天命之謂性者天非望而蒼蒼之天亦非忉利夜摩等天即涅槃經第一義天也命非命令之解即第八識執持色身相續不斷之妄情也謂生滅與不生滅和合而成阿賴邪識此識即有生之性以全真起妄天復稱命以全妄是真命復稱天全真起妄即不變而隨緣全妄是真即隨緣而不變也率性之謂道者此藏性中具染淨善惡一切種子若率染惡種子而起現行即小人之道亦名逆修若率淨善種子而起現行即君子之道亦名順修道二仁與不仁而已矣正合此意亦合台家性具宗旨修道之謂教者小人之道修除令盡君子之道修習令滿此則聖賢教法惟欲人返逆修而歸順修即隨緣而悟不變也三句合宗頭正尾正凡一文一字皆可消歸至理矣以要言之若得法華開顯之旨治世語言資生産業乃至戲笑怒罵豔曲情詞尚順實相正法況世閒理性之談邪然此是智旭之中庸非子思之中庸也如大慧杲禪師以此三句作法報化三身亦只是宗杲之中庸耳儻子思實知宗杲智旭之中庸者孔子急當印之胡顏淵死一慟傷心自稱天喪且追憶之再歎今也則亡邪昔孟子歷敘見知聞知之道結云然而無有乎爾則亦無有乎爾是孟子尚不肯以曾子子思為見知者何況孔子彼一以貫之之傳但的示尊德性之真實問學如此乃下手發足之方非到家消息又跡中權理之一非本中實理之一也今約三聖立教本意直謂同可以無非為實施權故也約三教施設門庭直謂異可以儒老但說權理又局人天佛說權說實皆出世故也約權則工夫同而到家異謂亦同亦異可也約實則本不壞跡跡不掩本謂非同非異可也惺谷壽禪師云為門外人說同否則以為異端為入門人說別否則安於舊習為升堂人說亦同亦別以其見理未諦須與微細剖析令知同中有異異中有同為入室人說非同非別粗言細語皆第一義又何儒釋可論斯言得之以其次第順於四悉檀故然細論說法方便則四句之中一一皆具四悉又貴臨時善用不得固執斯言為死法也
