front:
  text: 靈峰蕅益大師自傳前後有門人私識三則附記一通先大師生平不曾乞緇素一字不唯佛法難言知己難得亦鑒尚虛名之陋習而身為砥也西逝時誡勿乞言徒增誑誤嗚呼冰操如彼治命如此安敢不遵今刻老人自傳一通述其意於首門人靈晟稽首先師壬辰秋決志肥遁緇素遮道不得請述行腳冬憩長水營泉寺念行腳未盡致復述茲傳癸巳春過古吳有老人二三舊友或謂傳既寓名則宗譜法號可弗出或謂一生心跡可述夢感等嫌自言老人一笑慨然刪改時從古吳傳至留都與長水本數處不同後堅密子成時謂傳收著述未盡請補於是與古吳本又增數句矣今同門刻傳命南酌同異南思老人一生苦心唯佛祖知之餘難知者至不獲已述傳令後裔有聞此四宏法門三祇誓海可以古人自作別傳之例例之也邪允宜從營泉本照第三番補遺書間字不妨互證僉曰善録定本如左門人照南稽首八不道人傳老人親筆評語三處附取中論八不梵網八不之旨八不道人震旦之逸民也古者有儒有禪有律有教道人既蹴然不敢今亦有儒有禪有律有教道人又艴然不屑故名八不也俗姓鍾名際明又名聲字振之先世汴梁人始祖南渡居古吳木瀆母金氏以父岐仲公持白衣大悲咒十年夢大士送子而生蓋萬歷二十七年己亥五月三日亥時也七歲茹素十二歲就外傅聞聖學即千古自任誓滅釋老開腪酒作論數十篇闢異端夢與孔顏晤言十七歲閲自知録序及竹窗隨筆乃不謗佛取所著闢佛論焚之二十歲詮論語至天下歸仁不能下筆廢寢忘餐三晝夜大悟孔顏心法冬喪父聞地藏本願發出世心二十二歲專志念佛盡焚窗稿二千餘篇二十三歲聽大佛頂經謂世界在空空生大覺遂疑何故有此大覺致為空界張本悶絶無措但昏散最重功夫不能成片因決意出家體究大事二十四歲夢禮憨山大師哭恨緣慳相見太晚師云此是苦果應知苦因語未竟遽請曰弟子志求上乘不願聞四諦法師云且喜居士有向上志雖然不能如黃蘗臨濟但可如巖頭德山心又未足擬再問觸聲而醒因思古人安有高下夢想妄分別耳一月中三夢憨師師往曹溪不能遠從乃從雪嶺師剃度命名智旭雪師憨翁門人也夏秋作務雲棲聞古德法師講唯識論一聽了了疑與佛頂宗旨矛盾請問師云性相二宗不許和會甚怪之佛法豈有二岐邪一日問古師云不怕念起只怕覺遲且如中陰入胎念起受生縱令速覺如何得脫師云汝今入胎也未道人微笑師云入胎了也道人無語師云汝謂只今此身果從受胎時得來者邪道人流汗浹背不能分曉竟往徑山坐禪次年夏逼拶功極身心世界忽皆消殞因知此身從無始來當處出生隨處滅盡但是堅固妄想所現之影剎那剎那念念不住的確非從父母生也從此性相二宗一齊透徹知其本無矛盾但是交光邪說大誤人耳是時一切經論一切公案無不現前旋自覺悟解發非為聖證故絶不語一人久之則胸次空空不復留一字腳矣二十六歲受菩薩戒二十七歲遍閲律藏方知舉世積訛二十八歲母病篤四刲肱不救痛切肺肝既悟此身非父母生何故又刲肱救母參葬事畢焚棄筆硯矢往深山道友鑒空留掩關於松陵關中大病乃以參禪工夫求生淨土三十歲出關朝海將往終南道友雪航願傳律學留住龍居始述毗尼事義集要及梵室偶談是年遇惺谷歸一兩友最得交修之益三十一歲送惺谷至博山剃髮隨無異禪師至金陵盤桓百有十日盡諳宗門近時流弊乃決意宏律然律解雖精而煩惱習強躬行多玷故誓不為和尚三業未淨謬有知律之名名過於實此道人生平之恥三十二歲擬注梵網作四鬮問佛一曰宗賢首二曰宗天台三曰宗慈恩四曰自立宗頻拈得台宗鬮於是究心台部而不肯為台家子孫以近世台家與禪宗賢首慈恩各執門庭不能和合故也時人以耳為目皆云道人獨宏台宗謬矣謬矣三十三歲秋惺谷壁如二友去世始入靈峰過冬為作請藏因緣三十五歲造西湖寺述占察行法三十七歲住武水述戒消災略釋持戒犍度略釋盂蘭盆新疏三十八歲住九華次年述梵網合注四十一歲住溫陵述大佛頂玄義文句四十二歲住漳州述金剛破空論蕅益三頌齊經科注四十四歲住湖州述大乘止觀釋要四十六歲住靈峰述四十二章經遺教經八大人覺解四十七歲住石城述周易禪解是秋住祖堂越二年述唯識心要相宗八要直解彌陀要解四書蕅益解五十一歲冬返靈峰述法華會義次年述占察疏重治律要五十四歲住晟溪草楞伽義疏遷長水而始竟尚有閲藏知津法海觀瀾圓覺維摩起信諸疏厥願未完姑俟後緣而已生平嘗有言曰漢宋注疏盛而聖賢心法晦如方木入圓竅也隨機羯磨出而律學衰如水添乳也指月録盛行而禪道壞如鑿混沌竅也四教儀流傳而台宗昧如執死方醫變證也是故舉世若儒若禪若律若教無不目為異物疾若寇讎道人笑曰知我者唯釋迦地藏乎罪我者亦唯釋迦地藏乎孑然長往不知所終先大師示寂不肖成時謬膺同門嚴命輯靈峰宗論輯成載老人自傳於卷首因念老人癸巳甲午二年中行腳還山并所有著述及乙未正月末後一段光明皆缺然無紀同門又謬謂不肖侍行腳知其事為詳理應附記辭不獲合十稽首記曰靈峰蕅益大師自傳成於壬辰臘月次年癸巳老人五十五歲夏四月入新安結後安居於歙浦天馬院著選佛譜閲宗鏡録刪正法涌永樂法真諸人所竄雜說引經論之誤及歷來寫刻之訛於三百六十餘問答一一定其大義標其起盡閲完作校定宗鏡録跋四則又汰袁宏道集存一冊名袁子秋八月遊黃山白嶽諸處冬復結制天馬著起信裂網疏次年五十六歲甲午於正月應豐南仁義院請法施畢出新安二月後褒灑陀日還靈峰夏臥病選西齊淨土詩製贊補入淨土九要名淨土十要夏竟病愈七月述儒釋宗傳竊議八月續閲大藏竟九月成閲藏知津法海觀瀾二書冬十月病復有獨坐書懷四律中有庶幾二三子慰我一生思之句十一月十八日有病中口號偈臘月初三有病閒偶成一律中有名字位中真佛眼未知畢竟付何人之句是日口授遺囑立四誓命以照南等慈二子傳五戒菩薩戒命以照南靈晟性旦三子代座代應請命闍維後磨骨和粉麵分作二分一分施鳥獸一分施鱗介普結法喜同生西方十三起淨社有願文嗣有求生淨土偈六首除夕有艮六居銘有偈乙未元旦有偈二首二十日病復發二十一日晨起病止午刻趺坐繩床角向西舉手而逝時生年五十七歲法臘三十四僧夏從癸亥臘月至癸酉自恣日又從乙酉春至今乙未正月共計夏十有九丁酉冬門人如法茶毗髮長覆耳面貌如生趺坐巍然牙齒俱不壞因不敢從粉胔遺囑奉骨塔於靈峰之大殿右丁酉下四十二字係戊戌春茶毗後補記嗚呼痛哉世閒眼滅正法幢摧惡心向佛之魔邪誰與救正好心遭毒之男女誰與扶持良以吾輩業重不能感哲人久住故耳老人傳末云尚有閲藏知津法海觀瀾圓覺維摩起信諸疏厥願未完姑俟後緣又閲藏畢然香願文中云一者竊見南北兩藏並皆糢糊失次或半滿不辨或經論互名或真訛不分或巧拙無別雖有宋朝法寶標目明朝彙目義門並未盡美盡善今輒不揣謬述閲藏知津法海觀瀾二書儻不背佛旨乞得成就流通二者如圓覺維摩彌陀地藏乃至大涅槃經夙有微願再加解釋并僧史寶訓亦願增修仰求庇護令得速成又定嗣注經目有行願品續疏圓覺經新疏無量壽如來會疏觀經疏鈔録要十輪經解賢護經解藥師七佛經疏地藏本願經疏維摩補疏金光明最勝王經續疏同性經解無字法門經疏十二頭陀經疏仁王續疏大涅槃合論四阿含節要十善業道經解發菩提心論解摩訶止觀輔行録要僧史刪補緇門寶訓共二十一種上三處所列唯閲藏知津法海觀瀾起信疏告成餘俱不可復得矣雖然老人著述頗富識取綱宗更何所缺況大用方新願輪正轉珍池受記之後速入娑婆收拾有緣喘息未了公案當可頓完吾輩現在未來皆可親近受學勿以時方形骸不實之相二其心可也但成時受恩最深負恩最重又緬想哲人閒出妙法難逢又念大事因緣關繫萬世雖流通有時而衆生障難殷繁爰然香一千炷捨身洪流一報師恩助轉願輪二供妙法生生值遇三轉劫濁救苦衆生四代粉胔滿師弘誓五懺重罪決生珍池嗚呼知我罪我唯大地衆生乎順治乙未臘月十二日不肖門人成時稽首謹記附記靈峰大師入滅八年壬寅七月門人性旦病逝先書囑語面乞不肖成時并胞兄胡淨廣粉遺骨代先老人滿甲午臘月初三日所命先是成時邀淨侶禮佛說佛名經旦就壇然頂燈以報法乳深恩至是復有此囑謹就八月集衆修行藥王本事七晝夜而作法焉於時法弟通玄粉胔成時說偈曰無身何必苦摧殘只為無身故不貪此意許誰能會得前三三與後三三旦出新安績邑胡氏望族年三十三歲退居近住故無夏不畜徒衆故無傳為學精細少年如槁木死灰雖性相圓明而以未悟為恥以愚拙為懼故不敢任法道身孱弱而苦行不為人敬憚而愈不文其過病中初現業相哀籲於佛乃見彌陀接引去時眼耳根離唯蹲坐微笑不已著有和西齊淨土詩及圓覺疏未行旦逝之次年四月道友程從焜感其事亦力疾念佛西逝自聞異香越數日猶趺坐巍然舉手昂視焜歙之槐塘人其近事菩薩兩戒皆稟於先老人者癸卯冬成時稽首附記靈峰始日大師私諡竊議古歙門人成時稽首百拜議蕅益老人遷化靈峰門人成時議行私諡或曰有典乎曰自柳下惠後有王文中朱文忠陶靖節蕭文元諸人皆門人為道而尊師尊師以明道由周而來昭昭也曰世閒法耳出世有典乎曰志磐師作佛祖統紀興道下八世無師號者悉立私諡志之曰是蓋尊祖之大義也世出世何閒哉曰聞其典知其義矣未悉其故豈無力請於朝或位不在龍錫之列邪抑朝有所諱定論不得不在野邪曰蔡雍元結豈不能為朱穆元延祖乞易名於漢唐之世乎文忠靖節載在漢書宋史功令何嘗拘聖明何嘗諱乎然則何故曰不失其實也世閒聖賢有舉世不見其心者柳下為士師三黜不去欲護生於刀鋸鼎鑊閒也既不能大行其道以期於無刑則不羞不卑隨地救民於死其和也所以行其惠也此意當時不知唯中饋知之非惠之一言而柳下隱矣一字斷金柳下之心見千古聖賢心學亦見言不失其實者利澤天下萬世無疆也若夫出世宗匠道為心性全體大用心合生佛慈力悲仰難知難見尤甚然正法猶不為難末法魔強法弱正衰邪熾則誠難觀行相似以上猶不為難具縛凡夫以肉眼作佛眼用則尤難既難知難見如此不惟嘉號缺然堪為法道之懼即過推神聖錫智勇亦不足發潛德而迪後彥故從來若及門若遠裔皆深引為慮而仁人哲士亦不得不憫其衷而韙其說不忍概以愚賤斥之也夫大宗哲匠淵懿不彰雖靈山王臣咸以為恥百世苗裔咸以為憂而其罪不得不屬之及門流亞門內瞢瞢王臣何所採當世寂寂曠代何從聞噫大矣哉私諡之所由來也或人於是懼曰幸從子聞其典知其義復究其故已之是不仁也以愚賤避罪是不智也願與聞蕅益老人師號於是成時謹稽首百拜議曰佛法之盛也三學一源其季也三學鼎足其衰也三學互諍至其極也三學內證至內訌一切人皆為破法之人一切法皆賊人之法斯時也非溯其源曷救正哉今日支那三學其內訌也甚矣先大師生當其世自號孤臣孽子力揭三學一源以救之其於律也以斷有漏法為宗洞開遮會同異融大小顯修證純乳無水即律即教即禪一如先佛世尊之律師未嘗有一行也稽諸古宣公不逮若夫恆轉三輪深契二共師尚不敢擬雲棲顓愚二師矧東林天台臨濟諸老其於教也以破我法二執為宗教觀並明性相互融權實不二性修交徹純乳無水即教即律即禪一如先佛世尊之教師未嘗有一字也稽諸古荊溪清涼不逮若夫五品誕登三因圓發師尚不敢擬幽溪矧天台慈恩永明諸老至師之禪徹悟心源深契方便法法皆通法法皆備而無一法可得即禪即律即教允為曹溪永明之徒而師終以戒之定道未深教之理果未剋故遂不敢謬膺祖位墮邇來大妄語之覆轍蓋唯真實識法是以真實知懼豈非名字位中大宗匠之正標榜哉夫日之方升也大地未盡蒙光而普天胥旦濃夢者雖未瞻明而夜遊伏匿作務興成其師之象歟宜尊稱為始日大師謹按志磐法師諡道興法智諸祖也曰他日有能考論懿德上之清朝賜以徽諡者幸當用此定名庶乎不失其實先大師貫徹三學力振頽流其著述若釋論若宗論皆慧命所關津梁斯在上考先佛下俟後聖當必有乘願大士受靈山囑者為之入藏流通徽諡定名幸存今議不敢過不敢不及也補傳後一日靈峰蕅益大師宗論序佛法無他諦而已矣諸佛說法常依二諦二諦即三諦也即四諦也即一切諦也即一諦也即無諦也二諦如此諸諦亦然自心本具之法非思議所行境界皆不可說也然有因緣亦可得說以要言之無可說之諦無不可說之諦如是而已矣不見此則無教無教則行無由起理無由顯果無由剋如是而言說皆臆見也見此則為真實覺悟有教有行理果如是而言說皆妙法也自正像既遠末世抑何言說之多哉或見諦未全則雜中者如摩尼處瓦礫不掩其光不中未免以一言誤天下萬世或見諦未精則執與之亦成一家言奪之則無同異中見同見異未免墮分河飲水之覆轍或見諦未神妙則跡抑揚建蕩總不能為人解粘去縛起必死沈痾金錍既不在手言言與目以明言言增目之膜至其下者博而似雜實全無所中也戲論也僻而似專實非專家也鬥諍法也或蛇為龍襲取神妙非特跡而已也罔之徒也昔魔王害佛不得誓曰當於後世入佛法中破壞佛法佛曰自壞耳法可壞哉由是觀之下者不足論論其上若而人自利未入圓門利他安得無弊得失恆無端倪利害潛相倚伏欲裂大綱令大地衆生咸歸大處苟非其人道不虛行唯靈峰蕅益大師之以言教也徹悟心性全體復深入不思議願輪一切時一切處一切事中悲智雙運解行互融實無一法可得故無峻豎之門庭實無一法不通不備故無隔垣之音響其發明三學一以全性起修全修在性為宗趣全性起修無實非權全修在性無權非實非實非權而權而實其獨契法身向上以一人開萬古欲絶之學得非以是歟嘗論之師之三學即一大事也真律真教真禪適還吾心之律教禪適還先佛世尊之律教禪師未曾有一言也未曾有一言故無雜也律既為真律教既為真教則何同異何大小何律之不即教即禪教之不即律即禪乎禪既為真禪則何分佛祖何有宗支何禪之不即律即教乎是故唯精故不執無非事事無礙法界無諍三昧也夫言不神妙以雜與執也不雜不執則不自立宗不自立宗則縱橫變化不可方物是以師之言盡脫窠臼頓起膏肓一歸於堂堂正正如唐虞三代之禮樂不俟干戈而天下太平也識者謂末法以來建大法幢擊大法鼓其味醇平其道光明唯師一人而已師具開演二智作廣略二說一四句偈不為少汗牛充棟不為多諸疏外稿有七部今輯為全書以文為類原在稿外別行者亦以次收入按三藏凡高僧撰述悉入阿毗曇論藏而有二種專釋一經者曰釋論概宗十二部經自成名句文者曰宗論今以釋論收靈峰諸疏而七部稿總以宗論收之合十大卷分三十八子卷嗚呼成時不肖老人在日不能實學不思議諦如醉轉屋今哲人雖逝遺書尚存敢不自淑以報師恩於萬一亦願凡遇是書者勿離文字而說解脫勿即文字而忘真月但因是見諦則離即雙超圓契自心則不雜圓收萬法則不執圓說圓泯則不跡千百世而後必有其人成時願先捨此身命以供之矣抑更有慮焉凡言之揣摹擬議而得者亦可揣摹擬議而得之若夫引商刻羽不涉思議非從真聞以起思修則若雜若執若跡之禍嘗伏於揣摹議擬之下而不覺成時願與天下萬世之遇是書者由博學審問慎思明辨以階於篤行可也補傳後二日門人成時百拜撰靈峰蕅益大師宗論序說有小引成時輯老人七稿成通序大意越一日作序說其言別故不入序不屬科故不立例凡十五段達磨大師懲專逐名相之陋力為學者明宗而不立文字一語遂為昧宗者所執執之既久由狂入癡故永明大師大開教眼以明宗鏡至寂音師且說文字禪紫柏大師寂音再來而憨山師直顏其全書曰紫柏集憨集最富未傳紫竹林顓愚師為憨大師獨契亦自顏其書為紫竹林集諸老懲無聞之禍救不立文字之弊心良苦矣竊恐此風既盛凡沙門稍擅世譽者皆思以文相炫夫文盛道亦必衰試觀唐宋儒多以文字成名號稱作者深為宮牆之辱可使釋子復覆其轍乎故雖老人別顏七稿多自稱集今不敢以集行然亦不敢名為録何故今之祖録遍天壤矣老人每齒及則痛心泣血故亦不敢也昔陽明子在日有傳習録附録數冊行世公薨出文録外集等後華亭新建諸公懼學者弗克盡讀也彙成全書以傳夫作者非有意行其言也閲歲月涉山川接人物幻成文勢不得不別其久也書不全道亦不彰言既散傳必不盛聖君賢臣採藏天府皆無統緒可遵有會一者恐失其舊是故言之始不得不分終不得不合勢也今輯七稿為一作者海印炳現讀者古鏡全收庶天朝採録無零落割裂之虞矣大卷唯十避繁也一一卷中復開子卷備梵冊也文以類出取便耳非以文體也見文則昧道因文則明道達文則證道證道而後知文無體也不肖戊子歲始晤大師師一日顧豫曰吾昔年念念思復比丘戒法邇年念念求西方耳時大駭何不力復佛世芳規邪久之始知師在家發大菩提願以為之本出家一意宗乘徑山大悟後徹見近世禪者之病在絶無正知見非在多知見在不尊重波羅提木叉非在著戒相也故抹倒禪之一字力以戒教匡救尤志求五比丘如法共住令正法重興後決不可得遂一意西馳冀乘本願輪仗諸佛力再來與拔至於隨時著述竭力講演皆聊與有緣下圓頓種非法界衆生一時成佛直下相應太平無事之初志矣佛法有偏痛快偏精細者則性快心細之人各偏好之唯此論快性者必失粗淺細心者必失廉纖縱高明不敢昧綱宗不敢輕名相而綱宗只作綱宗會名相只作名相會終為俗學若能知非綱宗非名相而粗淺廉纖二病頓超者雖為執鞭所欣慕焉自人不悟圓宗諸佛願海無能隨順修學者不知非真實發大菩提心一切盡成虛解縱有為生死志亦必入小乘權曲境界若並無此志直成修羅魔外何疑老人一生於法界三寶前緣法界衆生殷勤發願今願文一卷直顯不思議境界真無上醍醐也吾見有憎者謂為繁瑣有讚歎者讀其文惟恐臥有感動流淚者然亦未遑直下承當徹悟性修之致嗟乎何真法之不易讀若此小子時敬然臂香四十八炷普為法界衆生等供安養願王乞吾師願文於一切世閒大作佛事願遇者興起感觸徹悟諸佛即自心本性庶不令一切願王久淪於異生界也淨土一門真參禪學教持戒者所共趨夫彌陀寂光即自心理智由不悟故橫生邪慢取笑識者讀宗論幸徹底薦取則無邊法藏一以貫之矣棒打石人頭暴暴論實事八十翁入場不是小兒戲是之謂乎學佛僻謬者皆法外取心世之本來面目向上一著是也計此必成惡取空見佛目此病為不可救圓覺經誡取圓覺大乘止觀誡先觀真如諸祖深訶邪禪暗證意皆在此今論示第一義心圓妙明快千古未有讀者諦審諦觀字字從繩言言破的或得之先師自行不過破流俗知見於現前一念了一切法而已法語中亦唯以此剖心膽傾腸腹而發明介爾一念在續集寱餘尤詳蓋鼓兩片皮既久唯覺此話大神至明也雖然失之亦成話柄得之不外言詮吾雖不敢謂有是語尤不敢謂無是語也法語書柬中諸名公巨卿遵大師原稿但書姓氏概不書尊稱以末法道則僧體日卑爭務乞靈人爵俗則我相日重終難覷破浮雲兩者皆生死根株於道何啻霄壤若非各懋盛德安能共扇真風今唯重道誼以副護法天龍之望儒宗隱覆之說非深契法華三昧及華嚴事事無礙法界未易拈提求曲盡同異之致匯歸一實千百世來大師一人而已孔子顏子文中子後陽明子處隱顯閒蕅益子繼之大闡開顯之道緬想時會應非偶然今而後庶吾人一實事會其有極歸其有極也夫雖然蕅益子云非行之艱知之尤艱敢告忠孝至佛始極不知其極或以愛論俗典揀之竟成無君無父全違金口誠言或以至德要道收之又墮有漏有為全乖出世正軌一大事之乖張僻謬久矣讀宗論但貴用極不貴株守守則揀不守則收子臣弟友丘未能一嗚呼一大事之彰明會一久矣先師著述除宗論外其釋論則有阿彌陀要解一卷占察玄疏三卷楞伽義疏十卷盂蘭新疏一卷大佛頂玄文十二卷準提持法一卷金剛破空論附觀心釋二卷心經略解一卷法華會義十六卷妙玄節要二卷法華綸貫一卷齊經科注一卷遺教解一卷梵網合注八卷後附授戒法學戒法梵網懺法問辨共一卷優婆塞戒經受戒品箋要一卷羯磨文釋一卷戒本經箋要一卷毗尼集要十七卷大小持戒犍度略釋一卷戒消災經略釋一卷五戒相經略解一卷沙彌戒要一卷唯識心要十卷八要直解八卷起信裂網疏六卷大乘止觀釋要四卷大悲行法辨訛一卷附觀想偈略釋法性觀懺壇軌式三種四十二章經解一卷八大人覺經解一卷占察行法一卷禮地藏儀一卷教觀綱宗并釋義二卷閲藏知津四十四卷法海觀瀾五卷旃珊録一卷選佛譜六卷重訂諸經日誦二卷周易禪解十卷闢邪集二卷共四十七種板俱在嘉興府楞嚴寺是為靈峰二論目録大記明咒行法四書蕅益解未行宗論全部可取其中讚戒者別為戒波羅密之書讚淨土者別為祕藏指南之書或合上二者別為不昧因果之書儻能盡美盡善則有大利而無害未遑別刻附記於此靈峰蕅益大師宗論總目録卷首自傳續傳附記私諡竊議序序序說總目第一卷卷一之一願文一卷一之二願文二卷一之三願文三卷一之四願文之四第二卷卷二之一法語一卷二之二法語二卷二之三法語三卷二之四法語四卷二之五法語五第三卷卷三之一答問一卷三之二答問二卷三之三答問三第四卷卷四之一普說茶話卷四之二說文卷四之三偶録第五卷卷五之一書一卷五之二書二卷五之三論辨議記第六卷卷六之一緣起序一卷六之二序二卷六之三序三卷六之四序四第七卷卷七之一題跋一卷七之二題跋二卷七之三疏一卷七之四疏二第八卷卷八之一傳卷八之二壽序卷八之三塔志銘祭文第九卷卷九之一頌一卷九之二頌二銘針詞卷九之三贊一卷九之四贊二第十卷卷十之一詩偈一卷十之二詩偈二卷十之三詩偈三卷十之四詩偈四
