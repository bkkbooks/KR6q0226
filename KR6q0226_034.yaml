body:
  text: 贊二佛說阿彌陀經塔贊稽首阿彌陀如來攝受衆生不思議稽首廣長舌相經諸佛護念不思議稽首執持名號人徑登不退不思議我曾發不思議願欲以尊經作寶塔綺回漩澓妙莊嚴令見聞者皆歡悅善哉千里鄭居士先得我心所欲為巧思妙筆奪天工梵文迆𨓦無盈虧我今合掌頂禮塔願塔普放光無量我今合掌頂禮經願經住世壽無量經典所在即是塔塔影所在即是經若人具有廣大信始獲頂禮無餘情若人得遇此經塔畢竟當得廣大信是故我今作贊頌廣不思議佛慧命血書華嚴經贊二首法界無礙殊文異派上中下座同條共會正眼觀來圓融自在隨沾一滴滄海為隘奇哉開士發希有心刺血書寫字字精金放紅毫光照微塵國遇影蒙塵頓證妙德省中開士刺血書成法界經展時無字不光明導歸無量光王剎不墮狂禪鼠唧鳴淡居大德涵初開士持法華經贊介爾一心三千性相權實同歸圓明絶障文字離微兔角柱杖即此離此依然兩樣能施能開積年店帳認取阿爺當仁不讓十妙淋漓今古如斯若本若跡觀心便知三法融徹六塵無別教行理經同輪共轍卓哉開士心解口持醍醐潤渴甘露療饑七萬餘言言言實相一任思量眉元眼上梵音清雅法界同熏一字染識法王之昆雨白開士血書華嚴經贊有引開士血書此經王初懼大事難成也先然香一百八炷以求加被僅兩年告完不事世諦作圓滿道場獨閉門觀想頓然三指普供法界三寶噫力行出世妙善而不彰其名此真普賢勝行已乎蕅益智旭深心隨喜合掌讚曰為善妙在密有德妙在謙以此嚴性海以此離世閒字字如來血筆筆華藏泉三禪猶可壞萬德終不捐相將寶蓮土再聽龍華詮恆生法主血書法華經讚并序如來一代教法唯法華為究竟之詮以其直明設教之意不止辨說法門綱目故也是故法華明則一代教法俱明十方三世一切權實本跡俱明如是則現前一念介爾心性乃究竟明矣智者大師親見靈山一會儼然未散正是自心現量境界耳世之求法華者既不知求諸自心求自心者又不知求諸法華宗說分張罔殆病等求其教觀雙美解行合一捨天台誰歸哉末代鈍根障深慧淺三大五小不唯作望洋之歎且視為異物妙峰大師不惑衆咻力宏一實正如鳴陽孤鳳逮幽溪大師其道始全甚矣正法難聞也檇李恆公桐溪子幽溪孫淡食十年掩關載半刺舌端血書七帙經僅十旬而告成噫難行能行真不可思議妙行矣讀其緣起回向發願字字與菩提心相應當知亦必念念與不可思議境相應也合掌讚曰稽首妙經王實相不思議權實與本跡究竟唯一事稽首天台師大蘇發妙悟五玄與四釋廓徹菩提路約教揀偏權觀心融怯怖杲日麗中天萬流歸本源山外徒疑畏誰知龍樹禪佛命從茲續心印從茲傳故我恆開士發心同普賢身命誓不惜大願金剛堅七軸七萬字字字皆金蓮佛身全在中聞見結妙緣不離此當處因滿果亦圓卓無量普觀圖贊會依報為蓮華攝三身為自己非以身往彼方非移蓮花到此欲識個中消息問取無量卓子西齊淨土詩贊稽首楚石大導師即是阿彌陀正覺以茲微妙勝伽陀令我讀誦當參學一讀二讀塵念消三讀四讀染情薄讀至十百千萬遍此身已向蓮花托亦願後來讀誦者同子畢竟生極樂還攝無邊念佛人永破事理分張惡同居淨故四俱淨圓融直捷超方略十八祖像贊并序略有引佛一心燈百千分炷苟可照長夜者皆佛光也不藉茲光覺自他乃於燈檠分彼此愚矣夫火之所傳雖不知其盡推厥元始各有攸承儻知熟食除冥功用無別勤身等事又奚擇焉然欲廣祠不勝其夥由是每事止宗一人依戒次為先後不唯尚名專尚實不唯崇先亦崇盛庶幾慧照熾然永爍昏窈云爾西土受佛付囑大迦葉尊者第一王舍城大婆羅門種名畢鉢羅身真金色具三十相娶紫金光女了無欲意出家自誓得戒見佛竹園聞法證果以寶衣易佛糞掃大衣畢生行頭陀行佛嘗分半座令坐涅槃會上佛告比丘我今所有無上正法悉已付囑摩訶迦葉當為汝等作大依止佛滅七日迦葉來赴既茶毗訖即共千阿羅漢結集三藏宏持正法二十年次付囑阿難入定於靈鷲山之雞足峰持十三條金縷袈裟待彌勒佛贊曰願居衆人後不為一物先縱使不值佛自成獨覺仙根深枝乃茂正法全仔肩拈花領微旨結集印真傳三藏急先務舍利憑人天閻浮第二師裕後亦光前威德重無比魔外聞遙蹎安得再遊此一滌野狐涎拈花事出大梵王問法決疑經宋王安石於內院見之藏缺故禪者不知西土持毗尼藏優波離尊者第二五百釋子將出家盡脫珍服與優波離波離念彼尚能捨我何戀焉先往求度釋子後至禮上座至尊者前不禮佛曰寧說三世佛是下賤人勿說優波離是下賤人也此人持戒第一衆中綱紀人天最尊釋子禮足大地六種震動佛示滅後迦葉白椎請尊者登師子座結集律藏贊曰戒是佛真身律是僧父母正法賴此存人天均恃怙小大共遵由何今復何古稽首衆紀綱萬世毗尼祖持犯與開遮精析超群伍哀哉末葉中事理多莽鹵幸乘悲願來再作龍蛇主陶鑄聖凡儔同為舍那輔西土傳持法藏阿難陀尊者第三白飯王子佛之堂弟佛成道日生面如滿月為佛侍者多聞第一佛滅度迦葉白椎請登師子座結集法藏迦葉寂宣化幾二十年於恆河中流入風奮迅三昧身分四分與帝釋龍王毗舍離子阿闍世王各起塔供養贊曰佛法大海水流入阿難心橫莫測其際豎莫測其深始似畜聞誤終得反聞針除病不除法點鐵便成金如何生盲類捨此復他尋離經墮魔說執石強作琛楞伽金剛印祖意良可欽此言如不信更問古觀音初來東土迦葉摩騰竺法蘭二尊者第四第五東漢明帝夢金人遣使西求佛道遇二尊者於中天竺大月氏得佛立像及梵本經六十萬言載以白馬達雒陽於城西雍門外立白馬寺譯經四十二章後五嶽八山道士上表請試優劣火焚道經悉成灰燼所有咒術皆不靈應唯佛經像光明燦爛五色徹天分毫不爽摩騰湧身飛空現諸神變法蘭出大梵音宣明佛法天雨寶花大衆欣悅摩騰卒法蘭譯佛本行經等五部贊曰堂堂震旦境久已蒙佛影猶俟千餘年正法乃昭炳卓哉二大士神力真勇猛感應不失時定慧發深憬除彼生盲人誰能見弗省折伏魔外心掀翻愛見阱萬古仰餘暉碧潭圓月冷何時復現神家風頓重整初至江南建舍利塔康僧會尊者第六康居國人赤烏四年見吳主曰如來遷化已逾千載靈骨舍利神應無方吳主曰舍利可得當立塔若無驗國有常刑師謂徒曰大法興廢在此一舉當潔齊懇求七日至三七衆且懼忽鏗然有聲瓶中舍利五色吳主自瀉銅盤盤即裂火燒鎚擊亦無所損因起浮屠置建初寺名地曰佛陀里即今大報恩寺贊曰無量戒定慧莊嚴清淨身堅固不可壞應物現奇珍誰能深諦信懇到復精純冥契究竟果建立菩提因靈骨文彩古衆生耳目新迥超思議表恆示迷流津長干佛陀里塵劫開光輪莫言此是幻離幻別無真東土初受具戒朱士行沙門第七時出家者尚存俗姓漢魏以來出家唯受三歸大沙門無別高貴鄉公正元元年曇摩迦羅與曇諦在洛出四分戒本受戒羯磨法沙門朱士行為受戒之始甘露五年講道行般若經講經之始歎譯理未周乃發跡長安至于闐國沙門西遊之始得梵本般若國禁不傳東土士行請驗以火無損王信異許傳即寄經東歸名放光般若贊曰七種得戒中白羯磨第一僧寶久住持最勝無倫匹佛法入支那昭彰匪一日甘露獲先嘗沙門稱首出況復登座王忍衣慈為室發足始西遊獲得希有帙戒慧及神通堪作群靈率代遠罔聞知聊為稽首述蓮社始祖慧遠法師第八俗姓賈雁門樓煩人幼好學博綜六經尤善莊老二十一歲師事道安二十四大善講貫晉孝武大元六年至廬山夢神告以毋他往夕大雷電林壑洞開素砂布地楩楠文梓充布地上九江刺史桓伊為建東林寺殿名神運嘗謂諸種三昧其名甚衆功高易進念佛為先結社者有十八高賢及一百二十三衆皆登安養時江東經卷未備禪法無聞律學多缺師令弟子越蔥嶺遠求得之著法性論創明涅槃常住之理什師歎其暗與理合安帝時桓玄令沙門拜王師致書諫止著沙門不敬王者論師居山三十年專修淨業三見佛不言義熙十二年七月晦日佛來迎云七日後當生我國至八月六日耆宿請以豉酒治病師曰律無通文又請飲米汁師曰日過中矣又請飲蜜水乃披律尋文卷未半坐逝壽八十三贊曰念佛三昧寶圓頓法中王挺生神聖士勇猛獨承當香象截流度搗丸集衆香大德矜細行禪律咸舒光法性悟常住僧儀超帝皇才識邁前哲密證不自彰文成印乃壞怡然返故鄉高風千古在歸命附慈航初往天竺求律法顯沙門第九晉安帝隆安二年己亥從長安發足西往義熙十二年甲寅泛海而還備嘗險阻具在本傳贊曰稽首勇猛士發心求戒律西行不惜身安知勞與逸往返十五年經歷百千怵但念觀世音雲開復見日愍此邊地苦欲住還東出去時多同行來時僅存一惠我毗尼燈照我千年室讀傳憶深恩血淚如泉滭東土禪宗初祖菩提達磨大師第十南天竺香至王子西土二十七祖般若多羅付以大法囑六十年後往震旦行化梁大通元年泛海至廣州武帝詔見問曰如何是聖諦第一義云廓然無聖問對朕者誰云不識帝不契遂渡江入魏止嵩山少林寺面壁九年後付法與二祖慧可并授袈裟表信且曰楞伽四卷可以印心往雲門千聖寺坐逝葬全身於熊耳山明年宋雲從西域回遇師隻履手攜翩翩獨邁開壙而視唯空棺隻履贊曰震旦多大乘昂昂千古英譬如龍已就待師一點晴廓然無聖諦楞伽印分明不識真不識同死不同生得髓依位立隻履仍西行哀哉五葉後宗說還分爭經既成名相坐復同聾盲誰信安心訣從來匪涉程天台教主智者大師第十一名智顗字德安俗姓陳父梁益陽侯母徐氏夢香煙五彩入懷而妊生時神光發屋堯眉舜目臥即合掌面必向西十七誓為沙門十八出家二十受具精通律藏常樂禪悅二十三謁思禪師於光州大蘇山思曰昔日靈山同聽法華即示普賢道場為說四安樂行昏曉苦到如教研心柏盡繼栗月沒燎松二七豁然大悟三十歲遊金陵三十八入天台卜居於佛隴降魔於華頂陳少主復請住金陵光宅寺講法華經隋太子受戒上師號曰智者次於荊州玉泉授關雲長神五戒說法華玄義摩訶止觀五十八歸天台年六十說諸法門安坐入寂藏龕於佛隴西南峰煬帝大業元年開視唯空床虛帳而已生平造寺三十六所造經十五大藏造像八十萬軀剃度萬四千人傳法者三十二人得悟者千餘人三十年唯一納贊曰歸命大教主人稱小釋迦本地不可測示跡乃堪誇靈相兼堯舜神德動夷華權實窮奧旨歸宗在法華四辨澍妙雨兩足嚴大車止觀傳心印玄文伏偏斜永劫述難盡功若恆河沙允矣無上士奚止壓百家慈恩教主玄奘法師第十二洛陽陳氏子十一歲誦通維摩法華唐太宗貞觀三年遊西竺備嘗險阻歷百三十國凡如來化跡無不禮敬初欲學龍樹宗其徒令服藥求長生方可研宗旨師本欲求經恐負宿願遂學法相於戒賢法師賢已一百三歲蒙文殊付託忍死待師貞觀十九年東歸撰西域記譯地論唯識大般若經等高宗麟德元年二月令衆念彌勒佛右脅而逝是夕白虹四道貫井宿贊曰法界無差別差別無量具五位百法門數句非數句欲悟真圓融那得廢行布所以古文殊苦勸賢師住奘師既西遊此道乃有付稽首瑜伽師一生補佛處覆實且施權誠哉有遠慮師已契慈心兜率宮先據密教初祖金剛智灌頂國師第十三西土人親傳龍智阿闍黎法唐開元七年抵廣州詔入見館大慈恩寺圖七俱胝像令自開目明年遷薦福所至結壇作灌頂道場二十年八月告其徒曰白月圓時吾逝矣至期右繞毗盧像頂安貝葉坐逝贊曰顯密二種教各具四悉檀顯或可擬議密更難仰鑽授受有祕印成就須淨壇稽首灌頂師懷道來真丹圓頓超言象雲物聊示端菩提乃宗要事理非偏安傳至金剛手醍醐佛所歎繞像頂貝葉萬古月同看清涼教主澄觀國師第十四會稽人姓夏侯十四歲誦法華經得度先學律次學論次學賢首宗次從荊溪學台宗次遍學南北二宗凡此土儒老竺乾梵書外部異計四韋五明顯密儀軌莫不旁通居大華嚴寺專行方等懺法講華嚴經造新疏及演義鈔壽一百二歲臘八十三身九尺四寸手垂過膝夜目發光晝仍不瞬才供二筆日記萬言十誓律身盡形一食歷九朝為七帝師講華嚴至五十遍建無遮大會十五會宏法弟子三十八人贊曰華嚴法界海萬派咸朝宗不有大龍象誰能力宏通十玄啓深奧六相明圓融性相既非二生佛豈異同福慧超今古儀表等世雄宗說分復合乘戒替還隆重重十法界馥馥十誓風稽首調御師千載開盲聾會歸宗鏡永明大禪師第十五名延壽字沖玄吳越王時為稅務用官錢放生當棄市臨刃色不變貸命出家得法於韶國師九旬入定鳥巢衣裓行法華懺見普賢執蓮花在手特上天台智者巖作甲乙二鬮甲一生禪定乙誦經萬善莊嚴淨土七度得乙鬮於是專修淨業誦經三載觀音以甘露灌其口日課一百八事未嘗暫廢師以天台賢首慈恩三宗互異乃館其徒之知法者博閲義海更相質難而衡以心宗又集大乘經論六十部兩土聖賢三百家之言證成唯心之旨為宗鏡録百卷及萬善同歸集等師坐逝後有臨川比丘病入冥見閻王拜師像云於西方上品受生矣贊曰法法本唯心何同復何異哀哉罔殆流執語迷實義各隨遍計情爭立我人幟吾師集大成萬善歸同智向上最玄機日課百八事高登上品蓮幽冥亦翹企宗鏡照大千生盲罕知利安得師再來重聞天樂瑞得戒和尚雲棲大師第十六諱袾宏字佛慧別號蓮池古杭人姓沈少為名儒三十歲出家參遍融等大老密有契悟住靜雲棲不覺成叢席專修淨土敦尚戒律不拈機緣不稱方丈不崇殿閣不侈衣食以平易老實力挽浮風凡警策大衆開示出生死事未嘗不聲淚俱下放生結緣施食作福不計其數年八十二示寂旭少為邪師所誤力詆三寶聞大師自知録序始轉邪心草四出家入山作務見規約中有學戒式遂發菩提心胡跪大師像前然香頂受二種戒本以附私淑之科贊曰宣尼讓聖仁堯舜稱猶病大道曠無涯如何一蹴盡嗟此澆漓時人各爭高峻言行每相違欺世同梟獍卓哉真導師懲俗從先進制作似孔周謙退如臨浚悲豫發心遲弗獲親慈訓稽首奉遺容願作蓮邦胤刻書本藏紫柏大師第十七諱真可字達觀別號紫柏吳江沈氏子行腳時因疑張拙偈大悟參遍融尊宿願嗣其德師念大藏卷帙重多遐方僻陬有不聞法名者倡刻方冊以便流通設遇輕謗願自代罪令處處見聞經法作金剛種皆大師力也大法自任絶無我相心直口快不顧時忌發願入狴獄酬宿債獄中度無量人乃說偈坐逝壽六十一越十一年憨大師茶毗之舍利無數生平專持毗舍浮佛偈亦以示人四十餘年脅不著席不見女人常露坐不避風霜重興梵剎十五所古宿語録若寂音尊者所著論文世所不聞盡搜刻之贊曰僧風久不振挺生大聖賢愛見一握斬法道全仔肩雄猛超龍象悲誓證無緣深知教外旨終藉文字傳創刻方冊藏助顯直指禪圜中酬宿債來去胡翩翩舍利鎮雙徑半偈功已圓愧我瞪乎後何時受策鞭夢中接引憨山大師第十八諱德清字澄印別號憨山和州人姓蔡生時白衣重包浴水異香口如仰月眉五彩髮紺青色十二歲出家二十六入燕盤山住月餘身世豁空胡順菴署中入定一七皆無取著住五臺八年夢法界圓融觀境又夢升彌勒樓閣聞說識智差別之義次住東海牢山豁悟楞嚴觀境後因方士流言逮下詔獄受種種刑神色不異夢大士安慰以百萬生靈託之遣戍雷陽力清曹溪祖庭為靈通侍者受戒代戴督府出師征撫猺獞果救百萬餘命晚赦歸南嶽次住匡山五乳峰閉關念佛晝夜六時各課萬聲庚申雪嶺峻師登山問安旭寄香一瓣蒙大師慈札獎導偈語開示辛酉大師復住曹溪壬戌旭決志出家三夢大師接引恨駑劣不能遠趨乃求峻師剃髮以是大師所讚許也癸亥冬旭在天台打七忽夢大師容稍憔悴似有所囑後知正屬示寂時矣壽七十八龕遷曹溪歷年二十開視之全身堅固衣服鮮明爪髮俱長皮膚黃白光潤如生遂金漆護之同六祖肉身供養贊曰長干佛陀里閒出名世豪氣宇似王者筆陳若江濤宗教任遊戲真俗隨逍遙履險不異坦就卑能屈高賢智望且怖愚劣親可翹生平半疑信末後始解嘲示我歸路穩哀哉甘自逃稽首慈誓力終當為我招自像贊三十三首謂爾為禪門庭弗專謂爾為教瓣香弗宣謂爾為律標榜弗虔形骸枯槁兮神情自豐資性鈍拙兮詮辨自雄觸著渠兮猛虎毒龍識得渠兮和氣春風據爾一狀自首漫云憲章紫柏可祖述永明壽仔細檢點將來不免萬年遺臭踢翻禪講窠臼掀開佛祖頭顱筆底轟雷掣電舌尖瓶水盤珠只有一端可笑依然具縛凡夫學無常師交無擇友重實輕名慈心毒口有時似孩提之童有時似喪家之狗不解趨吉避凶安知推薄居厚踏破溪山萬朵雲人前處處揚家醜抱嬰杵之苦思蒙李陵之垢辱眼孔爍破太空行履渾無可録廢既中清中權隱居放言成局讚毀一任諸方智旭元是智旭參禪禪不悟看教教不深持戒不具足念佛不一心慣掉掣空臂出入荊棘林訶佛亦罵祖狎獸兼友禽全身等微羽片語重千金支那國裏留個硜硜小人種千古萬古未審誰知音咄哉鍾大郎忒煞無拘束日夜恣無明增長貪瞋毒自讚復毀他指直還作曲玩弄佛與魔顛倒真與俗舉筆動舌時每使鬼神哭人說你聰明我說你木梏孟浪過一生究竟結何局不是生西方便是墮地獄單提極則正令不墮今時窠窟假饒黃蘗雲門未免遭吾一摑且道向上一句畢竟是個甚麼合掌稱云南無阿彌陀佛念佛像下八首同不度德不量力妄欲砥柱中流誰道連身汩沒努力扒將起來未免筋疲骨仄賴有金剛種子從來不受侵蝕彌陀一句作津梁阿鼻直達安樂國好個不唧溜漢前後絶無思算佛法講得許多煩惱何曾少斷雖然瑕不掩瑜爭奈夜猶未旦只有西方路熟且喜救得一半直待彌勒下生方了者重公案信得是心是佛乃信是心作佛所以枯坐喃喃專念阿彌陀佛偏要記串記千不學瞞頇鶻突無論專心散心聲聲滅罪八十億劫假使衆生界盡虛空界盡我此持名終無休歇不願成佛不求作祖不肯從今不敢畔古念念思歸極樂鄉心心只畏娑婆苦六字彌陀是話頭千磨百難誰能阻天下元非手可援且學顏淵權閉戶直待西方去復來普與塵沙擊法鼓願大不遺塵界膽小怕墮地獄見人嬉笑滿容禮佛悲哀痛哭終日輪串數珠唯恐萬聲未足縱有一隙獨明且無片長可録只圖下品蓮生便是終身定局豈敢大言欺世致使法門受辱野性懶且癖獨與竹石宜泉聲演佛號助我西方思有時瞑目坐遙隨落日馳有時高聲呼懸想母憶兒頗信感應理寧復惑他歧須彌或傾動我志不可移哀哉生死夢痼疾誰能醫庶幾一丘壑聊免蠅蝸癡生平少實德此像何勞傳獨有不欺心較勝近日禪願居衆人後不為一物先四儀持佛號弗論散與專信願終無二定育珍池蓮與爾衆上善歷劫形神聯不參禪不學教彌陀一句真心要不談玄不說妙數珠一串真風調由他譏任他笑念不沈兮亦不掉晝夜稱名誓弗忘專待慈尊光裏召懸知蓮萼已標名請君同上慈悲造徑山樓下迷卻父母生身永慶堂中依稀指鹿為馬九華靜室曾喫腐滓秕糠靈峰藏堂又復違於時夏而今向此枯樹裏胡思亂想作麼咄忽遇樹倒藤枯且喜相隨來也枯樹入禪像若欲利人何不向萬衆叢席揚名若欲自利何不向萬山深處藏身看你進退失據昧卻發覺初因雖然被他簡點且喜有理可申不願一日賣得千擔假但願千日賣不得一擔真說法相行年五十猶未知非七顛八倒簸舌鼓皮見惡不省見善不齊胡思亂想惹謗招疑踢破性相兩家界限翻倒南宗北教藩籬有時不恭則濫同下惠有時褊隘則倣佛伯夷獨得一點好訣竅失便宜處占便宜毗盧頂上不肯安身立命跛驢腳邊偏要尺退寸進可憐五十年來難得半時寧靜未知性具圓宗枉向鉢盂討柄已悟性惡法門元來即是病行猶憶十二三時便要豎賢聖幟而今五十餘年何嘗知得天德況進思三十未立四十多惑既不堪作宣尼子孫又豈堪稱釋迦兒息仔細簡將來只是一個騙飯喫的老賊胸中沒半個字腳筆下有萬卷詩書肚裏無分毫芥蒂舌頭有多少毀譽好像一科大樹只是其名曰樗著述相也是百萬人天知識也是三家村裏學究也是戒定慧的前茅也是貪瞋癡的領袖只因沒有的確師承到底只是個八不就生平過失深重猶幸頗知內訟渾身瑕玷如芒猶幸不敢覆藏藉此慚愧種子方堪送想樂邦以茲真語實語兼欲寄誡諸方不必學他口中爛翻五宗八教且先學他一點朴朴實實心腸昔年融師會裏或曾燒火掃地所以今在幽棲妄拈第一義諦不涉擬議思量不離語言文字人天大衆未免驚疑賴有湛公堪作證質切勿將此醜容竄入百祖隊中但可留與兒孫作箇古董玩器注盡十二部經不曾增減一字講盡八萬律儀不曾行得一事釋迦如來喚作不肖醜兒彌勒世尊訶為癡頑傲弟獨有阿彌陀佛藏垢納汙金手接向下品蓮花安置稽首蕅益真頂戴如來像此像既非真此真寧有兩諦觀像與真唯是自心想心不屬聖凡聖凡乃並朗凡夫坐蒲團聖應居其上凡因企聖果分明示諸掌念念恆現前形影終無爽我亦信弗疑爾亦安毋強覿面語默忘何勞復助長鎮古但如斯不覓時流賞欲從亦末由寧思更鑽仰白日臨青天遍界消魑魍愚昧任譏嗤龍神任稽顙箇事絶成虧十尺元一丈但駕慈悲航同搖般若槳法界為津梁直尋豈尺枉更問古觀音方知若應響蘊慈合掌問持戒我說持戒須蘊慈慈是下化衆生本慈是上求佛道基不殺不盜不淫妄拔苦與樂功甚奇專護性遮令清淨仍須念佛求生西設不求生極樂國只恐仍遭隔陰迷設能信願求彼土雖曾有犯亦成機是以我今但念佛一句彌陀法界師不勞學漱趙州口不勞學奮雲門威聲聲坐斷聖凡路四句咸離絶百非三身四德覿體露爍破鳥空鼠即癡蘊慈蘊慈應諦信佛號圓成八萬儀人知其貶古斥今不思忌諱不知其談教說禪不立文字上法座兮口若懸河下法座兮目無所視從朝至暮稱阿彌矻矻孳孳將數記三十年來不改弦從茲堪盡未來際十種可盡念無盡一切三昧一三昧具縛凡夫甚希有決不妄言聖賢位蒼暉若欲恆相隨剎那勇發菩提志蒼雲傳我容問我何行腳我行苦且長為君說其略十二從外傅立志為聖學誤造謗法罪幾至大墮落十七聞佛言幡然始改惡二十丁父憂悲極如夢覺見地藏本願且哭且欣躍次年書懺法腪酒戒不卻草三聽楞嚴急參者一著草四逃出家處處遍尋摸雲棲及雙徑天台來往數但自究根源不問他人彴甫得門路清遂遇境緣虐虛名日已彰功行日以弱至年三十八大病為良藥高臥九子峰糠滓堪咀嚼甫注梵網經遂有溫陵約抱病述玄文抉開千古膜從閩至吳興乃到長干郭注述雖云富將錯還就錯今年五十三依然是具縛損己以利人古聖所嗟愕深悔亦較遲靈峰聊暫托一句阿彌陀堪為良夜柝汝但挹我清勿更同豫濁露出娘生半身數出今生敗缺慕憨翁之擔當法門不能學其不避斧鉞慕雪浪之力掃葛藤不宜學其一味輕忽慕雲棲之盛德謙光不能學其廣作舟筏慕壽昌之真參實悟不能學其到底不歇慕幽溪之中興台觀不宜學其單守一橛慕顓愚之冰霜操履不能學其大辨若訥願學紫柏之宗教圓明遠不及其純鋼鑄骨噫此是吳門不唧溜的鍾振之而今又喚作北天目的老矻硉幾翻鼓翼欲騰空幾翻又向荒原蹶只有一句阿彌陀佛認得真源泉畢竟歸滄渤生平不解藏拙露此贓私頑劣說起倣佛依稀覿面何嘗親切賴有一串數珠卻是生平祕訣所以喚作蕅益未是證龜為鱉寄語理安法友不必思量分別但如丁蘭事親管取刺之出血此是蕅益道人生平不善逃名處處藏頭露尾可恥聲聞過情偶向豐南揚家醜天鼓毒鼓仍齊鳴勦絶百千歧曲路直教同作蓮邦民平生自救不了只為門前之繞而今始解藏身驀入靈峰深島拋開世上繩鞭取足山中水草少室天台盡踏翻東土西天皆觸倒簡點身心過失多徘徊今古知音少畢竟誰為楊子雲問取禾城姚廣老
