body:
  text: 答問三答大佛頂經二十二問原問附問阿難登伽同藉咒力何登伽先證三果阿難後獲法身答如來說法賢愚利鈍先後證悟萬有不齊此何足疑若論二人本地皆大權發起悟有先後俱為物作則若就跡論登伽欲熾急者先治阿難圓解未開顯說方悟儻不消欲心阿難何由得脫儻阿難先證大教何由得啓觀跡知本亦非二致問由心生故種種法生由法生故種種心生若法先云何心生法生若心先云何法生心生若心法一云何相由若二畢竟孰先孰後答心法本非一異非一故妄情得說相由非異故終無先後如冰水同一溼性若問溼與水冰孰先孰後終不可得然約迷妄可於無先後中強說先後性覺必明妄為明覺心生法生也引起塵勞煩惱等法生心生也故曰惑業苦三更相由藉至妄明不起則性覺亦不受心性之名既可名心亦可名法以是法性法界法住法位故也當知心法俱是假名實無二體無二而二不變隨緣二而不二隨緣不變故此二語雖一往約迷實顯心外無法法外無心之旨蓋迷則不惟妄心妄法似有二別即全舉真心真法而成二妄如空成華水成冰麻成蛇若悟則不惟真心真法從來無二即全舉妄心妄法而歸一真如華本空冰即水蛇即麻也問阿難自說即能推者我將為心如何判其但認所推答衆生迷己為物認物為己皆以所作能若達能推之性演若悟頭不狂走矣文句釋能推為心曰阿難雖以能推為心實是所推影子非真能推者真能推者雖是第六意識見分而此見分便不在內外中閒本離過絶非如眼不見眼何可舉似而曰即能推者我將為心邪故如來訶云汝執分別覺觀所了知性必為心者此心應離色香味觸別有全性明指為所了知性非能了知性矣圓覺妄認六塵緣影為自心相此經謂前塵虛妄相想皆是物也阿難云離此覺知更無所有豈非認緣氣為覺知緣氣是所知影像非能知能覺之見分以見分從來無相故也見分無相誤為有相便成蛇見若了見分雖妄實本無相則依他當下消歸圓成天台所以專立第六識為所觀境譬鑽木出火火即燒木合于此經識陰本如來藏性識明知覺明真識等語不啻如空合空水合水此直指人心見性成佛不動一步久已到家真無上圓頓法印也阿難未證初果全墮凡外無心計心之過如來種種徵破不過欲其覓心了不可得而已問緣心現有其用如何決不能推經言汝等尚以緣心聽法此則亦許緣心能聽答一切法名色盡之眼耳鼻舌身色聲香味觸法皆色也受想行識皆名也名者但有名字無色相也是故八心王五十一心所其相分皆色也其見分皆名也經云妄有緣氣於中積聚假名為心見分惟有名如何可稱為氣可積聚於中邪緣氣積聚則一件物一件物則是相分唯識云相分理無能緣用故阿難認為能緣亦如認目有見浮塵目必不能見緣影心必不能知故破云尚以緣心聽法正謂緣心是緣氣亦名風大決無聽法功能尚誤為能聽法邪此從我法音為緣起於法音影子非得我所指心性也古人云卻是虛空能講今例云卻是虛空能聽何如何如至此漏逗不少知我罪我未審何人問阿難獲法身而不解脫富樓那得羅漢而有疑悔若止悟理豈有理外之事若但事障清淨豈有事外之理設理障理遣事障事除互不相攝何成圓宗答阿難煩惱障重滿慈所知障重由事理不二而二仍分根本枝末也如樹根枝葉同屬大地四微亦自不分而分阿難斫根枝葉尚青滿慈枯枝根尚未拔至理障理遣二語復通四教不得直以煩惱為事障所知為理障界內界外各論事理二行故也問三卷中阿難既獲法身何更數求開示四卷中疑惑銷除心悟實相而又如旅泊之人得屋求門不幾法身在門外邪答法身亡得失絶內外只緣迷悟有殊曲分修證差別雖約修證不礙性真如虛空非丈尺丈尺顯虛空三卷獲法身約相似解行四卷請入門約分證智斷不相違也古人云道曠無涯逢人不盡大悟一十八小悟不計數此阿難所以番番開悟處處陳疑終不未足中生滿足想也堪嗟末世瞎鍊盲修於靜境中稍得一兩番六塵乍息光景便謂千了百當自誤誤他并相似法身尚未夢見況親窺華屋門邪佛法不是者個道理慎之慎之問水土二物性本真空何必去泥土取清水乎答水土不出虛空喻十界五陰不離藏性今既以清水喻九界中佛界五陰以泥土喻佛界中九界五陰必棄九界濁成佛界清若泥土不必去則自性衆生不必度自性煩惱不必斷若清水不必取則自性法門不必學自性佛道不必成執性廢修成大邪見問既以可作法喻十八界生滅相以虛空喻如來藏不生滅性矣何又以水土相投喻阿難等身中五濁以去泥純水喻如來常樂我淨邪文句雖以五濁合可作喻以純水合虛空喻然如來何不直依如虛空之藏性為本修因乃別令澄濁得清邪答經云如澄濁水貯於靜器器仍喻十八界七大而器中空則喻十八界七大皆藏性也十八界七大皆得為所觀境喻之以器境中本具妙諦喻器中空能觀境諦之智喻所貯水也蓋水喻見分土喻相分六凡衆生見分必取同居土相二乘衆生見分必取方便土相菩薩衆生見分必取實報土相故皆濁唯佛見分直緣真如不復變帶三土妄相如貯水器中之空至明相精純則八識轉成四智以根本智無相分故名去泥純水以後得智能現相故名一切變現雖有變現仍是無漏故云不為煩惱皆合涅槃清淨妙德也是知以虛空喻不生滅性證之成無為無漏功德即是法身亦即大乘止觀淨分真實性也以純清水喻佛果四智菩提證之成有為無漏功德即是報身亦即大乘止觀淨分依他性唯識謂其純無漏亦可攝歸圓成實性也以一切變現喻佛果利他功德所謂嬰兒行病行等即是化身亦即大乘止觀淨分分別性也如次配三涅槃三菩提三德祕藏皆無不可佛語巧妙佛意深遠豈片言隻義能盡哉問空喻涅槃則了因所了水喻菩提仍生因所生豈皆元清淨體邪又空無邊際水有涯畔不幾涅槃理遍菩提智不遍邪答清水元非生因所生以濁水中本具清水性故澄濁得清可喻轉識成智但轉其名無實性故不同相宗權說也空水邊畔此觀相元妄耳性水真空性空真水清淨本然等周法界問阿難已獲似位法身何聞不明自發語仍疑見聽離塵畢竟無體以為斷滅邪初徵心在迷此已悟性真何更指前為例也答阿難此時見惑已斷知六根虛妄無我我所不執緣影為心但思惑及無明未斷故欲棄妄求真未能了妄即真夫二決定義意在定境修觀譬澄濁得清不棄濁水別求清水阿難執現前濁相疑無清水性不知清水性即在濁水中也占察云初心應先習唯心識觀南嶽止觀亦誡不得即觀圓成良以圓成之性全在依他及分別中離現前分別及依他境別無圓成實性可得全水成波波外更無別水故也末世禪流昧定境修觀妙旨離於事境高談理性所計理性還成分別所謂未證無為而辨圓覺彼圓覺性即同流轉毫釐有差天地懸隔阿難深知此弊方發此疑也問龍王河女空神能聽聞觸覺不依浮塵勝義何住若無勝義不應是凡又勝義根有證知處否答勝義依浮塵約迷妄言耳龍以角聽勝義依角河神鼻根亦可例知空神無業果粗色有定果色依之覺觸然此段文正顯六根之性不藉浮勝二根在凡在聖其理無二非謂無勝義即聖有勝義即凡也但凡夫迷己為物又認物為己故見聞覺知必賴浮勝二根聖人背塵合覺即全塵是覺故得寄根明發六根互用謂聖無六根可也謂聖方有六根可也至於凡夫勝義根但可比知若無六根終不發識如無燈炷焰則不生焰但照他不照燈炷問如耳根何者是六識七識八識又從聞思修此思在六識如何用心又如何辨此七之思八之思答耳之浮塵勝義二根俱第八識相分聞精即第八見分也八七法爾相緣依第七復發第六意識與耳根所發耳識同緣聲相此八識相緣起也思修思字正是諦觀聞性即空即假即中不隨聲色流轉此名雖同遍行五中之思實與妙觀察智相應又與別境中慧並起并與善中信等相扶故名思慧若尋常釋思則以令心造作為性於善品等役心為業與第六相應者同彼遍緣三量與第七相應者同彼但緣內我與第八相應者同彼於不可知執受處了此思相差別也問初心反聞性時又被色香味觸法牽動未審當境推破入真流邪還歸本根入真流邪答餘塵牽動只是工夫不得力見地不清楚耳果於耳門悟圓通常以此圓通常觀歷一一法皆耳門三昧故曰此是微塵佛一路涅槃門至於順治逆治隨樂隨宜隨治隨理不可執一摩訶止觀立十境初觀陰心餘界入并後九境待發方觀知此例者修心之要不泣岐矣問身心二俱捐捨將何修入三摩地寧復別有一身心邪答執我之心乃生死根由此我執方愛其身而有身即是我離身有我我大身小身大我小之四別若謂身即是我萬無肯捨之事縱妄計捨則斷滅更無後苦仍未達此妄計之心即是苦本若謂離身有我見身多苦捨令無苦此正由我見捨身非能捨此我見心也惟將此四種我見一齊放捨則幻身亦決可捨二俱捐捨則二俱妙用便可入三摩地故知只此身心放得下流賊便為良民放不下良民便為流賊耳問初下手時待不得力而後持咒助邪或持咒與所觀境並進邪兼二亦名一門深入否答衆生根性萬別千差或顯悟或密證或須助或不須助事非一等皆是一門深入若無障緣直修境觀若恐障侵兼持密印顯密正助並須與妙觀相應方合一門深入之旨問遠論動源過在無始近論只是當念離當念有無始否若有何得一念了卻若無何得有今一念答離當念別無無始可論現前一念即豎窮橫遍之全體根身器界善惡種子離現前一念竟無少許實法可得故曰十世古今始終不離於當念問既獲法身復請至何漸次得修行目詣何方所名入地中豈法身有差別漸次邪答法身無差別差別不離法身修行無漸次漸次依於修行如虛空無遠近遠近不離虛空奮飛無漸次漸次依於奮飛阿難悟心即悟無差別性猶如太虛所請修行即是圓行猶如奮飛由奮飛遠近得論漸次差別若只許無漸次無差別義則是以性廢修昧即而常六之旨且既無差別亦無無差別可得無漸次亦無非漸次可得如無遠近亦無虛空六義既昧即亦不成須達全性起修全修在性則從始至終皆以佛知佛見而為修行圓家之漸即漸是圓非漸圓可比也問固身常住長不傾逝且色陰既空受想行陰都滅從何起此長想指何色為身邪答五陰互相攝屬色陰未破五陰皆色也色破受現五皆受也受破想存五皆想也想破行顯五皆行也今行破識露則五皆識也是故生滅雖滅而於寂滅精妙未圓之中法爾仍具五陰只此色受想行罔非寂滅未圓境界豈行人至此竟無色身亦無苦樂覺觀舉止動靜等邪良由第六識相應心行於定境修觀時如次觀於識陰境界見識陰之精圓而生長想此想即從觀行起此色即識陰所執受也問第六外道圓虛無心以永滅依為所歸依注云令不恆行心心所滅也功力至此應侔聖流而成斷滅過在何所既斷滅又何果可成種可得邪答無想定中雖滅不恆行心心所法秖由計明中虛以為方便則見惑全在所以下地思惑雖伏仍堅執無想天之生死妄想誤為真實決定不入聖流過在不曾真實先開圓解所以觀行位中見此寂滅境界不知全是顛倒微細精想而生勝解也雖云斷滅非真斷滅仍是十二類生所攝所謂枯槁亂想無想羯南故名為種亦名為果也問首楞嚴大定從觀行入即以觀行為定邪為有次第有出入邪畢竟至究竟方可稱大定邪答欲知大定體相須明性修妙旨衆生本具大佛頂性即大定之體如云陰入處界乃至七大皆如來藏妙真如性則皆大定體性也衆生在迷但有理即大定悟此理是名字大定依佛知佛見而為修行是觀行大定觀行功深相似理發六根清淨如鑽火得煙是相似大定於頭頭法法中分證三德祕藏之理是分證大定乃至徹證無缺無餘是究竟大定始終理一名之為性六位轉變功在於修修不在性外悟性方成修如奕者得勝不離棋局知局方可取勝也問從破七處至顯藏性體用彰真俗顯天地同根萬物一體無生死可得無涅槃可證矣又選耳根為方便耳根即聞見覺知熾然成異乃光影門頭於常住真心自相逾越何從修證入三摩提邪答不悟妙性無以成修不事真修無以顯性經初破緣影非心顯見性非物會四科以歸性明七大之遍圓喻以狂走而頭不失貧乞而珠自存皆直指人心見性成佛顯圓融諦理以開妙悟者也次即依妙悟以起真修借此方最利之耳根薦取本圓本通本常之性體故得名為以不生不滅為本修因然後圓成果地修證此真金剛寶劍何惑不破何理不彰若不知耳根之性即如來藏妙真如性漫云同一體無生死無涅槃全墮光影門頭相似語句其不知此經宗趣甚矣試取擊鐘驗常處一番問辨沈思細玩自知所問之非也問多聞無功不逮修習憶持十方如來十二部經清淨妙理如恆河沙秖益戲論積劫聞熏不能免難歷劫憶持如來祕密妙嚴不如一日修無漏業阿難尚如此訶今人設持此經亦何益邪答阿難病不反聞非病多聞經訶一向徒聞非教無聞正以今人愚鈍依教修行猶恐失足癡禪暗證墮落何疑所以曲隨根性且令持此深經利者得以隨文入證鈍者亦可永為道種庶免無聞比丘之禍也教觀要旨答問十三則原問附問三界唯心萬法唯識二義同邪異邪答心識通有真妄局則心約真識約妄唯心是性宗義依此立真如實觀唯識是相宗義依此立唯心識觀料簡二觀須尋占察行法方知同而異異而同矣問遍計依他須破圓成還須破否圓成不須破遍計依他亦不須破否破與不破乞師細剖答三性元非定三亦非定一言遍計依他入圓成實者只達遍計本空依他如幻即是圓成實性非別有也若存圓成實見還是遍計亦須破盡若知三性即三無性則遍計依他本無可破無可破所以具明淨分三性須破盡所以復明三無性也更以喻明達繩即麻則依他非實遍計安有謂繩是蛇則麻性不改恐怖妄生迷時全麻是蛇蛇繩麻皆迷情悟時全蛇是麻麻繩蛇皆悟境儻謂麻即繩麻非繩麻亦繩亦非繩麻非繩非非繩又謂繩即蛇繩非蛇繩亦蛇亦非蛇繩非蛇非非蛇乃至展轉互作四句皆成遍計若不起性計深知不變隨緣隨緣不變之理以四悉檀因緣巧說種種四句則三性三無性二義並成故知非破非立而論破立破立同時破立不二問三因圓具方稱圓修請示現前一念何為正緣了及一一位中因相差別令不生上慢退屈也答性具三因止現前惑業苦三而已惑即了因種子業即緣因種子苦即正因佛性也若就行人點三因者能觀觀即了因佛性所觀境即緣因佛性若能若所若心若法唯一實諦即正因佛性了知此三依此修習是名字位相此觀力深圓伏五住是觀行位相六根清淨是相似位相八相成道三身圓顯是分證位相盡無明源窮覺海邊底是究竟位相知一念圓具三因安生退屈知道力非可浪階安生上慢思之修之問正觀心時豎窮橫遍微塵剎土一念圓具如是觀察契具字法門否設起異見以四運四性推之設不起異見止如上念念現前邪或有他法邪答秖是虛解未實現前還將二種觀道善巧進修別無他術的於一塵中見法界性相始終方成妙觀問正觀心時眼見色如鏡照像耳聞聲如空中風乃至意識覓能緣者了無蹤跡正恁麼時如何又有時如無事人有時如知事人有時如有事人有時如疑事人盤結在心如何併除答見色如鏡像聞聲若空風能緣無蹤跡皆色陰未破境界須推此覓能緣者阿誰能覓不暫時忘卻四運工夫即了義正修如無事時四運推破不可坐在無事甲裡如知事有事疑事時推此知者有者疑者如此則盤結自除不必畏其盤結立意併除也問推揀時心不可得何有三觀境不可得何有三諦心境總不可得何有能所如是契了義否答心境不可得為竟斷滅邪若竟斷滅只今誰問此法若不斷滅心不可得真是一心三觀境不可得真是一境三諦若總不可得能所融絶真是心境不二虎溪尊者頌云境為妙假觀為空境觀雙忘即是中忘照何曾有先後一心圓絶了無蹤唯忘故照唯照故忘果然一名不落則萬別千差名義俱彰矣問根身器界達之唯一心建立此心有邪無邪亦有無邪非有無邪若在當人密悟就悟處有淺深邪正否邪答根身器界無論達與不達從來只是唯心非心建立法非法從心立若有能建所建不名唯心以心外無法故名唯心唯心則唯色唯香等義一切俱成此妙心法離四句絶百非唯以妙悟領之悉檀說之的的可於四門入道但不落四句而圓照四句即為正為深儻離四句又墮第五不可說句中即為邪為淺問集要釋一體三寶云現在一念本具三諦在迷不覺是為法寶能覺三諦之智是為佛寶諦智和合是為僧寶夫衆生念念趣境不了自心觸處相違無能覺智及和合義豈唯具法寶邪答衆生趣境果有心外之境可趣邪果離覺體外有能趣之妄念邪即彼能趣妄覺所趣妄法果可分別令各在一處邪若念念趣外終無外法可趣亦無離覺體之念亦無二處可分則理即三寶煥然問介爾之心本無邊畔去來亦非斷滅今念念閒策善不敢違思惡不敢匿每向三尊前求哀悔過如是用心契正修否答能策能思之心與所策所思之善惡有邊畔去來可得否若達善惡之性即是實性無形像邊畔動靜去來始終生滅則必修善日增修惡日損而增損了不可得即是正修行路若見有善可增有惡可損成於偏小若不見有任其善惡成於魔外審之問持經時如何即字字句句當體不思議境答字句法性本不可思議更問如何成思議矣若平日觀心得力正持經念佛不與觀心違此真如實觀之門未達者須用唯心識觀四運四性推此字句之性若知其當體即空舉體即假亦復即中則思議心息矣問煩惱即菩提生死即涅槃為約迷約悟約性約修答法爾理性不關迷悟悟知其即非悟方即迷不知即未嘗不即惟有此即是之性方可起即是之修所起之修究竟即性無性外少法可得問一念不生全體現一念不生即如如佛為復惟圓頓邪亦有偏有漸有邪正邪答以名定義萬無一得以義定名萬無一失圓頓之談隨類各解外人計緣影為心如石壓草制令不生謂是即如如佛其實成無想外道稟藏教人知根塵為緣則有念生遠離根塵念性永寂得入涅槃名如如佛其實止成小果稟通教人了知念無自性求其生相了不可得名如如佛其實止是乾慧稟別教人謂生者是妄識真如凝然不生名如如佛亦名素法身還須智行嚴之惟有稟圓教人了知現前一念即是法界不變隨緣無生說生隨緣不變生即不生是故全體顯現名如如佛即與三世諸佛體用平等前三教為偏惟圓教為圓後三教俱有頓義惟藏教屬漸四教皆正外道為邪嗟嗟世之乘言滯句者輒云一念不生即如如佛曾簡點及此邪圓頓宗旨有名無義久矣問中論一偈以配四教為定別配邪亦隨類各解邪幸剖實義以驗教眼答偈攝權實事理罄無不周天台依立四教前不具後後必具前載在廣文昭若日月矣若隨類各解復各四別如因緣所生法有人聞之便謂諸法仗因託緣展轉生起別無梵天微塵等以為因緣亦非無因無緣而有諸法又人知因無實因緣無實緣生無實生法無實法如空華夢物說名因緣所生又人知無明為因境界為緣出生十界因果差別又人知一心具足三千性相為因隨於迷悟具成十界染淨為緣次即空句有人聞之便謂諸法無我我所故空又人謂法體自空非滅故空又人謂法無實性體不可得故空又人謂法法非空非假非中三諦俱破故空次假名句有人聞之便謂俗諦是有故稱假名又人謂諸法如幻故稱假名又人謂法法出生十界因果差別故稱假名又人謂法法即空即假即中三諦俱立故稱假名次中道句有人聞之便謂離斷離常故名中道又人謂真俗不二故中又人謂非空非假故中又人謂法法無非實相實性假空皆中不見有法異於法界故中然初一人無我我所之空生死非即涅槃空義不成俗諦是有之假法法不相融攝假義不成離斷離常之中不證法身應本中義不成核實秖成因緣所生法一句耳第二人諸法如幻之假不知幻復作幻假義不成真俗不二之中不知中體不空中義不成核實秖成因緣即空句耳第三人非空非假之中不知中道具一切法遍一切法不知法法無非中道核實秖成因緣即空即假句耳惟第四人了知因即法界攝一切法更無一法出過於因緣即法界乃至能生所生罔非法界空亦法界假亦法界中亦法界通則具收四句別則即中一句便足此智者大師所以棄通取別直依四句而明四教也復次因緣所生法即生滅四諦我說即是空即無生四諦亦名為假名即無量四諦亦名中道義即無作四諦復次知正因緣境者生滅無生無量無作皆因緣也知即空者皆即空也知即假者皆假名也知中道者皆中道也復次知生滅四諦者因緣空假中皆生滅也知無生四諦者皆無生也知無量四諦者皆無量也知無作四諦者皆無作也答徐仲韜問中論四句偈深談諦理不涉觀照工夫諦理明白觀照在其中矣先分為二初句舉事境下三句顯三諦舉事境不論色心假實皆仗因託緣而生偏指十界十如百界千如三千性相一一皆名因緣所生法若謂心為塵因塵為心緣窒礙甚矣此句走卻線索下文如何著落況空假中直就所生法圓具圓現不得次第解尤不得牽帶觀門教眼精妙決非粗心浮氣可領姑俟居士行門成就轉身拶入耳略說但云因緣所生種種事境無不當下即空假中便了若細談雖九旬未罄其旨今即空句半是半非假中全然遠隔可輒厝心動筆邪答何二華問欲明大般涅槃須知小乘無餘涅槃之義小義未了何由議大今明無餘涅槃一祕相而談二開顯而說祕相者佛與耆婆至一荒郊連舉枯骨問其在生善惡男女壽夭乃至死歸何處毫無錯答佛遙向他山取一骨耆婆再三彈聽茫然不知佛云此羅漢骨已忘我相已斷後有非三世所攝三界所繫汝不能知也由此觀之無餘涅槃已不可思議況大涅槃哉莫見此說便作斷滅之解外道問羅漢死後有無佛言皆是戲論又問畢竟如何佛言積薪投以芥火燒蔓不絶展轉投薪展轉遠熾設使薪盡火則隨滅此火為有去處無去處為斷滅非斷滅外道言火無去處亦非斷滅此處火滅非一切火性皆滅佛言羅漢亦如是惑業薪盡果報火滅何可言有去不去斷與不斷此祕相而談也開顯者二乘但斷界內分段生死猶未永斷界外變易生死雖凡聖同居土無受生處猶受方便有餘土法性之身雖非斷常仍似有來去也如來五住究盡二死永亡知一切法無非即心自性不離當處寂湛圓常約正報名清淨法身約依報名常寂光土約智德名無上菩提約斷德名大般涅槃身土不二智斷難思以要言之無一微塵不是如來不思議法界全體大用故云佛身充滿於法界普現一切群生前牆壁瓦礫清淨法身一色一香無非中道當知衆生生死輪回境界盡是如來大般涅槃境界醉人所見轉屋即醒人所見不轉之屋無二屋也佛成無上覺親證諸法本來常寂滅相不出不入不滅不生為性淨涅槃二死因果永斷名圓淨涅槃為衆生故示生示滅為方便淨涅槃經謂佛涅槃即方便淨之相非彌陀無量劫後方證大涅槃也答比丘戒五問原問附問毗尼之學人天可保福盡將如之何孰若宗教先開眼目以道共戒為急務貴見地不貴行履詎不然乎答毗尼之學出世正因戒波羅密佛地方滿豈僅人天福邪宗教開眼言雖相似但離戒別談宗教便墮惡見溈山云毗尼法席尚未叨陪了義上乘豈能甄別荊溪云用前四戒為境以六觀之事理相即當知篇聚一不可虧世人蔑事欲尚深理驗知此觀孤虛無本既虧觀境觀亦無從宗教誠訓昭然胡弗思也無上戒而判屬人天捨律儀而空談道共正見已破行履必荒惡趣三塗敢保有分人天不可得矣問末世鈍根只宜要略四分律藏世尚畏繁何不宗四分戒本略加旁注釋疑答固守癡頑終無釋疑之日必須博學反約乃克有濟戒本旁釋開遮持犯安能洞然樂佛法者既難以通習懈怠者仍未必學進退失措有何利益問念佛一門廣大簡易一心念佛自然止惡防非律相浩繁已非簡易果極聲聞又非廣大不若專弘淨土之妙也答持戒念佛本是一門淨戒為因淨土為果若以持名為徑學律為紆既違顧命誠言寧成念佛三昧多纏障垢淨土豈生夫如海無涯豈不廣大保任解脫豈不簡易故一心念佛者必思止惡防非而專精律學專精律學者方能決定往生而一心念佛現在紹隆僧寶臨終上品上生法門之妙孰過於此只一大事何得乖張取笑識者問罪因譏嫌制有隨方此方不譏何乖聖訓又時丁末運外緣不豐內因微薄必欲纖毫無犯而演教弘宗則佛法不能廣布完小節而失大益豈菩薩本心答如來一切知見普為大千衆生而制戒律六群等亦大權示現曲體末世情態而示犯緣正由人情懈怠不肯輕重等護致成末運今欲弘宗演教必以持戒為本內因淳厚外緣自豐白毫相中一分光明決非誑語若以戒為小節便成謗法談宗說教皆是儱侗瞞盰設獲外緣總名魔業何益正法哉問西乾列祖三學精通此閒地僻時遙人罕閒見唯唐宋來數輩宗匠蹤跡彰著然當其水邊林下則以三條篾一把鋤為清淨自活逮其匡徒領衆則以一日不作一日不食為真實芳規至於揚化接人則以一棒一喝為拈提向上俱與律學不相應好心出家之流由行腳入山至登座披衣所倣效者無非此等今還許從上諸祖是真比丘否若非何紹祖位若是何不遵律又今紹祖位者例輕律學從上諸祖亦輕視否又今紹祖位者不遵戒而為人授戒從上諸祖亦為人授戒否答祖有三類一者嚴淨毗尼弘範三界如遠公智者左溪永嘉荊溪大梅永明高峰中峰楚石等是也古今如此知識亦甚衆多所應景仰倣效二者丁茲末世勢不獲已遵佛遺命捨微細戒住靜則刀耕火種領衆則墾土開田然非時食等諸戒仍自遵行故晚用藥石不用粥飯德山托鉢亦因視影而此等知識便不肯為人授戒所以唐宋以來有禪講律寺初出家多學律律有得則以律名家無得則習講參禪但捨微細戒不捨重戒及性戒也復有徑投禪教者此即乘急戒緩然亦護根本五戒斷無毀重之理而決不敢自稱比丘輕視律學但愧未能以為慚德至出世接人或重登戒品性遮皆淨如六祖等或單提向上獨接一機如壽昌等人問壽昌佛制比丘不得掘地損傷草木今何耕種藝穫答云我輩秖悟佛心堪傳祖意指示當機令識心性耳正法格之僅稱剃髮居士何敢當比丘名問設有如法比丘師何以視之答當敬如佛待以師禮非不為也實未能也又紫柏大師生平一粥一飯無雜食脅不著席四十餘年猶以未能持微細戒終不敢為人授沙彌及比丘法必不得已則授五戒法耳嗟乎從上諸祖敬視律學如此豈敢輕之若輕律者定屬邪見非宗匠也三者大用現前觀機利益破他疑執不拘恆規如文殊菩薩執劍逼佛三處度夏重勝比丘與女同坐令證無生乃至寒拾之訶律主歸南之斬貓蛇譬良醫砒霜治病大將奇計除賊而不可為典要又凡訶佛罵祖痛棒毒喝皆不得已而用所謂兵者不祥之器非布帛菽粟也用得當跡似違律實真持律以得律意故如經謂末利夫人飲酒救殺佛讚其真持齊戒菩薩見機得殺盜等於菩薩戒無所違犯生多功德也若失其宜將作門庭施設如優孟之學叔敖宗既非宗律又非律謗大般若疑誤後學三塗劇報何由得免設亦誘引愚流作種種福福力所持不即墮落終為外魔眷屬非佛弟子末世多此妖邪誑惑世閒魔所攝助多得供養聚衆百千人眷屬兒孫遍天下毀戒毀教破壞如來真正法輪愚小無知羡彼名聲而爭倣效令好心出家者皆墮其黨求升反墜哀哉痛心然由仍以三寶為所緣境罪報畢時還藉佛法僧戒之力而得度脫魔王語佛吾於汝末法中令眷屬食汝飯著汝衣破壞汝法佛言汝但自壞法不壞也今欲不墮三塗竟登聖果請必從持戒始若挂名受戒又輕視戒法既不精戒法又為人授戒既為人授戒又不教學戒且言戒是小乘不須習學則決墮三塗為魔眷屬自受其苦無人能代終亦必皆成佛我不敢輕之矣答唐宜之問書義有引智及之即大學格物致知中庸擇乎中庸得一善也仁守之即大學誠意正心中庸拳拳服膺而弗失之也莊蒞之即大學修身中庸誠身也動之以禮即大學齊家治國平天下中庸順親信友獲上也聖人說法應病與藥若為智未及者則云知德者鮮矣以思無益不如學也思而不學則殆此孟子重始條理意也今責智及之者以仁守之功正孟子兼重終條理意中而不至亦非善射況不至便不中巧力俱不可輕但先論巧後論力耳乾知大始坤作成物有坤無乾固不可有乾無坤又豈可哉非初步無以為究竟之始非到家無以結初步之局此儒門智仁合一之學與佛門解行互徹之旨相類也儒不更贅請言佛氏之學須分四教以辨內外小大偏圓細思之勿忽藏教知三界苦空無常無我不淨名智及之念念與四念處觀相應不起見思煩惱名仁能守之身口意業恆與三千八萬律儀相應名莊以蒞之得不忘念一切時中應機設教名動之以禮鬱頭藍弗入有頂定亦似仁守威儀庠序寂靜似莊蒞以自所謂定門攝化多人服從其道似動之以禮由智未及於出世法故所以守不名仁蒞不名莊動不名禮鬱頭亦是智及了非非想處仁能守非非想處者但非出世閒之智耳須陀洹捨戒還俗是智及之仁不能守之舍利弗瞋習畢陵伽慢習難陀貪習憍梵鉢提齝習等是仁能守之不莊以蒞之迦葉目連等神通作意方有是動之不以禮通教知三界夢幻空華水月名智及之念念與即空觀相應名仁能守之莊以二句並與藏教同藏教極果雖到動之以禮境界不達諸法本空不名智及之智既未及不名仁守等也見地薄地亦有捨戒還俗者是不能守已辦地不侵習是不莊蒞支佛地習氣未盡是動之不以禮別教知生死是有邊涅槃是無邊真如法性非有非無依真如乃成生死之有涅槃之無名智及之先以空觀斷見思惑出生死有邊名仁能守之次假觀破塵沙惑出涅槃無邊名莊以蒞之後中觀破無明惑證中道體從體起用名動之以禮通教極果雖到動之以禮境界不達中道法性不名智及之智既未及不名仁守等也十信有退是仁不能守之十住自利是不莊以蒞之十行未修中道十向未證中道是動之不以禮圓教知一切法皆是佛法法界實相性相常住一色一香無非中道生死即涅槃煩惱即菩提遍能破除一切世出世法遍能建立一切世出世法遍能統攝融貫一切世出世法名智及之念念與此圓妙止觀相應圓伏五住煩惱名仁能守之六根清淨名莊以蒞之入無功用妙道名動之以禮又圓教智仁莊禮一一圓融一一互攝非一非四而一而四名字位中則有名字智仁莊禮乃至究竟位中則有究竟智仁莊禮今以名字智仁莊禮總名智及之觀行智仁莊禮總名仁能守之相似智仁莊禮總名莊以蒞之分證究竟智仁莊禮總名動之以禮圓融不礙行布行布不礙圓融以無為法而有差別此之謂也別教十向雖得相似動之以禮境界未達中道圓融不思議性不名智及之智既未及不名仁守等也名字開圓解未伏煩惱是仁不能守之觀行伏五住未淨六根是不莊以蒞之相似淨六根未入無功用道是動之不以禮溈山大師謂此宗難得其妙切須仔細用心乃深歎圓教智及之之難也可中頓悟正因便是出塵階漸生生若能不退佛階決定可期此於圓教智及之者責仁守全功也答成唯識論十五問原問附問末那與慧相應故因中隨第六識轉而為智藏識不與慧俱至果方圓前五既有慧俱又與善俱復是轉識所攝何故不隨第六因中轉亦至果方圓邪答末那之慧即是我見我見無自體直以慧為體也第六識入二觀第七識二執不得現行故得轉為平等性智然第六出法空觀第七仍起法執第六出生空觀第七仍起我執矣但第七是第六不共親依故六轉七不得不轉若前五識雖有慧俱既無我見相應則慧甚劣雖與善俱由第六善或境界善暫得相應無斷惑證理之能以凡斷惑須在定心定心中多無前五識故直至果位第八識中有漏種盡轉與大圓鏡智相應名無垢識從此淨識所變五根相分純無漏故依之發識亦成無漏名成所作智相應心品僅屬果上化他之用非能自利不同第七識也問有我見故餘見不生無一心中有二慧故云何既有我見又得與慧相應答心所有假實如別境中慧則有自體十煩惱中五見無體惟以染慧為體今第七相應之慧未轉舉體為我見法見已轉舉體為平等性智故云約義別也豈一心中有二慧邪問末那俱之我見以慧為體由義別故仍以慧俱忘念以念為體何不亦由義別故與念相應邪答末那有慧故有我見與我見俱即與慧俱也忘念以念為體者不遍染心以癡為體者乃遍染心秖於第七識我癡上明其無正念故斥為忘念無正知故斥為不正知皆無自體約過失邊義立此二耳問謂此識緣自所依者如有後識即緣前意儻難云前五識所依五根亦增上緣何獨不許作所緣邪識相緣之義乞垂細剖答第七識唯內門轉故得所依為所緣前五識唯外轉不得所依為所緣不應為例問意識依意具三分別設依色者便同五識第八亦依意不依色根何但有自性分別無隨念計度答前六皆轉識攝而一依心法五依色法故有差別第八非轉識攝但是所熏唯無記性一類恆轉儻亦具三分別則有轉易而受熏持種皆不得成矣問唯識五觀與占察二觀是同是別答遣虛存實捨濫留純攝末歸本隱劣顯勝皆從唯心識觀開出若遣相證性義仍兩屬如云俗有真空仍是唯心識觀若遣相執達相即性乃真如實觀問思能令心造作第八識相應之思令造何等答爪生髮長筋轉脈搖髮白面皺氣消容悴及日月稽天江河競注滄桑易春夏更皆第八所造問瞋唯不善則初二果任運所起瞋心名不善否與無慚無愧相應否能發業潤生否答學人失念起瞋亦名不善此念亦名無慚無愧然已斷見惑故不發業善心易起惡心易滅不潤生也問自在位唯樂喜捨以諸佛斷憂苦事故彼金鎗馬麥等報得名苦否憂念衆生得名憂否又如頭臨白刃如斬春風得名無憂苦否答唯識名義憂喜苦樂等各有分劑唯佛方能實無憂苦金鎗馬麥大權示現原非實事故非苦憂念衆生亦不同凡夫迫戚故非憂也臨刃斬風雖無憂苦仍與佛果未同以佛果不受害故至稱性極談菩薩分證憂苦諸佛究竟憂苦是在忘名字相者方能信之答準提持法三問原問附問一切能詮之文必有所詮之體顯密二詮其體同邪異邪又佛何以顯說復密說邪答千經萬論若顯若密皆直指人心見性成佛除此心外更無所詮猶云六經我心注腳也顯密說者有因顯說得四益有因密說得四益佛智鑑機能隨施化良醫因病藥不爽宜也問稱體起願名發菩提上求下化不相捨離今持法中所明發菩提心皆儒宗世教與佛法同否答上古儒宗皆佛菩薩示現為師為導接引迷流所立世教無非佛法後儒拘虛不能引伸觸長遂有門庭之隔剋實思之聖人先得我心同然寧非三無差別之旨樂堯舜之道若己推而納諸溝中寧非上求下化之懷但犬牛人性皆同告子自不敢承當耳孟子又謂人禽幾希豈非習雖遠性仍近之證邪問顯密圓通不持齊戒不忌腪酒往往獲應何必別述此法反令畏難答大凡持咒各有攸宗五部既別三類亦殊圓通一書附會夾雜非金剛正印也依持靈應由人篤信力行所感設以此而如法奉持靈應豈止功名男女已哉況近時持者多而獲應者少不惟信弗篤行弗力亦由法未善故也然今依經所立結壇持八關齊等法不過為久積方便剋期取效者設耳非謂平日持咒皆須如此也法華堂第三第四二問并答餘見頌中問三身與三自性是同是別答三自性與三身亦同亦別同者由悟圓成實性證會法身淨依他成報智身悟遍計本空成普應身別者三身約果德約悟顯三性約境界通迷悟也問一切法皆可作四句且如三性各四句如何作答遍計所執性四句者情有故常理無故無常情有即是理無故亦常亦無常理無即是情有故非常非無常依他起性四句者緣生故常無性故無常緣生即無性故亦常亦無常無性即緣生故非常非無常圓成實性四句者理有故常情無故無常理有即是情無故亦常亦無常情無即是理有故非常非無常亦可約不變隨緣隨緣不變而作四句又單約依他起性辨三性以明四句者依他性中有圓成實性故常如繩有麻依他性中無遍計所執性故無常如繩無蛇雙照故亦常亦無常雙遮故非常非無常當知惑業苦三皆是依他起性於依他起並具四句依他苦四句即性具法身四句依他惑四句即性具報身四句依他業四句即性具應身四句又佛三身即淨分三自性各四句也
