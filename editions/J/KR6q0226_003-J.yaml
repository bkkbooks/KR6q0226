body:
  text: 願文二龍居禮大悲懺文壬申歸命勝威德勇猛人師子不共力無畏大悲救世者歸命照世燈真實出要法顯密不思議破愛見網者歸命眾生父慈願無比尊帶果示行因住不思議者歸命降魔外忿怒大明王真實勝慈悲調伏難調者我今發宏願誓斷惡修善然頂香四炷陳白自深心弟子智旭自惟障緣深重過罪多端惑染既殷業累斯積未歸信前已造無邊邪謗雖學道後尚纏無量愆尤四誓秉懷固欲並乎往哲七支身口每負墮於前賢內因力微外感復亂野犴爭鳴於大地羺羊遍處於域中不唯乳雜水而飲者增痾方且毒為食而嘗者喪命是以痛心疾首哀告慈尊一期方便三七熏修願錫群盲速圓福慧勿壞如來正教勿摧出世寶幢願我同行以及檀那外護諸賢見聞大眾各秉深志共策玄猷清性遮而畢淨嚴篇聚以無虧悟無諍之真源除微細之法執作師子吼滅戲論愚又願現前眾等遍及含靈資生眾具學道因緣罔不隨心悉能滿願化三毒為三脫轉六道為六通覲淨土於目前證菩提於當念性修不二具種種行門事理交融興重重法化印彌陀之願璽滿自在之悲心結壇持大悲咒偈歸命施無畏大悲救世尊神妙祕密輪及一切三寶我業深如海努力勤禪定半身感楚酸實由三毒根今慚愧剋責然臂香三炷結一七淨壇持大悲一萬誓當勤精進護佛法正輪不惜身命財唯宣一乘教我今以身心奉上三寶尊唯願平等悲究竟垂加護結壇持往生咒偈稽首無量壽拔業障根本觀世音勢至海眾菩薩僧我迷本智光妄墮輪迴苦曠劫不暫停無救無歸趣劣得此人身仍遭劫濁亂雖獲預僧倫未入法流水目擊法輪壞欲挽力未能良由無始世不植勝善根今以決定心求生極樂土乘我本誓船廣度沈淪眾我若不往生不能滿所願是故於娑婆畢定應捨離猶如被溺人先求疾到岸乃以方便力悉拯瀑流人我以至誠心深心迴向心然臂香三炷結一七淨壇專持往生咒唯除食睡時以此功德力求決生安養我若退初心不向西方者寧即墮泥犁令疾生改悔誓不戀人天及以無為處仰願大威神力無畏不共三寶無邊德加被智旭等折伏使不退攝受令增長結壇念佛回向文稽首阿彌陀諸佛護念法淨土諸聖賢唯垂哀護持智旭無始來迷常住理失智慧明背自性而枉受輪迴取妄心而永違真境善根雖發投正教以捨家宿習偏濃熏三昧而罔就矢心淨域誓出苦輪機感不專聖應莫顯悠悠歲月罔罔襟期可痛可悲無洲無渚今依釋迦誠訓七日持名用投無量慈光一生求度棲身淨壇專稱洪號若定若散有記無記仗佛悲輪功無唐棄願以功德及諸善根悉共眾生回向安養所冀現生魔障消除捨報正念決定一剎那頃生如來前受菩提記滿本願輪結壇禮大悲懺文智旭與眾生自迷覺性恒處昏蒙眼隔圓常耳違微妙未知出要時枉役聽聞之用既思求道後反虧聰利之功聆法語則乍憶還忘展經典則遺前失後遂使無上醍醐莫由染識圓明珠體弗克映心觀行難於奏功豈能自利辯才短於章句安望利他是以捫躬知過稽顙求哀諦信大士悲心歸命總持神力然頂香三炷供大悲三寶願以智慧光灌我頂門以聞持水洗我心垢使速離暗鈍蚤獲開明遙聞諸佛轉妙法輪永無遺失常讀三乘甚深法藏過目不忘等與眾生同開佛慧性修交徹頓證圓常補總持疏敬禮慈尊地藏王神咒善能滅定業普救無邊五濁苦紹隆三寶種不斷智旭與法界眾生迷本淨心已造定業無明所覆不自覺知故於今日同嬰苦報遠隔正法遭遇魔邪倒說大乘誣毀了義逐後世微勣忘教主典型設宣實道反被譏訶雖解真乘仍虧智斷歎同修之落落嗟外護之冥冥果豈他尤因原自造惟捫心內悔悲仰求哀恭念地藏大士無上醫王滅業真言無邊神力定能拔三障苦施三德樂是以專心持誦速望冥加向持三百二十萬一百萬四十八萬竟今復為某等廣列比丘沙彌居士等不錄各各有差至心共持一百四十萬伏願一切比丘增長福慧成就聖根斷世愛網摧我見山一切沙彌志慕大僧克臻淨行增修戒慧棄捨幻緣期許誓同先哲舉止不類時流一切檀護明識是非了達邪正以願作眾生之眼將身為佛法之城又願各信淨土玄猷共勗樂邦妙行具諸戒品讀誦大乘深信因果解第一義常為人說法藏遠因彌陀現果令諸有情咸脫苦輪畢獲安樂又願智旭與諸知識互為主伴恒轉法輪誓滅三塗定業妙暢安養真詮恭干三寶聖尊同體攝受為父母普求拯拔啟不肖智旭生於萬歷己亥是時嚴慈並年四十止一子撫育倍殷旭年二十先嚴捐館未展一日孝養徒切終天痛憾嗣聞佛法稔知世孝非真廿四捨母逃逝本期剋時取果總報四恩詎謂業重障深久滯凡地至廿八慈母復棄而旭於出世大孝反躬無似倍嬰罔極之悲終墜憂虞之網出家十夏白業無成扼腕捫心可慚可懼明歲六月一日為先慈金大蓮七周十一月五日為先嚴鍾之鳳十五周之期自力既微應乞恩於師友法施為最豈祕吝於庸愚藉同體大悲作無緣與拔智旭儻此生解脫誓處處同為影響或今身沈淪願永永代受眾苦又自持滅定業真言二千萬金光明空品二千梵網上卷一千為我父母耑懇同仁互為增上勝因並入彌陀願海再禮金光明懺文歸命能仁福慧尊最勝金光明性海信相功德大吉祥同賜慈悲垂攝護智旭等列六人不錄普為眾生求滅罪障轉正法輪如法建金光明經吉祥妙懺至誠咨請十方三寶功德大天普願圓慈速垂妙應伏念自迷金光明性備起貪瞋癡業著我我所橫生是非障智慧之真源妄求世智喪聖財之法樂妄愛俗財致使瞞因昧果藐法欺心感報墮三塗劇苦餘殃使百務無貲今始覺悟痛改前非翹五體以投誠瀝一心而悔罪願我等無始至今三業六根所作重障煩惱惡業花果報殃以金光明海三寶功德及吉祥大天本願威神於一念閒悉皆消滅顯發自性慧輪成就本來福聚紹隆三寶普利塵沙又願智旭身無眾病心悟總持自證法門清淨演說某痛念娑婆深求大法身心一致福慧並修某明了正法剖斷狐疑懲流俗心希先哲行某猛省無常力除瞋慢反躬自勵不念人非某廣發大願善學古人某永離掉舉成就深因某開發蒙憒增長信根又願執勞運力隨喜見聞同植勝因等沾殊利乃至法界含識均藉經威仰資懺力頓空二死並證三身恭惟金海聖天見知證攝結壇禮懺并回向補持咒文智旭及眾生於同體法幻成十界之殊向真常境謬作三世之異既隔遮那妙體罔知正法要津正轉像像轉末誰思砥柱中流輕成重重成定誰達緣生無性我今仰藉觀音大聖地藏慈尊真實圓悲始蒙覺悟信三無差別之理十界不離一心解佛性常住之宗三世不移當念由是發廣大心修真言行誓滅自他定業重興正法毗尼曾持大悲咒十萬八千加被毗尼集要流通益世今復六時行道一七熏修然香三炷回向佛乘唯願千手千眼真實勝慈專憫剛強速垂折攝使如來正法再顯支那末運迷津重歸至化汙道生慚愧之心不淪空見羺羊獲聞思之慧不囿凡愚又為緇素等補持滅定業真言一百四十萬已竟并然香三炷總申回向伏願三塗息苦八難除災竭業海之波濤摧惑林之根蔕五住圓消三輪同淨悟戒體而果極法身達性遮而行同淨滿泯大小偏圓之執普會一乘深浮囊草繫之思範圍法界證宗說二通禪教不二修事理一致因果同符覲彌陀於安養輔彌勒於龍華情與無情咸臻常樂禮大悲懺願文頂禮無邊際三寶威德尊觀世音地藏同垂哀護持智旭與眾生自迷性德恒造業緣障於覺體不了法因能所熾然自他橫隔沈淪六道困頓三塗乃至劣得人身仍遭諸障投躬正教未識妙津良由業重致此坎坷復念生死根株愛染第一潛伏藏識難斷難除我雖密承大士三寶加持有生不習無慚穢行而無始惡習時與念俱身貪諸觸口喜惡言三業六根罪實無量己躬未淨何以導人扼腕論心誠堪愧恥今於大悲淨壇之次日課梵網戒經一卷修行四十八願念阿彌陀佛千聲持金光明經空品一卷復總持大悲咒萬遍佛頂咒千遍以為斷惑方便及為過現某等各持經咒耑申回向建壇日然頂香五炷今完滿日復然臂香二十一炷供盧舍那佛釋迦牟尼阿彌陀佛千光王靜住佛九十九億殑伽沙佛正法明佛十方三世諸佛供梵網經菩薩心地品大般涅槃經大悲心陀羅尼悉怛多般怛囉神咒滅定業真言顯密一切法藏供觀世音地藏菩薩大勢至總持王日光月光寶王藥王藥上菩薩華嚴大莊嚴寶藏德藏金剛藏虛空藏菩薩彌勒普賢文殊師利十方三世一切菩薩供摩訶迦葉優婆離阿難一切聲聞緣覺賢聖僧供初來震旦摩騰竺法蘭初往西乾法顯尊者淨土教主遠公尊者求見舍利康僧會尊者禪宗初祖達磨尊者天台智者大師相宗玄奘法師清涼澄觀國師會歸宗鏡永明大師重振僧風達觀大師及私淑戒法雲棲宏和尚現夢接引憨山清師祖等如是一切三寶師僧我供養已投地披肝作如是白願我三業究竟清淨身不犯纖塵口無諸掉失意永離愛見願父母及無始父母眾等同生淨土願同行比丘九人發深悲願披堅忍鎧願外護比丘某等列名者八人深愛正法曲體眾僧願隨喜比丘某成就忍力密荷法門願某等列名者三人痛懲時弊力追古風願同盟比丘某平等大悲愍念剛惡願某深開教眼精曉毗尼願某成就開智廣達真宗願某等列名者七人克除習氣深入法門願某痛念無常深思出要永除諂誑成就真因願外護沙彌及行人某等列名者十人成就深因希求實果願某等列名者九人精求出要矢志蓮邦願某等列名者八人三學兼修二嚴等備願破戒闡提某等出四名從緣警悟頓革邪心深信因果早求滅罪願檀護某以圓通慧修稱性福願某等列名者十六人成出世法脫愛使纏願亡故比丘十一人沙彌某等列名者六人處士某俱脫幽塗徑歸樂土願亡故往生淨土優婆夷盧智福蓮開上品果記一生以如意通廣度含識以上然香發願功德上報佛恩下挽劫濁願一切持律者實洞開遮持犯之源深悟定共道共之法不以積訛自私不以習陋滅法常補佛處不類羺羊一切演教者解行雙修教觀並舉精嚴律檢通達禪思不同說食數寶善能隨文獲證一切禪思者明識是非了別邪正不墮暗證坑不起增上慢真參實悟信戒信聞一切修淨業者信即事之玨悟即佛之心不撥相而高譚自性不輕視而認作退休披菩提誓鎧合法藏願輪一切習瑜伽者深達顯密圓宗清淨三輪施化革除戲習守護禁儀不妄教授不輕舉行蒙諸佛矜憐免鬼神瞋罰一切營福業者深信罪福嚴持因果遠離世法興揚正化回有為業趣無漏乘又願以前諸願悉嚴淨土總向西方臨命終時更無他念親睹慈尊聖眾接引應時化生旋聞妙法隨證無生成就十種身輪廣度法界含識唯觀音大士地藏慈尊哀愍覆護令我願不退不沒不失不忘滿菩提行禮淨土懺文癸酉比丘智旭等曠大劫來至於今日既迷本性恒在輪迴三業六根無惡不造五趣八難無苦不嘗暗識相傳曾弗覺悟死生浩漫解脫何期茲值大乘得生微信快聞淨土宜速知歸勤精進而已憾其遲更怠緩而擬將何及爰發懇心共期三昧修往生之願儀矢七日以無雜六時行道四威攝心仰叩圓悲必垂妙應願深求正法不染情塵行與志齊道追古聖盡捨緣務痛念無常八風不動四誓莫移乃至外護行人並植深因同歸淨土師僧父母歷劫親緣法界靈蠢過現有情蒙法藏之願光承阿彌之慈力三障頓除四土等淨以此發願功德總報三有四恩同圓種智西湖寺安居疏一心歸命梵網教主盧舍那佛極樂世界阿彌陀佛菩薩心地品毗柰邪藏三乘十二分教一切尊法觀音勢至文殊普賢地藏彌勒等一切菩薩優波離迦葉阿難西天東土一切聖師願展慈光同垂悲濟伏念諸佛滅後以戒為師三無漏學以戒為首秉羯磨而如說修行名為正法住世依律藏而和合共學斯令僧寶不澌深嗟末運罔識良模持犯總自不知源委何嘗略討或恣行非法或癡若啞羊或離事談空或執相迷旨致使覺皇巧便埋沒湮沈邪見稠林蔓延滋茂既忝如來之胤寧無離黍之悲爰發勝心糾我同志結期蘭若討論毗尼敘外護緇素回向皆不錄伏願外魔不擾內障不侵紹隆僧種圓證佛乘悟開權顯實之旨合扶律談常之印以淨戒真因登淨土極果津梁劫濁摧伏魔邪報釋迦之深恩滿阿彌之大願前安居日供鬮文崇禎癸酉前安居日菩薩戒比丘智旭然香十炷奉供遍一切處淨滿大覺示滅雙林真實常住本師慈父一體三寶極樂世界阿彌陀佛十方三世一切諸佛梵網尊經毗柰邪藏十方三世一切尊法地藏彌勒兩土二侍金剛藏虛空藏藥王藥上玄通華光主華光王大智明等十方三世一切菩薩優波離迦葉阿難馬鳴龍樹一切僧寶願以大慈悲力折伏剛強力攝受善根力現前證明智旭本謗法人幸聞地藏尊經發心救苦書慈悲懺法復斷酒辛聽大佛頂經決志出家閱憨山方便語矢心參究捨母逃逝誓明大事既多障緣仍悲法亂因思誠訓以戒為師俯仰斯時誰堪作範乃棄衣單千里陳情雲棲塔前頂受四分戒本一載後求菩薩律儀遂檢全藏輯錄要略但圖自利未暇化他不意事成漸至流布然既再三翻讀深知時弊多端不忍隨俗淆訛共蝕如來正法而自受具心雖殷重佛制未周爰作八鬮虔問三寶若智旭比丘戒從心感得十夏行持當得作和尚鬮若得戒前輕犯未淨當得禮懺作和尚鬮先行懺法若未得不成遮難或已得未堪作範當得見相好作和尚鬮禮懺求相若不成難而未得當得重受鬮如法秉受更滿十夏若成盜難而通懺當得禮懺重受鬮若已成難當得菩薩沙彌鬮若不許沙彌法當得菩薩優婆塞鬮若一切戒法悉遮當得但三歸鬮嗚呼不敢師心者此生之出處不可忘廢者曠劫之弘誓但進退語默弱識豈能自知逆順與奪正覺自然隨器仰對三寶刳瀝一心若得作和尚等三鬮誓忘身命護持正法寧受劇苦作真聲聞不為利名作假大乘若得重受等二鬮敦弟子職誓不藐法若得菩薩沙彌鬮誓尊養比丘護持僧寶若得菩薩優婆塞鬮誓以身命護正法終不迷失菩提心若得但三歸鬮誓服役佛法僧閒種種方便摧邪顯正我以質直心殷重心護正法心度眾生心伏魔外心除巧偽心向一體三寶供如是鬮發如是願從今日迄自恣日現前大眾日持大悲咒一遍自修梵網懺法日一時以求加被願三寶大眾護法天龍同垂哀鑒重復說偈曰三寶護一切同體無差別我悲劫濁苦法亂邪風熾願續正法燈照世開迷惑內護及外護未卜當安從救世大悲者知我夙世根應以何等位自利及利他願扶律談常從境而發諦徹悟聲聞法同歸無上印終不作對待隔別諸邪見我哀迷惑者觸事生執著律昧持犯源唯事衣與缽教失觀行旨但著名句味禪道迷綱宗流入一機境或但尚工夫或專求向上或強鑿悟門或并棄正解執藥反成痾戲論妨實詣淨土圓頓法多視作權機不發菩提心但作偷閑法不修淨戒因空希淨妙果密部大威神翻成世流布穢雜不堪聞幾同兒豎戲如來無量劫修習最殷勤得此難思法度我諸含識云何至今日衰替不忍觀我本具縛人自哀哀一切以何方便力重顯正法輪仰學至誠心深心回向心然香表無盡待命無他向自恣日拈鬮文稽首法界淨滿覺正法毗尼淨性海權實聖賢常住懺一體證知垂攝受智旭無始至今迷三寶之本性淪六道以往還僻稟邪宗恒違出要妄希捷徑不了真乘尚幸夙因微善獲聞正法毗尼於前安居日供鬮陳志今三月告終僧將自恣復供頂香六炷三炷求鑒根機授我明決唯聽聖命心無適莫三炷隨鬮皆發三誓若得三歸鬮盡未來際誓不離佛誓不離法誓不離僧得優婆塞沙彌鬮誓不忘菩提心誓作外護助興正法誓供養如法比丘得二重受鬮誓不違奉師之則誓五夏依止誓十夏未滿不為師得相好鬮誓忘身修懺誓不違願先畜弟子誓未見相不講演除結伴清淨法施得餘二鬮誓不濫度人貽羞法道誓不改人法名誓與同志如說行不逐名利涉世事但秉正法以俟後賢三寶龍天必垂哀攝禮淨土懺文敬禮能仁無量壽二土法寶教行理觀音勢至海眾僧無邊三寶咸加護菩薩沙彌智旭與法界眾生迷真起妄背覺合塵惑業無窮苦果不息無始至今從未覺悟雖逢出要罔識進趣由是往還六道沒溺三塗廣造惡因備嬰劇苦今以夙時微善獲遇真乘無柰染習偏強淨功莫剋違出家初志負佛祖深慈扼腕論心慚天愧地爰立勝志七日為期修行淨土懺儀願成念佛三昧六時行道一意持名叩佛圓悲必垂妙應然香三炷供二土三寶願三心圓發三障頓除又十四炷拈十四種鬮一決行藏有四事二定占察行法之時有三種三至十定占察行儀有八事十一決金光明懺有三種十二定誦滅定業之時有七種十三決般舟三昧有五種十四定註經前後緩急有十八種是中詳悉佛自見知願賜洪慈除我疑惑伏願分毫之善等施含生稱法性以無窮乘願輪而自在見聞隨喜惡滅善生契會寂光同歸常樂盡法界有情無一不生極樂而極樂不增盡法界微塵無一不現極樂而極樂不減徹悟無生而熾然往生了知不去而確爾求去大闡彌陀法化廣破儱侗邪宗深符釋迦願輪力挽支離淺學度五濁於九品淨四土於一心虛空可隕我願不灰願佛法僧證明攝受禮金光明懺文甲戌智旭自念生逢法亂不遇真乘內因既微外緣亦薄魔障數侵淨業罔就觀人省己愧慮驚心幸值最勝經王吉祥妙懺更幸清淨僧眾如法行持爰發虔心然香供養一奉供釋迦文佛阿閦佛等一切世尊願與一切眾生速發菩提心紹隆佛種二奉供大乘金光明海十二部經願與一切眾生速得深廣慧悟入法海三奉供信相菩薩金光明等一切三乘聖眾願與一切眾生速證入解脫同登法流四為梵釋八部聖眾供三寶願增長威神護持梵行五為第一威德吉祥大天供三寶願不違本誓示我吉祥六至十一奉供某師列六師并願語不錄十二至十四奉為恩師某供三寶懺假稱悟道妄評公案之罪妄造懺法謗毀先聖之罪損剋大眾錯因味果之罪諸如此罪願悉消除或不可除願皆代受令現前病苦速得痊安若大限莫逃竟登安養十五至十七奉為外護沙彌列名者六人檀越列名者三人行人眾等供三寶十八至二十奉為比丘某知友列五居士亡友列名者三人供三寶上願語俱不錄二十一普為見聞若不見聞及十方三世無窮無盡一切眾生供三寶願皆頓悟金光明海永斷惑業苦輪唯願三寶證明攝受重復至誠五體投地然香三炷一奉為比丘某供三寶願堅固忍力不弛弘願二奉為震旦國主兆民供三寶願常享太平豐樂不遭離亂饑荒魔外潛蹤正法昌熾三為自身供三寶願憫凡愚必加哀護從今以後淨業日增夙習煩惱心心伏斷脫愛見輪證寂光境念念不違慈父時時得睹樂邦普與含生齊成正覺講金光明懺告文乙亥智旭與法界眾生自迷法性幻作塵勞貪瞋癡慢日夜熾然婬盜殺妄長時不息致使三塗鼎沸八苦交煎災異頻仍饑荒洊至干戈搔擾魔外縱橫悲同分妄見長夜難開痛循業自招出離無助茲遇邀請功德大天發心專求拯拔講補助懺儀一卷日隨喜行法一壇於圓滿日然香二十一炷一二三奉供本師寶華琉璃四方四佛等盡金光明經中一切諸佛大乘金光明海十二部經信相菩薩盡經內一切聖眾四五奉為大梵帝釋護世四王等第一威德成就眾事大功德天供三寶伏願增長威神令此國中風祥雨順物阜時雍干戈永息疾疫消除聖主播仁慈之化群臣竭忠藎之良六七八自懺身口意業供三寶伏願慈威折伏攝受九至十二奉為四師列四師名不錄十三至十五奉為懺師外護隨喜供三寶上願語俱不錄十六奉為結伴同修諸友供三寶願各秉遠志共集真猷十七奉為護正法輪發弘誓願某等列五居士供三寶伏願各增福慧自離障緣十八奉為緇門實德有志賢人道震照渠等供三寶伏願解行齊修二嚴克備十九代為惡魔眷屬外道流裔某某某某某某等供三寶深求懺悔伏願三寶威神愍彼見濁或默示感通令反邪歸正還度群迷或速彰黜罰令消除退散莫惑凡愚若罪惡障力決不能悔悟消融智旭願皆代受若善根斷盡終不可速救者智旭願以無始至今所有一毫之善皆施與之令其速悟二十二十一奉為十戒闍黎出家闍黎及某等覺靈亡父母及一切親緣眷屬供三寶願語俱不錄以此然香發願功德悉施法界眾生願皆悟入金光明海以清淨業感吉祥天擁眾常護皆能以財以法攝化一切各各改惡從善反邪歸正皆能修身修戒修心修慧皆知鼠即鳥空之解為非皆知佛法自有真脈非可僭傳皆知聰明穿鑿鬼家活計徒增謗法之愆不療生死之苦皆能忘身捨命專求正法自利利他由能應念修行一切供養奉供三寶故心常清淨無染著由能了達一切法空故不捨莊嚴佛土成就眾生由能了達淨穢平等故熾然求生極樂世界由能深信心佛眾生三無差別故精修念佛三昧不作無佛無眾生想由能徹證持犯性空故以三聚淨戒攝化一切由能遠離聲聞辟支佛意故受持比丘清淨戒律常能演說戒即摩訶衍由能了知法性無增減進退故方便增進一切善根由能深入大定故恒普現威儀由能究竟無相智慧故不捨一切諸相由能悟入離文字法故不離文字談解脫相由能證徹無依無住大般涅槃故數示生滅於三界中廣作利益由能念念遍知一切法界眾生界事故不捨方便示學一切法門由能遊戲生死故而無染汙由能深觀涅槃故而不取證由能了知煩惱生死即菩提涅槃故不作一想不作二想由能念念沐浴法流故不捨作法取相之事常能演說一一法一一相皆即法界當體無生已發如是大願竟廣大如法界究竟如虛空恭唯金光明海同體三寶成就眾事大功德天速如所願滿菩提願
