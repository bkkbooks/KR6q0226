body:
  text: 塔誌銘樵雲律師塔誌銘予在江外即聞樵雲關主以苦行實修為八閩敬仰戊寅冬渡洪塘趨溫陵擔役愚夫皆能言其為眾之切自課之勤也未幾聞訃恨緣薄不及一晤賦短章哀之越二年庚辰予至漳南高足如田遵遺命營全身塔於石室之嶺請予銘按師為澄邑新安周氏子出家漳之開元寺法名真常樵雲其別號也兒時以瓦缶竹木列為缾錫父知其志捨入寺寺為羅漢琛禪師道場師剃度時即有慕琛之心謁南山閑寂老人稟尸羅要旨咨淨土法門既於堆雲嶺頭建亭施茗每經殘月下一虎當塗師以杖叩云此往來要道慎毋面目憎人虎馴去次於三台石室瓦釜繩床課經枯坐閱三載擬欲他往聞空中有聲留之乃啟建佛殿結搆僧寮額其巖曰閑雲石室蓋閑寂老人曾於此棲遲故也閉關峭坐寢食俱忘道風日著檀信日歸嗣是設華嚴堂闢接眾舍延待十方盡心盡禮爰感五臺無靜律師為不請友飛錫關前為師圓具從此葺三山之大藏興支提之辟支參無盡法師於天姆覲普門大士於普陀乃至遊歷南華肖六祖栴檀之像復歸石室又以行腳多年律學疏曠北登五臺重咨心地然後開甘露戒品於溫陵古莆諸處而一以淨土為指歸師一生篤實苦行普心接納於禪講名流尤虛懷靡閒蓋其樂取人善年彌高而德彌謙故不必揮麈豎拂已可扶宗教之衰矣世壽八十有三法臘五十有奇剃度若干人戒子不啻萬指銘曰先哲既逝人情日浮掠虛逞見誰懷遠憂海南佛國淪為荒丘髡不稟戒兵奴獄囚挺生樵老愛河之舟廣設行筏度彼迷流走遍天下乃集勝猷尸羅再揭樂邦橫截不似諸方證龜作鱉紫竹林顓愚大師爪髮衣缽塔誌銘金陵紫竹林顓愚大師丙戌仲夏六月坐脫門人以陶器奉全身供於林之山陽次年弟子請歸雲居於是金陵緇素以所存爪髮衣缽就山陽建塔供養徵銘於旭旭愧學未師安言無足重然人之相知貴相知心旭既謬辱愛敬迥逾世情又安敢以無文辭謹按譜師諱觀衡顓愚其字也順天霸州人姓趙氏昆季四人師居仲母夢大士攜童子入門急抱之覺而有娠萬歷己卯年八月十八日亥時生白衣重胞狀異凡子年十二即茹素喜事觀音大士年十三翛然有出塵志年十四堅欲入道父母不許乃潛逸塗遇五臺山圓照寺惠仁師懇求剃度依住四載年十八聞清涼山師子窟空印大師名潛逸往參投誠篤事居侍寮三載咨決心疑仰學至德始終如一日也年二十二隨空師入燕都侍楞嚴講席進菩薩戒參紫柏大師自念習聽義學未是出家大丈夫事潛逸南行參雪浪雲棲二大師獨住天台華頂峰讀楞嚴經破諸疑網時高明無盡大師登華頂訪智者遺蹤見師孑處茅菴少年精進托宿作竟夜談越三年移住匡山乾罡嶺每一飯輟坐數日至第三年月下經行忽有省悟三十歲進曹谿禮六祖次夏四月謁憨山大師於端州一見相契秋仲辭去登南嶽住石廩峰三十三歲誤食草烏中毒濱絕離山就醫憨大師特至南嶽歎曰禪門下衰幸得一箇半箇真為生死學人與之周旋稍慰寂寥今斯人而有斯病豈龍天厭薄法門乎三十八歲結五臺菴於邵陵覲憨大師於湖東參侍半月大師示以法語大意謂身病已瘳切不可被禪病侵蓋眾生身病本乎執取而禪病亦本乎執取若法執不忘己見猶存亦是病直須將從前參禪執守功勳并玄妙知見一齊唾卻定不可被他養作病根其語切至幾數千言今親筆手卷尚供林中故知顓師從來開示學人隨機圓活不似諸方認定一死貓頭其得力於憨大師者誠不淺也師曾以授戒法問憨大師大師荅云老朽未閱律部於諸戒相實未細詳今惟遵梵網以心地法門為宗以十重為要其四十八輕亦未能細說但令行人半月半月誦持而已近時學人識淺心麤多虛少實求其果能精持如古人者所未易見而弘律者原非學人事多杜撰難可為準公處若有藏經幸一詳檢律部有以示我望之望之維時師亦無暇閱律但宗楞嚴四種清淨明誨開示後人令持心戒兼令專禮觀音大士著有圓通懺法流通最廣居五臺菴二十年足不越戶外度弟子千餘人授記署名者幾三萬人至年五十九歲特登匡山五乳寺埽憨大師塔建報恩道場寺眾請主法席固辭不可仲秋下匡山登雲居禮祖塔寺眾亦堅留主席黎明潛逸中塗疾作不能行闔山比丘往返虔請乃復登雲居至六十五歲秋離山登舟山為再震師於此山夙緣深矣是冬泊石頭城次年冬十月卓錫紫竹林林本城北荒地師住未幾蔚為叢席師發心深為生死大事故於父母師長皆不辭而行然秉性至孝每遇親師忌日設追薦道場必極誠愨竭哀慕觀者無不感發生平儀容古朴不事矜飾廣顙豐頤平頂大耳脩髯如戟短髮覆肩目光炯炯射人終夜露坐不畏大風或雷雨亦坐大傘下故學者稱傘居和尚云衣服不御寸帛日惟一粥一飯絕不雜食每作務必兼人其接物也上自王公大人下逮田夫牧豎禮不異節溫溫言笑靄若春風而學者見之不威而懾隨所到處僅一輛草鞋便行來不先通去不先辭錫駐之地緇素雲集求戒問道殆無虛日然未嘗自立涯岸別建門庭蓋既得空印大師之教又得憨山大師之禪又復匯歸於雲棲大師之淨土故其開示法語直捷廣大似紫柏應機禪語輕便圓活似趙州又眼界雖甚高曠口角不輕雌黃謙光盛德慈念虛懷真令人目擊道存也所著有楞嚴金剛四依解及紫竹林全集行世法臘五十四生年六十有八長旭二十年兼親侍憨山大師誠為法門先輩尊宿乃不惟忘年下交而每致書問必反稱辱教某某嗚呼旭真慚悚無地已合掌墮淚為之銘曰佛法如大海潛流注百川達者知浩浩昧者泥涓涓三宗爭鼎足五葉分單傳不有超方志誰懲鬥諍愆師承普門願憫濁來施權奮然脫愛網習教還修禪放生廣檀度說戒結深緣慈容藹冬日機辯赫炎天德重如岱嶽懷虛若沖淵足跡遍寰宇操持脫言詮握拳念大士撒手宅金蓮舍利鎮祖窟爪髮留福田照此石城地永永百千年祭文然香供無盡師伯文不肖初遊台嶺即睹慈輝但欽溫恭之德罔窺法海之涯方且甘暗證而蔑義塗因門庭而昧堂奧造罪意地者匪希矣後出入禪林目擊時弊始知非台宗不能糾其紕台教存佛法存台教亡佛法亡誠不我欺也顧於老伯猶半信半疑自締盟籌兄乃甫傾向而老伯已往生珍池矣徒增悲仰竊聆化儀慚懷悔志擬將何裨嗚呼師弦絕響野干競鳴演教者捨醇醲而取糟粕參宗者先發足而後問津孰能依教起觀一洗說食數寶之陋知津發足解脫盲修瞎煉之紛老伯實中流砥柱杲日中天也憫予小子不沾法乳於生前不修微供於歿後敬以三炷臂香深達懺摩三炷臂香遙伸印手惟老伯不起寂光現覺三有鑒法門嬰杵之憂錫初心止觀之佑苟機感之不訛必含笑而攝受弔不忘文比丘智旭居靈峰山聞不忘音公棄世敬誦梵網戒經一卷金光明空品十卷滅定業真言千遍并為文遙向而弔之曰嗚呼千古聖賢必從豪傑中來而千古豪傑必以聖賢為的捨聖賢之準繩尚豪傑之意氣誤矣認豪傑之意氣當聖賢之品格益誤矣公豪傑自期者也始予交臂而失既而肝膽許之然予之許公也擬欲進乎聖賢而公之自許也終未捨乎豪傑逮行法華三昧予訪關次作竟夜談時為公羨亦為公憂也公初惑圓談妄謂乘急而戒可緩及警心於乘鶴渡海忽折一翅之夢方知戒亦應急而未達戒即是乘是以雖行事懺理境不彰況調身失其方便進道每任己情重障造於前掉悔逼於後善友隔於他山聞解局於文字以此滅罪悟心難矣然公未徹者乘戒源頭而不迷者出世因果源頭未徹感現在惡疾而終因果不迷定可免將來異熟予為公悲亦為公幸公亦可自慰於冥冥也嗚呼末世修行多敗少成公其諦信法華威力及阿彌願輪頓除愛見之私速往金蓮之津迨予報盡垂手來迎同覲慈尊共秉梵音回視西湖殿裏接引像旁披誠發露盟以肺腸可謂果因交徹久要不忘者矣奠影渠靈隱二兄文嗚呼世固有相愛不相知者此其愛非道愛也亦有知愛而不相期責者此其知非實知也二兄之相知相愛相期責也二十餘年如形影焉乃予與二兄為莫逆交僅自乙亥春始憶其時未嘗有投契之思特以天降霪雨為吾三人作意外介紹故靈兄詩曰只此十日雨傾予半世懷噫奇矣是冬予遘篤疾二兄盡力調治不啻昆季母子也逮予住九子遊八閩二兄夢寐予猶予之夢寐二兄也今春予從閩中聞影兄之變痛切肺肝念佛十萬以悼之夏五月予出苕城秋七月靈兄冒酷暑相訪殷殷出世大事不兩月忽嬰疾急手書召予予馳赴未及百里竟捨我先逝嗚呼自惟解行俱荒瑕玼非一謬蒙信許過於常情又承治命欲予演觀無量壽佛經首題名義予既奉命復念佛十萬為增上助緣嗚呼當病苦切身而大事殷殷之意生死一如若斯予無似若糞壤之助嘉禾則庶幾矣每思影兄之沈靜靈兄之爽朗俱堪千古至其戒行冰霜慧性穎悟正信力強出世心苦誠堪立地超佛越祖而大願未克齎志長騖者其故何哉大約身見稍重遷延晷景不能向冰凌劍刃上遊戲出沒不肯從荊棘瓦礫中掉臂厝脛致使無生法忍必俟淨土花開始領也然此幻軀不可保信縱令愛惜曾不少矜養怨入塚誰曰不然二兄誠能瞥然覷破憬無餘情彈指蓮華可敷不復更俟半劫一劫乃至剎塵矣然後為我仰白慈尊常以慧光折攝我心幻緣一盡垂手而迎是予所深望於二兄者也祭顓愚大師爪髮衣缽塔文嗚呼人不難相愛難於相知翁真知我者哉世縱有一二愛且知者而志操相攜旭雖不敢擬翁泰山之德幸三事略無違焉尚質朴詘虛文不肯苟合時宜註經論讚戒律不肯懸羊頭而賣狗脂甘淡薄受枯寂不肯受叢席桎梏而掣其羈縻嗚呼以法門耆宿如翁而旭過蒙知愛又志操相合如此其能已於懷也翁所證深淺非旭能擬而生平最傾心處請略紀之當今知識罕不以名相牽利相餌聲勢權位相依倚如翁古道自愛者有幾當今知識罕不以掠虛伎倆籠罩淺識令生驚詫如翁平實穩當者有幾當今知識罕不侈服飾據華堂恣情適意如翁破衫草履茅茨土階者有幾當今知識罕不精選侍從前列後隨如翁躬自作役不圖安享者有幾當今知識罕不同流合汙自謂善權方便慈悲順俗如翁不肯苟殉諸方甘受擔板之誚者有幾故凡聞翁之風者頑夫廉而不濫懦夫立而不傾伯夷之隘所以為聖之清也豈似枉尋直尺詭遇一朝者身雖存名已先淪也哉旭每悲如來正法一壞於道聽塗說入耳出口之夫再壞於色厲內荏羊質虎皮之徒其父報讎其子必且行劫尤而效之何所不徑翁之爪髮衣缽幸存則翁之道風未滅必有聞而興起者庶共砥狂瀾於末葉乎祭在庸維那文嗚呼公之從予遊也顓大師命也公初聽大乘止觀歸顓師叩大義公能略荅故顓師再命公登祖堂予即煩公襄理僧事然予深取於公不唯能聽經能職事也聞公同顓師住雲居努力眾務不惜身命逮顓師疾公炎暑不解帶者六旬餘雖大孝事父母何以加焉顓師寂公復以職事來研教理予且大病公執侍不異事顓師嗚呼以公如此心地如此精神豈應年未三十遂爾奄逝無怪乎公之戀戀不欲西馳也雖然公之見地未遠大矣吾人無始以來捨身受身何止剎海微塵今幸遇明師良友聞西方淨土無上圓頓橫超勝異方便惟恐歸家不早耳乃必欲於幻身百年內做學問開叢席名滿天下然後快心曾不思西方有大學問大叢席名滿十方三世得非欲速見小之為害乎公其盡將生平事師孝德及無始善根一一攝取現前回向阿彌陀佛大願海中決志直趨極樂世界更無疑貳予不久幻緣既盡佇望公隨三聖招予同浴七珍池也祭了因賢弟文嗚呼了因爾遂至此耶爾自幼發願竟不滿其願耶予將玉汝於成汝不及再見我耶嗚呼予方悼十子憶汝汝又復為予所悼耶嗚呼汝見我已來二十五年從予遊十九年矣汝之長處我盡知之短處我亦盡知之我急欲去汝之短汝則疑畏捨我而去我必欲成汝之長故時時禮拜持誦而保祐汝乃汝竟不能自保嗚呼此夙業耶抑現緣耶猶憶汝與徹因初侍我也我即苦口勸二人互相師汝宜師徹因立志徹因宜師汝朴實是後徹因長於律學終以不朴實而喪身不謂汝微會入於台宗亦終以不立志而死於房頭耶夫煩惱力強此我短處信心慚愧我長處也不肯諸方宗教此我短處獨具宗教隻眼不肯自足日研日進我長處也善學者學其長捨其短故孔子見賢思齊見不賢而自省擇其善者從之其不善者改之汝乃不學我之慚愧不學我之研求進入此豈稱善學耶嗚呼汝半塗而廢罪誠在我不在汝獨哀汝幼志未遂也哀汝師叔苦心成就不獲大成也哀汝於圓頓大法甫入門不能升堂入室也哀汝獲惡病歿在房頭未知臨終正念現前否也哀我諸子可充一椽一柱者相繼去世不為我聊存一線也嗚呼法門之衰非一日矣眾生障重劇矣佛慈如日生盲不瞻佛慈如雨覆盆不沾汝既稍瞻亦既稍沾柰何中輟弗竟勉旃為汝禮懺為汝誦經汝靈不遠應知我忱歡喜領受助汝西生汝西生已為我白佛願以慧光照我幽窟俾我開曉有善無忒旦晚命盡早歸淨域與汝同觀七珍八德自行早圓化他無極虛空可消願輪不息嗚呼哀哉尚饗寄奠新伊大法師文嗚呼宗說之不明於世也久矣古人得宗說之源故雖分之而愈合今人拾宗說之似故雖合之而愈分此其可痛哭長歎息者何止若三若七而已旭生也晚不及親炙雲棲老人暨紹覺尊者猶幸獲與老師為忘年交者幾三十年不異得見雲棲紹公兩尊宿也方今法道淆訛日甚一日紫亂朱鄭聲亂雅大似刻人糞為栴檀獨賴老師以耆年碩德而默鎮之宏法宏戒身為律聲為經正不必如孟軻好辯野犴狡狐已自褫魄今何不幸示寂如此其速耶客歲效華祝方擬一二年猶得拜見慈顏歷陳衷曲而今竟不可復得豈不痛哉老師久已鑑旭苦心故破格下交於旭今又高據蓮臺洞開慧眼必倍知旭之艱苦而茫茫斯世旭安敢更以知己望他人哉伏讀老師囑語字字堪為末世金錍及門諸賢必能恪遵而宏擴之自利利他法皆具足可謂度人事畢無復遺憾柰法日既沒舉世皆盲旭能不為後流未度眾生興悲感耶
