body:
  text: 贊一釋迦牟尼佛像贊二首百萬人天眼本明拈花無語並傳真飲光一笑生波浪直至如今未太平拈花相塵點劫前生計絕慣從人世弄風魔世閒不解乾城影漫說須從者裏過雪山苦行相阿彌陀佛像贊九首一指光周法界十念成皆自在感應道交生佛無礙討甚自性彌陀只此豈屬心外光明壽量無倫匹慈眼悲心徹底呈隻手長舒塵點劫一般也是惜兒情觀常作佛佛常在觀心想遍知同條共貫如來法界藏身遍入眾生心想譬如月印千江一切有目同仰若欲離此覓真何異捨聲索響總云者個便是依舊無端成兩極樂大聖法界醫王入慈悲定放智慧光盡未來際恆照十方眾生念者攝取不忘以如幻力應物現色妄想稠林相好百億即影即真不二不忒嗟彼生盲覿面弗識別覓玄機翻墮見惑我今稽首滿月萬德願共含靈歸安養國稽首宏願四十八一一願光不可盡果徹因源恆度生蓮華國土如明鏡睹影聞名創發心頓入寶王三昧印但勤瞻禮莫辭勞紙墨元同法界性緣生當體空假中四德三身不別並況復澄空月正圓心水澄清月自映兩朵蓮華足底安一雙空手悲心切覿面相逢法界身虛空大地流鮮血血書接引諸佛正遍知海不離眾生心想是故眼見耳聞盡是彌陀聲像癡人捨此別求喚作法身向上誰知棄有覓空一體無端成兩若知兩既不存畢竟一何須尚熾然禮拜稱名即是超方伎倆稽首西方須摩提無量清淨平等覺乘於六八大願輪示現八萬四千相相有八萬四千好好有八萬四千光一一光中照法界普攝念佛諸有情猶如慈母念一子是故入此三昧王名為普現一切相畫師承此三昧力紙筆為緣妙相生此相即是因緣生生即無生具三諦三諦三身既宛然四德應知無缺減所禮既即諦與德能禮應知即止觀諦觀名別體復同是故能所性空寂稽首如空無所依是即自性無量覺一佛二菩薩像贊二首麻麥漫充饑平地風波險瞥悟本來心無端石火閃跨師執如意佛祖供褒貶乘象閱大經何曾有一點喚作佛菩薩虛空不受染禮拜任眾生盡禮原非諂咄直饒恁麼舉揚也是白圭之玷出山相稽首阿彌大導師觀音勢至同悲智願輪無盡等虛空歷劫長行不思議生界不空行不休此是四宏無作誓生界本空行非行誰知二諦是一諦二由一有一莫守非一非二非三四三二宛然顯一真大聖以此垂恩濟但願眾生悟自心自心那復存橫豎橫豎無非法界心法界亦是強名字即知自心三聖人本與眾生體不異覿面三身四德新紙墨筆腕非他事身命歸依能所忘雙忘雙照恆如是西方三聖行像三大士像贊成群作隊無風起濤騎師跨象何足稱高鍊得身形似鶴袛是自苦自招忽然遇著文喜畢竟如何解嘲咄楊柳垂垂春盡綠清明時節雨如膏地藏慈尊像贊五首同體大悲無緣宏誓千佛之祖群生之裔定入剎塵珠懸三際輪相破疑辯才顯諦欲令戒學重明頂禮莫存分劑人但知其地獄救苦不知其無處不現人但知其臨終扶持不知其無時不念三部經王二種妙觀十輪重匡末法三輪盡裂疑罥此無量門中第一神速法門從來若逢不逢似見非見不肖子一生極力舉揚獨許歸信無閒尚有一事懷疑問取法身莫辨眾生墮落地獄皆由破戒重障大士入獄救苦獨現聲聞戒相不解剖判法身偏解拈提向上此是無作妙色眾生性具家當握珠堅強戒身地藏人人地藏五乘該盡孝慈心最是醫王願力深百草根莖皆不棄贏來大地足知音涕出何須更著慚館人相識恨長含一哀偶遇橫流淚處處臨喪欲脫驂普賢願王像贊二首介爾一心萬行具足表以象王支七牙六除爾瞋心便轉妙轂法界宗師昭彰耳目遠證讀誦近嚴幽獨覓即不見見即受毒十大願王導歸極樂塵塵華藏從此彰爍不昧因果法界開拓問取棗柏玄珠在索文殊師利法王子贊二首稽首大智德勇健表於無畏師子王能照八萬四千律皆作甚深般若光手執如意摩尼寶所遊自在妙吉祥怖魔破惡亦除饉大乘僧義難測量巨石喬松恆演法無是非是身堂堂一片青山無邊波浪動靜不生奇形異狀湧出寶蓮文殊在上大智勇猛識風鼓盪若欲思量命失身喪普門大士像贊二十四首一滴軍持汪洋非淺灑盡三千不虧不衍生界若空斯行迺轉行像白者是紙黑者是墨何處是紫竹林甚麼是磐陀石希有大士無作妙德不向空中現影偏借靈於手筆識海波澄月影寒蒲團葉翠苔痕碧南海波斯到岸來明珠價值微塵國如意縱橫蓮經燦爛師資追隨虛空彼岸欲識兩人真面目一般是有血性漢血書觀音善財相取草為座名曰吉祥定共道共總此浮囊無非佛行象顧師行普門示現比丘中王比丘相磐石宴坐無得無說妙法兩函紅爐點雪手足分明機關迥別擬議思量證龜作鱉蒲團寂寥雲衣綽約大悲法門借病作藥教苑筌蹄禪河略彴顧問善財南詢路漠佛法無多商量浩浩說則不周行則不到怒目揚眉逢強須暴一炷名香魔軍永埽寶蓮本向真空湧月面還從性海昇踏破波濤全是水不勞彼岸較先登風浪千尋神通一味遊戲翩翩何拘何繫踏破須彌萬朵雲眾生見者咸如意入定何如出定時渟渟甘露浸楊枝大千無地留煩惱剩有空拳誘小兒一顆摩尼光遍法界卷之舒之隨心自在倚坐危巖忘形絕待甘露楊枝妙協兼帶喚作禪機空拳捏怪獨許童子追隨鸚鵡依然雲外巍然獨坐大雄峰度盡眾生不見功描出虛空千色彩依稀未睹紫金容稽首大悲自在覺圓滿無礙陀羅尼慈威折攝不思議定慧莊嚴無等倫頓悟一念具千法通身手眼炳然彰方便智慧皆無作一切念中亦復然念念顯現不增減塵塵法性亦復然是故尺楮寸毫閒悉具大悲圓滿相有人獲睹此慈容便悟法身真相好此是普門示現力莫作紙墨影像觀大悲像得根本圓通現三十二應十四無畏力遍療眾生病塵剎盡分身紙墨皆真性覿面太分明發光同海印更問大士誰缽盂重討柄碧眼修眉長顱方頰革屣蒲團軍持祕笈與彼應真示同一業是大比丘清淨卓傑梵僧相松株若龍重巖似屋趺座蓮臺楊枝嫩綠善應群機如響荅谷眼色耳聲非一非六莫教錯認古觀音俗人帶髮僧頭禿菩薩慈真眾生病假煩熱場中楊枝遍灑徹體清涼不知為者此便是無二無分無別無斷的血脈更何用鑽龜打瓦咄咄佛法雖妙執之則粗龍鬼雖俗現之則雅若云觀音必具妙相笑殺東村大姐音聞性清淨聲字何須埽執卷視群生普施摩尼寶智士悟根源愚人打之遶童子挈魚籃只為金鱗少二尾價一錢未審誰能曉一葉蓮舟翩翩獨邁歷盡塵寰不離鍼芥分明日用尋常超越千奇百怪識得其中一線真斯則名為觀自在此是三十二應十四無畏四不思議無作妙德的全體大用徹底和盤舉似人不許擬議思量只許翹勤禮拜終朝掐數珠聲聲觀自在常然大用門未來終不改眾生若肯自念何勞諸佛披鎧秖因覿信不真坐在飯邊受餒眾生迷本聞循聲妄流轉正在流轉時聞機元不遠大士纔返觀方知性自善圓通復真常觸目菩提滿遍應十界音機成便能感寂爾坐巖阿熾然濟群染非是大士功亦非心念力兩皆不思議所以終無忒自性無自性情識非情識覷破真妄關方知法界德以我虛妄想投彼寂滅國如薪入火叢如冰遇湯沸無明不動智兩名唯一實執佛珠緣九界上下合慈悲債欲悟圓通但勤禮拜思彼思憶不思議最思憶相自性光明圓滿輪巍然露出紫金身分明色相離情謂何必重拈物外真葉作蒲團布作衣默然趺坐待群機眾生界盡悲無盡不自觀音那得知阿羅漢像贊二首咄哉者自了漢夢墮大河不憚曲肱舒腳熟眠豈問中流兩岸遇著希運禪師又添一重公案渡海眠相證得無礙解脫豈畏文字葛藤拈來句句漏逗埽去亦自非真不如隨分消遣青山何礙白雲閱經相布袋和尚像贊三首不離兜率幻遊人世布袋頭開逢場抽稅笑口呵呵無邊宏誓臨行自說姓名誑殺幾多後裔盡問袋中何所有誰知笑裏自藏刀浮沈人世無人曉塔院初成身已逃咄八萬歲時重舉似此行端的付蓬蒿一箇布袋千如百界性具性造互生互在搬出搬入了慈悲債笑臉呵呵兒童多賴縱令覿面不識同到龍華三會寒山拾得子像贊三首一真實地不解屏息十字街頭慣作浪客國清寺裏無人曉鼓掌揚眉閭丘太守忽相追潛蹤遁跡雖然罵破老豐干不免兩處皆狼籍天台垂跡誰能發尚賴靈山兩作家主伴莫分前後示依然一會說蓮華一處一時同撫掌當知夙有大因緣願王豈復違共主智海安能出義天俄爾藏身非偶爾漫然饒舌匪徒然生平無限傷心句盡付滄茫落日邊達磨大師像贊五首問渠何往本自無家一葦初折毒鼓已撾風恬浪靜從君渡可惜兒孫盡帶枷一句安心語萬劫繫驢橛轉得鼻孔來虛空出鮮血怪底東施強效顰卻令西子蒙不潔何如分付老雲門早與瞿曇同打殺驀地西來大似風前浪起更加折葦不免眼下眉添饒君面壁九年落得弄巧成拙賴有楞伽四卷且喜救得半邊咄逢人切忌錯舉震旦大乘機緣熟勞君遠自西天竺蕭公不識真得髓渡江疑殺人閒僕神光斷臂始心安楞伽四卷開眉目誰知法立弊旋生五家分派空勞碌明道者多行者少說道者多明者獨只今江上蘆花寒堪使屈原歌且哭面壁非由心不安梁皇不識意多端神龍睛點應飛去跛鱉徒悲行路難行路難仔細看守株待兔知何日緣木求魚被熱瞞老胡雙碧眼孤炯照人寒幽溪開山始祖融禪師像贊鵬養威遙天瑞勞導師迢迢至拶破坐觀心掀翻佛名字何物復何人者箇原非二真風雙徑寒幻跡牛頭賁負米豈云勞垂涕奚關寐橫一枝今未墜雞籠月影芙蓉翠四明尊者法智大師像贊教觀久失墜佛子乃再來法界何次第片語聲如雷首座尚辭喪況復諸庸才缾水既灌口智首亦操回蛣蜣論六即陰妄豈塵埃理毒與性惡圓頓無疑猜唯心亦唯色至理從此開大悲傳祕印指要剖迷胎一喝悟直院機用非安排中興集大成萬古猶堪懷紫柏尊者達大師像贊二首破盡流俗知見豁開宗教眼睛不是門庭施設極力剿絕識情契心印於覺範救暗證之生盲法道是重一身為輕試驗圜中瞑目地始知半偈已功成此是紫柏老人佛法不作人情闡明性相宗旨爍破盲禪眼睛何必師資授受自契佛祖心精何必上堂說法隨處廣度群生堪使頑廉懦立百世聞風若新憨山師翁清大師像贊三首有謂此像太像是見嶺南之姿有謂此像不像是見匡嶽之儀予謂師宗不宗教不教正以像不像而得其皮且道是讚伊是毀伊咄且看眼上一雙眉偉貌豐神堅勇大勢空定凝神光明初霽憂在法門禍福寧計掣電奔雷德山臨濟密用潛行圜中海際知之者謂是隻手擎天不知者謂是英雄欺世誰知其甘處於非宗非教之閒不與時流同逝生平不識師翁面夢中接引曾三見今日欣瞻卷上容彷彿慈悲親示現忘身為法古來稀荊棘林閒慣血戰萬里炎荒作戰場未審何人追後殿雪浪大師贊埽蕩支離不拘軌則瀟灑風流露疵縮德分明是玄奘再來怎怪得肉眼不識雲棲和尚蓮大師像贊三首威而不猛和而不同慈心濟物梵行明功追蹤往哲啟迪群蒙彌陀一句橫亙豎充禪關把定永鎮魔風我來禮塔恍睹遺容咦私淑未須言嗣法聊將嗣德附蓮宗世競貴奇特師耑守平常人盡尚高峻師獨存謙光旋萬法而指歸淨土憫五濁而廣作津梁聞慈風兮寬鄙敦薄積善化兮源遠流長仰遺規以私淑愧嗣德之未遑此是雲棲老漢肚裏最多思算諦觀末世法門百怪千奇沒幹饒他梵語華言不出威音那畔所以旋轉萬流直指西方彼岸只圖腳底著實何必門庭好看八十餘年暗室燈聞風猶使頑夫憚博山無異師伯像贊二首貌偉神豐心慈體勁向空觀以入門從壽昌而斷命堅持不肯家風痛洗今時禪病既存徹困婆心何必單提正令只嫌一句葛藤窠留與兒孫作話柄沒蹤跡處莫藏身老婦依然猶歎鏡此是博山老漢肚裏絕無思算逐出魍魎山精送與群魔作伴雖然未得兒孫卻勝諸方雜亂咦把定牢關不放人至今聞者猶驚憚靈隱兄像贊淨明菴裏打失半邊鼻孔猶未全露敗缺台嶽書中摸著一箇秤錘到底硬如生鐵呵呵呵會也麼同條生不同條死莫怪巖頭口太多誦帚律師像贊冷面熱腸銅頭鐵額不徇時情專圖破格涉水登山禪關講席勝友良朋風朝月夕嘗遍神農百草丸彌陀一句成安宅雪航法主像贊二首一世老婆心切未免弄巧成拙臨行穩蹈蓮衢也是今時豪傑西方公據現存何必豐干饒舌好個伶俐漢子慣要拖泥帶水雖然滿地兒孫未審阿誰得髓臨終不忘舊交千里向予求毀索性再罵一頓果然是釋迦文佛的奴僕婢使鑒空寧禪師像贊骨嶙峋面冷落嚴律檢珍然諾功成不居因果不錯咦六十年來不炫奇臨行落得心無怍衍如禪兄像贊欣欣厥容謙謙厥德無事縈心有懷詣極揖春風兮飲和歷歲寒兮自得時人是真時人彌勒是真彌勒覺空老尊宿像贊擲戟投戈禮覺王獻花巖畔露神光戒香獨紹五雲色佛號偏宗十億邦鎮日蒲團消客夢半生崖壑絕行藏陳如自昔稱僧首百世猶聞眉影長宣聖像贊空空無知知我者天聖仁豈敢不貳不遷一以貫之初心方便天下歸仁最後玄詮跡集帝王之後本開覺路之先寄微言於易象推大聖於西乾縱無大灌頂經之記亦可信為普門示現之賢趙十五像贊視物之生猶己之生視人之厄猶己之厄只此民胞物與心腸便是大慈大悲血脈欲知不二法門更受山僧一摑豈不見博施濟眾堯舜猶病菩提初發生界斯盡會得個點玄關便是維摩話柄咄覺路本來常坦坦莫認偏鋒作正令沈母金太孺人往生贊有引吾人現前一念心性原與阿彌陀佛同體而罕能直下知歸者無他未具信願行三故也子嘗謂信如將願如謀行如軍旅有將有謀老弱亦可取勝苟無將謀雖勇壯亦潰矣是故信宜專願宜審行宜無所不收專且審故圓頓直捷而至高無所不收故三根普被而至廣此念佛三昧所以為橫超勝異也邇來宗教之士或視念佛太易以為曲被中下或視念佛太難以為齋戒須全夫太易則不高太難則不廣豈寶王三昧之謂哉今觀太君坐逝洵可頓釋兩疑合掌贊曰人心佛心本自無二一念相應欲仁仁至卓哉沈母信此實義聖號喃喃日時不離但持十齋慈祥愷悌罕睹怒容多贍惠施八十六年淨業乃粹集飲歡娛大醒如醉驀直西歸坐脫若戲欲顯真因身香表瑞信矣高圓誠然廣被匪易匪難千秋永企沈翼薇趺坐圖贊七年守土愈殺愈慈二載省方恩威並施朝中正立奸魄潛劘林下彷徉知雄守雌賢母念佛端坐西馳純孝繼德取友親師君不見君家太君身示現圓融直截超方便假饒透盡千七關五百元來只半串直下聞熏莫更疑長安豈離含元殿譚埽菴居士像贊頭頂青天腳踏實地忘食忘憂窮年竟歲讀盡世閒好書識盡古今奇字不肯分佛分儒何必為僧為吏孔孟稱之為出世子孫佛祖喚之為在家法裔單得憨翁授記深畢竟同歸第一義陳旻昭居士像贊願廣悲深心靈語豁以法門之憂為憂以群生之脫為脫盡未來際誓居學地遙承壽昌不肯二字真正衣缽見人一味合掌低頭便是今時常不輕菩薩張玄超像贊分宗判教兩無涯吳越元來是一家欲識聲前句後事年年踏雪看梅花
