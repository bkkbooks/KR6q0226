body:
  text: 願文四鐵佛寺禮懺文壬午菩薩戒沙彌智旭自惟障重不逢盛時目擊時艱倍增愀愴斗米幾及千錢已歎民生之苦病死日以千計尤驚業報之深良由同分惡緣感此非常幻相了知心外無法何容坐視漠然茲遇盂蘭道場然香五炷供養法界三寶發五種願一願當今皇帝寬裕溫柔尊賢容眾視臣猶如手足膏澤徹於寰區用慈心三昧降伏魔軍以無作四弘紹隆佛種二願檀越道府某某廣及當朝宰輔海內群臣各得仕學無虞明威有實三願苕溪境內震旦國中疾疫消除刀兵寢息風雨順時穀稼豐稔廣興法化同出苦輪四願我等各各師僧父母歷劫親緣善惡知識同學眷屬造寺檀越十方信施無不超越四流圓證三德自利究竟利他遍周五願盡虛空界抱識含靈等悟真因咸成妙果空九界之夢幻歸一心之本源塵塵物物無非寂光法法頭頭顯發妙行遍微塵國不聞魔外之名盡未來時不起愛見之濁恭惟法界三寶證知護念甲申七月三十日願文歸命能仁無上尊大孝大慈真法性三乘權實眾威神願賜哀憐垂攝受弟子智旭自惟夙障纏此幻形復以深愆丁茲劫濁三寫烏焉悲佛法之衰亂五逆橫作痛國步之艱難朝野無改過之心緇素爭覆轍之踐良由共識相種惡業同牽同分妄見眚緣共起徹底思惟決無心外實境由衷悔憾須勤體內漚和爰與同行并集檀那普為國王帝主父母親緣土境萬民法界含識頂禮慈悲道場懺法供養歷代知識道容然香三炷供常住三寶又三炷奉供幽冥教主地藏慈尊伏願大行皇帝滅燬像之重尤解殺戮之積怨頓蒙解脫速悟無生今日主臣進賢遠佞發真實悲救兆民之心捐利去名竭真實不顧身家之悃次願我等各各生身父母歷劫親緣師友知識眷屬檀護等已命過者長辭八難托質九蓮今現在者不受兵祲永離驚慴又願執勞運力助營福業者一念無私共轉國家之禍亂三輪不昧等消君父之愆亡又願見聞隨喜廣及法界眾生普植良因等成妙種空五濁之幻染證三德之性真盡虛空界悉悟圓常智旭乃當成等正覺佛菩薩上座懺願文頂禮十方大威德五分嚴身慈勇王以不思議本誓願同賜哀憐拔濟我弟子智旭敬然頂香三炷供養十方法界去來現在無窮無盡一切三寶剖瀝肝心而自責曰嗚呼從古解超佛祖之前行落凡庸之後殆未有甚於罪旭者也智旭於未識佛時未識法時未識僧時誤聽邪師妄以千古理學自任造無量謗三寶罪應墮阿鼻大地獄中具受阿僧祇劫劇苦蒙觀音地藏二大士力種種感觸拔我邪心令得歸向佛法正信出家不謂出家後仍被夙業所障僅發解慧不沾法流復因損己利人遂致心欲定而反亂念欲淨而偏染二十餘年略無實詣今者反躬無似內省多愆念及生死事大無常迅速真堪慟地號天追思剃染初心離俗本志何啻斷腸裂膽外無化他之實內妨自行之功在世既溺邪見濁流出家又為法門汙道進退失措慚憾何窮竊思向年力詬大士大士尚自哀憐今已深信三寶三寶寧弗攝受秖由無始障濃自隔同體悲應然障無實法惟心所生既從心生還從心滅而理障必須理除事障應須事遣自惟多生以來急乘緩戒薄事尚理久墮三塗偶獲暫出所以一聞宗教徹底知歸力學毘尼偏多違犯圓頓妙理無精細而不入相好觀門雖少分而罔成既揣病源理須良藥曾聞造像功德最能滅罪除愆禮拜懺摩實可洗心滌慮爰發虔誠集資改造一佛二菩薩像仍發誓願恒禮占察行法不論年月耑祈純善輪相眾生雖垢重諸佛不厭捨必以大慈悲哀愍度脫我使我從今以後心無掉舉身得輕安護口過而勿出綺語惡言淨意地而不起雜思欲覺速得清淨三輪克臻自他二利普化眾生同生淨土大悲行法道場願文乙酉五月初三日頂禮真實大悲心究竟分證二覺者我無始來墮虛妄循環生死靡暫停失本性樂枉受苦今欲與拔自無力願大威神同體緣不捨本誓垂哀濟弟子智旭自惟曠大劫來言不顧行口與心違今雖幸廁緇流仍不能忘故轍簡點一生有六大罪而小過蓋無數焉明知向上一路而不能親到佛祖真受用處明知圓頓教觀而不能登五品以淨六根明知大小毘尼而不能清淨性遮諸業明知殺業是刀兵劫因而殺機尚未永忘明知偷盜是饑饉劫因而偷心尚未全斷明知婬欲是疫病劫因而婬機尚自熾然是以別業資乎同分現行感於共種睹三災之洊臻悲四生之無賴徒懷曠濟之心反受俱溺之害捫心自憾血淚何裨今幸遇濟生禪院大悲心咒行法道場發心隨眾熏修願滌自他塵垢適值母難之辰敬然頂香六炷供十方法界佛法僧寶極樂教主阿彌陀佛大悲心咒總持祕要千手千眼觀音大士發六種願一干戈永息二五穀豐稔三兆民正信三寶四靈峰古剎復興五六智旭多生惡習速得剋除煩惱脂消功德圓滿及永無意外逆順二緣早完閱藏著述二願又然臂香十炷供十方三寶發十種願一期主淨障二同行成器三香燈侍者事理齊修四外壇同行戒乘俱急五常住一切職事執勞運力助緣營福者不落有漏六一切護法宰官捨財檀越深悟解脫七一切見聞隨喜若緇若素遇影蒙塵功無虛棄永為道種速證圓常八靈峰住山沙門及某等早得清淨輪相圓成福慧二嚴深念苦空專求出要九三塗息苦八難超昇蝡動蜎飛均沾勝益十以前功德回向西方普與含靈同生淨土禮千佛告文弟子智旭與法界含識自從無始至於今生昧我法本空起遍計情執具迷事迷理二種無明作分段變易二死根本貪瞋癡慢邪見紛紜殺盜婬欺飲啖顛倒依於三業六根廣造五逆十重致使三塗鼎沸八苦雲攢乃至幸獲人身仍遭劫濁疾疫饑荒洊至已足寒心干戈兵革頻興尤堪喪膽父母妻孥莫保骨肉身首分離百骸潰散誰思一性常靈萬鬼聚號肯信三緣自召悠悠長夜淚與血而俱枯漠漠荒郊魂與魄而奚泊哀哉同體之痛慘矣切膚之悲憾道力未全徒懷悽愴思拯援無策秖裂肺肝爰鳩同志五體投誠代為大地被難眾生頂禮三劫三千諸佛臂然香炷心發菩提仰願大悲拔苦大慈鑑機大智慧光爍群盲之積闇大神通力出苦海之沈淪令今日海內海外江北江南已命過者速脫九橫之城徑超九蓮之土未命過者即離驚竄之怖永享太平之安又願諸佛菩薩興慈運悲憫此劫波來膺眾許又願遇影蒙塵蜎飛蝡動廣及法界一切有情從今已去乃至菩提常知警悟不搆惡緣永滅三塗頓消八苦即同居而橫徹寂光不僧祇而圓登妙覺祖堂結大悲壇懺文頂禮大悲尊及法界三寶不厭垢眾生始終垂哀拯智旭自惟無始來至於今日積惡逾於須彌招苦浮於大地雖蒙諸佛菩薩種種提攜薄解真乘無柰夙業煩惱淵淵深厚時牽現行蓋無論未歸信前厥罪無量即追思既出家後愆累尤多如大悲行法道場業五與勝會乃雜亂障垢終不與三昧相應虛消檀信脂膏辜負人天屬望撫心扼腕慚懼何窮茲又恭遇幽棲禪寺建清淨壇施主竭供養之誠期主極殷重之悃智旭以下劣凡夫沙門汙道不惟叨陪法席兼復謬主行儀反躬無似驚悚彌增爰於方便結界之始敬然臂香三炷奉供大悲同體三寶又三炷供九位同行懺師伏願同體三寶憫智旭之沈淪速垂拔濟同行九人憫智旭之不逮咸賜匡扶俾一期中內障外擾以潛消理觀事儀皆成就智旭又於十方三世三寶前現在同行九人前胡跪合掌剖肝瀝血作如是白智旭從無始來至於前世所有種種煩惱惡業苦報無明覆故已不自憶今悉懺悔願盡消除智旭少年謗三寶業今尚憶知誠心懺悔願盡消除智旭出家已來挂菩薩比丘虛名不能如法行持所有性遮諸罪若憶不憶無量無邊今悉懺悔願盡消除智旭於四十六歲自反多愧退作但三歸人勤禮千佛萬佛及占察行法幸蒙諸佛菩薩大慈大悲於今年正月元旦錫以清淨輪相稍自慰安無柰夙習根深不能自拔出壇後又起種種身口意業乃至濟生菴修大悲行法然香懺悔以後默簡長夏初秋仍復多諸違犯嗚呼佛稱二種健兒一自不作罪二作已能悔夫作已能悔者必悔已不更作故可稱健兒也數數悔又數數犯豈健兒乎智旭今猶墜廁人身口耳鼻皆陷糞中獨明信因果不謗大乘清淨正眼未沒溺耳設諸佛菩薩現前善友不乘此時力拯拔之正恐淹漬日久清淨正眼并從淪隱可不哀哉智旭反覆自思本以真實為生死心決定大菩提心絕不夾帶利名亦不牽染恩愛如法出家因地頗正胡為墮落至此久滯凡地不預聖流即欲逃名晦跡獨往深山筋力漸衰不堪行邁且愛見慈悲漫縈纏於婆和學侶致使枉尋直尺擔麻棄金如此痛傷惟諸佛菩薩能知亦唯有諸佛菩薩能救耳且向年力詆三寶惟有罪障諸佛菩薩尚自矜憐今日宏通大乘亦有微善諸佛菩薩豈反終棄邪是以披揭愚衷仍求加被願我煩惱脂消功德肉肥三學圓明二嚴滿足捨此幻軀決生極樂盡未來際廣度群迷又願同行九人各各剋除習氣成就總持自利利他棟梁法廈又願期主福慧增長檀越信行堅固乃至隨喜緇素執勞運力見影聞聲悉悟顯密圓通咸了性修不二直至菩提不遭岐曲又願風調雨順物阜民安干戈息而烽火無驚疾疫除而醫藥無用菽粟如水火陌路猶至親挽末劫頹風不異正法住世超娑婆濁惡同歸安養蓮胎占察行法願文丙戌歸命慈威無等尊拔苦與樂真出要定力能除三劫災救世真士垂悲拯弟子智旭痛念劫濁難逃刀兵競起雖云同分妄見實非無因誤招往業莫追來事可諫爰偕同志某等十人各捐淨資營修供養三日方便七日正修如法結清淨壇頂禮占察行法六時行道五悔鍊心哀籲同體大悲懇乞無緣拔濟伏念眾生障垢雖至重至深三寶洪慈終不厭不捨苟一念知改過必隨許以自新況釋迦本師勇猛稱最地藏大士誓願無忘子幼弱父愛偏強兒不肖母憐益甚憫茲匍匐入井之愚賜以身手衣裓之用俾毫光照處消兵戈為瑞日祥雲法雨霑時轉邪櫱為道芽靈種所願風調雨順國泰民安正教流通魔邪竄絕次祈比丘智旭身無病苦心脫結纏定與慧而等持戒並乘而悉淨期主某法社雖復三年攝護願如一日某等各各真為生死發菩提心剋除習氣臻修法門三學圓成二嚴克備續佛慧命普利人天又祈外壇隨喜緇素悟知一實開顯三因二觀圓修三忍圓證又祈外護助緣廣及法界含識若見若聞若不聞見等植良因均霑勝益又祈江北江南乃至震旦域內近日遭兵難者種種債負消除一一怨嫌解釋脫幽冥之劇苦胎蓮萼以超昇恭千法界三寶地藏聖師真實證知真實攝受大悲壇前願文歸命頂禮十方常住三寶大悲觀世音菩薩地藏菩薩摩訶薩伏祈同賜哀憐俯垂拔濟切惟智旭向於九華拈得閱藏著述一鬮遂復安心重理筆硯適於祖堂輪現所患命盡之語理應併意徑馳樂邦獨可痛者閱藏未完則私願未滿教觀無繼則法輪無傳且梵網佛頂雖已竭一隙之明如塵培嶽而楞伽唯識猶復錮繁言之障如霧迷空自非假我數年何以了茲陳債自非洪慈庇護安能不擾他緣敬然臂香十炷供養十方慈父大悲觀音地藏本尊法界三寶伏願智旭從今以去永離違緣決定閱完大藏得成閱藏知津法海觀瀾二書決能撰述成唯識論觀心法要及相宗八要直解決能解釋楞伽尊經及占察十輪度世要典決能闡明無量壽會彌陀賢護淨土津梁決能發暢大般涅槃扶律談常最後垂範又願學侶乃至現在未來諸有志者決能戒根永淨福慧圓成壽命延長解行雙到又願智旭煩惱冰鎔智慧火熾十惡根枯六情性露又願萬民無三災之苦四姓伐邪見之林又願以此功德普施法界眾生臨命終時決定得生阿彌陀佛極樂世界親承供養大悲觀音得無量無邊三昧神通總持智慧同地藏慈尊普入法界諸大地獄救度一切苦惱眾生乃至分形散體橫遍豎窮十界現身三輪施化如一眾生未成佛終不於此取泥洹閱藏畢願文甲午九月初一日敬禮無邊際去來現在佛等空不動智救世大悲尊弟子智旭敬然臂香四炷供養盡十方三世一切諸佛一切尊法一切菩薩一切聖賢痛念智旭年三十幻寓龍居第二閱律遂復發心遍閱大藏於一夏中僅閱千卷旋以事阻至三十三歲甫進靈峰結冬時山中無藏癸酉春藏至未裝丙子季春遁跡九華於彼抱病閱千餘卷壬午山中藏裝成癸未結制簡閱僅千餘卷又被他緣所牽幻寓祖堂及石城北共閱二千餘卷己丑歸山因註法華占察二經改治律要未遑展閱壬辰秋擬進山畢茲夙願又值幻緣牽至長水借閱千卷直至今甲午春方獲歸臥林泉又以一夏病緣居半乃於仲秋月畢僅獲完滿竊計發心看藏已經二十七年出入茲山亦匝二十三載凡歷龍居九華漳州泉州祖堂石城長水靈峰八處方獲竣事於中前後閱律三遍大乘經兩遍小乘經及大小論兩土撰述各止一遍而已嗚呼緬想法緣不易可勝涕泗滂沱今幸仗三寶力已畢微願是以然香更求加被一者竊見南北兩藏並皆糢糊失次或半滿不辨或經論互名或真偽不分或巧拙無別雖有宋朝法寶標目明朝彙目義門並未盡美盡善今輒不揣謬述閱藏知津法海觀瀾二書儻不背佛旨乞得成就流通二者如圓覺維摩彌陀地藏乃至大涅槃經夙有微願再加解釋并僧史寶訓亦願增修仰求庇護令得速成三者大殿半傾前殿盡倒觸目傷心實難為力今以付與天龍願蚤成就四者念此荒野之地久不聞佛法名實賴大楫法主大粹靜主大頎期主以創其端至於請藏則戒周首發大心道晉如源等助成其美印刷則受籌之功裝潢則心見之力苦守不墜則成瓊為最助緣成就則善信是資伏願已上過去者以今然香功德三障頓消四生永脫蓮開上品之華佛授一生之記現在者道心堅固福德增長壽命延長智慧開發又願學人六人及堂內堂外上下靜室一切法眷各各剋除習氣趣向菩提戒定慧以增明福壽康而如意又願智旭從今以去病苦消除煩惱冰釋不遭逆順兩魔恒得安心著述以茲法施功德回向西方淨土普與法界眾生同生極樂世界大病中啟建淨社願文十二月十三日甲午十二月十有三日菩薩戒弟子智旭一心歸命極樂世界阿彌陀佛觀世音大勢至清淨海眾及十方三世一切三寶痛念智旭本為生死大事二十四歲出家絕無半點好為人師之念不意幻緣所逼謬為人師二十餘年雖有弘法微善而虛名所累觀行荒疏弗能折伏煩惱以登五品今病患纏身心雖明了力不自由痛哭號呼罔知攸措幸仗佛慈殘喘未絕設非急勗淨業何以永脫苦輪爰發虔心敬就靈峰藏堂邀同志法侶十人及外護菩薩沙彌五人和合一心結社三載每日三時課誦稱禮洪名二時止靜研窮大藏教觀雙修戒乘俱急願與法界眾生決定同生極樂智旭從今以去誓不登座說法除同志執經問義不敢倦荅若敷文演義自有照南靈晟性旦略可宣傳誓不背佛平坐除稍偏及對像坐誓不登壇授戒若授戒學律自有照南等慈可以教授誓不應在家人請齋除寺院靜室中仰乞三寶證明攝受令智旭諸緣未盡早就輕安大限難逃徑歸安養生則念佛兼著述死則不墮亦不退又願同行法侶無論旭存與否堅志同修有始有卒又願外護沙彌無論旭存與否誠心營事勿懈勿失以此殊勝淨因回向無上極果普與含生咸歸祕藏
