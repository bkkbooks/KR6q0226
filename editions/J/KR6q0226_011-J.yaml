body:
  text: 古歙門人成時編輯荅問一荅卓左車彌陀疏鈔三十二問原問附問華嚴雖二乘盲聾亦兼攝聲聞以含無量乘故此經雖二乘種不生乃道品大小互通正與華嚴四聖諦品不異故有生彼經劫方證小果者大智度論云彌陀亦以三乘度生自應二藏五教總攝何云不攝小乘且既通雜華復不能通雜華所攝無量乘邪荅疏主判經以頓通圓不以圓攝頓又約道品即小成大小果暫有終無之義謂不互攝豈一句彌陀不橫羅諸教圓契五宗不全體華嚴全攝諸乘也問餘門豎出念佛橫出餘門正指教中觀行故禪稱別傳淨云徑路皆以超越觀行故今云觀即是念念即是觀直以台觀當之不反鈍置念佛邪荅此之橫豎約自力他力斷惑帶業而論不約境諦觀智故念佛圓收圓超一切法門亦不可以參禪為例若論諦智四教觀行有析空體空次第一心之不同謂前三豎出三界則可謂非橫非豎之一心三觀亦為豎出可乎況觀經以如來勝異方便攝眾生性具觀門同宗一心同歸淨土觀念相即何名鈍置但辯持名不惟散善非妙觀便不捷徑也別傳之旨尤不容剩言滯句末法之中有名無義果令四教不收便成離經魔說烏在其為超越也問天台三觀得攝法界觀否荅華嚴法界生佛同源以收機不盡不免現權隱實則阿含乃至涅槃皆華嚴閫外所以驅率土盡令臣服也法華實相本跡同印以說時未至不免為實施權則般若乃至華嚴皆法華前茅所以會甸荒同令執玉也一名從本垂末一名攝末歸本非一心三觀何得事事無礙非事事無礙何名一心三觀問合論判極樂淨土是權淨名唯心淨土是實然菩薩成佛眾生來生明言攝受往生之事與彌陀無二疏言此指事一心者豈事一心便不名唯心邪荅合論以不斷惑生同居乃如來權巧之力非謂法藏四十八願莊嚴淨土亦非實也淨名心淨土淨正同法藏往因至於菩薩成佛眾生來生何妨從實垂權若念佛人因事入理又何妨即權即實權實事理總屬一心雖分不分古人判釋皆當作如是觀問觀雖十六言佛便周何故鈔只通普觀為助因邪荅念佛觀佛歸趣同入門異初心行人雜則不成三昧故唯稱萬德洪名便為多善根然正助兼修本無定法如行舟然揚帆扯纜撐篙搖櫓各隨其便可也問大本言生彼國者皆當一生遂補佛處然中下胎生豈等覺菩薩邪荅非等覺而可稱一生補處以不更歷生死必圓無上菩提故小本眾生生者皆是阿鞞跋致亦指此生必補佛處而言不以常塗三不退論下又云其中多有一生補處則別指現證等覺者亦以此生必補故得云其中多有也所以極樂凡聖同居土與常塗教意迥別常塗不過暫時同居此與一切等覺同淨寂光故云得與如是諸上善人俱會一處諸上二字不概指無量聲聞菩薩單指多有一生補處而言又常塗約感應及聖者過去有漏業得與權實聖人同居此則同一無漏不思議業感生俱會一處故又云不可以少善根福德因緣得生彼國少字揀至別教地前并豎揀至圓教住前以住前皆仗自力登住入同生性方蒙諸佛護念故吾每謂淨土大教圓收一切教超出一切教正謂此也問單念佛人不修餘行得波羅密即是多善多福今念佛所證止素法身邪已具萬行莊嚴邪荅三身一體普賢行門不外毘盧性海是以初心雖不修餘行令三昧易成而三昧既成三因圓顯豈有已證法身莊嚴終缺亦何須未證法身預恐不具足邪然或一門深入或餘行助成未許執一一行三昧一即是多萬善同歸多即是一問念佛的是誰與別則公案無二鈔云體究念佛與舉話頭下疑情意極相似然四種念佛未列體究一法經文本無此意不應入淨業門今兩路雙徵若參此不悟亦不失往生此為參門留一退步正墮偷心若此疑不破便不得生此為念門啟一疑情卻成異說智徹慈炤天奇毒峰諸師皆主此說何所本邪雲棲若祖諸師何不直拈誰字若只相似而已願聞不全是處荅因念佛人不見佛性偷心不死故以此語昭告之令直下相應即於一念中圓見三身圓淨四土階理一心此一門深入一心不亂之前茅也後人聞此誠言無論悟與不悟便可死心念佛更何用參此段公案直須如此了得當知昔人下此語時絕無禪淨之分後祖收之但入本宗非入淨業何以故公案現在故今疏主收入淨業仍為禪宗何以故救有禪無淨土之病故然則若信得及以悟為則以淨土為歸真實不欺不留退步即此似處即已全是若信不及死我偷心而偷心轉甚正好實念而念反狐疑只此似處即全不是故曰學道須是鐵漢著手心頭便判有疑則參雖罷參而不能無疑則念欲起疑而何自如是則直念苦參亦無非往生正行也問如子憶母必想儀容今但念聲相續不取相貌易馳散否或依出入諸息得非小乘法邪荅子之憶母或善想儀容或呼號血淚觀經云彼人苦逼不遑念佛此指觀想善友教言汝若不能念彼佛者應稱無量壽佛此指稱名夫三界無非劇苦何止臨命終時以畏苦心呼號求救馳散何從否則攝心調息諸法亦自不惡圓人受法無法不圓豈有定屬小乘者試問記珠定香鳴魚擊磬等大乘邪小乘邪問大本有一念定生彼國疏中不及豈以此經七日入定乃生故揀去剎那生滅之一念邪若釋一以義不以數大本不應擊十念後若止如經文作一念喜愛何不動如來佛剎不以愛戀得生荅按寶王論利根之士元只一念往生鈍根之人臨終十念脫苦一念者一心不亂之一念也當知十念七日十日七七日九十日等究竟亦唯一念此一念斷非剎那生滅之散心亦不必四禪四空之禪定故云一念喜愛阿閦經喜戀心本指欲染問七日後若永不復亂不應只名七日若更亂者已經退轉何能感佛荅前此若無真實意樂則七日決不能一心不亂後此若無真實受用又安見七日功成邪問鈔謂理一心為觀力成就則體究全屬觀門然前言妙觀難成故顯持名殊勝今又通觀法不仍觀勝持邪若參誰字是體究又全屬宗門正參話時不應有如智不二寂照難思等理路可傍荅事理二塗混不得分不開疏主一往以稱名為事持體究為理持仍云機亦互通不必疑阻謂不假方便自得心開事持能成就理一心也又謂體究之極於自本心忽然契合名理一心則未契時體究無閒止名究理正是事功然體究一門與近時禪宗相合實與台宗妙觀不同台觀必圓解了了全性起修隨舉一觀無非不思議境體究以未明心性鞫其根源契合之後達如智不二寂照一心方與台宗圓解吻合非正參話時有理路可傍也初學妙理既未精通不可彷彿相傍心麤境細妙觀難成以此問疏鈔大意全重理持則所明持法最為要害今既持名復云理觀既是理觀復拈話頭禪淨止觀三法混淆行人念不歸一將何為宗與一門深入專修無閒之旨何復不侔荅疏主欲即事入理非以理奪事當知持名是正行理觀是所通話頭是持名轉局也序云著事而念能相繼不虛入品之功執理而心實未明反受落空之禍亦未專重理持所以處處明理者恐狂罔謗為凡愚之行耳後裔無知反執理輕事以遭落空之記哀哉問疏言一心即達磨直指之禪又云六祖斥無乃門庭施設不同假使纔弘直指復讚西方則直指之意終無由明既言即是直指復言為門不同是少林曹谿亦不同邪荅心地法門包含無際總不外一心門庭施設不同一心旨歸不異今一心即直指之禪言其指歸也六祖斥無是老婆罵婢子只圖齒切耳非謂但是宗門便須撥淨土也永明云有禪有淨土猶如戴角虎中峰云禪者淨土之禪淨土者禪之淨土豈贊西方直指便不明邪若言六祖定作是語莫謗六祖好問疏指至心念佛一聲滅八十億劫生死重罪屬理一心又釋佛名經一聞佛名滅無量劫生死之罪云一聞不待憶念無量不但八十億劫則何獨理一心也又此經聞經聞名皆得不退事邪理邪荅觀經十念除罪往生由怖苦心切善友緣強一念猛利過百年悠悠非必有究理之行然勝於尋常事持疏主或借顯事功極者即不違理乎若佛名經所言以彼佛具無量威德願力故聞者獲如是益聞不信亦獲無量罪要非少善根福德眾生所能得聞也不退亦不一等隨聞證者有位行念三不退僅歷耳根者如食少金剛究竟不消為遠因終不退也問棗柏言華嚴一乘大道非往生菩薩境界何故華嚴長子十願導歸極樂邪生公說闡提有佛性則後出涅槃為證今後出行願全與棗柏不符宗旨竟將安歸荅淨土豎該橫遍寂光惟佛土實報乃法身大士所居方便攝三乘權位同居則凡夫皆與合論指大心凡夫回心羅漢出五濁生同居方便二淨土未悟毘盧性海入因陀羅網法界也普賢十願導歸極樂正不思議解脫境界徹果徹因通凡通聖聖全法界入一塵凡從一塵通法界棗柏但言一乘大道非往生菩薩境界不謂往生菩薩非一乘大道法門也若云華藏大極樂小大小之見未忘未夢華嚴法界在問既以事持屬定理持屬慧而云事持未能破妄利根徑就理持將事不顯理慧不由定邪荅三無漏學後必具前故理一心或從體究忽然契合或從念佛自得心開皆由定來今重悟理不止除散雖體究無閒時便可名事一心亦有定力而仍屬慧門實則定慧二門各有利鈍疏主略未言耳問決志求驗正在平時經胡止言臨終佛現荅行人見佛隨淨業淺深經明往生故言接引耳今只在執持名號處努力加鞭無論見與未見但得信願行成就往生自可無疑慎勿生僥倖退息心也問心不顛倒故能預知時至乃云死時何苦欲先知何邪荅不貴預知正欲令其心不顛倒頗有因欲先知而愈重其顛倒者問大本十念不言臨終此與觀經為同為別荅大本云志心信樂乃至十念觀志心信樂何等深切不必在臨終時實與臨終同一猛利後世祖師因立晨朝十念行門畢生不缺亦決往生問文殊亦發願往生何反揀去勢至鈔言耳根不攝念佛念佛能攝耳根又何邪荅法無優劣機有抑揚無煩戲論觀音六根中從耳根入勢至七大中從根大入論入門耳根此方獨利論收機淨念三根普通又圓人法法貫徹耳根淨念互攝互融初機耳唯一根念乃都攝亦可抑揚問用攀緣心為自性如煮沙成饌今念佛心是攀緣邪非攀緣邪若是則一切覺觀思惟皆生死根本若非又何言念性生滅因果殊感邪若生滅即不生滅何云煮沙此與波水之喻當自不倫波即是水沙非是饌然法華若人散亂心南能不斷百思想者又非即用此生滅心邪荅錯不在用攀緣心在以之為自性所謂認驢鞍橋作阿爺下頷便成沙饌之喻若識得攀緣心本無自性則能用攀緣不被攀緣用所謂家賊難防時識得不為怨便合波水之喻況勢至一門本屬根大意根為主五根從之故曰都攝六根淨念相繼意根即第七識七識無始來念念執我今以妙觀察智力令直下念佛甜瓜換苦瓠非尋常攀緣心比尋常眼識緣色乃至意識緣法皆順生死法念佛時佛非色非非色乃至非法非非法超世閒法離語言道但可淨念憶持原非情量所行境界豈念佛心是攀緣邪且以攀緣六塵增長生死者轉攀緣慈父永脫苦輪亦自不惡安得一概論邪又娑婆根性唯耳根易顯圓常念性猶屬生滅非已悟如來藏性者終不達念性本圓通也末世學人鮮登圓解耳根入道亦甚難言儻不能向佛頂前四卷痛思深義窮源徹底則初於聞中入流亡所工夫畢竟如何理會圓頓法門非小根劣智所能擬議無米索炊畫空成繪反不若因果殊感者自得心開耳問經末先言不退後明往生正以現生取辦超乎餘教何反開少壽多障不克往生來世得生一路荅真念佛決無不生淨土退菩提者第恐障深慧淺之流見自他未效不罪工力淺肉眼瞇反疑佛法無靈現生退惰故曲顯勝益策令現生取辦也問顯密並圓何云持名勝準提荅極準提神力肉身往詣十方淨土極念佛三昧肉眼等見十方如來誠無勝劣然約生佛因緣法門所被通塗教意理應獨顯今宗問參究念佛謂向上一著千聖不傳必從參究方得既一代時教皆屬他寶何禪門公案便屬家珍若云禪是教之綱領何故世尊不說若云經文亦可參究又何勞千七百則邪參話一節迦文既未拈示西來亦無此門若謂門庭既熟便成窠臼故換此法今參話亦成熟路更換一法何如荅向上一著千聖不傳可云必從參究得邪然亦一種方便本無實法綴人故古稱敲門瓦子何嘗以公案作家珍苟昧綱宗死在句下謂參話方能悟道病參話亦成門庭皆益戲談何關宗教當知舉一明三目機銖兩之士隨拈一法透一切法盡屬家珍誰為他寶若緣木求魚守株待兔三藏十二部是拭瘡疣紙千七百公案亦陳腐葛藤法無得失得失在人但當因言會心何得迷心逐語果契心源知佛祖皆無一法與人將以何法換去何法邪問五逆可以往生佛何不能滅定業邪又造業人若借此自寬寧不入地獄如箭射邪荅千年暗室一燈能破懺力既殷業便無定若頑愚迷津得船不上牽裳作筏抱石為舟既無迴轉之力是真定業難逃矣問涅槃法師以未誦彌陀經不得往生法華云聞此經如說修行命終生安樂世界何不同邪荅淨土一門願為前導未誦彌陀即平日願樂不深若法華所云是世尊直以妙經為蓮邦左券勸願明矣法華即是彌陀妙經勸願即是彌陀勸願即是涅槃勸願亦即是一切諸經勸願無不同也問彼土為人天錯居為各分九品佛浴池及菩薩聲聞為在天上在人閒既注彼境應令依正條然荅淨土純樂天人豈應迢絕九品往生未判人天或皆九華化生或天不須托質皆未可知大本謂宮殿樓閣有在池者在空者觀經謂樹上寶網妙華宮殿諸天童子自然在中然則淨界莊嚴豈可凡情測量俾其條然邪問淨土既宣道品何觀經止言讀誦大乘不及小乘又淨業門有不禮餘佛不誦餘經者不併違觀經邪荅般若每列三十七品隨結云乃至一切智智清淨無二無二分無別無斷故道品豈非大乘法門邪淨業古宿有一門深入者乃圓人禮一佛即禮一切佛誦一經即誦一切經恆沙寶性無量法藏一齊委付一時領知大乘方等經典須如是讀誦始得問一句彌陀若不通種種法門莫罄其致乃云修餘法門便屬二心豈非受一非餘邪荅不知一切法即一法廣修誠屬二心若一法中透一切法專習即是總持佛行魔行豈在法也問奘師以兜率近判內院易生鈔以論因不論地揀之後言勝蓮雖超極樂然樂邦近何又論地邪荅皆論因也勝蓮境界去博地凡夫甚遠不同彌陀近垂方便十念便可成因未有不能生極樂而能生勝蓮者但深信佛語入淨土玄閫極樂未必不即勝蓮如情生遍計疑極樂為權施則勝蓮遠矣問鈔中蓮臺二義今金剛臺紫金臺為是房臺是基臺荅汎言二義若托質金臺本在花內基臺非所論也荅印生四問原問附問未得戒時以何法攝心十戒有犯許懺悔否懺悔後即許進具否作何懺法方名得戒荅得戒須具殷重心清淨心希求勝法懺悔須具慚愧心決斷心翻前惡境即此為攝心法即此是得戒因十戒有犯誓不更造律許進具應鄭重不宜欲速問一代時教初心許遍閱否參禪許看教否若悟後方看此生恐難保任若麤了即參又恐知解纏繞荅看教貴精不貴多一部中精研妙義徹骨徹髓自然旁通眾典勢如破竹欲徹骨髓必須看時即是觀心既曰觀心功同參悟原非尋言逐句有何相礙教理資神如膏助火是在精了其義不應麤了未能精了而曰知解纏繞何異戰敗之士咎武藝太多邪問黃蘗已前無話頭未審何法得悟我今當從何入門下手邪作何主宰不被境奪邪何時當見人何地方究竟邪幸詳示之荅直下知歸那有實法參話本後世方便死人偷心耳從上諸祖但向本分中留心只今學人須向本分中下手一切時一切處只為此本分事自不見有境豈為所奪善知識者時時當見決擇身心直至圓滿菩提方為究竟是在當人發大勇猛擴大虛懷啟迪大智長養大悲捨一切愛見修一切方便乃不墮外道二乘權教諸境界耳問參究念佛之說當得話頭否既恐今生不悟來生難保故用此法以攝往生然又恐為參禪開一退步當作何融通邪一生參禪臨終發願何如荅眾生顛倒轉說轉疑吾今徹底道破亦令當來諸有志者毋泣歧路既一門深入何須疊床架屋更涉參究但觀蓮宗諸祖便知淨不須禪若為大事因緣有疑未破欲罷不能而行參究正應殷勤回向西方但觀永明等諸大祖師便知禪決須淨本分中事了然可辨何須曲為融通也信則便信疑則別參代荅劉心城又上博山四問原問博山書附蒙示即今若有取捨同之一字即是妄言然妙宗云取捨若極與不取捨亦非異轍正謂取捨愈有愈無斯為圓妙若無之始無不落小乘邪荅極者謂取至無可取處捨至無可捨處恰與不取捨合非僅以取捨作無取捨會也正欲極之不欲無之若未致其極便欲無之且墮惡取便擬欲同正屬妄言蒙示以葛藤埽葛藤與不絆葛藤者優劣若何夫台宗二而不二不二而二正爭此葛藤之有無則教理不廢葛藤葛藤無非圓頓荅文字性離非離文字未達斯旨謾云不立只此不立便是文字悟時轉法華此不絆葛藤也誰為所埽誰為能埽智者九旬談妙字字從祕藏流出字字能含攝祕藏豈似尋章逐句入海算沙全墮葛藤窠臼乃云葛藤埽葛藤邪蒙示多句不如一句須得水源若尋枝蔓妄云句歸何處不太蚤計邪竊聞台宗專用六識謂伐樹得根灸病得穴既得其本即蔓是本既得其源即流是源荅定穴定根所以待灸待伐故曰須得水源若培業根而不伐護膏肓而不灸則錯認源流倒置本末悖台宗奧旨入生死迅流矣蒙示一念識心保無失腳未知用那個心保得若用識心隔陰不知宿命然台宗專用六識為圓頓無上止觀懸合楞嚴楞嚴云憶佛念佛現前當來必定見佛憶念非用六識邪教中明用六識六識明知位次若能依教修學教理可作保人荅台宗觀一念識心即不思議境者以圓解之人既達如來藏性故即流是源也若謂專用六識是以攀緣為自性乃生死根本正楞嚴所訶猥云懸合不幾謗止觀邪又勢至圓通屬七大中根大故曰都攝六根淨念相繼意根為主五根從之以根為識確為有過台宗云觀心若起本跡俱絕從此方能斷惑證理安立位次若六識明知位次便屬法塵分別影事何名圓頓法門既留心台教藉為保人未識保人作何面孔能決定相保邪果然識得保人管取亦能自保擬荅忘所上博山書問原問博山柬附法久逾衰非時使然授受濫觴不可援耳且以學人論之根之利鈍誰免相生住滅及流注生住滅縱不落識情分別迥絕相許言斷流注能截然乎即使截然尚名真如流注夫眾生妄想執著世尊四十九年鏟刷令執著遣盡然後拈花示眾此一拈花豈非佛四十九年說的眾生積劫迷的以迷則不敢拈非佛不能作捷徑法最初了此一大事也今於善知識棒喝機鋒能如是承當否復以師範言之達磨西來正為此方名言習氣沸盛別投一劑無意路還元丹也至曹谿分衍仍恐又墮言說所以五家各立門戶借賓主君臣玄要以探虛實古人於此事真劍刃上行乃今之宗乘又為昔之教法安得再有一達磨來藥病俱埽埽亦不留面少林九年壁乎不爾亦當如趙州黃蘗之大用其餘又不勝數要皆以新法勝人也此新法正是無師智自然智佛不能傳語所不載如大將軍臨敵韜略俱捨以敵亦熟明此法故然亦離此韜略一字不得以韜略正載此活法人自死耳得之者死語拈來皆活不得者活句拈來皆死無法無新新在自得語不出人意表何以解人無始黏縛點鐵成金乎從上佛祖本無實法與人拈花微笑乃至達磨初來雖云傳佛心印豈離眾生心外更有佛心可傳不過為人解黏去縛令達妄想無性耳達得妄想無性二種生住滅當下寂然若欲向生住滅處截斷正恐一番鏟刷倍增一番執著且達磨單傳之旨如畫龍點睛令其飛去非離文字說於解脫則昔日之教法本未嘗埽今日之宗乘又何用新謂一切知識皆以新法勝人幸莫謗知識也且既知離卻舊法別無新法豈不知欲作新法便成舊法死語活句亦復如是當今學者濁智流轉偷心熾然不思追蹤往哲但欲奪彩時流為善知識正應據先聖之典型杜其僭竊不惟棒喝機鋒漸成惡套即有藥病俱埽埽亦不留之達磨來恐不留復成窠臼如波逐波有何了期莫若向源頭處討箇脈路則循規蹈矩不施一巧坐致太平幸薦取本分草料莫更求格外鉗錘也擬荅白居易問寂音禪師書問在林閒錄如來出世惟為一乘眾生根性不等方便說三雖復說三究竟歸一恐不信沒在苦故須鑒彼當機恐以三乘作實法會故云無有高下夫眾生種種病只是一病以不識佛性故如來種種藥元是一藥究竟為一佛乘故然受病既久變症多端醫王用藥亦須隨宜得所然則病愈藥除乃如來本意藥應病與乃方便智門惟達如來設教元由自得末世利人妙用為下種者強毒以大亦可為熟脫者善巧說三亦可若權實之致不明悉檀之義未委豈惟順機說三為妄分別即一味道亦瞞盰儱侗故六種經中所有二義恰恰相成也五蘊十二因緣者蘊以積聚覆蓋為義分名為四對色成五只名色一支便具何得約十二因緣倫次成難邪十二因緣約三世因果輪迴以能生果為因展轉相藉為緣是故蘊惟苦諦緣兼苦集蘊法約橫因緣約豎始從無明終至老死一一支中皆具五蘊不依五蘊何得無明安有諸行生即五蘊虛妄和合老即五蘊虛妄變異死即五蘊虛妄散壞耳荅人問參究初心方便說向上一機自有祖庭正令不落方便既曲為中下設方便門有一病隨有一藥病既萬端藥亦千變良醫合宜而用砒霜活人庸醫昧機而施醍醐傷命立一法必伏一獘有一利必具一害棒喝機鋒提持公案皆藥也亦皆病也未可軒輊亦未可決定執為初心方便如人行路不與導師同程莫若博問路徑不然惜一時之躊躇貽歷年之錯誤入鬼國墮深坑遇蠱毒逢劫賊敢保十箇五雙有分在荅菩薩戒九問原問附問梵網云於未受戒人前說七佛教戒者犯輕垢罪謂但遮誦時不遮講時何意荅比丘戒法關係僧輪為防賊住一切俱遮菩薩戒法普收五道解義發心事非所禁但誦時恐有發露不合令未受者知故云不得說也問戒本四重梵網十重詳略不同梵網犯重見相更受戒本但云更受寬嚴有異何也荅戒本出地持地持合殺盜婬妄名出家八重善生經列殺盜婬妄酤酒說過名優婆塞六重梵網備二經之義總為十重纓絡亦同由被機不等故也今戒本四重復有三義一者在家出家欲受此戒必已先受五戒十戒具戒是則殺盜婬妄根本性重不須更列惟列增上戒也二者菩薩戒法逆順無方為眾生故容少分現行性罪此四理無開許故獨列之三者根本四罪一犯永墮大乘雖通懺悔亦必期于見相今此四法設有犯者猶堪更受恐濫前四故獨列之然梵網犯重必見好相者釋迦和尚一往法嚴彌勒闍梨輕重開遮理須詳悉今准經論參合發明殺盜等四隨犯一種諸戒並失得見好相大可重受而比丘法中仍無僧用酤酒等六隨犯一種失菩薩戒具戒以下不名為失故殷勤悔過許其重受二經互相影略非相違也問比丘遮罪難緣乃開今性罪開而遮罪無文且逆行凡夫安能利人邪荅遮罪為護眾生大士皆應同學難緣所開已同聲聞惟性罪一向遮故須開也不揀是凡是聖果能悲心代苦慚愧不為功則戒身無恙儻藉口任情止成自欺必虧戒體莫貪大士虛名而招長夜苦報也問受戒羯磨文若無授者聽像前自受梵網自誓受戒必須要見好相不見好相不名得戒何也荅受戒一事須論因緣因是內心殷重緣是授受分明修證貴因深教道藉緣具是以比丘律藏嚴住持僧寶之體專重眾緣瓔珞地持開趨向菩提之路但觀因地梵網最初結戒理須二法並扶故雖許自受必見相為期也又復應知如起信所明或有眾生以大悲故能自發心或正法欲滅以護法因緣故能自發心復有見佛色相而發其心今梵網求相所以使發菩提地持像前得受但指已發心者梵網嚴立法地持嚴擇人互表裏也復次瓔珞經云諸佛菩薩現在前受名上品戒法師相授名中品千里無師像前自受名下品亦無求見好相之言然猶約外緣分別復有論云發增上心得增上戒又心無盡者戒亦無盡是約內因分上中下也今人大須自審果念念與悲智相應上荷正法下憫含生便遵瓔珞地持如雖希佛道悲智未深則須秉持梵網或現有明師心存憍慢不從求受別向像求斯則兩經咸不聽五悔終不成既欲遠趨極果豈容因地不真豪傑士斷不宜自誑矣問大乘重內因今時律師可知人內因真否如不真得戒否如不得戒設犯還定罪否荅羯磨文有觀察當機之法不知內因而妄授不免無解作師之過受者不善無記心雖不發戒然濫膺菩薩名自當依法判罪非比丘戒中竟以賊住論也問懺罪羯磨許向小乘悔過梵網經不得向未受菩薩戒者說尚不向說可向悔邪荅住持僧寶堪受懺悔又聲聞人雖未識長者是父實是真子非餘一切未受戒者比也至半月說戒遣之令出是布薩常規亦彈斥微旨然當必有菩薩比丘主之仍是攝取於僧矣問梵網有見上座和尚阿闍梨及請二師之文又五逆加弒二師成七今授戒何止一師荅瓔珞地持並止一師又梵網受法傳自什師載於義疏亦止一師其請二師是請佛菩薩所云應如法供養二師及弒二師成逆則遍指比丘戒等二師問重定受戒法初已發菩提願何後復令發四弘招重繁過荅前審因後秉法前發心向道後誓鎧莊嚴前總後別前覺悟始因後要期極果前一心思惟知識開示後三寶加持道場剋證由前故有後由後以成前豈云重複如先請師像前復請又如授比丘戒屏問遮難僧中復問亦重繁邪問既謂機感有殊授法不一若簡若繁俱無乖舛則直宗一轍何必會三家成一式荅始予獨遵慈氏羯磨往往有嫌太略者乃敢折衷會三為一但用經論成言更不別加文飾三典並現流通想是機宜有在聊順一時之機匪敢執今非古可用與否一任後賢荅黃稚谷三問原問附問佛不能滅定業地藏菩薩胡為有滅定業真言邪且既達本來罪福皆空又何謂邪荅業之與報皆是自心現量心空一切皆空心假一切皆假心中一切皆中特凡夫不達能造所造能受所受當體三德祕藏而以殷重倒心作殷重惡業必招殷重苦報名為定業彼心既定不可挽回大覺亦不能即令消滅故大慈悲巧設方便令地藏大士說咒勸持即是轉其定心漸使消滅也是故菩薩功能全是佛之功能佛既不居菩薩亦不居究竟只在當人一念信受持咒之心耳此正所謂既達本來罪福皆空之旨原非撥無因果以罪福因果當體即空亦復即假即中迷則滅與不滅俱非達本達則滅與不滅總不礙空也古人云如何是本來空業障是如何是業障本來空是透此二語便出野狐窠臼矣進問畢竟佛何不自說所謂佛不能滅尚有疑在荅釋此須知三義一諸佛說法必係四悉因緣有聞佛說而歡喜生善滅惡入理者佛即自說如楞嚴尊勝諸咒皆滅定業也有聞菩薩說而歡喜生善滅惡入理者須菩薩說如此咒及大悲等咒是也二罪不自滅不他滅不共滅不無因滅而有時唯說自滅云心空業空有時惟說他滅云佛菩薩力有時說須共滅雙舉內因外緣有時說無因滅云非自非他皆四悉因緣否則便成四謗也三不能滅約三藏跡佛能滅指圓教因人如華嚴云初發心時已勝牟尼亦其例也知此三義一切法無不通達問萬緣搆時息心休定覺甚快樂而攝入之功甚難若行數息作觀等門恐多一番作意起滅如何頓入一念不生境界荅一切境界本自不生亦不住滅迷此理本皆是生住滅相妄見萬緣搆集妄生苦惱又於息心休定境界妄生快樂苦惱快樂皆醉見也緣集緣散皆屋轉也直須酒醒方知屋本不轉又須知屋本不轉迷醉方可醒耳數息作觀等妙法各逗一機欲頓悟境界不生莫若四性推揀觀此現前一念為自生邪他生共生無因生邪念若自生何藉外緣若他生何關自己若共生應一分有知一分無知有因尚不可況無因生仔細檢責覓念生相實不可得念既無生境界安有二俱不生不復更滅一切時中重重照破不捨一切法不住一切法不厭一切法不著一切法作意即非作意起滅亦無起滅一門超出妙莊嚴路也荅陳弘袞二問原問附問橫死之說與業報矛盾又既有不應死而死必有不應生而生推之富貴貧賤莫不皆然范鎮謂人生如樹花同發隨風而散或墜茵席之上或落糞溷之中不誠有理邪荅一切因果從來不爽橫死之果的由橫死之因蓋業有三世不同謂現報業生報業後報業此三世業力又各論強弱互相傾奪且如有人前生業報今應長壽乃忽起猛惡夭折之因遂入橫死科中據現報則非橫死據夙善即不應死而死惟業果由心招感故心能轉業則定而不定心被業牽則非定而定請為決曰人生如樹花隨善業風吹墮人天茵席之上隨惡業風吹墮三塗糞溷之中噫安得深達唯心之士與曠觀業性差別哉進問因果三世義備矣儒不信也易曰積善之家必有餘慶積不善之家必有餘殃論其身及其子孫而止耳故德之厚者必曰宗廟饗子孫保以斬然無後為德之至薄佛亦有以此論因果者否荅因果道理窮深極遠徹妄該真尼山大聖姑就見聞開曉乃因果一義耳即此而通之可信佛法執此而自是兼礙儒門夫積善餘慶何堯舜無肖子夷齊無後昆積惡餘殃何盜蹠永壽曹馬高爵此非通于三世終墨墨矣由一切無非因果故窮通壽夭榮辱得失雜然互感事非一轍乃至父母子孫皆以同業相召佛經亦雅言之然世閒因果虛幻不實且如大舜宗廟饗子孫保已不能留至今日三千年來彈指已過何如度脫親因永超生死為出世大孝邪是以儒明因果非不合佛法但知一不知二知近不知遠此拘虛者之所不信明達者之所必求也荅元賡問真言與佛名功德平等機緣不同各具四益今勸持咒與勸持佛名無異當信菩薩機緣及吾人願力各自離過絕非不可思議儻謂持名為是持咒為非華嚴所謂受一非餘魔所攝持也記數之法普被三根上根不礙記下根必須記故總以數期之俾利者即此打成一片而鈍者亦不失緣因善根儻託言事理一如不須記數恐上智少下愚多不至忘失者幾希矣荅鄧靖起三問禪門流弊久矣未可力爭也賴有識之士用其法不染其病鑒其失不廢其法耳凡鍼灸藥石可起病者無論君臣佐使皆心上化工也古人訶坐禪勸坐禪勸提話訶提話各逗機宜善用之無非是藥不善用無不增病必執訶坐為是何異執話頭者訶放下也真到參無可參處教外別傳正法眼藏是甚麼馬屁𡋯念佛三昧三昧中王信不容易但既三根普被又不宜一味說難且七日一心不亂不可判淺夜夜伴佛眠不可判深蓋一心不亂有事有理事一心已不容易理一心何容強臻而共眠共起之佛不過本具性德蠢動皆爾非關修證殊未希奇若達共起共眠之佛仍熾然言念無閒方得名理一心若未達共起共眠之佛一味言念他佛念至打成一片得見他佛即頓悟共起共眠之佛矣勢至云不假方便自得心開十六觀云諸佛有異方便令汝得見此之謂也故一聲彌陀無論解與不解如染香人身有香氣念念都是成佛真因而漫云炒砂成飯不幾謗三世諸佛大方便法輪乎攝律儀戒成法身德攝善法戒成般若德攝眾生戒成解脫德三德即三身極果戒為法界一切法所歸趣一切法所從出故云惟佛一人持淨戒其餘皆名破戒者又云若人受佛戒即入諸佛位佛頂謂縱有多智禪定現前若不斷婬殺等必落魔道神道惟以戒攝心令其生定發慧方名三無漏學故知受戒修行如黃帝堯舜垂衣裳而天下治不假兵戈也至別商參究話頭等對治法門是兵者不得已而用之耳六祖既悟心宗出世仍須稟具清涼華嚴菩薩十誓凜如冰霜遠公蓮社始祖臨終考午後蜜千古芳規昭昭具在何狂禪肆無忌憚淺學絕不經懷也荅淨性三問原問附問心外無法同體之義明矣如何大心不發而自利法外無心法法皆是法界明矣云何逢緣又生取捨若云名字位中雖知此理柰煩惱習氣所使還捨習氣不捨習氣邪荅汝之所明者語言道理而已法塵妄影尚不能自利何況大心已是取捨何待逢緣此即是汝煩惱習氣若果了同體法界更有何習氣可捨哉問十界一心何不相知若惟佛知則生佛不同若名字知非究竟知還屬修功若云不須論修現現成成則生佛無別荅妄謂各不相知便於心外別計十界矣若知十界唯一心則心尚不可得何有各各不相知之十界邪悟十界唯一心者假名為佛如醒人見屋不轉迷一心計十界者假名眾生如醉人妄見屋轉生佛不同者醒醉所同者從來不轉之屋也就理同處何須論修醉人屋非現現成成不轉者乎進問體同用亦應同何有十界之異若體性真實是同虛妄相狀是異性相豈有二邪若云相即無相相即法界則地獄何必趣於佛界若不須趣畢竟如何成佛荅十界體用本無不同迷者謂相異性亦異體用元不曾減悟者知性同相亦同體用亦仍不增故獄界即法界元無佛界可趣獄界可捨約此實義假名出獄成佛柰何終日向假名上分別忘卻法界真體性邪不達體性終日說法界是極惡名言習氣荅淨塵問原問附問大慧云光未透脫的不曾親見法身到底覺得面前有物此豈非昭昭靈靈之一物也此物既從真心而有全體是真如此了得盡大地是個法身是個自己云何復說有見不見透脫不透脫然如此為甚觸境逢緣又用不著被習氣所使過在甚麼處又大慧此旨與台宗觀心法門為同為異荅大慧正是拈出禪病要人討個透脫親見一回若實透脫便不作透脫不透脫想若實親見便不作見不見想今云此物既從真心而有乃至如此了得云云全墮見解窠臼正所謂到底覺得面前有物者也何必昭昭靈靈而後謂之一物哉惟坐此見解窠臼所以說有逢緣觸境用著用不著等儻實透脫親見你喚甚麼作緣境誰去逢觸你要用個甚麼又誰去用只者習氣從甚處來又誰被使豈不百雜粉碎更喚甚麼作法身作自己設或未然大非容易須將身心世界及種種名言習氣乃至平日思前慮後諸般念頭全體放下單單用個推檢法看此能了達的所了達的畢竟是個甚麼此台宗絕妙工夫與宗門不隔絲毫若但看麻三斤狗子無等一則公案又是一種方便下手不同到家則一皆須勿忘勿助拌命死挨不論時劫切忌將心待悟切忌坐在無事甲裏切忌作道理商量切忌性急求速發明切忌今日張三明日李四東鑽西撞空喪光陰但生死心切綿綿密密日久歲深不計程限自然或向看經處或向習坐時或著衣喫飯邊或見色聞聲際驀然拶入方信從來說的都是夢話
