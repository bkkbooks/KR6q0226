body:
  text: 詩偈四示豁一二首若欲結制看經須要會歸自己心外更無別傳萬勿但圖口耳雲光不免負軛何況今時稚子第一要生信心第二要懼生死俛仰曠劫輪迴畢竟如何得止聽我血淚苦言庶不終為糠秕華嚴圓頓經王普賢法界宗主十願導歸極樂便是玄極微旨若更別扣祖關都是奴僕婢使果然奇特丈夫卓信心作心是念念相應不差豈肯水中渴死瞬息旋轉萬流一句彌陀到底利濟寺禪堂放生念佛社偈有序佛祖心要悲智雙運而已贖命大悲下化也送想西方大智上求也法門之妙孰過於此但靡不有初鮮克有終是宜堅其心砥其行庶珍池寶券在我而不在人矣諸法本無生不生非實義魚躍與鳶飛明明佛祖意迴向極樂邦圓成無上智歷劫矢勿諼是名真利濟寄示禪關魔界如兮佛界如金剛寶劍用何為分明平地生戈戟錯認村歌社飲時庚寅自恣二偈有序臥北天目萬慮灰冷有同志數人以毘尼相叩夫毘尼久為腐貨仍過而問焉不啻冷灰豆爆矣安居竟重拈自恣芳規悲欣交集慨然有作秉志慵隨俗期心企昔賢擬將凡地覺直補涅槃天半世孤燈歎多生緩戒愆幸逢鍼芥合感泣淚如泉正法衰如許誰將一線傳不明念處慧徒誦木叉篇十子哀先逝諸英喜復聯四弘久有誓莫替馬鳴肩和荅譚埽菴肯將瓦礫易明珠箇事從來形影俱信得此心真佛種任他咸作鈍根呼辛卯季秋重登西湖寺有感三首風帆破浪陟危岡轉憶交情空自傷七十二峰明月在千秋逸興付波光不須弔古論前後且共尋今誰始終秋色已隨楓樹老晨曦仍似蓼花紅峰頭雲物去仍返波裏山光住亦浮讀罷維摩香未冷又移清夢入禪樓阻雨福源用雪竇禪師白樂天韻最是禪關轉處幽洞庭煙水護神州松名羅漢從唐宋泉自真源映斗牛穩坐佛龕消永日懶尋漁父問孤舟年來狐兔仍城野簇簇群峰橫點頭屈指蕭梁路未更庭前雙樹意明明風搖紅葉機猶滯雨溼青苔印已成松古共咨呵護久殿深贏得步行輕主人不厭湖山客朝摘嘉蔬暮又生和荅王季延馬牛作隊盡如馳誰破銜拳名相縻千古覓來難得友三人行處易尋師虛空力壓終無汁傀儡輕提亦有儀借問何方自修育阿伽一味不拘時送清源首座返江寧二偈木樨香罷菊初黃長水灘頭別話長瓦釜雷鳴今倍甚玄珠龍護正宜藏愁看智巧多成鑿喜聽顓蒙稍未戕與爾共期泉石夢靈峰逝景共徜徉形影相隨未是親饒他擬議轉迷真一生自訟嫌頻復半世逃名幸遇津愧昔譚經猶有石欣今問字漸無人他年莫負珍池約頓洗從前愛見塵譚埽菴招同王止菴高念祖遊研山予大病而返漫賦二首從昔假山終不假於今真祖未全真一番讀罷傳燈記添得毘邪幾痛呻埽菴豆腐東坡肉問味山儂總弗知大抵聞韶千古案還須見聖始無疑維摩無疾文殊疾說是淆訛總弗淆試看昔年明不二苦空依舊作前茅壬辰仲冬雨窗有感朔風吹大漠群雀愁寒雨戢羽訴無糧競向茅檐聚哀昔祇陀林久喪樵人斧誰為獅子蟲最是輸金祖納粟笑儒冠輸金歎禪譜握麈遍城村覿面如軍伍奚哉畫革囊幻作羊質虎救得眼前饑留卻恆沙苦達人鑒始終頓吐虛名蠱一笑老深山不屑驩虞補送用晦還新安兼寄堅密三首繁霜一夜萬林空千里歸帆挂朔風道在未嫌離別憾情忘終藉琢磨功恥觀野犴登獅背遙囑潛龍寢梵宮明月北窗催曉夢坐聽蓮漏鼓逢逢五十餘年客作人悠悠斯世幾知辛早占牛順同羊逆悔不狼貪易虎瞋冰水本來唯溼性空花從古絕陳新相期盡拭朦朧眼彈指瞻依樂土親澹泊忘機入道難淆訛公案幾能看無人踏得隨身影有句旋成賣法奸愧我跛翁唯坐歎知君雛鳳可離竿他年共浴珍池水不負靈峰徹骨寒病起感時七偈直捷根源道有餘尋枝摘葉欲何如葛藤千七無端設之楚神駒北駕輿小見狐疑急轉遲誤分根本與條枝平平大道無難易羊質徒勞挂虎皮左右逢源觸目真才生取捨便迷真家和鄰里難欺侮分貝同田驗富貧牛皮穿透終難認虎穴冥行暗未通兩箇半斤皆八兩吠聲籬犬共憧憧識情未轉無塵智知有依然墮法塵怖影迷頭空自擾求真真露卻非真博文約禮孔顏心箇事何容鑽仰尋養氣知言通線路拍盲告子豈知音王賊元從一著爭如何佛法當人情名聞利養空華事痛煞求卿反得烹癸巳元旦過秋曙拈花菴四偈曠劫陰移一剎那滔滔法運駛如河未明微笑非迷悟誰向拈花辯佛魔雲外有聲知是鶴燈前弄影便同蛾羨君不入輸金社好與山儂誦伐柯萬緣何啻似寒灰擬入千山誓不回瞖盡光含清淨目情忘身育寶蓮胎珠王滴水能盈器義賊戕材甫作桮倒腹傾腸無別語莫分少室與天台五十餘年夢幻身寥寥斯世久無鄰從頭覷破元非我此外何容別有真寄宿不須求大廈登舟正可就偏津東風吹亂殘詩卷未許人閒肉眼掄時秋曙出乃祖寂生法主詩求選檐矮牆欹聊自安肯將溫飽換饑寒未經世路風波急那信茅菴法界寬野老對譚知米價扁舟舉棹睹回瀾尋常聞見無疑滯誰謂圓通剋證難吁嗟篇六章有序佛祖之道戒定慧而已矣戒即法身直法身非法身也定即解脫直解脫非解脫也慧即般若直般若非般若也弘戒學曰律師果以般若解脫嚴顯法身乎弘定學曰禪師果以法身般若成就不思議解脫乎弘慧學曰法師果以解脫法身趣歸般若乎我思古人實獲我心我悲今人不求其實而圖其名正法埽地相牽以淪乃賦吁嗟寫此哀情吁嗟律兮豈曰虛文一止一作持犯斯分為斷有漏以破魔軍三千八萬賾矣匪紛護彼無作協此緇群煩惑乃怖賢聖乃欣自性清淨萬法之君律哉律哉衣云缽云吁嗟禪兮豈曰鬥機厥廣唯海川瀆攸歸操此一是融彼百非匪疾而速匪翼而飛理必無舛行必無違法法通備門門入闈逢源左右何顯何微哀此末季唯拂與衣吁嗟教兮豈曰言詮明月之指良驥之鞭昏塗之炬暴流之船以簡邪正以辨偏圓法印所印四依所傳周道坦坦乃實乃權目足無缺直往弗愆哀此叔世葉附枝牽吁嗟淨土豈曰小補圓頓之宗萬靈之祖厥旨唯心厥門唯普非自非他亦橫亦豎躍冶莫逃弱喪亦撫格外洪慈異鄉親怙龍樹摩肩文殊接武哀彼生盲目為旁戶吁嗟大法何正何像何是何非何偏何黨悲此愚頑各任厥想逆之則非順之則仰率彼妄情誰納忠讜始惰弗芸繼唯助長逐影迷形鏤空捕響哀矣群盲爭趨見網維茲末季亦豈無人緇曰紫柏素如陽明暨楚之袁西方指津山陰之鮑天樂以陳可師可步不鶩其名哀彼耳食罔識斯真爭馳虛譽慕彼宵燐何時憬覺以卜我鄰西窗自喻步寂音韻三首初志何能不自新每嗟涉世未忘真行慈依舊還成愛責善無端已墮瞋萬古是非渾短夢十方淨穢總長春西窗對月披殘卷獨向先賢語笑頻五十五年過未寡鏡中徒歎頭顱光觀音十句淨業苦佛號一聲超驪黃歷盡寒酸無片實由來悲喜空縈腸蓮華叢裏清魂逸消盡人閒炎與涼綠水青山任往回那堪睡眼未全開十虛猶較微塵窄一息非從曠劫來才擬辯真徒瞇目創觀唯識已亡埃同仁欲和無生曲但聽空山猿語哀和寂音尊者達磨四種行偈三界有為終歸敗壞才有所求便成窒礙死安可憎生安可愛憎愛兩捐便是三昧無求行十二牽連如環輪轉釋梵奚貴乞匃奚賤既難強求復何希羨俯仰塵寰蕭然無戀隨緣行人我未忘袈裟可醜唾面勿拭刀杖宜受諦察法空逆境何有動心忍性苦師恩厚報冤行生即無生是名法忍豈用自矛還攻自盾恆觀意言遍計斯盡後觸無得依然本性稱法行將遊湯泉示三子三首客氣消忘心便安全身放下亦何難分明萬象無藏覆山自高高水自寒泰山不如平地大陽明隻語度迷津平平蕩蕩遵王路莫效巖巖萬仞神相名分別本如如真俗休將一異誣萬水千山供見聽直須超出是非塗容溪觀池魚循環匝匝覓江湖活水雖流活路無長者不須重施水好將金鼓應金桴帶雨觀白龍潭石磴嶙峋未易攀半谿煙霧鎖玄關每哀獅座偏多染卻喜鷗群儘自閒塵累幸隨波已逝鬢眉聊似草同斑白龍何處潭如鑑留與幽人照古顏登文殊院疾作而返文殊遍界元無二何必登高別覓真興到便遊興盡返任從夢裏梗萍身和荅吳粲如四首深崖亦有淨名居坐對龍潭勘掠虛君擬賦詩超漢魏我甘遯世傲孫吳文殊已見不更見能祖無書善解書此日蓮華峰畔霧應同天際卷還舒士也懷山不戀居澄潭幽閣日憑虛昔從鹿洞星瞻婺今似牛刀學啟吳已薦朝聞夕可意勤觀約禮博文書泉聲演偈百千萬直下令人見網舒何事紛紛競覓居大千不異一漚虛蠅頭富貴燕盟趙蝸角功名越報吳舉世盡誇出格語無人肯讀剖塵書白龍潭內泉聲潔滌去塵襟眼自舒白牛車裏肯安居今昔相逢自不虛澤老尋山方入越龐公帶襆又稱吳但能一博輸金注何必三生鐫石書瞖眼空花纔撤盡此身何異岫雲舒坐狎浪樓二首雨過三日瀑聲微五色潭光映晚暉坐久不知身在客丹楓黃菊兩依依法門寥落少知音偶與維摩論古今莫怪泉聲太饒舌低徊難訴老婆心坐西竺菴偶成三偈燈光五色分明現目眚無多未易亡何處金錍堪借力洪名六字足良方兔角豈須爭曲直龜毛不用辨黃玄蟭螟眉裏三千界楖栗芒鞋任所便覓心不得復調心最是神光祖意深勤掐數珠頻換線靈雞終許出餘燖示寶樹修行無巧法只要生死切諦觀百年身露電同生滅千古大聖賢皆從一念決一念識重輕群妄自超越事不益真修何能強屑屑心逸乃日休心勞乃日拙六字大經王勤誦無休歇能念所念本無二熾然能所相交徹譬如萬里淨無雲百千江瀆一輪月不是渠兮盡是渠非親疏處難分別臨塘寺閱埋菴集象教維持世所難可憐魔惱不成歡埋菴一變已至魯留與諸方作鏡看埋菴有書名象教四維頗箴時弊荅無住生心義生心復無住兩箇木人同拽鋸無住復生心泥牛臥聽牧童吟無住生心若有二水波應辨東西位生心無住若定一日光照處應無色亦一亦二兩相違非一非二是何物三世諸佛絕不知何況嶺南賣柴客寄贈德水法主剖盡籓籬見自心去來諸佛足知音支那國裏無相識肯把鋀銅漫博金芙蓉苑菡萏初標蓮社名十千天子共尋盟瑤階行樹垂珠網寶岸樓臺映石城無數妙華供佛事幾多春色淡塵情幢王最喜香河繞趺坐時聞法樂鳴題大蘇菴二首頹垣小露薜蘿門田畔依稀見別村月到不知檐外白雨餘猶睹壁閒痕一龕佛火明兼昧半座蒲團冷亦溫遍吉願王勤徹夜香煙堆裏度清魂直向須摩禮願王肯從塵世借螢光門常晝掩室生白虀作晨餐面欲黃唯有貝多恆寓目更無些子暫關腸娑婆歲月消磨盡周匝俱時火宅涼入山二偈鬥諍啀喍不忍聞蟭螟眉裏盡浮雲宗風斷續何關我教網弛張一任君蝕芥便窺空界迥剖塵方信大千文如來慧命同真際笑殺從前河飲分染習難忘每自悲調心無術幾人知浮名何異斬頭劍逆境誠為抉膜錍骨肉首丘同野獸袈裟登壟似優兒山靈莫笑歸來晚病未膏肓尚可醫雨窗偶詠二偈一臥靈峰萬慮灰檐聲滴滴印蒼苔已忘世上狐蹤擾但聽林閒鳥語哀野老乍逢商稼穡山農常共卜風雷宣尼任斥樊須小我較乘桴有取材浹旬風雨怯春寒床折心安夢亦安半世浮名同唾委餘生課願與時完展開古藏非文字閱盡今時驗肺肝天外舉頭誰似此夜來高枕日加餐五月二十七日大病初起偶述三偈山深日聽水漫漫小暑依然似小寒無意避人人已避有心刊病病難刊臥餘十晝甘隨死痛徹千肌苦較寬慚愧歸情猶未決又從與餌獲輕安如何閱藏便招魔慎疾偏令疾更苛覷破革囊無一淨贏來壞想略成科虎銜犬子踰垣去庭滿苔紋拒客過絕後再甦渾似夢夕陽斜映鬢眉皤及門諸子並天涯擬作遺書筆欲斜祕藏豈難開肉眼會權終恐滯牛車嗤他苦諍全迷筏慶我偷安別有艖病退身閒重展藏珊瑚擊碎燦雲霞病起警策偈六章幻身夢世剎那遷逝趨向死門如囚赴劌辯智神通何能稍制唯有持名斯為上計四大六情唯苦相攖一句佛名如篁出聲虛空可隕名德弗傾不生不滅本自圓成病苦既劇涕淚悲號類彼孺子取誚同曹夙業所致寧敢自弢庶幾慈父哀此塵勞痛既難脫發心代苦已願代苦何又求愈性非異同情遞參伍脫則俱脫籲我慈父革囊盛穢有何可愛況復瘡門其惡彌倍積劫癡迷沉溺弗悔一念聞思魔軍永退嗟爾幻客聽我誨言勿恃慧解疏此定門日乾夕惕成性存存赴爾初志報爾深恩閱藏畢偶成二偈佛語何嘗離佛心禪流義學枉沈吟百千公案水洗水八萬修多金博金閱盡始知無一字拍盲安可透稠林馬鳴龍樹雖難企智覺芳蹤庶許尋山房悄悄絕音書縱有桃源恐不如展卷分明唯一事出門何用覓三車黃花遍地鋪新景翠竹參天擁舊居般若真如休寱語饑餐渴飲任狂疏雨窗自喻四偈九月十九日萬仞寒巖枯木身夢魂高揖謝芳春佛名信是千生伴梵冊元非五眼塵食母婆和憐病子乾坤老大笑畸人閻浮何處尋知己獨寄清思落日濱盤曲樗材與世違自欣從未蹈時機興來舉首看黃葉倦去支頤送落暉無客不須商野饌有風聊復被鶉衣來麰盞飯天遺我絕勝當年賦采薇百年瞬動計何長郵寄紛紛客夢狂來去未知生死寂賢愚偏諍是非忙梨華蛺蝶邀成果柳絮毛毬佩作璫輸與深山閒納子數珠百八理歸裝極化窮神皆妄想喚回妄想想如來但令當念一聲切便覺從前萬慮灰截斷去來明暗句結成實報寂光胚唯心作佛唯心是不假鍼錐正眼開獨坐書懷二首剋期取果志慚愧未能酬病後知身苦貧來幻想休但將三際念總附四弘舟彈指歸安養閻浮不可留半世傾腸腑寥寥有幾知庶幾二三子慰我半生思捨盡從前得方開格外奇殷勤末後句奚啻黍離詩病中口號十一月十八日夏病不知暑冬病不知寒夜長似小劫痛烈如刀山人間尚復爾何況三塗閒歸命大慈父早出娑婆關病閒偶成十二月初三日業緣叢簇病緣頻痛苦呻吟徹暮晨早發菩提猶若此未全正信擬誰親身經九死渾亡力心本無生獨自甄名字位中真佛眼未知畢竟付何人大病初起求生淨土六首閻浮百苦鎮煎熬賴有摩提路匪遙六字洪名真法界一聲凡念海全潮濁流寸寸清珠映暗室塵塵寶炬招千古東林風未墜不須方便自橫超沈痾危篤是吾師消卻從前多少癡已破百年閒活計定開塵劫大通逵遙瞻落日增哀慕夢禮慈容長智悲六八願王恆攝取金蓮育質可無疑持名真實是單傳念念圓成深妙禪能所本來無二體果因交徹即重玄廣長舌相堅真信周遍身光結法緣太事分明唯此事同仁共策祖生鞭病經累月皮纏骨彷彿冥塗薜荔多脾弱羨人甘六味根嬴廑我順三和軒岐伎倆非雙善忉利酥酡柰異柯最是樂邦慈父願含生永永離沈痾久向阿彌誓力深浮生無柰染相侵聞聲見色多忘念計後思前轉昧心痛極色聲緣自斷病危前後影方沈孤明六字全提出百獸群中師子音乾慧初乾業未枯病深無計可支吾稱名不異兒號乳懺罪何殊囚伏辜乍慶此時方得主更慚歷劫枉成逋丁寧法侶勤相助共解輪王髻裏珠贈王雪友洙泗源從鷲嶺來唯心一語正傳開聖狂究竟由當念舜蹠何嘗稟異材自昔靈根境既久而今正信發應恢文人慧業元無二好把家聲續老裴甲午除夕東西南北枉趑趄乍息狂心復舊居正喜竹泉不用買那堪疾疢久難祛力從枕席消磨盡心向華臺畢竟舒薦取寶池春富樂從茲貧與病俱除乙未元旦二首爆竹聲傳幽谷春蒼松翠竹總維新泉從龍樹味如蜜石鎮雄峰苔似鱗課續三時接蓮漏論開百部擬天親況兼已結東林社同志無非法藏臣法藏當年願力宏於今曠劫有同行歲朝選佛歸圓覺月夜傳燈顯性明萬竹並沾新令早千梅已露舊芳英諸仁應信吾無隱快與高賢繼宿盟此書十卷丙申歲後從新安梓三卷半首其事者為葉淨衍出二十兩而助緣則有釋知循李之韡出十兩胡公著出十兩鮑如憪吳淨智等嗣有葉真岸出五十兩蘇開祚出四十兩吳淨迪出十兩三公協力刻六卷半而書於是乎成感激法緣不易略紀其姓氏如右至丁福慧莊嚴自有稱性功德在非筆墨所能罄其萬一也己亥冬月成時合掌謹識
