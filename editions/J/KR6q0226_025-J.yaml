body:
  text: 題跋二貝林師書大佛頂經跋予聞貝師善梵書為芥菴凡夫諸友所欽適沈甫受示師手書大佛頂經每書一字必致一禮精誠端楷千古罕見其儔至梵文及明王像不異五天親授蓋真得諸定中非聊爾也師棲神安養誓願弘深示寂茶毘骨皆五色甫受專修淨業與師臭味最合故得手澤最多嗚呼世藐教乘薄淨土安得如師者以主之又安得人人如甫受者而得其所主也題玉浪施茶冊性水本然周遍法界隨心應量或為鑊湯沸尿或為膿血清泉或諸天甘露之藥或淨土八功德水皆循業現非因緣非自然性也夫性真既舉體隨心應量矣則凡鑊湯八德等何非本然周遍法界乎而遍計情執橫於性真中分水分火分寒熱饑渴故諸佛權智隨情不與世諍因寒熱而溫涼之因饑渴而飲食之因所見水火而調濟之遂開施食施茶種種法門只此法門有昧因果者又出三塗法界著相計我者出修羅法界勉為善者出人天法界了本空者成二乘法界深入緣起廣演行門者成菩薩法界通達實相無入不自得者成諸佛法界雖依此法門具出十法界已仍於事相不增減亦於法性不增減是故不變常隨緣理具還成事造隨緣常不變事造還該理具是故能施所施及受施者悉具兩重三千此所謂三輪體寂緣起無生三千無性者也豈離現前日用別有向上一著哉玉公作此不思議法徵文於蕅益旭子旭為拈曰不了則受此茶者墮阿鼻地獄施此茶者亦墮阿鼻地獄了得則施者成無上菩提飲者亦成無上菩提雖然此猶迷悟情量邊語畢竟超情過量不屬迷悟又作麼生不妨借趙州老婆舌頭徐徐荅曰喫茶去憨大師書唐修雅法師聽法華經歌跋甚矣心之妙也三世佛依此成道十二類依此輪轉山河日月依此幻現文字音聲依此發宣心不可以言語形容然言語未嘗不即心也隨一一語必攬心之全體大用然盡未來際演無量言語亦不罄一念心之妙也人各具妙心得釋迦老子法華妙經庶幾註腳法華妙經得修法師聽法妙歌庶略讚揚此歌絕妙好詞得吾憨翁絕妙手筆庶稱二絕世有不知自心妙法華妙及此歌之妙者但珍憨翁妙筆日夕玩之安知不因字知歌因歌識經因經悟心也哉然則妙字妙歌妙經無不從妙心流出無不還歸妙心誰謂心外有法法外又別有心也十大礙行跋十大礙行出寶王三昧念佛直指佛祖聖賢未有不以逆境為大爐韝者佛四聖諦苦諦居初又稱八苦為八師苟稍存喜順惡逆之情終與夏草同腐而已安能如松柏之亭亭霜雪閒哉美玉不琢不成器頑金不鍛不致精鐘不擊不鳴刀不磨不利豈有天生彌勒自然釋迦欲為聖賢佛祖必受惡罵如飲甘露遇橫逆如獲至寶方名素患難行乎患難方可於穢土植淨土因方如蓮出淤泥超登不退儻無事則駕言念佛求生淨土一遇不如意輒悔慍咨嗟吾恐三昧不成生西未保須於此十大礙行一一自驗果於病時難時乃至被抑時唯增念佛心明苦空觀不尤不怨庶蓮萼日滋稱三昧寶王矣唐氏女繡金剛經跋世之繡花鳥者曰綾與線也手也心也以美綾細線靈心妙手而繡花鳥則花鳥矣轉而繡般若則般若矣謂般若與花鳥異綾線心手果且有異乎哉謂花鳥與般若同昇沈苦樂果且有同乎哉以美綾細線繡花鳥猶云法身流轉名眾生也即以此繡般若猶云苦即法身為實相般若也以靈心繡花鳥猶云菩提即煩惱也即以此繡般若猶云煩惱即菩提為觀照般若也以妙手繡花鳥猶云涅槃即生死也即以此繡般若猶云結業即解脫為文字般若也夫三般若只在一轉關閒而綾線不轉心不轉手不轉謂轉三障為三德可謂即三障是三德可六祖所云但轉其名無實性也使無綾線無心手不可繡般若亦豈可繡花鳥謂花鳥非美綾細線靈心妙手所成吾不信也知此則蛣蜣六即思過半矣唐善女所見金甲神即自心所具執金剛神乃徹悟此心三般若無二體而以同體大悲願力護此文字般若令法界眾生因斯起觀照而證實相者也覽者信唐女之感應便可信自心感應信自心感應便可信感應即非感應非感應則無所不感無所不應是謂應無所住而生其心是謂感應道交難思議是究竟般若是究竟花鳥去病公書大佛頂經跋如來藏不變隨緣舉體為善惡善惡隨緣不變舉體即如來藏如日出天下明日沒天下暗虛空隨明隨暗非明暗能增減也去病公因一念迷而破犯今一念悟而力疾書大乘日已出矣心性依然無恙請勿更疑則更不迷暗矣四十八願卷跋大般若云恆沙菩薩發無上心或一二得不退者蓋無善巧方便雖多劫勤行六度不免退墮聲聞辟支佛地況不能勤行六度者乎然法華云若聞一句一偈我亦與授阿耨多羅三藐三菩提記又何也須知法華乃原始要終之論縱墮塵劫後必成佛以無人出佛性外故而大通佛時結緣眾今有住聲聞地者乃至未來聲聞弟子猶十六王子所化則般若所明退墮之多讀法華而益驗矣夫一聞佛名畢竟成佛退不退遲速天淵然退墮之緣在一時耳乃流轉五道動經無量百千萬億恆河沙劫受無量苦試一深思能不寒心喪膽也哉釋尊成道以佛眼觀過去同發心者或在三塗方嬰劇苦或在人天正耽欲樂或生色無色界固守癡頑或證聲聞辟支保空滯寂嗟嗟與釋尊同發心者尚爾稽遲從王子初結緣者何疑久墜吾人旦夕稍有病苦難緣尚覺難忍乃甘一念之錯招長時頭出頭沒之殃豈非人無遠慮必有近憂者哉何謂善巧方便般若明觀一切法空度一切眾生是也觀一切法空何名利之足縈懷度脫一切眾生何苦行不能黽勉觀空不度生墮二乘地度生不觀空墮愛見慈況恣我慢并無世慈貪利名并障偏理一芥翳天一指蔽目摩尼願寶長隱淤泥甚可惜矣然一芥一指亦何難撤不肯撤耳果念念緣此願王不負初心因地杲日當空霧靄消滅法藏比丘所以速成正覺由此而已張興公喬梓梅花詠借題予少酷嗜梅實噉輒數百然竟不知梅花丰韻也今齒力漸衰而談說醋梅口中水出態猶如故且知梅花清芬逸雅歲寒獨秀其見賞於高人才士又如此嗟夫噉其實不知其花知其花不復能嗜其實竊怪夫今適知花詠花者競出奇調向久嗜實詠實者曾無一人也昔世尊以蓮花巧喻妙法天台大師以權實義釋之為實施權如為蓮故花意在於實開權顯實如花開蓮現意須於權噫昔嗜實無詠實者病在不施權今知權而多詠權者功在於能忘實乎顧權實之不易辨也甚矣為實施權則權外無實是故執權為實者非也泥權為權者亦非也開權顯實則實外無權是故離實求權者非也捨權談實者亦非也今天下有談實者大似說梅止渴曹瞞伎倆已耳夫以梅為梅不若以非梅為梅也以非梅為非梅不若以梅為非梅也梅一恆河也恆河一梅也捨魚龍人天所見固別無一河捨諸君子所詠豈別有一梅哉諸君子各詠梅花自是梅花各鋪天匝地矣興翁之沈毅僧持之穎拔復從而後先賡之若俱發明則有俱現云何復問不相容者斯之謂與斯之謂與諸君子既借梅花各寫所欲言予借借而戲為之題法華會義自跋嗚呼圓頓妙法曠劫難逢繄我愚蒙何緣幸遘每一披閱恍若夙聞豈非普賢威力及釋迦守護之功邪智者大師不可復作後賢堅執鬥諍滋生圓融絕待法門幾成彼此是非情見弘之者城塹益高益深望之者疑畏日新日盛耳聞目擊扼腕痛心不揣疏庸聊為介紹舉筆於己丑十一月初五日甫成一序病臥半月至十九日方得勉強從事旦夕孳孳手不停書目不停閱臘月二十六日僅完會義八卷歇節三日庚寅元旦隨試筆又歷一月告成共計會義一十六卷足運心力六十八日嗟嗟古人一炷香朗誦華嚴一部旭也鈍矻矻乃爾可嗤矣然誘接初學令得漸悟法華實相不終按劍亦不望洋則釋迦普賢及與智者必愍旭之鈍置而益鑒旭苦心也夫占察疏自跋憶辛未冬寓北天目有溫陵徐雨海法名弘鎧說此占察妙典予特遣人往雲棲請得展讀之悲欣交集癸酉冬依經立懺乙亥夏講演分科是時即有作疏之願病冗交沓屈指十五年來梵網佛頂唯識法華皆已註釋獨此夙願尚未填還可歎也今庚寅年閱世已五十二歲百念灰盡偶同志數人仍來結夏北天目究心毘尼予念末世欲得淨戒捨占察輪相之法更無別塗爰命筆於六月朔越十四日成稿輸一滴以益大海捧一塵以培須彌雖無補於高深庶善鑽於乳酪公我同志共享醍醐菩薩戒本經箋要自跋予述梵網合註已將此經所有開遮持犯盡會入十重四十八輕矣比因黑白月誦此本有堅請箋釋者予恐犯重繁過辭之再三更請曰末世鈍根或不能遍閱合註若不令誦者略知大意豈不犯無知罪乎於是勉箋其最切要處以便初學若夫菩薩比丘自應遍學大小律藏即菩薩沙彌及優婆塞亦應廣學大乘經律豈容守此一滴而棄大海哉金剛經跋金剛般若大旨應無所住而生其心一語足以蔽之蓋無住正所謂應住生心正所以降心也而生心二字尤為下手工夫以凡外不生出世心故恆住生死二乘不生上弘下化深心故恆住涅槃唯菩薩不住六塵而行六度故能如所教住名第一義住亦名住於佛住試玩經中勸生心處不一而足如云發阿耨多羅三藐三菩提心又云應如是生清淨心又云信心清淨則生實相又云為利益一切眾生應如是布施又云以無我無人無眾生無壽者修一切善法乃至於法不說斷滅相等而中閒一處直云應生無所住心由是觀之若不生心修六度則住斷滅相矣故余嘗謂此經以實相為體觀照為宗文字為用舊云無相為體無住為宗者非也題畫見山忘道古人所訶況著意描山水作古董玩具邪畫者求者各領三十棒雖然心外無法滿目青山果然會得一切法趣畫坐畫道場轉畫法輪度畫人物證畫佛像則予三十棒便是普賢廣興供養矣題邵石生集陶近體三則古今奇絕詩文無非各從良知變現而昧者以為定屬古今不知皆吾自心影也故為詩文所用不能善用詩文此集真善用陶者乎雖曰陶詩實邵影耳其一戛玉敲金非以其工也鎔凡鑄聖非以其才也苟壅其血脈臂不能使腕腕不能使指況身外物乎苟達其性情龍可豢虎可馴況詩句乎雖然龍虎特易伏耳不善用詩句則詩句之怒殆有甚於龍虎者矣其二邵非不知自律也集陶者忘其自也邵非不知仍陶也為律者忘其陶也忘自陶亦自矣忘陶自亦陶矣天下有不忘而能用者乎手忘故持足忘故履目忘故視口忘故語莊子云魚相忘於江湖庶幾近之夫忘其用乃為大忘亦忘其忘乃為大用邵君其當進於此乎題鐵心橋冊大佛頂經明眾生色陰不過堅固妄想以為其本夫妄想謂之堅固則非堅固明矣是以山可移也海可竭也金石可令流也世界可壞空也乃至虛空可消隕也何有於區區一橋者乎橋有鐵心猶人肉團耳鐵尚可盜則肉團可易奪益不難矣肉團一期質礙尚不難易奪則緣影之乍生乍滅者尤不難矣是故緣影非唯不是真心亦復不是妄想也夫妄想者無體無相無方無所而遍為五陰作本者也是以雖甚不真亦甚難奪也眾生無始以來用此妄想牢不可奪唯佛能不奪而奪所謂令其妄想作佛妄想念佛唯以不可奪之妄想即令還念不可奪之本性此所以為究竟堅固首楞嚴王三昧也儻捨妄想別覓真心念佛何處更有真心可得儻以不念為真則又墮在空散消沈及枯槁妄想窠臼中矣故曰斷除妄想重增病趨向真如亦是邪也若以妄想心熾然念佛是謂舜若多性可銷亡爍迦羅心無動轉題之菴凍雲圖經明一切因果世界微塵因心成體夫心既舉體為一切因果世界微塵矣更喚何者為心又喚何者非心故心也者不可為典要唯變所適者也然唯變所適而終不可變也宣聖有得乎此知此心性不唯不可目為器亦復不可目為道但云智及之仁能守之而已知之好之樂之而已我非生而知之好古敏以求之而已學而時習之學之問之思之辯之行之而已涉江居士目其菴曰之菴問廬山靜主湛公曰如何是之菴景公曰納曩住仰天坪雲凍於山腰雨霈於山足日朗於山頂其之之變態乎涉江喜遂圖之予曰吾人介爾一念頓具十界百界千如理具事造無餘無欠炳然齊現而無事安排也如一念一切諸念亦如是如心法一切色法亦如是如實法一切假名亦如是是謂之菴之凍之雲之筆之墨之紙之腕之主之客之緇之素之能之所一一無非之之全體大用也五眼不能盡觀也五耳不能盡聽也無之而非菴無菴而非之也湛公涉江各各大笑而以之圖歸於念之佛之子若恆正上座受持朱元介所書經跋世之宰官略有五類一乘大願輪上弘下度此已悟無住生心之旨能普門示現恆以八大人覺自覺覺他者也二已有省發未斷習染一念之誤偶墮洪福仍能不忘本因在欲思脫山谷東坡是也三夙向三寶植福根深今享宰官雖未頓悟心源而極力弘護陸五臺是也四宿為苦行僧道眼未明塵心未斷見榮貴境深生欣慕雖乘苦行善根遂獲如願而縱恣五欲不能自拔則朱元介是也五本不信三寶因信福善獲宰官身往往自高自大不知皈依奉持戒品其仍行世善者復受修羅鬼神雜報若恣行諸惡者永墮三塗而已大集會一切菩薩向世尊痛哭流涕發大誓願未證無生法忍已前懇佛加護寧墮地獄不為王臣宰官蓋深見富貴過患墮落十不啻九昇進百無其一故也嗟乎富貴浮雲耳何能陷人朱元介之陷溺不在為狀元時在為匡山老僧時矣然陷溺中猶能書此法寶所稱食少金剛畢竟不消者非邪此經謂如來說一切法皆是佛法又謂佛法即非佛法是名佛法元介能知此義將錯就錯就路還家富貴陷溺之塗何異普門示現之像惜元介往矣予為跋所書經聊作未來得度因緣所願後之閱是經見是跋者未為宰官勿欣其榮蹈其覆轍已為宰官急用此為殷鑒早圖就路還家可也恆正上座日持此經兼念阿彌陀佛專求淨土豈有誤墮之懼恆公不墮元介覆轍元介必隨恆公登樂土矣予損己利人未階一心不亂獨宰官窠臼勘破已久將來必與恆公元介共晤言於珍池寶地記取今日此語共印之世尊大士何如何如題樂愚尊宿付囑朱本蓮十八高賢卷出家大丈夫事非王侯將相所能念佛又極圓頓事非尋常禪教律師所能也遠公髫年文名藉藉出家後結社東林天子不能屈其節真萬古高蹈無怪乎十八高賢同心宗仰而陶謝名士僅曳裾門外也後世釋氏之學漸衰禪講律師無不仰一二宰官售知人世嗚呼以視遠公何如哉己巳秋曾晤樂愚尊宿觀其稜稜骨氣猶有先輩風較近時齷齪寒酸及趨炎附勢者勝百千倍矣公有志中興蓮社從匡山攜得此卷不付緇門徒輩獨付朱居士本蓮或深見緇門無可付囑而居士素有出塵志又二子皆先薙髮三人中有一人焉能脫時流惡習復振遠祖家風者乎余一素居士楷書華嚴大典跋大方廣佛華嚴經者直顯吾人現前一念之心性也心性體無對待故大相無欠缺故方用無邊涯故廣心性本無不覺曰佛本無不含曰華本無不顯曰嚴眾生迷此枉受輪迴如以大千經卷閉微塵中諸佛菩薩悟此得大解脫如剖微塵受用大千經卷是以正覺初成海印炳現十會不離剎那一處頓周剎海重重無盡似帝網明珠法法互融若秦鏡涉影隨舉一字悉具六相十玄苟悟片言必徹千如百界圓融行布分之而愈合事理性修混之而愈著吞教海之萬流混同一味派禪源之涓滴廣注百川故龍樹始謂利根自許超佛既睹龍藏不覺喪吾況末世之諓諓者邪邇年周籍湮埋諸侯僭竊甚至陪臣執命全未聞禮樂影響竊為大言欺世曰善財五十三參正眼看來未免刺首入膠盆超脫漢子那得有如許落索噫此野夫吃脫粟飯笑傲王公寧止夜郎王而已一素既能莊嚴此現前一念華嚴性海豈有不直下承當又豈有得少為足哉西有寱餘自跋戊子幻寓葉園名漫藁為西有寱餘蓋雖念念思歸樂土而利人之夢仍未忘也己丑秋歸臥靈峰庚寅冬辛卯夏復鼓脣祖堂長干兩地逮壬辰秋波旬效力助破夢中利人之想萍漂吳水楩泛吳波寱語從此息矣此後如孤雲野鳥雖同在無明長夜中別是一番幻夢縱有啼笑不容復續此編較定宗鏡錄跋四則聖賢示現出世覺悟群迷不得已而有言言此無言之旨即文字非文字不離文字而說解脫豈非實相觀照文字三般若本非一異並別可思議哉永明大師相傳為彌陀化身得法於韶國師乃法眼嫡孫宗眼圓明梵行清白睹末運宗教分張之失爰集三宗義學沙門於宗鏡堂廣辨台賢性相旨趣而衡以心宗輯為宗鏡錄百卷不異孔子之集大成也未百年法涌諸公擅加增益於是支離雜說刺人眼目致袁中郎輩反疑永明道眼未徹亦可悲矣予生也晚不遇先輩宗匠但留心己躬下事已三十餘年又時尋了義至教頗窺一線閱此錄已經三遍竊有未安知過在法涌決不在永明也癸巳新秋刪其蕪穢存厥珍寶卷仍有百問荅仍有三百四十餘段一一標其起盡庶幾後賢覽者不致望洋之歎泣岐之苦矣夫其一西土諸祖宗說兼通故能續佛慧命普利人天此土如北齊南嶽智者杜順未嘗不以禪關為本達磨六祖五宗諸老未嘗不以聖教為印斷未有師心自是可名禪算沙數寶可名教者也降至唐末五季禪教相非性相角立台賢互訕甘露反成毒藥矣永明大師於是乎懼爰成宗鏡百卷以詔後人雖被法涌雜糅然具眼者觀之金沙可立辨也如百兩真金投以十兩鋀石頓失光彩一斛白粲投以數升稗穀遂覺蕪薉苟去其鋀稗金之光彩如故米之精粹不改也嗟嗟後賢未獲差別法眼慎勿於先聖著作妄事增益也哉予手點此錄於今四遍每尋討必有新益實是觀心之助斷不可作世閒文字道理會也雖然愁人莫向無愁說說向無愁總不知俟之子期而已其二古人云依文解義三世佛冤離經一字即同魔說蓋至言也自禪教分門佛冤魔說遍海內非古佛現身實未易救細讀宗鏡問荅引證謂非釋迦末法第一功臣可乎然唯徹悟無言之宗乃能曲示有言之教今人須藉其言以契無言始不死於言下儻直以是為宗而不知離指得月縱解悟了了仍是三世佛冤耳昔宋太祖欲伐江南後主遣一辯士謁見曰江南事陛下如事父奈何以父伐子太祖曰父子異居可乎辯士愕然無以為對噫讀宗鏡不悟心吾恐遇閻老時其為愕然者多矣然設使棄而不讀又何異因噎廢飯也其三教下人不肯坐禪與坐禪人不肯學教雖其師匠之過亦由人未發真正大菩提心也夫大菩提心未有不知痛為生死大事者也果為生死大事安肯以文義相對以暗證自守乎如欲至長安口必諏道足必不停諏而不走終不能到走而不諏必遭岐曲今之封文義者何異諏弗走守暗證者何異走弗諏邪嗚呼以是求出生死成無上道難矣宗鏡一錄既示厥道復加痛策可謂徹底慈悲設復借之以資談柄是猶據榻看皇輿考及長安志廣向村儂誇說途中都中諸事非不可惑動愚夫吾恐一遇曾到長安之人必不勝懡㦬者矣裂網疏自跋起信論者佛祖傳心之正印法性法相之總持也如來以大乘阿毘曇付彌勒摩訶般若付文殊般若破執有而顯妙有毘曇破惡空而顯真空一音所宣曾無異旨佛滅五百年後異見滋生馬鳴大士應佛懸記重興正法始則示為計我外道後乃廣顯二空妙宗作無我大師子吼破凡外二乘偏執宗百洛叉大乘經典造略論申暢一心二門即生滅而顯真如收般若真空不空之妙旨即真如而辯生滅闡毘曇幻有不有之玄詮厥後龍樹依般若而造中論還以空義成一切法護法依毘曇而解唯識還以幻有顯二種空故知馬鳴龍樹護法三大菩薩同契佛心無稍乖異奈何依文解義泥名相而昧旨歸伐異黨同豎門庭而堅鬥諍謬談聖旨錯解真乘千百年來竟同長夜哀哉末葉誠可痛心旭業障深纏未登正位夙因微善遊刃圓宗客歲盡散學人志圖修證今春入新安寓歙浦迴龍竊解茲論凡十一日草疏成是役也上藉諸佛菩薩馬鳴大師加被力略無疑滯又賴允持循法主外護無他緣至於性相關頭種種問辯則戒子堅密時公之啟予者多矣吳大年居士書法華經跋法華經藏深固幽遠無人能到非不能到也於無人中妄計有人所以終日行而不自覺也苟達一切法無我人眾生壽者無法相亦無非法相則微塵剎土十世古今總是一部妙經佛子住此地即是佛受用常在於其中經行及坐臥又何能到不能到之可分別哉靈山會上深歎一念信解及受持書寫功德非虛話也大年居士書妙典至三部孫粲如珍藏供養蕅益道人展閱隨喜到邪未到邪勿措思議可也書吳孟開居士泊岸卷後分段為此岸則有餘無餘二種涅槃為彼岸變易為此岸則無住大般涅槃為彼岸夫唯無住則無所不住亦唯無所不住方成無住故曰不彼岸不此岸不中流而度眾生又曰在天同天在人同人審如是何往非岸何岸不可泊哉是故不必問所泊何岸第問能泊何法耳以愛見泊所泊無非生死岸也以空觀泊所泊無非二乘岸也以六度萬行泊所泊無非菩薩岸也以甚深般若泊所泊無非實相法界岸也孟開之築泊岸軒也蓋孝思也有世閒孝未離愛見也有出世閒孝空觀幻度相應者也有出世閒上上孝甚深般若是也孟開齋戒已久非甘為世孝者由出世孝遵出世上上孝則是軒也其般若舟乎願居士乘是舟以佛度為桂棹以佛行為蘭槳以諸佛洪名為高帆以往生諸佛淨土弘願為迅風則必與尊人同泊華池珍岸然後盡十方世界無非樂土矣書知足歌後木必具火遇緣乃發心具般若亦復如是老病死生皆發般若之勝緣也愚夫習氣重善根薄如溼木不能發火唯往昔久種善根生平惑業輕眇者雖不見其勤修而千年暗室一燈頓破讀濟翁知足歌信矣子孟開篤信三寶孫真信幼而茹素般若心燈正未有艾也錫類之義孝慈皆然吾深為之助喜
