body:
  text: 序三入法界序贈程季清夫法界者不思議解脫境界也法華云治世語言資生業等皆順正法皆順正法皆不可思議矣學者以思議心入之何以通達法界哉然不通法界未嘗不即法界也何以故思議心本不可思議也知一切思議心本即不思議心則一切思議境界本即不思議境界達思議即不思議乃可與發菩提發此真正大菩提心乃可與入法界不觀華嚴乎善財參知識也必云我已發菩提心知識示善財也必說所證解脫境界德雲等無論已婆羅門之刀山火聚也長者之調和香也船師乘船入海女人借欲離貪童子之菩薩字智也何嘗離思議境界別有不思議解脫又何能於不思議境界強置思議乎十願居士程季清久發菩提心者也其自入法門也始參徑山禪既習唯識教嗣修佛身觀逮和光利物護法道而誘群靈也惟指示風水決判陰陽而已夫風水陰陽則非邪因緣無因緣也明矣覺明空昧相待成搖風自始也寶明生潤火光上蒸水自出也是故華藏莊嚴世界海一絶大風水也動為陽靜為陰動靜相乘物有生成變化動靜相奪界有成住壞空統而論之不過吾人心識之相分耳全體虛妄而全妄依真因緣生法即空假中故琉璃光觀風動性合十方佛傳一妙心月光習水觀得無生忍圓滿菩提蓋性水真空性空真水性風真空性空真風雖隨心應量循業發現各各不同未嘗不即清淨本然周遍法界也夫堪輿綱要莫若二十四山儻就蓮華臺藏而觀歡喜國為震安樂國為兌寶相午位成就子宮乃一娑婆界復具二十四山此四天下在華藏東卯位也約四天下南閻浮提離位也復就一閻浮提仍具二十四山震旦在南洲東北隅蓋震艮閒耳而兩京十三省又自論二十四山且就一省中一府府一縣縣一家家一室乃至室中一坐具罔不各具二十四山也則罔不各具天地盤諸吉凶神曜也又此一坐具東看則西南觀成北從彼彼坐具互互視之無一毛頭許不具二十四山全體大用此毛頭二十四山即華藏界二十四山無二無二分無別無斷所以云一微塵之法界不小法界之法界不大是可思議不可思議邪不變隨緣舉法界為一毛頭隨緣不變一毛頭全具法界如此方知可思議之風水本不可思議季清本證此現量不離風水陰陽之說具說一切法門不知者以為風水也孰知以大菩提心觀不思議境即以此滿菩薩行趨入普賢道乎他日佛坐道場有南詢者十願居士當告之曰我惟知此風水善巧法門如諸菩薩摩訶薩智慧如大海願力如虛空具證法界差別性相遍知一切無差別法而我云何能知能說彼功德行汝當次第參請乃至得見一生補處時蕅益道人伸右手摩其頂矣贈調香居士序蕅益子曰六塵之體無非法界可熏發菩提心者尤莫若香然香即法界何止熏發菩提直謂菩提可也又既謂菩提亦可謂十界染淨百界千如又既謂百界千如則不必更謂之香又不謂香亦何必謂百界千如香也百界千如也皆名字也名字性空一名一切名一義一切義何所謂行布何所謂圓融而行布圓融二義不期成而自成所以總別同異成壞六相法門直向一塵中辨取如一香塵一切諸塵一切諸法無不爾通此可入鬻香長者解脫門矣世衰道微魔外充斥舉凡戒香禪香慧香乃至淨土香王盡埋沒於鮑肆而裨販之徒競自標榜刻人糞為栴檀顧安得超方士一辨其真贋者然真香王決非伊蘭能混一任顛倒鼻根捨此取彼曾何減於馥鬱所痛久安溷廁者無出離想耳苕水茂貽居士憫之欲與優華長者同出一手遂號調香居士夫象藏十香王各各名字各各形相各各生起及各各根本隨舉一種可燒可塗亦可為末奚俟調和方稱異美然分擅其芳合乃益妙儻朽木合腐材多徒增臭又多香雜臭木併香亦臭夫香且臭況實無香者乎古律學之盛也律儀戒定共戒道共戒舉一全收不必別求禪教禪教全在其中謂自性成就固可謂和合所成亦可禪教亦然教云身口意淨隨文入觀非即律與禪乎禪云法法皆通法法皆備而無一法可得非統律與教乎今也不然持律者不惟禪教茫然扣以三千八萬亦茫然也演教者不惟禪律缺然責以依教觀心亦缺然也參禪者不惟教律未通未備核以無實法之綱宗仍作實法死法會也若然支那國裏安所得妙香而調和之而十大香王元未嘗不在娑婆國土只今現前身口即戒香種心知寂然之體即定香種覺了靈明之念即慧香種戒定慧之種備則禪教律之本得矣居士試取而調之使馨芬郁發一人清淨故多人清淨一世界清淨故多世界清淨俾此五濁惡世人人得無根信如伊蘭木出栴檀香誰謂苕水非熙連河長者非即毗盧遮那法界藏哉觀泉開士化萬人畢生念佛同生淨土序出世之要莫尚願力願者信所鍾行所出也無信則無願不願可云信乎無願則無行願相續非即行相續乎所以法藏比丘四十八願既發阿彌陀佛四種淨土斯嚴從是以來願願相續即是燈燈無盡蓮宗諸祖堪為左券觀泉一法友刺血書法華翹勤禮大悲行法畢生日念佛萬聲今欲化他謂萬聲局難取必無論千百十下至一聲但終身不替便決定橫超寶王三昧謂一念得生不我欺也余嘉其說即此是往生公據佛祖階梯辨語以勸登斯籍者便作標名蓮蕊想不必別求圓頓一念已超佛地矣能乘所乘序夫性修之旨不明由惑於忘能所之雄談未達能所實義故也有善御者駕千里之馬服千里之服而纆牽長不取千里矣設纆牽不長不善御者御之可取千里哉然御無他術惟車馬相忘而已人不忘馬不御馬馬不忘車不運車謂人忘車馬馬忘人車可也謂無人無車無馬可乎哉圓頓行人知正因真性軌之為車體了因觀照軌之為良馬緣因資成軌之為具度也此三不一不異故相須而相忘遂舉性三以為修三能乘聞慧所乘教乘能乘思慧所乘行乘能乘修慧所乘理乘從性訖修能所歷然而相忘於不二是謂全性成修全修即性者也菰城楊智琴潛心台教號乘乘居士夫教行理乘如上古瑤琴若無妙指妙音不發必以三慧乘之方知教觀不二也惠應寺放生蓮社序能儒氏之為教也大而博深而不可晦極六合內外不為迂余昔拘虛程朱之學不惟望洋復興斥鷃今乃駸駸然入於其中異哉能儒如來觀音地藏巧以勝異方便轉我邪心令生正信也豫因得仰承如來威力作師子吼遍破一切外道邪心夫物雖微誰不愛命只此愛命之心便是真常佛性此心不在內不在外不在中閒非過去非現在非未來非有非無非亦有亦無非非有非無本自離過絶非不可思議迷此心性真常真樂真我真淨妄認四大為自身相六塵緣影為自心相是故於中分人分物起愛起憎惑業苦輪循環不息若能直下諦觀現前一念心性似局四大緣影中實非四大緣影所能區局如心佛亦爾如佛衆生然便知心佛衆生的的三無差別殺生即殺自心未來諸佛放生即放自心未來諸佛若放自心未來諸佛即真念佛三昧修此念佛三昧是恆轉妙法華經百千萬億部也我釋迦如來之道未墜於地良由含靈抱識無不各具全體大用今舉此全體大用而為社為文為詩為種種法語豈復有文獻不足徵之歎哉故題其編曰能儒文獻而為之序重刻破空論自序經云寧起有見如須彌山勿起惡取空見如芥子許蓋空見撥無因果能斷五乘善根故也然般若如大火聚四邊不可觸觸則被燒苟不取著則溫身熟食除冥以喻四門皆可入道又何為獨破空哉須知空句破則四句皆破破空句正所以顯空門空門顯則四門皆顯菩薩欲具一切佛法當學般若般若何止破相始教而已且如此經一則云有持戒修福者於此章句能生信心再則云應無所住而生其心應生無所住心繼又云以無我無人無衆生無壽者修一切善法即得阿耨多羅三藐三菩提乃至云發阿耨多羅三藐三菩提心者於法不說斷滅相是豈非實相大乘之正印乎此論初發意於武水次成稿於霞漳一刻溫陵再刻苕城茲復刻諸留都豫喜王城緇素咸於甚深般若有大因緣也辨數語於首楊輔之乞金剛集解序一代時教皆生死海中廣大津梁而般若尤為迅航菩薩未有不學般若成無上菩提者般若一十六會會一切皆摩訶衍共則三乘同進不共菩薩獨修惟第九金剛之會直指無住生心妙旨故云為發大乘最上乘者說蓋圓頓極談實相正印所以黃梅印心六祖悟道也世之解者僅以無住無相為其宗體豈知般若如大火聚四邊皆不可取四門皆可入乎嘗玩經中較福每舉捨財捨身頗似般若功勝布施功劣乃經初云菩薩於法應無所住行於布施又云菩薩不住相布施其福德不可思量由此言之布施即般若非離布施別談般若也彌勒無著天親功德施四大菩薩造論皆謂布施具三檀三檀攝六度後人縱有注釋豈能過四大菩薩更出奇見哉宣聖云有德者必有言豫亦云修般若者必修布施今人不然高談般若無不點胸語以修捨則心驚怖反駕言不必著相詎知不著布施相早著慳貪相矣設慳貪無慳貪相何不布施無布施相之為妙也經云法尚應捨何況非法著布施是著法著慳貪豈不著非法邪此所謂無德無言者也然佛法如栴檀林入者有心無心皆染香氣古今諸解雖未必盡當亦無不有般若妙香存焉此集解之所為作歟重刻大佛頂經玄文自序性相二宗猶波與水不可分隔其流弊也至分河飲水此豈文殊彌勒之過亦豈馬鳴護法之旨哉謂真如受熏譬劫火洞然虛空安得獨冷謂真如不受熏譬劫火洞然虛空何嘗爛壞故知得其語合則雙美失其宗離則兩傷大佛頂云虛空體非群相不拒諸相發揮只此一言兩疑冰釋善夫智者大師有言偏執法性生一切法何異自生偏執黎邪生一切法何異他生例而推之縱謂法性黎邪和合生一切法何異共生非法性非黎邪生一切法何異無因緣生此之四句無非是謗儻妙達無生不起性計四句雖不可說有四悉檀因緣亦可得說謂真如不思議熏生一切法黎邪是可熏性生一切法皆無不可乃知智者真悟權實祕要於經未來懸合旨趣若此經來智者不可作習台宗者昧唯識習法相者迷圓理所以衆解咸失綱要究義理之攸歸蚊咬鐵橛判文字之下落鑿孔栽鬚旭未剃髮曾研此典每翻舊注迷悶實多後因雙徑坐禪始解文字之縛復因數番講演深理葛藤之根並探二宗融以心鏡直至溫陵弘法方得取筆疾書脫稿未幾剞劂旋畢板留甘露戒壇不能攜至江外茲遊普德略露贓私諸友重刻復述片言剖千古未破之藩籬犯從來嚴設之禁忌位卑言高安免於罪然出世君子諒不以人廢言也刻大乘止觀釋要自序大乘者心性之異名也止觀者寂照之異名也世顧離心性別覓大乘離止觀別談寂照何異騎牛覓牛丙丁童子求火乎儒者之道有見而知之有聞而知之佛道亦然北齊大師悟中論四句偈義直接龍樹心印一傳南嶽再傳天台天台述為摩訶止觀等書由是止觀法門盛聞於世頓漸不定三法並圓乃南嶽所示曲授心要世皆罔聞今試細讀實為圓三止觀總綱文不繁而義已備獨慈雲懺主五百年後序而行之迄今又將五百餘年微言將絶豫愧不敏未能聞道姑效盲人摸象述為釋要以助其傳李石蘭張孺含二居士集衆緣付梓大乘緣起為辨簡端警心居士持地藏本願經兼勸人序惟聖罔念作狂惟狂克念作聖此危微的傳也佛法亦爾一念迷常寂光土便成阿鼻地獄一念悟阿鼻地獄便是常寂光土所以地藏本願直與華嚴同一血脈試觀華嚴世界即空即假即中不可思議地獄衆苦亦即空即假即中不可思議華嚴明自心本具之淨土令人知歸地藏明自心本具之苦輪令人知避一歸一避旨趣永殊而歸亦唯心避亦唯心心外決無別法儒所謂道二仁與不仁而已危乎微乎善利分舜跖之關去存為人禽之別熟讀本願經不思自覺覺他出地獄歸華藏者必不仁之甚者也警心居士憫之遂畢世受持兼以勸人豫謂適發此心地獄苦輪便當頓息歡喜為序代法界衆生普勸云贈石淙掩關禮懺占輪相序佛法無他與世情相反而已心觀無他與妄想計著相反而已今學佛法者率借佛法以助世情說觀心者率因心觀而益想著正法掃地僧輪轉絶可痛也近代傳孔顏心法者惟陽明先生一人傳佛祖心法者惟紫柏大師一人旭生也晚習儒時不得親炙陽明後學佛不得躬承紫柏所以雖於儒釋源流略窺一線知與世諦流布之理學禪機迥然不同而障厚慧弱福薄習強遂爾半生誤於虛名罔臻實詣曩覺比丘多慚退為求寂今更愧沙彌真義僅稱但三歸矣敢更以空言贈人然竊玩占察善惡業報一經原屬釋迦大聖徹底悲心地藏菩薩格外方便三種輪相巧示業報因緣無疑不決二種觀道深明進趣方便大乘可登以五悔稱名為發軔先容以一實境界為平等歸趣夫五悔者敵體反世情者也二觀者敵體反妄想計著者也懺悔發露永斷相續滅業障勸請說法滅魔障隨喜功德滅嫉妒障善巧回向滅著有障發堅固願滅退忘障唯心識觀先知外境本虛皆心所現次達內心如幻了無真實真如實觀深達若境若心統惟法性法性不生不滅故諸法皆當體不生不滅如千漚萬波統惟溼性千器萬像統惟金性五悔翻破無始事障二觀翻破無始理障二障既淨成真應二身三聚淨戒一念圓發而三輪清淨之相特表示取信以顯住持僧寶絶仍可續孟軻所謂豪傑之士無文王猶興聞而知之不異見而知之云爾嗟乎豫能知占察大旨依經立懺而未能自得輪相人誰信之此實說藥不服咎不在藥也良方良藥昭昭具在地藏菩薩決不我欺我已知不服之咎誓將服之而石淙法友先得我心亦將掩關以祈清淨願各努力日夜塗抹并慎藥忌避風寒他日紹舍那真胤靈峰片石當與靈鷲第一峰同時點首矣緣居序世出世法皆緣生也緣生無性故惟至人能隨緣而不失其真真也者即緣非緣非緣而不礙諸緣者也善夫李方山之言曰一念頓悟緣起無生超彼三乘權學等見蓋凡夫貪著幻緣不能捨離二乘厭離生緣不能遊戲出沒皆由未了無生妄成取捨若諦觀染淨緣起四性無生無生則無滅無滅則無聚無散何法可欣何法可厭是以素位而行無入而不自得經云極樂修行一劫不如娑婆修行一日吾亦云出家修行一劫不如在家修行一日在家多惡因緣纏繞而能不忘三寶不捨正念是火中蓮花希有難得出家離於塵坌安處林野上者耽空滯寂不念人世之苦下者靜極思動反羡市朝之榮豈若濁水摩尼任汩流而清光如故者哉冶堂居士易讀書禪曰緣居知緣斷不作實想知不實斷無貪著亦無厭絶惟隨緣消舊業而可矣蕅益子枯坐北天目之藏堂聞而隨喜漫書此以相印居士當為再撫掌也蓮漏清音序經云若欲淨土先淨其心隨其心淨則佛土淨此事理因果並彰之旨自他權實不二之談也而昧者一迷緣影為心決定惑為色身之內不知色身外洎山河虛空大地咸是妙明真心中所現物是故西方極樂世界即唯心淨土現在樂邦教主即自性彌陀四明妙宗鈔云應佛顯本性明托外義成唯心觀立豈似愚人妄認六塵緣影為自心相遂置十萬億剎於心性之外哉顧惟現前一念心性覓不可得是即空義炳現萬法是即假義心外無法法外無心是即中義迷心即空名見思惑迷心即假號塵沙惑迷心即中稱無明惑三惑既熾四土斯穢今一心念佛不計我我所即空義顯隨念佛時佛隨心現便知十界皆惟心造即假義顯不惟是心作佛亦且是心是佛即中義顯一心三義既顯便能圓破三惑圓淨四土仍於無次第中假說次第觀行破惑同居土淨相似破惑方便土淨分證破惑實報土淨究竟破惑常寂光土永得清淨即中故常即假故寂即空故光又復三諦皆常三惑皆寂三智皆光此一非一舉一即三此三非三言三即一不縱橫不並別不可思議名祕密藏阿彌陀佛先證此也一切衆生久迷此也吾人現前注念此也是謂念佛三昧是謂心淨土淨先悟後修名理一心理一事亦一矣先修後悟名事一心事一理亦一矣文殊一行三昧普賢十大願王遠公刻蓮漏於東林雲棲號蓮池以明志皆歸極於此也丁蓮侶老居士深信篤行之餘遍閲古今淨土法要摘最警者目為蓮漏清音始法勝終現應凡二十五章條理井然群疑冰釋夫疑非可強釋也由本無可疑故也因僭為序如此重刻成唯識論自考録序三界唯心萬法唯識此性相二宗所由立也說者謂一心真如故號性宗八識生滅故稱相宗獨不曰心有真心妄心識有真識妄識乎馬鳴依一心造起信論立真如生滅二門生滅何嘗離真心別有體也天親依八識造三十頌明真如即識實性與一切法不一不異真如何嘗離妄識別有相也龍樹中論指因緣生法即空假中是生滅外無真如楞伽云心意識八種俗故相有別真故相無別相所相無故是真如生滅非一異而護法菩薩於識論中最出手眼直云為遣妄執心心所外實有境故說唯有識若執唯識真實有者如執外境亦是法執噫苟得此意何至分河飲水哉嘗論之性隨相轉何性不相設不遍達諸相無量差別安知妙性具足如斯染淨功能相本性融何相不性設不深知一性圓頓滿足安知諸相無非事事無礙法界故台宗劇談實相必約百界千如夫五位百法獨非百界千如之性相邪百界千如無非實相五位百法獨非實相邪若不分別五位百法真俗假實種現差別種種不同則所云點如明相迤邐不同一假一切假者不幾儱侗邪護法剋論心心所法各具四分夫相分各各不同可也見分可一向不同邪即見分各各不同可也自證分證自證分可一向不同邪若使一向不同則心王八心所五十一將一人果有五十九自證證自證分抗然角立互不相知不幾割裂紛糅邪然使心王心所惟同一自證證自證分又安得云心心所法各皆四分所成不幾墮用別體同之執邪更就相分論之且如拈一莖華此華本質如來大圓鏡智之相分也佛眼所見華成所作智之相分也佛智所知華妙觀察智之相分也此三為一為異若定異何處別有三華若定一佛眼不視時但滅成所作智相分餘二仍在佛智不緣時但滅妙觀察智相分本質仍在又眼見華時有眼識相分聞華香嘗華味覺華觸各有鼻舌身識相分佛一人既爾迦葉復有三華四微百萬人天各各皆有三華四微如是無量三華四微同在一處似如一鏡不雜不亂無二無別於百萬人天中隨拈一人相分時必攝一切諸人相分於眼等識中隨拈一識相分時必攝餘諸識相分重重無盡無盡重重是可思議邪不可思議邪一華既爾物物皆然色塵既爾六塵皆然相分有質尚爾見分寧獨不然見分通三量尚爾自證證自證分唯現量豈反不然後世弘相宗者何為自設藩域曾弗一深思也是故習性不習相未有不瞞盰者習相不習性未有不膠滯者唯南嶽思大禪師大乘止觀一書出識論未來前具闡性相幽祕蓋深證無師智耳厥後欲明心要須藉文言當知成唯識論大裨性學惜慈恩沒疏復失傳僅散現大鈔宗鏡諸書及開蒙二卷稍存線索國初以來竟成絶學萬歷初年紫柏大師接寂音之道盛讚此宗爰有俗詮證義集解諸書而紹法師音義為長音義未全故不流通基法主續補成疏亦頗簡要惠法主謂疏多訛復出此自考録豫謂此宗至方而至圓至賾而不亂至深細而非幻罔至詳明而有綱要設非妙悟莫窮底裏諸家著述固未立極亦各擅所長苟因是而求之深造自得觸著性相源頭不離只今現前一念則知三乘十二分教皆吾心識注腳與馬鳴天親同一鼻孔出氣何俟豫言而知深淺得失也廬山香爐峰重結蓮社序佛法之入震旦也大小並陳權實雙著求三根普被攝機最廣義門最圓頓者莫若淨土什師初譯阿彌陀經遠師隨結東林蓮社於時十八高賢表表人傑濟濟一堂陶謝諸公瞪乎其後餘可知矣香爐峰去東林五里而近高賢有愛其幽勝者結茅以居爰稱靈域唐白香山築草堂峰側名高賢結茅處為遺愛寺世廟時無盡燈禪師掛錫示寂後至今全身不散如入禪定燈師得法於天奇瑞師實高峰第九代孫神廟閒雪浪恩法師化道大行爭尚慧解有石門紀法主居此獨以精進修行紹之雅為憨師所重顓愚師所最敬仰亦坦焉遷化於峰前香山遺愛始惟高賢一人今得燈紀二師而成三矣紀師法孫拂塵泰公久侍顓師出入禪講旋歸淨土願續遠師芳躅重開蓮社玄門徵豫一言弄引豫與泰公交未久然大悲壇同事懺摩誠篤真懇非泛泛庸流逮結夏商究止觀頗多會心誠蓮盟長也吾願士民聞風興起凡聖各秉堅誠俾東林盛事不得專美於前則後五百年佛事倍為希有難得功亦百千萬倍於當年也已勸念豆兒佛序心之本覺曰佛心之始覺曰念顧本覺之在人心也似異而恆同乃始覺之隨人用也雖同而恆異是故背塵合覺便名始覺背覺合塵便號無明無明無體即以始覺為體始覺無相即以無明為相是故衆生念五欲時即名欲界無明念四禪四空即名色無色界無明念斷常即名邪見無明念涅槃即名界外無明唯有念佛之時即名始覺故曰諸佛正遍知海從心想生衆生心想佛時是心即是三十二相八十種好是心作佛是心是佛是故一切法門無不從此念佛法門流出無不攝入念佛門中一念相應一念佛一日相應一日佛直捷圓頓離見超情馬祖即心即佛蓋深得乎此也夫知即心即佛斷無不念佛時矣而迷者誤認緣影為心又妄謂心既即佛便不須念故不得已轉為方便曰非心非佛又曰不是心不是佛不是物等此曲為中下解粘去縛非直指人心見性成佛之本旨矣後世逐塊韓盧反以非心非佛乃至種種險句為奇特以即心即佛為平常何異嗜巴豆大黃吐棄膏梁美味者也桐城有二人結伴為客一死伴葬之攜資還其婦婦疑伴憤甚往尸處陳祭哭訴鬼與伴問答如生前乃同歸作證中塗遇事偶一念阿彌陀佛鬼大喚何放光怖我更速轉數念鬼懼曰汝一念胸輒舒五色光十餘丈眩我心目不能復近汝矣歸語我婦令自來當為汝雪冤伴因此醒悟出家為高僧嗟嗟甫舉一念光輪便舒故壽昌大師云念佛心即是佛也豈今時念佛他時成佛哉惜鬼不種善根不聞佛名故驚怖儻本念佛人仗此良緣寧不頓超樂土邪畢貫之居士參盡天下納僧乃死心念佛求生淨土兼勸人以豆念佛結佛緣人身一豆耳當念佛時身即放光所謂佛身充滿於法界者非乎今以豆念佛豆必放光以放光豆作放光食入衆僧腹無論其人念佛不念佛皆必恆放光明令遇斯光者有心無心皆得解脫光光相照成無盡燈則生界頓空更不必別談向上便是向上極則公案矣僧問趙州如何是毗盧師法身主州云阿彌陀佛阿彌陀佛請以此誠言為證放生社序佛以殺生為首戒儒以好生為大德成湯解綱子産畜魚凡全吾惻隱而已充惻隱之心仁不可勝用引伸觸類便是大慈大悲人心佛心有二心哉人心不異佛心則娑婆不異極樂誰謂劫濁不可轉也欲即人心證佛心轉劫濁成淨土術莫妙於放生放生一法唯擴與久一杯水不救車薪火設人各一杯焉一杯不已再一杯焉杯水多車火未有不滅者今殺運紛紛並同分惡業招感非慈三昧水孰能熄之非知宣尼心學瞿曇心法者孰能行之濟生菴放生社絶而復續續之者皆儒門高足也誠以弘毅接忠恕之傳使此社由擴而久則經天緯地旋乾轉坤事業盡在其中苟不負此社斯不負孔門道脈靈山付囑究竟為不負本有惻隱之心矣刻重訂諸經日誦自序佛世比丘或習禪坐或行頭陀或事梵唄或專說法趨涅槃道初無定轍然皆遵佛明誨未有妄率己意者也法流東土始亦如是自馬祖建叢林百丈立清規世相沿襲遂各出私見妄增條章如藏中百丈清規一書及流通諸經日誦三冊杜撰穿鑿不一而足寧惟罔知正修行路秖早晚課誦一事參差失款惟事唱讚鼓鈸大可歎矣雲棲和尚較刻定本古杭諸處多分遵行而留都積弊分毫未革邇與幽棲學侶力正其訛重謀付梓再刪繁蕪獨存切要并於律藏取警策身心有益初學者略補一二以公同志願高明者守禪觀之清雅庶可隨文入證莫羡瑜伽音響也悲華經序大悲釋尊能為難事較十方三世佛遍稱勇猛而悲華一經敘述尤詳此經亦名大乘大悲芬陀利經謂攝取淨土菩薩如餘華唯大悲苦行菩薩如芬陀利華也然釋尊成佛剎海微塵數劫為衆生故於恆沙劫前示作寶海大臣其長子成佛名寶藏既勸輪王千子及諸小王供佛發心各取淨土後獨發悲誓願取穢土嗚呼我輩垢重障深久為十方佛所擯棄聚此五濁世閒自非釋尊徹底大悲何由得聞出世法要當知今日四衆弟子無非昔日飲大悲血食大悲肉受用大悲頭目髓腦及餘身分者也釋尊捨無量血肉身分令我輩成菩提種我輩猶復不思報恩尚可為人乎經云菩薩有四法懈怠一願取淨世界二願於淨衆作佛事三願成佛不說聲聞辟支法四願成佛壽命無量有四種精進一願取不淨世界二不淨人中作佛事三成佛說三乘法四成佛得中壽此經宗要概不出此然懈怠菩薩如恆河沙而精進菩薩迄今不滿十人故釋尊雖自取穢土仍勸穢土衆生求生極樂苦口叮嚀不一而足吾輩信大悲語即同大悲心生極樂已方可速入不淨世界於不淨人中說種種法數示生滅為第一精進菩薩吳興唐宜之甫讀是經不禁感泣山東耿暗然適聞是經便誓流通此皆釋尊真實眷屬一切人中芬陀利華也此經久行世閒五濁不難度盡深心隨喜為之序成唯識論遺音合響序至矣哉成唯識之為教也破遍計我法情見頓空顯依圓真俗妙諦斯立故以唯識二字命題五觀已全彰矣天親為頌護法等為論三十行不為少一百卷不為多實觀心要訣大乘初門也奘師糅成十卷授基師基疏失傳遂成絶響有紹覺承師具無師智聞而知之述為音義八卷一簣功虧忽爾西邁於是及門高士各出手眼如辨音基師之疏靈源惠師之自考録亦既各竭精思殫才力然皆升堂有餘入室未足故使學斯宗者無由詣極惟新伊真師紹師嫡胤執侍最久聞熏獨深遂能繼志述事博學詳說依開蒙為指南搜宗鏡大鈔為證據溯源於瑜伽顯揚諸論而成遺音合響力陳五觀詳示三支蓋參訂二十餘年稿三易矣余壬午夏獲染指先嘗雖未卒業即竊請於師曰梓成願贅片言勸發今時逾五載地隔千里余亦恐大法之就湮也勉述觀心法要而新師刻且垂成忽移柬以徵夙願誼不容辭不揣為序後世學人苟能因余之明白簡易以入門然後觀師之集大成者以盡奧欲不謂之金聲玉振得乎孟景沂重刻醫貫序大醫王有言曰一切凡夫妄認四大為自身相六塵緣影為自心相故有生老病苦夫妄認四大為身四大本非身明矣妄認緣影為心緣影亦非心明矣緣影尚不名心況肉團乎然大佛頂云汝身汝心皆是妙明真精妙心中所現物則四大緣影何莫非心之相分也哉周濂溪曰無極而太極又曰太極本無極太極者心為萬法本原之謂無極者覓心了不可得之謂耳惟心不可得四大緣影亦不可得四大緣影不可得病亦不可得至病不可得殆無所用其醫矣降此有心則有身有身則有病有病必賴醫藥故佛制四事供養醫藥居一又以無醫藥及服非藥者為九橫中第一橫甚矣醫之有關身心性命也顧人之受病也不由身外四大由身內四大不由心內有形四大由身內無形之四大又不由無形四大而由非有形非無形之心心也者覓之了不可得而非無具造天地萬物而非有者也非靜非動能動能靜一念動為無形之風大為天天者積動所成也象為乾一念靜為無形之金名地大地者積靜所成也象為坤乾坤立動摩於靜為無形之火火者天之用而水之根也象為離在天為日火蒸於金為無形之水水者地之用而火之配也象為坎在天為月無形水火相遘有形水火斯立水火立而五行備於是有心肝脾肺腎名為五官與五星五嶽列為三才皆妄心所現之相分也是故治於有形不若治於無形治無形不若治於動靜之原此出世大醫王之至論然調理無形四大為拔苦與樂之增上外緣良以後天成質不可復調故必調無形水火以順天地之用以扶五行之本此趙養葵醫貫一書為得其樞要馴致之耆婆可階進求之藥王圓通可證申而極之能仁之大醫王亦可成矣景沂孟居士得醫貫聞知之傳悟人致病皆本勞心獨以扶植無形水火為要務不似庸流逐末迷本余多病名醫鮮應手愈者獨景沂每投一劑隨即霍然又復篤信佛理好道而進乎技更較梓是書嘉惠後學其益天下後世多矣特此以助其傳淨信堂續集自序壬午從閩至吳興奉三寶命志在傳一隙之明也艱阻沓出捨鐵佛而遊欈李之天寧捨天寧而居鄣南之靈峰歷普德濟生而結社於牛首之幽棲虛名日盛志終不行已矣乎佛祖心印將安寄乎古人云三折肱而知醫閲人多而曉相豫肱之折不止三矣啖我以名者不能責我以實吾將為名乎恕己而尤人不如反躬而自悔悔雖遲猶愈於不悔者乎故從壬午夏迄丁亥冬結為淨信堂續集因未完閲藏著述之願姑未戒筆云
