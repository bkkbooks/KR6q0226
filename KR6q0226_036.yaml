body:
  text: 詩偈二山居六十二偈有序抱病入山了大事不暇暇哦乎然有不容默者不向哦中來儻得意忘言未必非大事之一助也一自芒鞋破從教萬慮慵短衫堪度夏敝襖復經冬坐起餘長嘯談時僅短鋒晨昏伴幽寂崖上幾聲鐘一病五百日形神並已枯緇素偶相值稱我為禪臞禪臞竟何解佛法從來無倦眠醒便起笑此空頭顱我愛山中行安步不須馬有時訪怪石有時趨樹下本無取境心何勞更修捨嗤彼世塗中鑽龜復打瓦我愛山中住觀化俯且仰一法不當情萬緣同鏡像才言獨露身無端已成兩笑破太虛空巖谷爭酬響我愛山中坐一日兩日永頂雖鵲未巢樹亦枝無影既不耐喧譁亦不味幽靜形疲便起行枯椿變浮梗我愛山中臥易寐還易醒醒寐惟幻形誰實司肯綮諦觀五陰身非別亦非並不知何所緣猶然不自肯淵明嗜杯酒不與蓮華盟折腰既弗屑麴糱胡偏酲欲深天機淺格言羡莊生性學豈多術無如理勝情壯士血氣盛國步誇邯鄲殺人不敢睨一語盟肺肝義勇洵絶世仁慈體乃刓圖窮露匕首髑髏千古寒玉兔甫西逝金烏復東升少壯日已去衰病時時增寐者終不覺智者思自懲但使冰成水無令水結冰狐兔營其窟烏鵲爭其巢孰知咸在旅生死均浮泡茫茫苦海闊欲渡須繫匏莫使荒郊骨還令梵志敲賤人登壟斷巢許趨高岡清濁固霄壤取捨同膏肓不知三界夢剜肉強作瘡一念悟無性十虛任徜徉水氣每成虹地蒸每作菌介爾本無形剎那已有朕慎獨雖兢兢豈達無生忍一翳甫在睛空華斯亂隕盛暑喜乘風嚴寒愛向火情性屢隨時究竟誰為我未出有無關空勞此靜坐莽蒼三返人撫腹猶稱果風來萬壑鳴月出千山皎笑此頑虛空常為明動擾不動復是誰豈居風月表離此既雙非問君了不了胡弗畏深坑徒憂打之繞驀直轉欹斜空爭內外紹荊璞未應剖卞和徒自泣雷鳴二月春蠕動皆離蟄屈伸信有時何用勞汲汲築碎太虛空從古原無汁畫餅不充饑美食不中飽欲縛樹頭風勤取龜毛絞弄假豈成真賣拙翻為巧俱盧日落山瞻部雞鳴卯聖訓恆諄諄令觀五盛蘊陽焰與空華無我誰欣忿生死靡暫停幻質同朝槿了知呼吸關至道斯云近禦寒不䌟績糊口不耕田佛制固如此誰思共息肩神王翻貝葉形疲且穩眠何須學枯木失此無心禪有嘲不用解有山不用買泉流月影長霧壓空形矮起臥任所適語默隨瀟灑拽杖登巖阿野鹿馴無駭律法如亂絲禪宗更莽鹵紛紛義學家猶然水添乳悠悠淨土門事理分捨取各披祖父甲翻傲負嵎虎哀哉復哀哉坐致魔軍侮枝葉秋已摧貞實冬無敗所以真僞關終莫逃爐鞴欲使稻粱肥殷勤先去稗折攝似分塗同歸調伏戒人侮非自侮自侮非侮人不受禮歸主妙喻真且親修羅慢幢折帝釋勝幡新忍為力中最勝敵寧揚塵調心如大地寵辱何關意美玉良自珍角石翻成瘁遐哉睡虎機千古稱難企忍記歌利王鹿苑成善逝言居佛祖先行落凡愚後漫抱法門憂自疾甘無救恥躬愧儒宗歸爨慚禦寇莫誇日正長瞬息聞更漏揠苗徒自損溝澮盈還涸九仞不及泉枉向高原鑿慎終亦謀始所厚那堪薄醍醐願共餐善巧先鑽酪三十未始壯四十今已老徒爾費芒鞋依然不聞道既懲從井仁豈學手援嫂見彈求梟炙嗟哉計太早壁影本非魑孩童疑作鬼白日忽升天見徹無頭尾秋深饒月華春到多芳卉根境未離籓受用能有幾牛犢不畏虎傷鳥怖虛弓安畏雖異局對境皆懵懵何如見諦士了了知無忡遊戲逆順界寧尸勝敵功鵲噪固無憂鴉鳴亦報喜聲性本非殊聞機寧異耳一耳聽兩音兩忘一便止無明從此無始覺從此始咸臨吉乃利倚伏洵多義甫倡拔茅歌旋生朋作祟世事固應然調心尤不易難提起四禪魔女偏相魅居德忌成夬育德貴如蒙大道曠無際何以耳似充出關驚枕夢入場嗤老翁熟讀霍光傳方知養正功逐妄又尋真揚灰復鼓塵未悟賓中主安知主裏賓美食飽所棄糟糠饑所珍滔滔天下士沮溺同迷津希顏復學孔未出三界籠步老復趨莊依然舊漆桶太極未生形自心早妄動石火電光機何勞誇一統既慚德不修又愧學不講德學本同條誰能作兩項紫陽與象山各喫三十棒識取宣尼宗方來證溝港童冠沂水遊三子異其撰一哂一喟然黑豆換卻眼央掘發誠言胎難安然産讀至不動章大慧顏當赧前際不可窮後際不可及現前介爾心邊際渺難測明明法界宗妙觀胡墨墨奮起金剛拳打破無生國欲雪先集霰欲雷先掣電如何欲成佛福慧毫無片流小石能穿鑽息火難現須教熟處生擐甲同鏖戰星火燎荒原一指蔽山嶽周易誡履霜宣尼貴先覺未窮學地流慎勿誇無學泥在水非純稍動還成濁濁水珠可清暗室燈能破惟有靛池公獅吼終驚臥跨下亦登壇大將非從貨悅草披虎皮徒令千古唾狡狐能惑虎木鷂難怖禽可欺不可罔神全乃莫侵面南看北斗端的誰知音曾經勝熱焰徹骨涼且愔崑崙非宿海宿海非阿耨滔滔萬里流一滴源誰透漫傳天上來錯認銀河胄賴此投海機從前皆免究六塵本太平六根亦非嬈問取六識身蹤跡尤杳杳誰為結使源細覓終難了試看瓶內空傾出知多少色色彰苦空聲聲演無我拈來法界鑰開盡塵沙鎖睹角便知牛望煙豈惑火若要船頭直端卻船梢舵鯤潛知海闊鵬徙知天高十虛信寥廓何如遍吉毛縱步歷塵劫徒令童子勞迷此一隙理今古同滔滔金屑不著眼毒器不貯漿王饌未敢食華屋徒窺牆垢盡明自現胡勞羡色莊春風一夜起蘭蕊遍溪香芒鞋棄屋後鉢袋挂茅菴非敢濫無學坐訪同行參石蜜味中最食乃知其甘見月良賴指寧復撈深潭語不競朝華病應消夙業獨愧衰朽身難企尊者脅法無心外傳道自威音劫明明梵網燈未審誰先接直指西來意楞伽心可安說言同解脫內守偏蹣跚休戀聲前句還思步外竿不嘗天下醋那信一般酸學士畏枯寂禪德怖繁文繁文信無益枯寂亦添瘽蛇繩見方熾取捨徒紛紜捉鼻謾高喚燈照知非豶未明心與性讀誦徒喃喃甫欲思上達暗證還自緘不解順流棹豈知逆風帆呷盡四海水到頭滋味鹹競為格外鋒罔念昔時典因護乃至吠堪嗟梵志犬財慳尚可回法執誰能遣五百野狐身覆轍偏爭踐佛語即佛心佛心非佛語離此即非關究竟誰為汝一句了然超萬劫合頭杵若要舌本甜勤取黃連茹心肝挂樹杪此理從來少離教覓單傳癡鱉何時了妙指發妙音非內亦非表側耳不會心依然打之繞觀箭毒逾熾問橋路逾遲路遲日易暮毒熾那堪醫有藥不早服有足不早馳茫茫生滅海誰與定歸期毒蛇勿捉尾甘露勿添水添水飲成病捉尾螫人死執項善調御功歸豢龍氏悟時轉法華良哉惠能旨聽法不觀心死至成狼狽觀心不聽法執刀還自害未知說默源同條卻異會鼻孔向下垂空讚威音外長語悟非多雪填井便無要言迷不少小毒還生愈何勞妄欣厭共把真宗誣早修開演智莫畫舊葫蘆執藥每成病借病翻成藥通塞靡定蹤觸境須深度知人勿昭昭自照無莫莫一言燭根元千山勝行腳聚螢不爇草聚雪不成山鑽紙信無益枯坐終癡頑未歷羊腸險安知行路難千里始初步休商最後關洪鐘叩乃鳴美玉終須琢不覓惡鉗錘豈破無明㲉護茲煩惱情忍使靈光剝幽幽長夜寒熟睡誰能覺烏焉忽成馬展轉無非錯佛滅曾幾時哀哉水潦鶴矧茲最後年何地尋略彴斯文賴未亡共聽能儒鐸日輪挽作鏡海水挹作盆照我忠義膽浴我法臣魂九死心不悔塵劫願猶存為檄虛空界何人共此䑳遣病歌九華峰頭雲霧濃三月四月如隆冬厚擁敝袍供高臥暖氣遠遁來無從九華山中泉味逸百滾千沸中邊蜜拾取松毬鎮日煨權作參苓療我疾我疾堪嗟療偏難阿難隔日我三日豈向旦暮戀空華悲我知門未詣室是以持名日孜孜擬開同體妙三慈我病治時生界治剎那非速劫非遲病餘寫懷四絶一條拄杖兩芒鞋海闊天空任往來愛見慈悲終作疾婆和學侶謾為儕宗庭獨力除荒草教律誰能共執柯雨露重時恩念少鉗錘辣處怨情多勝心雖發足凡情十載依稀舊路行莫笑巴人猶少和引商刻羽欲誰賡大小由來出路岐無端埋沒好男兒三年嘗膽嗤非久須學華嚴塵劫思禮千佛於九華藏樓贈諸友五偈非干苦瓠換甜瓜處處慈尊並我家念性枉勞參水月低頭已駕白牛車堆山積嶽盡塵埃力把慈風一夕摧吹散鐵圍無暗地何須拭目問明來昔年窠臼剎那掀臘盡春回日已暄欲信崑崙泉脈動但看河凍不勝轅靈犀一點性元通觸境逢渠道自融驀地舉時聲歷歷相看同在寶樓中一體橫分想與情泠然性計即無生功成五悔非留惑莫替樓頭最後盟贈頂瞿師掩關念佛阿彌陀佛聲歷歷自他共離不可覓是心作佛是心是熾然感應真空寂驀直歸來莫問津無明睡裏轟霹靂醒來捫枕笑呵呵夢墮大河誰實溺夢時非墮醒非超一任凱風同奏績髻珠解處紹功成內外空爭庶與嫡無生曲裏明月寒白牛背上吹橫笛因拄杖折聯成舊句縱橫北斗向南看回首家鄉月影寒拄杖折時手眼瞥芒鞋破處足心酸不勞藏跡針鋒裏偏解拋毬急水灘鸞嘯忽傳林谷響石人撫掌白雲端夢感正法衰替痛哭而醒寫懷二偈魔軍邪幟三洲遍孽子孤忠一線微夢斷金河情未盡醒來餘淚尚沾衣休言三界盡生盲珠繫貧衣性自明肯放眼前間活計便堪劫外獨稱英道過齊雲問訊真武煙霞賸癖此中分遙望名巒勢欲棼柱杖石屏占瑞氣袈裟金鼎挹香芬千尋曲澗鳴流水萬朵青山綴白雲豫亦佛門為外護何妨破格友真君四十初度物論悠悠理本齊年來漸覺脫筌蹄拳開非實掌元在翳去惟空眼不迷流水有心終匯海落花無語亦成溪剎那生處生何性卻笑威音劫外提寄懷未能文字離微影不留玄機欲倡孰相酬因憐屢中神猶隔翻憶如愚益可收九子峰頭標月指千如鏡裏辨金鋀靈犀通處知無朕莫負持明助遠猷別玄覽松嶺雨歇溼未收怯露寒蟬聲如抽同住九旬忽云別不語孤懷偏悠悠智士從大不從小愚夫近慮無遠憂愛惜皮囊捐荒丘虛名赫奕奚可留何如曠覽寰區表闊步高登遵玄猷吹醒循階夢先參慈氏樓君不見翠柏霜殘青未已瀼瀼蔓野今如燬贈黃可念蟠結筍江溫陵西溪滿潮流渚滿荑遠駕浮梁如虹霓悠然彼岸長者居長者當年給孤後於今欲作龍舒胄萬善匯歸無別路熾然取捨惟心土塵培泰嶽巔芻蕘為君傳片念圓三聚同擇紫金蓮君不見筍江月色白如練桂吐秋隄興倍仙示持經沙彌五濁朦朧夜未央一聲雞喚漏偏長但將緣種催殘夢字字全彰佛頂光遊北山嶙峋病骨愧知音強倩籃輿學眺臨怪石藏雲疑豹變短松入暮解龍吟泉南風景全歸鏡海外煙波半滌襟啼罷鷓鴣懸鼓落滿天星斗燦江岑巢雲驀入巢雲不見雲泉聲流斷海南塵卻疑春信從何至已睹巖花滿目新和答陳鶴岑名傳佛國元非浪笑我昂藏北地來無法可令除妄想有心堪共結蓮胎宗風秖許龐公覷教眼聊憑博地猜拈出大千漚影喻不須重說勒銘才慰陳弘袞君不見出世大丈夫劫成劫壞等吸呼又不見世閒奇男子功名富貴浮雲耳陋巷天地寬敝縕得身安多少風塵客方知行路難莘可耕渭可釣卻憐學步邯鄲少後凋莫鬥早春芳空令松柏悲同調曾懷竺典猷業果解應優一翳勞雙目空華舞未休誦帚師五十初度泉南開士八十一蹡蹡濟濟稱紫雲日月光華歷二百石塔瑞氣長氤氳中有比丘號誦帚心慈貌古能超群杖藜點盡千江月芒鞋不帶五嶺垠問君七夕何遲轍庸人乞巧我愛拙問君自恣何早生世尊將喜我先悅伯玉知非又日新武公誦抑於今烈甘露壇中味正奢清心潔己舊名家但看尊者當年脅豈羡趙州住後茶挽如是師昨夢東南隕氣星傷心慘目還驚神朝來合掌送師逝翻悲此土仍迷津正法僅如線肩踵多魔民律苑羊告朔教家偏亡珍直指向上事虛響成邪因悠悠大地競波逐巖巖中流曾幾人師今獨享華敷樂哀哉遺我稱孤臣槐關客夢紛紛盡寄槐半間聊傍緑陰開茶聲催醒南柯業貝葉熏成彼岸胎塵具大千應共剖樹無纖影不須猜朝來讀罷關中草剩有餘光映月臺彌陀巖六人持非時食戒偈以志喜舌端競嗜易牙羹誰信真修貴逆情齊法已成無漏種戒根應傍有心生輪中日晷誠能辨額裏珠光自可呈薦取緣因修勿退化城寶所不關程觀老聃石像有感無欲無名理近禪瞞盰終古浪稱仙猶龍一語能傳實喻月三言反失權片石不愁淫雨蠹兩篇秖恐俗儒箋笑看今日鬚眉白尚是當初舞彩年冬日過虎崆訪衍如首座石徑苔痕古雲端隔市塵泉聲流一線虎口露全身桂發原無隱梅開不借春東風消息近又見樹枝新世道降人心漓野人憫之賦邈矣邈矣太空任彼狂風坦矣君子愍彼頑蒙狂風吹兮空匪虧兮頑蒙危兮君子綏兮草之菁菁雷聿鳴之水之英英雨聿榮之謂雨何苦謂雷何怒不尸厥恩不嬰厥侮大塊之立誰與成之大塊之毀誰與爭之渺渺一粟人競營之彈指斯往達士平之買山買山陟彼維艱曠云萬里依然在寰卷葉黈纊蒲萄懸旒君子有憂君子有休偶成指端翻覆為雲雨世人抱負輕如羽謀臣戰士日紛紛朝欲之秦暮欲楚百萬長城血未乾始皇骸骨歸荒墅喪家之狗悲絶糧依稀馬麥聊堪償所以顏陋融復懶明詔宣時芋正香道人有語止如此取譬空疑端木氏欲識媯姚兩病翁問取巢居沛澤雙豎子壽月堂輝山首座殿閣薰風涼意多緑槐亙古影婆娑犍椎自昔聲如吼上座於今眉似珂趙老芒鞋猶未止脅尊禪誦已成科分明倡出南山曲惹動西池六鳥歌贈莊聖西彌陀即是毗盧師極樂即是華藏界八萬四千相好中一一具足剎塵相西方一一微塵中具足世界差別種是故普賢大願王究竟導歸安養土同居淨故四俱淨橫超自在甚希有若人深信淨土門始是深信法界理若人已悟法界理方肯熾然求往生法界非往非不往順悉檀故名為往法界非生非不生順悉檀故名為生如是往生即向上圓頓了義無倫匹
