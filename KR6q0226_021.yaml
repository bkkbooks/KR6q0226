body:
  text: 序二梵網合注自序大哉梵網經心地品之為教也指點真性淵源確示妙修終始戒與乘並急頓與漸同收約本跡橫豎俱開兼華嚴法華之奧旨約觀行事理俱備攬五時八教之大綱文雖僅傳一品義實統貫全經緬惟智者大師之時人根尚利既廣宣教觀法門乃僅疏下卷戒法大師精諳律宗文約義廣點示當年之明律者則易開悟今時之昧律者則難千有餘年久成祕典雲棲為之發隱於疏仍多闕疑又下卷雖獲流通上卷猶未開闡嗚呼四依大士於法豈有吝心衆生緣薄罕遘希有法門耳智旭幼崇理學千古為任但恨障深慧劣執東魯而謗西乾後聞自知録序并良知寂感之談始發信心嗣聞地藏本願聽大佛頂猛圖出世矢志參禪逃家行腳雖數發悟解剋證無期賴有慚愧正因不敢錯下承當生增上慢以蹈邇來大妄語之覆轍爰念宿因力薄應兼戒兼教以自熏修於是探法華玄義摩訶止觀等書私淑台家教觀而毗尼一藏細閲三番梵網一經奉為日課遂於發隱闕疑渙然冰釋即上卷文古義幽昔稱不能句讀者妙旨泠然現前因擬合注補前人之缺此志雖發緣障多端六七年來悠悠未遂客歲大病方遁入山適如是昉公從閩來尋為其先師請講此經同志歡喜由是力疾敷演不覺心華開發義泉沸湧急秉筆而隨記之共玄義一卷合注七卷注成序本末以告來哲蓋夙有微因今復久誦半生淹洽不無千慮一得故於理觀事相不惜一一指陳誠可勷開解篤行者之半臂也後之覽者勿以繁瑣而厭忽之俟解行雙圓歸諸筏喻可耳讚禮地藏菩薩懺願儀後自序大法久湮人多謬解執大謗小舉世皆然然地獄衆苦已隨其後瘖啞餘報復更難窮故地藏慈尊大集會中現聲聞相世尊廣歎勝德且較云假於彌勒妙吉祥觀自在普賢殑伽沙等大菩薩所百劫至心歸依稱念禮供求諸所願不如一食頃歸依稱念禮供地藏菩薩以久修堅固大願大悲勇猛精進過諸菩薩故也蓋末世駕言大乘甚易躬行僧行實難寧知廢小談大并大亦非悟大用小即小本勝故法華誡弘經者必依四安樂行涅槃極談常住佛性尤扶戒律大士功德獨盛得非亦在此乎智旭深憾夙生惡習少年力詆三寶造無閒罪賴善根未殞得聞本願尊經知出世大孝乃轉邪見而生正信仍以謗法餘業辛勤修證不登法忍每展讀大士三經輒不禁涕泗橫流悲昔日之無知感大士之拯拔也因念濁智流轉之日同此過者不少敬宗十輪并本願占察二典述此儀法庶幾共滌先愆剋求後果不終為無依行乎未登無生正位皆可修之無論初心久學也安居止觀山房序豫商大佛頂經至五卷云佛法從因緣生非取世閒和合粗相頓悟法華佛法從緣之旨二經妙指何巧出一轍也智者證法華三昧攬本跡十妙圓歸介爾一心示摩訶止觀法門與今經妙奢摩他三摩禪那若合符節後箋斯典者無慮數十百家捨摩訶止觀別立宗塗轉趨轉遠良以摩訶止觀的是如來大事因緣非世閒和合粗相請言之性覺妙明本覺明妙寂而常照照而常寂非止觀不二之真源乎迷此真源寂體成昏照體成散是不變之性隨染緣而成九界悟此昏散散既本寂昏亦本照是不變之性隨淨緣而成佛界雖成佛界真源不增雖成九界真源無減是隨緣之理歷染淨而終不變夫隨緣即不變大事之因也不變即隨緣大事之緣也故曰如來發明世出世法知其本因隨所緣出知其義者方知心佛衆生三無差別亦知六而常即修非性外即而常六性不廢修修非性外不墮因緣性不廢修不墮自然世有徒聞止觀之名者妄謂但屬修成豈識性修不二真趣邪豫出家行腳取益無方於此經不曾掛一字腳不曾離卻一字後讀台教每引占察經占察示一實境則一大事因示二種觀則一大事緣愈信如來密因菩薩萬行一門超出無二無三誠不我欺每拈此義點示未聞隨其根性各獲法喜噫儻吾與諸友不同具此因則法性了不相關不久種此緣則說聽豈能投契智者遙禮此經十八年不獲見後百餘年般剌密諦剖膊傳來二大士苦心豈為行墨者添葛藤哉必教觀齊彰因指見月由斯典而通止觀由止觀而徹信吾言不誣則今九旬結夏真塵劫緣因矣更拈一頌以裨妙觀頌曰未歇狂心頭亦在已瞻華屋戶寧窮密因徹悟無生滅萬行方知究竟同絶餘編自序生平行履百無一長獨大菩提心忘身為法捨己從人則堪質三世慈尊者也自庚午至甲戌五年中幾經困衡無退逮乙亥仲秋志終不伸丙子春乃遁塗中大病逗遛九華哀禱地藏本師仍得閲藏著述之決嗟乎文字性空性空即是實相實相離一切相即一切法豈離文字而解脫哉昔棄筆硯絶而不絶今也不絶而絶矣姑名絶餘勸持大佛頂經序三因性德絶待遍常悟性成修名為圓通現在惑業苦三便是教行理經正體而迷強者日用不知故依實相而垂文字依文字而資觀照觀照文字皆實相也實相觀照皆文字也文字實相皆觀照也當體實相當體文字當體觀照實相常文字觀照亦常實相遍文字觀照亦遍實相覺文字觀照亦覺實相尊文字觀照亦尊實相不可見文字觀照亦不可見實相不可無文字觀照亦不可無嗚呼已悟實相者容可不藉文字未達實相者寧容不勤觀照哉已深觀照者知無實相外之文字未精觀照者安知文字中之實相哉然雖不知文字之實相而實相未嘗不即文字也大佛頂經智者大師拜之以畢身般剌尊者傳之以剖膊非以實相觀照均藉文字為緣邪或曰聖人與其不可傳者往矣所傳者糟粕耳則未達實相觀照文字互即互遍之旨者也昔算師以訣授子子誦不能用有人從學句讀算與父勒謂訣有巧乎何子誦弗知謂訣無巧乎何人學能算且無子之誦之人又烏從學之吾固不願人厥子若也然若厥子猶勝於不誦者也況法力不可思議佛力不可思議性覺之力不可思議不思議熏不思議變其為成佛真因豈算訣所能喻哉勸持梵網心地品夫有心者皆得作佛則皆為佛戒所攝既為佛戒所攝胡容不誦此戒法此戒法名為心地品者心外無法法外更無心也故又云不受戒者如木石無心名為外道噫可思矣今人高談心性妄謂戒不必受逮肯受者又茫不知心性為何物一義甫晦兩病旋生狂談之心固非真心愚稟之戒亦豈真戒但事能挾理戒善猶可遠作緣因理不孤立空談適為邪見張本所以涅槃後唱扶律為宗梵網初成木叉先結心地一品尤末劫津梁昏衢寶炬哉豫憫了因果沙彌福慧俱缺勵以日課斯品稍沾法喜思勸同仁經云菩薩常應化一切發菩提心若不發教化衆生心者犯輕垢罪果也勉之堅其神強其志恆其操篤其行盡大地有情咸歸心地法門莫以三千為畢竟也化持大佛頂神咒序摩訶悉怛多般怛囉無上神咒既入支那習為日課此方大乘緣種可謂強矣但積訛相傳有稱悉怛多般怛囉六字為咒心者有謂此是咒名別取哆姪他以下數句為咒心者杜撰無據抗佛慈旨均可痛也經極談咒心功德而謂昏未能誦者當書供禪堂或帶身上初不聞以數句為咒心也儻僅數句何至心昏不憶以書寫供佩為佛事邪蓋十卷明文顯示如來藏心五會神咒密詮如來藏心顯密雖殊心性理一全心成咒全咒傳心故名心咒亦名咒心耳解天禪人廣勸真信力行之士或全持或全寫以自供佩及轉施人期借神力顯發自心一振末世之訛同登灌頂之記阿難為衆重請如來放光重說護法述願請加金剛藏王曠劫隨逐收功皆在此矣周易禪解自序蕅益子結冬月臺禪誦之餘持韋編而箋之或問曰子所解是易邪余曰然復有視而問曰子解非易邪余曰然又有視而問曰子解亦易亦非易邪余曰然更有視而問曰子解非易非非易邪余曰然侍者笑曰若是乎墮在四句中也余曰汝不聞四句皆不可說有因緣故皆可說乎因緣者四悉檀也人謂我釋子也通儒能解易則歡喜焉故謂易者吾然之世界悉檀也或謂釋子何解易以同俗儒知所解之非易則善心生焉故謂非易者吾然之為人悉檀也或謂儒釋殆無分也若知易與非易必有差別雖異而同雖同而異則儱侗之病不得作焉故謂亦易亦非易者吾然之對治悉檀也或謂儒釋必有實法也若知非易則儒非定儒知非非易則釋非定釋但有名字而無實性頓見不思議理焉故謂非易非非易者吾然之第一義悉檀也侍者曰不然若所解是易人謂易可助出世法成增益謗若非易人謂師自說禪何嘗知易成減損謗若亦易亦非易人謂儒原非禪禪亦非儒成相違謗若非易非非易人謂儒不成儒禪不成禪成戲論謗烏見其為四悉檀也余曰是固然汝不聞人參善補而氣補者服之立斃乎大黃最損而中滿者服之立瘥乎天之育萬物也物固有遇春而爛者夏之長養庶品也草亦有夏枯者秋之肅殺也而菊有花冬之閉藏也而松柏青梅英馥如必擇有利無害者而後為之天地不能無憾矣且佛以慈眼視大千群機已熟然後示生猶有魔波旬亂之九十五種妒之提婆達多思中害之豈惟堯舜稱猶病哉吾所由解易者無他以禪入儒誘儒知禪耳縱不得四益起四謗如從地倒還從地起置毒乳中轉至醍醐厥毒仍在遍行為外道師薩遮為尼犍主意在斯也侍者再拜謝曰此非弟子所及也請筆而存之大佛頂經玄文後自序至矣哉大佛頂經之為教也依妙性而開妙悟起妙行而歷妙位成妙果而歸妙性永超七趣沈淪不墮修心歧徑戒乘俱急頓漸兩融顯密互資事理不二誠教海司南宗乘正眼也旭年二十三歲在辛酉創獲聞熏決志離俗次年剃染坐禪雙徑每遇靜中諸境罔不藉此金錍乙丑丙寅兩夏為二三友人逼演二遍實多會心願事闡發以志在宗乘未暇筆述己巳春與博山無異師伯盤桓百日深痛末世禪病方一意研窮教眼用補其偏雖遍閲大藏而會歸處不出梵網佛頂二經越七年丙子抱病竄居九華次年有同志數人樂聞此經要旨一番商究會心更多戊寅結夏新安重拈妙義加倍精明今夏弘法溫陵誦帚昉師及一切知己堅請疏解發前人未發豫謂此經舊解多矣多指益復眩眼耳昉曰不然藥無貴賤起病者良法無精粗救時為要痛茲末世宗教分河盡謂別傳實在教外孰知教內自有真傳縱令截去指頭依舊不曾見月每聆吾師豎義痛快直截實與本分宗旨相應並不蹈襲前人窠臼始信不離文字而說解脫非欺我也何忍祕此妙悟不以全體示人吾師於法有慳心乎於時復有修白慕公若水輪公極力勸成豫感其意兼理夙願述為玄義二卷文句十卷固不敢矯古人而立異亦不敢殉古人而強同知我罪我聽諸高明而已悅初開士千人放生社序豫幼崇理學知天地之大德曰生惻隱為仁之端翻疑釋氏侈談無生不近人情稍長見儒者雖言民胞物與及其恣口肥甘則競託遠庖廚為仁術曾不能思刀砧號叫之苦也雖不忍一念必不可滅然為貪忍異說所蔽終不能伸而放生嘉會每創自釋子且推歷劫親緣視以同體四大究極以皆有佛性其為好生懿德必使大地含靈盡證無生而後已噫嘻由此言之非達無生曷能好生非真好生曷證無生也哉從此不顧名教飄然剃髮蓋誠有見於出世大慈大悲方是大忠大孝大仁大智故不肯以夜郎自封也悅初開士誓勸千人放生同修慈心三昧豫謂此三昧當使剎塵共證何止千人千人云者且就凡夫現前分量所及而已千數既畢頂禮千佛俾六道悲仰與諸佛慈力果徹因該供養千僧俾悟事理和融生佛不二好生無生若事若理皆已豎窮橫遍矣贈衍如兄序嘗慨末世士機械日深去道日遠名相之心日以重取益之方日以微求忘機械略名相熙怡自得不為習俗所染者衍如琳公其庶幾乎公鄣南名族顏氏子剃染於虎硿遂舉千古垂廢之道場而鼎新之住持十五載百務俱備乃發足操方初至武林參似空金臺諸法主次至吳中晤漢月頂目等諸禪德稟沙彌戒次達留都詣古林菴圓戒理歸裝邂逅雪關誾公登黃蘗山謁隱元琦公最後乃師事聞谷老宿定法名習禪坐重證戒品而掛錫開元之甘露戒壇適余至公大慶為余率衆解制余到岱山公先往俟講事完力拂虎硿仙亭諸子之請仍與豫岱山結夏每觀世人稍營一窟便欲作久安計今虎硿仙亭皆表表名剎公飄然不以繫心豈無所見而然哉然遊戲解脫蕭然物外僅可自利未可利人且公廣參知識以聞谷老宿為宗又憾晤余之晚余無似姑置公試思今時學人罔不未得言得未證言證而聞老偏把定要津坐斷狂禪舌頭故智者有言曰真寂之於雲棲譬有若之於孔子也公何不紹其芳規兼律兼教以念佛求生淨土為指歸設有宗門種草不妨令其苦參實究但痛戒其捕影掠虛漳南佛國深望公一振其頽寧直作散聖家風圖無事纍心而已贈純如兄序衆祐有言曰善知識者得道大因緣是全梵行夫隨其所修一種法門自利成就足範後昆者教授善知識也辦真實出世心修三乘出世法所志無乖所見無戾者同行善知識也善護三業克供四事俾行人得安心辦道者外護善知識也豫自壬戌出家於今十九年矣學無常師交無常友根鈍力微每藉境緣自鍊見善思企而罔及見惡內省而多慚於三種善知識中惟教授最多蓋三人行必有我師況世出世法各有所長者乎又況久相結契如曹源之勤學雪航之婆心惺谷兄之辣手誦帚師之篤信歸一師之孤峭修雅師之恬退者乎又況會事參謁如無異師之慈悲廣大聞谷師之謹嚴縝靜無盡師之弘揚教觀者乎又況湛明師引進雪嶺師剃度戒宗師授沙彌戒古德師授菩薩戒乃至憨大師之書問慰誘夢寐神交頻相策發者乎若同行善知識生平止得一人壁如鎬兄是也外護善知識於松陵得一人曰鑒空寧公於吳門得一人曰竺璠淨公今丹霞得一人曰純如白公寧公之護豫默關也身為侍者不令緇素一人輒來擾豫淨公之護豫結壇也百一所需無不畢具然猶曰孑爾微軀主道尚易易耳今同志數人結夏岱山相與專辦己躬下事二時課誦亦不應酬令我同志無不優遊坐進斯道較前二公已為大難且淨公僻在密滲之禪寧公雖趨向持戒力所贍者不過營福一塗公則尊賢容衆雅量沖懷已足補吾所短而虛心樂善雅慕佛法尚可慰吾同行之思豈寧淨二公所能及哉昔楊歧直院十年兒孫滿地四明一學人請教觀於法智大師命理常住事三載畢重申前問師震威一喝頓悟性具圓宗實力比丘迦葉佛所願於釋迦佛時知僧臥具第一乘本願力以童子出家祇園見客比丘來去紛雜重發願云我年二十進具戒後當理此事及進具證果念空無相無作三昧此願將息佛以夙願責之遂畢世知僧臥具客比丘來皆親授房舍初更時到放一指光二更時到放二指光乃至五更時到放五指光普為十方大衆諸佛菩薩之所稱歎念念入定放光念念出定慰客所謂善入出住諸禪三昧者也然如此神通作用究竟豈離吾人現前一念故云能觀心性名為上定純公於此驀然薦取則實力四明楊歧鼻孔乃至三世諸佛鼻孔俱可一串穿卻矣刻惺谷禪師筆語序語曰衆惡之必察焉人雖至愚苟顧名圖利亦何肯以一人招衆惡至招衆惡弗恤則別有苦心可知矣吾友惺谷壽師廣參博訪足跡幾半天下凡所住處愛而畏之者十一厭而疑之者十九雖接物失於方便然鐵石心腸真欲自他同躋正覺斷斷乎不可泯也今觀其遺書攻人短不掩人長用己長不諱己短直抒血誠無所避忌亦無所文飾苦口良藥固末世所不能服寧非末世所急當服哉壽師既沒惟誦帚昉師佩其嚴憚切磋之恩舉生平往來手札輯為筆語方欲繡梓昉師復沒高足還一本公力謀剞劂嗟乎以壽師一生苦心惟昉師能知恩報恩以昉師半世勤懇又惟本公為繼志述事然則壽師固藉昉師以不朽昉師亦得本公以終傳也孝順者必食其報詎不信然豫與壽師交最厚互相益處最多而今而後真不可復得矣爰涕泣而序之閩遊集自序自丙子臥病九華無復人世閒想戊寅秋踐吾友帚師之約幻遊閩南擬掩關靜坐耳詎意鼓兩片皮作座主活計邪流浪溫陵霞漳閒幾及四載種種家醜播揚略盡二三同志苦欲災木余惟賦性僻拗不近人情所有言句多觸時諱流通之者殆非愛我者也然業將身命付諸龍天誠復不敢自愛遂辨數語以聽知我罪我於天下後世云
