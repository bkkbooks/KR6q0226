body:
  text: 願文三九華地藏塔前願文丙子三月稽首慈悲大願王本源心地如來藏善安慰説真救世現聲聞相護法者願承本誓度衆生鑒我微忱垂加護智旭夙造深殃丁茲末世雖受戒品輕犯多端雖習禪思粗惑不斷讀誦大乘僅開義解稱念名號未入三摩外睹魔黨縱橫痛心疾首內見煩惱紛動愧地慚天復由惡業備受病苦痛娑婆之弊惡歎沈溺之無端由是扶病入山求哀大士矢菩提於永劫付身命於浮雲臂香六炷三炷供忉利勝會化身無數大集勝會現聲聞相六根聚會善巧説法地藏菩薩摩訶薩一炷悔三業重失生來殺業淫機謗三寶罪口過惡念乃至舊歲染疾後種種不盡如法如是等願盡消除一炷為求四願律儀清淨斷惑證真長康無病廣作福事一炷為決疑網若先禮懺求淨律儀若先習禪斷除煩惑若先閲藏以開慧解若先立行以廣福緣唯願救世真士大智開士一切知見者於諸衆生得不忘念者必垂哀鑒開我迷雲我復於大慈悲父前瀝血銘心作如是願如一衆生未成佛終不先自取泥洹儻夙業因緣牽入惡道願菩薩弘慈常覺悟我使我念念憶菩提心令菩提心相續不斷若夙障稍輕願大士威神令我早成念佛三昧決生阿彌陀佛世界乘本願力無邊剎海化度有情盡未來際無有疲厭十周願文六月初一日稽首釋迦大聖尊十方克盡人倫者真實至孝真實忠真實禮誼真師友所説究竟真實法真實如法修行僧我今哀請垂護持願賜慈悲同作證智旭生逢末世福慧並微蒙二親獨養深恩罔知攸答始則違親教命造謗佛誹法重愆既而稍解真乘棄生事死葬俗典雖欲剋期取果頓捨家緣實乃夙障偏多久滯凡地追初志而涕泗慚惶念未來而痛心酸鼻世出世法均資未得生後世報嬰苦無疑由是自持經咒列經三千卷咒二千萬佛名號一萬俱不録然香三炷匯諸善友所持經咒列比丘沙彌優婆塞三十八人共持諸經律四千八百零七部背經論各一部偈一百萬諸咒品二百二十萬零三千五百九十六又持一字大輪真言七日佛菩薩名七百一十五萬禮佛三萬拜俱不録以此薦父鍾之鳳母金大蓮伏願決生淨土速證無生蒙授記於十方度含靈於五濁又香三炷轉為緇素善友乞恩三寶伏願比丘某痛念正法之衰某克證真實之法某等列名者四人圓修定慧之業沙彌某某發深固志成忍辱力某等列名者四人戒德日懋慧性開朗優婆塞某離諸障緣成就二利某某了悟塵緣增長信力捨惡住善堅固菩提又願智旭病消障淨所有誓願無不圓成所有著述允可佛意所有佛事速辦無難所有開化悉皆領悟興釋迦正法於支那作彌陀輔弼於樂土紹地藏家業入普賢行門以勢至念佛三昧自度度他以迦葉結集深心護法護衆俾邪魔外道遁影藏蹤使教戒禪那日昭月朗恭唯三寶垂慈滿菩提願持咒文智旭夙生業重現世罪深豈但不能剋期取果普報四恩亦且不能傳修聖道弘範三界悠悠歲月放恣因循致使他緣逼迫惡疾纏身眩纍緇素供養護持反躬內忖何德堪消靜言思之實增慚懼爰屏他緣結壇專誦二總持奉報外護九炷臂香供養三寶及地藏自在愍衆生者願比丘某正見卓然能轉時流不被流轉沙彌某某內外一如始終一致山房某等列名者十人於世法中增長信根優婆塞某身心永安智慧如海某了知恩愛猶如桎梏自然伏斷煩惱罪根某某即求子之凡心成真善之聖行沙門某等列名者三十六人慧命堅固成就道果優婆塞某十人及信女某等列名者五人欲行惡法皆不成欲修善業速成就關閉一切諸惡趣門開闡人天涅槃正路又願智旭病苦消除福德生長速完閲藏之鬮早遂斷惑之志著述開人天眼目字字皆懸契佛心與諸緇素同生樂邦世世生生為影響衆直至道場永無隔礙又決疑拈鬮供香一炷願所拈鬮決定靈應從此一意行持無疑無悔自利利他功無虛棄滿菩提願廣度衆生閲藏願文歸命法界大醫王種種應病妙法藥觀音地藏看病母願賜慈悲同哀護智旭與衆生背一真性起諸幻疾三惑為衆罪根元四大為百病窟宅保妄念而塵劫不肯捨離受毒身而輪回無有窮絶幸獲人倫仍嬰衆苦叨成僧相尚纏惑根禪那教觀徒有虛名戒律總持咸無實義致使魔軍得便障難頻侵身則衆病交煎心則他緣逼迫欲行善事每不能成是以深生慚愧諦信因緣歸命觀音地藏二大慈尊求哀懺悔懇賜護持為療惡瘧持完大悲章句二百七十堂而瘧漸愈然香三炷供養三寶願與衆生離病因緣斷病苦報身心安樂真性現前發起大心行諸妙行復然三炷今日為始暫減恆課續閲藏經願此番決無障緣從始至終字字明解外則事事豐饒行人和順毫無片節擾心內則精義入神隨聞入證決得聞持勝力普與衆生開頓悟門成正修路摧魔外邪幢奪權小僻執沈痾立起枯稿旋生恭唯慈覆完梵網告文丁丑歸命華臺盧舍那千華上佛千百億梵網契經心地藏玄通華光大智明亦禮彌陀大願王觀音勢至大海衆及我地藏勝慈尊同賜哀憐垂拔濟菩薩戒沙彌智旭竊念梵網尊經久祕龍藏下卷雖有義疏古略多含人罕妙解上卷則兩家草創皆隔門牆致使修證要塗千秋貿貿旭以宿因微善得遇靈文再四潛心宛如故寶不辭鄙拙合注斯成敬然臂香二十一炷回向真乘一二三奉供三身一體盧舍那佛梵網心地教行理經玄通華光主華光王大智明及文殊普賢藥王藥上金剛藏虛空藏彌勒金剛手等盡梵網海中發趣長養金剛十地菩薩摩訶薩伏願智旭無始至今身口意不善業謗毀僻謬種種罪惡皆得消除一切善根皆得堅固四供極樂世界阿彌陀佛依正宣揚二侍衆海伏願智旭捨此幻身定生極樂華開見佛滿大願輪五供地藏慈尊伏願智旭大智開明大悲增上離諸煩惱廣度衆生滅諸罪障廣代群苦六供靈峰藏經願早莊嚴七八為父母亡屬及請主先亡供三寶願仗良因同生淨土九為剃度十戒兩師道友某等五人供三寶願滅除罪垢得宅九蓮十為在俗邪正兩師供三寶願邪捨邪見不受邪報正增正信成就正修十一為請主道昉比丘供三寶願成千古真品作末世藥樹十二十三為比丘四人沙彌某等列名者七人供三寶願令破除習氣成就剛骨十四為一切隨喜結緣衆供三寶願深植善根永為道種脫離塵網趣向菩提十五至十七為菩薩戒優婆塞二人居士某等列名者七人供三寶願令轉父母親族之邪心離盜賊姦雄之害意十八奉為虛空法界一切曾受菩薩戒者供三寶願令戒品堅牢細過無犯定共道共以同彰攝善攝生而圓證由三十心登體性地速成正覺滿足法身十九奉為虛空法界一切受菩薩戒有毀犯者供三寶願令罪障消除戒品復淨重輕故誤一切蠲除二十奉為法界含識雖未受戒曾聞梵網名者供三寶願仗良因同生覺悟發心秉受如法修持二十一奉為法界含識雖具梵網真常佛性從不聞此名者供三寶願以大慈悲力不思議力同體法性真實威力令從今去咸聞此微妙法門正信正解離三塗超八難決登戒品並事真修展轉誘化同證菩提若惡障所纏不能自拔昏迷倒惑不能覺悟者願三寶究竟大功德智慧慈悲力阿彌陀佛無邊願力地藏菩薩勇猛誓力令速覺悟盡拔苦輪設其定業決應受報願智旭早生淨土隨乘願輪普于十方不可説不可説世界海阿鼻等獄中代其受苦令彼衆生先證菩提假使法界唯一衆生未成正覺智旭甘于無量獄代受楚毒盡一切劫無厭無疲智旭今日誓願悉同三世佛菩薩所發悉是一切佛菩薩所加若智旭無始惡業應墮大苦趣中神識昏迷違今日大心大願大行者仰望舍那慈父釋迦本師彌陀願王地藏悲母哀我護我覺悟于我令于苦中憶今本願不捨于苦而度衆生又願以今然香發願功德因緣令正法重昭于震旦邪風絶扇于恆沙持律者洞明持犯善識開遮習教者深知義理了達性修坐禪者擴悟心源不遭魔外念佛者事理圓融自他不隔又願一切法門人皆通達永無鬥諍堅固之愆盡革門庭施設之見念念紹佛祖心燈法法匯梵網性海情與無情同圓種智滅定業咒壇懺願文稽首業性如虛空滿分解脫滅障者我今持誦祕伽陀願滅自他諸定業無邊福慧互莊嚴成就希有勝功德見聞隨喜發菩提心地性藏同圓證婆伽婆佛陀妙覺者無上地摩訶一和沙無相無垢地阿訶羅弗明行足法雲地阿那訶慧光妙善地阿尼羅漢變化生不動地阿羅漢過三有遠行地阿那含薄流現前地斯陀含度障難勝地須陀洹觀明焰地須陀迦流照明地須阿伽一波道流離垢地鳩摩羅伽逆流歡喜地達磨邊伽波羅提弗陀波訶諦師羅叉伽羅叉必佛度阿法必陀必白伽羅曇沙羅羅諦流沙度叉一婆度佛阿度阿訶度沙必度生婆諦度利他度和差度只羅度安爾度伽阿流山迦必阿羅必叉伽阿毗跋毗跋致安婆沙流摩阿流羅伽流諦伽度流伽度信念進定慧戒向護捨願一切菩薩摩訶薩唯願大乘三寶若聖若凡同加護念同作證明聽智旭今日至心懺悔滿今日廣大願輪胡跪合掌瀝膽刳肝作如是白智旭自迷真性枉入妄流隨逐無明增長惡業無始至今曾未覺悟所積罪障無量無邊賴遇地藏菩薩滅定業咒既勸同仁共持十萬萬兼復自勵專持五百萬十日方便百日正修結如法淨壇受一食勝行仍于道場將畢默課行法助成恭然臂香三炷供法界三寶仰祈占察壇法早獲流通又念種種定業由身口意三廣造十惡惡法既成如弦發箭勢須遠到理無中止雖大士悲心真言神力不可思議亦須新殃永斷方可故愆俱亡而撫躬內省慚悚彌增我實淫機盜意殺習未除云何使人永除身三惡業我實妄言綺語惡口兩舌種現未消云何使人永消口四惡業我實貪瞋癡起現不停云何使人永停意三惡毒嗚呼檢點一身渾是短驚惶半世已成虛扼腕痛心號天慟地更然三炷深自悔責亦為法界衆生求哀悔過伏願從今已後十惡消三業淨不造因不受果又香一炷供五臺妙峰老師及雲棲和尚憨山師祖紫柏大師密藏尊者一切真善知識願以福慧力同加覆護令我九華銅殿之願速得滿足又香五炷一為九華二寮持二十萬二為藏櫥普塔及助成緇素持二十萬三為聽法及結緣衆持十萬四為往來流寓持十萬五為某某舊持五十萬及每日大悲咒十四遍今加持真言十萬上五臂香供養三寶悉代彼地藏真子皆紹我地藏願王又為沙彌某舊持百萬今加五萬供香一炷願令培福壽基離作輟習立躬如泰山喬嶽矢志必函乾蓋坤又為沙彌三人各持五萬供香一炷願令從事入理成就五根發明五力向為比丘某每日持三百十夏為期及別持悲咒每日七遍成器為期曾為某某各持五十萬今共加持十萬供香一炷願某捨攀尋枝葉之習悟直捷根蒂之功析義如庖丁解牛得理如鵝王擇乳某專求己過毋責人非知將就苟且難出生死牢關信駑駘顛蹶不可橫超淨土猛策新猷莫仍故轍某慎思明辨沈細精微痛革浮氣粗心未會先會專求深造自得若無若虛悟文字三昧似獨繭以抽絲能入理深談必敲骨而取髓又為沙彌某舊持百萬某今持十萬某每日別持悲咒七遍成器為期今共加真言五萬供香一炷願某折伏貢高斷除我慢深培福壽專務思修省己之短慕人之長下學上達即事鍊心某戒根永固某籓垣頓剖又為比丘某某持十萬供香一炷願某莊嚴大藏速得圓成某名心霧散覺意目明莫念鼻孔撩天但願腳跟著地又為比丘二十人持二十萬供香二炷願某等煩習永斷荷擔正法某等勤修出要永離妄因又為一切禪者學者持律者念佛者瑜伽者及邪命雲遊務農者絓是著如來衣現僧伽相踐伽藍地冒出家名盡三天下所有緇流共持三十萬供香三炷伏願狂誕狐禪盡轉而為宗説俱通之龍象鑽紙蠅學盡轉而為隨文入觀之獅猊羺羊戒子盡轉而為定共道共之律麟狼狽蓮宗盡轉而為猛智慧行之角虎優倡瑜伽盡轉而為三昧授受之神僧禿頭商賈盡轉而為六度萬行之導主雲遊賊住盡轉而為頭陀勝行之芳標農事僧民盡轉而為法界園田之靈種又為菩薩優婆塞某日持悲咒七遍脫難為期今加真言五萬為某某舊持二十萬某等列名者五人今持十萬共供香二炷願各增正信長悔心乳不與毒同食福不與罪並行永作金湯進趨覺路又香一炷供地藏慈尊將此持咒然香功德并向為父母及法界有情共持三千萬為一切師友同學弟子檀護怨親知識等所持若九十萬三百二十萬四十八萬等乃至延生薦亡悔過除災若自為若為他所持若多若少至心散心又普化緇素持十萬萬若化未化完未完過現未來一切功德今皆攝取現前普同回向深心信解真言威力不可思議一一字圓具法界無邊功德一切字亦如是以此重重無盡不可思議功德威神令我一切得如所願滿菩提願又香四炷供法界三寶及地藏大士求占第三輪相或依占察法先悔罪障或住阿蘭若先修禪定或著述弘經先修觀智或植諸善本行衆三昧懇乞大慈分明指示令我此生不致浪死又三炷供淨土三寶以此功德悉皆回施法界衆生願共捨此一期報身決定同生極樂世界永離苦因苦果速證菩提涅槃陳罪求哀疏戊寅稽首大孝能仁父孝順為宗梵網經地藏目連達孝尊修證孝慈諸聖衆今然香炷懺前愆願賜慈悲哀拔濟假名菩薩戒汙道沙彌智旭泣血稽顙敬白常寂光土一體三寶專懇大慈大悲俯垂感應言念罪旭少年主張理學妄詆三寶過犯彌天應墮無間然世間忠孝根於至性罔敢或忘後蒙三寶密加返邪歸正頓發出世心圖其遠者大者祈究竟報我君親意謂剋期取證決定無疑詎料於今十六年竟成虛度修行至道仰彌高而鑽彌堅翦除惑業根益深而枝益茂死期將至初志何成扼腕撫心厥罪曷罄始願出家後即能度脫歷劫親緣今母逝十二年父亡二十載而天眼未開茫然不知生處是第一大負負我生恩也始願出家後即能戒律永淨定慧圓明今根本戒外違犯多端雜亂散心全無正定名字聞慧不登五品是第二大負負我性靈也始見假善知識亂宗門正印願出家後福慧莊嚴遍降魔外今但能自識邪正而孱無道力空言何補是第三大負負我宗門也始見末運僧體日卑願以一身力振其頽今德薄行荒不足為人天表率是第四大負負我僧相也始見末運僧無律行願以一身為其倡始今自檢律行缺誤尤甚不足為他師範是第五大負負此名位也始閲律時稔知末世種種非法誓集同志五人若過五人如法共住令如來正法復興而自既障深業重不克與比丘列復失方便乖我良朋是第六大負負正法輪也始見外寇猖獗飢疫洊臻國政乖張元氣侵蝕願修成道力興隆正法默扶皇運今自救不了坐視內寇邪魔付之莫可如何是第七大負上負帝主弘護深恩下負普為衆生所發菩提心願也嗚呼負茲莫大七罪復淹淹殘喘九死一生半體酸楚已經十有餘年三日惡瘧更纏三年之外儻地獄前茅邪抑過惡雖重而一線菩提願力護法苦心稍感寂光悲智令轉重報於生前俾輕受邪展轉慚惶未知攸底悲形夢寐歎徹庭闈僅賴一線心願未忘而杯水欲救焚車益增恐懼然諸佛誠言菩提心寶不可思議如少金剛能穿大地少獅乳能徹海乳一息苟存敢不痛自努力今值先嚴諱日敬捐衣鉢微資營供常住三寶然香七炷懺七大負復四炷啓請菩薩比丘沙彌四人同心修禮慈悲水懺以此功德專申回向伏祈鍾之鳳暨大蓮優婆夷金氏早敷淨土之華頓悟惟心之旨惑業冰消於片念苦輪永斷於未來次祈比丘某深信微塵中之法界經卷篤志專心求剖出斷除識田內之沈細愛見剛毅敏達建法幢某直信觀心法門真發菩提大願沙彌某於一切事中悉見第一義諦一切時中不忘無上道心某入無邊無底之法海超久習久染之凡情次祈災亂冰消邪説鼠竄皇仁蕩蕩佛化暘暘次祈智旭病苦消除戒身清淨福德成就止觀圓明襄盛世皇猷護如來正法又復以此功德普施一切衆生願盡除一切煩惑罪根斷一切有漏雜業捨一切生死苦報離一切惡魔惡友歸一切大乘三寶見一切諸佛世尊生一切莊嚴淨土開般若一切種智證不可思議解脫成無上清淨法身如是法界衆生畢獲如是究竟勝利益已智旭乃當克證無上菩提為如是師六七禮懺疏己卯菩薩戒沙彌智旭一心歸命釋迦慈父三世千佛極樂導師阿彌陀佛梵網經菩薩心地品大佛頂如來密因修證了義諸菩薩萬行首楞嚴經千手千眼大悲觀世音菩薩大勢至菩薩清淨大海衆菩薩二十五圓通諸大菩薩大阿羅漢文殊師利菩薩金剛藏王菩薩地藏菩薩摩訶薩及十方三世無窮無盡一切三寶願展慈光同垂哀鑒伏為菩薩戒比丘道昉身故雖正念分明往生可卜而福慧未滿華開未期敬邀同行禮三千佛恭然臂香六炷供養千佛及法界三寶一者以此禮佛功德回向道昉願乘此心開於一念中悉見十方三世一切諸佛得一切時中不忘念法門二者以今著述大佛頂經及前合注梵網心地功德回向道昉願無始諸罪悉銷鎔所有善根悉圓滿斷微細愛根破人我瞋習決增上慢水豁暗鈍癡雲戒體圓成性業與遮業皆淨定力深遠昏昧與掉舉並亡慧性開明實智與權智齊顯護心善巧未學與有學等觀乃至得記不越一生華開不移當念三者合上功德代道昉資一切覺靈列名三代願同登淨土四為孝徒某等頂禮三寶願永無乖諍之心不犯獅蟲之誡五為湛然寮中一切檀信頂禮三寶願於剃髮者作導師想於染衣者作賢聖想乃至於諸行童凡足履伽藍地者一切皆作未來佛想確遵十輪嚴訓長為三寶金湯六者代道昉轉伸酬謝同行某等願因懺過而頓顯無過之體因度他而密悟無他之宗恭惟兩土法界聖賢證明攝受盂蘭盆大齋報恩普度道場總別合疏己卯智窮實相冥法界而融絶千如悲極無緣稱同體而普攝十界惟能所之俱寂乃感應以圓彰智旭歸命祇園教主大孝大慈之世雄貝葉傳持即事即理之妙典啓教目連尊者三乘十聖衆僧願展慈光同垂昭鑒某等建盂蘭盆道場敘晝夜經懺等不録普供大齋用饗十方三寶一切僧伽以此功勳專伸奉薦各各七世父母歷代親緣若在三塗八難永脫苦輪人道天仙倍增福樂已育蓮臺當下花開見佛曾奉聖主速蒙授記度生又復以此功德普施法界含識伏願豎窮橫遍一切衆生若怨親若非怨親若見聞若不見聞以同體法性力故無緣慈悲誓故令其皆得妙益地獄息苦餓鬼離飢畜生無驚修羅捨鬥人免八苦天脫五衰二乘出枯寂坑菩薩拔無明箭又復以此功德莊嚴無上菩提伏願豎窮橫遍法界含識不求人天偽樂亦不希求偏真涅槃不貪權位因果亦不別緣事外理性惟發廣大菩提心速趣究竟等正覺又復以此功德當體融入不思議理伏願懺文宣處即作法即取相即無生三障圓消於片念佛號稱時即假名即報化即法身四德圓顯於剎那於食等者於法亦等十界同飽醍醐如行説者亦如説行教行同歸理性了知自他從來惟一真如徹悟果因始終罔非實相又願我等于事事念念中具修如上三種大回向已所生功德仰冀四海享太平之休六合沾出世之化從今以去盡於未來紹隆三寶使不斷絶弘通大乘令無壅蔽折攝無私慈威並運於善不善平等濟度日照海納地載天涵情與無情同圓種智
