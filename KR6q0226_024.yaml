body:
  text: 古歙門人成時編輯題跋一題對峰禪師血書受戒文後心佛衆生本無差別以不達自性清淨為客塵所汙遂有三界升沈故欲出苦輪莫先持戒欲淨戒根莫先悔過經云波羅提木叉是衆等大師又云有二種健兒一自不作罪二作已能悔乃末世既毀梵行復事覆藏戴高山履巨海雖遇真善知識安能救濟哉對峰弘師血書誓文歷年幾四十載手澤如新一傳鑒空寧公再傳智度泓公匪藉堅固大願弗克有此梵網謂明人忍慧強能持如是法詎不信然此文當與戒性同其不壞普令未來見聞同悟自性清淨戒體不異親稟紫柏大師前也刻十二頭陀經跋頭陀以抖擻塵勞為義具十二法迦葉尊者終身奉行世尊謂正法住世全賴此人逮茲末運妄以鬚髮當之尚不知比丘戒為何事矧頭陀法邪豫雖根劣僅持一二然一番展讀輒一番愧感例諸賢達想亦當爾重録梓行伏願見聞隨喜者發增上心少多奉持庶重興正法不日可望耳血書經品跋為巨沙彌每念大法難值如優曇花戊辰秋瀝舌端血書梵網地藏等經今僅得數品合為帙首決定明誨次安樂行十二頭陀八大人覺及大乘戒經所以息衆惡之源廣慈悲之道次寶華敷會得聞十方佛名終勢至圓通攝歸西方淨土噫具諸戒行讀誦方等上上品生斯其券矣然天台云一一生因皆判九品隨治惑淺深分位次高下是則三階四土寶地疑城問心不論事是在不負最初歡喜頂受之一念而已合掌跋水心持金剛經跋自五祖以金剛般若印心此經遂為世寶然世人依語生解一味蕩相明空大失無住生心之旨經云後五百歲有持戒修福於此章句能生信心又云發菩提者不說斷滅噫只此二語可思矣蓋無住超凡外之著有生心超二乘之沈空無住則十界俱非生心則十界俱即遮照同時生佛不二中流兩岸一齊坐斷當知文字般若萬象萬行與音聲點畫同名文字般若與觀照實相非一非異如此受持可救空宗之失矣刻較正梵網上下跋梵網之流通東土自羅什始而下卷之獨弘傳自智者始智者之時道法盛而根性利人淹教典博洽大乘故獨揭重輕戒相以便行持今人根日鈍學日荒登壇受戒徒挂虛名心地法門茫無所曉既不能廣學多聞并上卷尚未寓目安能於三十心中一一解其次第法用一一不解一切法不知即為自誑亦誑他人儼稱菩薩戒子寧不汙於至教乎豫濫膺法服憂切杞人擬合注上下兼謀梓梵本但上卷久祕魯魚猶少下卷傳世亥豕實多唯雲棲古本雅合義疏的可依承又義疏從偈頌開章而經名梵網因緣已指上卷乃藏本上卷終十地將付囑奉持之文反置下卷首今細玩文義從賢劫品中說以上確是上卷結文從爾時釋迦以下確是下卷序分敬用每朝刻藏分一卷為二卷合二卷為一卷之例以義定其節段至於重輕戒相本是疏家科文藏本原無不應竄入經中但可別列經後又此戒相傳自先賢智者仍之已有不定今依律藏推析不無更有可商爰注各條下以便酌取普願見聞隨喜讀誦受持同悟梵網明珠頓契本源心地刻頭陀遺教與梵網同帙跋蓮洲居士書梓梵網復合刻頭陀遺教議者曰大小兩乘教道既別旨趣天殊梵網利生涉俗不捨塵勞遺教頭陀物外蕭然唯祈自了離之雙美合乃兩傷今併一函不令誦者泣岐乎解者曰兩乘雖別金口是同日月照臨並行不悖又解者曰菩薩有二種智增上者先空後假悲增上者先假後空方便多門歸元無二嘻此皆未達聖教微旨未識流通至意者也夫從井救人宣尼所否甕外運甕舉世所知豈有自疾不療能療他者嬰兒病行聖梵同符天行未明徒增戲論故華嚴二普酬倡名離世閒非豎精進幢奉遠離戒何能深入心地把臂三賢十聖不被愛見吞噬邪菩薩戒本經云聲聞深樂涅槃畏厭煩惱百千萬倍不及菩薩深樂涅槃畏厭煩惱謂諸聲聞但為自利菩薩不爾普為衆生彼習不染汙心勝阿羅漢成就有漏離諸煩惱讀此一章群疑頓釋三經恰恰相成非前非後合則雙美離乃兩傷願讀誦者以無著心行菩薩道以菩提心修遠離行如普門示現照五蘊皆空而度苦厄地湧高流住下方空中而弘法華不唯春蘭秋菊正是一鼻孔出氣也寄南開士血書法華經跋血書一法攝歸普賢行海條列梵網戒章特所以然之故未有揭示致狂慧之徒蔑為有相夫無始生死根本莫甚身見出世妙法莫先摧破薩迦邪山薩迦邪見破則生死輪永息是名尊重正法是名以法供養如來法華楞嚴深嘆然臂指及然香功德亦以此耳或謂斷煩惱臂然無明身豈在區區血肉閒不知衆生結習濃厚虛幻血肉如翳眼中脂當體即是無明煩惱僧問紫柏如何是生死根本曰只汝身是云恁麼則死了便出生死師震威一喝嗚呼大人作用豈義學所知蓋實從半偈悟徹故示人自親切也人能刺血然香縱未明理亦破敵前茅儻高談理性不入行門身見高山何由摧碎豫每見此妙行必深心隨喜況妙經開權顯實舉手低頭皆成佛道人能盡發此心行此行不但靈山未散安知支那邊地不三變而成淨土也寄南開士即紫柏孫必能悟一喝意他年坐道場紫柏當湧寶塔以證之矣雲麓居士持金剛經跋大般若云有菩薩成就開智一句中解無量義有成就演智一句義作無量說所以般若一法或說六百卷或說三十卷或說一卷或說一章廣略雖殊與甚深般若相應一也苟得開演二智多少無礙若但作文字觀只般若二字已自葛藤非直攀枝附葉者為有過也末世法師心無實悟徒向口耳邊起見或喜繁文或喜簡略總名遍計情執何由入佛智慧佛智慧者如人有目日光明照見種種色一中解無量無量中解一荊棘林中橫身直過潔白地上掉臂不留又何捨一從一始誇直捷哉維摩云無離文字說解脫法華云言辭相寂滅故知四依大士弘演科章橫說豎說皆與般若不相違背未達者自繞葛藤非說法過設掃之而衆生處處生著於要言中愈滯情塵古人云若以不立文字為高只不立二言即是文字廢多執少癡執彌深願由心經一章進之金剛一卷又進之摩訶般若三十大般若六百於三藏十二部透盡言說差別之旨總歸理性般若之宗則文字觀照實相舉一即三言三即一左右逢源不可思議孰為根本孰為枝蔓視固守簡易自稱直截明白者不啻夜郎王矣偈曰太阿藏匣已驚神舉向當陽不用硎錯節盤根迎刃解虛空割碎豈留痕白牛十頌自跋學道既不可廉纖亦無容鹵莽諸佛說法有片喻有全喻牧牛公案可喻宗乘現世機緣亦喻佛道僧祇修證者也況圓人善超六而常即豈以圓融礙行布而必懷增上慢於理性方名不落階級邪有病此頌位位分配不似衲僧氣象豫謂之曰且喜老兄會祖師禪如來禪未夢見在重定授菩薩戒法自跋竊觀比丘受戒律有定式五部雖殊大同小異故應專遵四分削後竄之繁文菩薩受法經論各異梵網瓔珞地持善戒以及心地觀等被機既別詳略互殊是以制旨教行等各抒己意增設科條雖辭美意詳並殫其致然或義因文隱反不若經論之痛快直捷也今梵網受法已失其傳僅存影略唯地持瓔珞的可依承敬酌三家會成一式庶俾詳簡適中而授者受者皆得明白簡易以免紊雜之過耳梵網合注自跋夫本源心地含生共有無染性戒日用不知翳目而華舞太空夢蟻而尋羶階下然晴虛之體依然輪王之身如故哀哉妄惑枉受幻輪勞我慈尊現身同患示成不倦於八千垂化無偏於塵剎一滴之心地既敷積劫之沈迷立醒而琅函久錮半珠僅呈繄我愚蒙得探全寶竭思殫機塵培泰嶽思法緣之匪易輒涕泗以滂沱願我同仁深思力學解行同遵自他俱利庶得上報佛恩不負己性矣積如開士刻般若照真論跋般若無名一切法皆般若別名也一切法無體般若即一切法自體也一切法不可名故般若亦不可名般若無別體故一切法咸無別體世有欲借語言絶語言而顯般若者皆未達甚深般若圓融三德者也何謂圓融三德一實相般若名法身德二觀照般若名般若德三文字般若名解脫德此三非三亦非定一以一切皆實相皆觀照皆文字故是故六百卷非多二百六十餘言非少乃至後賢述作無慮數十百家了得即字字解粘不了則字字加縛澄公照真論亦其一也願見者當下與甚深般若相應不更作借言絶言會若於此不借不絶則六百卷一大藏悉不借絶一星之火遍燒原野矣血書法華經跋一切佛語皆群靈眼目千聖慧命也況無上妙法乎一切讀誦受持皆般若真因度苦寶筏也況刺血為墨乎掠虛禪者高談名理罔知實行彼未悟理耳設真悟理則一切行無非妙理有何事相可薄理性可尊邪況衆生無始我執恆重若宗若教對治咸急正宜借此微因充至三祇大行俾正使習氣一齊破盡可謂即事而理即漸而頓矣奈何棄此真實以空談當妙悟哉乳生法友夙植正信年方應法作此不思議功德是故歷參知識不染近時禪病將來親見靈山一會方知血肉點畫全體法華三昧無相安樂行果不在有相安樂行外也蘊謙書法華經跋此經五種法師受持讀誦解說書寫也夫受持讀誦解說能生解成觀自軌軌他謂之法師固宜彼書寫胡亦稱法師哉然書寫尤可自軌軌他尤易生解成觀請言之均一紙筆墨也一手腕也以此寫淫辭豔曲成三塗因寫世閒典籍成人天因寫阿含三藏成出世因寫大乘方等成菩薩因寫妙法蓮華則唯是佛因儻紙墨筆手不能寫妙法者亦必不能寫淫辭豔曲以溺人也儻能寫淫辭豔曲者亦必能寫妙法以昭人也是同一性靈也一緣助也一功能也十界升沈不分而分如此矣且淫辭豔曲雖三塗因亦具十界如聞他若無心我也休頓明心地非佛因乎佛尚具他可知矣妙法蓮華雖佛界因亦具十界如經明謗斯經者獲罪無量非地獄因乎地獄尚具他可知矣嗟嗟手腕功能一也紙筆墨緣助一也性靈知覺一也十界非此俱不成十界因此遂互具既成而互具矣則必有如是相性體力等百界千如炳然在一紙墨閒一手筆閒一性靈閒性德三因修德三因性修相成性修不二可洞然於實相淵府矣又示讀誦者俾解成觀發非自軌軌他之最勝者乎願寫者閲者薦此性具實相妙理以為妙修之本毋曰姑結遠因於久後也妙法之師當仁不讓其在是與願彌血書法華經跋如來一切經典法華稱王行人一切供養血書為最蓋五時八教至法華而理無不盡機無不收所以一句沾神一言作種必至成佛矧全經功德乎吾人難捨莫若己身至刺血為墨而殷重極矣身見破矣與藥王之然身臂豈有二焉每慨末世專尚虛解口頭三昧遍傳寰宇四安樂行置若辨髦開士非時食戒嚴似遠公萬善莊嚴勤同壽老又發勝心成此功德豈五種十種供養所能較量哉達權書法華經跋此經名平等大慧亦名諸經中王夫慧平等法亦平等何故獨稱王哉蓋法雖平等衆生迷故妄見差別故一代時教巧逗迷情於無差中作差別說至靈山極倡方明差本無差是會一切法皆成佛法者全由法華之功回視華嚴兼阿含但方等對般若帶皆無與並者況本門極倡三世益物番番種番番熟番番脫前非始自大通威音後不窮於薪灰火盡凡如來豎窮橫遍之化工施設教網之綱要徹底顯示罄無餘蘊所以難遇過於優曇受持功齊法界也然佛法妙生法妙不離心法之妙現前一念妙心是名蓮華悟心蓮華一切法無非蓮華心是經王心是平等大慧達此實義方名達權勉之哉三學血書華嚴經跋一代時教華嚴為根本法輪以為實施權流出無量法門開權顯實還歸法界性海故也然法門權實雖復不同而性修要旨初無少異此經首題大方廣者即直指吾人現前一念三德祕藏之性佛華嚴者即指稱性所起圓頓修德之功不達性體三德萬行何所莊嚴不以佛莊嚴而為莊嚴性德何足貴重佛華莊嚴者戒定慧三學而已戒學定學福德莊嚴無上慧學智慧莊嚴慧固佛慧福亦佛福迥異舊醫三法高超權教三修一一皆名佛華經不云乎具足受持威儀戒法能令三寶種性不斷戒既全體佛戒定慧何莫非佛以圓頓佛華莊嚴大方廣之心性斯則全性起修全修在性而遮那身土不離下凡一念心矣儻高推聖境漫云我是凡夫則何謂心佛衆生三無差別儻執性德漫云實齊諸聖則我大方廣性本自平等又何以高超九界成等正覺邪禪師三學血書經王余為發明三皆佛學俾滴滴血皆從普賢毛孔中流出一一滴中具大千經卷無別有也法華綸貫自跋李白登黃鶴樓見崔灝詩遂閣筆知不可勝也智者大師親證法華三昧光宅尚破餘家可知後人紛紛置喙未具青蓮學識耳諸友請余解法華堅以此意辭之適達際督梓梵文欲撮全經大旨以便初學敬依玄文節取大綱名為綸貫庶述古而不妄作云妙玄節要自跋一字法門海墨不盡九句談妙奚足云多且九旬四辨文義何限章安所記略矣乃末世鈍根猶畏其繁望妙玄而如海甘蛙守以不前無上醍醐罔沾一滴可痛也竊聞大智度千卷羅什十倍略之摩訶止觀全書荊溪録其大意因倣厥旨輯為妙玄節要凡二卷庶幾一臠染指漸充法味然後遍討玄文深證法華三昧斯舉也未必非循循善誘之一術也若僅守節要終置全珍豫固智者章安之罪人而彼又豫之罪人矣題若水關主手卷文殊起佛見法見貶向鐵圍高峰云今有起佛見法見合掌讚歎何故時節若到其理自彰此出格超方手也宗門作略與大醫王相似急治標緩治本又有順治逆治之不同期於起病不執陳方責其無驗也末世禪學謬自立宗不知了因緣因恆相資藉固有了因性發緣因頓具者亦有緣因性熟了因忽發者如舟與水相資有濟不可謂水可緩舟應急舟可緩水應急也若水關主久閲大藏盡了了否若了了而仍未瞥則佛見法見應貶鐵圍若未盡了是聞有餘而慧不足正可向此求開慧性所謂時到理彰逆治之不可則順治之也試揣平日對經卷時與上蒲團提話時孰得力孰不得力孰能克除習氣孰不能夫發藥治病聽諸良醫有效無效還須自檢昔有人素服砒因久缺遂病醫醉誤投以砒霍然病起今三藏雖如砒毒恐既久服未必不以此得霍然也題至孝回春傳儒以孝為百行之本佛以孝為至道之宗蓋報恩心出於萬不可解之情如黃會卿以刲股療母痼疾母享年八十有二皆真情所感也是情也謂為世法實是菩提之基謂為出世不過愛欲之妄君子於此不可不學不可不達昔曾母嚙指而子為心痛達此可悟同體法性知唯心法門即世孝成出世孝矣題獨省編余幼事理學輒以闢佛為任惡異也稍長又輒以為同習久始知亦同亦異今也知其非同非異仍不妨說同說異矣永邑周子儒而玄玄而禪禪而又儒者也退藏之暇出獨省編夫不睹不聞儒所謂獨也而大本達道存焉玄之又玄老所謂獨也而衆妙之門在焉覓心了不可得釋所謂獨也而百界千如具焉此真混而弗齊類而弗隔要亦為未省者言耳省之何一何異何獨非獨寂然不動獨亦不可得感而遂通至賾不可亂正寂時萬感炳現正感時當體寂然天下歸仁之後更無操存舍亡之懼矣子其省之觀泉開士血書法華經跋經云譬如高原鑿井求水若漸至泥去水必近菩薩發大心亦復如是若得逢此法華經王即近阿耨菩提儒亦云有為者若掘井九仞不及泉猶為棄井噫約教論泉則五時四教無如法華法華即泉也約觀論泉則文字如土聞慧如溼思慧如泥而修慧泉也開士若以阿含為土方等為溼般若為泥應於此經一文言一滴血皆作清冽香泉觀若求修慧之泉應隨文入觀正如不離高原施功及水鑿之既久幽泉必迸亦莫離此文言滴血令成棄井也蓮洲書佛頂經跋經云一念將此法門於末劫開示未學是人罪障應念消滅變其所受地獄苦成安樂國顧一念至微何力用如此須知一念之性本豎窮橫遍一切事理性相從不在現前一念之外故一念迷生死浩然一念悟輪回頓息試思平日起惑造業畢竟是誰今書經懺悔又畢竟是誰此造業懺悔之念在內在外在中閒邪青黃赤白長短方圓邪過去現在未來邪果覓之了不可得則罪福無主名真懺悔阿難所以頓獲法身性比丘尼所以成阿羅漢也若於無可得中妄計有心可得則旋犯旋悔既悔仍犯如隔日瘧有何了期然大乘緣種不可思議勉強力行功無虛棄出世善根漸勝世閒漏種漸消如明破暗亦決不誣也題靈異雜録子不語怪力亂神怪神如力亂非無也百姓紐於見聞慣習偶一事出慣習表則怪之詎思只今一身眼耳胡以見聞口足胡以嘗與語止與行不亦至怪與佛證心性之妙不為慣習所局亦何靈異百姓視之不勝靈異矣謂佛靈異此不知心性本妙者也并佛靈異之跡而不見不聞不覺不知此又井蛙夏蟲之甚者也雖然井蛙夏蟲孰非靈異唯靈異之性原等故仍得以靈異覺之覺此靈異又覺此即非靈異可與語不語之語矣榷古題辭聖人往而經史存經史固不足傳聖人之心而善會聖心者初未嘗離經史也既於經史會聖心謂聖人果往可乎文王沒文在茲天不能喪人不能死吾是以知不善讀經史者古未嘗不今善讀者今未嘗不古也今而古則言即無言文即無文勿起二見可矣毗舍浮佛偈跋紫柏大師云生平持毗舍浮佛半偈句半熟半句未熟更熟此半句生死脫然矣毗舍浮此云遍一切自在結莊嚴劫之終開賢劫之始故此半偈最為良藥衆生病雖不一其源不過妄認四大為自身相妄認六塵緣影為自心相而已今以四大觀身知身非身以緣影觀心知心非心既達妄計之身心即非身心焉往而不自在然則毗舍浮佛不在莊嚴劫在吾一念無身心之智而已果達身心本空奚止舍浮不離當念盡十方世界過現未來諸佛皆不離當念也血書金剛經跋論云菩薩觀智所守者約而觀境遍剋果大故喻金剛兩頭闊把手處細也是故菩薩但觀一念心性覓之了不可得炳現萬法無能無所無是非是則達三般若皆如金剛是真能把者行幻佛子血書最上乘此金剛邪抑已善能把邪佛子莫作二視可也題牧牛圖牧牛喻修證本諸經論非創談也然畢竟牛是何物牧者何人普禪為頌雲棲鋟圖菂中法友又繪成卷豫更下一注腳如牛入窗櫺頭蹄都過了卻有尾巴過不得且道此尾白邪黑邪有邪無邪會得者箇俏息不妨雲邊月外與汝相見重刻三頌自跋不信教外別傳是謗宗也謂教外果有別傳是謗教也抑不信教外別傳是謗教也謂教外果有別傳是謗宗也捨此二塗作何折合不見道恁麼也不得不恁麼也不得恁麼不恁麼總不得又道恁麼也得不恁麼也得恁麼不恁麼總得雖然毫釐差天地隔山納甘墮無閒漫作三頌未審教外邪教內邪別傳邪非別傳邪儻遇無眼人觀無耳人聽必有能辨之者性學開蒙自跋此別答十問之第四問也良以兩家性學世罕兼通儒未必習佛習亦難窺堂奧佛未必習儒習亦不肯精研豫年十二就外傅粗知書義便以道學自任於居敬慎獨之功致知格物之要深究之年二十看顏淵問仁章竊疑天下歸仁語苦參力討廢寢忘餐者三晝夜忽然大悟頓見孔顏心學真血脈真骨髓因識孔子聞知之傳誠待其人非漢宋諸儒能擬議也越四年知出世大法發心離俗先參少室禪宗後學天台教觀不啻皆如渤海相似十五六載僅沾一滴方為向若之歎反觀向所悟孔顏心學又今一滴中之一滴矣嗟乎道曠無涯為若此也世之沾沾自足者何啻井蛙也哉然又知一滴之性即大海性故身為釋子喜拈孔顏心學示人知與不知任諸旦暮此問同志未諳固請豫略明梗概遂於一滴海中復出滴許如此知必為大方所笑然神龍得之安知不即此興雲澍雨又安知不藉此騰歸滄溟也遺教解自跋旭未出家讀遺教便知字字血淚既獲剃染靡或忘所憾障深草餘年空無剋獲非道人又非白衣方撫心極愧而甫敦沈居士固請解此經嗟夫豫不能臻修世出世功德徒以文言作諸天說法鳥邪然一隙或明弗忍終吝藉此功德破障策新普與同患回向西方仍作迦陵頻伽代彌陀廣宣法要可矣彌陀要解自跋經云末世億億人修行罕一得道唯依念佛得度嗚呼今其時矣捨此不可思議法門其何能淑旭初出家亦負宗乘而藐教典妄謂持名曲為中下後因大病發意西歸嗣研妙宗圓中二鈔始知念佛三昧無上寶王方肯死心執持名號萬牛莫挽也吾友去病欲令此經大旨辭不繁而炳著豫方願普與有情同生極樂不可辭舉筆於丁亥九月二十有七日脫稿於十月初五日所願一句一字咸作資糧一見一聞同階不退信疑皆植道種讚謗等歸解脫仰唯諸佛菩薩攝受證明同學友人隨喜加被周易禪解自跋曩遊溫陵有郭氏問易遂舉筆屬稿先五傳次上經而下經解未及半以應請旋置今商大乘止觀之餘拈示易學始竟前稿嗟嗟從閩至吳地不過三千餘里從辛巳冬至今乙酉夏時不過千二百餘日乃世事幻夢萬別千差交易邪變易邪至歷盡差別時地俱易而不易者依然如故吾是以知日月稽天而不歷江河競注而不流肇公非欺我也得其不易以應其至易觀其至易以驗其不易常與無常二鳥雙遊吾安知文王之羑里周公之被流言孔子息機於周流而韋編三絶不同感於斯邪因閣筆復為之跋唯識心要自跋宗鏡云智慧合其多聞終不執詮認指多聞度其智慧免成孤陋面牆設一微塵未了此猶有無明在以不了處為障翳故況自身根門之內日用之中有無量應急法門全未明一若欲為人憑何剖析只成自誑反墮無知自眼未明焉開他目須三量定其是非真修匪濫四分成其體用正理無虧然後十因四緣辨染淨之生處三報五果鑒真俗之所歸若不達三量真妄何分不知四分體用俱失又云一心實相悉是諸法諸法所生皆從現行善惡熏習第八識含藏種子為因發起染淨差別報應為果若不微細剖析問答決疑何由到一心總別之源徹八識性相之際提綱意在張網不可去網存綱舉領意在著衣不可棄衣取領故事理雙明方通圓旨教觀齊運始達一乘又云不因教所指何由識自心設不因教發明亦須憑教印可不然皆成自然外道暗證禪師直饒生而知之亦多生聞經熏種諸聖本願冥加嗚呼永明大師以法眼嫡孫悟齊諸祖而苦心苦口勸誡若此誰謂成唯識論非佛祖傳心要訣乎豫憾障深惑重不能剋證而性相源頭頗窺一線誠或諸聖冥加故亦不敢自祕聊竭隙明和盤托出舉筆於丁亥三月草五日脫稿於五月草五日閲兩月述成觀心法要十卷伏願見聞隨喜不退菩提若信若疑咸成妙種同生極樂淨邦先覲阿彌陀佛還入龍華初會影響彌勒世尊盡未來廣度含識衆生盡方證涅槃書慈濟法友托鉢養母序後戊子仲秋慈濟法友乞余重書前序余於是反躬自責不勝涕淚交流也豫少有養志之願年二十而喪父恨徹終天草四出家捨母不養蓋欲剋期取果用報親恩不謂草八歲母復捐世哀哀之痛肝腸寸裂然猶曰矢入深山冀得一當或可贖彌天罪愆耳逮三十一被道友牽逼漸罣名網而潛修密證之志益荒矣今者年滿五十先人棄我足三十年既不能如目犍連之自獲果證每思結一淨壇邀十友修淨土懺法無奈囊鉢蕭然拙於行乞每向中夜展轉悲號而慈濟乃以一鉢千家承歡膝下真不思議樂也善達緇素乃以粒米莖薪助渠孝養真不思議福也余無此福故無此樂宿生業重夫復何言敬於此福此樂深生隨喜以此隨喜善根普施法界有情同得此福此樂直至纍劫報親恩積因成正覺永離不肖無福無樂之苦於是拭淚而復書此
