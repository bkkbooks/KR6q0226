body:
  text: 序四贈劉今度序孔子曰聖人吾不得見見君子斯可矣又曰君子哉蘧伯玉邦有道則仕無道則可卷而懷之伯玉當衛靈之世烏睹有道則仕者然寡過未能述於使者冥不改節信於南子伯玉之為人千載下居然可見也秣陵劉今度殆吾世伯玉哉居士少以文學馳名魏國四子咸師事之儻志青紫如拾芥也淡然恬退以道自樂歲丁巳見無異禪師即畢志歸依取法名曰道澄癸未豫應普德請復與同志秉受八關齊法今復年三長齊且永事蔬食矣然蔬食稱道人者世亦不少吾何獨以居士為君子哉君子非有意異人人自弗能同也處困而亨敦仁尚禮貧能施為善無倦護持正法不露圭角是非賢否了了而不形諸口功成不居恂恂若木訥而為人謀必忠與人交始終若一視橫逆境似飄瓦虛舟雖曰未悟吾必謂之幾於道矣何俟拈拂豎指著語頌古而後稱宗摘句尋章分科釋義而後稱教也邪為高必因丘陵為下必因川澤居士充君子之基優入聖域夫何難此豫所佩之深而望之切者書此為贈贈張興公序論語開章即明時習之學而孔門稱好學者不過顏子一人學之道固難言哉老聃謂為學日益為道日損夫學與道果可岐也何以稱大學之道也不遷怒不二過損乎益乎親民止至善益乎損乎風雷益君子以見善則遷有過則改山澤損君子以懲忿窒欲懲忿窒欲改過之大者也過改則復於本善名為遷善非別有善可遷故明損益不二者可知為學為道之一致矣世之言學者不然習詞章攻舉業以取富貴也摹字帖精詩文以成名士也考古今博典籍以騖多聞也究兵法商政治以立事功也尚氣節敦廉信以明高潔也談名理闢釋老以續儒焰也看公案著語録以附禪宗也守丹田調呼吸以固形神也嘻天下國家可均也爵祿可辭也白刃可蹈也聖賢仙祖亦可襲而似也顧孔顏之學不存焉故曰中庸不可能也然中者喜怒哀樂未發之謂庸者喜怒哀樂發皆中節之謂發皆中節則恆止恆一不違於未發之中不遷不二則戒慎恐懼善復於止一之體夫止一之體聖凡平等故為天下大本而中節之和必從戒慎恐懼乃克致之是故孔子大聖人也猶以德之不修學不講聞義不能徙不善不能改為憂豈故作謙辭誠知心體本妙學力未易窮盡耳故曰發憤忘食樂以忘憂不知老之將至五十以學易可以無大過天台師云研真窮妄名之為學真窮妄盡名為無學嗟乎無學非可浪階則斯學寧有已時逝者如斯之歎孔子之言學也深矣通乎晝夜之道而知死生尚無二致豈以老少異其心哉豫己巳見居士知為志學之士癸未應普德請居士日來聽法咨請尤多然舉業未放下學力蓋未專也乙酉冬豫居祖堂丙戌春居士來晤始專以斯學為務今望六之年更覺津津有味欲罷不能豫於金陵緇素求年彌高志彌篤不肯自封於一得者居士一人而已居士之好學惟豫喜之而豫之言學亦惟居士能深信之豫安得人人如居士者與之言學近可忘靈峰之癖遠可緩極樂之歸乃如居士者不可多得也豫是以念念思極樂時時憶靈峰也豫與居士不隔者學脈居士縱不能偕於靈峰泉石必將同我極樂珍池也夫金剛經偈論疏注序佛以一音演說法衆生隨類各得解得解雖別證理則同蓋三藏偏真已具四門四悉況無上圓詮摩尼普應衆色者乎如來於大般若中特宣金剛般若為發最上乘者說也最上乘何疑不破何住不臻疑能障理疑破則理自明理實無住悟理則住斯立是故無著約住位釋天親約斷疑釋互為表裏非止各出一見而已然兩論若不相蒙者由疑疑皆能障住住住皆有餘疑未可一往豎配云耳獨後世讀者若句義難通遂駕言直指以不立文字為高或徇逐講宣以私意附會為便如來微旨幾不可見矣疏園何老居士久遊紫柏大師之門故能獨取偈論沈思會通爰為疏注嘉惠後學述而不作信而好古真如來所使行如來事者與豫嘗謂無著天親深知佛法非等覺已下所能盡故於明住斷疑各示一隅用顯引而不發之妙後人知未冥理行未階真去無著天親遠甚乃欲妄自豎義不失諸著相滯名則流於掠空捕影幾何不成謗法之愆豈若即偈論而求之之為近也豫生平研討經論必本四依不喜近時意見穿鑿茫無根據故於疏注輒深隨喜亦願後之讀是書者因指得月不必紛紛更從事於異說而哆以為博也金剛般若會義序甚矣般若之難言也非言之難修行難也夫修行既難言之益不易已世未有目足不具能安隱入清涼池者然足力強目力或短目力遠足力或衰足強則到而後見目遠則望而先知解行之道何以異是故吾於古來釋金剛者不能無歎息焉如來一代時教以般若為宗要乃利根者聞四十九年常說般若鈍根者須歷阿含方等方始得聞若金剛一分又在大會八分之後如來為發最上乘者說其深遠微妙何啻橫嶺側峰無著顯住天親斷疑雖復難兄難弟春蘭秋菊於此經時行物生之全體亦僅一斑而已後人所證固不及西域二難所悟又不逮天台智者言愈繁道愈晦旨益淺辭益枝欲會真宗徒勞筆舌善夫宜之唐居士獨拈修行為會義之本也果能修行般若念念觀察諸法非法無非實相則種種文字皆糟粕亦皆可化為神奇矣是可與無聞比丘作頂門針也若夫棄水擇乳則在菩薩鵝王豫奚敢饒舌哉西方合論序唯大徹大悟人始可與談念佛三昧否則百姓之與知與能猶遠勝仁者見之謂之仁智者見之謂之智也達磨西來事出非常有大利必有大害嗚呼先輩幸得大利今徒有大害而已誰能以悟道為先鋒以念佛為後徑穩趨無上覺路者邪袁中郎少年穎悟坐斷一時禪宿舌頭不知者以為聰慧文人也後復深入法界歸心樂國述為西方合論十卷字字從真實悟門流出故絶無一字蹈襲又無一字杜撰雖台宗堂奧尚未詣極而透徹禪機融貫方山清涼教理無餘矣或疑佛祖宗教名納老宿未易遍通何少年科第五欲未除乃克臻此殊不知多生熏習非偶然也傳聞三袁是宋三蘇後身噫中郎果是東坡佛法乃大進矣余每謂明朝功業士遠不及漢唐宋理學則大過之陽明一人直續孔顏心脈佛門居士唐梁肅宋陳瓘明袁宏道蓋未可軒輊也忠肅因初年偶疑金剛為泥人揩背語遂為禪者所笑試讀彼三千有門頌可復笑乎中郎少年風流灑落亦為緇素所忽試讀彼西方合論可復忽乎嗚呼今人不具看書眼何怪乎以耳為目也哉特集吳門所刻標注并為評語以表彰之重謀付梓用廣流通普使法界有情從此諦信念佛法門至圓至頓高超一切禪教律統攝一切禪教律不復有泣歧之歎也台宗會義自序或問蕅益子曰吾聞講法華者莫善於台宗智者大師妙悟後以不思議四無礙辨宣玄義文句章安尊者記為各二十卷不異阿難結集逮荊溪尊者又轉翼以釋籤及文句記於是教觀大明稱為中興烈祖依之修證得道如林聖人復起不能贅一辭矣曩見子綸貫跋亦云黃鶴樓詩李白閣筆今無故復事管城何哉蕅益子曰噫此豫萬不得已之苦心也方豫寓溫陵述綸貫也欲誘天下學人無不究心三大部也屈指十餘年矣舌敝耳聾曾不得兩三人正事教觀輒以浩繁而興望洋之歎儻不稍事節略則玄籤妙樂諸圓頓法甘使其終置高閣乎曰若是但節録文句及記例如妙玄節要可耳何更科易文竄入己意直名為會義邪曰是尤不得已也古者疏與經各行若經義奧發揮不厭深詳經文顯分科點示而已後人強以疏合經遂使經文句讀割裂今欲隨文演義而仍不傷經文血脈科安得不稍更乎智者大師辨才敷演章安結集雖全合大師之義未必皆是大師之文故筆力古朴不事雕巧惟久讀方知其妙初心之士對卷茫然文安得不稍易乎荊溪尊者精金百鍊文義俱深然微有六朝風氣稍拂時機至其闡泄言外之旨並非尋行數墨者所能知不幾亦為竄入己意乎夫法華經藏深固幽遠智者大師契其源豈盡宣其委章安尊者記其概豈盡録其詳即荊溪尊者闡其要亦豈盡析其曲折哉茲以凡愚千慮一得用逗時機安得避背古之嫌不竭寸明附竊取其義之科也邪知我者其惟會義罪我者其惟會義已重治毗尼事義集要自序豫生於萬曆己亥五月初三日亥時至壬戌五月七日剃髮出家是為二十四歲次臘受具戒於雲棲和尚像前又次年受菩薩戒於和尚塔前二十七歲春閲律一遍録出事義要略僅百餘紙次夏第二閲律録成四冊次冬第三閲律成六冊計十八卷三十二歲夏為壽昉楫三友細講一遍添初後二集共八冊次年金臺法主梓於皋亭之佛日寺是冬在靈峰僅講七卷次夏方續完聽者十餘人惟徹因比丘能力行之次夏在金庭西小湖寺徹講一遍聽者九人能留心者惟徹因自觀及緣幻大德耳次冬在吳門幻住菴又講一過聽者五六人惟自觀僧聚二比丘能力行之三十八歲入九華四十歲入閩四十四歲至苕城從此十三四年無有問者徹因自觀僧聚三人又皆物故毗尼之學真不啻滯貨矣五十一歲冬從金陵歸臥靈峰次夏乃有發心學律者十餘人迫豫重講因念向所輯雖諸長並採猶未一一折衷又問辨音義二書至今未梓不若會入集要而重治之兼削一二繁蕪以歸簡切庶鈍根者亦不致望洋也重刻寶王三昧念佛直指序念佛三昧所以名為寶王者如摩尼珠普雨一切諸三昧寶如轉輪王普統一切諸三昧王蓋是至圓至頓之法門也始自華嚴終至法華一代時教無不讚揚此寶王三昧始自文殊普賢乃至永明楚石一切菩薩聖祖無不修證弘通此寶王三昧而世之昧者猶以為自性彌陀非即樂邦教主唯心淨土不在十萬億西妄認六塵緣影為自心相全不知十方法界一一無非即心自性也可不哀哉元末明初鄞江有大善知識厥名妙協深憫邪見述為念佛直指二十二篇世久失傳雲棲老人欲見之不可得神廟年閒古吳萬融禪伯偶於亂書中得此遺帙與唐飛錫法師所撰寶王論同為一編皆雲棲老人所未見也韓朝集先刻寶王論於雲棲豫續刻此板留佛日今車蔤蕃居士更續刻於長干特記之以告後賢偶拈問答自序憶癸酉秋過菰城季清程居士家遇雪庭禪師庭謂豫曰禪者教之綱領教之根本也今教家不信有禪猶取網而無綱攀枝附葉而無根本抑何惑哉豫應之曰師真至言也夫禪者教之綱教者禪之網也禪者教之領教者禪之襟裾袖襬也禪者教之根本教者禪之枝葉花果也教家捨其綱領根本固為大惑今禪士復棄網而獨存一綱棄襟裾袖襬而獨存一領棄枝葉花果而獨存一枯樹樁不尤惑乎庭無語嗟嗟禪與教如何可分從上諸祖未有敢離經一字者從上諸大教主未有不透徹心宗得大機用者奈何末世視作兩塗真可哀矣豫每講次必極力拈提綱領根本以示人而罕知薦取又曾作三頌露此消息而昧者猶謂尚是教意未是宗意嗚呼宗意果離教意不竟同魔說乎今更捏餈團作胡餅以療呱呱之泣且道畢竟是宗是教咄癡人前不得說夢贈鄭完德念佛序嘗讀十六觀經云諸佛正遍知海從心想生是故衆生心想佛時是心即是三十二相八十種好是心作佛是心是佛噫此真念佛三昧之祕要也蓋但言作佛不言是佛則謂佛非固有何異權乘但言是佛不言作佛則謂佛非修證何殊魔外故大佛頂經發明世出世法知其本因隨所緣出夫知其本因則十界無不即心而是謂佛界非心是乎隨所緣出則十界無不由心而作謂佛界非心作乎豫己巳晤千里鄭老居士見所繪聖像微細精妙巧逾天工恍悟心作心是之旨長公完德尤窮工極緻完德久參念佛是誰公案豫謂苟信是心作佛是心是佛二語而更參誰字可令人捧腹大笑大集經偈云若人但念彌陀佛是名無上深妙禪至心想像見佛時即是不生不滅法大勢至法王子云憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開永明禪師云一念相應一念佛一日相應一日佛壽昌禪師云念佛心即是佛夫何疑哉夫何疑哉鄭千里老居士集序人不立志為聖賢佛祖則富貴淫之貧賤移之威武屈之遇得意欣然志滿遇失意紛然怨尤求能自反自訟自安自得者鮮矣況隨事自覺覺他也哉吾細讀千里老居士稿知其非山人詞客蓋謫仙而歸心大覺者也生平繪普門像最多像必有讚布袋像亦然讚必警發迷情其詞切至令人毛骨悚然次多達磨像像讚必敲擊向上一路令人因指見月繪山水必詠詠皆清脫迥超情纍非詞句能到也而豫尤服膺者則在自勸自警自悔自咎諸句良以其心念念欲入山修道幻緣未遂不免齎志長往嗚呼苟不與老居士同一出世胸懷安知其生平之苦苟不知其生平之苦又安知其真思出世哉長公完德知父志令豫次其稿傳之首普門讚次布袋讚次達磨讚次題畫諸詩其他鞭影圖天鼓音圖等繡棗別行茲不重出試展玩之真謫仙歸心大覺決非世閒山人詞客也嗚呼佛道長遠只在目前雖在目前曠大劫行終不可盡世有不知其難者恐未曾實悟其易者耳千翁已知其難雖欲不謂之已悟其易豈可得乎善論人者謂千里品格丰致不在與可南宮下也江寧紀帳後序心性一耳而危微異焉異者猶冰之與水也溼性不可得而異也惟異故上智安富尊榮下愚貧窮困苦惟不可得異故上智必以下愚為興慈運悲之地下愚必藉上智為救苦免難之主華嚴云因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺一切菩薩若無衆生必不能成無上菩提旨哉其言之矣辛卯春長干浹旬霪雨民不聊生蓋自作之孽也制臺馬公及王危諸公憫茲無告設賑粥場一十餘所凡經百日共捐萬金之外濟饑民七十餘萬嗟乎非仗此不可得異之性何由使命將絶而仍續身濱死而復生乎且食粥頃縱頑冥無不知口稱佛號心感慈恩者只此一餐便結未來成佛勝緣金剛種子決不可壞非普門示現宰官行菩薩道奚能轉罪為福轉災為祥若此神速也雖然民未厭罪天未厭亂上挽天意下拯愚民惟有力大人是賴豫既深慶是舉尤望恆有是舉尤望莫不如是舉則庶幾風雨順時可永無用是舉矣維摩經提唱略論序經云諸佛解脫當於衆生心行中求顧衆生心行萬別千差心行多解脫亦多解脫不可思議心行亦不可思議乃世之求解脫者罔不墮在思議窟中釋迦安得不示生維摩安得不示疾哉示生示疾至法華而權實始融乃正法既遠像季學者各師其心各安所習視不二法門若冰炭然縱有證悟法執未忘猶將性相分河南北異幟況依通者乎嘗觀古來注述有得大綱似漢者有得萬目似唐者至欲追成周禮樂捨智者大師一人指未易屈似漢者能提醒人使直下受用其弊狂似唐者能軌範人使平易穩當其弊支是故兩家著述合則雙美執則無非病耳明神廟年閒維揚真一道人號無用者居武林法華山名其菴曰西方法嗣未詳種種著述大似方山手筆儻無夙根及悟門斷不能湊泊一字惜未遇本色鉗錘不免為漢雜霸道然痛快直捷較近世著述什伯過之維時一二大老並矜細行能令推崇者衆如紫陽及門士反以象山為禪學而排斥之嗟嗟象山不可泯於後世無用何可沒其生平哉試平心易氣勿主先入之言讀此維摩提唱略論謂非方山法脈吾不信也白璧不以微瑕掩合抱不以尺朽廢大醇小疵非諓諓文字之學可比也感深今昔歎息為之序楞伽義疏後自序猶憶初發心便從事禪宗數年後涉律涉教著述頗多獨此楞伽擬閲藏畢方注壬辰結夏晟溪無處借藏乃以六月初三日舉筆至八月十一日閣筆於長水南郊之冷香堂僅閲七旬而佛事魔事病障外障殆無虛日易三地而槁始脫嗟嗟屈指諸述何順且易楞伽一疏何其逆且難也得無自覺聖智法門正破末世流弊有以激波旬之怒邪然波旬能俾豫席不暇暖而不能撓豫襟期阻豫筆陳則豫必當化彼波旬同成佛道維摩所謂邪魔外道皆吾侍者豈不信哉豫愧為虛名所誤犯達磨明道而不行道之記然猶愈於說道而不明道也賢達苟能因語入義如燈照色庶不負豫損己利人之苦心耳刻較正大阿彌陀經後序阿彌陀佛以法界藏身示居西方樂土只此微塵樂土含攝華藏無邊剎海不可思議所謂權實不二法門遍入一切衆生心想不墮一切衆生情計者也十方諸佛同共稱揚寶積大會叮嚀勸往別本流行凡經四譯有宋王龍舒居士未睹寶積善本輒會四譯棄短取長名大阿彌陀經舉世流通千餘載矣壽生菴萬融尊宿得坊閒舊本較南北二藏文理俱優公諸孫刻之此即法藏願輪古今一致者也書經者為貞明王居士豫過吳門為正其句讀云合刻彌陀金剛二經序非淨非穢般若之體知淨知穢般若之照取淨捨穢般若之用是故不以般若為導能生淨土者未之有也不以淨土為歸可稱般若者未之聞也或曰彌陀部屬方等金剛部屬般若時教既殊旨歸豈一余曰甚矣見之固也如來一代教法除聲聞藏餘皆名大乘方等經典般若安得非方等乎從成道夜至泥洹夜於其中閒常說般若方等安得非般若乎況淨土玄門理無不該事無不攝從華嚴寶積大集般若乃至法華無不導歸安養只此安養具足橫豎四種淨土而四種淨土並不離現前一念介爾之心非橫非豎亦橫亦豎是故經云莊嚴佛土者即非莊嚴是名莊嚴此唯心淨土之誠證也末世執迷不達心性本來無外說唯心便撥淨土說淨土便昧唯心安知西方極樂廣徹華藏華藏莊嚴不出心性也哉無我開士合刻彌陀金剛二經特序之鮑性泉天樂鳴空集序豫讀易傳至天地閉賢人隱未嘗不掩卷長歎息也自金神現夢正法東傳大善知識乘時利見者不可悉數降自宋元則冒竊名位者日多得正知見者日寡矣故雲棲老人每歎支那國裏覓一須陀洹人不可得亦有激言之也竊謂求果證於衆所知識誠不易苟求於隱跡韜光或不無但愧乏濟勝具未能遍歷寰區以訪之耳邇來禪道僭濫余不忍見聞無論果證絶響雖路頭端正者亦不易得每每中夜痛哭流涕故獨於袁石公西方合論深生隨喜謂之空谷足音客冬過檇李王止菴以鮑性泉所著天樂鳴空集見示性泉山陰人鬻楮初禮紫柏大師師教以熟讀楞嚴法華遂乞名筆書細楷梵冊鏤板流通嗣復肆志於華嚴合論大乘止觀傳燈宗鏡諸録與湛然禪師盤桓後乃歸依雲棲大師坐脫超登蓮土噫甚希有矣集為陶石梁居士所閲付其友錢永明永明臨化以授止菴止菴攜之隨身往還塗將萬里時逾十年謀梓未就故豫得展閲原稿方信正知見人雖難得於衆所知識猶不無隱跡韜光者也其立論大約以明心見性為急以悟後修行為正蓋深得合論之旨兼登宗鏡之堂堪與末世狂禪為頂門針無怪乎狂禪惡其害己反謗為別一路頭耳嗟嗟鮑君在安養國遙聞此語當亦為之解頤也夫西有寱餘自序楚石大師示寂謂夢堂曰我去也堂曰何處去曰西方去堂曰西方有佛東無佛邪師震威一喝而逝豫愧無楚師之德切有楚師之志然四十九年之非悔已無及今年五十猶寱言不止不亦可哀邪莊生云且有大覺而後知此其大夢也既未大覺寧免夢語大佛頂經云譬如有人熟寐寱言是人雖則別無所知其言已成音韻倫次令不寐者咸悟其語豫殆似之生平著作自丙子春前裒為淨信堂初集戊寅秋前裒為絶餘編壬午夏前裒為閩遊集丁亥冬前裒為淨信堂續集皆寱言也戊子孟春寓蕅華塢凡筆興所至隨付侍者存之名曰西有寱餘百世而後有不寐者未始不旦暮遇之也選佛譜自序選佛之語始於禪客點悟丹霞而選佛圖傳創自捺麻僧也學士解縉作升官圖故捺麻僧作選佛圖必應博諳教乘深知禪律未有不達法門中事輒敢師心自創立者惜其失傳無從得見萬歷己未曾於留都購一升佛圖絶無倫次甚為可嗤癸亥於武林隨喜一選佛圖乃幽溪無盡大師所作具顯十法界升沈之致足稱盡美乙丑於松陵睹一圖統收三教而理致不清亦無足取己巳幻寓靈谷有別以一圖相示者云是捺麻作而文理尤為不通恐決非舊物特愚妄者之託名耳事不獲已訪幽溪意自製一圖兼增凡聖因行及種性差別以彰不一之機設無根信位及大權護法以開圓轉之路逆惡猛心準觀經而許歸淨土阿鼻極苦依華嚴而徑登兜率諸天有降德貶墜之苦無色有窮空輪轉之殃皆本教乘非出臆見又幽溪僅用佛骰一輪故升沈迥隔此用四輪齊擲故轉變無方辛未梓行吳地流通已廣次於古杭西山別見二圖亦未全美故皆不傳辛巳寓漳南每思吳門所刻猶有未允當處復改一圖擲用六輪方得一界還造十界一擲備顯升沈癸未刻之檇李然六輪一擲六字紛陳準折詳明方堪行動粗心浮氣之人每以為苦辛卯冬歸臥靈峰深念此圖利益能使人即遊戲閒頓知六道往還之疲苦三乘出要之差別猛切念佛求出苦輪誠為不可思議而幽溪一圖則失之簡豫向二圖並失之繁展轉反側竟夕不寐爰思但用二輪以為擲行方便既易於行仍多轉變復手書一圖緇素咸稱盡美盡善且啓豫曰此圖行真足令人通達一切佛法請更著譜以申明之庶俾愚者亦藉此了知世出世閒道理雖有智者亦不敢妄加增損於其閒也豫韙其說述譜如左裂網疏自序佛祖之道以心傳心菩薩造論通經亦唯此一大事故云十方諦求更無餘乘縱曲為群機從實施權說種種道如三草二木受潤不同而能潤之雨原只一味故云如食石蜜中邊皆甜又云粗言及細語皆歸第一義豈應封文失旨橫執名相剖判虛空也哉且如彌勒世尊跡居補處本必難思無著天親既是龍華輔弼與文殊普賢何異至馬鳴龍樹並金口授記傳佛心宗其所著述定不互相乖異乃後世講師輒妄判曰天親識論立相始教龍樹中論破相始教馬鳴起信終教兼頓並未是圓嗚呼其亦不思甚矣夫天親宗瑜伽而立唯識先以唯識破我法二執次明識亦如幻非真實有故亦名破色心論目之為立相教可乎龍樹依甚深般若遍蕩四性情執以顯法性故曰欲具足一切佛法者當學般若又曰若以無此空一切無所作以有空義故一切皆得成目之為破相教可乎馬鳴以一心真如門顯甚深般若隨智說以一心生滅門顯瑜伽八識隨情說真如即一真法界統事理而泯絶事理者也生滅即全理所成之事全事無性之理也二門不離一心無一生滅非全體真如無一真如不全具生滅即事事無礙法界也謂其不同唯識中論仍非圓極一乘可乎況經論中並謂真如與一切法如水與波不一不異誠證具在何容偏執蓋若言定一則真如不生滅應一切法亦不生滅或一切法生滅應真如亦生滅固不可若言定異則真如非即一切法之實性應在一切法外別有方隅不常不遍尤為不可故起信謂真如受熏者譬觸波時即觸於水所以破定異之執初未嘗言真如隨熏轉變也唯識謂真如不受熏者譬波動時溼性不動所以破定一之執初未嘗言別有凝然真如也唯識論云不同餘宗離色心等有實常法名曰真如又云真如即是唯識實性明文彰灼若此後人乃以凝然真如誣謗唯識罪何如哉然則唯識所謂真故相無別即起信一心真如門也俗故相有別即起信一心生滅門也楞伽經云諸識有三種相謂轉相業相真相宗鏡釋云起心名轉八俱起故皆有生滅故名轉相動則是業八識皆動盡名業相八之真性盡名真相由此觀之起信唯識皆宗楞伽明矣宗本既同則諸名義自不相違注疏家不能以義定名漫爾依名定義致令二論乖同水火可不哀哉此大乘起信論藏有二本唐本更文顯義順舊既流通梁本私心弗敢自專敬以鬮決於佛拈得宜解唐本遂殫一隙微明剖盡兩宗迷執門人成時請名為裂網疏幻遊雜集自序癸巳之春單丁行腳戒子堅蜜邀入新安結夏冬於歙浦覽湯泉白嶽之勝於深秋甲午春從武林菰城而入靈峰屈指匝一歲中大半禁絶應酬唯今春筆墨汗漫而存稿十不及三既臥藏堂偶一簡視不滿四十紙故不復分門別類唯依時之先後以為次第名幻遊雜集云閲藏知津自序心外無法祖師所以示即法之心法外無心大士所以闡即心之法並傳佛命覺彼迷情斷未有欲弘佛語而可不知深究佛心亦未有既悟佛心而仍不能妙達佛語者也今之文字阿師拍盲禪侶竟何如哉嗚呼吾不忍言之矣昔世尊示涅槃初祖大迦葉白衆云如來舍利非我等事我等宜先結集三藏勿令佛法速滅嗟嗟儻三藏果不足傳佛心初祖何以結集為急務邪竊謂禪宗有三藏猶奕秋之有棋子也三藏須禪宗猶棋子之須活眼也均一棋子也善奕者著著皆活不善奕者著著皆死均此三藏也知佛心者言言皆了義不知佛意者字字皆瘡疣然為懲隨語生見遂欲全棄佛語又何異因噎廢飯哉夫三藏不可棄猶飲食之不可廢也不調飲食則病患必生不間三藏則智眼必昧顧歷朝所刻藏乘或隨年次編入或約重單分類大小混雜先後失準致展閲者茫然不知緩急可否故諸剎所供大藏不過僅存名句文身封緘保護而已無由令閲者達其旨歸辨其權實佛祖慧命真不啻九鼎一絲之懼唯宋有王古居士創作法寶標目明有蘊空沙門嗣作彙目義門並稱良苦然標目僅順宋藏次第略指端倪固未盡美義門創依五時教味粗陳梗概亦未盡善旭年三十發心閲藏次年晤壁如鎬兄於博山諄諄以義類詮次為囑於是每展藏時隨閲隨録凡歷龍居九華霞漳溫陵幽棲石城長水靈峰八地歷年二十七祀始獲成槁終不敢剖判虛空但藉此稍辨方位俾未閲者知先後所宜已閲者達權實所攝義持者可即約以識廣文持者可會廣以歸約若權若實不出一心若廣若約咸通一相名為閲藏知津云法海觀瀾自序子輿氏曰觀水有術必觀其瀾況大藏法海甚深無量不得其術何以觀之哉統論修證法門浩若塵沙非止八萬四千而已然五門收之罄無不盡何者欲遊佛海先資戒航戒淨則解行可遵行圓則祕密斯證證入則依果自嚴故首律宗明造修之始次諸教明開解之塗次禪觀明實踐之行繼密宗明感應之微終淨土明自他同歸之地也中峰本公謂密咒如春教乘如夏南山律宗如秋禪宗如冬一往似當再研未必盡然剋論諸宗當究旨歸不取跡象禁咒祕密如冬令生意含於未發豈全似春戒為佛法初門儒不學禮無以立釋不受戒不許聽教參禪如春令草木萌甲安得似秋豈謂佛制毗尼似蕭何制律遂擬以肅殺之氣邪禪於無修證中妙論修證無證而證則體含萬用可擬冬無修而修則刊華就實正似秋耳教乘如夏吾無閒然只此四門罔不以淨土為歸亦猶土之寄王四時也夫大小兩乘皆首戒律而大必兼小小不兼大南山不敢自稱大乘不應以南山名宗但云律宗如春可矣教亦自有大小兩乘西土每分此土晉魏以來或分或兼今皆獨弘大乘復有三家一天台宗二賢首宗三慈恩宗天台教觀齊舉教可如夏觀即如秋賢首教多觀少清涼收禪為頓教圭峰自立三教以對三宗則三教如夏三宗如秋慈恩弘唯識自修兜率觀門基公略示唯識五觀未嘗剋實勸修然夏後定有秋是在學者自知領會而已故且云諸教如夏也禪亦自有大小兩門於大乘中復分頓漸小及大漸此所不論達磨承佛教盛行之後特來指示心要如畫龍點睛令其飛去乃至六祖無不皆然雖藉楞伽金剛印心未嘗廢教而貴行起解絶不許坐在知解窠臼故與台宗圓妙止觀同如秋也密宗唯大乘法身入壇結密印口誦密言意專密觀名三密法門若論初修之者必先持淨戒發菩提心解法界理方許入壇剋期取證亦由春夏而入秋今約諸佛所說神咒不許翻譯唯令持者立地證入又令聞者乃至遇影蒙塵皆成究竟解脫種子故但云密宗如冬也淨土者三德祕藏常樂我淨究竟安隱之處所謂常即法身寂即解脫光即般若非一非三而三而一不縱不橫不並不別不可思議不二而二故全依即正名為佛身全正即依名為淨土秖此常寂光法性身土全體迷之而為三界六道偏證取之而為聲聞緣覺權位菩薩隨分悟之而為三賢十聖所以諸佛為實施權不動法性垂下三土為接三賢十聖示實報淨土為接聲聞緣覺權位菩薩示方便淨土為接三界六道凡夫示同居淨土而諸衆生根性不同樂欲亦異或因持三聚戒而淨四土或因習教解甚深義而淨四土或因禪觀直悟自心而淨四土或因專修三密傳持咒印而淨四土或唯一門而淨四土或二門三門四門而淨四土如世閒草木華果或生長熟脫於冬或唯經一時即熟脫或經二時三時乃至具經四時得熟脫故須云淨土如土王四時也夫八萬四千乃至塵沙法門未有不具戒者未有不正解者未有不篤行者未有不證密者未有不歸淨土者故曰五門收之罄無不盡也然則無解行之戒非戒也無戒行之教非教也無戒教之禪非禪也無戒行及禪之密非密也非戒非教非禪非密則非淨土真因也非有四種淨土則戒教禪密無實果也非真因實果則不顯非因非果之心性也不顯心性則無以觀法海甚深無量而徹其涯底故以五門之瀾為觀法海之術願與同志者共之幻住雜編自序憶自辛未冬初入靈峰今閲二十四載矣幻緣不定出入多番僅於此結辛未冬壬申夏癸未夏甲申冬己丑冬庚寅夏耳癸酉甲申之春及辛卯冬皆暫入旋出席不暇暖不亦深負山靈也乎甲午仲春晦日從新安歸始克痛謝他緣畢志安臥客歲名幻遊今應名為幻住也偶有所述名幻住雜編
