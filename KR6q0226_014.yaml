body:
  text: 古歙門人成時編輯普説祖堂幽棲寺丁亥除夕普説諸昆仲欲復本來面目須破我法二執欲破我法二執先懲流俗知見何謂流俗知見今人一出家參學便要做善知識只此豈非我執又或以律非教以教斥禪以禪藐教輕律豈非法執縱使和融不互相非亦罕兼善且律師不問何等根性概要人持律法師不問何等根性概要人聽經宗師不問何等根性概要人參禪豈非我法二執殊不知禪教律三皆如來隨機所説豈有死法吾今為諸昆仲徹底説破若真為生死持戒持戒亦必悟道真為生死聽經聽經亦必悟道真為生死參禪參禪亦必悟道真為生死營福營福亦必悟道專修一法亦悟道互相助成亦悟道以因地真正故也若想做律師受戒想做法師聽經想做宗師參禪想有權勢營福則受戒聽經參禪營福必皆墮三惡趣故智者大師云為利名發菩提心是三塗因毫釐有差天地懸隔錯認定盤星醍醐成毒藥今受戒聽經參禪營福之士口中亦説真為生死心中未知生死大苦火燒眉毛且圖眼下殊不知無始劫來頭出頭沒枉受多少辛酸即今幸得人身幸成僧相亦經過多少艱苦然猶未肯猛省發心此與燕雀處堂何異且如今夜臘月三十古人以喻大命盡時何等迫切今人且歡呼茶飲曾不思百歲光陰尚存幾許豈不痛哉豫出家時母舅謂曰法師世諦流布吾甥決不屑為將必為善知識乎豫曰法師是烏龜善知識是忘八總不墮此坑塹舅曰畢竟何為豫曰佛且不為況其他也舅曰既爾何用出家豫曰只要復我本來面目舅乃歎善嗟嗟豫初志若此尚被虛名所害不滿本志深以為恥況初心便要做善知識者邪假使做得一箇世諦善知識濟甚麼事名利日重正法日衰壞周室者齊桓晉文耳又吾眼見耳聞諸善知識唯紫柏大師一人已證無生已得自在其餘大老建叢席立規條廣大周詳名滿海內者臨命終時俱未免牽纏係戀反不若我憨翁大師及幽溪師伯晚年一味默修不管叢林中事皆得脫然坐逝又不若彼雪庭禪師靈源法師一生不拘小節臨終亦得瀟然故知門庭施設不惟無益本分正復縈絆殺人吾憾障深力薄戒品尚多缺略持名猶屬散心然既深知生死過患故決不敢裝模作樣大膽欺心今二年聚首不久擬別故盡力抖擻屎腸為諸昆仲作此最後警策伏惟著眼珍重歙西豐南仁義院普説諸仁者生死事大無常迅速生不知所從來死不知所從去是分段生死苦念念遷流剎那不住是變易生死苦此二種苦但是生死枝流未是生死根源如何是二種生死根源不了一真法界不覺念起而有無明妄於平等性中分能分所分色分心分為無為分漏無漏分依正分因果分善惡分苦樂分內外分大小乃至種種虛妄分別便是變易生死根源不知一切法因緣無性妄計我人衆生壽者等種種知見妄起貪瞋癡慢等種種煩惱便是分段生死根源此二種根源總不離現前一念虛妄無明而虛妄無明正眼觀來不在內不在外不在中間不在過去不在現在不在未來非青黃赤白非長短方圓非聲香味觸法非眼耳鼻舌身意當下即是真空實相但由衆生不了自生迷倒流轉無窮所以諸佛出現祖師西來直指人心見性成佛無非破此二種根源秖如二祖見初祖云我心未安乞師安心初祖云將心來與汝安二祖良久云覓心了不可得初祖云與汝安心竟只此覓心了不可得一語大須著眼莫似鸚鵡禪但能學語我且問你既了不可得又誰為覓心者且如現前此身不出地水火風空識六界身中堅相是地界溼相是水界暖相是火界動相是風界骨節毫竅及腑臟疏通處即是空界見聞覺知分別妄想是心識界若謂堅相能覓心者則大地皆能覓心溼相能覓心者江河海水皆能覓心暖相能覓心者燈灶火乃至劫火皆能覓心動相能覓心者大小風乃至毗嵐亦能覓心空界能覓心者現前虛空亦能覓心見聞覺知能覓心者又喚甚麼作見聞覺知眼如葡桃朵耳如新卷葉鼻如雙垂爪舌如初偃月身如腰鼓顙都是色法如何能見能聞能嗅能嘗能覺意如暗室見昏擾擾相自不明了如何能知見聞覺知既不可得安能覓心如是地水火風空識六界皆不能覓心畢竟誰為能覓心者若是箇有血性的男子到者裏分疏不下體會不來決要討箇分曉拶到水窮山盡處如銅牆鐵壁相似老鼠入牛角直至沒興路頭窮向有意無意間忽然打失娘生鼻孔方知能覓所覓果然了不可得方是宗門最初一步若謂此外別有修行便是天魔外道若謂此後更無修行便當朝打三千暮打八百貶向阿鼻地獄何以故如二祖半世弘法將大法付與三祖後更復混迹塵寰濫同乞士以自調心咄既覓心了不可得何故又説調心終非二祖前後自語相違當知此事大不容易溈山祖師云此宗難得其妙切須仔細用心可中頓悟正因便是出塵階漸生生若能不退佛階決定可期古來宗匠於此一大事因緣何等慎重真切豈似末世穢濁狂禪才得一知半解便向人前妄開大口自誑誑他壞我祖意貽禍無窮當知若從了不可得處安心則更無一物可貪即是隨順修行施波羅蜜更無一塵可染即是隨順修行戒波羅蜜更無人我是非可論即是隨順修行忍波羅蜜更無懈怠夾雜即是隨順修行精進波羅蜜更無散亂妄想即是隨順修行禪波羅蜜更無顛倒愚癡即是隨順修行般若波羅蜜者箇方是應無所住而生其心除此心性法門外何處有戒可持有教可看有禪可參況如來所制大小律儀皆為斷除現在未來有漏直下安心本是至圓至頓如來所説一代時教皆是破除我法二執直下安心亦是至圓至頓祖師千七百則公案皆是隨機設教解黏去縛斬破情關識鎖直下安心亦是至圓至頓若不能斷有漏法即不知戒意不能破我法二執即不知教意不能斬破情關識鎖即不知祖師西來意既不知戒意教意祖意縱三千威儀八萬細行性業遮業悉皆清淨止是人天小果有漏之因縱三藏十二部無不淹貫談説五時八教權實本迹皆悉明了止是貧人數他寶身無半錢分縱公案爛熟機鋒轉語頌古拈古上堂普説等一一來得秖足長慢飾非欺誑人天皆所謂因地不真果招紆曲邪人説正法正法亦成邪故圓覺經云末世衆生無令求悟唯益多聞增長我見但當精勤降伏煩惱未得令得未證令證此之謂也諸仁者出生死事大不容易蕅益道人二十四歲出家真為生死大事真不著一毫意見真不用一點氣魄真不為一些名利只因藏身不密為一二道友所逼功用未純流布太蚤遂致三十年來大為虛名所誤直至於今髮白面皺生死大事尚未了當言之可羞思之可痛所以平生誓不敢稱證稱祖犯大妄語誓不敢攝受徒衆登壇傳戒邇來并誓不應叢林請開大法席蓋誠不肯自欺自誤故也今玄邃吳居士普為緇素特請開示超生脫死法門蕅益自實未曾超生脫死如何可開示人然既同在生死海中幸於出生死法頗知真正路頭故不妨與諸仁者平實商量最初一步果欲超生脫死第一不得意見卜度第二不得氣魄承當第三不得雜名利心適閩之南適燕之北路頭一錯愈趨愈遠此實言言血淚字字痛心秖恐愁人莫向無愁説説與無愁總不知耳諸仁者還知愁麼佛言得人身者如爪上土失人身者如大地土一口氣不來便向驢胎馬腹胡鑽亂撞動經千生百劫得出頭來知是幾時況末世邪師説法如恆河沙一盲引衆盲相牽入火坑故永明大師云無禪有淨土萬修萬人去有禪無淨土十人九錯路我憨翁大師又云今時若有禪無淨奚止十人九錯敢保十一箇錯在此皆深慈大悲真語實語伏願諸仁者莫墮狂野覆轍直須痛念無常信願念佛求生淨土此生不向今生度更向何生度此身珍重歙浦天馬院普説華嚴經云若人欲了知三世一切佛應觀法界性一切惟心造金剛經云一切有為法如夢幻泡影如露亦如電應作如是觀當知二偈旨趣無別既惟心造皆是有為既惟有為皆如夢幻然有為有二一有為有漏即六凡法界二有為無漏即四聖法界十界聖凡雖別究竟皆惟心造而有為有漏如夢幻有為無漏順法性故非夢幻也何謂六凡皆唯心造若一念與上品十惡相應則法界舉體而為地獄一念與中品十惡相應法界舉體為畜生一念與下品十惡相應法界舉體為餓鬼一念與下品十善相應法界舉體為修羅一念與中品十善相應法界舉體為人道一念與上品十善相應法界舉體為天道此六道者不但三塗及下界人天生死往還如幻如夢假饒非想非非想處不免墮落空亡皆如夢幻也何謂四聖皆唯心造若能知苦斷集慕滅修道勤修戒定慧品得證偏真涅槃則法界舉體而為聲聞能諦觀流轉還滅十二因緣而得覺悟則法界舉體為獨覺能以先知覺後知先覺覺後覺廣修六度萬行自利利他則法界舉體為菩薩菩薩復有四種若依生滅四諦發四弘誓願三大阿僧祇劫伏惑度生即是藏教菩薩依無生四諦發四弘先斷正使扶習潤生度如幻衆即通教菩薩依無量四諦發四弘不但化度六凡出分段生死兼度三乘權聖出變易生死即別教菩薩若能徹悟現前一念心性本自豎窮橫遍衆生迷之舉體為集苦而此心不減諸佛悟之舉體為道滅而此心不增妙心雖同迷悟懸隔遂依無作四諦發無上菩提心稱性修行六度萬行自覺覺他即是圓教菩薩此四種菩薩所修福智便名有為無漏況功行圓滿同歸無上菩提則法界舉體而為四智菩提無漏身土盡未來際利樂有情豈可亦謂之如幻如夢乎然四聖中二乘雖出生死但證偏真不達心性全體僅名有為無漏諸佛菩薩能證心性全體故約全性起修即名有為無漏可也若約全修在性即名無為無漏可也金剛經如幻如夢者為破凡外二乘我法二執言之夫夢境雖空而夢心即是覺心幻事雖虛而幻本亦不全虛泡雖無實而非無水影雖無實而非無質則知六凡生死往還雖如幻夢而佛性亦不斷滅但日用不知耳菩薩了知現前一念心性亙古亙今本不生滅上等諸佛下等衆生雖欲不上求下化不可得也然雖發大菩提心無始虛妄無明習重觀力輕微恐易退轉必須將此圓解專念阿彌陀佛求生極樂世界蓋吾現前一念心性既本豎窮橫遍則本具無邊剎海於我心性無邊剎海中實有十萬億剎外之極樂世界實有現在阿彌陀佛先證心性慈悲接引一切迷流我今以此菩提心力稱彼名號便與阿彌陀佛如空合空水合水故稱名一聲即一聲一心不亂稱名十聲即十聲一心不亂乃至稱名七日即七日一心不亂以正稱名時更無二心更無可亂故也或謂十惡五逆臨終十念尚得往生何必平日矻矻稱名此大不然經云十惡五逆得往生者必過去曾種菩提種子若無菩提種子何能遇善友縱遇善友勸發亦何能頓生信願稱念弘名邪故凡修心淨業之士急須薦取妙心發菩提願稱念阿彌陀佛雖不斷惑亦能帶業往生橫超三界乃不可思議法門十方諸佛以無量舌無量音歎此法門猶莫能盡應當諦信而力行之今篁南聖河吳居士與堅密法友特為令先慈成淨優婆夷洪太孺人請説法要敬為拈出茶話答卓左車茶話原問博山啓附上堂則超佛越祖接衆則權引中下此流俗宗匠未悟心法者所必墮之窠臼致禪教律及淨土諸法俱失綱宗俱成實法智者無所適從愚人蔑棄一切有自來也佛言若人專念彌陀佛是名無上深妙禪如今弄虛頭逞精魂漢一味胡言亂語定不如真實參究念佛底人寧為上上人撥無淨土令悟土即心不應為中下人收作權乘破壞真法況法王於法自在隨時應機自無陳見何必依他古宿揚禪抑淨伏乞豎吹毛劍擊塗毒鼓大轉法輪如何是念佛門中通身入理向上一路直踏毗盧頂上行作略如何是學人初下手時便離四句絶百非念佛如何是念佛人最後極則淆訛處腦後一鎚從來宗門語句壁立萬仞一涉淨土定屬廉纖冀和尚將向來自性彌陀惟心淨土等語撇向一邊親見如來境界快説一番震動大千世界宗乘與淨土二俱勝妙法衆生根性異不免隨機説向上一著非淨非禪即禪即淨才言參究已是曲為下根果大丈夫自應諦信是心作佛是心是佛設一念與佛有隔不名念佛三昧若念念與佛無間何勞更問阿誰故參究誰字與攝心數息等皆非淨土極則事也淨土極則事無念外之佛為念所念無佛外之念能念於佛正下手時便不落四句百非通身拶入但見阿彌陀佛一毛孔光即見十方無量諸佛但生西方極樂一佛國土即生十方諸佛淨土此是向上一路若捨現前彌陀別言自性彌陀捨西方淨土別言惟心淨土此是淆訛公案經云三賢十聖住果報惟佛一人居淨土此是腦後一鎚普賢十大願王導歸極樂誰敢收作權乘憶佛念佛不假方便自得心開誰謂定屬廉纖但能深信此門依信立願依願起行則念念流出無量如來遍坐十方微塵國土轉大法輪照古照今非為分外何止震動大千世界而已欲知納僧家事不妨借中峰一偈通箇消息偈曰禪外不曾談淨土須知淨土外無禪兩重公案都拈卻熊耳峰開五葉蓮示念佛法門念佛法門別無奇特只深信力行為要耳佛云若人但念彌陀佛是名無上深妙禪天台云四種三昧同名念佛念佛三昧三昧中王雲棲云一句阿彌陀佛該羅八教圓攝五宗可惜今人將念佛看做淺近勾當謂愚夫愚婦工夫所以信既不深行亦不力終日悠悠淨功莫剋設有巧設方便欲深明此三昧者動以參究誰字為向上殊不知現前一念能念之心本自離過絶非不消作意離絶即現一句所念之佛亦本自超情離計何勞説妙談玄秖貴信得及守得穩直下念去或晝夜十萬或五萬三萬以決定不缺為準畢此一生誓無變改若不得往生者三世諸佛便為誑語一得往生永無退轉種種法門咸得現前切忌今日張三明日李四遇教下人又思尋章摘句遇宗門人又思參究問答遇持律人又思搭衣用鉢此則頭頭不了帳帳不清豈知念得阿彌陀佛熟三藏十二部極則教理都在裏許千七百公案向上機關亦在裏許三千威儀八萬細行三聚淨戒亦在裏許真能念佛放下身心世界即大布施真能念佛不復起貪瞋癡即大持戒真能念佛不計是非人我即大忍辱真能念佛不稍間斷夾雜即大精進真能念佛不復妄想馳逐即大禪定真能念佛不為他歧所惑即大智慧試自簡點若身心世界猶未放下貪瞋癡念猶自現起是非人我猶自挂懷間斷夾雜猶未除盡妄想馳逐猶未永滅種種他歧猶能惑志便不為真念佛也要到一心不亂境界亦無他術最初下手須用數珠記得分明刻定課程決定無缺久久純熟不念自念然後記數亦得不記亦得若初心便要説好看話要不著相要學圓融自在總是信不深行不力饒你講得十二分教下得千七百轉語皆是生死岸邊事臨命終時決用不著珍重示念佛三昧念佛三昧名寶王三昧三昧中王凡偏圓權實種種三昧無不從此三昧流出無不還歸此三昧門蓋至圓頓之要旨亦三根普利之巧便也衆生心性一而已矣只此一心法爾具真如生滅二門正隨緣而不變名真如門即不變而隨緣名生滅門依真如門説圓實教依生滅門説偏權教離真如無生滅權是實家之權故可為實施權離生滅無真如實是權家之實故須開權顯實為實施權有藏通別教之三開權顯實統惟圓教之一權實四教無非念佛法門所謂念自佛念他佛雙念自他佛約四教成十二種念佛三昧又常行等四種三昧同名念佛一一三昧各具十二則四十八種復次念他佛者或念相好念法門念實相以例念自念雙亦可各三廣歷四三昧四教則一百四十四種一一種復有無量境觀差別非言可宣而持名一法出佛説阿彌陀經仍在前來種種三昧之外觀經云汝若不能念彼佛者應稱無量壽佛名字是也此持名法門雖似曲為中下仍復最頓最圓蓋所持之心無論解與不解當體無非一境三諦能持之心無論達與不達當體無非一心三觀請嘗言之六字彌陀為因名故名為因心故名為亦名亦心故名為非名非心故名若因名故名名應自持何待心持又名能自持與心何預若因心故名是心本有名則不持時名何不現若亦名亦心故名名能有名何待於心心能有名何待於名又此名字誰半屬名誰半屬心且不持時名中半名雖無心中半名應在離既各無合云何有若非名非心故名既非名非心何能更有彌陀名字如此推名名字性空緣生幻有一名字性即一切名字性名字即法界中道實相舉一全收無一法在名字外所念境諦既爾能念觀智例此可知復次束此境三總名妙假舉正報該依報舉化主該徒衆舉假名該實法一句名號三千歷然故復次束此觀三總名為空以覓心無朕故復次名若是心復何為名名若非心心何持名心若是名復何為心心若非名名何預心於其中間無是非是豈非即中虎溪云境為妙假觀為空境觀雙亡即是中亡照何嘗有先後一心圓絶了無蹤此之謂也悟此理而持名則一稱一念頓圓無上菩提縱未悟而捻珠記數矻矻窮年未嘗不暗合道妙全在妙境妙觀之中久久熏習性德漸顯如染香人身有香氣不假方便自得心開此蓮宗諸祖所以極力弘揚也誰有智者捨此別求歧徑哉除夕答問維那問臘月三十日請師直拈向上一著答本具現成不從人得西堂問本具現成因甚欲證而不能即證答何勞欲證良久曰欲證者稀乃曰文殊起佛見法見世尊貶向二鐵圍山高峰云今日有起佛見法見便應合掌讚歎何以故時節若到其理自彰世尊貶文殊為誡心外求佛法者高峰讚二見為勸甘棄佛法者惟達心外別無佛法方可熾然求於佛法古人不著佛法僧求如是而求豈似今人才説求佛求法便昧性具之宗才説無佛無法便欲全廢修證偏邪之見何預圓宗衆居士問大慧答中庸首三句為三身有過無過答宗眼圓通隨拈皆得灼然無過然是大慧之中庸非子思之中庸也進問何故清涼國師謂妄欲和融儒釋者應墮無間答儒是世間法執同則謗出世法所以犯墮今稟華嚴事事無礙之宗如遍行外道同證解脫又稟法華開顯之旨治世語言皆順正法故無過也惺谷禪師云為門外人説同句不同彼必反生疑謗為入門人説異句不異彼必狃於舊習為升堂人説雙亦句令知差別源委為入室人説雙非句粗言細語同歸第一義諦儒釋但假立名字有何同異可論哉進問且如喜怒哀樂之未發謂之中與一念未生為同為別答若熾然喜怒哀樂時仍是未發之中可謂一念不生全體現若離現前一念別求一念未生前謂是向上全墮滅相法塵當知念即無念故云未生喜怒哀樂即無喜怒哀樂故云未發恁麼會得方許説同其或不然四句俱謬又問菩提流支是大乘法師何於達磨興毒答南嶽思大師亦受七毒此皆二義約實則權位大士不達圓乘如增上慢四衆打常不輕是也約權則正顯南嶽達磨之妙如調達真善知識是也西堂問既云教外別傳何復云楞伽四卷可以印心答教外別傳即教內真傳如因指見月指非是月不謂所指非月也離經一字即同魔説不以經卷印心何名傳佛心印又吾宗乘妙處奪情不奪法執著文字須云不立若執不立妙藥反成大病卻是依文解義三世祖冤所以仍須以教印心也凡看宗語須具超方眼目且如神秀偈五祖教人禮拜持誦依此修行可作佛祖六祖書偈以鞋抹之云亦未見性人皆謂與奪互換又詭護六祖不知此時佛法尚盛人情尚淳彼追逐者皆英傑為法而然絶非爭虛名虛位何必如兵不厭詐之局貽羞法門哉當知秀偈雖涉漸修千穩百當祖偈雖甚圓頓毫釐有差天地懸隔得則直超失則永墜五祖賞則真賞罰則真罰非詭態也且必密付信衣遣令他去者正欲與六祖共扶圓門漸修之慧命不忍使現在未來衆生誤墮坑塹乃為密護神秀故致六祖備受逋逃驅逐之苦使一時表彰分以半座何得有此豈五祖亦曾受金幣故法嗣不厭衆心六祖亦以薦書得法故雖受源流而心虛膽怯不能登座揮麈哉若能於語録看出文外之旨亦能於千經萬論看出文外之旨便不是依文解義亦復不離經論一字如或不然三藏十二部千七百公案皆標月指認祖指為月與認佛指為月何以異哉為大冶禪教律三總非心外有法是故分執之固謬也合求之亦謬也分執鬥諍滋生合求泛濫無統皆由不知痛為生死直趨菩提所以圖名不圖實圖枝末不圖根本耳夫禪教律皆名也真能自覺覺他乃其實也機鋒轉語偈頌拈提禪之枝末也透脫識情禪根本也消文衍義章句名相教之枝末也觀心入證教根本也著衣持鉢錫杖芒鞋律之枝末也斷有漏法律根本也苟依禪透脫識情何患不觀心入證斷有漏法乎苟依教觀心入證何患不斷有漏法透脫識情乎苟依律斷有漏法何患不透脫識情觀心入證乎不惟分無可分亦且合無可合分無可分故古來大聖大賢無不貫通三學者合無可合故古來真實知識無不各專一門者六祖南嶽等未嘗為人授戒説經也窺基長水等未嘗為人棒喝授戒也道宣懷素等未嘗為人上堂講經也降自近代尊宿亦有古風可仰如壽昌禪師深知教律之意終不授戒説經雪浪法師深知禪律之意終不提拈授戒大會示權二律主亦知禪教之意終不談宗説教至紫柏大師學淹三藏果證無生道高德厚杲日麗天乃一生絶不上堂不講經傳戒秖令人真參實究深入經藏誓持根本五戒而已其視法門中事何等尊重豈似後人茫無所知肆無忌憚敢於輒自上堂講演傳戒如賤丈夫之登壟斷幾何不以如來正法為戲劇之具也嗚呼痛哉江右大冶賢者苦求一言發明三學根源豫謂學人出門一步先須痛絶眼前虛名小利百年活計必當置身千古聖賢之列誓就現前一念識取三學真正血脈仍向紅爐烈焰中千錘百鍊勿為躍冶之金然後晦迹韜光向古廟香爐安身立命畢志不起一念浮動心直俟絶後再蘇譬如冷灰豆爆無秋毫意必固我方可作陶凡鑄聖大冶矣大衆珍重辛卯除夕茶話諸方茶話多説向上事朽旭不然與諸友説家常受用耳佛制比丘行六和敬所以僧伽名和合衆身和同住口和無諍意和同悅戒和同修見和同解利和同均遵此六和乃名僧寶其要只一慈心也佛告比丘汝等應當身業行慈口業行慈意業行慈當知慈能關閉諸惡趣門普生無量衆善慈心之人瞋者見之歡喜怖者見之安隱憂者見之開釋苦者見之悅樂乃至鳥獸見之不生毒害恐怖之心試觀魔亦現佛相好光明殊特而令見者恍惚不安以無慈心也佛亦現明王相忿怒威猛而令見者拔罪生善以有慈力也朽旭生平不曾為一人剃頭亦不曾為一人改名凡同住者十方彼此法道為親情無適莫但願諸友各修慈心三昧不可隨俗徇污亦勿矯強立異恪遵佛戒痛革妄情除得一分習氣是一分修行融得一分偏私是一分學問朽旭德薄緣淺誓不圖熱鬧門庭世諦流布須各為大事念報深恩互相砥礪力挽頽風庶不辜同住一番最後臘月三十日到來保有真實受用不至如落湯螃蟹也珍重
