body:
  text: 論參究念佛論原夫本覺妙明真如法界智理無能所之分依正絶自他之量秖因迷妄遍計橫生背覺性而九界雜陳昧真境而三土幻現勞我世尊垂慈設教隨衆生根性示無量法門或顯了説或隱覆談或曲接偏機漸令入道或直投圓種頓使開明或從一法中分別説為無量或以異方便善巧助顯一乘雖復教網萬殊無非醒九界長夢令復還元覺了三土幻翳令冥契寂光耳然了義中最了義圓頓中極圓頓方便中第一方便無如淨土一門何以言之隨其心淨則佛土淨見思淨超同居塵沙淨超方便無明淨超實報故曰唯佛一人居淨土尚何不了之義衆生心念佛時是心作佛是心是佛以一念頓入佛海故曰一稱南無佛皆已成佛道若人專念彌陀佛是名無上深妙禪豈不至圓至頓果德願力不可思議因心信力亦不可思議感應道交文成印壞以凡夫而階不退未斷惑而得橫超又復三根普被四土橫該五濁輕淨在同居體空巧淨在方便三觀圓淨在實報究竟覺淨在寂光尚無等者矧或過之是名不可思議功德世間難信之法也總其大要須具信願行三信則信事信理信自信他信因信果知心外無土土外無心性外無佛佛外無性因必該果果必徹因願則念念回向心心趨往行則無量法門會歸一致而淨土正行尤以念佛為首顧念佛一行乃有多塗小經重持名楞嚴但憶念觀經主於觀境大集觀佛實相後世智徹禪師復開參究一路雲棲大師極力主張淨土亦不廢其説但法門雖異同以淨土為歸獨參究之説既與禪宗相濫不無淆訛可商嘗試論之心佛衆生三無差別果能諦信斯直知歸未了之人不妨疑著故誰字公案曲被時機有大利亦有大害言大利者以念或疲緩令彼深追力究助發良多又未明念性本空能所不二藉此為敲門瓦子皆有深益必淨土為主參究助之徹與未徹始不障往生言大害者既涉參究便單恃己靈不求佛力但欲現世發明不復願往或因疑生障謂不能生甚則廢置萬行棄捨經典古人本意原欲攝禪歸淨於禪宗開此權機今人錯會多至捨淨從禪於淨宗翻成破法全乖淨業正因安冀往生彼國問淨土為主參究可當念佛否答參念皆屬行攝切則參亦往生不切則念亦不生又雖有切行若信願為導則往生無信願為導則不生也問徹悟人還須往生否答普賢願王導歸極樂初地至十地皆云不離念佛怡山發願承事十方諸佛無有疲勞百丈清規課誦送亡等事無不指歸淨土故天如云若果悟道淨土之生萬牛莫挽雲棲云悟後不願往生敢保老兄未悟是知凡言不必生淨土者皆是增上慢人非真入菩薩位者也問念佛兼參究可為助行參禪兼願往非偷心歟答無禪之淨土非真淨土無淨土之禪非真禪然淨土之禪本不須參究但一心不亂即靜名號歷然即慮若夫禪之淨土必須證極淨心非可以理奪事從上諸祖凡情已盡聖解未忘不妨隨機掃執後世學人雖有乾慧染習未枯自非發願往生依舊隨業輪轉永明四料簡楚石十念不缺等正所謂有禪有淨豈偷心也問參究念佛與止觀法門為同為異答理則互融門實有異止觀以信入參究以疑入止觀雖三根普被而上根方真得明了參究雖亦被三根而上根始獲大總持且如下根之人或念佛或參究雖未達止觀深理然理無不具以置心一處即止用心參念即觀故中根之人或借解而起念行或塞解而發參情雖隨機致用不同亦皆不失止觀大義惟上根之士直下相應境智一如觀諦不二斯時念與不念皆得而究竟更無可參何以故言前薦得屈我宗風句下分明沉埋佛祖故知參究念佛之説是權非實是助非正雖不可廢尤不可執廢則缺萬行中一行執則以一行而礙萬行也高明學道之士試熟計而力行之慈悲緣苦衆生論自佛性之理不明同體之誼斯晦但知好善惡惡罔知與樂拔苦異類傍生藐若草芥囹圄罪苦視作當然誰知蠢蠢含生知覺無別貿貿惡黨人類是齊迷性靈而有意招愆已為可憫因夙障而無端罹網尤屬堪哀乃有目睹悽惶耳聆哀叫不惟漠不關懷方且快稱應爾嗚呼悲名拔苦捨此輩以何緣慈名與樂向善趣而奚益戒本經云菩薩於惡人所起慈悲心深於善人良有以也未探斯旨藉口懲非自恃暫居福報邪慢盈懷慶他劇受苦輪羅剎無異豈有稍悟常住慈心而無同體切膚之痛者邪或曰慈悲與拔乃果上之功能慚愧勸懲實因中之妙行故尊崇賢善名之為慚輕拒暴惡名之為愧慚愧自嚴方能斷惡修善慈悲利物乃是接世度生何得初心藉口大聖噫誤矣夫慈悲慚愧同稱善心因中乃可同修果上方能同滿若如子論則菩薩不修四無量心佛果不名具足慚愧失既非細罪乃瀰天詎知慈悲慚愧恰恰相成有慚愧者方有慈悲無慈悲者即無慚愧蓋由了達心佛衆生三無差別觀佛即心是生慚愧觀生即佛是起慈悲尊崇本有賢善之性隨願與一切衆生性德之樂輕拒迷真暴惡之習隨願拔一切衆生性德之苦有一分慚愧方有一分慈悲有十分慈悲方為十分慚愧汝今見此同稟血氣同抱靈覺之流背自真心枉受困苦不思拯拔反起傲心不惟無慈悲正屬無慚愧耳儻悟明心性確知生佛體同見此未來諸佛枉墮三塗八難便當惕目傷心胼手胝足如飢食渴飲欲罷不能何忍視作泛常反以救援為迂務邪只恐前生之善報有限他世之苦果無窮既永隔於圓悲諸佛亦難授手今日所以笑傲苦倫者他日復為苦倫所笑傲也悲夫非時食戒十大益論客問杜多子曰吾聞殺盜淫妄名為性罪飲酒昏迷失智慧種食衆生肉斷大慈悲是以如來制戒七衆同遵固無惑焉至於常食養身有何過咎而非時食戒如此嚴邪願聞其旨杜多子曰吾正欲申齋法之要以軌行人時哉問也夫齋法是十方三世諸佛弟子通行大道出生死法之要津也愚夫逐逐口腹甘為飲食之人既畏此律檢豈辨其利益今原如來立制本意盡善盡美何能殫述略而舉之大益有十一斷生死緣經云一切衆生皆因淫欲而正性命又云三界衆生皆依飲食而得存活所謂段食觸食思食識食由此觀之淫欲固生死正因飲食乃生死第一增上緣也均為五欲所攝特資此毒身借之修道不能全斷然設得時食尚作曠野食子肉想何容恣意於非時邪二表中道義台宗云午前進食表方便道猶似有法可得過中不食表除中道外更無所需此之理觀全托事境儻粗戒尚不自持非同俗人夜猶飲食放縱之不及即同外道日啖一麻一麥之太過行不適中妙理何由契會三調身少病脾主信數數食最能傷脾故玄門以戒晚食為養生善術豈名忍餓四道業尊崇趙州云二時粥飯是雜用心處二時已雜況三四邪儒曰飲食之人則人賤之今恪守齋法專精辦道道業自隆五堅固戒品晚食助火助氣增長淫心今寂爾清淨戒體堅牢六堪能修定斷其雜食亂想身心輕利取定不難七出生智慧晚餐助昏蓋今清淨惺寂不障觀慧又於四種食如法作厭離想即能斷三界惑八離鬼畜業畜生午後食鬼夜食不持齋法鬼畜無異牽入其類持此齋法遠離二趣生緣九不惱檀信謂長乞食者設午後更復持鉢則終日但見沙門往還必令施主生惱今午後惟晏坐修道能令僧俗皆安十不擾行人今時叢林晚餐廚人惟事炊爨終身碌碌不異傭工齋法若明則無此煩擾共修道業是以諸佛出世必立此制乃至在家居士猶令於月六齋日受八關齋法以種永出因緣況沙彌比丘可無慚無愧非時受食邪設有病苦因緣佛自立非時漿七日藥以濟之斷無以晚食為藥石之理也願高明者深信而力行之念佛即禪觀論或問蕅益子曰參禪教觀與念佛法門同邪異邪答曰同異皆戲論也即亦同亦異非同非異亦戲論也以三種法門無不離四句故若知一切法無非即心自性仍可四句而詮顯之何者梵語禪那此云靜慮靜即是定慮即是慧靜即止慮即觀靜即寂慮即照是故定慧也止觀也寂照也皆一體而異名也或謂寂照約性餘二約修止觀約因定慧約果不過一往語耳夫吾人現前一念心性雖昏迷倒惑靈知終不可滅雖流轉紛擾本體終未嘗動此豈非寂照真源止觀血脈定慧根據乎究此現前一念心性名為參禪達此現前一念心性名為止觀思惟憶持此現前一念心性名為念佛蓋念者始覺之智佛者本覺之理也就此念佛法門有念自佛他佛自他佛之不同若單念自佛與參禪止觀全同若單念他佛與參禪止觀亦異亦同若雙念自他佛與參禪止觀非異非同夫念自佛者是四念處觀所謂觀身觀受觀心觀法若一切法門不為四念處所攝即外道法故知與禪觀同也夫念他佛者或念相好或法門或實相或不能作此三種念者則但持名號若念相好一往似與禪觀異然必止息異緣專觀彼佛則仍與止觀同亦仍與靜慮同也念法門者例此可知若念實相雖托他果佛為異然終無兩種實相究竟是同若持名號一往亦與禪觀異然無論解與不解而所持之名當體無非一境三諦能持之心當體無非一心三觀故曰明珠投於濁水濁水不得不清佛號投於亂心亂心不得不一是則心無異緣即是靜是止名號歷歷即是慮是觀亦究竟同也夫雙念自他佛者了知心佛衆生三無差別乃托他佛助顯本性由悟本性故與禪觀非異由托他佛故與禪觀非同是謂勝異方便無上法門文殊般若經般舟三昧經觀無量壽佛經等皆明此圓頓了義而妙宗鈔申之為詳凡棲心淨土之士不可不熟究而力行之也辨戒衣辨訛出家有戒衣猶居官有公服也戒既七衆不同衣豈一概無別佛為比丘則制三衣一僧伽梨本宜九條或十二條貧窶無措事不獲已乃用二十五條名後後品非上上品也二鬱多羅僧惟用七條三安陀會惟用五條此三皆名袈裟以是壞色非彩色故亦名田衣以其形似水田又僧為人世福田也為比丘尼則制五衣三衣如上加掩腋衣浴衣也為沙彌則制二衣一上衣即無縫袈裟亦名縵條衣色與比丘同制與比丘異但直縫之不許刺葉故律部云求寂之徒縵條是服輒披五條深為罪濫蓋沙彌雖已出家尚未入僧寶數是故五條猶不許披況七條九條等乎二內衣即掩腋衣之類梵稱僧腳崎也為菩薩優婆塞則令畜無縫三衣制與沙彌同入壇行道方許披之平日不得披著所以與沙彌別也今時衣制大違律法其訛有十請備陳之受沙彌戒便令具足三衣一訛也沙彌擅披七條竟與比丘無別二訛也前人無知妄作輒令優婆塞得披三衣後人矯枉過正并禁優婆塞不畜縵衣三訛也一切衣制皆以豎三肘橫五肘為度縱稍稍增減咸須隨身隨臂今豎三橫六謬云摺時取方四訛也田衣但取形似畦畔今謬云須通水路五訛也五條七條等不過割截使異俗服今謬云表於須彌日月四天王等六訛也僧伽梨本翻大衣今謬稱祖衣七訛也三衣之制千佛所同故即名千佛衣正訛集中已辨今尚有繡佛在衣者八訛也一切出家所用衣服臥具以壞色故總名袈裟今返以五彩為之九訛也佛與大迦葉以衣貿衣所以彰其頭陀勝德令持衣遠待彌勒所以助成龍華佛事達磨傳衣二祖所以表信令人不疑今有不受戒律但付衣者進無正法眼藏心印可傳退無比丘沙彌名位可守不惟僅成世諦流布亦且大亂聖賢幢相十訛也嗚呼僅一戒衣其訛若此奈何正法不淪替邪有志之士請頭頭法法咸遵佛制期於自利利他勿謂此是著相躲身於無相坑中也法派稱呼辨客問蕅益子曰出家法派族姓宗譜也子為不然何邪答曰世間至親莫如滴血出世至親莫如法道法道本離名相豈以名字為派哉佛雖曰四河入海皆失本名四姓出家同稱釋子此但一其姓耳豈必更一其名是故憍陳如大迦葉目犍連等皆俗氏也阿難陀莎伽陀阿那律等皆俗名也出家證果當時咸以此稱之後世亦以此傳之然則別命法名已非律制矣況法派乎其在東土五祖下出二人南曰惠能北曰神秀馬祖下出三人西堂曰智藏百丈曰懷海南泉曰普願且南嶽既名懷讓百丈為其嫡孫未嘗避之宗門果有派乎北齊師也南嶽徒也師名慧文徒名慧思慈雲四明同師寶雲一名遵式一名知禮天台果有派乎又宗門有大本小本天台有大威小威法名果足論乎降而近世雖法派之説已行高尚者猶然弗屑如密藏名道開介山名傳如對峰名真弘淡居名法鎧寒灰名如奇皆不失為紫柏弟子善知識果有派乎巢松名慧浸一雨名通潤蘊璞名如愚皆不失為雪浪弟子法師果有派乎惟其道無足傳法無足授不知戒律之當尊不知紹繼之正務為師者但貪眷屬為徒者專附勢利遂以虛名互相羈繫師資實義掃地矣豈不痛哉客曰法派之非既聞命矣法門兄弟緇素無間邪答曰同門列為兄弟豈惟不知出世法亦不知世法者也且如公卿也百寮也胥吏也萬民也皆天子臣庶也然百寮不得呼公卿為兄弟乃至萬民不得呼吏胥為兄弟何也分異故也佛法亦爾比丘之法多已十夏者為與和尚等多已五夏者為阿闍黎等比丘尼之奉八敬法也雖百夏禮初學比丘足夫比丘尼已入僧寶數特以比丘為上衆尼為下衆其禮數懸絶如此況式叉摩那但學法未預衆僧法事者乎又況沙彌沙彌尼但同僧利養未入僧數者乎欲稱比丘為兄弟何異有司稱宰輔為兄弟也又況優婆塞等并無僧相不得同僧利養者乎欲稱沙彌為兄弟何異民庶稱有司為兄弟也且佛之初出世也提謂長者先受五戒稱佛為師矣五比丘後方師佛提謂非兄五比丘非弟乎乃佛之授與三歸也則曰歸依未來僧是不惟不敢以五比丘為弟并不敢以五比丘為兄以其歸依僧則一切僧皆我師也乃至最後須跋陀羅亦我師也今世俗士擇一名德比丘禮事之竊竊然矜曰吾某知識某法師門人也彼知識法師者亦竊竊然矜曰彼某居士某宰官歸依於我者也噫果若此則應曰歸依佛歸依法結交一大德可也可云歸依僧也與哉須達多之初聞佛名夜趨見佛也甫聞説法即證三果已入勝義僧寶數矣既而造精舍於祇桓供佛及僧凡新出家未知佛法者須達多日為教授必禮出家人足已然後説法寧惟不敢以教授師自居不敢以兄自居并不敢以弟自居而兄視新出家人也羅睺羅之出家也以舍利弗為和尚均提之出家也亦以舍利弗為和尚羅睺為比丘均提尚為沙彌不聞其稱羅睺為兄也則住持二寶之體最嚴亦猶朝廷之禮故也朝廷無禮法上下不辨而天下亂佛法無律儀七衆不辨而化道絶可弗辨乎議儒釋宗傳竊議有序大道之在人心古今唯此一理非佛祖聖賢所得私也統乎至異匯乎至同非儒釋老所能局也剋實論之道非世間非出世間而以道入真則名出世以道入俗則名世間真與俗皆迹也迹不離道而執迹以言道則道隱故曰形而上者謂之道形而下者謂之器又曰君子上達小人下達嗚呼今之求道於迹者烏能下學而上達直明心性迥超異同窠臼也夫嘗試言之道無一安得執一以為道道無三安得分三教以求道特以真俗之迹姑妄擬焉則儒與老皆乘真以御俗令俗不逆真者也釋乃即俗以明真真不混俗者也故儒與老主治世而密為出世階釋主出世而明為世間祐至於內丹外丹本非老氏宗旨不足辨然則言儒而老與孔皆在其中矣言釋而禪與教皆在其中矣故但云儒釋宗傳竊議儒之於道學也久矣上古無文字無可徵可徵始於堯舜堯允執厥中舜危微精一皆心外無法故天地賴以位萬物賴以育貫徹古今萬世不能踰其道也嗣禹皋陶之見知湯之聞知不過還知此心此理而已知之則近見亦可遠聞亦可不以遠近為親疏也乃韓愈云堯以是傳之舜舜以是傳之禹嗟嗟是何物也可互相傳乎譬諸射樹的而專注之先有巧力者先中後有巧力者後中或在同時或在異世貴各中的而已矣的非可傳也巧非可傳也力非可傳也謂之曰見知聞知則可謂以是相傳可乎哉見知不唯禹皋也凡稷契伯益等皆見而知之者也聞知不唯湯也伊尹耕於有莘之野樂堯舜之道則於湯為見知於堯舜禹等亦為聞而知之者也文王既沒武周又逝柱下史聞而知之孔子問禮歎為猶龍則於老聃又為見而知之門人推崇厥師不復齒及老氏孟子亦蹈其舊轍耳顏於孔誠見知也但繼孔學又先孔亡不同太公之於文王伊尹之於湯禹之於舜也故孟子不言之顏淵死子哭之慟再歎今也則亡故古人云顏子沒而聖學亡非虛語也孟子曰然而無有乎爾則亦無有乎爾蓋亦不敢虛妄承當者歟老氏之學蓋公等得其少分以治漢漢則大治孔孟之學漢代絶響北宋周濂溪定性書云性者剛柔善惡中而已矣太極圖説云太極本無極也細玩二語真得孔顏心法者也後儒紛紛解釋罕有知其語脈者且云定性書可以不作噫可哀矣即及門之士明道似曾子子思伊川似子夏而已南宋陸象山先立乎其大者乃得孟氏心法者乎然不信太極無極展轉撥之紫陽又展轉救之吾觀撥者救者皆非實知周子也王陽明龍場大悟提致良知三字為作聖真訣雖曰顏子復生不亦可乎釋之於道學也十方三世無不徹也此界此時則始於釋迦繼於迦葉難陀等也其在震旦則遠公造法性論羅什歎其未見佛經能知佛理北齊慧文大師讀龍樹中論悟圓頓心宗二並可稱聞而知之菩提達磨大師受記東化可稱見而知之遠公後凡修淨業得往生者皆見知聞知之流類也有人僅立蓮宗七祖但約行化最專者耳然四明尊者慈雲懺主等何嘗不以淨土行化而智者大師十疑論飛錫法師寶王論天如禪師淨土或問楚石禪師懷淨土詩妙協法師念佛直指尤於淨土法門有功至若近世則幽溪師生無生論袁中郎西方合論皆遠公之的裔也達磨傳至六祖乃有南嶽青原二甘露門門似二道無二也二則毒藥非甘露也又數傳而為五宗人有五宗非五也五則枝條非宗本也譬如阿耨達池一水流為四河歸於大海河有四水無四也今不知池之一不知水之一不知海之一獨從四河闊狹曲直遠近起見互相是非可謂智乎繼北齊者有南嶽思大師出大乘止觀法門四卷真圓頓心要也次有天台顗大師出三種止觀法華玄義文句及維摩仁王金光明普門品十六觀等疏於是教觀大備歷五傳至荊溪其道中興又八傳至四明道乃重振此後裂為三家漸式微矣唐玄奘法師遍遊天竺學唯識宗於戒賢法師盡其所知旁搜其所未知廣大精微真彌勒天親之子釋迦文佛之遠孫也慈恩基師雖實繼之然觀所撰法華玄贊則靈山法道恐未全知無怪乎唯識一書本是破二執神劍反流為名相之學亦可悲矣賢首法藏國師得武后為其門徒聲名藉甚疏晉譯華嚴經經既未備疏亦草略故不復傳所傳起信論疏淺陋支離甚失馬鳴大師宗旨殊不足觀方山李長者有新華嚴經論頗得大綱清涼觀國師復出疏鈔綱目並舉可謂登雜華之堂矣後世緇素往往獨喜方山大抵是心粗氣浮故耳不知清涼雖遙嗣賢首實青出於藍也圭峰則是荷澤知見宗徒支離矛盾安能光顯清涼之道禪宗自楚石琦大師後未聞其人也庶幾紫柏老人乎壽昌無明師亦不愧古人風格台宗絶響已久百松覺公稱為鳴陽孤鳳僅出三千有門頌略解及楞嚴百問耳幽溪繼之一時稱盛然唯生無生論足稱完璧而自所最得意圓通疏殊為不滿人意何哉但能趺坐書空作妙法蓮華經字脫然西逝則誠蓮華國裏人矣雲棲宏大師極力主張淨土讚戒讚教讚禪痛斥口頭三昧真救世菩薩也憨山清大師擴復曹溪祖庭晚年掩關念佛晝夜課六萬聲故坐逝後二十餘年開龕視之全身不散遂與六祖同留肉身人天瞻仰得非蓮宗列祖乎或曰佛祖之道必師資授受方有的據否則法嗣未詳終難取信無名子應之曰譬諸世主桀非傳自大禹紂非傳自成湯者乎身苟無道天子而不若匹夫矣今之雖有師承顛覆如來教戒者何以異此漢之高祖明之太祖並起草莽誰授以帝位乎苟得其道匹夫而竟開大統矣今之雖乏師承能自契合佛祖心印者亦奚不然必如子論是但許有見而知之不許有聞而知之者矣可乎哉且子又不聞有師資具足皆不足齒及者乎譬如俳優及相搏者豈無師資授受然不過戲劇及鬥諍法耳吾故曰執迹以言道則道隱譬諸射者期各中的焉耳十方三世唯此一的常住不變何俟於傳巧之與力存乎其人父不能得之子子不能得之父有何所傳或見而知之或聞而知之及其知之一也正知其不可傳者也謂有可傳則不至於戲劇鬥諍不止非佛祖聖賢之道也已記介石居記自寂光之性翳於五住塵勞一切含識鮮有恆居雖四禪四空及方便土亦屬旅泊然以正法眼觀則世間相即常住相妙在不為物轉便能轉物故楞嚴云見與見緣并所想相如虛空華本無所有元是菩提妙淨明體蓋惟達無所有方契菩提儻逐境生情流轉從茲相續矣豫讀豫之六二曰介于石不終日未嘗不掩卷太息也夫六道豫有二乘豫空藏通菩薩豫於度幻別教大士豫於但中皆未了法界隨無明流豈若圓頓初心悟因緣即空假中法本無住物亦不遷是則幾之微也不容一瞬況終日乎無生剎那名之為介常自寂滅喻之以石融剎土於毫端會古今於當念以三無差別而獲二殊勝不諂不瀆義極於此誰謂宣尼心學僅在六合內而牟尼法要不在日用間哉權可居士額其居曰介石因記之遊鴛湖寶壽堂記甲申中秋前四日廣若姚居士邀豫遊於別室室在鴛湖濱去五龍橋數武其地幽勝紅蓼夾徑無階砌排耦之繁荷葉滿池蓮香尚馥池北屋宇皆朴素古簡循廊而東則寶壽堂在焉廣若語豫曰此堂昔本僧居先君時淪為俗舍後因重事覆苫於梁間得金剛經一卷工人異之持以告豫豫先夜曾得夢夢至一破廳有僧募豫三百金豫未許僧云當以事證遂指其地忽有塔從地湧出告豫云汝本欠此塔緣三百金須填還也次日忽聞梁中得經遂往視之躡梯而上覿面真如塔隨身湧現宛同夢中所見故今復為僧舍以奉吾母并淨侶數十人咸此熏修焉豫嘗謂夢之一法至幻而至靈一夕中普能現三世事試觀法華安樂行品始初心終妙覺總不出如夢三昧故知三界諸法誠無非夢也成佛之夢豈真夢幻也哉廣若居士信夢醒無二便能踐夢中諾而捨園為菴且成出世大孝今日遊此堂聞此語者皆印入於廣若之一夢而豫復夢為之記如此端氏往生記乙酉冬全城章潔之以二先人行實乞言豫拈念佛三昧印之今居士追憶二先人之信佛實由乃室端氏更乞一言表彰兼欲決其所疑蕅益道人生平不浪為人作傳獨往生傳則不待請然必見聞彰灼乃作豫與潔之交未久此山去全成遠豫又未履其處似未可附見聞彰灼之科但潔之篤信謙謹非肯誑語者且於大法有疑可不為決請即其言而導其意其言曰亡室端氏年十七適某家即與某同志茹素好惠施無私積不喜珍飾綺服不恚罵給侍人孝事翁姑恐不逮知不生育遂買妾事某專心持珠念佛一載有餘病篤請姑同聲念佛欲辭去姑高喚令住俟胞弟端尚卿相會乃延至次日與弟訣別聲如男子劇談禮義孝友大節半日不倦至暮復請姑助念佛三日不沾飲食不發餘言以崇禎癸未八月二十九日吉祥而逝某父因此感發越七日坐逝次年秋某母復秉歸戒而終適聞觀經疏鈔謂臨終十念成就亦得往生未審亡室獲往生邪蕅益道人聞而嘆曰甚矣心力不可思議佛力不可思議夙世善根信根不可思議也鸚鵡鴝鵒猶得往生謂念佛人不得往生可乎吾輩生於末世既無天眼又無宿命智通佛語不信更信何語苟於佛語諦信無疑則娑婆何啻旅邸淨土何啻家鄉獨怪夫聰明伶俐納子曾女流之弗若深可悲耳豫少年猛志參究視佛祖果位猶掇之冀欲以此報父母不報之恩中歲多障多病今乃一意西馳而散心弘法計功定位僅堪下品下生每一念及法界父母不禁血淚交流反不如端氏女先享蓮宮之樂且拔其舅姑同出苦輪成出世大孝居士但求之己若不疑己心即是佛心即更不疑佛語若於佛語不疑即於善女之生淨土亦不疑矣嗟乎此事潔之家事此語潔之親語而得生不得生之疑尚徵於豫乃信後之讀斯記者可不速諦信自心如端氏女之操往生左券於不忒哉祖堂幽棲禪寺大悲壇記并銘如來顯密二教並具四種悉檀而密教尤重壇儀蓋全理成事全事攝理直以事境為諦觀本非僅托事表法而已觀世音菩薩慈遍剎海於娑婆世界更有大因緣其所説咒藏中最多唯大悲心咒流通獨盛有宋四明尊者法智大師佛子羅睺再來專修密行依天台教觀創立大悲三昧行法十科行道十乘觀心並是佛祖祕要萬法總持豈徒以音聲色相為觀美哉近世武林流通特廣謬亂多端豫不得已特為之辨訛矣祖堂湛持如公為遠痕禪師高足雪浪大師法孫曩在真寂躬修此行凡歷四期次住匡山豆葉坪奉為日課後因師兄如幻行公偕護法二白蔡居士登山邀請主幽棲事遂發願云設欲某服役禪堂必建大悲懺壇以踐聞熏聞修實益於是拮據七年始獲就緒壇在藏經閣右佛像南向大悲像東向壇右為觀堂及齋堂浴室侍者寮等大功既竣請豫為記令後裔有聞豫惟湛公久參耆宿不主先入之言毅然聽豫改正積訛真大豪傑而公且囑豫曰某生平精力竭在茲壇恐後裔無知浸假又訛而為逸老堂也亦必藉一言預為之正豫懼爰秉筆勒詞曰大悲三昧含靈本具曠劫迷之輪回諸趣菩薩弘慈方便巧度文字性空演妙章句如法誦持靡不感赴四明行儀萬古流布久而失真吾為此懼辨訛初宣群小爭怒勇矣湛公不迷岐路築此淨壇龍天呵護維此壇室千秋一日齋法肅恭食時勿失禪侶熏修勿令老逸冬夏安居春秋努力行願相資同歸淨域虛空可盡弘誓不息若有違者法門敗德持咒神王必相排殛仰乞威靈證茲真實百億其年永垂芳式祖堂幽棲禪寺藏經閣記依文解義三世佛冤離經一字即同魔説宗教不容兩分彰矣摩訶迦葉西土初祖也佛示寂不供養舍利惟事結集法藏菩提達磨東土初祖也力掃依文解義之習仍以楞伽印心豈似後世僭竊位號爭去王室典籍恣其吞併暴虐哉祖堂幽棲寺本融祖習坐觀心地後得四祖點悟遂傳大法其道遠播雙徑芙蓉峰下寥寥久矣正德年間有臨濟子孫號海天者來居此地嗣有雪浪大師乃慈恩再來於時受法者為瑞麟諸公而紫柏大師亦曾杖笠相訪蓋自有唐以來未有盛於斯際者也雪師寂高足遠痕法主繼守叢席遠公逝高足如幻法主又繼守之以授乃弟湛持如公湛公久參真寂聞谷老人隱居匡嶽既應請遂放下身心專營佛事七八年來未有間今諸願已畢惟藏閣功僅將半適豫應請弘演法華湛公謂宜一言以紀其事豫於大悲懺壇先有記銘今藏閣雖未告成實豫心所最急者蓋佛祖慧命全賴三藏始傳緬惟宋朝藏板有十餘部今僅存南北二藏頗糢糊嘉興書本藏經猶未全足真九鼎一絲之懼且鼠即鳥空輩視經典如怨家儻不力為護持將有不忍言者湛公之急急以此為務其如來所使行如來事者邪請即以此語告我同仁必當共發勝心請即留此語勒之堅石必當俟百世不惑也明慶寺重建殿閣碑記像教之設肇自佛世來自漢時大盛於南北六朝歷唐宋來未嘗稍替故琳宮梵剎星布九州凡名山勝地無不有住持三寶為世福田者由覺法和合之義民之秉彝非可泯也然住持三寶本從一體三寶建立而一體三寶必藉住持三寶顯明明則成己成物自慶慶他所以暫廢還興無非全性起修之妙應耳松陵西南隅七十餘里有麻溪焉溪南為明慶寺宛在水中形如菡萏背縹渺面曠野左右兩漾群流合襟開山者為晚唐智詵禪師宋乾符間有祕謐師建益友堂其言曰凡三藏之士斂迹於斯皆我益友也則尊賢取善之風可想矣宣德年納子廣善擴其址規模弘敞萬歷甲戌殿閣禪堂一夕灰燼歷四十餘年僅睹瓦礫逮戊午年本寺順蒼郁公矢志恢復身董其役不辭勞苦於是蓮宇松澗等竭誠助之一時緇素響應財施力施勸讚隨喜未幾大殿鼎新山門廊廡香積僧寮漸次畢舉其間輸粟布金者未易悉數而仲繼峰居士為最書本大藏則寓中念公獨成之自是安居者有尊像瞻禮有法寶展玩雲水者夜可息晝可啜儼復唐宋舊觀永甲松陵衆剎矣竊思創業難於勇進守成利於堅貞非勇進莫能為先非堅貞無以善後今之片瓦一椽莖薪粒米無非前人捍勞忍苦所致檀信減割身口所成是宜記厥始末以告未聞庶幾善繼善述久久勿替者也
