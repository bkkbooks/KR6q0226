body:
  text: 頌二白牛十頌有引并述此頌若作圖者須一一如頌中各句及頌後小字而作儻少不合則大背宗旨其第九圓相一圖或并不作圓相但存一白幅亦可向有二種牧牛圖行世一從未牧至雙泯為圖十牛自黑漸白以至於無一從尋牛至入廛為圖亦十牛始終皆白雖云大同小異旨趣固自別矣禪觀之暇偶為會通稍稍更定作十頌非敢求異古人冀自冥心一轍耳白牛原不遠山童無奈山童面向東柳緑桃紅空戀惜凝眸塵劫好懵懵白牛在西面東童子在東面東右失牛配理即佛也所謂一切衆生具有如來智慧德相但以妄想執著而不證得主人忽問牧童牛回首茫茫何處求賴有來人指往路白牛端的在西頭主人問牛所在童子失措更一人自西來以手遙指右尋牛配名字即佛也謂從經典或善知識創聞心佛衆生三無差別之理發心願求返本歸源驀直追尋路漸西荒原踏破是牛蹄一回瞻視知端的信步前行不復迷童子面西急走田中多有牛跡右見跡配觀行即佛也謂圓五品位依圓解修圓觀圓伏五住煩惱橫穿九十六煙村忽睹牛王露地蹲從此腳跟輕快也假饒氣急不須論白牛隱臥田中童子遙見歡喜右見牛配相似即佛也謂圓十信位相似得法性理水六根清淨見思先落證位不退塵沙亦落證行不退但猶未證無功用道水窮山盡不辭勞趁到牛邊功已高歎息無端成久別而今方得解天韜白牛從容起立童子喜撫其背右得牛配分證即佛也謂圓初發心住破一分無明證一分三德入祕密藏生如來家得念不退乃至十住皆此中攝雪山香草甚甘肥清冷流泉可療饑不羡稼苗盈野緑悠然飽足度餘暉童子閒坐石上白牛飲澗自適右護牧亦分證即佛也謂圓十行一行一切行稱性功德夕陽將盡晚霞稀就路還家不用揮一曲無生吹短笛餘暉猶自照庭闈夕陽在山白牛歸宿童跨牛背吹笛自樂右騎歸亦分證即佛也謂圓十回向法界願行事理自然融合回入平等法界海白牛何處本無蹤牧豎高歌明月峰萬象光含秋露冷桂枝猶自影重重明月在天牧童拍手自歌右忘牛亦分證即佛也謂圓十地純智忘理猶如大地能生一切佛法荷負法界衆生普入三世如來智地逸多彈指閣門開笑殺當年小善財煙水百城空自歷人牛絶跡夢初回人牛俱不見唯一圓相右雙泯配究竟即佛之根本智也謂始本不二理智一如徹證三無差別之性亦無能證所證可得依稀何處現人牛垂手相將入市遊借問人牛還似昔云何無失亦無求童子向東前行白牛相隨在後右入廛配究竟即佛之後得智也謂佛果後普賢行乃盡未來際常然大用之門能同流九界廣度含識實無加於雙泯之體頌仰答高峰大師六問六首有小序高峰大師勵頭陀行力扶祖道之衰有參學者必先令然指受戒方乃授以心要其砥柱狂瀾之志亦甚切矣今觀室中垂問語無非因病發藥痛處加錐近來禪德每作一色邊事會去辜負祖意不既多乎不揣疏愚敬為仰答兼系一頌醍醐毒藥毒藥醍醐一任具舌者之自辨也問大徹底人本脫生死因甚命根不斷仰答猶有徹底者在頌曰理極情忘退步難轉身一句葛藤繁石人撫掌歌明月寄語禪流莫浪看問佛祖公案袛是一箇道理因甚有明與不明仰答為是一箇頌曰千差萬別勢嶐穹樵子休商窮與通側看是峰橫看嶺只因身在此山中問大修行人當遵佛行因甚不守毗尼仰答邪法難扶頌曰解脫翻成荊棘因暗中觸寶漫傷身自從拶入波離室梵網光流劫外春問杲日當空無所不照因甚被片雲遮卻仰答瞥頌曰緣見因明被暗欺晴空何礙片雲移欲從遮照分賓主豈借毗嵐努力吹問人人有箇影子寸步不離因甚踏不著仰答踏著即非影子頌曰認影迷真最可憐不堪忽後又瞻前晚來演若狂心歇童子南詢腳底穿問盡大地是箇火坑得何三昧不被燒卻仰答火光三昧頌曰火光三昧最芬清切忌從他覓化城烹熟法身冬至後黃鐘重奏一陽生三觀蓮華頌有引一心三觀即妙法蓮華也本非定三豈應分頌然亦非定一姑妄分之讀者幸勿以辭害意空觀蓮花頌曰覓心覓佛了無蹤一葉荷香裹太空消盡涅槃生死夢相看仍在寶池中假觀蓮花頌曰蕊幢葉葉含塵界光影相吞孰可窮歷盡普賢毛孔後始知生長福城東中觀蓮花頌曰劍樹刀山覿面呈蓮花青赤倍分明按經中云有優鉢羅地獄此云青蓮花復有波頭摩地獄此云紅蓮花故云遮那身土從來遍擬議思量轉似盲北天目靈峰寺二十景頌有序靈峰山古稱為北天目辛未冬入山結制即有偈云靈峰一片石信可矢千秋甲申秋從檇李入山復有句云靈峰片石舊盟新不謂乙酉春偶遊石城直至己丑深秋方獲歸臥也俯仰泉石勝概縱橫紀其大者略有二十聊當化城畢茲餘喘自非樂土終弗與易矣鷲嶺遙傳袛一枝由來吾道貴聞知但從龍樹通消息不向黃梅覓破衣大雄峰群峰之中巍然端坐為山正主應據當陽顯別傳較來仍是正中偏馬駒踏殺人無數畢竟還他懷海賢百丈峰大雄之東危巖傑峙俯臨萬竹大壑風吹匝地寒芙蓉削出翠難看幾翻倒嶽傾湫後方識孤危卻自安獨立峰大雄之西峭壁千仞有若天門亦名海日幢九品何須一一求戒乘俱急已前收須摩去此洵非遠觸目標心寄玉浮五蓮峰獨立峰前五峰行列於寺之西並似青蓮秀出雙雙巽岫高不隨春色醉仙桃山中薄有天廚供傭向人閒問紫袍二乳峰在寺東南回顧梵剎情同慈母度他何必起風波莫怪齊東傳事訛縱使鐵船終不爛幾人能聽屈原歌神舟峽俗稱靈巖豁兩壁峭立相傳為神舟行處虛空為虡大地枹無問自說聲有無喚醒癡禪計離絶但觀一諾還一呼天鼓坪大雄百丈兩峰之閒行時皆逢逢有聲震動巖谷兩澗泉聲夾竹岡恍疑羅帶曳琳琅經行飯後無餘事一任跏趺送夕陽碧玉坪在藏堂東修竹巨石可行可坐聞說從來道不孤萬筠叢裏臥璚株鳳兮未肯甘衰德早向深林避網罛映碧坪在藏堂西與碧玉坪相對皆從大雄峰而發如兩瓣青蓮華葉是為梵剎內護不是因緣不自然大雄特地露言詮剎塵演說雖無隱水性終須飲者傳祕藏巖在映碧坪北大石三座如伊字三點不縱不橫不並不別其前可結小茅四性無生八不該誰將宗說強分開但看滴滴歸滄海始信源從阿耨來龍樹泉舊名龍泉祈雨最靈載一統志山由此得名正在大雄百丈兩峰之中堪表中道如龍樹大士造中觀論傳佛心印其味醇正潤益無窮百丈峰頭涵蓄深泠然東國沁禪心維摩摘取雖非遠未許貪夫著意斟歡喜泉出百丈峰之東冬夏不絶飲之甘美忍土塵勞不可噬能仁格外垂恩濟引取珠王十四枝來向山中宣妙偈安養泉出大雄峰之西味尤醇美猶若醍醐歷盡青山數十層盈科聊就此中澄長空如洗標孤影不向污流別覓朋澡月池在碧玉坪西麓積龍泉所成也未必神舟是戲詀坐聞泉水日喃喃滿慈久已成獅吼暗證徒將口舌緘談經石俗呼神舟石在安養泉左可坐草餘人時泉聲淙淙大雄久缺兒孫債劈取須彌安此界賓頭末敢向空旋米芾不妨頻下拜跏趺石大雄峰之麓也相傳大風雨時從峰頭迸墜在藏堂東北隅群木交映堪坐數人遠望前山疊翠數重並相環拱舉世昏昏恥獨惺亂山深處且埋形夜來風雨摧殘卉唯有修篁不改青萬竹塢舊名上房塢今精舍名攝香居藏身之處沒蹤跡沒蹤跡處莫藏身東風誤報春光好香色分明舉似人千梅塢由萬竹塢東上怪石崎嶇人跡罕到野梅無數開則半山遍白香風遠傳何必高誇雞足山箇中趺坐亦安閒純陽飛劍心機錯好向黃龍問過關金仙洞舊名仙洞在龍樹泉下載一統志每為苦行衲所居獨據東南最上頭天空海闊一浮漚饒君先入如來慧爭奈群機攝未周華嚴洞在二乳峰左而外向東南日出則先照之自頌法華堂問答六首一問步步不曾離著他因甚麼舉似不出答舉則不似頌曰演若迷頭向鏡馳狂呼歷劫未曾癡朝來摸著娘生鼻到底雙雙兩下垂又答分明舉似頌曰分明舉似不爭差步步何曾離著他更問之乎並者也胡人月下吹胡笳二問說得了了分明因甚麼用他不著答說底是甚麼頌曰家常茶飯日三餐一飽渾忘饑與寒只恐鮮能知此味別圖鳳腦與龍肝又答步步不曾離頌曰分明步步不曾離日用尋常盡是伊怪底春光遍桃李東風消息幾能知三問三身與三自性是同是別答且道是同是別頌曰三性三身別復同分明指示不須融獨憐村裏三家犬月下啀喍吠草叢四問一切法皆可作四句且如三身各四句如何作答四句歷然頌曰無性緣生觸處通有無情理互含容一微亦必存方分儱侗如何達此宗自頌除夕問答二十首一問如何是為實施權答家家有路透長安頌曰治水功成定永圖荒要侯甸各分符始皇吞併非良策眨眼秦嬰已獻俘又答病多藥多頌曰病多藥亦多須是問耆婆黃龍湯一味那得起沈痾二問如何是開權顯實答借婆衫子拜婆年頌曰禮到何勞漫費錢大家恭敬賀新年面門歡喜心安樂不羡無懷與葛天又答子等心等頌曰子等心亦等況復資無盡周給本非難只愁不自肯三問如何是本跡雖殊不思議一答歲歲黃鶯啼緑柳頌曰春光一度一番新賺得嬌奴起怨情獨有東村王大姐依依猶憶舊時人又答萬古碧潭空界月頌曰萬古碧潭月盈虧時出沒撈摝非有無大辨終須訥四問如何是觀心若起本跡俱絶答泥佛填官路頌曰路邊掘土成尊像要走還將尊像填只恐傍人眉墮落漫同院主怨天然又答兩箇泥牛鬥入海頌曰泥牛鬥入海木人齊喝采堪笑石女兒猶向波閒待五問如何是止觀不二答天昏地陷頌曰混沌鑿開分兩儀成形成象漫猜疑虛空消隕知何許正是訛傳盤古時又答古鏡挂高臺頌曰古鏡挂高臺何妨胡漢來秀公空拂拭拂處轉多埃六問如何是具縛凡夫能知如來祕密之藏答幾處報讎身不死頌曰一自椎秦博浪沙轉逢黃石圯橋斜素書雖作劉家用與赤松遊路未賒又答跛足長年牢把柁頌曰專心牢把柁跛足難行路看風便使帆滄溟頃刻過七問如何是初發心時便成正覺答千場縱博家仍富頌曰梢粗膽壯賭場雄破盡寒酸士子風一擲便輸千億界陶朱雖富未堪同又答一線銀鉤光遍地頌曰銀鉤光遍地一線天邊麗初夜漏聲寒影向千江漬八問如何是不斷生死而入涅槃答大溈山下水牛肥頌曰不是冤家不聚頭自身有債自身酬牧童若解深深意莫把繩鞭強繫留又答七金香水浪滔天頌曰香水浪滔天潛流注百川誰能嘗一滴卻病且延年九問如何是續佛慧命答依舊可憐生頌曰果然依舊可憐生拄拄撐撐直到明普請大家同著力莫教倒卻葡萄棚又答饑來喫飯頌曰佛命不可斷饑來須喫飯一日要兩餐莫學餓死漢十問如何是臘月三十日用得著的答銀馬金錢接灶神頌曰銀馬金錢接灶神殷勤禮拜祝虔心一門和氣生千福四季平安抵萬金又答困來打眠頌曰臘盡事清閒困來便打眠一夢猶未足爆竹慶新年頌答如母問二首問人問祖師百年後甚麼處去祖云檀越家作水牯牛去學人隨來得麼云須銜一莖草來水牯牛即不問如何是一莖草答即是自己喫的頌曰生死路茫茫輪回正未央須銜一莖草切勿借他糧問溈山遇寒拾拾虎吼三聲又拈杖云喚者箇作甚麼意旨如何答忘卻了也頌曰兩度拈來一總忘何須平地別商量同條生不同條死愁聽寒鴉度夕陽禮舍利塔頌塔在歙縣豐南吳大年乃孫粲如家無量戒定慧莊嚴淨法身法身非非色非色未可名碎作八斛珠顆顆全性真是以廣流布在處呈光明善哉大年翁獲此出世珍善根不可盡亙古恆新新照此正信家允作菩提禎寧唯一家寶人天所共尊頂禮成緣種分明樂土津銘梵網室銘問豫何所矢恆參梵網旨坐斷百非源方知唯此是不離最初心即是舍那髓漸頓寧有歧一多豈異軌驗果愈明因托事益顯理莫謂浮囊微堪作中流砥諦觀心地門應信室非邇德林座右銘以冰霜之操自勵則品日清高以穹窿之量容人則德日廣大以切磋之誼取友則學問日精以慎重之行利生則道風日遠故曰忠以行己恕以及物又曰修其天爵而人爵從之淨社銘持戒為本淨土為歸觀心為要善友為依杖銘四首中虛而實節厲而溫助爾神足游戲法門追遺蹤於前邁導景從之後昆歸一兄木竹杖放去柱地擎天拈來磕頭砰腦同上須彌峰共行長安道咄若非撥草并瞻風不二法門何處討為蔣水新有首不昂有趾不鶩將欲向前退後一步為靈隱兄人謂爾虛我知爾實我扶爾行爾為我弼相對無言非千意密驀入千峰依然一室自用木竹杖淨信堂銘我所住堂皆名淨信輪相初開破疑前陳五悔功成至心發軔二觀圓融隨機善進平等法身三昧中俊觀察己心念佛心印決定應離雜亂垢燼三忍四佛康莊非峻梵網室銘我所住室即名梵網十方佛法猶如觀掌文字性離非默非響更言不立無端成兩心地法門戒光森爽性修交成實相斯朗法報化身體方且廣華藏莊嚴鏡中現像方竹杖銘四首藏虛於實寓圓於方拄天匝地隨君舉揚咄轉身何處尋蹤跡驀直歸家夜未央贈葆一直中繩方中矩欲問來由賓中識主贈如是兄不存軌則聊示方隅肩雲戴月逸塵而趨贈知卜母刓汝體母露汝端捨之栗栗用之跚跚自題拄杖銘有時拄地擎天塞斷聖凡鼻孔有時擔雲荷月挑開佛祖眼睛欲問何年骨董依稀煙水百城箸銘三首法味盈齒不煩染指離卻單傳白拈嚆矢用有待體無三爾知味我何貪單不立隻難擎借籌畫擬調羹王學古座右銘浩然之氣人皆性具何以養之集義是務義非可襲爰稱正路坦坦周行不憂不懼立命知天非域氣數閉門造車出門合度道之所存非毀何顧道之不録榮名何慕熟寐終夕彈指便寤南溟北溟任爾遊寓嗤彼昏盲蠅趨螄附夏則喜風冬乃貪燠悟性成修力用斯裕摩尼在幢衆寶普澍此外尋玄五十百步四無量心銘四首視人之善猶己之善視己之善猶人之善念念同觀亙古無閒法界偕遊四德城方滿最初宏誓願慈視人之惡猶己之惡視己之惡猶人之惡猛省力除無令愧怍法界衆生三毒除彼我同歸無上覺悲視人之樂猶己之樂視己之樂猶人之樂所欲與共嫉妒永卻法界同欣法喜充不向偏空尋略彴喜善惡性具善惡性空何喜何怒如空御風默持機感妙應無窮大圓鏡智照不疲豈似權乘作意通捨妙嚴室銘為庸庵作忘粗斯妙不飾斯嚴慎爾幽獨自牧以謙干將匪利口斧誠銛君子自返慧日普瞻戒心戒方銘悔過不如防過惜福尤宜積福佛法深妙無窮切勿自棄自局若要熟處漸生先須生處漸熟艮六居銘一念迷妄六塵頓陳結根盤錯流逸奔塵造業招苦三有逡巡遂經曠劫茫弗問津遘此痛苦悟身非身拔妄內伏不見其人思不出位庶幾返真針止觀十二事針法無去來妄情徒撓了行非行大拙至巧行中立不倚未是深禪了住非住乃知不遷住身心未忘終成掉悔了坐非坐入三昧海坐萬善未圓忍墮癡獄了臥非臥夢行乃足臥搬柴運水體自如如無作而作白牛大車作名字性空何法何語不取於取諸佛所許語空華水月何去何來無見非見切勿亂猜見色空谷傳響正法恆宣聞所聞盡貫花湧泉聞聲栴檀伊蘭何美何敝鼻孔依然已超人世嗅香夢享酥酡醒不拭吻段食性空奚勞欣慍受味離既非有合亦何關無痛痛覺刀火間間覺觸法由心生心隨法幻覓之無蹤月沈古澗知法詞祈雨詞春苦雨夏苦晴一晴一雨唯識所呈識無主宰隨業所縈吁嗟業兮同分相成感此酷毒民弗聊生匪龍王之失德豈天帝之弗情由豫德之不類兮違誓鎧之深宏今竭志而悔過兮扣大士之宿盟悲下民之莫拯兮雲四合而雷轟霈甘泉於大地兮俾溪澗以淵泓農欣穫於秋實兮盜弭跡而安平荷三寶之恩濟兮漸去邪以歸正并翹請於天龍兮鑒豫懷之懇誠同輔弼於菩提兮共遄造乎覺城
