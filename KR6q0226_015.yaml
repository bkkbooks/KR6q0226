body:
  text: 説作法説破戒雖惡覆藏尤惡無過雖善改過尤善改過一塗三世諸佛證菩提之通津也故五悔法門凡夫迄等覺無不藉為進趣方便憂悔吝者存乎介震無咎者存乎悔禍福無門唯人自召世人正造罪時實是大惡不以為恥向人發露善中之善反以為羞甘於惡而苦於善遂成惡中之惡永無出期顛倒愚癡莫此為甚衆中懺悔能使不犯者倍加警策已犯者深生慚愧或亦發心懺悔學好者增長善根譏笑者亦植遠因兼可消我夙罪誡我未來如來立法決定不錯違佛語者非佛弟子矧造已能悔即是猛勇丈夫可敬可畏勇改一念成佛正因非具真信心深善根不能將此法門流通人世凡能此者皆當與勇施比丘同垂不朽合掌而説偈曰罪性本無生何須復覆藏覆藏罪成有不覆罪乃空嗟彼無慚人藉口觀實相作法尚不能豈達無生理若實了無生罪相即實相罪既即實相故無可覆藏如因病求藥乃獲得仙丹輕身而飛舉勝無病凡庸不捨作法懺而入無生理後後固具前前前亦通後慎終能如始深達諸緣起不欺於三寶及護法天龍將此真切心自度復化他回向安樂邦是名大乘道妙安説三界無安猶如火宅惟深入火光三昧者能轉煩惱業報之火為智慧火於中遊戲出沒自在無礙乃名妙安夫煩惱火與智慧火體一而異名者也非煩惱滅而智慧生以無智慧時煩惱決不滅故亦非智慧生而煩惱滅以有智慧時煩惱已先謝故如暗時無明明時無暗暗不障明明不破暗二法從不相到以明暗無體同以虛空為其體故如是智慧煩惱無體同以心性為其體故如火大緣於糞境臭氣逼人緣於栴檀馨香遠徹心性亦爾緣利為三塗緣名為修羅緣五常十善為欲界人天緣四禪四空為色無色界緣無漏偏真為聲聞緣覺緣六度萬行自利利他為菩薩緣於實相則名為佛夫心雖隨緣具成十界其性仍非十界猶火隨緣具有香臭其性仍非香臭也夫十界法外別無自心而一一界心還出十界猶香臭草木外別無火體而一一草木火種還燒一切諸草木也法華三乘人天龍女闡提無不授記作佛以一切草木之火同一火性故也能知一火一切火一切火一火者不於煩惱火外別求智慧火不于業火外別求神通三昧火不于苦報火外別求法性真火併世間聰明而置諸佛法是謂即煩惱火成智慧火用推人之手扶人毀人之口讚人怨憾人之心愛人慈人是謂即業火成解脫火知此根身器界一一唯心不作彼此人我種種情見則鑊湯爐炭劍樹刀山皆納僧家樂意三昧何況人間小小逆境惡緣寧非磨礱性真之具是謂即苦火成法身火是謂火光三昧偈曰迷時妙法成生死悟後三千性寂然寂然元不落空亡生死何嘗有實體為實施權説迷悟開權顯實迷悟絶迷情絶處悟無棲權實二名亦無寄非權非實法之本心佛衆生性匪殊依此建立權實門及以本迹不思議譬如蓮華不異時四微亦復無差別而説華因蓮為果果又生因不可盡若人識得心蓮華長在三界非界攝便能恆轉如是經百千萬億無數卷序正流通及勸發一彈指頃功圓滿謙光説易曰謙德之柄也謙尊而光卑而不可踰此與當仁不讓於師之旨無殊經云心佛衆生三無差別衆生與佛平等不應輕於一切故示以謙佛與自心平等不應諉能於佛故策以不讓不讓故無卑劣慢謙故無增上慢及我慢邪慢此謙之實義也欲契此實義應諦觀現前一念心之自性適言其有覓不可得適言其無應用無盡以為在內周遍六虛以為在外覺滿身際以為即身夢不俱寐死不俱滅以為離身除卻四大六根畢竟便無形相是知凡夫終日在妄之心性即離過絶非之心性不俟成佛而後離過絶非也夫我心性本自離過絶非何得讓能於佛一切衆生心性亦罔不離過絶非何得稍生忽慢由不讓故上合十方諸佛與佛如來同一慈力由不輕故下合十方衆生與諸衆生同一悲仰是謂尊而光卑而不可踰君子之終也孝聞説世出世法皆以孝順為宗梵網經云孝順父母師僧三寶孝名為戒蓋父母生我色身師僧生我法身三寶生我慧命是故咸須孝順而欲修孝順者尤須念念與戒相應如曾子云無故而殺一蟲蟻非孝也無故而折一草木非孝也世孝尚爾況出世大孝乎以要言之真能孝順父母師僧三寶決不敢犯戒造惡經言孝名為戒者正欲人以戒為孝故也夫世間孝以朝夕色養為最小以不辱身不玷親為中以喻親於道為大出世孝亦如是勤心供養三寶興崇佛事小孝也脫離生死不令佛子身久在三界淪溺中孝也發無上菩提心觀一切衆生無始以來皆我父母必欲度之令成佛道此大孝也舜盡世間大孝之道玄德升聞於堯而為天子今出家兒盡出世大孝之道玄德聞於法界必成無上菩提明矣洗心説夫心性本自離過絶非靈明清淨秖由無始無明迷理為咎妄有三惑譬如浮雲翳彼太虛然浮雲決不從太虛外來以虛空性無外故則無明三惑亦豈從心性外來而心性豈有外哉心性無外何有能洗所洗當知既約全體成迷假説能翳所翳亦約全迷歸悟假説能洗所洗全體成迷猶全水成冰冰即翳水而不令流動也全迷歸悟猶全冰成水水即融冰而不令質礙也於一心中既妄成三惑了彼三惑即成妙三止矣體真止者了知十界無非一心能融界內界外見思之惑方便隨緣止者了知一心具足十界能融界內界外塵沙之惑息二邊分別止者了知一心十界十界一心不可思議能融根本無明之惑由能融惑也三止皆有止息義焉由能了知也三止皆有停止義焉由惑與理無二體能融所融能知所知無二致也三止皆有不止止義焉三止各具三義則是九義九義秖是三止三止秖是一心一心本無能洗所洗而能洗所洗宛然不濫易傳曰聖人以此洗心退藏於密義極於此大經曰三德若縱亦不名妙三德若橫亦不名妙三德不縱不橫名祕密藏乃名為妙契此妙密功在於智發此妙智不離於心心智既發則三惑融泮如湯消冰假名為洗請更以佛頂證之經云指皆是物無是見者此明妙心離一切相體真止也又云微細發明無非見者此明妙心即一切法方便隨緣止也又云此見及緣元是菩提妙淨明體云何於中有是非是此明妙心離即離非是即非即息二邊分別止也即此一章宛具三止即彼三止各含三義若向此處真實體會不泥語言文字亦不悖語言文字從見色聞聲處分疏得下從語言文字中照剖得來方知一代時教千七百公案説來説去無不是者箇道理千變萬化總是一條線索一條線索具足千變萬化便可坐微塵裡轉大法輪剖一塵出大千經卷以大千經卷收入一塵亦不見有大千相亦不見有一塵相亦能使大千一塵各各宛然不相妨礙不相映奪是謂至顯至露至微至密是謂非顯非密亦顯亦密是謂無可洗而洗是謂若欲淨土當淨其心隨其心淨則佛土淨矣慈濟説佛道曠濟以孝為宗孝該萬行以慈為要慈心三昧之力毒藥可為甘露刀杖化為天華誠救劫濁之良藥解冤業之神咒也嗚呼四大同體覺性無差何彼何我孰怨孰親由迷強故橫計是非由執重故妄成憎愛愛則相生不斷憎則相害不息順則憎復成愛逆則愛復成憎憎愛遞來怨親互作別業同造劫感刀兵設不修行大慈何以濟茲大難誠能設七境以繫心施三樂而調意乃至上怨緣中與以上樂心生喜悅無復嫉惱以此定向刀山刀山必折以此定向火湯火湯必滅故知普門究竟無畏神力不離吾人現前一念慈心也設滿閻浮人盡修此慈心三昧娑婆不即轉為淨土者三世諸佛即為誑語縱大地造殺一人獨修此一人未嘗不獨得清泰也唯智者能深信之念佛三昧説全城章潔之述乃翁宇衡生平實行臨終念佛坐逝及其先慈武碩人得秉歸戒正念善終因緣乞豫一言莊嚴淨土淨名經云若欲淨土當淨其心二先尊心既淨矣土安得不淨乎且居士孝思不匱深向法門心又淨矣土安得不加淨乎是何俟豫言而豫始可以言也妙宗鈔云五濁輕則同居土淨體空巧方便土淨圓三觀實報土淨究竟證寂光土淨夫淨土之道若大路然固不難知淨土之理若大海然豈一蹴盡乎令先人五濁習輕同居之淨蓋可必也至於淨方便實報寂光善繼善述全賴君之孝思居士但諦審諦觀此一念孝思在內邪在外在中間邪過去邪現在未來邪青黃赤白邪長短方圓邪自生邪他生共生無因生邪有邪無邪亦有亦無非有非無邪如是觀已於心無所取於法無所著了知孝思當體即空即假即中即空故見思淨即假故塵沙淨即中故無明淨三惑淨故三土亦淨自心三土淨故父母三土隨淨以無心外之父母故如觀一念孝思任運能淨三惑觀一切善念一切惡念一切無記念亦復如是是名覺意三昧亦名念佛三昧以知自心即空得見化身佛知自心即假得見報身佛知自心即中得見法身佛如觀自心能見三佛則念三佛亦即顯發自心三德故曰觀身實相觀佛亦然觀佛實相觀身亦然生佛不二父子一體能度所度俱不思議慎毋曰但向父母未生前薦取也饒你説箇父母未生早已有無邊生死而只向現前一念覷破何嘗是父母生的故曰十世古今始終不離於當念了卻目前更無剩法深思之孕蓮説亦名求生淨土訣癸未冬豫弘法華於普德李石蘭居士忘其齒爵最先皈依時有求子凡情豫名曰淨育越三年則轉其求子之心塑佛像朝夕戀慕一意求生淨土矣豫語之曰世間生育膿血雜亂安得稱淨唯蓮華化生乃真淨育居士當別號孕蓮豫更請以要訣券焉古人謂愛不重不生娑婆念不一不生極樂居士既不求子則愛已輕又能塑佛則念已一乃更有要訣者蓋莫切於是心作佛是心是佛二語也夫栴檀不過世間木耳燒則成灰雕則成像豈非隨心所作乎既成像矣朝夕禮拜瞻對朝夕在心目中心外無佛豈非即心而是乎若知所雕佛像的的心作心是則知極樂彌陀亦的的心作心是也若知極樂彌陀心作心是則知十方三世一切諸佛亦的的心作心是也若知一切諸佛心作心是則知一切淨土亦的的心作心是也以唯心淨因育唯心淨果無生而生生即無生操此券而猶墮疑城斷不可得悟此訣而猶謂淨土法門不至圓頓尤不可得矣陳子法名真朗法號自昭説詩曰既明且哲以保其身夫身非七尺肉團之謂也聖人以天下為一身以萬古為一息故必天地位萬物育而後謂之保身大學明明德於天下論語一日克己復禮天下歸仁皆此理也王陽明超漢宋諸儒直接孔顏心學一生示人唯有致良知三字良知者性德靈明之體大學之所謂明德論語之所謂已詩之所謂身也致者稱性圓照之功大學之所謂明論語之所謂克詩之所謂保也苟不悟良知則何所用其致苟不用致之之功則良知何由全體顯現得大受用故吾命汝名曰真朗即直指汝良知本體欲汝全性起修也又命號曰自昭欲汝念念致其良知不向外求全修在性也果能顧名思義何難憲章姚江祖述洙泗又何難遠溯熙河朝宗於香水大海也哉法器説盈天地間皆器也天為覆器地為載器日月為照明之器虛空為容受之器夫誰為不器者其唯形而上者乎然形而上者使離於天地日月虛空萬物不幾為兔角龜毛哉縱天地日月虛空萬物外果別有一法名之曰道其誰見聞之設可見聞又一器而已矣何名不器吾是以知形而上者謂器即不器器即不器乃可稱法器耳子以四教文行忠信文行忠信古之學者以之為道今之學者以之為器顏子博文約禮而欲從末由則何器非道由求赤各得其偏而富強禮樂則何道非器惟吾佛門亦然三藏十二部佛之以文教也四等六度佛之以行教也至誠心深心回向發願心佛之以忠信教也文為般若德行為解脫德忠信為法身德般若有三謂文字觀照實相亦三德也解脫有三謂性淨圓淨方便淨亦三德也法身有三謂自性受用變化亦三德也三三不為多一三不為少不縱橫不並別隨拈一法諸法頓彰何器而非道何道而不具足一切器先儒謂物物一太極太極本無極庶幾近之蓋以太極為太極則太極亦一器矣知太極之本無極而物物無非太極則物物無非道矣以此持戒名無上戒以此念佛名無上禪以此閲教名甚深般若以此禮拜持誦作諸善事名普賢行門將此隨類度生名遊戲神通若未悟此而勤修行門秖名有漏有為若離諸行門而別求向上一著秖名龜毛兔角亦名捉影捕虛故不曰不器而曰法器夫器以法稱不逃空於器外不局有於器中非有非空超諸戲論真儒邪真佛邪吾不得而區局之矣聖學説佛祖聖賢之學無他求盡其心而已盡其心者不於心外別立一法不於心內欠缺一法是故為子臣弟友止孝忠順信充惻隱辭讓羞惡是非之心而仁義禮智不可勝用造次顛沛必於是可以久處約長處樂皆由了達心外無法故也六祖云法法皆通法法皆備而無一法可得名最上乘今人甫欲通備一切法必捨自心而求諸外甫説法皆無實必固守癡頑而不知藉境鍊心無怪乎不墮枝離之學便落暗證之坑也夫不知萬法唯心泛求諸事事物物安得不罔不知心具萬法獨取一昭昭靈靈安得不殆嗟嗟昭昭靈靈尚不可取況昏昏墨墨哉真志佛祖聖賢者素位而行不願乎外凡富貴貧賤種種境緣皆大爐韛一切時中動心忍性增益不能然後富貴不淫貧賤不移威武不屈如松柏亭亭獨秀於霜雪間而天地之心賴此見矣吾悲儒釋真風今日盡皆掃地良由學儒者急富貴學佛者在利名元無佛祖聖賢襟期故學問操履行門皆適助其虛妄如良田然種未植莠未藝而灌以糞膩益增蕪薉而已學者但向心田中保護菩提嘉苗芟刈名利莠草隨時溉灌勿助勿忘守到白露秋分自見秀而且實至於旱則車水潦則開渠雖神農復興亦不能使歲時無旱潦也以此方便自養善根令成熟度脫便堪以四悉檀益物令其番番種熟脫盡未來際無所不度而吃緊關要只在今日最初一步蓋南其轅則步步近楚北其轅則愈趨愈遠縱能久後覺悟改轍不唯所傷既多亦枉卻多少功夫豈不可惜此苦口良藥勿但作文字看過道理解過直滴滴入口從咽喉灌入臟腑三百六十骨節八萬四千毛竅皆為藥味所透庶幾也已文最説天下不治由人心不明人心不明由聖學不講聖學不講由功利不忘功利不忘由自待菲薄君子莫貴厚自期待也誠念念自厚則大行不加窮居不損有何功利不忘功利既忘凡接對師友誦讀詩書專為身心性命有何聖學不講聖學既講行一不義殺一不辜而得天下不為有何人心不明人心既明正己而物正有何天下不平治也哉今之文學吾惑焉不求於自心不合於聖學惟趨時襲取科甲為志苟遂厥志則恣其人欲之私而莫知返無怪乎世道人心大壞而不可救也雖然非文之咎文不知其最者之咎也出世之文迦文為最治世之文文宣為最迦文捨身求得半偈文宣遇難曰文王既沒文不在茲乎此皆於文而知其最者也文之最者始於大聖大賢極於諸佛菩薩誠以聖賢佛菩薩自厚舉凡道德文章功名富貴皆非五霸假之皆非義襲而取吾所以勗文最者無他惟以文最厚自期待而已藏野説易曰聖人以此洗心退藏於密吉凶與民同患又曰同人於野亨蓋不藏不足以致用而不於野不能為大同乾之初九曰潛龍勿用潛即藏也藏者道之體也歷見惕躍飛而不改其本體故曰不變塞焉知進退存亡而不失其正也世但謂乾為陽物坤為陰物而已孰知一陰一陽之謂道即形而下是形而上其君之也即所以藏之其藏之也即所以君之元非偏屬者乎故又曰乾坤其易之蘊邪蘊即藏也藏乾坤於易易外無乾坤藏易於乾坤乾坤外亦無易又以易與坤而藏於乾乾外無坤與易也以乾與易而藏於坤坤外無易與乾也斯之謂物物一太極太極本無極也恥菴説恥者心耳心之精神是謂聖聖人不過有恥而已富貴庸人所嗜也豪傑恥之功名豪傑所矜也聖人恥之恥至聖賢大行不加窮居不損能以道援天下禹稷顏子易地皆然此世間之行己有恥也出世之道何莫不然人天五欲色無色定凡外所嗜三乘賢聖恥之偏真涅槃二乘所尚諸大菩薩恥之出假神通菩薩所宗圓頓行人恥之故世出世最有恥者莫尚圓頓行人矣名字以未登五品為恥觀行以未淨六根為恥相似以未證法性為恥分真以未滿本體為恥所以立躋妙覺而不見其功也恥之於人大矣信哉柴立説一切名號無不性空性空之義則不可盡不可盡空即是第一義空故一一號體即法界不當以世出世事局取之也然惟超越世間出世間則能遍入世間出世間世間柴者孔子所謂柴也愚也世間立者孔子所謂立於禮也子羔足不履影啓蟄不殺方長不折避難而行不徑不竇乃能見恩於被刖之人非所謂其愚不可及乎出世柴者釋迦為降苦行外道示現雪山苦行六年其骨柴現而不顛仆故名柴立夫苦行雖非正道然借此降伏外人則自立立他皆在此矣今居士欲為世間聖賢當學子羔欲為出世佛祖當學釋迦苟能學此世出世間之道則能超越世出世間獲二殊勝你有拄杖子與你拄杖子你無拄杖子奪卻拄杖子縱橫殺活無不自在喚作柴立亦得不喚作柴立亦得三千性相百界千如盡向柴立二字中炳然齊現柴立為法界一切法趣柴立是趣不過柴立尚不可得何況更有趣與非趣迷此柴立法界則無始流轉生死悟此柴立法界則速證安樂妙常故知六凡法界原在居士身中自取輪回四聖法界亦在居士身中放光動地居士會麼堂堂獨露無他物莫認摩尼作水晶茶毗説人之受生識壽暖三而已識業所牽也壽暖識所變之相也依出入息名之為壽即風大暖即火大識外無壽暖業外無識妄想外無業業為受生之因識壽暖三為受生之果因果總不外於妄想妄想無性則因果亦並無性明矣衆生於無性因果法中慣起妄想種種計著謂有實我實法枉受輪回大覺愍之為設方便生則教以觀我法空令永斷苦因死則教作茶毗佛事令速脫冥滯蓋火葬者所以裨二空觀慧也凡夫執情重見理不分明語以茶毗則詫為不情楚石大師示寂於洪武三年時禁火葬師欲遵佛制太祖特為開例噫聖賢明達若此復何疑哉宜之老居士捨所卜兆宅入棲霞常住發願必遵火葬非深觀我法二空者不能也持名念佛歷九品淨四土説若欲速脫輪回之苦莫如持名念佛求生極樂世界若欲決定得生極樂世界又莫如以信為前導願為後鞭信得決願得切雖散心念佛亦必往生信不真願不猛雖一心不亂亦不得生云何為信一者信阿彌陀佛願力二者信釋迦文佛教語三者信六方諸佛讚歎夫世間正人君子便無妄語況彌陀釋迦六方諸佛豈有妄語此而不信真不可救故須先生深信勿起疑惑云何為願一切時中厭惡娑婆生死之苦欣慕淨土菩提之樂隨有所作若善若惡善則回向求生惡則懺願求生更無二志是名為願信願既具則念佛方為正行改惡修善皆為助行隨功力之淺深以分九品四土纖毫不濫只須自己簡察不必旁問他人謂深信切願念佛而念佛時心多散亂者即是下品下生深信切願念佛而念佛時散亂漸少者即是下品中生深信切願念佛而念佛時便不散亂者即是下品上生念到事一心不亂不起貪瞋癡者即是中三品生念到事一心不亂任運先斷見思塵沙亦能伏斷無明者即是上三品生故信願持名念佛能歷九品的確不謬也又信願持名消伏業障帶惑往生者即是凡聖同居淨土信願持名見思斷盡而往生者即是方便有餘淨土信願持名豁破一分無明而往生者即是實報莊嚴淨土信願持名持到究竟之處無明斷盡而往生者即是常寂光淨土故持名能淨四土亦的確不謬也問曰如何持名能斷無明答曰所持之佛名無論悟與不悟無非一境三諦能持之念心無論達與不達無非一心三觀只為衆生妄想執著情見分別所以不契圓常殊不知能持者即是始覺所持者即是本覺今直下持去持外無佛佛外無持能所不二則始覺合乎本覺名究竟覺矣問曰既始覺合本則當下即常寂光如何亦説往生答曰若達當下即常寂光又何妨説箇往生蓋往即非往非往而往生即無生無生而生文殊善財之生西方者此也咄哉男子無措思惟文戒淫文人知殺生之業最慘不知邪淫業尤慘也人知殺生之報最酷不知邪淫報尤酷也蓋種種受生肇端淫欲種種造罪托因有生淫為生本生為罪本是故三塗劇苦人世餘殃淫意才萌一切俱起淫習難斷如火燎原於極臭處謬為香美於極穢處謬為潔淨隨處苟合何異畜生非道染觸過於雞犬此在稍有良心者便應痛絶奈何聰明學識之士甘此喪心無恥邪一念欲心是鐵床銅柱因一念愛心是積寒堅冰因況具行非法滅理亂常塵沙劫數不足盡其辜千萬億言不足數其惡須發大慚懼大誓願寧火炙刀剜終不與一切男女欲心相觸寧碎身粉骨終不與一切男女汙穢交遘設忘正念更犯前非必遭毒害橫災生身陷入地獄以茲猛決善自要心時時懺除往業切切悔過自新庶白法可修而又勤觀經論格言以策廢忘精修對治觀行以除毒本不然縱有多智禪定現前必落魔道永無出期矧世智辨聰曾非大器隨業直墜百劫千生受諸燒煮尚不成魔安能成佛尚失人道安能往生請於靜時仔細思之於對境努力防之不然諸佛無下手處善友其奈爾何哉勸戒殺文自佛法東流人知殺生為首戒垂為勸誡充楹積棟矣而猶多未悟者冤業虛妄結集不能頓解也經云除奢摩他及佛出世不可除滅嗚呼懵懵斯世將何抵極殺業既厚劫成刀兵寇賊紛然干戈不息釋迦往矣彌勒未生設欲拯救惟力修奢摩他耳奢摩他此翻妙止止一切惡從止殺始若能止殺即是止一切惡又止有三義一體真止觀此身惟四大合成毫無實我可得我既無實何得殺彼生以養之彼我皆無實即是同體何忍殺之二方便隨緣止觀一切靈蠢無始以來恆與我互作父母妻子親緣眷屬隨業改形所以不識若殺害之是殺我過去六親也安得不種種方便而救護之三息二邊分別止若但觀生空悲心不熾但觀緣屬慈心未周今直觀蠢動含靈皆有佛性皆得作佛無論大小升降本覺平等終無有二豬牙中現化佛蛤蜊中現大士毒蛇聞偈而轉身證果鸚鵡念佛而焚得舍利當知蜎飛蠕動鱗甲羽毛或是過去諸佛或現在如來或未來世尊那有可殺之理能修此三止即成三慈三慈既成名佛出世一人修之轉化多人多人修之轉化無盡傳傳廣化普遍十方庶最慘殺業可停刀兵劫濁可救也修元性沙彌幼持齋戒癸酉忽萌一食肉想夢至陰府備見殺生者受報楚毒歷歷分明乃革心自矢蓋以深知過患方敢孜孜勸人豫為申其説而獎助之普願仁人君子體天地好生之德推聖賢惻隱之心必使殺機永斷天下歸仁而又念娑婆之苦空企樂邦之常淨一念十念咸彰三觀妙修自戒戒他悉合三慈妙行止觀不二福慧俱崇虛妄結業如湯消雪則釋迦含笑於寂光彌勒授手於兜率無量壽在其頂門觀世音為其勝友矣惠應寺放生社普勸戒殺念佛文夫物雖至微未有不貪生惡死者此貪生惡死之心全是煩惑亦全是靈知靈覺所發現也吾人貪生惡死情與物同苟充此情所欲與共所惡勿施安得不是靈知靈覺苟昧此情但知我生可貪不知他亦貪生我死可惡不知他亦惡死安得不是煩惑是故若欲放生先須戒殺欲拔生死煩惑必須深心念佛深心者自救救他之心佛者靈知靈覺之極致深心念佛者以自救救他之心契於靈知靈覺之極致令若自若他念念解脫者也以此為正行以不殺大悲放生大慈助嚴之必生極樂蓮華化現永脫輪回之苦所以修曇禪友公路居士等盡心竭力普皆勸請也有緣遇此佛圖便請專精受持展轉勸人功德尤為不可思議當知生佛同體佛者無上衆生衆生者即未來諸佛一念一切念一切念一念可也
