body:
  text: 古歙門人成時編輯緣起毗尼事義集要緣起毗尼藏者佛法紀綱僧伽命脈苦海津梁涅槃要道也粵自雞園初唱召善來而戒體斯成逮夫鶴樹潛暉申顧命而木叉是重必因犯以乃遮體則協於無作若緣開與隨制用復契乎妙圓實大小之通塗詎聲聞之獨轍堪嗟像季罕達真宗愚者昧於罔聞狂者置諸弗屑以禪機而巧遁或方廣為駕言並屬依文誰思實義且如能師既佩心印胡闡化曹溪猶用登壇受具觀師大弘華嚴胡範模朝野必須十誓律身蓋大雄御極法僧二寶咸由正覺揚輝而善逝藏機佛法二尊同藉僧伽建立儻惟十重衆輕即與在家奚別自非五篇七聚安知離俗高標是知梵網戒經五道齊收但除地獄則以通而成其大毗尼法藏止許人倫猶遮諸難正以局而成其尊必使仰慕大乘不甘小節自可畜髮捨衣作火中優鉢如或情悲末法有志住持豈得恣情蕩檢為師子身蟲智旭自念障深復悲生晚痛隙駒莫贖捨慈母以披緇思樂土可歸羡蓮師而私淑綱宗急辨每懷紫柏之風護法忘身願續匡山之派睹時流以長歎讀遺教以增哀爰於甲子季冬禮無量光塔倍復發增上心乞古德闍梨證明學菩薩戒次即備閲大小二律輒宗四分并採餘家録為事義要略漫率愚蒙鄙見難似大方擬作巖谷資糧無心兼利戊辰春遇雪航楫公有志嚴淨因念向以入山心迫所録猶多疏漏乃就龍居再檢藏文本部他宗凡切要者悉皆録出深詳輕重之宜備顯開遮之準兼參大律委示別同俾畏拘執者不招謗小之殃喜儱侗者難開藉大之口考訂成帙更名為毗尼事義集要復同壁如歸一二友商確參訂備闡其致嗚呼斯集也雖於妙高之體不啻微塵其在駑劣之資已稱竭力所憾解慧疏庸躬行缺略仰愧往哲俯怍後賢惟願同學善友鑒我苦心愍我不逮一意秉持共扶法運庶報佛恩於萬一爾靈峰寺淨業緣起嘗觀淨土之為勝異正不在寂光實報方便而在同居蓋三土斷惑乃生惟同居直以信願相導感應道交五濁之習稍輕三界之苦斯脫而又即此西方極樂豎徹方便實報寂光故下愚皆可登其閾上智終莫踰其閫三根普資四悉咸備正法住世諸祖已共弘揚末運迷津四依能無獨讚乃世之駕言直指者以西方為鈍置學語大乘者以淨土為退休不思不假方便自得心開安有如斯曲徑妙華盛裓遍供億方安有如斯小乘且既悟直指是名見性成佛何故拒彌陀於自性之外既乘大願必須嚴淨佛國何故揀極樂於剎海之中夫聲聞權教不聞他方佛名四果神力僅周三千界內彼十萬遐方尊特善逝非勝進大士勇猛丈夫孰能親近承事甫育蓮臺便階跋致較矢心參究期剋三生已悟心宗猶曰生生不退佛階可期者難易遲速皎然可知六方調御同口讚揚遍吉文殊誠心勸發豈欺我哉法流震旦禪律性相皆法久弊生勢窮須變惟茲玄猷始匡嶽訖五雲或刻蓮漏於六時或發妙宗於三觀或導萬善以同歸或融一心於事理法無不收機無不攝故得法流益久法道愈光聲化所洽遠及山谷鄣南靈峰講寺石峨頎公請雪航楫公結社茲山復有抱一粹沙彌季清程居士共稟彌陀弘願同闡勢至法門佛聲浩浩偕松風烏語並顯圓通僧德雍雍率牧豎耕夫同入三昧橫超三界無煩九次第修豎徹寂光不俟三僧祇證誠劫濁津梁昏衢寶炬也八關戒齋勝會緣起祖意不明出世無正眼教法不講修行無正路齋戒不持踐履無正功末法通弊其來久矣豫嘗謂有志之士非明祖意不足與論教法非精教法不足與課戒齋此理悟事修之説也若夫因戒生定因定發慧如來一代教門不由斯戶終難入室檇李善信倣佛制作六齋會六日各修一行初八放生先充同體大悲十四禮懺其淨自他三障十五誦經種圓頓之聞熏草三究義開自心之覺路草九坐禪悟一心之本源三十念佛淨唯心之四土終而復始永矢弗諼未種善根者今當令種已種善根者今令增長展轉誘化漸次深入熟於斯脫於斯原始要終未嘗離此八戒齋法庶幾末運為之一轉已退戒緣起并囑語智旭生於萬歷己亥二十四歲壬戌為天啓二年痛念生死事大父未葬母不養決志出家時紫柏尊者已寂圜中雲棲老人亦遷安養憨山大師遠遊曹溪力不能往其餘知識非豫所好乃作務雲棲坐禪雙徑訪友天台念念趨向宗乘教律咸在所緩後因幾番逼拶每至工夫將得力時必被障緣侵擾因思佛滅度後以戒為師然竟不知受戒事何為如法何為不如法但以雲棲有學戒科遂從天台躡冰冒雪來趨五雲苦到懇古德法師為阿闍梨向蓮池和尚像前頂受四分戒本此二十五歲癸亥臘月初八也甲子臘月二十一重到雲棲受菩薩戒乙丑春就古吳閲律藏四旬餘録出事義要略一本此後仍一心參究宗乘矣戊辰春雪航楫公留住龍居再閲律藏一遍始成集要四本己巳春送惺谷壽公至博山剃髮無異禪師見而喜之即欲付梓豫曰未可也是冬同歸一籌師結制龍居更閲律一遍訂成庚午正月初一然臂香刺舌血致書惺谷三月盡惺谷同如是昉公從金陵回至龍居請季賢師為和尚新伊法主為羯磨闍梨覺源法主為教授闍梨受比丘戒豫三閲律始知受戒如法不如法事彼學戒法固必無此理但見聞諸律堂亦並無一處如法者是夏為二三友盡力講究不意或尋枝逐葉不知綱要或東扯西拽絶不留心或頗欲留心身嬰重恙聽不及半其餘緣衆無足責者豫大失所望解夏後結壇持大悲咒惺谷以此書呈金臺法主隨付梓人次年豫入壇持大悲咒十萬加被之然已發念退休越二年癸酉安居作八鬮供佛像前然香十炷一夏持咒加被自恣日更然頂香六炷拈得菩薩沙彌鬮深自慶快願永作外護奉事如法比丘孰意末運決難挽回正法決難久住豫又病苦日增死將不久追思出家初志分毫未酬數年苦心亦付唐喪撫躬自責哀哉痛心恐混迹故鄉虛生浪死故決志行遁畢此殘生以手書集要全帙謹付徹因海比丘仍涕泣而囑曰嗚呼佛法下衰斯時為盛毗尼一脈不絶如絲教道禪宗尤為混亂豫數年苦心未能砥狂瀾於萬一僅成此書并問辨音義各二卷一文一字罔敢師心一義一法咸符聖教蓋不惟律部精髓亦禪教綱維由斯戶可升堂入室執斯鏡可照膽辨邪惜公根性稍鈍僅知開遮持犯條目未達三學一貫源委且福相未純智慧力薄缺於辨才短於學問豈能即弘傳斯道但念公之從豫遊者五夏有三事足取焉幾番惡辣鉗錘難堪難忍絶無退心縱未頓改舊觀番番略有進益有人如法受具未肯細心行持惟公聽集要後輕重諸戒悉思躬行豫癸酉甲戌匍匐苦患公獨盡心竭力相濟於顛沛中毫無二心充此三善之致何必不可荷擔正法但須解行雙修戒乘俱急虛其心實其志擴其眼界牢其腳跟盡在我修持任外緣自集萬勿輕舉妄動貽羞法門儻煩惱未伏慧眼未開辨才未具學問未充縱有福運須力卻之況作意邀求邪苦身形堅願力依念處而精進行道以律藏為法身父母臨深履薄守茲一脈儻遇英哲當殷重付囑之無其人寧供塔廟尊像中慎莫授非人也天定能勝人人定亦能勝天豫運無數苦思發無數弘願用無數心力不能使五比丘如法同住此天定也然此思此願此心此力豈遂唐捐公若善繼吾志敬守之以俟後賢庶幾亦可稱人定乎始終不忘吾囑千里同風否則塵劫永隔矣勉哉化持地藏菩薩名號緣起吾人最切要者莫若自心世間善明心要者莫若佛法然佛法非僧不傳僧寶非戒不立戒也者其佛法綱維明心要徑乎慨自正教日替習俗移人髡首染衣不知比丘戒為何事一二弘律學者世諦流布開遮持犯茫無所曉況增上威儀增上淨行增上波羅提木叉乎又況依四念處行道增心增慧以成三聚五支者乎嗟嗟三聚五支不明謂大乘僧寶吾不信也僧既有名無義謂傳持佛法明了自心吾尤不信也堅淨信菩薩憫之以問釋尊釋尊倍憫之委責地藏大士大士更深憫之爰説占察善惡業報經經曰惡業多厚者不得即學定慧當先修懺法所以者何此人宿習惡心猛利現在必多造惡毀犯重禁若不懺淨而修定慧則多障礙不能剋獲或失心錯亂或外邪所惱或納受邪法增長惡見故先修懺悔若戒根清淨及宿世重罪得微薄者則離諸障又曰雖學信解修唯心識觀真如實觀而善根業薄未能進趨諸惡煩惱不得漸伏其心疑怯怖畏及種種障礙應一切時處常勤誦念我之名字若得一心善根增長其意猛利當觀我及諸佛法身與己自身體性平等無二無別不生不滅常樂我淨功德圓滿是可歸依又觀己身心相無常苦無我不淨如幻如化是可厭離如是觀者速得增長淨信之心所有諸障漸漸損減此人名為學習聞我名者若雜亂垢心誦我名字不名為聞以不能生決定信解但獲世間善報不得廣大深妙利益嗟嗟由此觀之戒不清淨二觀決不易修二觀不修一實何由證契而欲戒根清淨捨懺悔持名豈更有方便哉且持名一法自其淺近言之愚夫愚婦孰不能矢口自其深遠言之不達法身平等雜亂垢心不得名為聞矣故知以二觀為指南能修二觀方為聞菩薩名以聞名為方便真實持名便是圓攝二觀故名聞障淨障淨戒得戒得定慧發生定慧而一實證入矣明心見性是真僧寶真傳佛法吾輩生末葉聞此真法宜何如努力以自勉也成唯識論觀心法要緣起夫萬法唯識驅烏亦能言之逮深究其旨歸耆宿尚多貿貿此無他依文解義有教無觀故也然觀心之法實不在教外試觀十卷論文何處不明心外無法即心之法是所觀境了法唯心非即能觀智乎能觀智起則二執空而真性現所以若境若教若理若行若果皆名唯識而五位五觀一以貫之紛而不雜賾而不亂者也慨自古疏失傳人師異解文義尚訛理觀奚賴鈍者既望洋而退利者復蔑裂而求四分之旨未諳一心之宗徒設三性之理未究二諦之致安歸賴有開蒙問答楩概僅存大鈔宗鏡援引可據而溯流窮源則瑜伽顯揚諸論尤黃河之有宿海於是紹覺法師音義一雨法師集解宇泰居士證義無不殫精竭思極深研幾然教道已明觀道未顯嗣有新伊法師為之合響力陳五觀冠罩諸家尚未刊行僅獲染指適二三同志擬從能變所變差別之塗以開性具性遍圓融之鑰漫爾饒舌兼命管城不敢更衍繁文秖圖直明心觀隨講隨録用質大方序一尚友録序豫十二三即思尚友草四出家益願得同學善知識然但以直諒多聞為貴正不念中孚之在虛而夬履之貞厲也碌碌七年我不知人人亦不知我麗澤之懷且為豐蔀所蔽幾不自覺矣舊歲夏初惺谷壽公見豫白牛十頌遂傾締千古而豫罔知有惺公也半年餘每發諍論我不能受益公亦無由益我仲冬再遇歸一籌師方能照我所短而奪我所守然後日有開發及新正又遇雪航楫公我三人見其有可切磋處遂力屈其我慢拔其諂曲頓令知有正修行路彼益既大我益倍深歸惺二師受益亦甚從此始知友朋真樂嗟乎友道豈易得哉惟心虛則明明則能知人之長知人而後直相與諒相信多聞相熏儻陳見橫於胸中人不能益我我亦不能益人僅可作悠悠泛泛之交安所得直諒多聞之實也且如雪公與我久盟交五雲歸師與我向識荊台嶽惺公與我亦既辨論於夏秋而締盟雅契皆俟今日始定豈非昔者不虛為咎邪然非歸師不能令惺公益我非惺公亦不能令歸師益我而非我亦不能令歸惺二師互相得益非我等三人不能大益雪公而非雪公又不能令我三人皆得大益生我者父母成我者朋友詎不信然今以往樂多賢友更何容生厭足心是以録唱和願文諸稿用作尚友前茅凡欲為千古極則人者當不以辭之拙而忽其心之苦也廣孝序舜孝稱大武周孝稱達大以德為聖人達以繼志述事此世間孝之極致也引而伸之觸類長之可論出世孝矣出世孝非聖中聖不能盡惟大雄世尊從初發心深達曠劫因緣觀六道衆生皆我無始以來父母而迷暗輪回頑嚚何止倍於瞽嫗故僧祇妙行直欲盡衆生界令其底豫無不允若則夔夔齋栗又何止倍於大舜是以正覺初成木叉首唱必以孝順為宗此出世第一大孝也次地藏大士目連尊者發僧郱願地獄頓同解脫設盂蘭供亡母即得生天繼先人未有之志述先人必應之事此出世第一達孝也我等既已發菩提心行菩薩道緬思各各生身父母或生時不聞三寶或雖聞不信或雖信不解或雖解不修逮生從緣謝報逐業遷升沈九有歷嘗三苦斯時捨拔濟更何所志捨歸依更何所事繼之述之責在當人旻昭陳居士廣修孝思以真釋心行作真儒事業為二先大人設妙供行放救取法名求法語此之薦度豈僅一生七生父母得解脫將盡法界一一塵中有一切世界海一一世界一切衆生海一一衆生一切眷屬海無不解脫者何以故以同體故此同體法性悟之以為放生主以報受生恩以説無生話迷之不克自全而乞恩於賢達善信人之所以異於禽獸者幾希豈欺我哉言念昔者喪慈父而捨悲母迹固異心實同睹茲勝舉愴然在懷有廣孝一偈不免為居士拈出空中幻色惟蝴蝶靜裏間聲有竹雞莫道故園消息斷落花流水滿前溪長干寶塔放光序世固有極真之事偽士疑之則竟成偽矣亦有極偽之事真士信之則竟成真矣真偽本無實法唯是當人自心現量試觀四果證於沙彌之戲擲空法悟於乞士之默逃學道之於真信尚矣末世衆生濁智熾然偷心常轉既不自信亦且疑他談人過則神動色飛稱人善則反脣露齒無惑乎念與悲隔愈趨愈冥也大報恩塔莊嚴為天下第一天龍所翼衆生善根所依持故落成而顯奇瑞載諸國史隨感而舒寶光傳諸耆老本非怪誕安所狐疑獨於碧輝上人求光得光一事則群然誹之夫上人見光有同見者藉曰大衆共感不應獨擅豈不知同體法性如鏡光相攝互入互融世尊處衆會人人各對於佛咸謂如來獨與説法上人謂塔獨與放光亦何過焉復有舉上人生平以議者豫曰得見塔光即夙因深厚設欲疑上人奈何并疑塔乎豫則以信塔而并信上人偈曰佛光本常住如月在虛空衆生心水淨隨方影現中信為水清珠能清濁智水懺悔既深誠感應無方軌善哉碧輝公心通妙窣堵燈像現如雲蓮花下如雨此名真實光此名常寂光未明真幻義安事漫籌量我知一切法無假亦無真但願信得及攜手光中行沙彌持犯考序楚生員署冥府第七殿閲册見妻盜鄰雞急令相還罪款遂失夫俗人造罪是其分內猶莫逃陰鑒如此況沙彌隨佛出家同僧利養十種淨戒盡壽誓持奈何不時時自考乃令冥府司權邪然則斯格也上士雖不必記正不妨記中士必勤記之下士實不能記乃藉口於不必記夫烏知有記之者矣大比丘持犯考序浮囊五喻正喻比丘五篇是宜輕重等護而世顧藐為小乘戒身既損定慧何從無惑乎行果俱喪竟成末運也經云持者不作像法法滅盡想能令正法永不斷滅豪傑之士無待而興佛既不以遠近論親疏又豈以先後分時劫願我同志各念比丘體尊毗尼難值幸獲堂堂僧相應遵別別木叉先悔過後誦戒方合長淨之科僧輪增盛佛法得弘矣但比丘戒相獨繁且罪名罪種並不合與未受人知故秖列篇次數目其持者自應熟四分戒本及律藏全書茲不詳刻淨土懺序無淨無穢儱侗真如即穢即淨顢頇佛性信釋迦之誠語悟法藏之願輪始知若律若教若禪無不從淨土法門流出無不還歸淨土法門豫初志宗乘苦參力究者數年雖不敢起增上慢自謂到家而下手工夫得力便謂淨土可以不生逮一病濱死平日得力處分毫俱用不著方乃一意西歸然猶不捨本參擬附有禪有淨之科至見博山後稔知末代禪病索性棄禪修淨雖受因噎廢飯之誚弗恤也於今專事淨業復逾三載熾然捨穢取淨與不取捨元非異轍較西來祖意豈不更直捷邪每痛末世狂禪鳥空鼠即不惟撥無淨土亦乃謗讟宗風季清居士因佛日寺刻六宗遂任淨土一門即從懺儀始此書十科行道五悔練心徹事理之源極性修之致如然和香一丸飲海水一滴何香不具何水不沾爰為之序雲麓居士持金剛經序五度如盲般若如導行如足慧如目目足並運入清涼池此金剛般若經所以為萬行司南大乘正戶也世不達實相印妄談無相宗謬執即非一語罔識是名指歸萬行既無正解亦喪讀誦講説皆為誹謗可歎矣譬自刖其足致遠何由遺棄衆盲導師何用於法不説斷滅相佛語昭然胡弗思也夫色即是空非撥色覓空無有法得菩提而授記作佛四句百非直下頓絶奚勞用龜毛帚掃虛空花影邪持戒修福於此章句方能生信心後五百歲如是受持讀誦始得刻寶王三昧念佛直指序念佛三昧為如來勝異方便凡聖均收利鈍悉被以一念直歸佛海至圓至頓第一了義故也而迷義徇名者見五逆衆惡十念往生反以為專攝凡劣但化鈍根可謂昧佛妙旨謗讟深經矣豫慨末世行人多疑多障難悟難開於深妙法門非著事忘理必執理撥事著事者猶堪下品生因執理者竟淪惡取空見至此而直指之道翻成斷滅深坑非藉金錍誰抉翳膜妙協導師法紹宗乘教興蓮社應永明角虎之記暢寶王三昧之談境觀並彰纖疑悉破闡唯心之致依正宛然示自性之源感應不忒俾達者以理融事而理非事外愚者因事入理而事挾理功誠除惑前茅生西左券也二百餘年流通機塞蓮大師欲見未能而願力不磨韓居士從萬融禪師處得之豫獲借讀如飫醍醐悲劫濁方殷喜津梁有在急謀付梓以廣厥傳普願見聞隨喜種樂土圓因讀誦思惟證寶王法印轉相曉悟共脫沈淪庶不負希有良緣已印禪人閲台藏序教觀之道難言矣尚慧辨者汪洋若大海其流弊也逐流忘源令鈍根增望洋之歎崇修證者致精如鐵橛其失意也守株待兔令無聞招暗證之譏惟智者悟法華三昧得旋陀羅尼九旬談妙極教網之幽深十乘修心備觀門之攸致燈燈相續祖祖相傳駕賢首慈恩而獨盛並黃梅少室而爭芳心印昭於日月傳習遍於華夷而部帙最大者有三曰法華玄義法華文句摩訶止觀玄義文句教正觀傍止觀一書教傍觀正永無説食數寶之愆高超暗證無聞之禍荊溪大師闡揚之翼玄義曰釋籤翼文句曰妙樂翼止觀曰輔行誠佛祖慧命衆生眼目古云台教存則佛法存台教亡則佛法亡非欺我也末世行人障深根鈍學淺志劣鹵莽滅裂僅塗口耳惟消文貼句將就苟且作名利資糧語佛法淵源聖賢道脈咄嗟曰人生幾何能作窮年皓首活計邪不思隙駒幻影名利何裨苟可契於真源尚當矢之永劫況法無繁簡迷悟在人一句不了勞匍匐於千山曠劫緣臻得總持於瞬息稍有血性者決不忍自暴棄失此甘露門也寓菴序聲聞四枯菩薩四榮正眼觀之名為八倒有句無句雙亦雙非悉檀説之名為四門通此可論六合之內議六合之外矣法華經云三界無安猶如火宅又云大火所燒時我此土安隱靈鷲一峰果在三界外抑在三界內邪是故四依大士具論四種淨土必先明橫豎之致豎則土土相殊橫則土土相即惟其殊也故見思未盡不離同居塵沙未盡不離方便無明未盡不離實報惟其即也故九界衆生應念能睹佛境圓滿妙覺時時應現十方應地獄以惡逆有間無間是其寓應餓鬼以慳貪曠野山澤是其寓應畜生以愚癡水陸空界是其寓應修羅以憍慢須彌大海是其寓應人道以五戒四洲諸處是其寓應欲天以十善地居空居是其寓應色無色以禪定四禪四空是其寓應聲聞以諦智應緣覺以還滅方便有餘是其寓應菩薩以六度萬行實報無障是其寓彼能應者隨寓而安乃所應者則隨寓皆著是故凡夫永劫沈三界二乘恆墮無為坑地前大士同滯有餘入聖高流猶在果報方其寓也不知其寓也嗟嗟故鄉之夢尚未全醒客次之居寧為究竟惟有秉隨智教作稱性觀悟寂光於介爾始可辨寓義之真實矣夫謂之寓則一切法趣寓身土一如理事平等斯亦究竟寓也一究竟一切究竟實報方便同居無非真淨降此而分證而相似觀行名字淺深之致異所達之理同苟昧此理則誤認真實固屬凡情了知如幻終名偏解豈有當於寓義耶映渤開士名其室曰寓菴毗邪丈室彌勒寶樓豫拭目俟之矣修淨土懺并放生社序淨土法門原為衆生迷本自性不知常寂光理生死浩然無有休息故藉彌陀勝願為增上緣因其淨土有寂光實報方便同居四種而上三土非斷惑不生還同豎出三界之義故特指西方安養同居使利根即此頓淨四土鈍根亦依此先脫苦輪雖誠簡易亦非草草彌陀經云不可以少善根福德因緣得生彼國一日乃至七日執持名號一心不亂即得往生夫一心不亂縱未斷惑可不伏惑邪儻娑婆事業在在牽繫遇五欲時如膠如漆遇逆緣時結恨懷冤而欲命終彌陀接引此決不可得之數也又觀經云逆惡之人臨終十念皆得往生夫臨終十念必深植善根今逆順境緣便不復有正念何況臨終且臨終苦現止藉善友提撕今青天白日尚不能於明師友真實格言信受奉行當臨終時安休善友現前設現前開示神識昏迷而欲求其信解此又決不可得之數也至五悔法本為無知造罪無可奈何教以發露披忱修來改往逆順十心痛切懇到非可視為悠悠泛泛者兼以四法助成此行勸請滅謗法魔障隨喜滅嫉妒重障回向滅慳貪著三有障發願滅退失喜忘誤障更有作法取相無生三種懺義作法依律所説對首懺悔取相嚴淨道場專求感應無生深觀實相斷煩惱源儻旋懺旋犯作法之所不許既不能依律作法必不招賢感聖既不睹聖賢一色一相又何能頓證聖賢清淨法身故三種法前前不兼後而能通後後後必具前而不廢前也由此觀之淨土法門藥也娑婆愛瞋忌也五悔法門藥也不斷相續忌也甫服其藥又觸其忌可乎慈雲大師合此二種巧妙方便述為往生懺儀且云行人各有無始惡習速求捨離勿使行法唐喪其功藥忌昭然亦可思矣或謂聞白毫名字功德不可限量聞一佛二菩薩名滅無數劫罪豈現前惡法所能較敵噫誤矣不觀占察經邪經稱地藏菩薩大悲願力諸大菩薩皆不能及其言曰能聞我名者謂得決定信利益行故若雜亂垢心稱誦我名字不名為聞以不能生決定信解故蓋雜亂則無定不與奢摩他相應垢則無慧不與毗婆舍那相應不與二觀相應則不知地藏法身諸佛法身與自己身無二無別故不名為聞也智者大師釋十六觀經題必約三德祕藏釋法華經題乃以九旬談妙故曰若聞首題名字所得功德不可限量若不如所解釋安獲無量功德今雜亂垢心聞猶不聞現行煩惱熾然不息以此脫苦杯水投車逮臨終無驗翻疑佛法不靈自誤誤他墮謗法罪如服藥食忌反致喪身遂謂醫王殺人顛倒至此極矣獨放生一事捐所愛資財以贖彼命弊端略少然或重視大形於微細蛆蟲邊生下劣想或多視微物於現前屠宰者起慳吝心或留意異類偏於人中妄隔怨親愛憎不息既昧平等慈心無以為念佛禮懺之本智者大師云雖入道場懺悔惡心不轉惡業不壞無益苦行唐喪劬勞碓臼上下竟有何益雖舉手低頭皆成佛道戲著袈裟猶為遠因豈六時勤苦全無功用但緣因力弱不能敵現業流注耳象巖開士結往生懺社買放生命悲智並運將此菩提心為往生正行豫申其説而示之聞修社序麗澤之誼不講性命之學必荒儒重以文會友以友輔仁佛稱善知識者是得道大因緣全梵行世出世法未有不以友朋為急務者時之衰也社以詩酒登臨縱耳目之欲長放逸之門不惟儒者為然矣嗟嗟剃髮染衣群居終日將欲何為縱不至耽花嗜酒而尋章摘句僅塗口耳幾時識心達本源邪或者因噎廢飯遂單尚蒲團活計未明道眼又乏切磋設非釘樁搖櫓空喪天日必至起見起慢落塹墮坑暗證邪禪病尤甚於説食數寶自非真實有智慧徹底為生死者孰能出此二種牢關別作一番究竟也一乘開士法海求寂目擊流弊心切遠憂締一法社每季三日導以懺摩質以經論目足並運速入清涼向豫問名徵序豫合掌隨喜目曰聞修聞生實慧如膏助火聞法不修行如聾奏音樂今自修於九旬互聞於三日三日猶不廢修九旬自不缺聞從聞起修思不待言矣三慧自淑三慧相勉以三慧堅其志虛其心實其腳跟防其流弊正法再朗此一舉也淨信堂初集自序丙寅夏先慈捐世即焚棄筆硯後因閲藏暫開荏苒復經八載日積月纍狼藉遂多門人好事輒隨録之不足存亦不足毀也夫羺羊茹退物之至賤隔日瘧者塞鼻便痊今天下寒熱於愛見者多矣豫言無似安知不可與羊矢同奏功乎乃刪蘩蕪始未出家一二殘稿止丙子入山前名淨信堂初集儻以耆婆眼視亦當置藍空回曾何非藥之可採哉刻三千有門頌解後序北齊大師得龍樹中論之道一傳南嶽再傳智者而教觀始著權實理明解行俱妙真傳佛心印冠罩群宗者矣唐荊溪宋四明咸稱中興教主故使火宅蓮華同服甘露梁肅陳瓘皆其人也元明以來此道不振或有教無觀如貧數寶或有觀無教以凡濫聖神廟初年妙峰老人起而唱之一齊衆楚傅不勝咻開之馮居士乃力請解有門頌以為士君子風師辭達理瑩緇素翕然向化於今又六十年古板不復睹矣豫念重闢草萊實賴妙師開之二大士故復較梓以報法恩并附瑩中上明智書互相發明讀者苟知介爾有心即是不思議有即是妙假即是圓教初門即是法界具足三千諸法無欠無餘豈非直指人心見性成佛豈非不思議境圓具九法成一大乘不生退屈不生上慢者邪噫苟不讀此安知三大五小之妙苟不精熟三大五小亦安知此頌此解之妙也哉四書蕅益解自序蕅益子年十二談理學而不知理年二十習玄門而不知玄年二十三參禪而不知禪年二十七習律而不知律年三十六演教而不知教逮大病幾絶歸臥九華腐滓以為饌粳秕以為糧忘形骸斷世故萬慮盡灰一心無寄然後知儒也玄也禪也律也教也無非楊葉與空拳也隨嬰孩所欲而誘之誘得其宜則啞啞而笑不得其宜則呱呱而泣泣笑自在嬰孩於父母奚加損焉顧兒笑則父母喜兒泣則父母憂天性相關有欲罷不能者伐柯伐柯其則不遠今之誘於人者即後之誘人者也儻猶未免隨空拳黃葉而泣笑其可以誘他乎維時徹因比丘相從於患難顛沛律學頗諳禪觀未了屢策發之終隔一膜爰至誠請命於佛鬮得須藉四書助顯第一義諦遂力疾為拈大旨筆而置諸笥中屈指十餘年徹因且長往矣嗟嗟事邁人遷身世何實見聞如故今古何殊變者未始變不變者亦未始不變尚何一分無常一分常之邊執也哉今夏述成唯識心要偶以餘力閲舊稿改竄未妥增補未備首論語次中庸次大學後孟子論語孔氏書故居首中庸大學皆子思所作居次子思先作中庸戴禮列為第三十一後作大學戴禮列為第四十二大學章首在明明德承前章末豫懷明德而言本非一經十傳舊本亦無錯簡王陽明居士已辨之矣孟子學於子思故居後解論語曰點睛開出世光明也解庸學曰直指談不二心源也解孟子曰擇乳飲其醇存其水也佛祖聖賢皆無實法綴人但為人解粘去縛今亦不過用楔出楔助發聖賢心印而已
