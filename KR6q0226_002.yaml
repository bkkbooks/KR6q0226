body:
  text: 古歙門人成時編輯願文一四十八願天啓元年歲次辛酉七月三十日時名大朗優婆塞稽首三身圓滿尊一切真如覺性海稱彼法界等虛空種種莊嚴大願海果因交徹不思議菩薩一切修行海亦禮阿彌陀如來觀音勢至及地藏我為慈親罔極恩遍憫一切衆生界發生如實增上心修行念佛勝方便深信淨土攝受門廣大誓願普皆被妙戒為舟智慧舵方便為帆佛力風盡未來際渡衆生終不一念捨五濁諸佛願海如帝珠攝於我願重重現我願亦如摩尼王諸佛願海悉皆攝願輪橫遍於十方亦復豎窮於三際一切智智之所乘故我至心勤修習第一願我本發心上報慈父鍾之鳳生恩願三寶力令我無始慈父咸生淨土速證菩提令聞我名者亦報父恩第二願我本發心上報悲母金大蓮養育恩願三寶力令我無始悲母咸生淨土速證菩提令聞我名者亦報母恩第三願度法界衆生成佛竟方取泥洹第四願我淫機身心俱斷斷性亦無令聞我名者永斷淫根第五願我殺害業習滅盡無餘令聞我名者遍生慈力第六願我癡暗謗三寶業滅盡無餘令聞我名者正信三寶第七願我諸不善業悉得清淨令聞我名者安住梵行第八願我決生極樂世界速證無上菩提分身塵剎盡未來際度生無厭第九願我生生不忘本願於五濁世善化衆生第十願我處處宏通正法無諸魔障十一願得無量智慧達一切佛法十二願得無量辨才開迷降外一切無畏如師子吼十三願得無量神通遍十方國承事如來及善知識一切海會無不得與十四願我能出種種妙音盡未來際讚歎三寶令衆生知所歸依十五願隨意出生種種妙供供養三寶為衆生作大福田十六願隨喜一切衆生所有功德令成無上菩提十七願十方如來成正覺時我先勸請轉大法輪開示衆生無上覺路十八願十方如來般涅槃時我悉勸請莫入涅槃常住世閒饒益含識十九願一切海會推我為大法王子佛讚我功德智慧慈悲願力如觀世音地藏王等無有異二十願以大悲光照諸地獄觸我光者應時變諸苦事悉成妙樂二十一願以大悲光照諸餓鬼觸我光者應時捨身得淨土生二十二願以大悲光照諸畜生蒙我光者離諸怖畏捨身之後得淨土生二十三願以大悲光照諸鬼神蒙我光者悉捨瞋心開悟佛道捨諸醜陋得清淨身二十四願以大悲光照諸苦惱衆生蒙我光者疾病消除六根具足厄難恐怖悉皆解脫無病延年發菩提意若臨命終即生淨土二十五願以大悲光照有形無形有想無想及諸魔外令其身心捨諸邪見通達佛乘二十六願以大悲光照觸人天令不迷欲樂及欣厭定勤求無上菩提二十七願以大悲光照聲聞緣覺令捨無為速趣佛乘二十八願以大悲聲令一切衆生決定明悟不戀三界不樂餘乘唯求無上菩提二十九願以大悲神力隨順衆生種種所求俾於我法生深信心三十願以救度衆生故於十方現作佛身或淨土攝取或穢土調伏方便無量三十一願救度衆生故隨類現身一一類中種族尊勝威德自在令諸同類敬愛受教直至菩提三十二願以大悲方便現於一切無佛法處法滅處佛法不能行處隱顯大化為長夜燈救拔沈冥出於苦海三十三願恆於衆生饑渴之時現作飲食疾疫現作藥草寒作衣服熱作涼風險阻作津梁一切所須皆現作之若服若食若倚若履咸得安樂發菩提心三十四願樂求佛乘衆生聞我名已不捨肉身得佛菩提三十五願莊嚴佛土菩薩聞我名已其國踰於極樂欲現穢土則得無量方便善化剛強三十六願令欲見諸佛土聞法衆生皆得見聞三十七願令欲往無數世界供養三寶衆生一念之閒普得周遍三十八願令欲生佛土衆生聞我名號即得隨願往生三十九願令同我誓願衆生速得無量智慧方便威德自在四十願令樂小乘衆生速登聖果即回心入菩薩乘四十一願十方修行菩薩聞我名號直至菩提永無魔事四十二願十方魔外聞我名號即捨邪見同歸正覺四十三願以大悲心力使五逆十惡四棄八棄當墮大獄衆生知求哀懺悔隨現勝妙色身摩頂安慰令罪根永拔發菩提心四十四願以平等大慈悲力能滅謗我法詈我名者極重惡障速趣菩提四十五願我慈眼最極清淨普視盡虛空界乃至極苦處悉令安樂極惡衆生悉令賢善四十六願我印手最極莊嚴於念念中出一切供養雲珍寶雲衣服雲衆具雲飲食雲醫藥雲三昧雲總持雲辨才雲光照雲遍虛空界盡未來際利益衆生四十七願我名號盡十方界靡不周遍彼法滅處我名不滅恆令聞稱悉得解脫四十八願我色身最極微妙以不可說不可說佛剎極微塵數大人相而自莊嚴一一相有不可說不可說佛剎極微塵數隨形好一一好有不可說不可說佛剎極微塵數光明一一光作不可說不可說佛剎極微塵數色嚴飾國界演不可說不可說佛剎極微塵數聲宣揚妙法出不可說不可說佛剎極微塵數香華飲食衣服衆具普供一切現不可說不可說佛剎極微塵數化佛教化一切一一佛有不可說不可說佛剎極微塵數諸化菩薩一一菩薩有不可說不可說佛剎極微塵數殊勝莊嚴一一嚴作不可說不可說佛剎極微塵數廣大佛事一一事於不可說不可說佛剎極微塵數世界利益衆生有見一佛事則得見我微妙色身見我身者則能與我平等則能速得成佛受菩薩戒誓文天啓四年歲次甲子十二月二十二日如是戒品我今於一切三寶前誓願受持修學盡未來際不復捨離假使持戒因緣百千萬劫恆受困苦誓不以苦故退失今日道心假使破戒因緣百千萬劫恆受安樂誓不以樂故退失今日道心以此學戒功德願我及衆生無始衆罪盡得消滅若一切衆生定業當受報者我皆代受遍微塵國界歷諸惡道終無厭悔令彼衆生先成佛道我所發願真實不虛願十方三寶現為我證令我道心日夜增長文殊智海念念清淨普賢行海念念圓成命終之後生諸佛前證度迷流同登覺岸虛空有盡我願無窮刺血書經願文戊戌菩薩戒弟子智旭刺舌血書大乘經律先於三寶前然臂香十二炷發十二願願亡父及無始慈父斷無始我執生樂土受佛記願亡母及無始悲母斷根本煩惱蓮華生佛授記願現在同行及過去一切真善知識皆先圓滿菩提願普與法界衆生破二執斷衆苦得金剛身淨三聚戒圓正定證實慧發菩提心得不退轉歸無上覺以上發心發願善力因緣普施法界同了無二無生無得無作永離虛妄會證常樂書佛名經回向文比丘智旭書佛名畢然香發願三炷供如是三寶願與法界衆生紹隆佛種入智慧藏登解脫門六炷懺六根罪願與法界衆生常睹佛色聞法音嗅法香宣法味服慚愧衣悟如來藏二炷祈父母親緣國土人民入九蓮胞胎獲三寶福祐四炷保常住僧伽和合說戒淨業善友嚴淨毗尼禪堂清衆熏修大乘職事諸師名標蓮蕊三炷保比丘某某及一切善友身康祿熾正向菩提如是功德普施含靈同生安養為雪航楫公講律刺血書願文崇禎己巳春正月十有五日菩薩戒比丘智旭為同學比丘智楫講四分戒本然香十炷發十大宏願一者願法界一切地獄衆生同得解脫永不受果永不造因二者願一切餓鬼道同得解脫三者願一切畜生道同得解脫四者願一切阿修羅捨憍慢習五者願一切人道發菩提心六者願一切天道永斷諸漏七者願一切聲聞回小向大八者願一切辟支發起大悲九者願一切菩薩盡無明源十者仰願一切如來更增法樂又願以此功德令道友智楫蕩滌流俗知見拔除儱侗邪思赤歷歷荷擔正法不惜身命真懇懇哀憫衆生善能度脫若其從無始來至於昨日所有一切惡業應受報者智旭悉皆代受令得解脫所有一切善業應受報者普施法界衆生同成正覺從今已去執持禁戒塵業不侵嚴護威儀蜎飛無損樹正法之妙幢作人天之模範更願智旭恆於盡虛空遍法界三惡道中普代衆生受無量苦經於不可說不可說微塵劫海備嘗楚毒終無厭悔使法界衆生無一不成佛竟我方解脫以此發心發願功德仰願諸佛大慈加被大悲拔濟令一一字放無量光一一光照無量國一念之頃悉周法界普施衆生究竟法樂情與無情同圓種智持咒先白文智旭供臂香五炷願持滅定業真言百萬觀音靈感七佛滅罪藥師灌頂往生淨土真言各十萬次當結壇持大悲咒十萬又三炷供證明比丘廣鎬等鎬各然三炷隨喜助發所願如來正法復興末世弊端盡革光明壽命稱性量而無量福德智慧等虛空而不空普與含生同生安養禮大報恩塔偈同然香者一十五衆稽首大悲堅固藏普現色身妙寶塔隨求感應不思議哀愍我等及群生願舒無畏大光明令我等除惡道怖出入遊戲六道中度脫一切如幻衆願舒清淨大光明令我等除破戒垢毗尼嚴淨最清涼息諸六道煩惱熱願舒三昧大光明令我等除雜亂想照了法界無分別起諸無作大神通願舒智慧大光明令我等盡無明漏願舒如意大光明令我等滿隨心願以茲啓迪諸群蒙令皆歡喜發深信護持正法永不滅實義熾然昭千古寧使身碎如微塵終不退捨菩提願寧使永劫受衆苦終不忘失大悲心唯願三寶及天龍證知宏誓攝受我為母三周求拔濟啓敬禮十方三寶阿彌陀佛及二大士清淨海衆復禮現前真實善友悉同啓請伏願以慈善力悲救心為我亡母優婆夷金大蓮隨意課持經咒哀令我母未生淨土決定得生已生淨土決定見佛若已見佛增長品位母棄不肖已經三載及省己躬無德可報實深慚愧痛自悔責負世閒孝道乖出世本期自非衆友提攜恐貽未來深纍唯願廣菩提心廣菩提願廣菩提行普為法界衆生經生父母歷劫親緣運無緣慈興同體悲令一經一咒功沾沙界福等虛空願智旭為最後得解脫人盡見一切衆生皆先解脫仰憑十方三寶淨土聖賢現前善友攝受救護為母發願回向文菩薩戒比丘智旭一心歸命法界三寶伏為亡母優婆夷金大蓮今六月初一日棄世三周敬然臂香七炷供十方三寶釋迦文佛文殊普賢等諸大菩薩阿彌陀佛觀音勢至等諸大菩薩地藏大士及十方諸大菩薩現前清淨真實善友普同供養伏蒙善友為我母誦種種經咒列比丘沙彌及諸佛子共十一人禮懺二堂持諸經十六部諸咒品二萬三千一百佛菩薩名四十三萬自持諸經十二部禮三世三千佛文不録願母罪因苦果淨盡無餘智種福基具足無減悟法界藏身入普賢行海智旭又為父母乃至歷劫親緣亦為現前善友所有歷劫親緣廣及法界衆生悉為歸依懺悔發宏誓願盡法界衆生無始至今一切殺罪願得消除自今以去更不復造若定業應受刀山劍樹等智旭普皆代受令彼安住大悲一切盜罪消除更不復造定業應受考逼酬償等智旭普皆代受令彼成就大捨一切淫罪消除更不復造定業應受鐵床銅柱等智旭普皆代受令彼圓滿梵行一切妄語罪消除更不復造定業應受拔舌犁耕等智旭普皆代受令彼證真實法一切飲酒罪消除更不復造定業應受灰河沸屎等智旭普皆代受令彼得大智慧一切貪罪消除更不復造定業應受積寒堅冰等智旭普皆代受令彼永獲清淨一切瞋罪消除更不復造定業應受猛火燒然等智旭普皆代受令彼發起大慈一切癡罪消除更不復造定業應受盲聾頑鈍等智旭普皆代受令彼滿足菩提一切塵沙等罪消除更不復造定業應受種種塵沙苦等智旭普皆代受令彼究竟涅槃以此功德伏願一切地獄等受安樂一切餓鬼等獲飽滿一切畜生等蒙解脫一切修羅等證慈忍一切人道等悟無生一切天道等盡諸漏一切聲聞等發大願一切緣覺等起大悲一切菩薩等滿菩提一切如來等增法樂又願現前四比丘增長壽命增長大悲開發深智昭明慧眼四佛子盡一切習速圓梵行三沙彌戒根永淨捨諸瞋掉又願智旭生生處處常得承事供養一切善友善友成佛為影響衆盡未來際不念疲勞仰唯法界三寶大慈覆護大悲拔濟令我所願疾得滿足普與含生同圓種智持準提咒願文智旭向以十二願然香十二炷散持準提咒一百二十萬今束為三願然香三炷結壇持三十萬一願毗尼實義昭揭中天教觀禪那盡除流弊靈山共睹儼然淨土同期托質二願修治大藏昭佛祖之慧命救贖衆生普法界之慈緣三願學無邊法門窮正覺心源竟法海涯底折舉一廢餘之魔見導萬有不齊之群機讚戒讚聞無人不秉真說宏禪宏淨無處不轉正輪如此三願不為自圖名利安樂出生死證菩提普為法界衆生同具如來十號證涅槃四德至究竟安隱處超二種生死苦圓四智菩提果居上上寂光土仰唯法界三寶大準提王速如所願盡未來際行普賢妙行披地藏誓鎧衆生不度盡不取般涅槃禮大悲銅殿偈稽首圓滿大悲尊慈心普覆虛空界陀羅尼力妙威神誦者隨求皆獲願我本仰承咒力生我父夢中曾覺悟我幼持齊甚嚴肅夢感大士曾相召我以無始惡業緣盲無慧眼從邪教破齊毀佛詬大士大士於我恆憐憫無非妙德冥加被令我終獲堅固信我今已發菩提心誓忘身命持正法憾我障重惑業深恆與大士悲相隔三漏三垢常熾然三德三身恆覆蔽我今哀懇發深誠願求大士恆悲救我雖具有無邊罪大士能令悉消滅我雖無有勝善根大士能令悉具足我然臂香滿十炷供養大士十界身誦持神咒滿十萬懺除無始十惡業願我永斷十惡業願我究竟十善業大士地藏之宏誓十方菩薩微塵願我皆隨順普修習大聖威神攝受我起咒文歸命法界三寶護咒神王願展慈威俯垂折攝智旭向持種種神咒奈障緣深厚煩惱重濁仍紆雜想每犯威儀克己省躬實增慚懼由是重生悲切再展真誠易慮洗心懲前創後然香七炷供七伽陀十一月初一日始日誓持大佛頂首楞嚴咒七遍復以次持滿諸咒次香三炷先供地藏真言諸咒俟時次第供養將此哀忱必求加被伏願戒根永淨定慧圓明廣化衆生咸歸淨土己巳除夕白三寶文菩薩戒比丘智旭第三閲律藏畢敬然臂香三炷供本師釋迦牟尼三劫三千諸佛一切毗奈邪為首及一切尊法彌勒菩薩優波離尊者及西天東土宏律大師又三炷代同學某等供養三寶伏念諸佛滅後以戒為師唯有如說修行名為正法住世丁茲末運競騖虛名別解脫經罕知端緒秉羯磨法罔識範模文字法師狂妄禪客同為師子身蟲形服沙門羺羊持律並致魔軍侵侮爰發勝心誓勤守護仰願諸佛菩薩應世聖賢以本願大悲救拔折攝令我等永杜因循苟且之心速奏挾持匡濟之力再補第一義天重浴尸羅法日曜三塗而息苦覆六道以常安淨治三業契會寂光圓證五身遍遊塵剎閲律禮懺總別二疏庚午某等歸命三寶及現前同行伏念以戒為師最後明誨因戒生定無漏初基憫世競裂其綱維慶我猶逢於正教爰發勝懷同心披覽檢閲將終懺摩發願比丘受籌然頂香三炷臂香十四炷智旭然臂香二十八炷性泓然臂香十炷道援然臂香四炷及某等各為四恩三有法界衆生興無緣慈運同體悲等諸佛心發無作誓殷勤修慈悲道場懺法仰願大哀曠濟拯劫濁沈淪神力冥資錫初心福慧闡毗尼之祕旨禪那與教觀齊彰補佛處之宏猷暗證與依文俱竄見聞得真隨喜習學可實修持合彌陀攝受之符操淨土莊嚴之券稽首毗奈邪無漏清淨藏建立及宏通并如說行者我今為自身亦為諸含識彙釋成集要唯垂哀攝受智旭與法界衆生無始至今迷寂滅性開有漏門背解脫城造三業罪或不知聖戒或受已不持辜負佛恩折損福慧致使身多病苦心繞昏愚生逢末運世遍魔軍幸荷深慈獲睹正教復承微善稍達義塗由是發護法心立宏通願又以業重障深德涼解淺切懷慚愧哀望加持然香三炷普為國王宰輔父母親緣信施檀護供十方法界無盡三寶又二十五炷供本師釋尊願正法久住過去七佛願戒法流傳阿彌導師願同生淨土琉璃光佛願圓滿尸羅逸多慈氏願常來教授三十五佛願遮障消除及供觀虛空藏經願戒身成就毗尼法藏願過犯永清及供虛空藏菩薩願滅除重罪地藏本尊願轉我定業文殊普賢諸大士願智行圓滿觀音勢至諸大士願攝歸極樂藥王藥上諸大士願修法供養金剛藏準提總持王等諸大士願得大陀羅尼優波離大師願得最上律儀迦葉阿難尊者及翻譯受持諸大法師願遊化無礙兼供達觀可大師報刊行大藏重振僧風之德蓮池宏和尚報遺規私淑之恩憨山清師祖報初緣發心夢中攝受之德雪嶺峻師報剃度之恩古德賢法師報證明學戒之德無異艤禪師報勸讚付梓之緣壁如鎬兄歸一籌兄報參訂商確之力及現在六師未來一切同行善友願並扶法運季賢獻師淨空妙師外護知識等願同入法流伏願一切衆生悟圓通門證王三昧破二十五有輪顯二十五我性共入蓮邦齊成佛道安居論律告文稽首真如清淨性具足圓滿無減修學無學地諸功德及我同欣梵行人願興同體大悲心愍此沈淪迷倒世直昭正法善毗尼遍破衆生惑業苦弟子智旭普為法界衆生求於諸佛無上菩提正法輪故專心披閲毗尼藏彙輯要詮便諸學習又以業重福輕障深慧淺染心易熾淨德難成性罪僅持遮罪多犯言之似易行之實難自淑未遑利人奚望是以專自慚愧徹底策新然香四炷供三寶善友發十種增上誓願盡法界衆生有一未捨淫業未忘淫法未絶淫緣未斷淫因我終不取正覺有一未捨殺盜業未忘法未絶緣未斷因我終不取正覺有一未捨妄言兩舌惡口綺語業未忘法未絶緣未斷因我終不取正覺有一未捨貪瞋邪見業未忘法未絶緣未斷因我終不取正覺唯願法界三寶以本誓願力證知哀憫令我黑業永除善法增長克偕善友淨滿圓成為母四周願文稽首大孝尊孝順至道法及一切三乘同修孝道者我以哀懇心為母重發願願法界師友咸垂哀護持智旭自惟居家多染世孝非真捨慈母以披緇擬克果而廣濟無奈惑業障深慧行福淺未盡三心罔遵二利既虧就養無方復恣負債受用是以重增慚愧再瀝丹忱因慈母棄世四周修稱性無作四誓啓善友同體之悲作淨土增上之行列比丘沙彌淨人十五人共持諸經部卷三百三十六咒品二萬三千四百十四佛名五十一萬六千禮千佛名經一部其文悉不録智旭仍向十方三寶及一切善友然香九炷要九界以同歸以此功勳悉回向我父母及無始親緣並證寂光速躋正覺又願現前十大比丘圓行輪明戒體離僞因破俗見滋慧命普慈心遠魔事脫情染邪正了辨戒乘俱急三沙彌戒身早復折慢幢袪邪見二淨人護威儀離惡友又願諸友生身父母歷劫親緣同遊四德之城悉入二嚴之地又願智旭恆與諸友為影響衆諸友成佛請轉法輪請久住世滅後護持正法末季重使昭明乃至一切未發心者令發已發心者令熟已成熟者令證盡衆生界成正覺我始自取般涅槃仰願三寶證明攝受為父十二周年求薦拔啓智旭泣血稽顙同修淨業上善勝友座下伏為先嚴捐世已十有二年負債出家方自救不了十一月初五日爰屬諱日預於六月二十九日對三寶前然臂香三炷供善友知識啓請廣運慈悲同垂濟拔佛名神咒經律懺悔隨意樂為悉資淨業功沾沙界果極法身無任哀祈肅茲遍叩結壇水齊持大悲咒願文十一月初五日智旭自惟障緣深厚慧力衰微行濁言清始勤終惰負生我重恩背慈尊明誨四十八願僅托空言一十二求罔希實果悠悠歲月病與業俱增罔罔胸懷志與形並邁捫心扼腕驚慮悽神重策舊圖思收新益言念智旭七歲斷肉未知出世正因十二學儒乃造謗法重業賴善根未絶每潛轉默移一觸念於自知之序次旋意於寂感之談禮藥師妙典知佛與神殊聞地藏昔因知道從孝積既懷喪父之哀復切延慈之想書慈悲懺法矢志尸羅聽大佛頂經決思離俗捨母披緇剋期取果無奈夙因力弱現行惑強觸境多乖反躬無似又復喜談人過鮮克己非每忽人長不知己短雖時時發願亦數數廢忘或猛厲自訶復紆回自弛身汩浮沈之浪云何度他心纏愛見之絲云何脫彼是以再瀝丹忱追補昔願自己巳春已立誦持之誓及仲冬月又新懲創之功於今咒數雖完心仍未淨豈不愈堪慚愧更可悲哀敬對三寶大悲菩薩然香十炷結七七壇謹服水齊至心持大悲圓滿神咒十萬八千以此功德必求加被願從今去戒根永淨遮性無虧定慧齊彰寂用自在三塗息苦九品蓮敷共睹須彌毫相同圓法界藏身為父回向文日月同上歸命無上尊及以寂滅法解脫衆僧海同垂哀護持智旭二十喪父已萌孝感之懷草四出家未紆男女之業本期普利塵沙奚止願超九世所憾業障深纏克果莫就追思罔極遺憾終天今集自他經咒列諸佛菩薩名七十八萬八千諸經部卷一千四百九十一咒品十三萬八千五百二十懺一部自持諸經七部咒品七萬佛名諸菩薩名二十三萬文不録然香三炷供法界三寶伏願鍾之鳳速升淨界早悟寂光又願過去父母親緣永離妄緣咸會常樂現前善友同行共報慈恩同合悲仰恭惟三寶證明攝受楞嚴壇起咒及回向二偈辛未稽首大慈悲救護末劫者我念末劫苦破戒為第一我思救苦方無越毗尼藏毗尼若住世正法永不滅行成果斯剋教不屬空言或因持戒力速成淨滿尊或因淨尸羅嚴淨諸佛土或因別解脫作獨覺聲聞或因善戒力生禪及天道亦作人中勝福樂好名稱如是差別果皆由戒所得近果說差別究竟歸一乘如是勝妙法願為我昭明普度長夜中無依無怙衆故以一百日棲身清淨壇持於圓滿咒具足十萬輪又增持一萬滅定業五萬共回向菩提同生極樂國唯冀三寶尊證明哀攝受歸命明行足顯密清淨輪種種勝修持學無學功德我慚愧發心入壇持神咒數足心尚雜威儀亦未淨內倍懷憂懼願發事難濟故然香十炷懺我十惡根其增持一萬滅定業五萬亦然臂六炷加被願如心又為十一友持滅定業咒共計九十萬供臂香七炷又為報恩繼志心追薦已往度脫心勸請轉法隨喜心代除邪謬悲救心為諸友朋宏濟心為諸檀護宏法心從來緣會慈念心欲持三百二十萬故然臂香復七炷令我七心皆得成續持回向偈稽首善逝尊無上顯密藏三乘賢聖衆地藏滅業咒我以大菩提最初清淨心續為善友衆持四十八萬若有禪思士善入諸三昧不起增上慢恆修勝法忍持經者達義如說得修行營福者隨心畏罪嚴佛乘住戒者增明已汙速歸真未住秉威儀尊重正法教或有毀重禁願令發深慚拔除罪犯根速達無生理今我然香炷供養三寶尊願我及含識滅除一切業又然香三炷悔三業諸惡從今誓永斷起無作善根敬依占察經擲輪決疑惑亦以此妙法流通益世閒我誓以身心奉上地藏主隨於剎塵劫永處衆苦中普代衆生苦令得先成佛劫石或可移此願終不改我所修福業懺悔發宏願種種勝善根體性同法界一一皆回向普施諸含識悉願證真常同歸寂光土
