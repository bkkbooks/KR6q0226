body:
  text: 法語三示新枝溫故知新可以為師所謂故者新者何物邪天下莫故於現前一念之心亦莫新於現前一念之心惟故故隨緣而不變惟新故不變而隨緣若能頓達吾家故物便可斬新條令以菩提悲智為幹本以六度萬行為新枝矣示潘拱宸三教聖人不昧本心而已本心不昧儒老釋皆可也若昧此心儒非真儒老非真老釋非真釋矣且喚甚麼作本心在內外中間邪過去現在未來邪有無亦有亦無非有非無邪果直知下落百千三昧恆沙法門不啻衆星拱月如或不然堅持三歸五戒以為緣因時節若到其理自彰示惺白佛法之衰也名利熏心簧鼓為事求一真操實履者殆不可得有能持戒精進讀誦大乘不馳世務縱道眼未開亦三世諸佛所歎許也況了必藉緣非持戒讀誦何處得有道眼今講家多忽律行禪門并廢教典門庭愈高邪見益甚開士既精非時食戒勤讀方等大乘但於戒教二門深造自得鑿井不已必得及泉鑽木不息必得出火無勞更覓玄關也觀經謂具諸戒行讀誦大乘方等經典皆上品上生操此券以往吾當攜手珍地華池斯時憶及今日得悟不得悟之疑當不勝破顏大笑矣示宋養蓮自性彌陀惟心淨土二語世爭傳之不知以何為心性也夫性非道理無所不統故十劫久成之導師不在性外心非緣影無所不具故十萬億剎之極樂實在心中惟彌陀即自性彌陀所以不可不念淨土即惟心淨土所以不可不生今有譬焉北京聖王即惟心之北京聖王也然行道濟時者必北上覲王儻囂囂畎畝縱伊周可治天下乎故無論已悟未悟皆要求生淨土求見彌陀未悟如童蒙之求師已悟如孔子之求仕上自文殊普賢馬鳴龍樹下至蜎飛蠕動羽族毛群唯此一事此事第一要信得及二要時時發願三要念佛工夫不間三事具至愚亦生三事缺一雖聰明伶俐亦不生也其有謗此者即謗三世諸佛菩薩毗盧頂上翻為阿鼻最下層矣哀哉示陸喻蓮超生脫死捨淨土一門決無直捷橫超方便而生淨土捨念佛一法決無萬修萬去工夫近世盲禪妄謂彌陀不必念淨土不必生儱侗鶻突墮塹落坑夫夜臥之頃枕席不安猶必安置以三界火宅而不思出離可乎若漫云悟心之士此間即寂光何不曰惡罵是稱讚惡打即供養糞穢即栴檀塗炭是天宮寶殿乎儻未能噉糞臥炭則淨土決不可不生設果能亦豚豕雞犬耳何若老實念佛導之以信要之以願徑登九品蓮臺與觀音勢至海衆為眷屬回視空頭惡見邪禪博一時假祖師之虛名墮萬劫拔舌犁耕之實苦何啻雲泥也哉莫論散心定心只剋課程終身不缺日勤日切淨土華蕊晝夜增榮矣示彙宗世間學問義理淺頭緒多故似易反難出世學問義理深線索一故雖難仍易線索非他現前一念心性而已古云立一心為宗照萬法如鏡能觀心性則具一切佛法且如此心不在內外中間諸處亦非過去現在未來亦非自生他生共生無因緣生豈非即空而十界十如三千性相炳然齊現無欠無餘豈非即假心外無法法外無心於其中間無是非是豈非即中迷此一念即空則為六凡迷即假則為二乘迷即中則為別教惟悟現前一念當下即空假中則十界無非即空假中不於九法界外別趨佛界亦不於佛界外別有九界是謂三千果成咸稱常樂矣向此薦取方知千經萬論咸非心外施設勉之示可生佛法不出唯心真如二觀蓋一切色心依正假實諸法無非仗因托緣而生皆是依他起性不了依他妄計實我實法即名遍計執性了其如幻有即非有體惟一心即名圓成實性今唯心識觀於依他達其遍計本空而真如實觀秪二空所顯理性而已大佛頂最初七處徵心乃直破遍計明其本空也次十番辨見廣歷陰入處界會理乃就依他起上破其遍計餘執也次定耳根為所觀境明其本圓通常乃就依他起上顯其圓成本具也然設不向前文破執開解則圓通常性甚易而甚難故南嶽大乘止觀誡初心不得即觀圓成實性惟以四性簡責深達遍計本空依他如幻一念觀成轉令餘念自然契實實心繫實境實緣次第生是則前念為能觀後念為所觀故能坐斷妄源無以波逐波之失耳示素風學不難有才難有志不難有志難有品不難有品難有眼惟具超方眼目不被時流籠罩者堪立千古品格品立則志成志成才得其所用矣末世競逐枝葉罕達本源誰知朝華易落松柏難雕才志之士奈何甘捨大從小哉莫大於現前一念誠能直下觀察知其無性則決不妄認四大為自身相六塵緣影為自心相身心二妄既消不真何待然後以此真解歷一切法俾盡淨虛融無塵影垢習可得還淳復素道風豎窮橫遍矣但一念未瞥使百年活計縈懷眼下虛名惑志吾恐天真日漓負美才好志不淺也示行恕儒以忠恕為一貫之傳佛以直心為入道之本直心者正念真如也真如無虛偽相亦名至誠心真如生佛體同亦名深心真如遍一切事亦名回向發願心此三心者即一心也一心泯絶內外謂之忠一心等一切心謂之恕故曰心佛衆生三無差別果達三無差別欲一念自欺自誑不可得欲一念自私自利亦不可得欲一念自分自局尤不可得矣示吳而上性靈不可以有無求斷常取由無始妄認四大為自身相六塵緣影為自心相所以耽著有常及聞非有非常又轉計斷無而生恐怖不思恐怖斷無者畢竟能斷無否又恐怖者念念生滅無體無隅畢竟可喚作常有否由是觀之終日在妄之性靈即終日恆真之性靈一向迷己為物認物為己曾未覺耳試思假借四大以為身則身非實我心本無生因境有則心亦非我無始妄計之身心既俱非我更有何物可為我者此超常有邪見也而知此無我者畢竟不可斷滅此超斷無邪見也然但除常有我執則不斷不無之性靈法爾現前更不勞以心覓心如以眼覓眼設可見者決非己眼設可得者決非己心但盡凡情別無聖解有除翳法無與明法也示淨堅優婆夷極聰明人反被聰明誤所以不能念佛求生西方而愚人女子反肯心厭娑婆苦深求出離當知彼是真愚癡此乃大智慧好惡易分莫自昧也每見儱侗瞞盰大言欺世之假善知識遇著老實念佛的樵夫農婦亦教參禪推來拽去自供撫掌此輩老實人認作誠實破壞善根究竟參又參不來念又念不熟腳跟不穩心事徊徨噫亦可慘矣吾勸汝咬釘嚼鐵信得西方及切切發願持戒修福以資助之無禪有淨土萬修萬人去但得見彌陀何愁不開悟此千古定案汝不須疑彼無恥邪師敢誣先聖輒肆翻案秪益露其惡見耳何嘗翻得古人定案哉示徐仲韜居士習氣不在名利但心粗氣浮為纍果觸事十思深入菩薩微細智網不患不能出世也示方爾階念佛法門雖該羅八教圓收無量百千三昧而下手之方又最直捷痛快蓋凡念相好念法門念實相等固先開真解然後下手萬無夾帶疑情之理只今持名一法亦止驀直持去不用三心兩意深信淨土可生發願決定往生以持名為正行以六度等為助行萬修萬人去斷斷可保任者若一點好勝之心涉入參究謂為向上則腳跟不穩禪淨兩失之矣智者不可不決定其所趨也示王思湖菩提種子人人有之因自暴自棄自畫使無量功德善根枉作人天生死資糧摩尼寶珠貿一衣一食可惜也吾人與三世諸佛同一心性同具六根何有分毫欠缺但肯一念發菩提心誓成佛道則今所作所為無非稱性功德不必改弦易轍後謂修行秪須恁麼信去漸積功德成佛無疑矣示張子歲今人畢世咿唔於致知格物之旨曾未究心可謂好學邪孔子亟稱顏回好學唯以不遷怒不二過兩語為之寫神此了心外無境深達唯心識觀者也儻見心外有一物可當情則物不格知不至而過之二怒之遷必已甚矣安有不遠之復示夏恕菴諸法如夢妄計為實而生苦樂所以歷劫自縛然正憶時不必強令不憶秪返觀此憶念心畢竟是箇甚麼看來看去看得一場懡㦬無始恩愛不知何處去矣著眼示自若佛法盛時人爭務實逮其衰也衆咸競名實故超生死證菩提名必增人我長魔業志士不可不熟審也現前一念心性在凡不減在聖不增然迷之則為凡夫悟之則為聖人其人迷縱稱為聖何救於迷其人悟縱貶為凡何損於悟虛名不足重輕明矣善學道者先觀毀譽紛然而迷悟自若則不以毀譽二其心次觀迷悟條然而心性自若則不以迷悟惑其見不被迷悟二字所惑於本分事稍有相應分耳示巨方名照南諸法無性盡隨心轉心為名利一切趨名利心為菩提一切趨菩提故曰地獄為法界乃至佛為法界是趨不過也善財發菩提心廣歷百城隨其所向方盡稱南定盤星正無往非南方耳惡王淫女苦行弄沙世人觀之何嘗不作惡法會今未嘗無暴虐王豔異女炙身婆羅門聚沙諸童子若以善財眼視非即真善知識哉所以真正發心人觸境逢緣待人接物一切作佛色佛聲佛香佛味佛觸佛法想則念念與薩婆若海相應不必商量修證工夫而妙在其中若捨目前佛境界別問蒲團上觀心法要含元殿裏更覓長安身在海中反致渴死由不達妙止妙觀取諸左右逢源故也請以此根本智光照方盡南始信一一微塵各具大千經卷塵塵皆巨方矣示聞覺現前一念聞性本圓通常秪不自覺耳誠向靜居聞十方時識取本圓隔垣聽音響時識取本通聲生聲滅聞不生滅處識取本常則信吾人現行業識即諸佛不動智光耳根既爾餘根亦然六根既爾塵識亦然塵塵法法罔非圓通常是謂耳門圓照三昧豈離吾人現前一念別有觀音所證法門哉恁麼覺得則三十二應十四無畏四不思議無作妙德一皆性具力用貧女寶藏本自有之非外得也但諦思而深會無邊法藏列祖機緣同條共貫無岐指矣示爾階四念處者佛法之總綱偏圓權實靡不由之出生死要路成菩提通塗也一身念處二受念處三心念處四法念處身受心法指果報五陰即苦諦也不了虛幻妄起常樂我淨等計即集諦也了了觀察知其不淨苦空無常無我亦如幻化亦惟假名亦即法性即道諦也不起常樂我淨四倒不招分段生死不起無常無樂無我不淨四倒不滯偏真涅槃不起亦常亦無常亦樂亦苦亦我亦無我亦淨亦不淨雙四倒不招真常流注不思議變易生死即滅諦也故勤修四念處則見四四諦矣觀身不淨等見生滅四諦觀身如幻等見無生四諦觀身假名無性緣生遍造十界等見無量四諦觀身法性即實相等見無作四諦故維摩云觀身實相觀佛亦然毗舍浮佛云假借四大以為身心本無生因境有前境若無心亦無罪福如幻起亦滅諦信審觀不患不立地成佛也示世聞禪教律三同條共貫非但春蘭秋菊也禪者佛心教者佛語律者佛行世安有有心而無語無行有語而無行無心者乎今之學者不惟分門別戶縱發心遍學曾不知其一以貫之所以一入律堂便將衣鉢錫杖為標榜一入講席便將消文貼句為要務一入禪林便將機鋒轉語為茶飯逮行腳十草年築得三種習氣飽滿便思開一叢林高踞方丈自謂通禪通教通律橫拈豎弄七古八怪騙惑愚迷牢籠世智及以真正佛心佛語佛行核之鮮不公然背者此無他最初參學既不具正眼又不具真正大菩提心又不具真正為生死心故也不為生死決不能發起大心不發大心決不能開發正眼欲真為生死別無他術須識三界無非是苦現在身心便是苦具不知苦故重造苦因今以四大觀身四蘊觀心了知無我我所秪緣迷惑枉受輪回深生慚愧猛求解脫此即真實為生死心而又了知心佛衆生三無差別諸佛已悟衆生尚迷我今既知此理誓與衆生同證正覺此即真正大菩提心發此心已又知設有一事不合佛行一言不合佛語一念不合佛心則不足自利利他三千威儀八萬細行皆磨礱真性之具斷不在衣鉢錫杖間便應洞明作犯止持及開遮方便方成佛行十二分教三乘聖典皆指點心性之詮斷不在名句文身間便應痛究偏圓權實及體宗力用方解佛語拈花豎拂種種機緣皆點鐵成金方便斷不可落識情卜度邊便應直下覓心了不可得不於心外商量古人公案方契佛心夫佛心己心豈有二哉觀現前一念心了不可得不復誤認緣影為心方知一切諸法無非即心自性既知一切法皆即自心則佛心亦即自心既知佛心即是自心則佛語佛行何獨非自語自行乎不於心外別覓禪教律又豈於禪教律外別覓自心如此則終日參禪看教學律皆與大事大心正法眼藏相應於一念間矣豈以枯禪默照為觀心哉示未學一切諸法本自不有不過自心所現衆生迷惑妄起計著究其大病秪因迷己為物又復於中認物為己所謂妄認四大為自身相六塵緣影為自心相此即無始生死根本也邇來稍解佛法者縱知四大非身全不知緣影非心不思緣影便是一物何能靈妙常知哉然正認緣影時緣影元非心而妄認緣影者元未嘗不靈妙常知離諸戲論也但覷破一切所知境界無論真妄有無皆自心相分而能知之體究竟了不可得如眼決不自見其眼亦決非無眼心不知心亦復如是由眼故見一切物由心故有一切法一切法皆不是心而離心無一法如微塵許可得但恁麼體達去無有一法是心更無一法非心久久純熟便到心法一如境界亦無能到所到思之思之示智可生死大事人皆有之惟顛沛患難中歷過倍應親切乃有歷苦難而生死心仍未切者虛妄我執情計深厚埋沒本有智光故也然本有智光豈可埋沒日用動靜嘗在我執情計中躍躍欲露人不肯冷眼一覷破耳誠向虛妄我執中努力冷覷畢竟何物是我何人計我覓我於四大五蘊中既不可得覓一能計我者於四大五蘊外又不可得能計所計不亦當體空寂也與唯其當體空寂而橫生計著所以背覺合塵若知正橫計時仍未始不當體空寂豈不當下背塵合覺嗚呼迷則全覺成塵悟則全塵歸覺塵之與覺其性不二背無可背合無可合非背合而論背合不深於教觀者不知也然非念念反觀身心理性亦決不能深入教觀或有聞無慧執火自燒或有慧無聞操刀反割真為生死者放下眼前活計痛除無始惡習以心印教而不為虛言以教印心而不為暗證雙超禪教兩弊為智人所可已示宇泊宇宙無非旅泊而泊宇內者畢竟是甚麼人五蘊身心邸中幻物喚作自己不得然離身心又喚何物作己謂無豈不斷滅別有與神我何異經云見與見緣并所想相如虛空花本無所有此見及緣元是菩提妙淨明體透此雙超斷常二見便知現前一念離過絶非便知宇內外一切物泊今一念妄想心中猶浮雲之在太虛是謂不被物轉便能轉物回視妄認四大為身緣影為心復生厭離必出此三界乃歸家者何啻日劫相倍而已偈曰宇宙泊在吾心吾心本無所泊一任亂想昏沈本有靈明如昨彩雲端見仙人豈被手扇遮卻不遮卻耆婆童子空摸索咄示恆慈慈之名一義有三生緣慈法緣慈無緣慈也慈之義三體惟一謂佛性也佛性體恆不變生佛不殊達此佛性便成三慈有人於此起惑造業破戒犯法菩薩見之了知善惡從因緣生如幻而有既造幻因必招幻果誓拔其幻因幻果之苦與以幻滅之樂是生緣慈又知此善惡法既從緣生便無實性當體本空不了本空枉受輪轉今自了本空亦令他覺了本空拔不了苦與了空樂是法緣慈又知此善惡法緣生無性無性緣生其體不二即是實相不了實相妄墮二邊善了二邊罔非實相拔其非邊計邊之苦與以即邊即中之樂是無緣慈也説雖次第行在一時常不輕菩薩所行法華三昧乃恆慈三昧也示七淨大佛頂經云衆生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉試問妄想畢竟是箇甚麼在內邪在外在中間乃至一切無著邪若七處徵窮都無是處非楞伽所謂妄想無性邪妄想既本無性如何而可用邪既無妄想可用又云何有流轉邪果即現前一念妄想痛究其源究至當下無性處便知離真心別無妄想可得如水外無波離妄想別無真心可覓如波外無水但破遍計則依他起上即顯圓成開口處討得清楚十卷文義皆清楚矣豈效群盲摸象展轉訛亂哉示蕊幢人知種種光明蕊香幢安住無邊香水海中亦知香海住太虛太虛住吾人一念妄想心中乎妄想不生虛空何有虛空消殞香海安存香海本空喚甚麼作蕊幢咄咄切莫作斷滅會切莫作海印炳現會待汝真打失鼻孔時再來蕅益道人手裏領痛棒示達心經云三界無別法惟是一心作畢竟心是何物能作三界諸法邪若是一物既成一物何能遍作諸物若畢竟非有自既無體又何能遍作諸物哉如無水決無波然水既舉體作波矣捨波別覓水體可乎於波中分別何波是水何波非水又可乎亦如幻事無巾則無兔馬然巾既舉體作兔馬矣捨兔馬別覓巾體可乎即謂兔馬為巾又可乎更謂兔馬本無并巾亦無又可乎心法不一不異亦復如是自其不變隨緣者言之心既舉體為依正為名色為凡聖矣依正名色凡聖法外別覓心性如毛頭許胡可得也依正名色凡聖法中別認如毛頭許以為心性亦胡可得也指諸法為即是心胡可得也諸法為非是心亦胡可得也説依正名色凡聖諸法無量差別心亦無量差別胡可得也心無差別諸法亦無差別又胡可得也説依正名色凡聖諸差別法不即無差別心無差別心不具諸差別法胡可得也説心外實有依正名色凡聖諸法胡可得也諸法俱非實有心亦非有又胡可得也此皆不變隨緣之理當下離過絶非者也自其隨緣不變者言之既舉心性全體幻成依正名色凡聖諸法於中隨舉一法無不仍是心性全體大用如舉水作波無一一波非水之溼性舉金作器無一一器非金之堅性貴性又如舉日輪全體光射一隙無一一隙中不具見日之全體大用者也由此言之事事無礙法界原在吾人日用間頭頭爾法法爾豈必高推聖境謂凡夫絶分哉只此妄謂凡夫絶分之情見亦仍不可思議亦是法界全體大用以不在內不在外不屬過去現在未來不可謂有不可謂無故如燒糞掃火即燒栴檀火亦即遍燒大地之火故知凡夫情見即出世智慧之體亦即諸佛根本不動智體設無此情見亦無出世智不動智矣情即智體業即解脫苦即法身亦復何疑如拳即手冰即水華即空蛇即繩繩即麻如是了達方名達心亦名達一切法亦名無達無不達雙照達與不達如是達得便能特立千古決不被眼前活計所區局矣示劉今度上品上生三種人首云慈心不殺具諸戒行蓋戒為萬行總都而慈心不殺又為戒行先務以此圓發三心何土不淨哉三心者直心正念真如名至誠心顯法身德樂集一切功德名深心顯般若德弘誓無盡名回向發願心顯解脫德戒亦有三攝律儀戒無惡不斷即成法身攝善法戒無善不滿即成般若饒益有情戒無生不度即成解脫慈亦有三生緣慈不殺生緣觀一切衆生皆我父母兄弟六親眷屬也法緣慈不殺法緣觀一切地水是我先身一切火風是我本體也無緣慈不著我緣觀現前一念佛性無所不遍十方三世有情無情同一覺體無二無別也念念修此三慈即淨三聚三聚戒淨三心即具上品上生無疑矣又觀行三心能生上品凡聖同居淨土相似三心生上品方便有餘淨土分證三心生上品實報莊嚴淨土究竟三心生上品寂光淨土永嘉誰無念誰無生若實無生無不生金剛應無所住而生其心一切賢聖皆以無為法而有差別此之謂也示穎生大慧禪師禮觀音文最有靈驗妙在行之密而且恆若不密不恆雖至聖亦何由無感輒應也凡頂禮之法靜夜時先於像前燒香供養精持大悲神咒三五遍以淨壇次合掌對像讀讚觀音文一遍次至誠頂禮千手千眼大慈大悲觀世音自在菩薩摩訶薩三十二拜乃跪誦觀音文回向如此行去勿與人知三年不輟必得靈應隨其根行所發戒定慧三品各各有上中下不同將藏中法華三昧修證之相細自簡察庶不墮魔事示馬堯都世衰道微由聖學不明聖學不明由功利惑志不有豪傑振其頽吾恐孔顏真脈不墜地者幾希也豪傑不過念念以聖賢自待見賢思齊知過必改訥於言而敏於行友直友諒友多聞樂節禮樂樂道人之善樂多賢友發憤忘食樂以忘憂如此用心而不優入聖域吾不信矣下手直捷方便莫如致良知夫知善知惡猶眼知色鼻知臭非不學而知哉知善而不能如好好色知惡而不能如惡惡臭非不致其良知哉有良知而不肯致則為自欺自欺即自暴自棄若能如惡惡臭如好好色以致之即是自慊自慊即意無不誠意無不誠欲不謂之大聖大賢不可得矣故曰欲誠其意先致其知誰謂致良知外別有誠意功夫也然致知又在格物故陽明云為善去惡是格物功夫至於如惡惡臭如好好色則可謂格物而物格物格而知至意誠矣昔張子韶未悟物格之旨大慧師曲示之乃悟蓋三界因果一切惟心心外無物故名物格非大慧不能曲垂方便暗擊旁敲非子韶不能因指見月頓領深旨儻向此薦取則不負靈山親囑亦如孔子之於春秋孟子之於戰國不必得君行道而萬世聖學絶而復續豈非豪傑本分中事哉堯都堯都勿以豫言為河漢也示玄著佛知佛見無他衆生現前一念心性而已現前一念心性本不在內外中間非三世所攝非四句可得只不肯諦審諦觀妄認六塵緣影為自心相便成衆生知見若仔細觀此衆生知見仍不在內外中間諸處不屬三世不墮四句則衆生知見當體元即佛知佛見矣儻不能直下信入亦不必別起疑情更不必錯下承當只深心持戒念佛果持得清淨念得親切自然驀地信去所謂更以異方便助顯第一義也此棒打石人頭曝曝論實事若要之乎者也有諸方狐涎在非吾所知也偈曰衆生知見佛知見如水結冰冰還泮戒力春風佛日暉黃河坼聲震兩岸切莫癡狂向外求悟徹依然擔板漢示爾先仁者先難而後獲夫欲明明德於天下最先格物格物非事之最難者邪乃大慧示子韶但知格物不知物格舉斬像落頭事子韶乃悟噫古人但知格物之難而不知物格之易也今人但知物格之易而不知物格之難也請更以一事證之皋亭永慶寺有化主明徹往海岸一菴與彼主人共榻主夢賊至大呼撲賊明徹被打驚呼助撲鄰聞急來救則二人各謂打賊結手不放既見火光大笑而臥此格物邪物格邪知此義者則知大慧所點子韶所悟物格而後知至乃至天下平不難矣示清聞剋除習氣莫若三業行慈三業行慈則無十過十過既除十善斯在而五乘之本立矣然後以實相印之法法皆歸佛道古有行之常不輕菩薩是也初隨喜品便淨六根何俟誦説方名深觀果能以慈修業自能善入佛慧不然學問愈多我慢愈熾習氣愈長去道愈遠惟益多聞增長我見可懼也示松石佛種若有何勞從緣方起若本無緣又何能起之設謂亦有無豈不相違縱謂非有無終成戲論假使離卻四句又墮第五不可説句中作麼生是入道之機不見道恁麼也不得不恁麼也不得恁麼不恁麼總不得雖然如是不得一向苟知不可説句之非則知有因緣故亦可得説謂有可如鏡有像性故無可鏡中元無像故亦有無可鏡像緣至則現緣去則無故非有無可鏡像現而無實無而能現故識佛種圓離四句而圓照四句從緣起處不辨自明矣古有熟讀三千部之勤後收曹溪一句亡之效迷時法華轉即悟時轉法華之緣也苟懲依文解義之迷便離文字別求解脫加於迷一等矣示蒼牧二死大海戒為舟楫欲受戒品尤以發菩提心為本蓋菩提心正出世戒體大小律儀則菩提心之相也發出生死心降伏愛見是聲聞戒體發上求下化心自調調他是大乘戒體發生佛體同平等普度心是最上乘戒體既發心已專精護戒微細無虧即三乘正行也持戒不發心止得世間樂果發心不持戒難免三塗苦輪故須本末兼舉始終一致方能保任解脫名波羅提木叉不然有目無足有足無目何能速到清涼池哉示聽月學問之道求其放心心是何物求者何人覓心了不可得祖許云汝安心竟即能推者為心佛咄云此非汝心宗教釋儒一邪異邪同邪別邪於此瞥然會去正好向山僧座下讀上大人如或不然不免再下注腳中論偈云諸法不自生亦不從他生不共不無因是故知無生諸法者廣言之百界千如略言之佛法衆生法心法也雖心佛衆生三無差別但佛法太高生法太廣初機之人觀心為易但諦觀現前一念介爾之心若自生何藉境若他生何關自各既不生合云何有合尚叵得離何能生仔細簡責心之生相安在心既無生豈非覓不可得心不可得豈可喚作一物心既非物求豈有人無物無人何收何放盡大地是箇自己心外更無別法方知萬物皆備於我十方虛空悉消殞皆不得已而有言言所不能盡也示自天真為生死固不得遠師友妄自師心亦不得單恃夾持不深自操履必有善財之志趣力量方能收百城知識之益有常啼之堅固勇猛方能受法上菩薩之經苟無出格超方手段但欲如葛依松蠅附驥正法時或可濟事丁茲末運鮮不空過一生者況葛可依松松不能俯就於葛蠅可附驥驥不能停待於蠅進退深思宜如何努力以無負此為生死心也儻必謂力弱膽怯不堪致遠更聽一偈晝夜彌陀十萬聲畢生莫起宗教想直送心歸極樂邦蓮蕊珍池立地長任他笑我是愚夫行尺從來勝説丈他年驀上願王舟善財常啼同撫掌示日唯世出世法皆解行相須解如奕棋眼行如奕棋子有子無眼著著皆死棋有眼無子喚棋盤作眼可乎孔子曰吾道一以貫之曾子曰唯此指活棋勢也曾子忠恕二字此於一局活棋中指點做眼之高著也金剛般若指活棋勢云應如是住如是降伏其心唯然世尊又於一局活棋中指點高著一則云有持戒修福者於此章句能生信心一則云以無我人衆生壽者修一切善法此忠恕之旨而學般若者於心枰中下手方便也當知五度如子般若如眼有五度無般若恕而不忠棋死矣錯認般若而廢五度則不忠不恕破壞心枰無處下手安問般若智眼哉示開一儒云吾道一以貫之又云執一賊道舉一廢百內典云達得一萬事畢又云是一非餘是為魔業嗟乎一豈有定法哉得鳥者網之一目不以一目廢衆目收功者棋之一著不以一著廢衆著一切法莫如法華妙而法華能妙一切法不離一切法別為妙也一切法莫與般若等而般若能等一切法不離一切法獨無等也末世秖圖鼻孔撩天不顧腳跟著地秖喜説妙説玄高提向上全無真操實履下學工夫言居佛祖先行落凡愚後既未知為實施權權是實家之權又烏知開權顯實實是權家之實法友鑒此向一實地中廣開三學萬行所開雖廣無一非實也
