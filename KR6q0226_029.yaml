body:
  text: 壽序壽延壽院新伊法師六秩序豫自壬戌出家往來雲棲雙徑間即獲與師識荊至忝為忘年交自庚午歲始每一聚首輒曉夜盤桓佛法弗置豫退休求寂遁迹深山二三學人從豫遊者皆令稟沙彌戒於師門比丘果海則師指示令其學於不肖者也己卯孟冬值師六十壽誕諸戒子謀所以稱師壽者豫惟出世法門觀色身與太虛等觀塵劫與彈指等奚事頌岡陵稱浩瀚與世諦競稱延壽哉夫勝義三寶常住法身無量無量何所論延若住持三寶則諸佛慧命從來藉人以傳故梵網云佛性常住戒卷流通三世一切衆生化化不絶而大經扶律談常稱為贖常住命至寶豈非甘露戒法實佛界延生妙藥令九界頓同佛位者乎昔紹覺法師遨遊教海遍探大蘇慈恩宗旨講演之餘手輯毗尼珍敬録以範後昆師童真入道為紹公長子性相二宗無不克受其傳服習毗尼視紹公尤加焉初受大戒於雲棲時便得登座演法之夢二十餘年久默斯要直至惺谷力請方肯破格一稟羯磨從此後學雲仰景從事不獲已乃開甘露法施普令四衆皆得服嘗師為人天宣暢道化數十年來未嘗暫廢而舌不味過午之肴身不御珍奇之服性遮俱淨解行並美且復建立壇儀則功深五悔趺坐習靜則觀成十乘此其所以砥柱狂瀾續佛慧命者為何如哉每慨如來正法一蝕於説食數寶之流再蝕於暗證無聞之侶乃至近世狂禪惟以鼠唧鳥空相馳驟而羺羊比丘又往往無解作師適為踰間蕩檢者嗤笑豫是以避地避色狀如聾瞶惟師密養既厚聲名自溢其源遠者其流長吾知師光明壽量直與無邊莊嚴香水海同其深廣種種光明蕊香幢同其高大豈世間岡陵浩瀚所能擬其埃滴也壽莊母道昭優婆夷蘇碩人八秩序夫十世古今始終不離於當念所以世尊入剎那際三昧八相成道既頓示復互示良由時劫之性即是實性故也然惟證時劫之實性者自能遍現種種時劫善夫天台之言曰實無量而言無量法身之壽命也實無量而言量報身之壽命也實有量而言無量應淨土身之壽命也實有量而言量應穢土身之壽命也至於即穢而淨即應化而法報又隨機各見不同豈思量擬議所能及哉宣尼氏謂仁者壽是不僅以色身論壽不妄從延促起見也明矣醒一莊子儒而禪者也母蘇氏年登八旬不問序於名公大人獨泥首啓豫曰先大父少塘公筮仕於粵囊無宦資先君子鑑塘公從事性命之學恥為貨殖吾母繼事先君子從劇貧中撫前母郭氏所生一男一女無二心既育豫小子不令以貧廢學教愈篤後永覺禪師至開元説法母曰苦當思脫率豫小子而歸依焉今躋八秩豫小子為貧母兒未知所以報母者山納笑答之曰子不聞佛世有須賴居士乎貧於財不貧於法波斯匿王不敢與較富也子又不聞昌黎之問大顛壽乎顛舉數珠云晝夜明珠一百八昌罔措舉問首座座叩齒再問顛顛亦叩齒昌曰原來佛法只是一個道理顛即召首座連棒趕出嘻若向此處穿得大顛首座鼻孔不惟昌黎熱鼻孔無處出氣并三世諸佛歷代祖師赤骨歷冷鼻孔皆無出氣處便可向莊母稱無量壽矣壽陳旻昭居士六秩序博山老師曾謂豫曰吾每與講主相見必叩以事事無礙法界儘力答來止説得事理無礙而已從未有説得事事無礙者豫應聲曰事事無礙豈真在事理無礙之外哉惟其全理成事所以全事即理唯其全事即理所以全事即攝一切事耳且如舉一毛端必具法界全理非是法界少分之理以事外別無理故此事理無礙也既此毛端已具法界全理亦必遍攝法界全事非僅法界少分之事以理外別無事故此即事事無礙也師遂首肯豫復曰佛為初機之人必深談理性欲其以理融事不滯於事也若為深位菩薩必廣談事相欲其以事攝事不滯於理也不滯於事則一事通達一切理名事理無礙不滯於理則一事通達一切事名事事無礙師大然之居士博山大弘護也今六旬華誕豫請以博山點首者為居士壽惟居士弘護大法三十餘年矣凡今事門頭布施持戒忍辱精進等行亦既積集廣大矣即向上一著亦必點胸自肯矣豈非已入事理無礙法界者耶其去事事無礙幾何居士好奕請以奕喻夫黑白二子勝負歷然了知勝負皆無實性不於勝負起我法二執者事理無礙也能於一一著中透盡三玄三要五位九帶九十六種圓相乃至百法明門六相十玄三千性相無不究竟明了者事事無礙也居士依仁遊藝蓋欲深入事事無礙法界豈僅以一奕娛情豫故謂居士必欲究竟此一著子須再向三玄三要五位九帶九十六種圓相百法明門六相十玄三千性相等一一葛藤窠中遊戲出入俾無纖毫不透盡處然後得成無上妙奕三昧然後執善財手摩善財頂而告之曰我得菩薩解脫名曰善奕我於一一著中見無量佛聞無量法親近供養無量衆僧又於一一著中圓滿念處正勤根力覺道三十七品菩提分法又於一一著中入空無相無作法門普見諸佛剎土不以二相又於一一著中具足六度四等四攝萬行不可思議福智資糧又於一一著中成就十力四無所畏十八不共佛法又於一一著中莊嚴三十二相八十種好流出身雲遍十方界又於一一著中降伏諸魔制諸外道破我法二執顯二空真如又於一一著中隨諸衆生有種種欲種種解種種根性種種煩惱習氣稠林悉順其機而為説法以四無礙解具足諸佛四種悉檀令諸衆生各得歡喜各得生善各得滅惡各得安住第一義諦善男子我惟得此善奕三昧乃至微塵剎土自他不隔於一著十世古今始終不離於一著釋迦如來於此一著上轉大法輪彌陀世尊於此一著上淨四種土則宣聖之耳順便可與觀音之耳根圓通同入首楞嚴大定海中庶不負居士自所期許亦不負普天之下所期許於居士者矣是為祝壽張幼仁五秩序張子韶有省而説偈曰子韶格物妙喜物格欲識一貫兩個五百豫在家時心竊疑之後讀大經滿字半字之喻恍然會心夫格物者吾佛半字教也物格者吾佛滿字教也為實施權則半助於滿開權顯實則滿融於半半助於滿半外無滿滿融於半滿外無半一貫兩五百豈不信哉幼仁子韶後身也已悟諸相非相而為如來寫出三十二相幾及萬軀夫悟諸相非相此格物半字教耳三十二相莊嚴法身豈非物格滿字教乎今年新秋朔日半百初度幼仁先已證入滿字法門則兩個五十便是一百夫何疑耶於此百年之中流出佛身相好更當無量是謂十世古今始終不離於當念矣壽優婆夷馬母宋太碩人七秩序法身壽量無始無終報身壽量無終有始應身壽量隨機示現如此理會得猶是循行數墨見解若知一體三身不一不異則知一切壽命總唯心量是故得心自在得法自在壽命自在能以一日為永劫能以永劫為一日當念之性即十世古今之性一切含靈亦同此性無量壽佛亦同此性覺此性者謂之佛詮此性者謂之法順此性者謂之僧護此性者謂不殺全此性者謂不盜守此性者謂不淫宣此性者謂不妄語明此性者謂不飲酒不忘此性謂之念佛觀察此性謂之念法隨順此性謂之念僧以此性示人謂之念施以此性自範謂之念戒以此性為畢竟所依謂之念第一義天若人深信此性乃名具足三歸五戒六念若人能受歸戒能修六念乃能隨順證入此性今優婆夷宋太碩人為馬氏昆玉七人之母年滿七十兒孫滿堂且令嗣光世居士因信禪而兼信教太昭居士因學儒而兼學佛餘子若孫亦各表表成立能為出世色養太碩人一無所慕獨以歸戒為樂劉姚諸君子與光世太昭善謀所以壽太碩人問於山納納曰太碩人所樂者正如布帛菽水亙古亙今淡而不厭子別無山肴海錯諸君子亦何必別覓鳳髓龍肝也哉壽車母牛碩人八秩暨次公居士六秩序現前一念之心亙古亙今故名無量壽靈明洞徹故名無量光阿彌陀佛不過先得我心之所同然而已是故吾人果能念念執持阿彌陀佛即是念念證無量壽放無量光古聖既爾今人亦然至心既爾散心亦然法華云一稱南無佛皆已成佛道大聖金口豈欺我哉末世障重別求玄妙欲速反遲惟蔤蕃車居士篤修淨業心無異趨晝夜彌陀五萬聲以此功德仰祝萱親發願同證阿彌陀佛究竟果德而牛碩人亦已長齋三十五年有如一日居士舉三子三女而三子又得蘭孫九人今稱壽不用世間歌舞惟用佛號經聲使普天下人盡若車氏眷屬豈不即娑婆是清泰即分段親因是菩提法侶乎居士謂現前兒孫雖已聞三寶名欲更以此念佛祝壽法門垂之奕世化化無窮特乞山納一言夫現前無量光壽之一念人所同具也而昧之亦人所同感歎也同具則非異也同感則非可已也以同具之心感於其所不可已之情夫獨非人子也歟哉樂如法姪四十壽語豫壬戌夏出家行腳首至雲棲即與雪航楫兄盟出世交逮壬午夏幻寓菰城方識樂如法姪姪蓋雪兄所剃度也自幼持齋十二三歲即歸依雪兄直俟歷試堪持淨戒乃肯離俗其視出家非等間事已勝尋常千萬倍矣邇來住靜道峰之麓和光同塵而不易其介且篤信淨土法門渴慕圓頓宗旨故於客冬不惜勞苦隨豫祖堂入法華會豫每慨末世學人止圖入耳出口欲如法姪之但求密默受用者尤為不可多得但淨土法門必以大菩提心為宗要大菩提心固不可以意氣承當亦不可以姑待自諉昔孔子於四子侍坐必借曾點化三子之著有借三子實曾點之忘情雪兄昔日熾然以法門為己任有似子路老姪今日淡然以守靜為家風有似曾點則老姪固可為吾雪兄之藥而我雪兄亦未必非老姪之當所學也今冬值老姪四十初度同門子若證真二弟特乞余一言為祝豫惟老姪真為一大事因緣出家從來非好諛者故直書此以作無量壽之左券祝沈母張碩人節壽序吾聞壽者受也自造其因自受其果非天降非地出非人與者也故宣聖謂仁者壽又謂大德必得其壽壽豈心外法哉壽既非心外法舉凡父子夫婦親友子孫皆非心外法也是故人能盡其心於仰事俯育忠孝節義之間斯上壽自可必矣又能推此心本寂本照之體而克復之斯無量壽無量光亦可證矣沈東起之母張碩人初適悅軒老居士也舉東起僅三月悅軒捐館碩人冰櫱其操撫育東起以至成立後嬰篤疾東起懼割股為藥得以無恙豫是以知東起之心即張碩人之心也碩人之心即千古聖賢之心也千古聖賢之心即十方三世諸佛之心也諸佛之心即人人固有之心也勿喪此固有之心則為賢者擴充此固有之心則為聖人極盡此固有之心則為諸佛參禪者參此者也止觀者觀此者也念佛者念此者也格物者格此者也致知者致此者也明明德者明此者也碩人與東起蓋皆能弗喪之矣知皆擴而充之充類至乎其極一念相應一念佛念念相應念念佛證無量壽放無量光度無量衆成無上覺何莫非一心中事耶昔波斯匿王年六十二創聞如來發明不生滅性與諸大衆踴躍歡喜得未曾有今碩人年六十二余為説此不生滅法碩人與東起之踴躍歡喜必不在波斯匿王下矣壽姚廣若居士三秩序佛法之要在戒定慧儒門之德在智仁勇淨土之訣在信願行此三非三三秖是一此一非一一必具三能知戒定慧之缺一不可者智也躬行戒定慧者仁也不被貪瞋癡所奪者勇也知三德之在物在我本來平等者信也以我因中三德仰企果上三德者願也直將果上三德成我因中三德者行也此所謂三法妙也孔子三十而立立乎此也釋迦三十成道亦不過成乎此也豫憶壬午冬初晤廣若廣若甫二十一歲今冬值居士三十初度古人云道曠無涯逢人不盡宣聖雖三十而立猶不敢居聖仁釋迦雖三十成道猶不捨穿針之福唯其立乎此成乎此所以盡未來際不捨乎此也於此究竟無捨斯謂至誠無息勉之豫將與居士共遊安泰之邦師無量壽友觀自在及無邊光矣壽新伊大法師七秩序師壽六十戒子之從旭遊者謬以旭言稱壽今師七十高足復以壽序見託旭猶憶辛未春同師禮大悲懺於蓮居程季清甫議六年法社旭於觀堂中夢十字街頭一大涼亭懸燈十有餘盞須臾風作僅存一燈孤明歷歷維時妄意厥祥在師今果為蓮居獨存之一燈矣然存此一燈非偶然也師以童身給侍紹翁備受惡辣鉗錘乃克為晚成大器生平戒律精嚴梵行超卓懺摩禪觀靡不深習而尤妙在虛懷好問壬午旭從閩出即以唯識合響殷勤下問逮客歲以柬寄旭仍命校讎師於唯識講演二十餘遍尚不恤下詢鄙夫以視今之妄自滿足空腹高心者為何如哉易曰謙尊而光卑而不可踰無量光無量壽胥在此矣盡未來際常住世間劫風起時此燈愈熾區區南山北海可以喻師光壽也乎達源禪宿六秩壽序昔無異禪師入石城一日登座萬壽菴達源師出衆問云如何是無量壽異云烏龍潭裏浪滔天進云若是則有量也異云天池一滴水豈與衆流同師遂禮拜歸位豫時獲識荊逮辛未春師敝屣菴業飄然一納遊武林復與豫遇於蓮居菴則志泛教海并近日禪者氣象而忘之矣親近新伊老法主既久乃拗折柱杖獨居華塢之定慧菴菴久不蔽風雨師就其地誦法華千部施焰口千堂數年有如一日始感檀護鼎新之師為人坦夷率直無芥蒂無涯岸而勤修真實行門蓋不惟得力於天池滴水而已師自述志學之年即知奉佛將弱冠禮別傳尊宿剃髮別公與紫柏老人同時孤標獨邁罕有能承事者師曾托鉢奉養十年朝夕親炙所以猶有古人風格雖近世宗匠咸申參請而終不襲其家法也泥多佛大源遠流長唯師有焉白法老尊宿八秩壽序嘗聞出家有三事業曰坐禪也讀誦也營福也坐禪猶國有武備名為定輪讀誦猶國有文事名為慧輪營福猶國須理財名為福輪此三並以戒為基本猶國之若司馬若司吏若司農等並奉律憲初未嘗以禪教律列為三宗也又有三種善知識曰教授也同行也外護也夫教授以先覺後猶可教學相半同行共所趨求祇期麗澤相資惟外護善知識必須諳悉通塞委曲維持故從古每以為難且就法華五品觀行言之同行則初二品可為也教授則第三品可為也外護則非第四第五兩品弗能任也昔密藏大師棄儒學佛既從紫柏大師剃染大師謂其初入法門未有福業命復長水楞嚴古剎流通書本大藏續佛慧命創千古大事因緣密師既隱大師復寂佛殿經坊漸至冷落至壬戌冬禾城衆護法敦請白翁主禪堂事俾山門廊廡煥然一新流通大藏永成規畫十年後以餘力建營泉古剎又越六年歷武林之橫山昭慶及武水之幽瀾為社主逮癸未年再蒞楞嚴堂凡三載時遇鼎革兵戈沸騰而師之慈心忍力益著至丙戌夏壽七十一退居紫柏院中冬建漏澤古剎己丑仲秋主東塔鼎新廊廡曾不辭勞蓋生平孜孜營福真所謂三十年不改家風者矣豫每謂紫柏大師重繼永明芳軌宗説俱通解行具足撤性相之藩籬指歸一轍懲禪講之流弊導使尋源觀其半偈功成去來自在可謂徹法源底矣未嘗拈槌豎拂踞曲盝床也於天台賢首方山慈恩可謂會通差別矣未嘗升座雲集稱人天師也口無雜味脅不著席可謂頭陀勝行矣未嘗授戒傳錫稱大和尚也由其不敢裂禪教律為三故能深知正法之難故慎重若此也或議白翁三十餘年為叢席主未嘗請一師匠宏宗演教説戒以為缺典豈知此正白翁具大手眼非聊爾也彼三學一源者益無望已今天下宗主能如紫柏之徹法源底乎今天下法主能如紫柏之會通差別乎今天下律主能如紫柏之頭陀勝行乎觀於海者難為水白翁之不請轉法輪乃其所以護正法輪也不忍莠亂苗鄭亂雅也且紫柏之以流通大藏為急務誠不異刪詩書定禮樂贊易修春秋之苦心也密師契之猶孔門有顏子翁繼其任而擴充永遠之猶孟子也其功偉矣今年已七十有七長豫念三歲而精神比豫倍強豈非續佛慧命所感之現果也從茲大藏法燈永永無盡翁住世亦永永無盡何異十六大阿羅漢承佛敕命擁護流通三藏法寶者哉預祝乾明公六十壽序佛法之盛不存乎能宏通而存乎能固守蓋宏通則近於名聞由名聞致利養由利養致匪人易生有漏因緣佛世十二年後尚爾況末運乎唯固守則遁世無悶確不可拔可以回既倒狂瀾留正法一線繼往開來續佛慧命如六祖隱於獵群者十六年荊溪一生不登法座而曹溪天台之道並垂千古豈非存佛法之明驗歟豫生也晚弗及受先輩鉗錘忝為憨翁法屬顧所私淑則雲棲之戒紫柏六祖之禪荊溪智者之慧也奈障重習強未階法忍僅開名字佛眼竊述法華台宗會義庶幾不被法華轉耳辛卯夏結制長干當解期日已有決不應請之誓而乾公所請乙未年冬法華道場猶在未誓之前豫初意入山四年或得功夫稍進法運亦可稍回故不敢決意固辭詎料兩載有餘阿蒙如故加以法門鬥諍方始其餘斗筲之士又皆各就一方託言演教宏宗網取微利大有不忍聞者此時設非急流勇退不幾於水益深火益熱乎乾公長干之耆宿也秉戒於博山禪師則亦私淑雲棲者也出家於大報恩寺則亦私淑憨翁者也敦律行勤持誦則法門翹楚也重然諾樂福業則人天標榜也其廑法門遠憂實與豫同決不以言必信行必果責豫豫亦安敢執硜硜小節務踐一諾而貽法門羞哉公以丙申二月十五日為六十初度豫今季春始歸靈峰至公壽日未滿二載何能走賀茲為謀梓楞伽起信選佛三種著述遣堅密蒼暉二子往董厥役請即以流通法寶功德預為公祝公其令獲奏績則諸佛慧命俟百世而不惑皆公無量光明之所被也視百日敷揚僅供千人耳目功德大小為何如哉況公與豫誼在世外菩提宏願塵劫弗諼猶憶向年修報恩塔公主其政不煩廣募不事攀緣唯以真心實行彈指告成較雪浪法師當日修塔因緣事半功倍此其諳練世出世法深知無住生心之旨有不俟豫言者豫之祝無量壽若此公必以為然矣
