body:
  text: 古歙門人成時編輯頌一大方廣佛華嚴經頌一百首并序剎海入微塵不是一多相即毫端呈法界非干小大相容祗緣法爾如然所以不容思議分凡聖較淺深大似邀空華結果掃語言諱修證無端禁石女生兒睹明星而了悟栽成眼上兩莖眉遍衆會以敷揚繪出空中千色彩然雖今事門頭覓一塵而無朕不妨實際理地炳萬法以齊彰大哉絶對待之假名方矣泯分滿之殊相廣則毛孔邊際等虛空之莫窮佛則介爾凡心即真常之妙覺華乃因果同時嚴乃能所不二是以若通若別可軌可持十界並遵三世一轍然一丸而衆香悉具飲一滴而諸河頓嘗普請露柱燈籠聽取葛藤絡索世主妙嚴品第一頌曰萬國衣冠拜冕旒御筵香染繡羅裘不觀上苑枝條茂那信蒼穹雨露周踏破波濤渾是水織成縷線漫稱紬莫嫌山谷泉聲小大海何嘗擇細流如來現相品第二頌曰衆齒光明遍剎塵十方雲集主中賓眉間足下出還入極果應知即正因蓮現何曾離本際勝音寧復是他人殷勤聽取伽陀句白牯狸奴知最親普賢三昧品第三頌曰運水搬柴足可娛藏身三昧阿誰無擬求佛手來摩頂翻昧衣中如意珠尺鏡遍含空界影寸雲堪灑剎塵枯勞他依正同宣偈喚出滄溟月影孤世界成就品第四頌曰大覺空生海一漚一漚拈起海全收休將十事為他事認卻鬍鬚失卻頭華藏世界品第五頌曰鼻孔下垂眼睛橫布毛竅玲瓏皮膚連附地種無殊森羅草樹獅子全威奚分象兔欲知華藏莊嚴不離剎那安住擬向心外覓玄昧卻介爾性具毗盧遮那品第六頌曰閻浮本是輪王地幾度征誅始定疆曾聽胡笳月下曲不須鶴唳亦悲傷如來名號品第七頌曰十千名號任他呼那個男兒不丈夫借問而今説法者文殊還有幾文殊四聖諦品第八頌曰藥病相連頭緒多一番提起一番訛無生無量歸無作大海從來具衆波光明覺品第九頌曰故園消息斷多秋夢裹尋思淚未收驚蟄一聲啼鳥亂不堪覽鏡倍生愁菩薩問明品第十頌曰白雪陽春和者稀弟兄且自協塤篪華周妻子三年哭引得齊人盡皺眉淨行品第十一頌曰棒打石人頭老翁入場屋憐兒嚼飯未為醜上大人書勸熟讀一朝讀到可知禮錦繡文章充滿腹賢首品第十二頌曰認影迷頭歷劫行狂心歇處鼻分明神珠拈出隨君用衣不蠶兮食不耕升須彌山頂品第十三頌曰平地風波浸殺人漫傳不動又高升佛身充滿無來去金屑休教著眼睛須彌頂上偈讚品第十四頌曰成群作隊弄精魂破盡家私滅盡門倡得哩嗹嗹哩曲大家扶起舊砂盆十住品第十五頌曰瞿曇一指不肯剟央掘摩羅追不歇忽然放下手中刀失卻娘生一頭髮梵行品第十六頌曰打破一桶做一桶顛仙此話非儱侗鄱陽大戰定江南聖皇也賴三軍勇初發心功德品第十七頌曰三際覓心不可得擬從何處發菩提東風一夜傳春信花滿園林泉滿溪明法品第十八頌曰子孝父心寬臣賢君位安創業固不易守成尤自難車輪鳥翼喻明月照人寒升夜摩天宮品第十九頌曰天名時分地如雲孔雀鵝王化久聞特地任公更垂釣牽翻海底浪紛紜夜摩宮中偈讚品第二十頌曰律呂宮商無別調都俞喜起聖明時堯天舜日同欽戴卻歎巢由總不知十行品第二十一頌曰萬卉莊嚴功德林鳥啼花落影森森夜行不許明須到才出門來草已深十無盡藏品第二十二頌曰克家須是破家兒撒潑黃金似爛泥餓殺鄧通由命薄天朝雨露本無私升兜率天宮品第二十三頌曰賣盡風流不著錢桃花如焰柳如煙笙歌畫舫酣明月見説今年似舊年兜率宮中偈讚品第二十四頌曰家醜何勞向外揚未曾作賊便招贓邊城多少離家客刁斗初鳴轉斷腸十回向品第二十五頌曰水滿長町霞滿天村中處處起寒煙耕牛自解尋歸路不用山童努力牽又頌懸梁刺股揣摩成説得燕王與趙盟何似當年赤帝子入關先已縛秦嬰十地品第二十六頌曰坤儀厚重德無疆能載能生直且方看取四微非異性不妨十嶽各稱王伶俐衲細思量微塵剎土漚中影莫負眉間毫相光十定品第二十七頌曰有出有入非正定試問剎那有何性假饒覓見普賢身依舊重添普眼病君不見女子跏趺佛座邊文殊空把神通震棄諸陰蓋下方來鉢盂端的元無柄十通品第二十八頌曰飢來喫飯困來眠不用安排信自然消盡幾多間日月止留秋水與長天十忍品第二十九頌曰立錐無地並無錐飲痛吞聲袛自知忽解白拈間活計終朝袖手有餘資阿僧祇品第三十頌曰介爾心王絶數量僧祇數量轉分明微塵法界全成壞五眼如何算得清壽量品第三十一頌曰黃粱一夢過名關箇事分明迷悟間欲向勝蓮分晝夜且從極樂問回還又頌蟭螟眉上多巖谷結冬度夏居堪卜任憑劫火洞然燒此地清涼有餘緣諸菩薩住處品第三十二頌曰色色塵塵盡道場何勞剜肉別成瘡賺他無數癡男女東走西馳昧故鄉佛不思議法品第三十三頌曰一念緣起無生九界空華敗壞多年枯木爛藤慣會成精作怪正許擬議思量不許占龜買卦壞叶惠怪叶貴卦叶至如來十身相海品第三十四頌曰佛説非身是大身百花枝上露全春癡人猶計九十七獨勝尋常四八倫如來隨好光明功德品第三十五頌曰千輻輪光圓滿王獄中菩薩鼻昂藏三重十地雖圓頓鈍置人間放逸郎普賢行品第三十六頌曰一念無瞋即普賢説時容易用時難世間多少弄潮客不解撑船淺水灘如來出現品第三十七頌曰遍界本無藏迹地家親無故常為祟眉間毫相播精靈口裏光明作魑魅分明賣弄屋中金帶纍兒孫向外覷假饒入得手中來明朝不是今朝事離世間品第三十八頌曰花枝隨處短長春色元無高下觸著一孔毫毛惹得通身害怕縱然瓶瀉雲興終難説盡者話蓮花本自水生不用描空作畫入法界品第三十九頌曰師子頻申三昧從來何曾覆蓋坐在水中渴死袛因畏溺為害自從認得郎君更不沿途乞丐兔子角上翻身烏龜毛裏作會憑他水盡山窮寸步不居門外蓋害丐皆叶記外叶偽普賢行願品頌曰十大願王導歸極樂末後牢關和盤直拓擬議躊躇千錯萬錯説性談心無繩自縛親睹如來無量光方知此語非嬉謔寄語參玄學語流休將向上間穿鑿福城東莊嚴幢娑羅林文殊師利菩薩頌曰衆生住地無明諸佛根本實智從來但一月真云何有是非是既發無上菩提豈更迷名失義歷盡煙水百城寸步不曾相離勝樂國妙峰山德雲比丘憶念一切諸佛境界智慧光明普見法門頌曰演若達多狂始定十方國土明如鏡鏡中現出無數頭一聲喚著聲聲應海岸國海雲比丘普眼法門頌曰大海境界隨思念湧出如來光燦爛一句難將海墨書留與無聞作針砭楞伽道邊海岸聚落善住比丘普速疾供養諸佛成就衆生無礙解脫門頌曰大地本來無寸土空中行住未為難幾多悲智莊嚴事一枕南柯夢欲殘達里鼻茶國自在城人彌伽妙音陀羅尼光明法門頌曰叨作輪王親胤坐受公孤謨訓傳來輪字莊嚴頒向九州百郡住林聚落解脫長者如來無礙莊嚴解脫門頌曰無邊佛剎莊嚴清淨身中顯現悲歡離合滿場究竟皆從一線説破只是自心免使別求神變閻浮提畔摩利伽羅國海幢比丘普眼捨得三昧頌曰殊形異狀遍體出生六月六日播弄精靈喚作般若嬰兒喪明海潮處普莊嚴園休捨優婆夷離憂安隱幢解脫門頌曰見聞同住不唐捐吸盡西江未足傳向若歎洋慚灌叟鐵圍山外有香泉那羅素國毗目瞿沙仙人無勝幢解脫頌曰摩頂執手東奔西走眨得眼來天長地久落花紅處象王回芳草緑時師子吼伊沙那聚落勝熱婆羅門無盡輪解脫頌曰刀山火聚足清安只是全身投入難拼得一條窮性命髑髏孔裏夜光寒師子奮迅城慈行童女般若波羅蜜普莊嚴門頌曰清淨法身牆壁瓦礫種種異門何莫何適欲知百萬陀羅尼好向莊嚴宮殿覓三眼國善見比丘隨順燈解脫門頌曰風和日暖魚尋餌楊柳桃花夾岸新多少長安美公子翩翩裘馬惜芳春名聞國河渚自在主童子一切工巧大神通智光明法門頌曰童子無聊聚沙為戲算來算去有名無義漚滅空無是一是二雖然恁麼舉揚不免眼中添刺海住大城具足優婆夷無盡福德藏解脫門頌曰一器幾何十界供普吞時脹殺人天吐時餓殺佛祖問取童女十千畢竟作何去取大興城明智居士隨意出生福德藏解脫門頌曰仰視虛空所須悉下分明各自帶來何故向他酬謝識破者點機關便解逢緣不借師子宮大城法寶髻長者無量福德寶藏解脫門頌曰奏樂燒香回向因十重樓閣報分明可憐歌舞場中客荒卻良田不肯耕藤根國普門城普眼長者令一切衆生普見諸佛歡喜法門頌曰知病識藥將錯就錯和合諸香無作為作只恐城東老母來不用許多間絡索多羅幢城無厭足王如幻解脫頌曰從古護生須是殺直教殺盡始安居慈悲瞋恚兩舌語暮四朝三撫群狙妙光城大光王大慈幢行頌曰曾母指疼曾參眉蹙非因天性相關只為一般皮肉才涉擬議思量不啻大唐天竺安住王都不動優婆夷求一切法無厭足三昧頌曰堂宇光明普耀霧變深山文豹自在平等總持不離音聲笑貌貪觀佛剎道場卻被浮雲籠罩無量都薩羅城遍行外道至一切處菩薩行頌曰小兒啼哭只因飢拈得饅頭當米餈一飽自然無病痛不勞他處別尋醫廣大國優鉢羅華長者調和香法頌曰長者如何慣鬻香不知誰處得真方天涯海角多知己莫歎孤零落異鄉樓閣大城婆施羅船師大悲幢行頌曰暴虎馮河吾不與長年柁手最知幾波斯到岸因風便采得明珠滿載歸可樂城無上勝長者至一切處修菩薩行清淨法門頌曰無依無作逞神通誰信鄉風處處同賣盡拙時留下巧蘆花依舊宿漁翁輸那國迦陵迦林城師子頻申比丘尼成就一切智解脫頌曰一有多種二無兩般衆會不迮園林不寬依正繞旋無量匝明星初涌夜更闌險難國寶莊嚴城婆須蜜多女離貪欲際解脫頌曰栴檀樹下足蚖蛇蓮花池畔蜂充塞曾向嵩山社裏來始知跌法從他得善度城鞞瑟胝羅居士不般涅槃際解脫頌曰一座栴檀佛塔信手隨身開闔見得三世分明也是空華雜沓明朝便是新年今夜且稱殘臘補怛洛迦山觀自在菩薩大悲行解脫門頌曰遙見連忙倡善來也知年老惜嬰孩待他立德揚名日始信而今滿面灰東方正趣菩薩普門速疾行解脫頌曰曾聞著靴水上立馬到長安靴未溼走遍虛空盡未來普賢毛裏高相揖墮羅鉢底城大天神雲網解脫頌曰長舒四手取海水洗面無端摸著觜借婆衫子拜婆年孤兒本是趙家子菩提場安住主地神不可壞智慧藏法門頌曰寶藏相隨宿善根勞他指示語溫溫分明福地生靈種幾個男兒解報恩迦毗羅城婆珊婆演底主夜神破一切衆生癡暗法光明解脫頌曰日沒西陲鳥宿林滿天星斗映江涔漁翁綸線垂將盡釣得金鱗大幾尋菩提場內普德淨光主夜神寂靜禪定樂普遊步解脫頌曰古鏡磨來徹體明山河國土炳然呈不因走遍天涯路豈信居家腳底輕菩提場右喜目觀察衆生主夜神大勢力普喜幢解脫頌曰未到酒家香十里開樽轉覺醉醺醺不知昔日耕耘苦便擬無錢賒幾斤普救衆生妙德主夜神普現一切世間調伏衆生解脫頌曰猛火何能燒得木木中出火自能燒眉間光照君看取火種傳來是幾朝寂靜音海主夜神念念出生廣大喜莊嚴解脫頌曰樹根依地果依空培得根深果實豐波利質多人不信諸天日夜挹香風守護一切城增長威力主夜神甚深自在妙音解脫頌曰洪鐘隨扣便隨鳴聲性何關四性生杜口也知非得已不堪重舉似群盲開敷一切樹華王夜神菩薩出生廣大喜光明解脫頌曰賢其賢而親其親樂其樂而利其利承流宣化不違時便是循良方正吏大願精進力救護一切衆生夜神教化衆生令生善根解脫頌曰摩尼現色元非色日影無來示去來夢裏墮河雖是妄一翻提起亦添哀嵐毗尼園妙德神菩薩於無量劫遍一切處示現受生自在解脫頌曰十種受生藏積年行貨帳討時沒分文算時有多樣直教除盡算盤珠十尺元來是一丈迦毗羅城釋女瞿波觀察菩薩三昧海解脫頌曰塵劫追隨非偶然染因緣是淨因緣鴛鴦帳裏調琴瑟喚醒寒鴉樹上眠佛母摩耶大願智幻解脫門頌曰無生無不生幻法元非法腹同世界寬身似浮雲杳調御天人師收來做一匣擬將普眼觀赤翳生眉睫正念天王女天主光無礙念清淨莊嚴解脫頌曰過去無邊事何勞更憶知只因生處熟熟處更難移迦毗羅城童子師遍友頌曰謬為人師尸位曠職問他法門推向子息若不勘破一錢不直善知衆藝童子菩薩字智頌曰天籟地籟休教錯會入得門來不妨在外會叶膾婆咺那城賢勝優婆夷無依處道場解脫頌曰有盡無盡無依有依道場三昧雲駛花飛沃田城堅固解脫長者無著念清淨莊嚴解脫頌曰既名無著何更勤求若言一串終成兩頭妙月長者淨智光明解脫頌曰宅有光明奚稱淨智雖不説明早相鈍置出生城無勝軍長者無盡相解脫頌曰見無量佛得無量藏問取善財是相非相法聚落最寂靜婆羅門誠願語解脫頌曰揭諦揭諦除冥抉翳足趾血乾胞胎落地妙意華門城德生童子有德童女幻住解脫頌曰海外青山雲外霓體中權實漫分枝同條生不同條死更問龍華調御師又頌果覺因心事不殊丁寧終始意無餘曾為浪子方憐客不是波斯莫獻珠海岸國大莊嚴園毗盧遮那莊嚴藏樓閣彌勒菩薩入三世一切境界不忘念智莊嚴藏解脫頌曰乾闥婆城鏡裏呈無邊色像倍分明去來彈指間家具未瞥徒勞瞪眼睛普門國蘇摩那城文殊師利遙伸右手按頂頌曰若來已更不來若見已更不見忽然摸著鼻頭端的高高在面又頌身經百戰定封疆遍界成平返故鄉馬上幾多驚險事不堪説向夜郎王如來座前普賢菩薩頌曰剎剎塵塵性本融非關作意顯神通阿誰身上無毛孔忍使伽瓶局太空善財菩薩一生圓滿頌曰歷代相傳舊祖基分明稚小被他欺京城府縣都曾訴土地城隍到處祈終訟總之非得已贏來那別有便宜愁人莫與無愁説説與無愁總不知全部總頌讀遍神農本草書根莖花果辨無餘採來件件都堪用看去般般總不殊必死袛應疾尚諱可生終賴藥相扶大黃能補參能瀉莫效庸醫守一隅大佛頂首楞嚴經二十五圓通頌三十一首并序一真亡影待七花八裂析栴檀衆聖失把鼻萬別千差歸渤海正令全提假饒茅屋牖邊鼠雀豈容穿過旁通一線任你含元殿裏庶民亦可往來所以道得之則黎奴白牯動地驚天失之則諸佛如來愁眉鎖目此大佛頂首楞嚴王三昧二十五圓通法門者聲聲毒鼓喪盡根塵識大命根法法醍醐灌醒空假中道血脈可謂通身是病通身藥是處有穴是處針縱令遁入膏肓難免耆婆妙手捻餅作團飢兒之啼哭可止鍊酥成酒猛光之痼疾堪醫且看木馬嘶風漫道泥牛入海觸著痛處自身有苦自身知掘得寶來大家有福大家享由是各系一頌以為利根鞭影云憍陳那於佛音聲悟明四諦頌曰鹿苑初陳門外車諸天餓鬼辨河沙東風一夜傳春信開盡黃梅嶺上花優波尼沙陀悟諸色性以從不淨頌曰傀儡登場怖偃師楚王一怒體分離目成從此無消息坐聽寒林啼子規香嚴童子觀香意銷頌曰幼婦初裝倚翠樓新郎曉起尚含羞無端召作征遼將向月胡笳起暮愁藥王藥上因味覺明頌曰嘗遍娑婆藥萬千箇中何味可延年神農牙齒都零落報道砒霜最直錢跋陀婆羅忽悟水因頌曰剝破虛空血迸流石人撫掌碧山頭春光甫見花成市一葉梧桐已到秋摩訶迦葉唯以空寂修於滅盡頌曰六塵變壞眼培花空寂徒傳月裏艖微笑至今贓證在太平天下事如麻阿那律陀樂見照明金剛三昧頌曰失目翻成有見照明奚似緣塵爍破大千世界豁開無漏真精心眼俱挂壁上桃花梅花笑人周利槃特伽調出入息得大無礙頌曰天地猶如橐籥不須一句伽陀生住異滅無性平沈佛國山河自從打失鼻孔爭説安那般那憍梵鉢提一味清淨心地法門頌曰有時醍醐毒藥有時毒味甘露袛因弄巧成拙不免將迷作悟喚出瓶裏大夫直教手指無措畢陵伽婆蹉純覺遺身頌曰泥裏果然有刺痛外何嘗見身虛空百雜粉碎白雲橫封渡津欲知不痛消息跛鱉盲龜較親須菩提曠劫知空頌曰芥子須彌畟塞何處轉身出息偶然解得藏機彈指幻成百億相隨樹倒藤枯笑破色空空色舍利弗心見發光頌曰九緣不借一靈孤更向金錍徹體刳戳瞎眼睛明箇事剎塵身土鏡中圖普賢菩薩心聞發明頌曰毛端剎海同簧鼓特地勞他白象王金翅食龍如食麵一般也是塞飢腸孫陀那難陀觀鼻端白頌曰苦瓠甜瓜一概拈更將無味白藤添縱饒洞照十方界鼻孔依然臉上尖富樓那彌多羅尼子因師子吼成阿羅漢頌曰義身較比文身切出楔何如用楔親野干昔年曾膽裂羺羊漫擬效顰呻優波離持戒修身頌曰持犯開遮三聚成式叉何法不圓明不龜手藥隨君用無作誰留凡聖情大目犍連心光發宣頌曰澄濁成清不較遲黃河入海正奔馳攜來淨器君須識莫負嵩山碧眼師烏芻瑟摩火光三昧頌曰一星便可燎須彌休把螢光問魯齊拈起稱錘渾是鐵空教積劫墜污池持地菩薩平地心開頌曰圓融絶待妙蓮華須是還他古作家馬後驢前無數客等間同駕白牛車月光童子修習水觀頌曰一滴源流徹底清無端猶被水當情髑髏枯盡全身露浸殺從來佛與生琉璃光法王子觀群動性頌曰與奪全機暗裏明啾啾千界器中聲春風吹散寒威後賸有梅花映水晶虛空藏菩薩觀察虛空無邊頌曰晦昧情忘空界銷毛端剎海境偏豪寶珠圓鏡間家具何物拈來價不高彌勒菩薩唯心識定頌曰繩上無蛇性自麻趣真斷妄轉紆斜風停波息澄如鏡處處清光映紫霞大勢至法王子念佛三昧頌曰服盡軒岐百草丸阿伽一味信神丹五宗八教橫羅列未死偷心孰肯餐觀世音菩薩從聞思修入三摩地頌曰酒病還須酒藥醫推門落臼正當時神通妙用尋常事莫使重栽眼上眉十方如來放光總印頌曰大地覓來純是藥耆婆空手挈籃回從今徹體光明藏始覺從前事可哀文殊師利選擇圓通頌曰海錯山肴難療飢文殊嚼飯喂嬰兒多門一路君看取人不和兮家道衰阿難大衆得大開示頌曰雷雨無私萬卉蘇故鄉他國路寧迂推開長夜山河枕病起精神也較臞性比丘尼成阿羅漢頌曰緩治本兮急治標無端芽種乍成焦鏡中半露娘生面今日方知行處遙頂光化佛重宣神咒頌曰萬種名香搗一丸胡言漢語最宜參頂光照破虛空也聽取前三與後三金剛藏王發願護持頌曰慈威折攝足良模同體悲心痛切膚滅度已知無可滅大家且把剎竿扶妙法蓮華經品頌三十三首并序花簇簇錦團團一塵不立赤條條淨裸裸萬法齊彰盡瞿曇四十九年老婆舌頭提掇不來憑列祖千七百箇生鐵掃帚打併不去除非摸著自己鼻梁方能踢倒從來窠臼荊棘林內慣解掉臂橫行潔白地中不妨轉身直過唯我天台智者禪師發妙悟於大蘇睹靈山於言下縱一旋陀羅尼力宣四不思議辨才究權實之攸歸闡本迹之深致玄義五重頂門打破髑髏寒文句四釋遍體針流毛孔血戳瞎講家肉眼爍開禪士幽關師弦震而飛走俱逃毒鼓撾而遠近皆喪特以圓音卓絶鈍識如盲義海汪洋葉舟欲蹶山僧不惜眉毛每品為拈一頌大似助桀為虐平地重添葛藤不會則拔楔抽釘會得則喪身失命法喻為名頌曰心佛衆生撥不開三玄三要事難猜一莖拈作金身用惹得頭陀笑滿腮實相為體頌曰函蓋乾坤未足奇四微原不隔根枝分明舉似諸方也又道如來袛自知一乘因果為宗頌曰衆流截斷事如何滴滴歸源不較多踏遍十方香水海靴頭幾處犯清波斷疑生信為用頌曰逐浪隨波最可憐明中有暗意偏玄毗嵐吹散雲千朵放出孤輪一夜圓無上醍醐為教相頌曰分明一樣牛身味轉變番番不借功飽食會須脾力健莫教傷卻小兒童序品第一頌曰白毫舒照半提時萬八東方蠟印泥擬向文殊辨端的重栽眼上兩莖眉且道作麼生是全提咄逢人切忌錯舉方便品第二頌曰頻伸出窟威風別象兔搏來同見血誰知昔日金剛王今日翻成繫驢橛譬喻品第三頌曰門外何勞覓大車錯將三界認為家火光燒爛虛空也誰解回頭叫阿爺信解品第四頌曰客作從來非賤人糞除未盡自迷津卻憐五十餘年別此日相逢覺倍親藥草喻品第五頌曰地雨何曾有二心根莖花果漫森森四微終始元無別莫向枝條大小尋授記品第六頌曰體露金風樹葉凋四人生死久同條禹門無數金鱗躍莫向澄波月影翹化城喻品第七頌曰塵點劫前曾服毒至今猶覺自麻木彈指歸來較是遲癡人還問西天竺西天竺化城寶所誰家屋錯認他方五百旬窮年竟歲空勞碌且問只今在什麼處咄看腳下錯錯五百弟子授記品第八頌曰成群作隊鍊飢寒衣裏明珠煞欲穿可惜而今醉臥客再逢親友是何年授學無學人記品第九頌曰大小都盧一網收蝦蟆猶欲竄前流饒他蟠結滄溟窟依舊還吞呂望鉤法師品第十頌曰大地從來依水輪高原穿鑿莫辭辛著衣坐臥尋常事還道如來是別人見寶塔品第十一頌曰古佛婆心事太多土田三變意如何雖然明得聲前句不免重添浪上波提婆達多品第十二頌曰碎身粉骨結成仇不是怨家不聚頭一粒寶珠光燦爛南方又起未來愁持品第十三頌曰此土他方波浪闊長年柁手精神別巨鼇一搭上鉤來傍岸猶憐風力掣安樂行品第十四頌曰護命靈丹只一丸身經百戰朔風寒明珠解髻親收得幻網光中夢未殘只今還有作夢者麼可憐大唐國裏盡惺惺地從地湧出品第十五頌曰慣作白拈難認覓一般手段兩般刀莫嫌子老父偏少馬腹驢胎知幾遭如來壽量品第十六頌曰莫言箇事無頭尾特地勞他數剎塵好藥但教諸子服病除始睹劫前春分別功德品第十七頌曰太空丈尺誰堪測鵬徙依稀九萬程昨夜眉毛偶飢急誤將華藏煮盈鐺隨喜功德品第十八頌曰摩尼雨寶正穰穰半世飢虛此夜忘莫怪城邊多旅夢幾人曾嗅返魂香法師功德品第十九頌曰無位真人六不收放光動地轉生愁離微語默間家具何處潮聲非海流常不輕菩薩品第二十頌曰惡水澆人罪不輕頓教平地死尸橫獨悲未入阿鼻者今日猶開鬼眼睛如來神力品第二十一頌曰掀天揭地欲何為箇事元無成與虧認取指音并舌相莫將黃葉誘嬰兒囑纍品第二十二頌曰年老情偏戀子孫幾人能得起家門殷勤記取靈山敕鏤骨銘肌報此恩藥王菩薩本事品第二十三頌曰然身然臂施中最妙法何嘗隔苦功歎息東施纍西子因噎廢飯還成風伶俐漢莫匆匆經王收入無縫塔萬別千差一路通妙音菩薩品第二十四頌曰十界宏經讚妙音色身普現去來今溈山五字深深意留與諸方作眼針觀世音菩薩普門品第二十五頌曰自從證得圓通常慣將生佛同叉聚藥珠身毒天鼓與樂會須先拔苦聲聲只叫觀世音何時識卻主中主要識主翁也不難路頭盡處須回武一番逗入無畏城不消更問雲門普陀羅尼品第二十六頌曰煙雨濛濛渡古村夜深杌影似人形天師一道靈符到彈指扶桑已浴溟妙莊嚴王本事品第二十七頌曰禍出私門實可哀破家亡國未稱災一回追憶山中日愧殺從前滿面灰普賢菩薩勸發品第二十八頌曰昨夜雷驚娑竭羅頓令雨點如車軸須臾浸沒梵王宮數滴空勞首羅目四法重敷萬古傳塵塵剎剎燈相續
