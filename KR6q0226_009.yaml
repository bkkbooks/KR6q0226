body:
  text: 法語四示曇生方丈境緣無好醜好醜起於心愚人除境不除心至人除心不除境心既除矣境豈實有達境本空便能素位而行不願乎外以所歷位無非無外之法界也知皆即法界自無入而不自得稍或未然則富貴能淫之貧賤能移夷狄患難能屈之矣孟子論素位而行則曰居天下之廣居立天下之正位行天下之大道其在吾門則曰入如來室坐如來座著如來衣要之皆不為物轉方能轉物也示智林大般若云三十二相無別因皆由持戒所得若不持戒尚不能得野干之身況復佛身大佛頂云因戒生定因定發慧則名三無漏學縱有多智禪定現前若不斷淫必落魔道若不斷殺必落神道若不斷偷必落邪道若不斷大妄語如刻糞為栴檀欲求香氣無有是處戒之關係大矣示旭生一切罪中疑罪為最一切功德信為其首信則不疑不疑則直下承當直下承當則不自暴棄不自暴棄則不敢暴棄人此常不輕所以通禮四衆速淨六根者也便恁麼信去譬如日出先照高山何俟四十年淘汰方入佛慧哉示明一達得一萬事畢一果何物哉設以事物為一事物且紛然不齊矣設離事物而別談一理理復安在若謂如空亦是物也非理也若謂非事非物亦非虛空不幾龜毛兔角乎故知真明一者事事物物何莫非一苟迷事物之源妄計別有一理此理亦事物影像而已計事物者一重虛妄別計事物影像為一理者乃妄重加妄謬之謬矣諸佛哀之特與道破曰妄想無性祖師悟之特與發明曰覓心了不可得此明一者之晨鐘也示屆遠一心三觀必以空為初門以無始妄認六塵緣影為自心相未有真知妄想無性者尤以戒為基人無遠慮必有近憂勿如火燒眉毛只圖眼下也示大觀登泰山而小天下觀海難為水此世閒大觀也反觀父母生身如海一漚起滅無從十方虛空生心內猶如片雲點太清裏此出世大觀也善財入普賢毛孔一念舉不可說步一步過不可說剎經剎塵劫不得毛孔中世界邊際一毛孔一切毛孔亦如是且道世閒邪出世閒邪大觀邪小觀邪咄逢人切忌錯舉偈曰大觀小觀剎海毛端兩箇五百元來一千恁麼會去畢竟可憐參示幽若十界差別無多差別也正因理體同了因解性同緣因業用同不同者幾希之一念耳一念背覺合塵法身般若解脫即苦惑業如暗觸寶傷皮破骨豈寶之罪哉但庶民去之耳一念背塵合覺苦惑業即法身般若解脫如善用寶四事豪適乃顯妙寶之功故曰君子存之顧念惟緣生豈有實法達緣生一念性空無體是謂真存總不離乎幾希者近是示石友念佛求生淨土乃一門圓攝百千法門非舉一廢百也但必一門深入念佛為正行餘一切戒定慧等為助正助合行如順風之舟更加板索疾到岸矣念佛之法雖多持名最為簡便持名之法亦多記數尤為穩當真操實履之士豈求異愚夫愚婦哉示無己無始來妄認有己何嘗有實己哉識得妄己本無則淨土不期生而自生淨戒不期持而自持此先悟後修之旨也或未頓悟亦不必作意求悟但專持淨戒求生淨土功深力到現前當來必悟無己之體悟無己即見佛即成佛矣示卓飛聿彼飛隼先卓然自立後奮然高鶱卓者可與立之謂飛者可與權之謂也吾門則先自利而後利他戒定慧三學是已三學具足不期喻人人已孚化動之以禮其身正不令而行也然尤以戒為初基持戒者非三衣一鉢之標榜錫杖皂襪之混淆也貴精明開遮持犯使性遮二業悉如冰霜然後六情不馳騁於六塵而念處可思修耳身受心法名處不淨苦無常無我等觀名念以念緣處即定之慧以處繫心即慧之定定慧具足方稱妙戒由此言之戒不惟初基復該究竟三乘七衆律儀隨一真修皆二利之具不必高掛菩薩比丘之名而後為尊勝也示止生心性照而常寂名止寂而常照名觀故稱性而修止觀全修在性非造作也末世不能通達文字被文字縛如癡狗吠聲才聞止觀二字便謂是工夫不是本體詎思離本體外那有工夫離工夫外那顯本體本體工夫不一不異寂照定慧何性何修況諦觀一念昏散之性畢竟是誰昏散則終日昏散而未嘗昏散者即終日圓覺而未嘗圓覺者也未嘗昏散而終日昏散者即未嘗圓覺而終日圓覺者也夫昏擾擾相與寂照違猶不離本體止觀可云非本體乎示恆素時人有二患一作輟有始無終二矯飾外美內弊然外美者誣世是尤足患也夫二既是患則恆與素真良藥矣亙古今而一如曰恆統十界惟實相曰素由素而恆此又入手最要之門一洗假宗假教假律之弊千古有一人知其解者旦暮遇之矣示見徹法法頭頭無非至道人見不徹耳今受根本五戒秖須住於戒中明見佛性五戒之體固是無作法身五戒之相一一無非法界慈良清直正見昭明念念圓滿無上功德奚必吹毛拈拂方稱向上哉示淨鄉四不壞信尤從戒始蓋昏塗寶炬示人以何路可行何路不可行何路超生脫死何路墮坑落塹凡發心起行親師取友擇法眼目看教指歸工夫要訣巨細精粗無不從學戒而辨故從上佛祖雖教觀有偏圓權實種種不同未有不以戒為初基以戒辨邪正者清淨明誨的是樂邦左券此信不可壞也示劉詣昭學道不難伶俐難於慎重發心不難勇鋭難於堅久涉世不難矯俗難於自持作事不難敏達難於深忍研義不難領解難於精確夫豪傑者聖賢之基址也聖賢者佛祖之階梯也不能為豪傑而能為聖賢吾所不信不能為聖賢而能為佛祖吾尤不信然真豪傑決不以豪傑自局真聖賢決不以聖賢自滿真佛祖豈復以佛祖自命哉示朗然世情淡一分佛法自有一分得力娑婆活計輕一分生西方便有一分穩當此事秪問心不必問知識也知識亦勸淡世情輕活計專修出要耳天平一頭低一頭必昂雖巧識強捻不得腰纏十萬貫騎鶴上揚州漢武秦皇不能扭作一句況下者乎示如白學道莫若專精有分嗜利智亦罕能詣法源底況中人哉吾人無始來於三界六道中何事不歷何藝不習獨不曾修四念處明四諦理證四果及四智耳已歷已習者無救生死奚勞更歷更習而脫苦法要茫未有得三年艾安得不從今日畜邪念處慧熟聖諦理明然後出真照俗游戲百千技藝非為分外若不向根本討線索饒法法專精力學學到百千萬劫術術巧妙仍是生死岸邊事一隨業轉旋歸廢忘豈非枉用心機思之擇之無俟朽人之苦誡矣示莫允臣世出世事莫不成於慈忍敗於忿躁故君子以慈育德以忍養情德育天地萬物皆歸我春風和氣之中情養乖戾妖孽皆消於光天化日之下然後以之自成則為淨滿自尊以之成物則為慈力悲仰儻一念瞋起百萬障生小不能忍大謀斯亂況今刀兵劫濁不過積恚所招世局土崩皆無遠慮所致士生斯世宜何如努力以障狂瀾也示朝徹佛法中行佛法非難也世法中行佛法乃為難事又佛法仍不壞世法名難中之難然第患認佛法不真不親切耳世法佛法何嘗不同一緣起哉讀世主妙嚴品及入法界品可悟如來境界矣示雪林學道與學好不同學好秪得世閒虛名學道貴得出世實益學好只顧眼前局面學道須明塵劫遠猷塵劫遠猷不離眼前而戀卻眼前頓昧塵劫惟達士直觀眼前一剎那性非生滅無去來了不可得安有身世自他可拘可戀然後觀同體積迷興無緣弘誓苟不足自利利他者舉世趨之弗屑為果能自利利他世共非之弗敢怨是謂學道亦真學好者矣示王亦含修身以俟不計近功此造命之術也惟後天而奉天時始先天而天弗違小水長流則能穿石鑽木未熱火難可得是以學道不難一時勇猛難永久弗替觀世音菩薩求男得男如因病求得仙丹兼得輕身遐舉吾願居士因求子而力行衆善惟廣惟大愈久愈堅則證入一子地視法界衆生皆是吾子振振麟趾不待卜而可必矣示六度衆生無始來不知一切惟心妄計六塵緣影為自心相故佛頂約七處徵之中論約四性推之智者約四運觀之無非破緣影妄計而已但不執緣影則現前介爾一念本自離過絶非清淨周遍百界千如海印炳現矣欲破緣影妄執或就七處遍徵或就四性橫簡或就四運豎破皆可隨病服藥法無一定思而修之存乎其人示養德學道之人骨宜剛氣宜柔志宜大膽宜小心宜虛言宜實慧宜增福宜惜慮宜遠思宜近事上宜虔接下宜謙處同輩宜退讓得意勿恣意奢侈失意勿抑鬱失措作福莫如惜福悔過莫如寡過應念身世苦空切莫隨流逐隊衣取蔽形莫貪齊整食取克餒莫嗜美味嘗省此世前生作何功行可坐享檀施十二時恆簡點身口意業善多邪惡多邪無記多邪堪消四事邪不堪邪如此慚愧覺悟修省自然習氣漸消智光漸露祖意佛意顯於一念清淨心中矣示豫正研真窮妄名之為學蓋能深造自得則左右逢其源故愈博而愈約否則愈博愈無頭緒去道亦愈遠矣古人發心出家必矢志參學由痛念生死事大無常迅速此身不向今生度更向何生度此身所以三登九上百城煙水不憚其勞念念了當大事豈肯著相計名尋行數墨附葉攀枝以徒資口耳哉末世不然名為欲續如來慧命撐如來法門而不知痛為生死惟積學問廣見聞冀可登座揮麈而已嗟嗟不與菩提大心相應云代佛揚化吾不信也不與為生死心相應云大菩提心尤不信也勝負情見不忘僅成阿修羅法界名利眷屬意念不忘僅成三塗魔羅種子隨其所見所聞而起法執不能捨棄名言習氣不達如來說法旨趣不知種種四悉因緣僅成凡外戲論窠窟學問益多害心益甚學人益盛正法益衰吾所以每一念及未嘗不夢寐痛哭者也示庸菴千里之行始於一步一步未足不名到家謂千里只一步可也謂一步即千里可乎夫以佛道為千里者戒是最初一步從此至成佛總不出此一步而決不容守而不進蓋進則此一步念念保全止則此一步當下衰息然進步之法不過捨無始故步故步各有偏滯而最障道莫若瞋慢一念瞋心起百萬障門開慢如高山法水不停又非理瞋粗而易除執理瞋細而難斷慢過慢顯而易見增上慢卑劣慢隱而難知知所難知斷所難斷是謂能離退緣矣示明西出三界火宅有橫豎兩塗以自力斷惑超生死者名豎出三界事難功漸以佛力接引生西方者名橫超三界事易功頓遠祖云功高易進念佛為先經云末世億億人修行罕一成道惟依念佛可得度脫如趁船渡海不勞功力夫能篤信西方捷徑至誠發願一心念佛求往生者真大丈夫矣儻信不真願不切行不力佛雖大慈為舟如衆生不肯登舟何哉示謝在之吾人現前一念心性過去無始未來無終現在無際覓之了不可得而不可謂無應用千變萬化而不可謂有三世諸佛一切衆生從無二體十方虛空剎塵差別皆吾心所現之相分耳是故四種淨土皆不在心外乃名唯心謂極樂不即唯心則西方豈在心外而吾心豈局東方者哉人謂諸有為法皆如夢幻不知心性不可喚作有為不可喚作無為因迷故即無為成有為有三界輪回因果喻如夢幻泡影露電若返迷歸悟則又即有為成無為如夢得醒幻復本泡歸水影歸質露不異溼性電不異常光今念佛求生淨土正返迷歸悟至圓至頓概以夢幻掃之可乎哉今人於夢幻妻子家緣不能當下割捨夢幻功名富貴不能當下遠離夢幻苦樂寒暑不能當下覷破乃至夢幻詩文機鋒轉語不能當下唾棄獨於夢幻西方則不求生亦大惑矣夫依對待而論娑婆活計添夢者也求生淨土醒夢者也不可不求生也依絶待而論惑業感於三界惡夢也念佛生於淨土好夢也亦不可不求生也惑者又曰當下即是淨土何必西方問曰當下即飽暖何必喫飯穿衣當下即富貴何必貨殖科甲當下是學問何必讀書當下是帝京何必北上既世閒法毫不可廢何獨於出世法而廢之苟深思此理淨土之生萬牛莫挽矣天如大祖師云悟後不願往生敢保老兄未悟釋迦復起不易斯言示眉慧學道貴有品格有識量而文字記問不與焉有品格無識量不足曠超千古猶無品格也有識量無品格不足砥柱中流猶無識量也品格識量既具則不被眼前活計所局時流習氣所遷縱鈍若般陀而拂塵除垢四字義熟便堪證沙門果發無礙辨況本解文義者哉嗚呼法門之衰至今日不忍言矣剝必復否必泰若要梅花香撲鼻還他徹骨一番寒豪傑之士宜何如動心忍性以無負己靈也示不岐十方如來一門超出妙莊嚴路不過了妄想無性悟常住真心性淨明體而已欲悟真性貴直心正念真如欲作真如實觀先修惟心識觀強觀諸法無實惟心所現則心外無法次觀心無心相覓之了不可得則法外無心既心法兩亡能所性絶不謂之真如實觀不可得矣設不正念真如妄計有心有法有能有所則自生岐隔墮委曲相只此委曲亦無別體元攬真如為體如狂花以空為體波浪以水為體故曰此想不真知想不真則不隨虛妄生死相續而佛祖傳授心法極盡於此以此心法往印千經萬論列祖公案不啻閉門造車出門合轍若不向此門打徹別商學問工夫總之多岐亡羊非大佛頂首楞嚴三昧欲修三昧尤須事理並進顯密互資除助因刳正性違現業誓於現生取辦可也示爾介介爾有心三千具足此圓人稱性而觀稱性而悟彈指超無學一路涅槃門也今有志之士不能一超直入者秪由妄認六塵緣影為自心相不肯直下諦觀介爾之心本自了不可得故也如肯直觀則知心無心相既不認緣影為心則虛空山河大地咸吾介爾心中所現物矣能緣既無所緣安有一空一切空而非斷滅所現窮互能現亦然一假一切假而皆如幻不可以空名不可以假名強名為中中亦不在空假之外空假無體全以中道為體言空則三千悉空言假則三千並假言中則三千並中故得互互具足無缺無餘如此則一塵中剖出大千經卷有何正像末之可分別此則不唯為佛祖出氣亦可為豫一洗句讀先生之恥矣示夏藎臣聖賢固不擇地不擇時生然往往生於山谷亂世者蓮出汙泥珠生濁水非苟然也蓮在泥泥不能染珠在濁濁不能混聖賢之在山谷亂世山谷豈能局之亂世豈能易之夫山谷不能局亂世不能易者寧唯聖賢有之聖賢能勿喪耳堯舜心法不過危微二字操則存捨則亡伯玉寡過未能子路聞過則喜孔子五十學易文王望道未見皆危微心印也是故不以求放心為學問而徒事口耳異乎聖賢所謂學問矣顧心是何物云何名放云何而求若放則馳散六合求則還歸一腔此緣影耳風大耳過去未來現在心不可得設有可得與雞犬同是一物而心豈一物哉真求放心者必須覓心了不可得惟心了不可得方知天地日月山河國土皆妙明心中所現物亦無能現所現之分是謂天下歸仁是謂明明德於天下是謂山谷所不能局亂世所不能易故陸象山云東南西北海有聖人出焉此心此理同也悟此決不更問天地何所窮際以心外無天地天地止是心之相分耳楞嚴云十方虛空生汝心內猶如片雲點太清裏況諸世界在虛空邪知此則儒與佛均不足以名之一任名儒與佛無所不可努力求焉示蔡二白天地萬物皆有始終有形象有方隅有分劑唯心識無始終形象方隅分劑故曰覓心了不可得心了不可得而天地萬物無一不唯心矣然我法二執不破則唯心唯識之理不彰心識之理未明則因果感應之妙不能如指諸掌故華嚴云應觀法界性一切唯心造觀經云深信因果不謗大乘夫心猶金也十法界因果猶種種莊嚴器具也然天下容有不造器之頑金斷無不造十法界之頑心縱一念不生仍造成無想外道矣故大智慧人深悟唯心必勤念佛所謂是心作佛是心是佛此唯二白居士可承當之示李剖籓善學聖人之道貴得其神不可泥其跡神也者妙萬物而為言者也故曰聖而不可知之之謂神然神豈迥在跡外哉特不泥於跡耳不泥跡故堯舜揖讓湯武征誅武周治世夷齊高隱比干諫死微箕奴去孔不俟駕孟不可召泰伯斷髮文身曾子啓足啓手禹稷過門不入顏子簞瓢陋巷不唯並行不悖亦可易地皆然如以跡而已矣則子莫執中不幾濫大舜之用中乎嗟乎盈天地閒凡可睹聞何莫非跡惟視之而弗見聽之而弗聞者乃為神而求道者往往局視聽所及鮮能求於不睹不聞之真源其何以當吾世而見知越百世而聞知故曰顏子沒而聖學亡良足悲已顧聖學雖亡有不可亡者特患仁者見之謂之仁智者見之謂之智百姓日用而不知耳王陽明奮二千年後居夷三載頓悟良知一洗漢宋諸儒陋習直接孔顏心學之傳豫年二十時所悟與陽明同但陽明境上鍊得力大而用廣豫看書時解得力微而用弱由此悟門方得為佛法階漸今於佛法所窺較昔所悟猶海若之於河伯而佛法海中尚未盡一滴之量道之無窮其致若此儻不剖開人世籓籬何由到此海闊天空境界孔子答善人之道謂不踐跡又云善人吾不得而見甚矣不踐跡之難也下學而上達斯不踐跡而入室者乎上達為君子下達為小人汝為君子儒毋為小人儒當知四科六藝皆跡而三綱五常亦跡也天地日月兩儀太極無非跡也皆形而下者也神而明之存乎其人形而上者乃謂之道中人以上可以語上非剖籓是望而誰望示石耕佛法之盛衰由儒學之隆替儒之德業學問實佛之命脈骨髓故在世為真儒者出世乃為真佛以真儒心行而學佛則不學世之假佛何謂假佛立門庭尚施設取悅耳目不究極於心源以衣鉢為持律消文貼句為演教機鋒偈頌為禪宗名利存懷偷心見刺魔王長歡大聖永歎壞周室者齊桓晉文耳何謂真佛破我法二執觀二空真如自見其過憫他犯過舉心動念舉足動步皆為自出生死成菩提亦令衆生同出生死成菩提是故持律則開遮持犯洞了分明性業遮業誓求清淨閲教則辨體明宗識用知相若權若實深達指歸參禪則截斷偷心直明本性識取綱宗不存軌則雖三學圓明仍能不知不慍決不炫玉求售決不執己律人惟隨順物宜應病與藥漚和般若雙照並行斯乃不負堂堂僧相堪稱出世丈夫佛恩既報則宣聖之恩君父檀信之恩亦報矣示語幻法門之衰已非一日而致衰之故由因地不真今人發心參學罔不以扶持法門為志及察其所謂扶持者不過曰開叢林建梵剎攢指五千一萬災梨殺青無虛日嗣子皆才華名世美丰神座下戒子鉢杖圍繞數十匝剃度徒衆環里市而處如錯星乃至紫綬金魚乘高車肥馬往來山林閒絡繹不絶而已故下手時便從世諦流布中著眼便向門庭施設處安排而佛祖真命脈遂為此等人埋沒殆盡五霸者三王之罪人諒哉何謂佛祖真命脈破我相蕩法執剋除習氣涕唾利名時自簡點過失決不一言一事欺心師正法不師像法學古人不學時人自己死盡偷心然後能死學人偷心自己透盡佛祖心奧亦不輕以佛祖心奧強示於人何故中人以上可以語上中人以下不可語上不憤不啓不悱不發民可使由之遁世不見知而不悔如釋尊之脫珍御敝能為下劣忍於斯事四十餘年久默斯要不務速說凡佛祖聖賢出世止循循誘衆生非賣自己風光何須汲汲炫其所長惟恐門庭或卑名位之或下邪才有一念爭門庭分高下心便是生死根本以此撐持則法門日陋直至不可復救而後已痛哉痛哉豫於此夢寐永泣無可輕與言者法友或能信此為一拈之示聖可千經萬論求之語言文字則轉多轉遠求之現前一念則愈約愈親蓋一切經論不過現前一念心之注腳非心性外別有佛祖道理也然心性難明故藉千經萬論互相發明今捨現前心性而泛求經論不啻迷頭認影矣真明心性者知經論是明心性之要訣必不棄捨但看時知無一文一字不是指點此理就所指處直下從身心理會清楚如破我法二執的的破盡不留分毫辨種現根隨則使自心種現根隨歷如指掌不使家賊作祟是謂不離文字而得觀照不作文字解不作道理解便是真參實究不論年月生劫將三藏十二部都盧作一話頭看來看去人一能之己百之人十能之己千之看到牛皮穿破眼睛突出忽然無心契悟方知與麻三斤乾矢橛同是敲門方便那時若不透盡千七百公案不攝盡十方三世一切佛法無有是處示證心證心大德問心要於豫豫曰心要莫若念佛壽昌云念佛心即是佛蓋現前一念之心無性緣生緣生無性者也惟其無性緣生故念名滿腔是名念利滿腔是利乃至晝所為夜所夢無不趨歸於一念之專注而十界升沈從此出矣惟其緣生無性故熾然造集善惡之時驀地放下則一切法了不可得然設向此了不可得處坐定則墮無為深坑不能證法界無障礙體不能起法界無障礙用故須念佛求生淨土方是大乘不可思議圓頓法門夫念佛者豈有他哉以此緣生無性之一念念彼無性緣生之佛名耳佛名既是無性緣生則緣生亦仍無性是故念一聲有一聲佛名顯現念十百千萬聲有十百千萬佛名顯現而不念時便寂然矣念性既是緣生無性則無性不礙緣生儻不念佛正恐又生種種雜念縱不生雜念亦恐墮在無生窠臼故必以佛號生我之念使我念念不離佛號此乃心外無佛佛外無心是心作佛是心是佛謂之以佛證心可也謂之以心證佛可也謂之以佛證佛以心證心亦可也至直捷穩當至圓頓了義不可思議不可將餘一切法門比量果如此信得及直下念去則諸佛出廣長舌相以證之若人專念彌陀佛號曰無上深妙禪至心想像見佛時即是不生不滅法金口誠言可不信哉示靈奕壽者福之本也福者慧之基也念念思警策者慧之萌而福與壽之源也故曰常想病時則塵心漸滅常想死時則道念自生夫病死正現前時有何我相可恃五欲可貪有何名可戀古董之可攜去不恃我相我見伏矣不貪五欲煩惱降矣不戀虛名體面可放下矣知古董之不可攜去則不越分以求之縱先有者亦可捨之以作福矣苟能離我我所見執煩惱則視緇素靈蠢無一非未來佛既所見無非未來佛則凡可以供養恭敬未來佛者無弗為也凡可以損惱忤觸未來佛者無弗止也如此而福不增壽不永蕅益舌當墮落儻不能一切時念未來佛則不能一切時積集福慧福慧不積雖僥幸活至百年亦終與草木同腐而已示講堂大衆并注一切通指八心王五十一心所相分皆是心影喻如鏡像一切見分皆是心光喻如鏡明一切自證分皆是心體喻如鏡質一切證自證分皆是心性喻如鏡銅此四並是依他起性光影妄則體性亦妄此妄含兩重義一若於光影計有實我實法則為遍計所執性既執光影為我法則并體性亦為我法是四分皆成遍計也二雖不妄計我法猶見光影二分之異不了唯是一心則墮依他起性不惟光影是依他并體性亦是依他所以四分皆為依他性也體性真則光影亦真此真不是離依他四分而別有真秪達得光之與影實非有二惟是一心云何於中有是非是則不但體性即圓成實而光影亦圓成實故四分無非圓成實性也譬如計繩為蛇則麻亦成蛇亦如計鏡像為實人既迷依他之相必迷圓成之體了繩即麻則蛇亦是麻亦如了像與明總只是鏡既悟依他非有自知遍計本空是故見蛇者不見繩與麻此喻一切凡夫外道是謂一遍計一切遍計十界皆為所遍計境而非無繩非不即麻也可見遍計不離依圓故空觀但空遍計而依圓元不可空縱除滅三性入三無性乃名一空一切空亦只是除其定有三性之執仍但空彼依圓上之遍計執情耳見繩者不計蛇亦不見麻此喻三乘權智是謂一依他一切依他十界無非依他起性而未嘗不即麻亦未嘗礙彼癡者之計蛇也可見依他亦不離遍圓故假觀但立依他而遍計無可立圓成不須立縱成立三性緣起乃名一假一切假亦只是約悟名圓成約迷名遍計仍但發明三性無非依他起耳見麻者了知非蛇亦非繩此喻圓人實慧是謂一圓成一切圓成十界無非圓成實性而不礙愚者之計實繩實蛇也計實繩是三乘愚計實蛇是凡外愚可見圓成亦不離遍依故中觀但顯圓成而遍依元無可顯縱圓統三性乃名一中一切中亦只顯彼遍依無體體即圓成仍但顯彼遍依統一圓成實性耳但能如是觀察自心境界一切境界皆惟心現皆即是心故名自心境界不著語言文字聖賢造論隨意取譬以曉蒙童原無死法且如鏡可譬於依他四分亦可加一認有實人而譬三性謂鏡即圓成實性像即依他起性愚小無知計有實人即遍計執性也又如繩可譬於迷悟三性亦可除卻妄計為蛇而譬四分謂繩二股可譬見相二分麻可譬自證分四微可譬證自證分也以喻通喻理最易明若死死執定不知變通是謂依文解義三世佛冤矣亦不背語言文字華嚴偈云文隨於義義隨文古人云離經一字即同魔說則若宗若教一以貫之矣又復應知衆生起過只由見相二分決不由自證及證自證分以內二分終日在妄終日恆真且衆生日用不知無由起過故相宗明其皆是現量皆是挾帶只因舉體成用用既依他體必同成依他故四分皆屬依他不許單立見相為依他性以用外別無體故若了知全用即體則體既圓成用亦當下圓成故四分皆即圓成不許單立內之二分為圓成實以體外別無用故今人不達若執四分皆是依他於四分之外別立圓成實性而云真如與一切法不一不異是猶捨彼已成繩之麻而別求未成繩之麻與繩相對乃云不一不異也但不一耳豈真不異也哉嗚呼毫釐有差天地懸隔不變隨緣隨緣不變之旨幾為蝕書蠹魚之見所亂吾安能已於辨也
