body:
  text: 古歙門人成時編輯詩偈一將出家與叔氏言別世變不可測此心千古然無限他山意丁寧不在言一筆句湛海浮漚起滅無端何日休目瞖空花有瞖盡花存否嗏莫更往迷流酸辛獨受知妄無因當體元如舊因此把世界身心一筆句乙丑翻一筆句海湛漚浮本自無端豈更休目瞖花非有瞖盡花亡否嗏及早悟真流安然正受知幻即離那有新和舊把甚麼世界身心一筆句結制婁然一缽別無能沒伎尋常粥飯僧結夏豈甘違佛制譚經元不落聲塵钁頭青嶂堪埋骨鏡面霜莖未有憑預恣同仁相策勵不須門外設三乘解制結制暑方盛解制涼風作倏忽淹九旬光華易殂落田禾青漸黃河水流且涸緬想日用中猶是倚與託偃月譚了義幽室病為藥安居竟何益況復將行腳他山雖入夢只恐原如昨丙寅季夏先慈捐世賦四念處以寫哀恩愛迷情四大緣生妄有身膿血交相潤臭穢常無盡嗏饒你會莊矜畫囊盛糞一旦神離不復堪親近切莫把未爛骷髏認作真觀身不淨妄想驅馳吸攬前塵作所依業感原無意苦樂隨因異嗏苦果實堪悲酸辛難比世樂雖榮享盡愁還至切莫把五欲塵勞枉自迷觀受是苦迷卻真常緣氣紛紜集一腔離彼前塵相分別成何狀嗏饒你會思量終歸罔象過未無蹤現在原長往切莫把流注心機作主張觀心無常藏性周圓循業隨心法法全和合因緣舛戲論須排遣嗏外道枉糾纏盲無慧眼妙有真空覓我同陽燄切莫把十界依他作本然觀法無我解制自弔示諸友舊年結夏彭水濱今年結夏姑蘇城舊年解制母尚在今年解制徒傷情出世大孝未有當嗚呼今且為窮氓剋期取果昔何狡四載有餘徒自撓忽忽不念死將至辜負吾衣色用皂清霄每自呻腸轉向誰陳名聞利養自昔不常在袈裟一失千古萬古終沈淪戊辰春刺舌端血留別諸友八偈之二教觀功難剋橫超念最賢一聲佛號處已侍世尊前參究雖云頓嗟今倍復難小安成大妄何似用金磚壽兄得廣參博訪鬮賦贈覺皇時已邁含識方遺本執教逞空譚依禪思多瞞正法遺繁憂疇作自心懣有懷惺谷壽與我同所忖我以千古交搜精用補袞君以百城歷取益開群忳兩塗各馳騁厥旨適非遠知君飲法流終不猶河鼴願君有日益我願能日損和歸一籌兄破家蕩產英雄事閨閣微貲婦寺憐縱博萬場今日始一塵便可注三千惺谷壽得出家鬮將往博山薙髮二首昔年相識五雲閒何似今朝契更專其過訟應深激勵他山石不習柔便春回頓改殘冬色雪積逾增翠竹妍從此共袪寒氣盡悠悠舜日與堯天去年愛我亦芬芳獨善為懷兌可商破格一朝誠不易匡扶千古豈尋常芒鞋破處腳跟穩拄杖回時手眼良寄語守株門下客同將祖道苦茗嘗次惠安法林凋謝不能春黃葉秋風嗌愈臻圓頂方袍雖遍界忘身為法果誰人曹溪行呈無異禪師有序不肖旭初信佛法聞有等假稱悟道誑惑世人甚傷之讀博山警語竊喜正法猶在私謂一種良方耳後見山中禪客惟一句死話頭不為優免牌便為繫驢橛入理處尚不可得況向上一著不住於理者邪邇年狂罔往往有謗博山者方疑必有不同流俗處故感惡言供養訪於惺谷谷曰不能如大醫王善療眾病而破癰拔毒一科所專精也不能如主兵臣盡征不服而搜奸察偽守關老吏也於是匍匐參請方知大師乘大願具大力運大悲擴大量果與諸方不同藐予小子以禪治惑以律扶衰雖一刀直入不能為嫡骨之兒而三學相階亦可作白茅之藉況與惺谷壽交於師有伯父誼敬賦俚言法王示寂朝日冥眾聖不住暮拂電狐涎猩臭濺九州獅猊喘息僅如線此時不有至人弔孰與群生摧怨敵吾師愍此乘願來直飲曹溪源一滴一滴沾腹徹骨康出窟嚬呻增威力四望高吼聲未極百獸踜𨄇驚避匿堪嗟野干詐相親拾取餘殘誑他國自慚不具超方眼以耳為目寧相識今日相逢非偶然嗣法無緣聊嗣德願將一滴曹溪源衍作百千大海淢願將法海百千流匯作曹溪源莫測九陛能令簾幙高三宗莫作鼎足勒藐爾予懷庶可舒從茲共作能仁翊贈壁如兄掩關用博山原韻蕭然一室勝嵩山覷破禪機只等閒但莫將心擬牆壁去來何處不長安贈戒珠有序戒珠禪兄鳳陽天長馬氏子刲股救父剖肝救母迨二尊謝世遂薙染願入予淨社拈此毘尼禪觀互莊嚴攜手同歸極樂天贏得孝思為行本戒珠朗握照三千攝山身棲碧霞外目攝亂山峰最是關情事江帆萬里風贈澹居大德血書華嚴經萬滴書成法界經十王滴滴放光明南詢末後一句子不墮狂禪鼠唧鳴警邃徵日照紙窗明驀然起悲思但有好順人曾無剛烈志猶如彼癡蠅只向窗前滯不肯猛回頭云何得出世淨土偈十四首有序博山禪師拈淨土偈每云淨心即是西方土蓋以因攝果也讀者不達遂至以理奪事幾成破法予觸耳感懷每拈西方即是唯心土俾以事扶理聊附補偏救獘之職云西方即是唯心土無上深禪不用參佛向念中全體露更生疑慮太癡憨西方即是唯心土離土譚心實倒顛念念總皆歸佛海生盲重覓祖師禪西方即是唯心土得見彌陀始悟心寸土不存非斷滅堂堂相好寂光身西方即是唯心土欲悟惟心但念西舌相廣長專為此更求玄妙抑何癡西方即是唯心土無相非從相外求擬欲將心取無相靈龜曳尾轉堪憂西方即是唯心土未識西方豈識心逝子謬希圓頓解拾將落葉作黃金西方即是唯心土更覓唯心見已違光影揣摩成活計蓮邦何日薄言歸西方即是唯心土擬撥西方理便乖極樂一塵同剎海假饒天眼未知涯西方即是唯心土趁到同居第一關但得九蓮能托質寂光何慮不時還西方即是唯心土土淨方知心體空一切境風猶挂念云何妄說任西東西方即是唯心土莫把唯心旨趣誣迷悟去來元藏性謾言平等卻成迂西方即是唯心土白蕅池開不用栽一念頓教歸佛海何勞少室與天台西方即是唯心土三昧中王道最微瞥爾生疑千古隔咬釘嚼鐵莫依違西方即是唯心土慧日高懸第一機事理雙融真淨業現前何法不玄微和不我每歎宗乘事已非盲修瞎鍊欲何為知君獨具超方眼枯木巖前路豈迷示智恆字鑑如鑑徹真如體元光本自恆瞥生明覺妄幻作寂空塵了了元無物方宜拂拭勤秀能親切旨會得不須分示用恆薙髮明心好向三皈始立志還從五戒先勤苦不辭成福聚誦持無闕悟靈源示寶所著有落人天著空墮三惡惟有西方土超出有無縛熾然求往生莫復存疑想介爾纔躊踟偏邪見日長思量分別法謗於真智慧永劫沈深坑諸佛無能濟種麥少蹋土亦勿乘空取中行踐實地疾得到寶所過檇李東塔見人上堂有感二首樹杪聲聲泣露哀岸舟魚背漫相猜宗乘頓逐東流下觸目難禁淚滿腮一滴狐涎徹體腥當陽鴉立法王庭卻慚普眼能弘護猶使天人掩耳聽聾人聽曲啞人歌跛躄相將共伐柯今日已成冥暗界不知向後又如何己巳再閱律藏示歸一諸兄二偈歲晚寒方盛安居藉道暉愛逾冬月日箴比佩弦韋顧命宜頻想時艱願早揮此緣良不易幸勿更依違自愧非堅質匡扶賴友朋感茲英俊士甘作劣庸憑皈命猶嫌晚忘身亦所應服勤函丈內佇望雅相矜贈參己盡大地是箇自己彌陀亦在裏許安身盡法界不出彌陀一毛孔光明自己更向何處著腳念念彌陀念念己自他不隔是真參若從少室求端的鈍置己靈深可憐故今參己無別事六時長憶紫金仙贈若雲盡說乘為急誰知戒不迂缶缾難貯乳魚目豈成珠剎海遵遺教朝宗向樂都淨因期共勗力挽末時趨警壽兄蝨多不癢債多不愁世人昧昧何足與儔一芥翳天一塵覆地最要防閑學人習氣未預法流止名乾慧開眼尿床倍堪慚愧欲臻二利須慎細德輪翼不虧高遠無失割股救惺谷兄幻緣和合受茲身欲剜千瘡愧未能爪許薄皮聊奉供用酬嚴憚切磋恩荅初平發願偈有願無行如人無足有行無願如盲無導信步前行嶮惡難保丁茲末季法弱魔強縱有乾慧猶難穩足況雖立志慧眼未開今生不度更待何生阿彌陀佛大願深慈如母憶子子何弗思若不至心早暮回向悠悠緩縱即逃逝人非必訶謗乃名逃逝汝今已能奮然自新當知珍池斯萌蓮蕊從今數發相續不斷斯可名為勇猛丈夫如或未然仍前習氣始勤終惰口向心背既非菩薩亦非二乘常在三界出沒輪迴自未能度云何度人如被漂者欲拯岸行如癩病者賣瘡癬藥愚癡顛倒舉世所嗤汝既發心我深隨喜復為勸助使得堅忍同覲慈尊共化塵剎盡未來際永矢弗諼願汝精勤先成佛道我作文殊助汝揚化示初平發心莫謂菩提心難發屠刀放下立成佛莫謂菩提心易發杯水豈停鼎內沸欲明曠劫大因緣先把生平懷抱拂眼前活計若關情本地風光終受屈勸君速發難發心為仁由己非由物聞謗所言若有實三根何名謗所言若無實不干亦豈謗若以語言為謗事後字未出前音沒若以文書為謗事白者是紙黑是墨謗安在云何忸四大空蘊非我誰能謗謗誰受既無瞋憾應發悲心我由無始迷本覺幻業積怨成稠林是故今日惡口加皆因往昔自業侵又復修道未精磪威德尟劣致群疑若不慚愧自克治損彼損己罪所基我因謗增智斷謗者速圓恩德恩圓即是如來智斷德滿成佛謗為明鏡戚我醜謗為甘露飲我藥謗是炎時清涼風謗是睡時大鼓角謗為法界趣不過謗謗共登無上覺輓惺谷壽兄徹底婆心未肯休當場業運已遷流浮漚影逐虛緣散熱血腥同實際留射目果然難下手為人須是再低頭臨行贈汝無多子一句彌陀作大舟示存朴欲作法王臣是玉善自養止惡無刑懲行善無穀獎三業並緣慈四儀恆勿爽戒為勝瓔珞忍是堅鎧仗習氣漸漸消定慧油油長捨卻片時謀方獲剎塵讜彈指非昔人速出娑婆網示諸四完丈夫志氣在千秋自立從容貴學優斯語直教言下信浮雲豈向世閒求山河國土空中影事業功名水上漚觸著儒童聲慟處蓮華寶地共遨遊示涵宏欲求出世慧先斷世閒愚身界元非實根塵性本無聞思宜自勗名利不堪娛念莫馳情境躬恆慎所趨三歸知究竟十戒握機樞和忍成心德精勤作勝謨持經神在定憶佛智能孚曳轉從前履超登最上衢警初平末劫修行少成多殆慎勿師心硬作主宰觀色察言如臨如在謙恭牧己毋思露彩但省我非不念人罪八喻銘心恆觀法海虛矯未除真味斯餒山中三首幻境冥無定菩提志自堅已知身世累寧被利名遷宴寂箋書後譚經受食前懶從商四事一缽是良田不問人閒世惟參第一天諦從觀境發火必指薪傳未識兼山艮徒勞夕惕乾塵緣能頓謝正法可全肩麗澤功非細膏肓亦可痊名言醒渴夢快論入深禪步履宗先哲規繩啟後賢摩尼奚足羨戒月燭三千哭慧濟示權律主永歎毘尼苑於今久已荒開遮誰實諳輕重幾曾商既切橫流痛恆歌如玉章天傾扶律者誰與共譚常托缽有懷同盟有四士二友已馳西獨賴伯與仲相期提且撕慧基欣不遠玄德憾猶暌末後未明句何時共醒迷卜居十八事有序順歸師雅癖奉大士慈命誅茅西湖不敢自暴棄隨事拈一偈一般從地發肥瘠為誰殊信手和根取僧前翠滿盂摘蔬油必先時用鹽宜熟後加何須覓香料火到味能奢烹菜黃粱冷水下白粲沸湯應切忌無端動氤氳任運騰作飯五沸占湯候三投驗適時從來清逸味不許醉翁知點茶散專恆順勢文武亦隨機析盡薪窮際灰從何處飛然火幾人新舊位碗缽數分明只恐堂中客貪嘗不溼羹行堂滌器先除滓無令餘膩留低聲歸本處鍼咽未生愁淨碗帶水拖泥去搬磚運瓦來鮮魚與甕鱉滿面且蒙埃直院果因真不昧取與自無私為問生薑辣於今味孰知知庫問訊常先意寒溫任所宜現成茶一盞莫受趙州欺待客隨智隨情說同條復異枝聲前一著子留待當家兒荅問強燮機原異剛柔克亦殊氣平心息後這著可曾輸調諍無上明王印寒潭月一輪八風吹不破冰雪亦陽春持咒慈尊無量號介爾有心含生佛原非隔深禪何必參念佛好事不如無莫作死句會一任能所分從來非性外禮拜瞥爾依他起來蹤何處尋剎那生即滅萬古自長今觀心乞士原吾號巡家豈擇貧不求應供果等施倍關情托缽高枕長舒腳寧愁明日糧幾多顛倒夢醒後一齊忘宴息法臣歌為聞道侍者有序密藏開禪師隱去聞道尚未薙髮從曾水部處歸覓師不得遂痛哭而殂陸行之為予言之四大海水母乳盈毘富羅山積骨均荊軻聶政未稱英田橫五百超等倫何況投誠事知識傳來半偈堪知津雪山大士標榜在可憐流俗多邪因順之則喜逆則瞋遠之則忘近始親藏公隱去音如金聞道孤臣身為塵人謂生死乃永隔寧知火傳非由薪君不見比丘畏渴飲蟲水何如渴死先發真示戒明慢為功德賊勤為善法王福水慧舟楫無水舟不行欲求真實慧莫從口耳商苦志勞筋骨大任乃克將福至心忽開妙義能頓彰深造既自得世智誰可量胡勞歎為問丈夫兒胡勞發浩歎娑婆本苦空理欲原冰炭矢作奇男子空行已驚憚況復魔網稠觸處皆危難冥冥三界中何時夜方旦所以出世賓每勤如幻觀歲寒松柏榮爐熾金聚燦逆境是良師止貴衷不亂坐斷生死情當處即彼岸放下祖生鞭拈起秦時鑽為問丈夫兒胡勞發浩歎病中寫懷十偈俄爾西山俄爾東依依師友念何窮長空鴈影元無住未肯終為舊阿蒙中原逐鹿苦無虞一卷殘經且自劬了得目前無剩法威音那畔卻成輸三生玉食夢中灰瞪發勞生孟浪猜寄語靈山親付囑夜光彈雀事堪哀宣文伎倆愧迦文吹散青雲附白雲堪歎緇林名傑士落花流水亂紛紛萬藤多少倩誰刪高駕長驅莫問關飲器失聲猶未瞥象王已過萬重山趨避因緣問六爻祝人無計代烹庖應真有骨遺荒野賺得耆婆仔細敲誰將鴉臭立當陽惹得兒孫日夜狂滅卻本宗無實法幾多熱鬧一時涼黃花鬱鬱竹青青般若真如語太腥見色聞聲隨分過羞他矯強設門庭最苦娑婆邪見蒸禪門如炭教如冰生心無住金剛印愧殺黃梅與惠能色裏膠青水裏鹽依稀彷彿最堪嫌黃連食盡無非苦石蜜中邊盡是甜題夏貞婦卷君不見慚愧無衣赴火人須臾具足梵天身誠語誓出婦之貞象王產難斯開頻由來一死未稱英嗚呼此意疇能真侍孤親腸欲斷極樂邦看冷煖迴將血淚入珍池不動凡區聖因滿欄楯層層樹影重何妨遍列娑婆伴懷魯仲連戰國有奇士高譚恥帝秦抵掌解紛難而非儀衍脣千金笑不顧終身居海濱廉潔豈足慕義重非甘貧我悲士習陋競作名利臣醜扇與蛆蟲簪笏而垂紳讀史發永歎滔滔千古淪示費敬齋惡業雖本空業緣每鬱蓊不從作法門終受幻罪籠不觀實相心魔宮無自動慚愧既交攻理事須一統君不見善星妄說法元空長夜泥犁何日曨涅槃會上未生怨打破從前黑漆桶別友湖海浮游十五年腳跟芒履幾番穿守株緣木時師口兔角龜毛教外傳萬竅悲風號控地千腸血淚浸稽天殷勤付與同仁士徹底掀翻且熟眠入山二偈辯才如雨筆如雲八兩依然是半斤介爾一心誰信具不如直下自聞熏眾生良藥無如病病極形枯心亦灰遍界春風放桃李長肱猶似未聞雷
