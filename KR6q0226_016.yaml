body:
  text: 偶録一梵室偶談共五十五條只貴子見地不貴子行履謂有見地必有行履有行履未必有見地也今負狂解而蕩德喪檢痛哉因戒生定定生而戒愈完因定發慧慧發而戒定愈勝故名三無漏學也今甫習定戒先蕪矣甫學慧定先汩矣以後後廢前前猶豎梁掘圮基址覆椽截去梁柱也欲優游寢處其下得乎夫惟得其神者能遺其跡亦惟失其要者必染其病故今之持律者十人九陡演教者十人九流弘宗者十人九妄得神遺跡百無一矣戒定慧三學佛法大綱出苦要徑也今也見律師陡遂廢戒見法師流遂棄教見宗師妄遂置禪何因噎廢飯甘守餓而死也有戒無定慧有定無戒慧有慧無戒定非真戒定慧也有戒無定慧墮欲天有戒定無慧墮色無色天有定無戒慧墮土木金石或空散銷沉有定慧無戒墮邪魔神鬼有慧無戒定不免三惡道苦或曰若是則古人取乘急戒緩何居答曰緩之云非無也且豪傑之士與其急乘緩戒墮惡道而方升何如乘戒俱急常近佛而無退又因戒生定因定發慧急戒即急乘之階梯若藉經教為名利本托話頭為優免牌戒不唯緩而且廢乘雖名急而實緩甚非古人料揀之心也豫居徑山始受一食法有禪者曰定共戒道共戒是務茲在所緩矣豫不屑答也嗚呼儱侗瞞盰病通斯世解文識義能復幾人若在所緩應云定奪戒道奪戒共之一字云何通古之受戒者修心之基也今受戒者我慢幟也古之習教者學道之戶也今習教者破戒由也古之參禪者增上之要行也今參禪者捨戒別名謗教塗轍也革弊防非在豪傑士矣因地不真果招紆曲何謂也方受戒志為律師矣方聽經志為法師矣方參禪志為宗師矣不為律師法師宗師無所用其受戒聽教參禪也猶應院不為嚫施無用經懺俗儒不為作宦無用舉業娼優隸卒不為利無用眩色俳演承迎趨走也雖然以世法圖利事雖卑無大過也讀書規富貴得罪宣尼矣佛法博虛名玷污正教矣古者透最後關之謂宗匠博通三藏之謂法師塵業不侵之謂持律今也稍解粗淺機緣則以宗自鳴略知流通教典則以教自負但護根本四重則以戒自滿根器狹劣如此誰與荷擔正法豫寓龍居有老僧看寶積經云若先看此經和尚做不成豫曰若不看此經和尚做不成謂不成和尚法故謂無所取於為和尚故噫可為知者道難與俗人言也豫甫受菩薩戒發心看律藏闍黎古師試曰汝已受大何更習小對曰重樓四級上級既造下級可廢邪師曰身既到上層目豈緣下級對曰雖升他化佛元不離寂場一花拈於三藏既說之後達磨來自佛法盛行之時龍畫就一點睛則飛去也今龍影尚無睛何處點邇來宗教大失在為正法之心不切為門庭之見熾然詎知為正法門庭不期高而自莫及為門庭正法以爭抗而愈玷污也古者大宗匠之掃教為義學認指為月不見真月也彼已具通教理但不能親證親到故奪其依解俾入真通今之學者尚未夢見教理何所用掃不幾謗法之罪乎如來應世教隨機設故大小兩乘並行不悖其小乘者出家受具先以學戒為基次讀誦坐禪隨修一法不必兼行其大乘者亦必以戒為基次讀誦坐禪雖隨根各分主助而要兼修決無一往禪思不通了義一往持說不事觀心者不通了義味禪之犯必成不事觀心說食之譏何濟逮夫末法三學分張尸羅僅成人天之福而持犯未達猶未保其人天禪思每墮無聞之誚而戒慧兩荒多見淪於惡取持說每為名利之媒而戒定俱廢罕不落於空談噫安得豪傑士一振其頽者乎身為床座所深願焉末法衰敗良以邪正不分丁斯時者未暇較深淺急須甄邪正如以深淺則如來三昧迦葉不知迦葉三昧阿難不知乃至六群比丘猶勝馬鳴龍樹正法尚爾末法可求全責備乎如以邪正則頻伽在㲉已勝餘鳥砒毒少許便能傷命安得不辨於幾微乎故其人正淺亦可依其人邪深愈當斥正人雖淺必害少而利多邪人雖深必害多而利少欲辨邪正之致未有出於教理二種定量者也宗者無言之教教者有言之宗至言也三藏十二部默契之皆宗也既無言矣安得謂之教千七百公案舉揚之皆教也既有言矣安得謂之宗故不以說證分宗教第以門庭施設者噇糟漢也數見教病則思禪數見禪病則思教然有當互救者亦有可各自救者良以病在當人非法門咎也何謂各自救實義虎決不以畫餅充饑真禪人決不墮惡取空見三藏十二部無一法不勸修行今之不修行者皆叛教人非學教人也西來大意直指人心見性成佛今之不務見性成佛而妄逞邪解者皆謗禪人非參禪人也既云見性安得撥教律於性外既成覺者安得置教律於不覺即或未能且以一句話頭作見性成佛方便權置萬行門頭必須信得及守得定是非莫管身世俱忘憤同殺父急似燒眉寒暑饑渴尚無暇知律檢教門又何暇謗直以一門深入未及兼修亦以一鏡既懸能含多影故舉起話頭萬緣俱捨即檀十惡俱息即戒境風不動即忍綿密不斷即進更無異緣即禪真疑歷歷窮義路之淵源詣離絶之境界尋伺無棲能所雙絶即慧若不能捨緣息惡不動綿密更無異緣真疑歷歷者當知不名真提話頭也既不真提獨以之為優免牌且為邪見本豈法門咎哉故知教禪法無優劣特因地不真利名奪志不免作獅子身蟲耳果求其本則禪亦無病何求救於教教亦無病何求救於禪又學人因地雖或不真若遇正師自能中養不中才養不才唯師匠自眼未明自事未了盲引深坑雖正因之士猶被其荼毒況適相叩者哉吾故曰法門之壞撐法門者壞之也唯真宗匠可呵教家空言唯真義虎可斥宗乘儱侗否則自救不暇何堅固鬥諍為哉今人患不在提話頭患不知所以提耳患不在廢萬緣患廢不盡耳亦不患教人提話頭患不知所以教耳且萬緣既廢身心世界何以依然不廢廢惡不廢善猶在人天廢善不廢惡報必三惡捨人天而趣三惡謂之有智可乎又身心世界既不能全體放下則真實話頭必不能直下承當以悠悠泛泛心而提儱侗話頭自誑也於悠悠泛泛人而儱侗教提一話頭誑人也以誑人之師誑自誑之弟子法門抑何罪乎故雲棲曰人以為佛法復興吾以為宗風大壞也唯三種人可參話頭一者夙具靈根著手便判身心世界全體放下金剛寶劍當下提起直待大事了畢然後或見知識或觀契經印證自心接引後學二者雖道路未甚明白能依真實具眼宗匠死心參究到歧塗處自能為我指點到根節處自能為我解闢到轉關處自能為我拶入三者既未深明道路又無真師必洞徹教理方死心參究雖不能通三藏衆典楞嚴一部不可不精熟也譬如獨自遠行若不預問路程斷斷必有錯誤除此三種其餘悠悠泛泛之徒欲參禪悟道敢保十個錯有五雙憨大師以話頭喻敲門瓦子至言也識得本無實法方能用法而不被法縛或有病其說破令不生切心則金剛筏喻圓覺標指亦有過邪且惟說破知瓦非寶亟在敲門若不說破必忘敲門終日玩瓦救病神丹而人顧病之得無愚且狂乎歸元性無二方便有多門然則參禪念佛止觀皆方便也既謂之門安得同若知全性起修全修在性則三皆一致安得異故真修止貴就路還家說同說異增益戲論憨大師方便語曲為末世開助道門契理契機善之又善者也或非之曰正道不得力更修助道教門則可宗乘斷不可噫若論向上一著話頭亦用不著既許話頭已屬方便安得獨廢助道必不許持咒為助先不許提持話頭以話頭為宗而許是謗宗以持咒等為教而不許是輕教輕教謗宗何止得罪憨師三世佛冤耳今之知識每於利者令參禪鈍者教念佛是參禪唯被上機念佛唯為中下也夫禪不曲被中下則謗禪念佛不被上機則謗教禪教俱謗扇以成風遂令禪作虛名念無實行可悲也詎知參禪念佛及修教觀各有夙根一一根性各分三品禪門第一品人觸著便了更無餘事夙具靈根如時雨化第二品人直下不疑深藏密養直待瓜熟蒂落大用現前龍天推出任運利生第三品人具大疑憤如殺父怨判盡平生究明此事念佛第一品人頓悟自心是佛念念圓明第二品人深信自心作佛念念入理第三品人深信佛力無量念念滅惡此復四種謂念佛自性念佛相好功德念佛名號念佛形像此四各通三品也教觀第一品人創聞圓理頓發初心成正覺於剎那示八相於百界第二品人信一境三諦淨生身六根伏住地無明摧見思塵垢第三品人發圓覺於聞經修五品之觀行習三觀以成熏伏五住而趣覺由此言之法無優劣應病則是藥皆靈機有淺深執方則因藥成病身病知憂家不給知憂年不熟知憂方隅不靖知憂獨大事未了則不憂佛法將澌則不憂衆生業重則不憂或雖憂而不知所以憂或復倍增其可憂噫憂寧有已時也宗乘所以超勝者具諸功德而無所住故也若以不具為不住何異家無斛米兩金而曰超勝千金之子古者相宗易性宗難故玄奘捨性習相演教易證宗難故神光立雪斷臂今也不然以宗自鳴者教茫然也以教自負者相宗紊然也嗚呼難其所易而易其所甚難不能舉一羽而能舉百鈞不能見輿薪而能察秋毫五尺童子不為所欺矣豫遊歷諸山備覽人情物態顛倒最多卒難悉舉且如飲食衣服塵勞也惟恐不勤持誦禮拜勝業也惟恐不惰三聚淨戒出世正因也深厭煩瑣百年活計生死根本也常虞缺略為佛法慢幢高起求貨利體面頓忘乃至同一語也謂出某經論則棄如怨敵謂出某語録則愛如珍寶世緣中事與道無妨律檢教門有違向上嘻吾不知其所趣矣何謂教何謂宗語言施設之謂教忘情默契之謂宗故宗也者雖云教外別傳實即教內真傳也如以指指月認指為月不可也謂所指非月亦不可也且諸佛言教皆指諸祖語録寧獨非指不認佛指作月何獨認祖指也又祖所指是月佛所指寧非月信祖之所指何獨不信佛所指也甚矣人之顛倒也發大心猶易具正見更難具正見猶易勤修習更難勤修習猶易除心病更難然心病不除安事修習修習不勤安取正見正見不具豈真大心則直謂之發大心難利關不破得失驚之名關不破毀譽動之既為得失毀譽所轉猶以禪道佛法鳴乎不見己短愚也見而護愚之愚也不見人長惡也見而掩惡之惡也或問豫汝何願願生西方更何願願入地獄曰是何心哉曰西方則上事諸佛地獄則下度衆生佛從彌陀始願王勝故生從地獄始悲心切故有禪者問豫作何功夫曰念佛曰念佛何為曰求生西方禪者嗤曰何不薦取自性彌陀唯心淨土用是妄念妄求為豫曰汝謂阿彌陀佛在性外極樂國土在心外邪心性亦太局隘矣即汝所謂不念不求者非惡取空邪善知識者猶良醫乎良醫能兼療諸病亦有專治一病者兼療則應病與藥專治非其病不醫故皆能壽夭而生死也若伎倆唯一欲衆疾普收其傷害多矣況一伎未精哉語云真人前說不得假今也假人前說不得真悲夫語云三日賣不得一擔真一日賣得三擔假吾曰寧使千日賣不得一擔真不願一日賣得千擔假人謂參禪則悟道不必求生西方念佛則生西未必即能悟道不知悟後尚不可不生西方況未必悟邪又禪者欲生西方不必改為念佛但具信願則參禪即淨土行也又念佛至一心不亂能所兩忘即得無生法忍豈非悟道故參禪念佛俱能悟道俱能生西也但有疑則參無疑則念在人下手時自酌耳古人自牧愈卑品愈高今人自視愈高品愈卑古人自處愈小道愈大今人自視愈大道愈小古人自考愈歉德愈完今人自恃愈完德愈歉是謂不揣其本而齊其末小人以己之過為人之過每怨天而尤人君子以人之過為己之過每反躬而責己夫不謂人過謂己過有四觀焉眼見惡色耳聞惡聲等皆自業所感非關他事故惡境紛紛皆唯識所現虛幻不實故衆生煩惱無量應度應斷己分事故衆生修惡即是性惡衆生性惡即己性惡故法性本常住云何分正像正像之分全在人耳嗚呼時丁末季去聖時遙為利者十之九為名者十之一為己生死發二乘心者百千中一為大地衆生發無上心者萬萬中一此止就禪和料簡耳應院及俗人又不必言矣佛法將安恃邪生西方以三種心至誠心深心回向發願心此三直至成佛流俗人亦三種心輕心忽心將就心此三常遊五趣嗚呼前三百千中或一有後三百千中或一無奚怪口言求生者多真實往生者少也末法中病有三不可救喜守不喜攻喜略不喜廣喜同不喜異交友有三大惡喜順不喜逆喜口是而心非喜不如不喜勝學問有三大錯好多不好精逐末不求本求解不求證古人疏經論必為發幽微示指歸出綱要明修法故隨依一典可了生死上弘下化後世畏其繁而廢棄焉雖似善變通實大傷教眼如五霸尊周周益受削嗚呼攀枝忘幹罪元不在先賢因噎廢飯訓豈可遺後裔扶教者曷深思之豫見學士堂與務下互輕也學士曰彼不知教不知理貿貿然勤作而已非我等叢林無光輝縉紳莫酬對矣務下曰我竭力而作彼袖手而食戒德不守學業不成安用是浪蕩子為哉豫傷之私念曰彼學士胡不念務下之勞實我外護我無實行坐享難消即一切作普賢想彼務下胡不念我等障重無聞熏種彼等聰利皆由夙因即一切作導師想叢林不幾盛乎復見禪堂與藏堂相輕也禪輕藏曰彼鑽故紙圖嚫施耳使進而坐香安可得亦安可能哉藏輕禪曰彼坐食而身不勞守癡而心不用叩以了義茫無所知警其昏沉瞋心震發悟道無人著魔接踵何如看經種般若因作務得人天福邪豫倍傷之復代念曰我堂大事未了滴水難消彼應和有外護功閲藏為思修本設我念念親切法行亦無超于信行儻悠悠自縱禪誦反高出于坐禪而藏堂人胡不念明理不修行說食終不飽發心欲坐禪勝十方論師況謝絶萬緣併除昏散專心向上窮究本參我等散心豈能倣佛則法門不亦光乎唯貢高各蘊於懷忌剋每形於吻致令是非蜂起體段兩傷皆獅子身蟲矣凡智利宜慧行力強宜定行亦各有二種慧行二者一單從慧入明極則誠不煩修定而自得定此夙因深厚習氣微薄故也二能發聞解不能即證必依解起行行起解絶若不猛做一番不能親證親到故須定力濟之也定行二者一單刀直入便能徹法源底此亦夙因深厚正見力強故也二但能死守不能權變每墮空見或耽味禪求脫反縛求升反墜必慧行濟之方免墮坑落塹也復有智力並備定慧雙圓者如佛在世時聞法得道及六祖等是也若夫借宗教資牙後慧托話頭為優免牌慧行定行兩無所當皆獅子身中蟲矣雲棲大師發揮念佛法門曰有事一心不亂理一心不亂說者謂持名號是事一心參誰字是理一心亦何訛也夫事一心者歷歷分明不昏不散是也理一心者默契無生洞明自性是也是參時話頭純熟猶屬事門念時心佛兩忘即歸理域安得事獨指念理獨指參也又參誰字謂之究理則可謂理一心不可然非其人即究理亦未可輕易何以故事有挾理之功理無隻立之能幸審思之甚矣二見之為害也煩惱菩提生死涅槃同依於一心而判然為二宗乘教乘同傳於一佛而判然為二法性法相同秉於一音而判然為二慧解行門同詮於一教而判然為二二見紛然正見滅矣坐禪名一實則有六謂圓頓禪次第禪利慧禪鈍修禪世俗禪假名禪也圓頓禪者創聞正法眼藏涅槃妙心不可思議微妙理性而發其心此復四一者乍聞即悟頓證自心不落階級具足智德二者以未頓證便大疑憤畟塞虛空當下依正兩忘凡聖坐斷昏散無棲泊處智理無湊合處儼如有氣死人直待冷灰豆爆三者未能直下成片實信得及疑得定雖被無始業力所纏種種昏散障緣不退初心或一向單提或道品助成畢生不起名利心不起餘乘心約機即鈍約根亦名圓頓種子四者先於教典留心討明理性隨起觀行名為乾慧次得相似理水名入信心次乃發心名入正位即與頓悟同一智德須知頓悟本多生熏習故初心不可不於至教厚植種子也次第禪者先以空慧修一切智觀一切法無不皆空次以假慧修道種智觀一切法從空建立後以中慧修一切種智觀一切法非空非假即第一義心利慧禪者達一切法如幻如夢當體全空非空故空鈍修禪復四一者為得神足行菩薩道修根本四禪依之發通二者深觀十二因緣坐斷無明三者深觀四諦剎那斷惑證真四者雖深知苦諦必九次第定漸次斷惑證真世俗禪復二一者凡夫以欣厭心修上八定二者外道計彼涅槃修習彼定假名禪復三一者雖聞圓頓名言慕名不會義強提一話頭尚未解盡話頭義路況義路窮處是人以一句話作優免牌盡廢他善死在繫驢橛上雖稍卻昏散且未得世俗禪定安望圓頓雖無大害卻失聞熏無量功德二者於諸祖機緣深求道理廢寢忘餐或得一義路入處輒認為有所醒發便作得本不愁末想是人雖不撥萬行常躲身無事甲裏且以解行分作兩橛是名謗真般若三者但好虛名以機緣資牙慧胡說亂說自害害人或挂虛名言參話頭偷安藏拙昏散不除憎愛恆熾空消檀施敗壞法門已上六種中共成十有五等若再料簡差降更多嗟哉末季徒取其名莫稽其實奈何宗教不掃地也古謂虛舟飄瓦則不生瞋今亦生瞋矣鵲噪鴉鳴則不分別今亦分別矣逆順境緣安望其脫然邪法門有七壞相六興相何謂七壞相一懼命天知命孤以家貧故令出家二避難無聊激氣求安樂故自出家三求清高故自出家四以好名故受戒五好名故聽經六藏拙故參禪七好名故參禪七種雖高低不等優劣判然同為因地不真壞法門一也何謂六興相一為生死故出家二為大菩提故出家三為修行基本故受戒四為修行門路故聽經五為了生死故參禪六為得種智故參禪六種雖大小不等偏圓有殊同為因地真正能興正法一也噫凡吾同類尚自考之儻因地真幸善自保持俾終正而不入於邪或因地未真則痛自改悔速反真而無溺於僞庶幾自救亦救法門耳正人觀邪法邪法亦成正邪人觀正法正法亦成邪深人觀淺法淺法亦成深淺人觀深法深法亦成淺圓人觀偏法偏法亦成圓偏人觀圓法圓法亦成偏道人觀俗法俗法亦成道俗人觀道法道法亦成俗嗚呼今之正成邪深成淺圓成偏道成俗往往矣試各自簡點苟知其病必知其藥深望之有名同而實異者如佛言道謂三種菩提老言道謂虛無自然儒言道謂五常五倫未可同語也有名異實同者如台宗謂之一心三觀賢首謂之一真法界相宗謂之勝義唯識禪宗謂之向上一著未始少異也譬一帝都曰北京曰燕都曰順天府有盛談北京鄙燕都為陋劣或談燕都鄙順天為陋劣吾知其必被嗤也彼性相分河南北豎黨何以異此松江李居士寓天封寺猛欲出家豫問汝欲出家曾看經否未也看語録否稍看何以看語録不看經曰經則煩細語録爽快可觀豫曰爽快可觀無如水滸傳三國志矣偶書二則諸佛修稱性之善故能化身千百億自在度衆生衆生造稱性之惡故能一一身遍滿八萬四千大地獄一日一夜具受八萬生死之苦然則佛境界不可思議衆生境界亦不可思議秖由現前一念本自不可思議耳有智者宜安從邪四凶居堯舜之世而不能自安其生孔孟丁春秋戰國之亂而不足以改其樂故知得失全由自心外境何與焉今人不治心而問境無乃惑乎閲陽明全集畢偶書二則君子小人良知之體未始不同也一蔽於私而不能致遂嫉功忌能誣忠陷良無所不至吁可哀矣唯君子昭曠如太虛空絶不與較是非辨得失故小人卒無所騁其毒而陷溺未深者猶可化為君子一與之抗則其去小人不能以寸而玉與石角玉必先敝矣通此佛氏二無我觀妙旨泠然孰謂世閒大儒非出世白茅哉或病陽明有時闢佛疑其未忘門庭蓋未論其世未設身處其地耳嗚呼繼陽明起諸大儒無不醉心佛乘夫非鍊酥為酒之功也哉學無論儒釋其貴真賤僞一也學果真雖一時受讒被抑精光終不可掩學苟僞雖一時欺世盜名醜態終亦必露故曰斯民也三代所以直道而行夫直道即良知本體而已致此本體可建天地質鬼神俟百世況斯世之民哉顧斯世之民信之而權姦獨誣陷之俗儒獨排斥之彼權姦俗儒獨無良知邪特有以蔽之弗能致之耳嗚呼均此本體但弗致則與瑾彬同惡能致則與陽明同善讀聖賢書者宜何如慎其獨也今世佛門陷足於僞者亦多矣吾為此懼欲間之而未能閲此書不覺感憤流淚云偶書二則唯識以遍破我法二執為宗趣故借立法為遣情之門般若以會一切法無非妙理為宗趣故借破執為立理之門然則唯識宜名破相般若宜名立法而相傳反稱唯識為相宗般若為空宗者謬也鳥窠禪師為侍者吹布毛止是初入信門方便世多認為極則事其為白香山拈諸惡莫作衆善奉行二語正是徹骨徹髓原始要終法門世多認為淺近事無怪乎解行分張不達實相正印山客問答病起偶書靈峰有五美四惡何謂五美一者泉甘且多二者黜陟不聞三者暑不酷四者寒燒柴火五者蚊少何謂四惡一者病時醫藥難二者貧時借貸難三者大風能飄瓦四者地瘠多砂所生穀菜味皆劣客曰敢問四惡亦可屏乎山曰可客曰請聞厥方山曰節口腹慎寒暑則少病斯屏醫藥矣少欲知足則不貧斯屏借貸矣緊覆茅泥治壁糊窗閉戶斯屏風矣依佛教戒於美惡食勿妄分別趣療形枯斯屏劣味矣客拜曰善哉受教請畢世依君住解致知格物解約佛法為唐宜之說知者明德之本體乃中道第一義諦妙心非空非假而實離一切相即一切法者也致者一心三觀了達此一諦而三諦也物者迷此知體而幻現之身心家國天下如水所結之冰也格者推究此身心家國天下皆如幻影並非實我實法如以暖氣銷堅冰也欲得水莫若泮水欲致知莫若格物冰泮水現物格知致矣物者所觀之境也格者能觀之智也知者所顯之諦也一心三觀名格物一境三諦不令隱晦名致知不可以致知為空觀格物為假觀也唐謬分故破之了知五位百法皆無實我實法為物格轉第六識為妙觀察智為知致轉第七識為平等性智為意誠轉第八識為大圓鏡智為心正轉前五識為成所作智為身修一身清淨故多身清淨乃至一世界清淨故一切世界清淨為家齊國治天下平只一物格工夫到底致知之學始無虧缺是謂究竟不離於初步也藏性解難五則隨緣那名不變不變那得隨緣一難非不變之體安有隨緣之用非隨緣之用安顯不變之體一解不變體常隨緣用無常還是一分無常一分常二難體不變故妙用不變體常用亦常用隨緣故舉體隨緣用無常體亦無常常與無常二鳥雙遊二解正隨緣時不變安在悟不變後豈更隨緣三難正隨緣隨緣即不變別無不變所在如二月外無真月二月即是真月悟不變不變隨悟緣了了常無迷惑如淨眼見真月更不見二月三解月是能隨邪見是所隨邪四難就月為喻真月不變一二皆隨緣真月隨人見一見二不變常自隨緣見一見二實無他月隨緣常自不變就見為論見性不變見一見二皆隨緣見一是真見見二是妄見只一見體而有真妄不變常隨緣真見妄見總是見隨緣常不變四解月是能隨即是所見見是能見即是所隨名不二邪五難此非不二須知月不在天見不在目月在天見在目二物相遠如何成見又復月不來目見不往天月來目天則無月見往天目則無見然非月何見非見何月月若是見復何名月月若非見云何見月見若是月復何名見見若非月月云何見從此體會方知能所不二不二之性即是不變迷者謂二悟知不二總號隨緣一性隨迷悟兩緣迷悟總不改一性也五解
