body:
  text: 詩偈三檇李天寧禪堂度歲即事彈指欣傳剎海春裁噴小雨潤梅筠薪爐焰熾開眉宇鑼鼓聲繁滌耳塵流接熙河分愈合香來祇樹遠仍親閒看嫩草庭前緑蝴蝶莊周哆大椿寄吳西城先生鳥出晨巒繞樹飛十年回首故人稀杏壇已悟浮雲影蓮社今瞻落日暉秀水盈盈湖水溢吳山隱隱越山微遙聞耆域多靈草聊寄阿伽第一機士民失德亢旱不雨野人憂之賦四月四月炎暑憂心如杵嗟此農夫不遑安處曉拭其眉爰卜其礎庶幾油油甘露湑湑民之無聊夕不謀朝恣爾貿貿爰積其愮孽既饒止悲亦遙止式瞻前後靡不焦止民之無知競騖其私病既孔急曾莫爾醫嗟彼達士為則為儀胡反自局而無遠思亦有美乳聿雜於滸飲乳則樂飲水則瘐嗟彼達士罔識去取靜言思之不如群羽維山有靈維麓有渟嗟彼達士明德維馨醒醒不寐寧即於冥惜爾雙目一指所扃平等平等既生且並下視其足高視其頂抱識含知誰云或迥溺此塗炭曾莫之拯維金有冶維柏有霜日月有蝕不減其光嗟彼達士厥用不臧舍爾冰鑑逐此驪黃我心憂思何所求思載觀宇宙不可遊思緬懷千古誰與酬思熙河泗水浴彼流思和答吳叔雅十世何嘗離目前剎那不住涅槃天但觀心外元無法莫謂師家別有傳羅什譯經存寸舌瞿曇誘子賴空拳歸來共爾黃金地擇取華池千葉蓮中秋後二日群鶴集於靈峰賦靈鳥矯矯靈鳥集於山娛我多士終朝永間矯矯靈鳥集於阿娛我多士雍雍以和有懷樂土實多靈羽羡此東林式瞻西戶送想功成覿面斯睹用韻題背坐圖二首世事無端忒認真縱饒藏臉未藏身分明少室九年意畢竟誰能舉似人塵剎甘為出世逋大千坐具一微圖拈來短塵渾閒事談盡三乘半字無和陳非白三首嚴冬落木轉凄凄積雪平鋪茅屋低舉世相看同敗北幾人能解早歸西晨朝共覲慈悲父飯後還要法喜妻消盡劫波生死夢渾然六字是全提莫厭多番徹骨寒曉雞三倡夢初殘迎風賴有仲由縕飾體欣無季子紈觸境會心原不遠離言覓旨卻成難自從識得空王印白牯狸奴古佛看才提正令已成旁爾焰河中識浪茫空劫劫前仍捕影緣心心斷似吹光朔風夜急松多韻白霧曉開山自蒼堪笑東村王大姐強將塵坌作梳粧和張興公二首枉直紛紛計尺尋獨憐塵世欲泥深也知昔日酥為酒莫怪今時葉作金字性本空香遍地機先有句月穿林子期側耳渾無事共鑒高山流水音每慚少賤鄙能多更歎初心漸似梭白髮數莖悲鏡雪孤懷半世付春波蕪榛易用銛鋒削鬥諍難將影響和奮起一聲塗毒鼓活人原不離干戈和答宋量公流芳五葉一枝花未委根源莫浪誇針芥投時初祖笑機關轉處納僧嗟無心擊碎情塵鎖有句重添佛祖枷識取自衣珠不借朦朧鏡影漫相遮贈耦西善財初發意百城方盡南一見普賢後始知西更湛十願導其往深禪不用參彌陀法界藏介爾一念含六字聲歷歷皎月澄寒潭未識岐塗苦那知此道甘上善共攜手列祖朋盍簪觀成一十六生品列三三任彼馳圓頓方茲定有慚示偈六首覓心無得便心安誰解拋樁急水灘落地枕聲驚客夢月移花影度闌干示知安高山最早得曦光懸鼓餘輝亦倍彰海底立身如泰嶽不愁冬至夜偏長示昱巖六年苦行老瞿曇麻麥充饑事太憨星夜抬頭明箇事前三三是後三三示雪瞿密在汝邊安可傳長年橈破水中天華亭舟覆無消息賣盡風流不著錢示密傳青蓮權實意分明百萬人天較最親獨有飲光贓未盡瞥然一笑誤芳春示敷公洪鐘未扣已先鳴不許耳聞許眼聞泥牛吼月渾閒事無限春光付白雲示靜含題謝在之扇頭介爾心田足水草隨他此外別尋討君不見大千三變土依然龍女從茲出海島贈魏國徐燕超居士愷悌慈祥古佛心襟期爽朗芥投針祇從安養遴柎萼不向時流較釜鬵一念便能嚴四土十聲誰肯易千金春來柳葉初含笑把手同遊解脫林壽劉今度六旬文章垂宇宙歸戒印心王耳順圓通旨荷風殿閣涼五戒歌示憨月受戒易守戒難莫將大事等間看浮囊渡海須勤護一念差池全體殘理勝欲便安瀾把定從來生死關任他逆順魔軍箭凜凜孤懷月影寒不殺生大慈仁物我一體如長春蠕動蜎飛佛性等賢愚貴賤無疏親不偷盜充義奧正直清廉明節操心外無法可當情菩提性具非他造不淫欲梵行篤身心皎潔同珠玉泰山喬嶽立清風等間超出娑婆獄不妄語誠相與廣長舌相昏塗炬矢口千金敵國欽九界同歸作洲渚不飲酒離群醜智慧照明獅子吼衣裡圓珠豈更忘免得親翁再苦口三歸五戒果精明觀音勢至為師友示昱巖介爾一念心橫豎不可盡諦審復諦觀本跡二俱泯悟後亦非奢迷時亦何窘迷悟弗當情乃達無生忍示馬光世未知箇事難得知已知欲忘亦不易忘卻威音那畔底今時方顯頭頭是著衣喫飯弄神通劍樹刀山任遊戲念彌陀算珠記夫婦知能第一義淨穢兩忘仍歷然法界分明無礙事一念圓彰四土嚴三身頓證驚長寐信得真見得至步步腳跟都著地以茲自覺覺衆生大智光明照十世施茶偈心佛衆生無別理冬日飲湯夏飲水結得今時歡喜緣須摩國內長相似度盡含靈不見功僧祇劫自剎那始楊輔之讀破空論般若離微絶悟迷還將五度作階梯法元無法何煩掃空若耽空亦有倪秋至共看桐葉落春深時聽子規啼道人讀罷金剛論翳抉奚勞更覓錍題旻昭畫贈季筏古木高巖映日暉長年破浪帶綸歸升平曲罷無餘事笑問金鱗幾許肥示君甫直信現前心覓之不可得無法足當情分別亦非識和答宋量公不將半日漫偷閒辨妄窮真別有緣識取夢中誰作主便知火內亦栽蓮楞伽已悟安心訣棒喝多慚利口禪珍重子韶仍格物櫺牛出尾樹歸田學道偈學道如彈琴急則聲易絶緩則不成音學道如植苗不藝雜荒草助長致枯焦學道如源泉不見洶湧勢流久石能穿學道如白月光頓照閻浮明乃漸皎潔先學律儀戒能捉煩惱賊次學定共戒能縛煩惱賊次學無漏戒永滅煩惱賊賊昔昌熾時本非他方來今賊雖永滅究竟無所之譬如世亂時處處皆甲兵及其治平日在在皆良民但得心王正根塵永肅清十一善心所如彼賢良臣君能親用之拔茅彙吉征賢良善輔佐邪惡自潛形風行草必偃何庸務力爭迥者隱納之深痛也彼迥者蒼胡然局止彼廣者輿胡復促止欲卜於朝氛孔毒止欲卜於野情亦曲止問侶於玄罔可録止載問於釋不異俗止俗猶嗜福釋乃趨獄彼迥者蒼遠豈無極八萬由旬感應一息百爾開士勿軼爾德因果酬償塵劫匪忒瞥存其私終嬰鬼殛庶幾慎思眚翳是拭目既清明華元非色彼迥者蒼匪維匪方悟也故里迷也異鄉異鄉之曲不可詳也我愁孔亟聞斷腸也我有慈父示安於西我久逃逝耳罔可提今既悔矣癡猶未刲載怨載慕乃泣乃啼我病未已遑恤於他哀此同體口滋其多多言窮也默可容也自攻厥慝無他攻也靈峰之麓有室如谷風巽於狀雪沾於服何忮何求馬麥孔馥誰肯我勗載胥及淑入山四首萬山隔斷市塵囂日暮秋風吼竹濤世濁未能融動靜秖宜此地解天韜一夏炎威苦逼人靈峰片石舊盟新歸來泉味偏增逸何必桃源覓避秦盈虧本自無增減何故山深輝較揚照此道人冰雪意夏雲春露亦成霜一微涉動便頽山棘滿栴林奈未刪曉起不堪頻對鏡大千無地置慚顏歷劫熏修誓未灰半生殘喘尚徘徊斬釘截鐵從茲始忍使摩尼隱積埃寄壽幽棲主人指天指地重陽節桂菊呈妍明月臺十里贈君無別語四明一喝聲如雷知足偈德薄難消供雲泉意倍長雪來珠滿案風過葉盈床一具蒲團穩千家麥飯香自憐身漸老苦行未堪償七淨督梓大佛頂經玄文憶我二十三創聞真了義涕泣每沾巾願求無上智逾年心益堅黽勉從披剃力掃葛藤纏一意離文字秖見鑿頭方那識錐頭利賴有劣善根靡敢自暴棄時復溫舊聞展轉不成寐竊思性相宗豈必判成二云何諸疏家各妄分門類研之罔可通任之兩相戾乃掀昔人窠亦觸今時忌直溯說默源細繹指月譬蛇繩麻匪殊影光鏡寧異原無法外心安有理外事妙旨既泠然微言忽玄契迎刃解全牛不啻土委地語語破執情節節吐鬱氣信有佛力加私懷安忍昧初刻在溫陵山川阻迢遞長干復剞劂習公如來使賦此券樂邦將來同受記祖堂度歲寫懷二首葉落柴枯病後身肯將虛解博閒名應憐五百初頽藝未忍孤單悻遠征嬰杵面痕刊血淚金蘭語臭結心盟歲朝雨滌魔氛淨邃谷傳開二鼓聲冽盡梅英始報春今年仍是去年人觀河不改渾生滅交臂潛移絶舊新愧我未嘗留隻字勞他猶自睹雙脣何如善吉巖中坐帝釋攜來萼滿旬偶成三絶急雨狂風雜晚鐘泠然身世湛漚空曉看碎玉鋪千嶂如是浮幢第幾重少年逐隊各歡呼獨坐孤峰萬慮枯愧有一端情未瞥強將殘羽覆新雛箇事何關虧與成尸憑兩鬼攫分爭朝來枕落催殘夢嬴得虛名較羽輕續夢中句有序人之患在好為人師旭出家來絶無為人師想而為師十餘年矣然每省未堪作古人弟子嗟嗟圖旦夕名忘塵劫誓智乎夢中得句一鏡愁容髮漸白半生名世事無成不覺痛哭而醒一鏡愁容髮漸白半生名世事無成願輪欲共虛空轉莫負當年樂土盟丙戌春幻遊石城隨緣閲藏以償夙願夜夢塑地藏大士身首具手足未成感賦積雨溟濛縟客思鴿聲傳怨度新枝千年學脈憑誰寄萬古愁懷祇自知鏡裏病容衰已甚夢中慈相體猶虧何時了卻文言債驀入重巖就故醫雨窗偶成世運若奔河哲人日以迥慧照哀式微夙習恆在酩嗟我欲拯懷過涉幾滅頂何時彼岸回飄然駕慈艇光明煞爾彰妙用仍衣褧默要忍歡機悲誓誰能並識此方便宗爰達度生綮緬思華臺尊胡為不自肯病中有感四百四病互圍繞八十八使鎮相隨夢裏忽憶大士號咨嗟感慕仍吁嘻如意珠王誰蔑有伶俜劫簸徒愚癡念佛獨許三昧寶聲聲圓彰無盈虧上士一決一切了狂邪翻覆生狐疑安養一撮即華藏彌陀十劫毗盧師從今一信永弗迷橫超那畏生盲嗤閲大智度論畢紀懷四首雨多入夏夜偏寒胡漢於今辨最難擬絶百非還墜斷欲離四句已成瘢分明文字元無性卻怪虛空亦可刓賴有橫超歸路穩不隨年少學邯鄲般若何嘗獨尚空通能成塞塞成通菱錐佛事隨緣建荷鏡魔軍任運攻度盡衆生無可度功圓妙覺不居功應憐此日談玄客魚目摩尼妄擬同病在膏肓亦可醫自慚積劫太憨癡幾回說夢仍添夢秖是三思未再思垢重愈知學不厭懺頻終恃法元慈筆端齒落催殘晷舉筆忽落一齒送想懸輪更莫遲寒暑推人念念移何須齒落始添悲狼驚未得脂消盡草益空令肉漸痿搔首控歸無上士撫膺披露有生疵他年淨土華敷日記取壇前痛哭時示庸菴比丘瞋能蕩家寶慈乃積法財損益秖在我胡以空徘徊明鏡現妍醜影像無去來但宜躬自厚慎勿責友儕潔矩可為喻恕己真昏瞢過去已無及將來須創懲深思忍辱行割截心無病瞋則兩俱傷慈則並獲慶釋迦果既圓歌利因亦正丙戌生辰驟雨初霽偶成四十不聞道五十猶空老縱滿百年春奚足稱壽考歲歲此日生此生何日了法門小比丘律行多未曉說時似惺惺用時仍顛倒數悔復數違嗟哉恆痛抱所恃格外慈示我三昧寶隨分度餘暉雷雨還晴皎壽馬太昭四十形而上者謂之道形而下者謂之器四諦分明舉似人誰達緣生第一義非斷非常非有空法法頭頭絶思議鄙夫問我我無知時行物生天何示肯從宣聖覓心源便悟威音那畔事昭老今逢不惑年祝君聊舉金剛智識取緣生無性宗方知三藏非文字和答張興公二首僧祇豈是枉施功獨怪郎王強異同空界任從星布列川流終向海渾融分明萬物原非物倣佛相逢卻未逢介爾覓時雖不得調心誰繼可師風道曠無涯莫計功恆沙佛祖路皆同隨情異見元非異擬欲融歸便弗融空劫劫前仍是物有迷迷處亦相逢喜聞不昧平生句今日依然龐老風丙戌中秋懷淨土皓月年年照客秋夢中時動故鄉愁兜羅綿手垂應久優鉢羅華散未收癡掉不除增愧色貪瞋猶熾礙真修長空鴈影蕭然度寄我深思到寶樓丙戌重陽同湛公登祖堂山頂秀出芙蓉接紫微萬山匍匐競歸依論交祇許盟千古問諦無勞杜百非江上風帆誰去住峰頭雲物任翔飛幾枝紅葉呈秋影峻嶺寒空映晚暉悼豫正法友志士每難遇胡為多夭傷末運固莫挽悲心寧肯忘良由名根誤說藥迷真方止觀乏針砭聞見滋膏肓所以明心訣翻作戕身槍雖逐幻緣逝金剛種未亡先覲彌陀覺邀豫返故鄉挽旅泊大德淨土迢迢不涉程閻浮禮誦已功成漚花頓滅千生影德水初標九品名酬債豈應嫌病苦橫超寧復畏譏評殷勤為我求慈父何日同垂隻手迎示陳砥中出家兒求安寧外寧必有內憂生無量劫來虛妄種慣向禪那靜裏呈出家兒求尊貴虎背仙人難去住成佛作祖帶汙名戴角披毛推上位出家兒求無纍解脫深坑安可墜蓮華原向汙泥生陸地高原空鈍置出家不在幾莖髮先須煉就純鋼骨勘破時流名利根九仞未泉須再掘從此路頭真門庭漫問津溈山警策語古德有真因靈奕生日以偈示之有德即有福無瞋即無禍心寬壽自延量大智自裕應思老頭陀願居衆人後破納以遮身持鉢度貧陋示別兩堂法友世諦矜流布哀哀古佛心餼羊雖愛禮拜上豈從今共執驢鞍解爭將柿蒂欽引商刻羽後寧敢望知音
