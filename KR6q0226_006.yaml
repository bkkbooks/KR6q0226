body:
  text: 古歙門人成時編輯法語一示印海方丈先開見地後可言修證欲開見地不得姑待異日夫決擇身心無過師友商確經論尋討今商確僅作言談會尋討僅作文字會必待冷坐方名工夫成片縱得成片動靜依然兩橛況動既不能隨處體會靜又安保成片哉真工夫不然無論世法佛法動靜順逆語默但發慧眼鎔習氣磨礪身心增益我所不到者即實工夫只期本分相應更無動靜之別儻不向本分會取徒謝絶人事枯守蒲團敢保驢年無相應分況塵緣無盡邪應以猛切心治姑待心常念時不待人一蹉便成百蹉以殷重心治輕忽心一言有益於己便應著眼銘心以深廣心治將就心期待誓同先哲舉措莫類時流三若缺一學道難矣示法源念佛工夫秖貴真實信心第一要信我是未成之佛彌陀是已成之佛其體無二次信娑婆的是苦安養的可歸熾然欣厭次信現前一舉一動皆可回向西方若不回向雖上品善亦不往生若知回向雖誤作惡行速斷相續心起殷重懺悔懺悔之力亦能往生況持戒修福種種勝業豈不足莊嚴淨土只為信力不深勝業淪於有漏又欲捨此別商誤之誤矣但加真信一切行履更不須改也示初平人知宗者佛心教者佛語不知戒者佛身也盧舍那佛以戒為體惡無不止故淨善無不行故滿儻身既不存心將安寄語將安宣縱透千七百公案通十二部了義止成依草附木無主孤魂而已示陳受之聖賢皆以同體大悲為學問綱宗儒謂萬物皆備於我釋謂心佛衆生三無差別推惻隱之心可保四海極大悲之量遍周法界故曰天地之大德曰生儻殺戒不持豈名一日克己復禮天下歸仁乎願即向儒門實究必能奮然頓決於一日位天地育萬物取諸片念而有餘矣示羅性嚴剃髮染衣會有良時歸戒聞修不勞諏日非歸戒無以為出要之本非聞修無以開出要之門佛法染神既深解脫機緣自湊否則前牽後引歲復一歲淨信初心漸至牿亡非丈夫所以自奮也示沈驚百世出世固不可判作兩橛亦不可混作一事蓋儒佛下手同要歸異雖從真儒下手處下手學道有基不向真佛要歸處要歸真性不顯東坡學佛然後知儒以宣聖出春秋世衆生根性機緣未熟一往且就倫常指點五乘格之僅屬人乘間露極談終不彰著復被宋儒知見覆蔽遂使道脈湮埋非藉三藏十二部教求開眼目不唯負己靈宣尼亦受屈多矣示沈清彥人不知本地風光天地萬物俱成芻狗位育事業徒有虛名凡夫如井蛙夏蟲豈信大海非誑永劫不誣欲入此信門應觀現前一念前不得其始後不得其終現莫窮涯際設追尋絶無蹤迹言其無不可斷滅禪家謂之淨裸裸赤灑灑尚冤不少況紫陽謂虛靈不昧稟得於天非戲論妄想邪急從良師友快讀了義經薦取本來面目掀翻流俗知見勉之示范明啓三寶深理非庸儒所知大智丈夫乃能諦信余少時亦拘虛於程朱後廣讀內典稍窺涯畔莫窮源底方知有真實心性之學唯以超方眼觀究竟理庶不墮井蛙夏蟲之誚也示王稚炎喻義喻利在心術不在形骸果聖賢自期功名亦道德之用儻志在目前不求上達雖駕言理學止富貴之媒而已今以孝父母和兄弟致君澤民三種心持準提咒豈非大乘願力精勤一致始終不渝君子喻於義利亦化為義矣示無雲舉手低頭皆成佛道開示悟入妙在不別覓玄奧無相不離有相解脫不離文字究竟不異初心若以生滅心觀一切法設有一法過涅槃者亦是生滅數若以不生滅心會一切法是法住法位世間相常住豈得漫云塔是土木經是紙墨邪急薦取可也示夢西欲坐斷凡聖情解頓明佛祖心源不可絲毫夾雜然所謂夾雜正不在看經尋論乃在世間利名煩惱我慢慳嫉放不下嘗見主宗乘者動以經論為雜毒反置習氣於不訶豈知古英傑凡情先盡故但掃其聖解今人濁智流轉不向痛處加錐云何出得生死且如婆子燒菴公案須向自己腳跟下理會可笑世人欲代轉語望婆子供養面皮厚多少哉須不欺心的的覤破那僧及婆子落處即自己落處便是出生死真實路頭切不可向解路卜度失卻自己鼻孔其二六時中用心方便妙在從緣薦得不宜固守枯寂塞妙悟門直拶碎虛空再來理會示方暉元浩然之氣人皆性具雖云集義所生實非有生但念念以聖賢自期則本性日顯氣自充矣若一念餒便名自棄所貴豪傑之士無待而興也示攝三聽講不得徒事口耳先應諦思佛為何事説經我為何事學經若知佛所為何事則不耽著文言若知我當為何事則不貪逐名利不逐名利則杜外謗不著文言則善悟理悟理則本立而道生杜謗則德孚而物化可以自利可以利他不然學問愈多去道愈遠學人愈盛法門愈衰師蟲之記良足畏也示律堂大衆流俗知見不可入道我慢習氣不可求道未會先會不可語道宴安怠惰不可學道顧是惜非不可謀道自信己意不可問道捨動求靜不可養道棄教參禪不可得道依文解義不可會道欲速喜近不可悟道隔小於大不可見道執穢為淨不可知道厭常喜新不可趨道樂簡畏繁不可明道將就苟且不可修道得少為足不可證道惟超群拔俗謙己虛心忍苦捍勞親近知識觸處體會以教印心廣大悠久事理雙備棲神淨域履蹈典型博通古今特達勇鋭深心無極誓窮法海源底乃真實男子出世丈夫示存朴夫比丘者體預僧寶之尊職紹佛法之種須超群拔俗迥脫流俗知見方無愧厥名儻故轍不改則一舉一動罪案如山一旦業風吹去袈裟下失卻人身苦中之苦人間五十年四王天一晝夜有何實法可戀若不急尋出要寧唯一錯百錯塵沙劫數未有了期血性漢子能勿悚然在念乎示真學真學以解行雙到為宗趣非開解無以趨道非力行無以證道而解行又有大小漸頓不同若但求一出生死法門自度脫者小解小行也若遍通一切法門自利利他者大解大行也若先解後行者漸也若知解行同時隨文入觀不離語言而得解脫者頓也如兵卒習一伎可殺一賊取一賞糊數口又市醫僅知一方可療一病取一直資厥身則聲聞緣覺是也若任大將作大醫者必盡知韜略遍達方味然後向無不克治無不驗圓頓行人通達萬法圓悟一心自行則無惑不破化他則無機不接今欲遍通一切法門雖三藏十二部言言互攝互融然必得其要緒方能勢如破竹為聖賢者以六經為楷模而通六經必藉注疏開關鑰為佛祖者以華嚴法華楞嚴唯識為司南而通此諸典又藉天台賢首慈恩為準繩蓋悉教網幽致莫善玄義而釋籤輔之闡圓觀真修莫善止觀而輔行成之極性體雄詮莫善雜華而疏鈔懸談悉之辨法相差別莫善唯識而相宗八要佐之然後融入宗鏡變極諸宗並會歸於淨土以此開解即以此成行教觀齊彰禪淨一致遠離擔板之病不墮數寶之譏可謂慶快生平卓絶千古者矣示萬韞玉受一非餘固為魔攝無端泛涉不入聞持既知心學淵源工夫次第則隨閲一書必徹頭徹尾巨細畢明庶無擇不精語不詳之患仍須捨盡舊時知見方有格外新得唯道集虛虛乃心齋儻陳見橫於意中一芥翳天一塵覆地矣示王簡在有出格見地方有千古品格有千古品格方有超方學問有超方學問方有蓋世文章今文章學問不從立品格始品格不從開見地始是之楚而北其轅也嗚呼習俗移人賢知不免狃一時耳目忘曠劫因緣非以理奪情以性違習安能洞開見地使文章事業一以貫之也哉示王心葵法華一經殷勤稱歎方便須知有世間方便布施愛語孝悌忠信等是也有出世間方便苦空無常無我不淨數息因緣遠離知足等法門是也有出世上上方便十波羅密四攝四辨八萬四千三昧總持等是也有不思議勝異方便信自性中實有西方現成佛道之彌陀如來唯心中實有莊嚴之極樂世界深心弘願決志求生不唯上上方便是其資糧將世出世一切方便無非往生左券此法門中點鐵成金手段不歷僧祇頓階不退名絶待妙法也示廣戒無量法門不出三學一往戒定屬緣因慧學為了因實三學之中三因圓具又次第則因戒生定因定發慧後後勝前推本則戒無定慧猶剋善果定慧無戒必落魔邪思之思之示慧含習氣不除無出生死分然習氣熏染非一朝一夕之故不痛加錐拶何由頓革須猛念身世無常幻緣虛假人道難生佛乘難遇失此不求度脫千生萬劫何期便將是非人我體面界牆身見慢幢愛染情性全體放下不復躊躇將如來出世要法徹底承當愛樂受持精勤趨向自然福慧增長日造深微而出要無奇正在平常日用間切不可離事覓理捨粗求精厭動求靜喜順惡逆或鑽他故紙認指為月或枯守蒲團釘樁搖櫓此近世禪講學人膏肓痼疾習氣最惡毒者設不深自省察力加剋除愈趨愈下無救無歸當知此輩若劣有微福必作魔家眷屬萬行若荒直感三塗劇苦吾人暗識相傳長夜不曉今得人身不值正法魔外充斥無從問津幸善根未絶獲聞遺教何容更悠悠視作等間生大慚愧嘗膽臥薪一念便應決斷想道不由別人也示定西儒者民胞物與盡此身命尚不可不弘毅況塵剎不隔毫端十世不離當念者乎夫真弘者聲聞緣覺權乘果位猶不足挂懷安問世間名利真毅者百劫千生不生一念退失安問現在境緣今時釋子只圖作宗法律師設無出頭一著雖頓超佛地者亦不顧矣本發心原非為菩提大道曠劫遠猷故一受戒兢兢鉢杖表相一聽講孜孜消文為事一參禪念念機鋒是務至應期禁足閉關等皆百年活計人世公案本分事千萬重矣彼於微妙佛道僅從經本上依稀聞解未嘗親知灼見終屬半信半疑於眼前活計未嘗諦觀三界空苦無常終覺放他不下雖學成語陵駕佛祖實一時高興或初生牛犢不畏虎或童豎戲劇自稱天王未嘗以佛祖自期也間有發勝志者不能到底唯為菩提一事或被名利改節雖云漸變初心仍是因中夾帶不可不慎思而痛勵也示一念不可不趨向者中行之道不可稍夾帶者鄉願之心然狂狷似與中行遠而實不遠鄉願似與中行近而實天懸良以學道所最嚴者在毫釐心術之辨佛法中亦有狂狷中行鄉願創自凡夫始聞妙法直下以諸佛自期乃至權乘小道亦所不願是名真狂既趨佛乘九界事業皆所不屑是名真狷了達心佛衆生三無差別以心即佛故上求無厭與大智相應以生同佛故下化無疲與大悲相應念念悲智隨四悉檀善自護亦善護他是名真實中行儻名關未破利鎖未開藉言弘法利生止是眼前活計一點偷心萬劫纏繞縱透盡千七百公案講盡三乘十二分教興崇梵剎如給孤獨園廣收徒衆如無相好佛無明業識不斷俱為自誑自欺況一知半解沾沾自足是望鄉願為極果僅成鄉願真因而已示元白學道一要真為生死二要具足剛骨三要開發見識無真實為生死心饒你有志氣力量只作世間豪傑斷不能為出世聖賢無真實剛骨饒你要出生死決被情欲牽熟境迷利名移奪魔患埋沒去無真正見識饒你怖生死勇猛直前必被邪師惡友引誘輕安少得縈惑或墮光影門頭或坐知見窠臼乃至或以味禪為功德或以空寂為家鄉極勝亦流入二乘權曲境界無由直趨菩提良由衆生心性雖與佛等無始迷妄積習深厚欲返本源殊非容易果能念念觀察世間苦空無常無我不淨下從地獄上至非非想總非究竟安寧地儻不誓求出要三界流轉有甚了期生不知來處死不知去處茫茫苦海言之痛心豈容為生死心不切既生死心切視世間一切事那件出得生死那件稍有真實便痛發省悟向千纏萬繞中努力一踴直得殺父淫母他家活計將無始恩愛眼前活計盡情割斷如悉達初出家即誓云設骸骨枯腐不盡生老病死之源終不返還如此志氣方不被一切業境奪去方名具大剛骨既離愛網專求出要必應甄別邪正洞明權實了悟頓漸若不遇真師匠唯應讀誦大乘深求至理不依文解義不離經穿鑿法法會歸自己處處體認心性自於真宗漸堪趨入儻遇明師良友不問聖凡但具正見知如來祕密藏者即可依之人放下身心不惜體面不辭勞苦不畏飢寒乃至不吝身命畢生服役咨稟法要自然福至心靈感應交徹如螟蛉克肖時雨化生以得親近善知識故則能親近最上妙乘以得習學上乘法故則能出生廣大圓滿智慧切莫高推聖境自處凡愚戀剎那幻境忘曠劫遠猷自暴自棄非才之罪也重説偈曰佛性衆生性一性無二性迷之沈六道悟之為三乘迷雖無量惑厥病唯有三一者戀世間不知世間苦二者雖知苦苟且自因循三者雖勇猛得少便為足以此三病故長夜在生死或復出生死亦墮權小乘我依諸佛語為設三妙藥一者怖生死對治根本病念念如救頭莫復存餘想二者奮剛勇降伏愛見魔五欲不能牽八風不能動三者開正見遠離諸邪曲根選擇圓通現生成正覺此三或自具或復藉餘緣唯有明師友名為真實救策發生死心鍛鍊純剛骨開示真實乘令行稱性修修性不相離斯名正覺印迷性言修習修墮有為功廢修談法性自然外道同是故佛與祖垂訓咸雙顯雖或性奪修而非不修習雖或不言性而性在修中性非修不顯修非性不立但以生死心勇猛不退心廣大弘遠心親師習正法必能親悟入知我言不誣示法雨悲智相應名菩提心發此心已方得無作戒又須二六時常自省察念念相應即念念成佛稍不合便於菩薩戒得失意罪在慎思而力行之示西瞻有三障能敗戒德使信心退沒一瞋恚橫於自他而生惱害二我慢於諸僧寶而生輕忽三懈怠於諸妙法不肯學習三法有一牽入惡道忘失信心示費智瀾學不難努力自修難親近知識不難高談名理難實踐躬行蓋單恃己靈錯修多端尊師取友熏習成性空談玄妙畫餅不益飢腸剋實行持觸處無非緣了願以放生寡欲為要長壽之因養身之道能達無緣大慈成清淨梵行以此銘心久久自成法種示慈門達磨一宗超情離見迥出格量近世各立門庭競生窠臼認話頭為實法以棒喝作家風穿鑿機緣杜撰公案謗讟古人增長戲論不唯承虛接響且類優人俳説言之可恥思之可傷唯憨翁具金剛眼鑒時流弊説方便語作救病藥寧注經造論以觸時諱終不據曲盝木弄鬼眼睛使狂穢藉口噫此大菩薩護法苦心也開士侍大師又遊雲門博山間夫識取綱宗本無實法藥非定藥病非定病善用諸方短處皆成長不善用大師長處亦成短學人不具參方眼才除一病一病旋生須脫流俗窠臼的向腳跟下打透真禪真教真律方不負為大師親侍也示彭雙泉既具生死心參方眼不可不及時努力隨事著眼從緣薦取夫本地風光雖沈埋而處處迸露只為眼遲腳慢錯過多端能向塵勞輕輕覷破菩提涅槃正在煩惱生死中全身顯現若的見菩提涅槃正因真性便能稱性起緣了二修今於緣了二因拈出最要二種為出生死方便一發菩提心受菩薩戒二熾然作福於正因拈出最實一事為歸趨之方所謂淨土以二要行趨一實地隨觀行淺深任運淨於四土至三惑盡二死亡則究竟寂光上上品也示象巖如來謂出家三種事業坐禪讀誦營衆福業隨修一種皆超生脫死成就菩提而修必隨機藥病不投徒增穴結或一門到底或展轉助成然自無道眼須善友教如重病者須信良醫若信己意應服不服應忌不忌小疾尚致死痼疾寧有瘳今時喪心病狂無恥禪和影響竊掠聽其言超佛祖之先稽其行落狗彘之下復有一輩怯弱之人我相習氣放不下名利關鎖打不開希望討一適性便宜的路頭不肯徹底向一門中透去禪不禪教不教律不律行門不行門依稀倣佛將就苟且混過一生毫無實益百千萬劫依然還在生死若的確求出生死證菩提先將近時禪講流弊盡情識破自己從來杜撰主意盡情放捨軟暖習氣盡情打掃乾淨夢幻身命盡情拌得拋得種種惡逆境界盡情看作真實受益之處名利聲色飲食衣服讚譽供養種種順情境界盡情看作毒藥毒箭能如此降伏不坐一炷香看一句經保出生死有分儻不痛處加錐欲向法邊起見假饒坐斷八萬四千劫通盡三藏十二部經只好向無事中過日一遇順緣依舊牽去一遇逆緣依舊打失一不覺察依舊落在無記如何出得生死到得西方成無上菩提圓覺經云末世衆生無令求悟唯益多聞增長我見但當精勤降伏煩惱須知坐禪讀誦作福皆可增長我見可降伏煩惱但審自己何事最切近最對病根今在汝數年作學問不成一旦願齋僧而就便是夙緣有在又身見重者宜苦行消之貪愛強者宜苦境鍊之人我山高者逆緣挫之體面心重者忍辱治之一意向此門打徹自能遊戲百千三昧通達無量法門較枯守蒲團咿唔章句不可同劫語矣示韞之討究佛法第一要務諸佛所師所謂法也況弟子乎雖勝義法性貴在親證儻非黃卷赤牘作標月指示真實修行出要何由得證勝義試觀外道亦出家求出生死不知正法求升反墜故不留心教典饒勇猛精進定成魔外脅尊八十出家晝觀三藏夜習禪思乃有濟有謬云年少力強宜習教典年衰力弱只堪念佛豈年少不必念佛年老不可習教將謂如來教法僅同舉子業博名利於半生者乎一歷耳根永為道種大士所以捨全身求半偈也今佛法流布賴迦葉阿難二祖徹底悲心人皆視作等間殊不知恆沙世界無量劫中妙法名字不可得而聞也示閲藏四則一須體如來説法本意要人超生脫死非為口耳活計句句消歸自心如説修行方不受説食數寶之誚其一一學問之道貴下學上達所以如來施教必有次第今人空腹高心但圖圓頓之名無力飲河詎能吞海必先閲律藏稔知佛世芳規深鍊為僧要務次閲四阿含了正因緣境為圓妙三觀之本次留心台教深知如來説法所以然之妙及四悉檀巧被之致然後將此法界匙鑰遍開不思議經論之鎖勢如破竹矣其二一閲律首四分次僧祇次十誦次根本次五分次及善見毗尼母等諸家傳受不同各有源委線索須細尋之無執一非餘亦無猶豫兩楹在得意善用大意如問辨所明莫謂此小乘法不足久久留心當捨之別參上乘是末世癡人邪慢惡見牽人墮惡道深坑不可信也其三一大小經律論雖字字明珠言言見諦然各就習氣所重對治所宜或隨時弊不同救拯有異不妨摘出要語期自利利他如雪山無非藥採者期於對病寶山無非寶取之先擇摩尼只此成録足驗手眼其四示朗融萬法本融由迷情執而成礙如一指能蔽山嶽認漚必遺大海不惟埋沒己靈亦冤屈六塵境界詎思六塵非能惑人人自妄惑根根幻馳識識紛動仔細推求塵既不居其咎根亦豈職其愆識寧獨當其罪三科分析既無真主縱令共合那有實法而於此虛妄法中著我著人分取分捨猶如捏目亂華發生更欲分別花相妍醜大小不益惑乎惟將身心世界全體放下作一超方特達之觀譬如為天下者不顧家則智眼昭明一切境界無非真實受用處矣示三止惺惺寂寂是無記寂寂非寂寂惺惺是妄想惺惺非此四語叢席爭誦然悟惺寂源頭方不墮守精魂窠臼如儒亦言明鏡止水豈慎獨便是奢摩他妙修行路邪祖云觀者何人心是何物此二語直得遍計妄想百雜粉碎以此體真以此方便隨緣以此息二邊分別一句中有三玄一玄中具三要喚甚麼作獨將誰去慎不惟妄想無記無容身惺寂亦并無處著落非惺非寂是謂寂寂惺惺惺惺寂寂喚作不二早已二也況雙修並運哉悟此成修是一心三止示文約做工夫人每被昏散所擾久便退悔不知昏散根源全由迷己作物楞嚴經云認悟中迷晦昧為空乃至昏擾擾相以為心性夫昏障慧擾障定定慧既障則睡眠與散亂雜呈若欲去其根源須識取心性本體從來明靜諸佛證之為定慧行人修之為止觀止觀之功全即明靜之體惟靜故明惟明故靜既非二致豈有前後但約對治法門昏重者觀起之散多者止息之然息散之止非無觀起昏之觀非無止止觀不二勤修不息自然本體漸露客塵漸銷者著工夫不段間斷不得性急不得然欲除昏蓋直須打起精神不可貪戀蒲團穩坐欲除散亂正不必厭惡妄想直須覷破妄想無性僧問巖頭起滅不停時如何咄是誰起滅此明心見性者第一先鋒也示慧幢豫讀子輿氏書至舜盡事親之道而瞽瞍底豫見圓頓觀心要旨焉夫父雖至頑不可別覓他父又不可如傲象之順命為惡現前介爾一念無明頑父即法性真父順無明流造業流轉則是傲象捨妄覓真別觀法性又成背父逃逝善惡稍殊均為不孝六道凡夫順無明而為惡者也藏通別三種行人捨無明逃逝者也若知焚廩掩井之瞽瞍即允若底豫之瞽瞍則必盡事親之道於己躬肯作順逆兩法以虧天性邪所謂盡事親之道者亦只深信父實生我除此父外別無真父然斷不可從命為惡須竭怨慕之誠以格之則頑如瞽瞍亦可回心況未必如瞽瞍者哉觀心亦爾深信現前一念全體法界離波覓水終不可得然斷不可隨其生滅不事觀察須以不思議一心三觀深體達之則惡無記心尚成不思議境況善心哉知一念圓具三德事理兩重三千互遍互融深生信解名為慕此境不現是止觀力微發勤精進誓以十法成乘名為怨如此努力鈍逾般陀發明有日儻悠悠忽忽縱利如藍弗敏過達多無濟也示未能夫幻境侵奪不惟順流俗而俱化也即厭流俗而切思遠離亦名侵奪以一切境界全是無明變現無明變現之性全即法性由不達故橫生欣厭趨無上菩提者不得隨順幻境亦不得厭離幻境但了幻境即法性悲長夜之在迷以悲迷故起無作二誓欲拔性德之苦以了性故起無作二誓欲與性德之樂發此心已則一切不如法境界觸目警心無非助發菩提資糧起信論云菩薩見法欲滅護正法故發菩提心有見衆生苦而發菩提心正謂此也示慈昱佛法大海信為能入智為能度信如堅舟智如柁師餘五度萬行皆舟中器具也須時時念生死苦警悟無常不得沈迷五欲執著世情知世情定了我生死不得五欲定牽入放逸坑墮惡道苦此生死長夜中真實信心發此心已急求智慧以為導師第一親近明師良友第二讀誦方等大乘非明良決不能益我身心非大乘決無有出世正楷人有信心而無智慧則能增長煩惱有智慧而無信心則能增長邪見故知船及柁師相須度險缺一不可況俱乏邪示迦提法華妙旨惟令衆生開示悟入佛之知見佛知見現前一念心之實性是也現前介爾一念不自生不他生不共生不無因生未生無潛處欲生無來處正生無住處生已無去處心無心相其性無生無生故無住無異無滅無生住異滅即真法性橫遍豎窮不可思議若於此無相妙心妄謂有心相可得則佛知見便成衆生知見若即妄相幻心達其本非有相則衆生知見便成佛之知見心性既舉體全空亦復即假即中以三諦宛然故三觀法爾以法爾之三觀照宛然之三諦能所不二境智互融於此信解名為隨喜解義觀文名讀誦轉示他人名講説歷事煉心名兼修正修有相無相二安樂行一串穿卻秖貴篤信力行別無奇巧方便也示乳生夫置身海州而伯牙善琴其情移也望似木雞而餘雞卻走其神全也世間小技尚非聊爾況學出世太道仔肩如來正法者乎圓頓十乘觀法必先以二十五前方便所謂具五緣訶五欲棄五蓋調五事修五法就二十五事各具表法及觀心法門然後正助合行事理雙備足目並運安隱入清涼池後來禪士講徒率情任意逞一得之見罔達大方軌則以此蔑裂學問求世伎術戛戛乎難之投足宗教兩塗思自利利他誠奚望也真正學人必先移夙情則神自全情之所牽雖萬別千差總不出色聲香味觸五種神之所虧雖受病不等總不外貪瞋睡掉疑五種急須訶棄則聖賢可階梯而至矣示懸鏡奮發之心人皆有之不能不藉於外緣羞惡之心人皆有之不能不汩於惡習嗚呼善友罕逢惡緣偏盛非咬釘嚼鐵刻骨鏤心何以自拔哉
