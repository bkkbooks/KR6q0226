body:
  text: 書二簡韓茂貽紫柏集點完此老以博地凡夫力戰煩惱魔軍一生取辦真踞地獅子透網金鱗也今觀其法語精悍決裂猶足令頑夫廉懦夫立柔情媚骨不覺冰消瓦解幸細細留心必羹牆寤寐見之復九華常住向年托迹寶山於一切精律行者作地藏大士想即一二不拘小節者亦作志公濟顛等想聖道場地龍蛇混雜凡聖交參不敢以牛羊眼妄測自招無間重罪也適聞山中稍稍搆難雖大菩薩示現作略然經云寧破千佛戒莫與外人知又世典云胡越人相為讎敵及乘舟遇風則相救如左右手九華實地藏慈尊現化地山中大衆無非地藏真實子孫不知歷幾劫修行到此名山福地乃為小小一朝之忿遂使智不若胡越同舟非所謂一芥翳天一塵覆地者邪不肖智旭少時無知毀謗三寶罪滿虛空仗地藏大士深慈厚願拔我邪見令廁僧流故今日稱地藏孤臣山中大衆皆吾幼主臣無輕君之念而有諫君之職惟是誠惶誠恐稽首頓首遙向寶山披陳忠告惟願衆師各各捨是非人我之心念法門山門之體同修無諍三昧永播大士道風古人云官不容針私通車馬又云家無小人不成君子縱有實非大士真正眷屬亦須慈恕令其漸種善根可也與王季延淨業障經的是佛説毫無可疑請試言之佛廣度一切衆生如大醫王亦如大仙能起必死之證非循行數墨者可思議也大般涅槃為阿闍世王懺罪與此經同所謂實相懺無生懺直枯罪源罪流自涸如翻大地樹何所依大佛頂經云卻來觀世間猶如夢中事摩登伽在夢誰能留汝形又云尚無不殺不盜不淫何況更有殺盜淫事皆是此旨良由阿闍世王與今無垢光比丘及過去勇施比丘此三人慚愧恐怖急切悔過之心無異故對治妙藥亦無異耳良醫於無名腫毒初炙不痛者炙至極痛而止初炙即痛者炙至不痛乃止不如是病不能療也毗尼藏中訶破戒為斷頭法是不痛者炙令極痛此經及大涅槃經明罪性本空是極痛者炙令不痛如是妙法但為無知誤犯者作救命神丹非為談空行有者資牙慧口實所云觀於犯即是不犯等者只此觀之一字幾許慧解幾許功夫譬如鑽木出火火出則木必盡儻犯戒心分毫未盡豈名觀於犯即不犯哉固知此經真大乘圓頓無上法門秖就路還家不改絃易轍與華嚴法華涅槃等經同一線索是故能令犯者聞之罪根永拔未犯聞之永不復犯譬如靈丹一粒不論有病無病但肯服之可輕身遐舉何止延年益壽而已儻讀此經不永離淫殺等事與不讀一般如遇靈丹不服身嬰重病豈靈丹卻致病邪設無慚人欲援為例請語曰汝犯戒亦如二比丘出不得已乎既犯後如二比丘恐怖發露急切求哀乎縱求哀如二比丘遇佛菩薩為説法乎縱聞此法如二比丘隨文入觀頓悟無生淫心永斷乎彼達法空已淫習永除一成佛於未來一成佛於現在然殺人之報或因中即償或成佛方受如金槍頭痛理必有之善夫古人曰如何是本來空業障是如何是業障本來空是故知大徹悟人但可不墮地獄決無不償夙債之理師子尊者神光大師僧肇巖頭等歷歷可據非遍閲大藏深明教眼宗眼未可輕議也至現在無垢光比丘偶與過去無垢光佛同名如觀世音菩薩與古觀音佛同名迦葉比丘與古迦葉佛同名奈何混而一之所云開元附秦録者唐開元重敘藏目偶失譯師之名相傳姚秦時譯仍附秦録藏經失譯名者頗多未必皆偽不當以此為責嗚呼末世狂禪罕知教典依文解義法師又無真正手眼鼠唧鳥空遍於寰宇居士能如此留心可謂優曇鉢華矣然真正經王須闡幽旨以示未聞方見維摩大士作略儻粗浮涉獵輒云可疑魔王聞之踴躍歡喜關係亦不小也與忍草身病易治心病難遣古云克己須從性偏難克處克將去慈雲大師亦云行人各有無始惡習速求捨離當自觀察何習偏重訶棄調停取令平復勿使行法唐喪其功夫惡習豈惟殺盜淫妄而已二六時中四威儀內苟可動人念頭者最能折福損壽也復吳聿修青龍鈔豈可與妙蓮玄文同年而語蓋未悟時搜索擬議決無當大道故德山云窮諸玄辨似一毫置於太虛竭世樞機似一滴投於巨壑丈夫出詞吐氣真實不欺如此可謂太煞明白何反代為瞞昧妄擬於如虛空如大海之玄文且疑一燒一不燒邪末世迷人看語録往往有此等惡習不思比擬稍失當金剛法華皆可燒矣謗法之罪亦大可畏哉請燒卻德山手中陳腐枯藤此一言之失不難知也復閻淨士文字性空故淹貫三藏元無一字非以不識一丁為無字也末世無聞比丘借達磨不立文字以掩其拙亦可嗤矣非知之艱行之維艱固然又復應知非行之艱知之更艱不知而行墮坑落塹佛頂十卷最勗修行而以先開圓解為最初方便圓覺經文殊普賢二章亦先開解大乘止觀摩訶止觀等書無不皆然參於學問思辨篤行之旨若合符節矣修行之法如調琴絃緩則不鳴急則聲絶勿忘勿助庶循循進道也正修行路必以空觀為主痛快直捷莫若毗舍浮佛半偈熟讀默思使淪骨浹髓紫柏全集幸覓觀之得此法印可辨邪正不被今時邪師所誤矣與智龍顛沛患難是煆煉佛祖英靈漢一大爐鞴能受煆煉便如松柏歷歲寒而逾堅不受則如夏草春花甫遇風霜頽靡無似矣夫松柏花草稟質不同不可強也現前一念靈明心性豈有定質只貴當念自立將身心世界一眼覷破平日晏安粥飯習氣一力放下便向刀山劍樹遊戲出沒有何艱險縱身心世界情見放不下而身心世界未嘗不是空花縱晏安粥飯習氣除不得而業運臨頭何處保得晏安粥飯如意千經萬論皆磨礱習氣之具習氣不除學問何益不能親明師良友受惡辣鉗錘徒覓幾部好佛法靜靜間坐燒香啜茗而披閲之此措大學問尚不可為世間聖賢況佛祖哉佛祖可如此悠悠而得善財常啼真千古極拙人矣何為華嚴般若之榜樣也與體境出家大丈夫事非王侯將相所能然不難有始難於有終故因果之邪正必四句料簡應日慎一日臨深履薄期到真實受用處萬勿大膽粗心中塗狂惑從袈裟下失人身也切囑切囑寄丁蓮侶淨土一門有名無義久矣居士躬行實踐為緇素標榜此阿彌願光所映發也但末世往往視作曲為中下不知其至圓至頓普被三根須將妙宗鈔及西方合論二書深玩熟思庶可破邪計耳復轉依指戒生來具見接引然納是嶽武穆非淮陰侯也用九一向粗浮墮時文惡窠臼裏大乘性相都作語言文字會去待被禪宗菲薄方思結制觀心觀心之法甚不易言近代宗門多發足問津唯台衡知津發足修證塗轍不啻什伯相倍只恐不是教下真種草真種豈被禪宗菲薄亦豈畏菲薄者若是台宗真種世語外籍皆不相違豈有輕唯識而不屑學者可憐衆生情見封迷絶無超方手眼才入台宗便染台宗重病才入禪門便染禪門重病未得清先得隘未得和先得不恭求不沒於時流者幾何人大丈夫出家不拌二三生埋頭徹底輒希十年二十年後弘教揚宗修天爵以邀人爵終必亡而已矣復程用九圓頓行人春夏秋冬無非觀心之期晝夜六時無非觀心之會行住坐臥無非觀心之事説法聽法無非觀心之緣若必待冬期結制而後觀心則三時講演仍説食數寶矣講聽時不與心觀相應觀心時亦決不與教理相應若是縱百春夏秋講經百冬觀心到底是兩橛事書生粗浮領略無超方出格知見出言鄙陋從來可歎經云人命在呼吸間儒云才説姑待明日便不可也唯居士一向不肯當下隨文入觀妄謂一切人皆不能當下隨文入觀耳當痛思力改莫作矮子看戲文句當也寄善超世出世法孝慈第一以慈心而修孝行可順父母格鬼神況出世師長乎勉旃無任情率意也寄王古學丈夫不難高明難於精細苟精細則儒理釋理可分剖同異之致宗眼教眼可坐證合一之源矣與沈甫受甫敦占察行法蒙昆玉梓梵册而不肖屢結壇俱不獲清淨輪相此可信天下後世邪今誓作背水陳掩死關禮之十二頭陀經俟後或敢著筆今沈船破釜時未暇作空頭話也與聖可不肖三業罪過不少雜亂垢心豈致清淨輪相爰發慚愧退作但三歸人誓不為師作範誓不受人禮拜誓不出山誓得清淨輪相不論百日千日六年九年畢死為期辭嘉興事竟嗣當辭留都事也與了因及一切緇素宋儒云才過德者不祥名過實者有殃文過質者莫之與長旭一人犯此三病無怪久滯凡地不登聖階也旭十二三時因任道學而謗三寶此應墮無間獄彌陀四十八願所不收善根未殞密承觀音地藏二大士力轉疑得信轉邪歸正二十年來力弘正法冀消謗法之罪奈煩惱深厚於諸戒品説不能行癸酉中元拈鬮退作菩薩沙彌蓋以為今比丘則有餘為古沙彌則不足寧捨有餘企不足也夙障深重病魔相纏從此為九華之隱以為可終身矣半年餘又漸流布浸假而新安而閩地而苕城檇李留都虛名益盛實德益荒今夏感兩番奇疾求死不得平日慧解雖了了實不曾得大受用且如占察行法一書細玩精思方敢遵古式述成仔細簡點並無違背經宗乃西湖禮四七不得清淨輪相去年禮二七不得今入山禮一七又一日仍不得禮懺時煩惱習氣現起更覺異常故發決定心盡捨菩薩沙彌所有淨戒作一但三歸弟子待了因進山作千日關房邀佛菩薩慈悲拔濟不然者寧粉此骨於關中矣與沈敬園聞楊乘乘與笑禪師齟齬夫參知識須領其所長不責其所短法門深遠等覺未盡況今時知識邪法中起過福反成罪幸同往釋此芥蒂法門幸甚復韓朝集境苦生厭此苦諦慧也厭苦則不敢造業此集諦慧也因不生則果不生此滅諦慧也殷勤知悔即道諦慧也須陀洹所見見此而已阿羅漢所證證此而已捨戒不如法不必疑已捨矣但有世間性罪安更有犯法罪受戒不如法舉世皆然亦不必疑但如法行一日便有一日功德瑜伽師地論言之甚詳時當末世不可以正法為例故也夫犯戒造惡固有罪矣念佛書經獨無福乎均是佛言何一信一不信甘墮憂疑坑中邪悔得當則名勝行過其宜則成悔蓋千經萬論只要人直下安心安心無術只知法無性而已般若謂過現未來心不可得華嚴云心不妄取過去法亦不貪著未來事不於現在有所住了達三世悉空寂仁者聞之熟矣胡不時時觀察乎淨土痛快直捷廣大圓融至頓至易無機不收無罪不滅仁初發心便知歸向胡三十餘年猶半信半疑特録往生公案二則以助信力萬勿更躊蹰也但觀察現前一念緣起無生罪源自涸此事甚不難人看得難耳復唐宜之妙宗鈔一書不可動一字蓋大小彌陀經普被三根注須通淺深此經專被韋提希等圓頓大根令現悟無生忍儻作是一心之旨未徹斷無依事修觀之理雲棲謂心粗境細妙觀難成本諸善導等諸大祖師信非臆説旭謂宋時根性稍利四明發揮猶略若今大師復作只可詳釋何容節要大匠不為拙工改廢繩墨羿不為拙射變其彀率此係不小儻圓解不十二分透徹便欲作觀未有不招魔事者唯持名一法千穩百當而圖經及妙宗鈔姑與人結圓頓種或衆生根性不可妄測亦自有能解者若解決不嫌多若未解刪之於彼何益且刪淺存深初機益不能解若刪深存淺大違經宗進退思之萬勿萌此念也答蓮勺翁出家當紹蓮大師法脈往者雪公不耐鉗錘甘心小就楊生志大才美因地欠真皆作古人良可歎悼旭福鮮障深聊作村學究句當賴二三童蒙未染近時惡態僅種金剛種子儻先有成見者任掉頭不顧而已自愧百煉千磨終未斷惑證果而具縛凡夫以肉眼作佛眼用若教若宗得無纖毫疑滯故著述甚多皆可考諸佛祖而俟百世此真自信非天下能瞞盰也承示心經口義別具見學富才華儻欲壽梓不妨再酌法門至誼無容獻諛知不見罪耳答韓服遠尊恙鬱痰所致鬱又從勘境不破所致也種種逆境可動心忍性增益不能皆所以成就自己而已世道交喪儒門久已無人願足下矢志為君子儒近世學佛人才聽講只思做法師才不思做法師便不肯究心佛法學儒人才讀書只思中進士才不思中進士便不讀書殊不知讀書是為聖賢正路研究佛法是成菩提生西方正路也哀哉然佛門猶有一二知成佛者儒門絶無一人思為聖賢世安得不亂亂安得復治邪足下果發起決定為聖賢心而釋迦不暗中摩頂孔子不晝夜擁護無有是處復張中柱儒釋二學到家雖別入門大同若云尊德性而道問學即全性起修之謂也若云下學而上達即全修顯性之謂也未有不圓悟心佛衆生三無差別可言修證工夫者亦未有不深修十乘妙觀可階究竟極果者是故近世苟簡法門最易湊泊最難到家佛祖無上心印最難入手最易成辦溈山云此宗難得其妙切須仔細用心可中頓悟正因便是出塵階漸生生若能不退佛階決定可期上古宗匠之言類皆斟酌穩重若此豈以一棒一喝一句一偈謬作極則者邪承問諸書大乘止觀性相總持實與佛頂玄文唯識心要二書相為表裏苟留心既久得其血脈一代時教思過半矣小止觀可依行持摩訶止觀淵深宏博須輔行並觀禪波羅密門所詮禪法工夫稍得力即取看之可也六妙門維摩疏二書久錮海東儻仗鼎力復照此地乃千古奇事日夜祝之復陳旻昭力疾草法華會義七旬告成然每一念及佛道深遠未嘗不涕淚交流昔溈山三作國王遂忘宿命戒老一念偶誤復為坡仙證斷之難固不待言矣又憶經中阿難白佛十二因緣特易解耳佛語阿難莫作是説除佛一人餘不能盡因緣性海也遂舉往事以訶之昔有阿修羅子語其父曰大海特淺淺耳父曰我身長七千由旬以幻術故變為十六萬八千由旬乃窮其底汝年幼身僅七百由旬又未有幻術何藐視此海邪子不信投身入海沒溺洪波幾至喪命父以幻力接出喘息僅存佛語阿難往昔阿修羅王即我身是阿修羅子即汝身是汝昔輕視大海而受疲苦今復於我法中輕視十二因緣甚深法海當招惡報於是阿難慚愧改悔誓不於法起輕易想至如來滅後方辦大事傳佛心宗此解悟之難又豈容藐忽哉念此二難方切悲痛謬辱獎譽以為義句兼到解行雙圓不益令我置顏無地邪復導關吾人本分中事如飲水冷暖自知然有先飲水知令暖者分毫瞞他不得所以十乘觀法須知次位儻有觀無教未有不墮增上慢者既四楞塌地不同迷時法華轉便可恆轉是經隨文入證方名不雜用心儻不看一字則此一字仍是礙心之物豈虛空已碎一字尚未碎大地已沉一字尚未沉看則便被他雜不成一片邪幸細思之當噴飯滿案也復達戒勤心作福不可但貪清間少年清間是不祥事非折壽則損福於清間二字作毒藥想方有少分出生死路背經雖好非出家正務周利不誦半偈深證二種解脫提婆在家通十二韋陀出家通八萬法藏無救阿鼻地獄三大劫苦牛飲水成乳蛇飲水成毒智學成菩提愚學成生死不可不深思也復松溪法主癸亥春拜見幽溪尊者時正墮禪病未領片益戊辰冬遇歸一兄方悔向日當面錯過曾刺血書一然香供師伯文寄至台嶺屈指二十二年矣台宗一脈我兄勇猛仔肩次達月管公亦復半壁觀彼會合玄籤一字弗敢稍易知不墜家風也如劣弟者少年誤中宗門惡毒放恣之習淪骨浹髓今雖痛革餘習難除故私淑台宗不敢冒認法派誠恐著述偶有出入反招山外背宗之誚近述法華會義因留都久染知音大窾酸臭氣味絶不知權實本迹綱宗況得觀心悉檀四益語以三大五小甫展卷無不望洋而退不得已竊取文句妙樂之旨別抒平易顯豁之文聊作引誘童蒙方便耳消文分句不無小殊教部時味敢有他議哉然置弟門外不妨稱為功臣收弟室中則不免為逆子知我罪我聽之而已與唐宜之讀修行會義序知有卓見但曰修行須修般若般若以實相為體觀照為宗無住生心為因究竟種智為果經云於法實無所得不可以三十二相得見如來無有法得菩提故然燈授記皆指示初下手時以無所得為方便之觀門所謂應無所住而生其心者也居士反判作第一義諦一可商也論云不離佛世住供給如來住求佛教授住皆點明菩薩位中分得真實受用所謂漸住究竟種智者也居士反判作忠恕之語二可商也請以喻明黃帝失珠罔象得之今於法實無所得等皆罔象之求也可竟喚作第一義諦乎不離佛世供給如來求佛教授皆玄珠之異名也可喚作切實功夫乎雖王文成云喚戒慎恐懼作本體亦得喚不睹不聞作工夫亦得然戒慎恐懼畢竟是達本體之工夫猶所謂於法實無所得等不睹不聞畢竟是工夫所顯之本體猶所謂不離佛世住等若直以實無所得等為第一義諦何異偏空不離佛世等為工夫何異著相以著相工夫求偏空義諦是背般若豈修行般若哉此等關係迷悟攸分儻肯細細理會一番不唯更有一番真實受用即古人鼻孔亦決不向文字同異中卜度矣納近重閲大般若六百卷見其義趣愈博愈約無法不從此出無法不歸於此六祖所謂法法皆通法法皆備而無一法可得者正以無一法可得故法法皆通法法皆備也無一法可得最上乘下手工夫法法皆通法法皆備最上乘圓滿本體也設有一法可得則被此一法所礙不能法法皆通法法皆備矣如唐太宗設不拌喪家亡身何得富有天下直至富有天下即以天下為家天下為身亡身家者為莫大身家是故於法實無所得則恆不離佛世不以相見如來則恆供給如來無有法得菩提則能求佛教授如此方名修行般若方可降伏其心方為住所應住不然依文解義三世佛冤縱行六波羅密百千萬劫以有所得為方便終名遠離甚深般若而已向謬述破空論破今人之得空故也若無所得則不得有亦不得空亦不得無所得何所可破哉答唐宜之二書問意請直言之紫柏之問為要問切問妙問坐斷咽喉問立斷命根問向彼問處著眼十個有五雙悟道居士之問為呆問迂問戲問不達理路問佛所不答問若向此胡思亂想十個有五雙發邪經明不應思而思不應問而問反成毒智也夫六百卷般若心經該之心經二三百言照見五蘊一語該之照見一語色心二字該之凡所照者無非色攝凡能照者無非心攝而能所無性由妄念立故瞥爾一念則為色心本源究此一念瞥起起處無從全依真性然真非妄因何因起妄真非有外妄豈外來展轉簡責畢竟此妄從何瞥起此銀牆鐵壁真疑情真話頭也不論年月時劫只有此個疑團眉毛與大地廝結會須討個分曉老鼠入牛角尖定有倒斷處又如鼠咬棺材不穿不歇如此疑去勿忘勿助機緣到時噴地悟去方知世界身心本是翳眼空花本來不生不復更滅那得更有無始劫前最初起念之由可問如癡人説夢也就此噴地悟門復分淺深邪正須略言之有人得此坐斷兩頭消息便謂一空永空無復修證可論則為惡取空見反墮大坑有人得此了知身心世界皆如夢影執著漸輕修行漸進則為乾慧有人得此知身心世界雖如幻影唯有真心不生不滅為一切生滅所依由是雲興六度萬行助嚴真心自他兩利則為中道正信有人得此了妄無生全是性起真性不生不滅則一切法當下亦皆不生不滅真性具一切法造一切法一切法亦皆具一切法造一切法遂見法法互融互具互遍互周雖復重重融具遍周亦無所在雖無所在而無盡無盡法法宛然是謂具縛凡夫能知如來祕密之藏雖是肉眼即名佛眼從始至終以此佛知佛見而為修行直至圓滿菩提歸無所得中間永無諸委曲相溈山云此宗難得其妙切須仔細用心可中頓悟正因便是出塵階漸生生若能不退佛階決定可期此之謂也豈似後世講士妄計積功纍行不明平等法性又豈似今時狂禪妄計即心即佛不知差別義門者邪然欲發妙悟或從思入或從聞入事非一概但先滌舊時知見令淨盡無餘方堪有新益耳其一狂言駭聽乃蒙嘉納且承不棄賜以忠告字字金錍可銘可戴嗟乎惺兄逝後久不聞直諒之言矣今何幸得此於老居士哉雖習氣深重當數數念此良藥漸有瘳也生平過失多端不止動氣輕喜二種尤望不吝直言令我改革但動氣一事有大不得已處夫五百弟子各説身因雖皆非佛意而各稱善説者以入門不同到家則一又未知佛實意皆順佛權門故不妨也儻如楊墨充塞仁義則孟子必為之懼遑恤好辨之譏哉所以慈明慢罵諸方大慧痛訶暗證罹大禍而不敢避是或別有一道不可以雲棲竹林之法例之也雖然不肖力學不怒之威居士深諒折肱之苦庶幾允當也乎寄達月法主尊者台宗獨步不唯近接幽溪之緒實遠繼荊溪之教非同皋亭一派有名無實也曾聞台門多順子乃即中之門何以有躍冶之金邪憶甲戌春見金若采法華百問時一笑置之不意歷年七周未摧斧鉞今且梓成何肆無忌憚至此雖鄙陋淺惡亦有一輩生盲輒從其教在尊者已不屑誨其如害愚小何昔世尊於提婆達多之逆必遣舍利弗廣向王臣説其過罪尊能獨默然邪某睹茲僭竊悲出肺肝自附於沐浴請討之科姑直批彼邪問呈諸方丈法道陵夷斯時為甚壞正教者不止一金氏尊者向現居士身已作人天重望況今儼然沙門儀表釋迦智者荊溪實式臨之何容諉其責也與見月律主律學之訛將及千載義淨懷素二師既沒能知開遮持犯輕重緩急者絶無其人近世愍忠大慧律主頗糾正小半猶未復佛世芳規旭又薄德鮮福不足取信於人寤寐永歎涕淚交流大廈將傾決非一木所支邇聞座下奮金剛志秉智慧炬革弊遵古喜而不寐冀獲良晤盡獻片長以益明聖塵歸大地水入滄溟座下既得盡善盡美旭亦無遺珠刖璞之憾矣今夏細商集要一遍遂重治成稿卷帙較舊不多而刪繁補要頗為精鍊并聞之具眼者與劉純之此一大事因緣積訛已久伶俐人往往意見湊泊氣魄承當如余集翁輩可為殷鑒五燈花一書豈不為千古具眼者笑邪陳旻翁深心弘護肉身韋馱但本分中事有時精細巧妙不愧古人有時粗疏抹過尚不堪與座主提草鞋亦未經陶鍊耳渠於法門極為在行絶不承當悟字甚討便宜然微窺其意遠不如做秀才時之虛心矣世間科第果能埋沒賢豪者邪可畏也復張中柱承諭世俗通病唯喜熱鬧道場誠當世師資頂門一針晨昏佛號悲咒便是宦海慈航自利利他法皆具足只恐含元殿裏更覓長安然丈室留心圓頓教法決不同近日伶俐士夫得便宜處失便宜也寄錢牧齋今夏兩番大病垂死季秋閲藏方竟仲冬一病更甚七晝夜不能坐臥不能飲食不可療治無術分解唯痛哭稱佛菩薩名字求生淨土而已具縛凡夫損己利人人未必利己之受害如此平日實唯在心性上用力尚不得力況僅從文字上用力者哉出生死成菩提殊非易事非丈室誰知此實語也復錢牧齋濟雲鬥諍不啻小兒戲閲儒釋宗傳竊議可付一笑矣續燈事遍集明朝語録乃可成之非朝夕能辦未填溝壑當以三四年為期也著述須實從自己胸中流出方可光前絶後設非居安資深左右逢源縱博極群書遍採衆長終是義襲而取不可謂集大成也大菩薩乘願力闡正法須如馬鳴龍樹智者清涼立極千古若圭峰長水輩雖各有所得猶未免為明眼簡點況其餘哉乞丈室裁之憨大師性相通説久為教家嗤笑無能為害達大師以能所八法所成釋性境二字不過承魯菴之訛習而不察白璧微瑕耳交光用根一語毒流天下遺禍無窮非一言可罄宗鏡對畢乞寄還山中所許通翼亦乞慨付
