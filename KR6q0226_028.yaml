body:
  text: 古歙門人成時編輯傳瑞光了一源禪師傳并贊了一禪師長洲縣周氏子少以俠聞里族年二十三忽思出世禮瑞光寺藍園遠公命名定源因見踏著稱錘硬似鐵語甚疑之晝夜無閒有省又疑如何是鬼神搜不破之機留心多載更有悟入雲門湛然禪師遊吳師呈所見湛印可嗣後惟誦圓覺經為夜課晝則閱大般若應事接物依然如故略不表異也萬曆丙辰臘月十六日謂竺瑤淨公等曰吾將長逝因取曆選二十六日且曰人止一死不足奇吾先作死法汝等隨喜乃結跏趺坐從足至頂漸皆如冰約一時復甦曰人怕死無別況如溫水中浴煖被中睡只嬾得起耳至期合寺各有付囑命合甖三載後開視之又謂其學人無雲曰吾平日教汝法華且道紙是法華耶字是法華耶誦是法華耶若會無邊寶藏一時領去不會則更讀三十年仍喝一喝云且道此一喝與全部法華是同是別又喝一喝大笑趺坐而逝眾奉全身塔於本寺土山世壽四十有六僧臘二十有四以依四安樂行不畜徒眾衣缽無嫡傳今淨公配入祖祠春秋不忒云贊曰宗門中事妙在潛修默證吻合教乘彼解一機一境便滿盤賣弄蔑視經典者適培生死根苗耳源公去來自在豈僅蒲團參悟之力良由般若圓覺以印心和光同塵以應世故雖無出世機緣而末後光明已照天地也增上慢人聞師之風愧矣武林萬安雲禪師往生傳吉祥寺萬安禪師諱大雲杭仁和郭氏子弟婦吳氏完節苦修師因感發往永慶寺出家受具於雲棲居北郊篤志淨業相依者眾湛然源靜主欽其素履捨菴為十方院師按此地古有吉祥寺率諸善友力復舊觀不數年佛宇僧寮燦然畢備共住規約一秉雲棲之制往來禪侶接待殷勤不營田產不置柴山百一所需悉任外緣弗涉邪命痛革時弊力追古風叢席稍成示微疾即絕飲食減語言專修淨業凡閱一月婦并女曹省視之訶曰彌陀不念念我何為臨終語上足智經曰為我灑埽佛來迎矣扶身趺坐念佛而逝世壽五十九僧臘十一夏婦大法弟婦大海男智首女智音甥女智真並出家修道云吳興智福優婆夷往生傳并贊優婆夷智福姑蘇盧氏子適新安程季清季清篤信佛法流寓吳興力營福業盧盡內政以助之弗倦好惠施無私積心言皆直謹身節用不喜御珍飾奇服不恚詈給侍人茹素持珠日課佛名二三萬視世閒法如嚼蠟壬申年三十九嬰篤疾急請古德法師受歸戒諮淨土法要乃一意西馳遇痛苦惟勤稱佛號季清為讀華嚴大經至遍參知識處一一解說亦一一領會復策之曰百劫千生在此一時努力直往勿猶豫也於是勵聲呼佛者半月見二高僧次第來轉加精勤徹夜猛念厥母欲泣厥女慰俱遣之云無亂我心次日辰時親見化佛蓮華遂覺精神恬適目色鮮明急索香水沐浴西向叉手連聲念佛吉祥而逝則十一月初八日正午時也日暮遍身冷頂門猶熱贊曰哀哉三界愛欲為根根株不拔奚望西生蓮華國土永離塵情此緣能斷彼質斯成勇矣智福女中之英快逢勝友皆由夙因一日一夜淨念功殷華臺接引眼識分明子母恩愛枯木寒冰吉祥善逝長辭苦輪我悲含識纏使所嬰戀此幻世曠劫迷真謬圖出要罔知勝津計取空果違妙淨因誰能正信闊步高登我今隨喜願共群靈頓除疑網證入玄門松陵鑒空寧禪師傳方外史曰世有大才小用者舉世共稱之其人終不傳如松陵沈氏鑒空如寧禪師貌古骨勁志超夷等以萬曆丁亥年禮懷林茂公出家方尖觀音禪院茂棄世師年十七形影弔日受侵擾不去對峰宏禪師見師年少而志堅力扶之語長者敬菴陸公捐資修葺申文定公聞之遊其地手為題額方獲安處師唯誅茅力耕絕無夤緣延至天啟丙寅囊有餘貲捐之像貌堂宇煥然改觀戊辰遊普陀歸憩聖壽寺之藏殿時南關接待寺乏人徵師理庫事越一載主之整廢墜肅清規作事先勞享用平等別開學人信宿之單按律制無盡藏田畝日增積弊悉杜經四載空囊稍實復捐修大殿不數月工成遂示微疾絕湯藥點常住事纖悉分明與眾永訣上首墮淚訶曰老老大大作兒女態耶命送骨歸普同上首請鎮方尖默許之次日寂然無聲吉祥而逝眾撿其囊無分文世壽五十有九僧臘九夏既往而芳名益著議者誰不曰師於接待第一功臣於方尖中興烈祖哉嗚呼此皆非知公者也方公之力耕方尖也喟然歎曰不意為茲地埋沒半生天啟乙丑予偶同二三法友結夏菴中商大佛頂要義師既聞出世法門猛省昔願頓以菴事付實上足從茂林律主受戒偕予結夏承天究律學予以先慈捐世將隱師招掩關以身護其海上之遊亦侍予也欲檢律嚴淨毘尼故歸憩聖壽斯時也舌不味非時之肴手不釋圓明之珠送想西方不復知有人世閒事將謂初志遂矣不意接待之緣漸漸逼身兩翻皆再三力辭檀護再四堅勸萬不獲已荷之而志實大拂臨終命送骨入六和僧海蓋矢學於來生矣至許方尖之請不以語以默是默也與昔力耕時倚鋤長喟何異也師不遂深入法門之志故兩地之勳人雖嘖嘖而自視愈欿然焉非大才小用何能功成不滿哉予知師傳之以為幼而有志者告璧如惺谷二友合傳并贊璧如禪師諱廣鎬台州王氏子俗名敬轂號伯無父士琦為大同開府以廉名師弱冠即有出世志禮雲棲蓮大師受五戒有今名萬曆丙午舉孝廉時二十七歲越兩大試慨然就選為急完仰事俯育之累圖出世也令新淦愛民如子因居官戒德稍疏戊午入覲舟次荻港夢鬼使攝見冥王責以破戒事驅入獄傍有冥官代請取破戒後諸事省之善多惡少釋不入獄鑿蒲萄朵釘柱上及寤雙目乃矐矣醫進藥復夢為冥王所訶更以二錇入兩眶大痛失聲而醒遂不服藥告歸築室台山高明寺傍日課金剛般若并大悲心咒行法不一年漸復明諸親友勸令再仕歎曰人生幾何猛求出世不暇猶作蝸角蠅頭活計乎惟太夫人在未忍去然思既欲離俗復以母在為礙豈可不願母臻上壽耶時有人因子出家悲泣太夫人故笑之曰第一好事應慶幸何泣為設在吾吾決不作此態也師由是安心遠遁剃染楚中單身行腳備嘗諸苦登戒品掩關閱律并書華嚴大法次歷匡廬諸處到博山隨眾參禪人無知者予適同歸一師送惺谷至博山薙髮師在高明曾與歸師交歸一日眾中執其手曰公是回生王伯無否不容諱始實之日見予與無異禪師論受戒事最悉因歎近來律學大淆本以破戒親受冥譴久欲留心此道而歷叩名德律主罕不瞶瞶者予出毘尼集要示之亟讀亟賞歎未曾有遂與盟千古交又知予方事閱藏以啟囑曰三藏義類宜總為一書三藏酌要諸宗集要佛事稽古正訛宜各別為一書發菩提心集六度集宜為二書毗尼中衣事缽事及授戒說戒羯磨諸事日用閒宜行者當輯附集要後梵網經雖有二大士發明宜補以彌勒戒本及諸經有相發者集附本條之下然後自出手眼以補前人之缺亦不失為二大士忠臣勿以避嫌失此勝事沙彌戒優婆塞戒俱要少有發明附於集要已上八則弟往讀契經薄有微願恨齒逼遲暮精已銷亡近又作蒲團活計不能填也幸逢郢匠敬附當機儻三昧酒消尚冀奉襄半臂不爾者當結縞帶於來生矣予唯唯謝曰弟亦夙有此志不謀而合第六第八兩事業已為之矣未幾掩關東峰靜室次年太夫人以其故二訃乃歸省太夫人語曰予謂子出家吾不悲泣今果然否勉矣吾自善養餘年汝子亦善學勿以此妨出世大事也師奉慈命遊武林與新伊法師莫逆時予入孝豐取道武林師曰集要雖預參訂實未淹浹擬從師授講服習之不令付諸空言今遇華嚴法席不能隨餘生若在明歲入山結夏耳不旬日嬰微疾預知時至命侍者寫囑言貽二子攝心念佛而去嗚呼以師之敏而好學解而能行具出世正因懷菩提大願謙光厚德飲人以和無愧蓮師法脈天竟不假以年非法門大不幸乎師生於萬曆庚辰卒於崇禎辛未世壽五十有二法臘五年示居學地故衣缽無傳唯回生紀一卷行世佛日金臺法師塔其全身於皋亭山麓惺谷禪師諱道壽溫陵何氏子俗名啟圖為文學時閱憨山大師楞伽記且讀且泣發出世心捐舉業專究宗乘因父在不得出家以居士身與道友如是雨海等日相砥礪泉南久乏聞熏緇林無人知參方行腳事師鼓一二英傑破格遠遊閩中緇素始稍稍有發心北學於江浙者初至匡山謁憨大師見其規模闊大於商究生死一事不甚切捨之之博山博山居以別室勉以參究年餘每與異師論甚厲異師不以為怪知其別有長也然異師法門必先定後慧師自揣種性應先慧後定藥病不投莫能相療東遊武林訪無盡法師於天台見故友歸一師德業俱進疑法師必有出格鉗錘依之得閱妙宗鈔等極則教理回視昔時慧解倍覺精細劉大參延至吳門從吳門遊杭抵龍居時予在龍居閱藏一見即問有著作否以白牛十頌示之大悅遂欲盟千古交予未以為然相聚既久每與予破格大諍予謂此居士也未必細察余言後因歸一師同結冬偶商及耳根圓通法門歸師持公論是師非予予因虛心再研舊諍負墮處大半矣乃共締千古盟激令早現僧相師以舊禮博山不忍背歸師與予欣然送之到博山異師手為薙髮而未受沙彌及比丘戒蓋受戒事曾與季賢師約必復古制故也庚午春予病滯龍居然臂香刺舌血作書與之師同如是師來禮季賢師為和尚覺源師為教授闍黎新伊師為羯磨闍黎力復如來舊規如法受沙彌及比丘戒唯菩薩戒不重受以為居士時曾受之博山也結夏安居聽毘尼集要師久習宗乘得其大益亦未免染其流弊不能留心律學但恐負予苦心知佛日金臺師虛懷好善以集要力請流通辛未秋疾終佛日嗚呼師亦最奇人也為法門每觸時忌為道友每忘自身慧眼超群機辯峭拔往往以短兵取勝雖名禪宿德欲與之戰大似撼岳家軍馴致之兜率覺範豈多讓焉予方謂博山有子青出於藍何入滅之速耶師生於萬曆癸未世壽四十有九法臘二年金臺法師茶毘之塔其骨與璧師鄰如是師以受師益最多輯師平日手札名為筆語而流通之述行紀執弟子禮於身後為天下後世重名相而輕法恩者愧云方外史曰二師皆予最善交也璧慈而溫惺悲而厲璧聰俊而詳明惺沈毅而精銳璧日讀數卷過目了了惺涵泳一偈一句經旬月不置是故惺服璧之博暢璧服惺之瑩徹璧所屆人皆愛之惺所屆人皆畏之璧惟欲受人益未敢益人故以能問於不能以多問於寡乃至臨終猶合掌問法令侍者泥首惺惟欲益人即名自益故從閩至江右從吳至武林無不以好辯貽譏叢席乃至臨終憶念故友如是勸宜自顧猶厲聲大叱謂千古安有自私自利聖賢噫孔子謂不得中行必也狂狷孟子稱伯夷柳下同為聖人二師春蘭秋菊各擅其美奚必兩融始名全德也其與予交也璧師欲受予益不得不稍以微辭益我惺師欲益於我亦不得不稍受予益皆生平破格處也可痛者璧師欲學毘尼有志未遂惺師既學不能力如來正法誰共仔肩歟嗟乎一月閒二師相繼而歿予雖有一二同志但能受益不能益我或可相益而喜願惡逆不能結眉於紅爐烈燄中撒手於冰凌劍刃上如二師者大事因緣尚不免留下公案矧不及二師哉予是以浩然永歎甘沒齒於深山也誦帚師往生傳師諱宏思一字如是晉江溜𤀀人族姓陳髫年入郡之開元寺禮湛然精舍肖滿全公為師薙髮後喜詩文不理錢穀氣節昂然緇素咸敬憚之年二十七忽發出世心盟月臺心默師及惺谷何居士為生死交朝夕參究大事忘形破格風雨寒暑弗替也時溫陵佛法久荒聞熏乏種師獨與惺谷鼓舞數人謁博山無異禪師受具戒苦參無字脅不著席者三年異師愍其勤恐致病說調琴喻勸之稍稍晏息終不解衣師志遠大縱有省悟不自足亦不輕舉似人同輩視師若木訥師固是非了了洞如秦鏡矣離博山游浙直習教觀於幽谿鑒末世暗證之失遵永明角虎之訓遂神棲安養期以萬善同歸迨惺谷薙草師以受惺谷教益最深欲推為先臘且博山受戒不如法遂捨前所授禮季賢師為和尚覺源新伊二法師為阿闍梨次惺谷進比丘戒兼進菩薩大戒結夏聽予律要次年惺谷師西逝師以全公年邁歸侍創八關社接引居士從此溫陵緇素始知有如來正戒師自視欿然惟明師良友是念越五載復逃江外踏冰雪尋予九子峰頂未幾全公變厥孫泣挽回泉乃訂予續至紫雲作掩關計逮予踐約未及一載師遂示疾召予助其念佛命侍者除髮浴身浴畢端坐舉手而逝正念分明神清氣定越二時頂𩕳尚煖托質蓮蕊無疑也師生平自奉甚約破衫補履數十年如一日予嘗笑謂之曰舜視棄天下猶棄敝屣師棄敝屣猶天下也師愀然曰某非故作慳態愧薄德不堪消受檀信耳甘淡薄忍疲勞精勤禪誦夜寐夙興雖劇病臨危亦不懈廢誠有古人風至於親信師友受惡辣鉗錘如飲甘露於古人中亦不多得假以數年近可匹休異巖遠可追蹤斷崖惜乎生年僅五十戒臘甫十夏自度固已有餘利他功未及半痛哉與士夫往復必隨其病渴飲以苦口師侍者錄成帙予戲題為老婆禪便有偈頌詩詠數十首未示疾前一月忽焚之嘗取律中一偈銘諸座右偈曰名譽及利養愚人所愛樂能損害善法如劍斬人頭師未嘗不與鄉紳賢達交而心固覷破如此也猶憶其詠菊絕句云籬菊數莖隨上下無心整理任他黃後先不與時花競自吐霜中一段香此可窺其概矣師自謂神根稍鈍晚稱誦帚道人志在掩關專修淨業又號藏六比丘其道昉一諱則異師所命也按紫雲開士傳已得八十人今當續稱第八十一云自觀印闍梨傳方外史曰法道之盛也一人敗之有餘逮其衰多人扶而不足豈魔力果勝道力哉同分妄情順易逆難故也於此有人焉易世俗所難緩時流所急雖大志未遂厥用未光亦足為中流砥柱屹然稱傑自觀法友殆庶幾乎法友名照印應天江浦人俗姓姚年十二斷酒肉出家大報恩寺之竹浪菴曾祖雲臺公久習禪思知為法器與祖西輪公玉成之解字義即喜習詩文祠部劉田諸公並加矜重為童子師董訓嚴正事耆宿盡禮闔寺先臘咸器重之年二十三忽發出世心棄鉛槧參雲谷老人請問法要顧多病瘡痂久蝕其膚未遑遠遊丁卯棲霞除夕偶琢句云此際欲何言燈花凡幾箇吟未罷燈光忽掩少頃燼乃復明不覺汗流浹骨猛省無常從此視世閒事益如枯木死灰矣己巳秋予遊棲霞始與法友晤贈以偈云舉世不知真吾獨不愛假羨君坦夷性堪入毘尼社法友領之壬申春遂入靈峰結夏予為秉羯磨授具戒專精聽律隨解隨行不肯付諸空言學侶競設問難唯法友默訥如愚真操實履無外飾餘習丙子予病隱九華法友居武水遍閱律藏全書丁丑尋予九子別峰商證梵網佛頂要旨予見其躬行有餘慧解不足設壇中十問拶之廢寢忘餐深思力索經秋及冬有省乃知此事甚大且遠更自勵韜光慎持戊寅予往溫陵法友歸遵遺教依律藏住依四念處行道不以世法干懷時同參者以通方自負每嗤之夷然弗顧也逮壬午予從溫陵返正擬與法友共建法幢乃先一年辛巳法友逝嗟乎三宗角立法道陵遲各騖名高咸無下基苟告以三學源委佛世芳規未有不掩鼻笑返脣譏者法友信我於舉世非毀之際從我於九死一生之時及戊寅一別咻者眾楚傳無一齊而能孑爾自淑至死弗移凝神觀佛正念以歸直至身歿緇素方追思而憶之豈不卓哉大報恩寺神廟閒傑出二人一為憨山大師一為雪浪大師印子初度即志前徽乃生年僅滿四十法臘十夏猶虧一時知嚮服者鄭中丞錢京兆鄉達凌官球陳旻昭居士陳非白張興公數人之外無餘焉予謂為二老不易為印子更危設無深慮遠識誰肯捨舉世共趨之好徑偏履草深一丈之甚夷耶昔孟軻尚論古人首陽殍與商阿衡魯士師同聖誠不用世諦為品題也予以憨雪兩大士與印子並稱為報恩三傑夫疇曰不宜也歟妙圓尊者往生傳并贊尊者妙圓諱如會燕都譚氏子世襲萬戶侯幼茹素三十九歲出家誓行頭陀脅不著席前後共然六指燒頂煉臂無算初至南方唯事苦行牛頭住持激以究理大為感發一心念佛遂得豁忘身世而不自稱悟見一切緇素不作寒溫語單己獨行不畜餘長夏棄冬衣冬盡捨夏天下名山歷覽殆遍心慈而色厲凡開示人必猛厲懇切不順庸情丙戌晤尊者於石城之隈次同住濟生菴盤桓數日公喜予朴實予敬公戒德禪定每行坐必推讓之戊子秋過淮安清江浦眾見其儀容不凡留供養未幾以一衲贈萬德菴主人且囑之曰吾不久將去特一事相託主人曰和尚方來何遽言去荅曰西方去耳可以遺身付江流中普與魚蟲結淨土緣主人辭不敢尊者曰若然茶毗後以骨和麵粉為我結緣何如主人曰可因命辦大燭好香眾莫測其意至十月十九夜四鼓忽呼主人曰為我大開各門燒香點燭主人點燭竟寂然坐逝四方皆聞異香爭來禮拜供養遵命茶毗作餌樂與江中世壽七十有一僧臘三十二年尊者曩在水草菴謂劉道澂曰一心念佛耑求上品上生便是向上第一義諦汝輩若不肯信試看我將來得生淨土便當信也噫今果然矣贊曰淨土橫超圓頓希有佛祖贊揚異音同口生盲罔知猶將別扣妄擬融通終成塵垢唯我妙公作師子吼一句彌陀博施約守末後光明機緣非偶稽首同歸誓弗敢後蓮居菴新法師往生傳法師諱大真號新伊武林東城周氏子也父某母劉氏師在襁褓即能合掌稱南無佛陀逮就外傅不伍群兒聚沙畫地為佛塔或趺坐觀鼻九歲父母議聘葉氏女師泣辭詣蓮居紹師受歸戒遂依座下紹師督課甚嚴師根性稍鈍屢受惡辣鉗錘堅無懈退年十五薙髮為沙彌二十入雲棲受具戒是夕夢著僧伽梨登高座演般若徵其實得無作戒也是故與師同時宏戒演法者雖多而童真入道必推師為第一服習紹師所演教法人一己百人十己千夜以繼日慈恩台岳宗旨每多遊刃而心益虛志益勇無論先賢著述即生在師後如惺谷壽之禪歸一籌及管正見之教不肖旭之律璧如鎬之儒師皆取諸人以為善如大海不拒眾流也師父母春秋高先後禮紹師出家異廬而居父名方舟沙門母名順修菴主師就養無方數十年如一日與紹師同稱至孝有古陳尊宿風故護法者額其室曰睦堂焉紹師去世師治後事畢感違緣飄然遠舉桐廬覺源法師延之往依焉與木石居與鹿豕遊無復人世閒想既易寒暑檀護書幣迎歸重主蓮居力宏紹師之道著唯識合響兼授金剛寶戒復建大悲壇嚴課事理二懺而教觀始並舉矣年七十一遍囑及門士傳持教觀自擇窣堵波地新秋示微疾自恣後三日趺坐憑几再申遺教并集居士弟子囑以護持正法越七日沐浴更衣就寢復起命取座置榻前跏趺其上手持數珠與眾同稱彌陀佛號頃之聲息俱寂鼻垂玉箸過尺許踰時頂相猶熱是為庚寅年七月二十五日午時法臘五十有三先是優婆塞周氏夢天樂迎師西逝急偕戚屬數人來受歸戒菴主道聲預以元日夢師坐蓮臺上師之往生淨土夫何疑哉贊曰昔佛以正法眼藏付大迦葉迦葉於佛滅後首集千阿羅漢結集三藏故知傳佛心印者必須三學並宏性相兼徹即如達磨以楞伽印心六祖必登壇受具餘可知也至於華嚴大集寶積法華諸大乘經無不弘讚淨土馬鳴龍樹諸大祖師無不神棲極樂豈止蓮宗十祖而已師祖雲棲父紹覺教以澡神律以滌愛勤修五悔遍學三宗無怪乎印壞文成如入三昧也彼鼠唧鳥空慣為大言以欺佛者聞師之風亦可以少愧矣新安程季清傳并贊季清居士新安程小溪第三子也名文濟法名通慧讀書西天目偶謁高峰大師塔不覺痛哭翦臂肉寸許奉供遂矢志參究禮雪嶠禪宿為師逼拶既久漸有入處既遊太學因長兄嗜堪輿術習之遍為叢席經營自比司馬頭陀至博山無異禪師甚敬愛之臨別步送五里居士謂末世禪流不達教理建六年講社於蓮居請十法主輪次登座又以修行要門須達法相延自平法主至丈室為菰城善信再演成唯識論撥冗諦聽曉夜究心深得慈恩綱要每讀華嚴大典及發菩提心論等輒聲淚俱下自號十願居士凡放生濟獄禮懺弘法無不以身先倡鼓舞成之京兆錢元沖喪子居士相與大興福業幾至三十萬金京兆卒居士亦喪子猛感無常乃閉戶謝客專修丈六佛觀始懵懵既隱隱漸現佛身明對心目唯色黎黯重加苦切凝想不已忽空中有聲教曰若欲見金色身者須於佛身先作紅想依教想之果獲閉目開目咸得了了佛身光明映室四壁室中什物皆成金色出定視世閒人如死灰矣一日正趺坐佛觀現前家人排戶作聲忽驚出定乃不復見佛因悟佛從想生本無來去而亦不捨觀門但涉事既繁功遂漸減每以為恨庚寅春謂予曰邇來始悟生西要訣須是放得娑婆下耳予甚然之蓋居士雖修佛身觀猶思後身作帝王弘法或作天神護世每遭予痛斥也辛卯秋嬰腹疾即囑後事屏雜緣繪接引聖像以助觀力至九月初二日吉祥而逝居士生於萬歷戊子閱世六十四年先後舉十一子僅存二謂予曰生平每夢行軍征伐執旗揮眾當是夙世殺業太重故所舉多不育耳元配盧氏法名智福先登樂土云居士捐世長女哀慕不已至一七夢居士曰吾已向吳門四十里外作大叢席護伽藍神矣方外史曰季清蚤歲參禪復精唯識歸心淨業如此而以風水名家卒為護伽藍神未登地菩薩不能盡伏現行煩惱世故有不足季清者乃其大菩提心種豈可得而掩哉影渠道山二師合傳影渠師檇李孫氏子出家本府之施菴法名清沼道山師一字靈隱武林孫氏子出家普陀之靜室法名永闃天啟初年有抱璞蓮法師兼受龍池禪學建期武康淨名菴二師同堂相聚盟世外金蘭從是形影相隨者二十餘年影沈靜寡言笑靈爽朗多恢諧似不相侔而謹身節用孤峻少合則出一轍故始自叢席終迄住靜不啻如水乳也既參抱師之禪復聽古德法師之教古師為予授戒闍梨而予生平不入講席與二師雖同門初不相識至乙亥春阻雨祥符始相傾信是年冬二師獲閱法華玄義及摩訶止觀大悔見此二書之晚知台宗圓頓法門直指人心見性成佛誠不異單傳正印而六即簡濫尤足救末世狂禪之失也蓋影師久習禪坐頗通教典靈師曾在淨名堂中得箇省處每歎諸方禪學展轉訛偽無可並譚僅寄情詩句之閒與雪嶠秋潭諸名宿酬倡視斯世同流合汙輩若將浼焉甘淡薄守枯寂凜凜乎若冰雪之寒矯矯乎若雲外之鶴今讀其詩猶可想見其眉宇也辛巳九月初八日影師示寂享年五十有五次年壬午九月二十五日靈師示寂享年四十有七遺骨共歸西溪普同塔中影師從行腳後遵頭陀行每事任靈師為之唯拱默靜修而已靈師僅薙度兩人一名福具字戒心久從予遊一名福定字止林長師一歲而出家在福具後即今督梓詩稿者亦能勤修禮誦不墜家風二師生平最落落寡合而一與之交則道誼最切每令人念之不忘從來不事干謁不營世務檇李緇素每追慕其高風誠末世優曇華也何俟登壇豎拂方名人天師範哉
